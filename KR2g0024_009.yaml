body:
  text: 宋名臣言行錄前集巻九宋朱子纂集田錫字表聖嘉州人中進士第事太宗真宗位至諫議大夫公自布衣已有意於風化上書闕下請復鄉飲籍田禮及知睦州下車建孔子祠教民興學表請入紙國子學印經籍給諸生詔賜之還其紙范文正公撰墓誌太宗嘗與侍臣論皇王之道錫奏曰皇王之道㣲妙曠闊今師平太原逮兹二載未賞軍功願因郊籍議功酬之乞罷交州戍兵免驅生民爲瘴嶺之鬼上嘉納焉趙普當國錫謁之曰公以元勲當國宜事損檢今羣臣書奏先經中書既非尊王之體諫官章疏令閤門填狀尤弱臺憲之風皆不便普引咎正容厚謝皆罷之玉壺清話錫好直諫太宗或時不能堪錫從容奏曰陛下日徃月來養成聖性上説益重之聖政太宗時錫上言軍國要機者一朝廷大體者四上嘗言錫有文行敢言真宗即位屢召對言事嘗請抄略御覽三百六十巻又採經史要言爲御屏風十巻以便觀覽及卒真宗謂劉沆曰田錫直臣也何天奪之速朝廷毎有小缺失方在思慮錫之章奏巳至矣䝉求真宗見錫色必莊嘗目之曰朕之汲黯也名臣傳錫疾亟進遺表真宗宣御醫馳救之無及矣俄召宰相對袖出其表示之且曰朕自臨大寳閱是表者多矣非祈澤宗族則希恩子孫未有如錫生死以國家爲慮而儆於朕者興歎久之命優贈典拾遺上嘗幸龍圗閣閱書指東北隅架一漆函上親署鐍者謂學士陳堯咨曰此田錫章疏也愴然乆之仝上蘇軾序公奏議曰自太平興國以來至於咸平可謂天下大治而田公之言常若有不測之憂近在朝夕者何哉古之君子必憂治世而危明主明主有絶人之資而治世無可畏之防夫有絶人之資必輕其臣無可畏之防必易其民此君子所甚懼也方漢文時刑措不用兵革不試而賈誼之言曰天下有可長太息者有可流涕者有可痛哭者後世不以是少漢文亦不以是甚賈誼由此觀之君子之遇治世而事明主法當如是也王禹偁字元之濟州人擢進士第事太宗真宗官至知制誥年七八巳能文畢文簡爲郡從事始知之問其家以磨麺爲生因令作磨詩元之不思以對但存心裏正無愁眼下遲若人輕着力便是轉身時文簡大竒之留於子弟中講學一日太守席上出詩句鸚鵡能言難似鳯坐客未有對文簡冩之屏間元之書其下蜘蛛雖巧不如蚕文簡歎息曰經綸之才也遂加以衣冠呼爲小友至文簡入相元之巳掌書命矣聞見録禹偁能屬文太宗方奬㧞文士聞其名召拜右拾遺直史館賜緋故事賜緋者給銀帶上特命以文犀帶賜之公獻端拱箴以爲戒尋知制誥上嘗稱之曰禹偁文章當今天下獨歩真宗即位召爲翰林學士修太宗實錄執政疑公輕重其間落職知黄州州境有二虎鬬食其一冬雷羣雞夜鳴公上疏引洪範陳戒且自劾上乃命移知蘄州尋召還朝公巳卒記聞爲諫官上禦戎十策大旨以謂外任人内修徳則可以弭之外則合兵勢以重將權罷小臣詗邏邉事行間諜以離其心遣保忠御卿率所部以張掎角下詔感勵邉人取燕薊舊疆葢弔晉遺民非貪其土地内則省官以寛經費抑文士以激武夫信用大臣以資其謀不貴虚名以戒旡益禁游惰以厚民力端拱冬旱公上疏請節用省費薄賦緩刑真宗即位詔羣臣論事公上疏陳五事一曰謹邉防通盟好二曰减冗兵併冗吏三曰難選舉四曰澄汰僧尼五曰親大臣逺小人並記聞公在翰林真宗初即位暇日召與論文公奏曰夫進賢黜不肖闢諫争之路彰爲誥命施之四海延利萬世王者之文也至於彫纎之言豈足以軫慮較輕重於𤨏𤨏之儒哉願棄其小務其大誠宗社之福上顧曰卿愛朕之深者掇遺出知黄州作三黜賦以見志卒章曰屈於身而不屈於道兮雖百謫其何虧吾當守正直而佩仁義兮惟終身而行之嘗云吾若生元和時從事於李絳崔羣間斯無愧矣公卒諫議大夫戚綸誄曰事上不回邪居下不謟佞見善若巳有嫉惡過仇讎世以爲知言記聞蘇東坡贊公畫像曰傳曰不有君子其能國乎余嘗三復斯言未嘗不流涕太息也如漢汲黯蕭望之李固張昭唐魏鄭公狄仁傑皆以身徇義招之不來麾之不去正色而立於朝則豺狼狐狸自相吞噬故能消禍於未形救危於將亡使皆如公孫丞相張禹胡廣雖累千百緩急豈可望哉故翰林王公元之以䧺文直道獨立當世足以追配此六君子者方是時朝廷清明無大奸慝然公猶不容於中耿然如秋霜夏日不可狎玩至於三黜以死有如不幸而居於衆邪之間安危之際則公之所爲必將驚世絶俗使斗筲穿窬之流心破膽裂豈特如此而巳乎余見公之畫像想其遺風餘烈願爲執鞭而不可得乃追爲之贊云惟昔聖賢患莫已知公遇太宗允也其時帝欲用公公不少貶三黜窮山之死靡憾咸平以來獨爲名臣一時之屈萬世之信紛紛鄙夫亦拜公像何以占之有泚其顙公能泚之不能已之茫茫九原愛莫起之孫奭宣公字宗古博平人以九經及第事太宗真宗仁宗位至翰林侍講學士爲國子監直講太宗幸監詔公講尚書說命三篇公年少位下然音讀詳潤帝稱善因歎曰天以良弼賚商朕獨不得耶因以切勵輔臣賜公緋章服永興軍上言朱能得天書真宗自拜迎入宫公知河陽上疏切諫以爲天且無言安得有書其辭有云得來唯自於朱能崇信只聞於陛下其質直如此上亦不之責頃之朱能果敗並記聞真宗將西祀公上疏切諫以爲西祀有十不可其辭有云秦多徭役而劉項起於徒中唐不恤民而黄巢因於饑嵗今陛下好行幸數賦歛安知天下無劉項黄巢乎上乃自製辨疑論以解之仍遣中使慰諭焉毎上前説經及亂君之國事反復申繹未嘗避諱因以規諷又掇五經切治道者爲五十篇號經典徽言上之畫無逸爲圖乞施便坐爲勸鑒之助奭舉動方重論議有根柢不肯詭隨雷同真宗巳封禪羣臣皆歌誦盛徳獨公正言諫争毅然有古風采並記聞公以太子少保致仕居於鄆一日置宴御詩廳仁宗嘗賜詩刻石所居㕔壁語客曰白傳有言多少朱門鎻空宅主人到老不曽歸今老夫歸矣喜動於色復顧石安道諷易離卦九三爻辭且曰樂以忘憂自得小人之志歌而鼓缶不興大耋之嗟公以醇徳奥學勸講禁中二十餘年晚節勇退優游里中始終全徳近世少比燕談公與馮章靖公俱以鴻碩重望勸講禁中凡朝廷典禮事並二公討論之沂公嘗言孫八座所閱典故必以前代中正合彛法事類而陳之則政府奉行無疑馮貳卿求廣博不專以典正爲意故政府奉行煩於執奏以是二君之優劣分矣沂公言行錄李及恭惠公字幼幾其先范陽人後徙鄭州中進士第事真宗仁宗位至御史中丞曹瑋久在秦州累章求代真宗問王旦誰可代者旦薦公上即以公知秦州衆皆謂公雖謹厚有行檢非守邉材楊億以衆言告旦旦不答公至秦州將吏心亦輕之㑹有屯駐禁軍白晝掣婦人銀釵於市吏執以聞公方觀書召之使前略加詰問其人服罪公不復下吏亟命斬之復觀書如故將吏皆驚服不日聲譽達京師億聞之復見旦道其事且曰向者相公初用及外廷之議皆恐及不勝其任今及材器乃如此信乎相公知人之明也旦笑曰外廷之議何其易得也夫以禁軍戍邉白晝爲盗於市主將斬之事之常也旦之用及者其意非爲此也夫以瑋知秦州七年羗人讋服邉境之事瑋處之巳盡其宜矣使他人徃必矜其聪明多所變置敗瑋成績旦所以用及者以及重厚必能謹守瑋之規模而巳億由是服旦之識度記聞公知杭州毎訪林逋於孤山望林麓而屏導從歩入其廬一日冒雪出郊衆謂當置酒召客乃獨造逋清談至暮而返逋死公以䘮服哭送拜墓乃歸吳兒自是恥其風俗之薄也晁以道集蔡君謨嘗書小吳牋云李及知杭州市白集一部乃爲終身之恨此清節可爲世戒乖崖鎮蜀當遨時士女環左右終三年未嘗回顧此重厚可爲薄末之檢柙筆談孔道輔字厚魯孔子四十五代孫舉進士奉孔子祠事仁宗位至御史中丞初章獻太后稱制郭后侍太后勢頗驕横後宫爲太后所禁遏不得進太后崩上始自縱適羙人尚氏父自所由除殿直賞賜無筭恩寵傾京師郭后妬屢與之忿争尚氏常於上前有侵后不遜語后不勝忿起批其頰上自起救之后誤查上頸上大怒閻文應勸上以𤓰痕示大臣而謀之上因以示吕夷簡且告之故夷簡因宻勸上廢后上疑之夷簡云光武漢之明主也郭后止以怨懟廢况傷乗輿乎廢之未損聖徳上未許外人籍籍頗有聞之者左司諫范仲淹因登對極諫不可夷簡將廢后奏請勑有司無得受臺諫章疏十二月乙卯稱皇后入道賜號净妃居别宫權中丞孔道輔怪閤門不受章奏遣吏詗之始知其事奏請未降詔書明日與范仲淹帥諸臺諫詣閤門請對閤門不爲奏公等欲自宣祐門入趣内東門宣祐監官宦者闔扉拒之道輔拊門銅環大呼曰皇后被廢柰何不聽我曺入諫宦者奏之須臾有㫖臺諫欲有所言宜詣中書附奏公等悉詣中書論辨諠譁夷簡曰廢后自有典故仲淹曰相公不過引漢光武勸上耳此光武失徳又足法耶自餘廢后皆昏君所爲夷簡拱立曰兹事諸君更自登對力陳之公等退夷簡即爲熟狀貶黜道輔等故事中丞罷須有告詞至是直以勑除之公等還家勑尋至遣人押出城十一月故后郭氏薨后之獲罪也上直以一時之忿且爲吕閻所贊故廢之既而悔之后出居瑶華宫章惠太后亦逐楊尚二羙人而立曹后久之上遊後園見郭后故肩輿悽然傷之作慶金枝詞賜之且曰當復召汝呂閻聞之大懼㑹后有小疾文應使醫官故以藥發其疾疾甚未絶文應以不救聞遽以棺歛之王伯庸時爲諫官上言郭后未卒數日先具棺器請推按起居狀上不從但以后禮葬於佛舍而巳或曰章獻初崩上與夷簡謀以夏竦等皆莊獻之黨悉罷之退告郭后后曰夷簡獨不附太后耶但多機巧善應變耳由是并夷簡罷之是日夷簡押班聞唱其名大駭不知其故夷簡素與内侍副都知閻文應相結使爲中詗乆之乃知事由郭后夷簡由是惡郭后記聞公知兖州近臣有獻詩百篇者執政請除龍圖閣直學士上曰是詩雖多不如孔道輔一言乃以公爲龍圖閣直學士王荆公撰墓誌公使契丹契丹燕使者優人以文宣王爲戯公赩然徑出虜使主客者邀還坐且令謝公正色曰中國與北朝通好以禮文相接今俳優之徒侮慢先聖而不之禁北朝之過也道輔何謝虜君臣黙然公在寧州道士治真武像有蛇穿其前數出近人人以爲神州將欲視驗以聞故率其屬徃拜之而蛇果出公即舉笏擊蛇殺之自州將以下皆大驚巳而又皆大服由是知名並墓誌元祐中上元駕幸凝祥池宴從臣教坊伶人以先聖爲戯刑部侍郎孔宗翰道輔之子奏唐文宗時嘗有爲此戯者詔斥去之今豈宜尚容有此詔付伶官于理或曰此細事何足言者孔曰非爾所知天子春秋鼎盛方且尊徳樂道而賤工乃爾褻慢縱而不治豈不累聖徳乎聞者歎服燕談尹洙字師魯河南人中進士第事仁宗官至起居舍人范公貶饒州諫官御史不肯言師魯上書言仲淹臣之師友願得俱貶貶監郢州酒税歐公撰墓誌慶歴中洙與仲淹等友善仲淹等既罷朝政洙亦爲人希時宰意攻以居渭州時事遂置獄遣劉湜按之一日謂洙曰龍圖以銀爲偏提給銀有記而收偏提無籍龍圖當得罪死矣洙曰此不足以致洙罪也以銀爲偏提用某工校主之附某籍可取視之湜閱籍果然知不能害嘆息而巳其後洙在随州而孫甫知安州過隨二人皆好辨論對榻語幾月無所不道而洙未嘗有一言及湜者甫問曰劉湜按師魯欲致師魯於死而師魯絶口未嘗有一言及湜何也洙曰湜與洙本未嘗有不足之意其希用事者意欲害洙廼湜不能自樹立耳洙何恨於湜乎甫深伏其識量甫又言洙自謂平生好善之心過於嫉惡甫謂信然南豐雜識師魯謫官均州時希文知鄧州師魯得疾即擅去官詣鄧州以後事屬希文希文日徃視其疾一旦遣人召希文甚遽既至師魯曰洙今日必死矣人言將死者必見鬼神此不可信洙並無所見但覺氣息奄奄就盡耳隠几坐與希文語乆之謂希文曰公可出洙將逝矣希文出至㕔事巳聞其家號哭希文竭力送其喪及妻孥歸洛陽記聞師魯當天下無事時獨喜論兵爲叙燕息戍二篇行於世自西兵起凡五六嵗未嘗不在其間故於西事尤習其詳欲訓土兵代戍卒以减邉用爲禦戎長乆之䇿皆未及施爲而元昊臣西兵解嚴師魯亦去而得罪矣誌公天性慈仁内剛外和凡事有小而可矜者必惻然不忍發見顔貌及臨大節斷大事則心如金石雖鼎鑊不可變也文章自唐之衰日淪淺俗寖以大敝本朝栁仲塗始以古道發明之後卒不能大振天聖初公獨與穆叅軍伯長矯時所尚力以古文爲主次得歐陽永叔以雄詞鼓動之於是後學大悟文風丕變並韓魏公撰墓表師魯深於春秋故其文謹嚴辭約而理精章奏疏議大見風采士林聳慕焉范文正撰文集序本朝古文栁開仲塗穆修伯長首爲之唱師魯兄弟繼其後文忠公蚤工偶儷之文及宦河南始得師魯乃出韓退之之文學之盖公與師魯於文雖不同公爲古文則居師魯後也如五代史公嘗與師魯約分撰其後師魯死無子今歐陽公五代史頒之學官盛行於世内果有師魯之文乎抑歐陽公自爲之也歐公誌師魯墓論其文曰簡而有法且謂人曰在孔子六經中惟春秋可當則歐公於師魯不薄矣崇寧間改修神宗正史歐公傳乃云同時有尹洙者亦爲古文然洙才不足以望修云葢史官皆晚學小生不知前軰文章淵源自有次第也天聖明道中錢文僖自樞宻留守西都謝希深爲通判歐陽永叔爲推官尹師魯爲掌書記梅聖俞爲主簿皆天下之士錢相因府第起䨇桂樓西城建臨園驛命永叔師魯作記永叔文先成凡千餘言師魯曰洙只用五百字可記文成永叔服其簡古永叔自此始爲古文並聞見錄韓魏公曰希文常勸以身安而後國家可保師魯以謂不然直謂臨國家不當更顧身公雖重希文之説然性之所喜以師魯爲愜爾別録余靖襄公字安道建州人舉進士試書判㧞萃事仁宗官至工部尚書范文正以言事忤大臣貶知饒州諫官御史緘口避禍無敢言者公獨上書曰陛下親政以來三逐言事者矣若習以爲常不甚重惜恐鉗天下之口書既上落職監筠州酒税尹洙歐陽修相繼抗疏論列又以書讓諫官以得罪逺謫時天下賢士相與惜其去號爲四賢慶歴三年上増置諫官以開廣言路親筆公姓名除右正言公感激奮勵遇事輙言無所回避是年太白犯嵗星於太㣲端門之右公論之曰金火罰星皆主兵喪及饑葢木爲徳金爲刑惟金沴木五行所忌願陛下責躬修徳以謝天變並蘇台文撰行狀開寳塔災得舊瘞舎利迎入内廷傳言頗有光怪將復建塔公言彼一塔不能自衛何福可及於民凡腐草皆有光水精及珠之圓者夜亦有光烏足異也上從之筆談奉使契丹入辭書所奏事於笏各用一字爲目上顧見之問其所書者何靖以實對上指其字一一問之盡而後巳記聞慶歴四年元昊請和將加封册而契丹以兵臨境上遣使言爲中國討賊請止毋與和朝廷患之議未决公獨謂中國厭兵久矣此契丹之所幸一日使吾息兵養勇非其利也故用此以撓我耳是不可聽朝廷雖是公言猶留夏册不遣而假公諫議大夫以報公從十餘騎馳居庸闗見虜於九十九泉從容坐帳中辨析徃復數十卒屈其議取其要領而還朝廷遂發册臣元昊西師既解嚴而北邉亦無事神道碑歐陽公撰使契丹能爲胡語契丹愛之及再徃虜情益親余作胡語詩虜主大喜還坐貶官貢父詩話唐之畨舶裝船舊皆取税公奏罷之以來逺商又請立法戒當任官吏不得市南藥及公北歸不載南海一物行狀本名希古韶州人舉進士未預解薦曲江主薄王仝喜遇之時知韶州者舉制科仝亦舉制科知州怒以爲玩巳捃其罪無所得惟得仝與希古接坐仝坐違勅停任希古杖臋二十仝遂閒居䖍州不復仕進希古更名靖取他州解及第景祐中爲館職爲范文正訟寃獲罪由是知名范公叅政引爲諫官祕書丞茹孝標䘮服未除入京私營身計靖上言孝標冒哀求仕不孝孝標由是獲罪深恨靖靖遷龍圖閣直學士王仝數以書干靖求貨靖不能應其求孝標聞靖嘗犯刑詐匿應舉乃自詣韶州購求其案得之時錢子飛爲諫官方攻范黨孝標以其事語之子飛即以聞詔下䖍州問王仝靖隂使人諷仝令避去仝辭以貧不能出靖置銀百兩於茶篚中託人餉之所託者怪其重開視竊銀而致茶於仝仝大怒及詔至州官勸仝對當日接坐者余希古今不知所在仝不從對稱希古即靖是也靖遂以將軍分司記聞王質字子野文正公之姪也以䕃補官召試賜進士及第事仁宗官至天章閣侍制通判蘓州州守黄宗旦頗以新進少公議事則曰少年乃與丈人争事公曰受命佐君事有當争職也宗旦雖屢屈折而政常得無失稍徳公助已宗旦得盗鑄錢百餘人以託公公曰事發無跡何從得之曰吾以術鉤出之公愀然曰仁者之政以術鉤人寘之死而又喜乎宗旦慙服遂緩出其獄始大稱公曰君子也遷湖北轉運使當用兵西方急於財用之時獨不進羡餘其賦歛近寛平治以常法故他路不勝其弊而荆湖之人自若判吏部流内銓號爲稱職而於選法未嘗有所更易人或問之公曰選法具備如權衡在執者不欺其輕重耳何必屢更其法范仲淹以言事貶饒州方治黨人甚急公獨扶病率子弟餞於東門留連數日大臣有以讓公曰長者亦爲此乎何苦自䧟朋黨公曰范公天下賢者若得爲黨人公之賜質厚矣聞者爲公縮頸並歐公撰神道碑文正作舍人時家甚虚嘗貸人金以贍昆弟過期不入輟所乗馬以償之公因閱家藏書而得其劵召家人示之曰此前人清風吾軰當奉而不墜宜祕藏之又得顔魯公爲尚書時乞米於李大夫墨帖刻石以模之遍遺親友終身不貪所至有冰蘗聲范文正撰墓表孫甫字之翰許州人再舉及第事仁宗官至天章閣待制兼侍讀監益州交子務蜀用鐡錢民苦轉貿重故設法書紙代錢以便市易轉運使以偽造犯法者多欲廢不用公曰交子可以偽造錢亦可以私鑄私鑄有犯錢可廢乎但嚴治之不當以小仁廢大利後卒不能廢歐公撰墓誌祁公爲樞宻副使薦於朝得祕閣校理是時天子方銳意更用二三大臣乃極選一時知名士増置諫官使補缺失公以右正言居諫院上好納諫諍未嘗罷言者而至言宫禁事他人猶須委曲開諷而公獨曰所謂后者正嫡也其餘皆猶婢耳貴賤有等用物不宜過僣自古寵女色初不制而後不能制者其禍不可悔上深嘉納之保州兵變前有告者大臣不時發之公因力言樞宻使副當得罪使乃杜祁公也邉將劉滬城水洛於渭州部署尹洙以滬違節度將誅之大臣稍主洙議公以謂水洛通秦渭於國家利滬不可罪由是罷洙而釋滬洙公平生所善者也公在諫院所言補益尤多是三者其一人所難言其二人所難處者其後言宰相以某事當去者上亟爲罷之因以陳執中爲叅知政事公又言執中不可用由是上難之公遂求解職墓誌慶歴中孫甫蔡襄爲諫官言宰臣晏殊役官兵治邸舍懷安茍且無向公之心遂罷殊政事而甫等因薦富弼代殊上怒以謂進用宰相人主之任臣下不宜有所指陳遂相陳執中而甫等極言執中不可用不聽求罷南豐雜識慶歴中上用杜衍范仲淹富弼韓琦任政事而以歐陽修蔡襄及甫等為諫官欲更張庶事致太平之功仲淹亦皆戮力自効欲報人主之知然好同惡異不能曠然無適莫甫嘗家居石介過之問介適何許來介言方過富公問富公何為介曰富公言滕宗諒守慶州用公使錢坐法杜公則欲致宗諒重法不然則衍不能在此范公則欲薄其罪曰不然則仲淹請去富公欲抵宗諒重法則懼違范公欲薄其罪則懼違杜公患是不知所決甫曰守道以為如何介曰介亦竊患之甫嘆曰法者人主之操柄今富公患重罪宗諒則違范公薄其罪則違杜公是不知有法而未嘗意在人主也守道平生好議論自謂正直亦安得此言乎同上初元昊反河西契丹亦以兵近邉謀棄約任事者於西方益禁兵二十萬北方益土兵亦二十萬又益禁兵四十指揮及羣盗張海等刼京西江淮皆警是時巳更用大臣矣又令天下益禁兵公言曰天下所以大困在浮費而浮費之廣者兵為甚今不能損又可益之邪且兵巳百萬矣不能止盗而但欲多兵豈可謂知所先後哉不報於是極論古今養兵多少之利害以聞語詆大臣尤切行狀為兩浙轉運使范文正守杭以大臣或便宜行事公曰范公貴臣也吾屈於此則彼不得伸於彼矣由是一切䋲以法而常以監司自處范公遇公無倦色及退而不能無恨公遇范公不少下然退而未嘗不稱其賢也誌人嘗與一硯直三十千公曰硯何異而如此之價也客曰硯以石潤為賢此石呵之則水流甫曰一日可得一擔水纔直三錢買此何用竟不受筆談公博學强記尤善言唐事能詳其君臣行事本末以推見當時治亂毎為人説如其身履其間而聽者曉然如目見故學者以為終嵗讀史不如一日聞公論也所著唐史記七十五巻論議閎贍書未及成公巳卒詔取其書藏秘府誌司馬温公書公唐史記後云孫公昔著此書甚自重惜常别緘其藁於笥必盥手啟之謂家人曰萬一有水火刀兵之急他貨財盡棄之此笥不可失也毎公私少間則増損改易未嘗去手其在江東為轉運使出行部亦以自随過亭傳休止輙取修之㑹宣州有急變乗馹遽徃不暇挈以俱既行其後金陵大火延及轉運廨舍弟子察親負其笥避於沼中島上公在宣州聞之亟還入問曰唐書在乎察對曰在乃悦餘無所問自壯年至於白首乃成亦未以示人文潞公執政嘗就公借之公不與但録姚宋論以與之况他人固不得見也蘓内翰答李薦書云錄示孫之翰唐論僕不識之翰今見此書凛然得其為人至論褚遂良不譛劉洎太子瑛之廢由張説張廵之敗由房琯李光弼不當圖史思明宣宗有小善而無人君大略皆舊史所不及也宋名臣言行録前集巻九
