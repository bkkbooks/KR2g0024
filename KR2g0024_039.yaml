body:
  text: 宋名臣言行錄別集上巻七宋李幼武纂集汪藻字彦章饒之德興人中崇寧二年進士乙科調婺州察推除宣州教憂吉除荆南書記不赴改江西提學司幹至京除編修九域圖志母憂吉除校書郎遷著佐符寶郎時政和四年也王黼黜之倅宣州丐祠提㸃太平觀淵聖即位召為尚書屯田員外郎尋改禮部進常少起居舍人高宗即位召為中書舍人駕幸維揚罷為集撰提舉太平觀明年復召為中書擢給事中兵侍兼侍講直院尋真拜翰林學士復領日厯除龍圖直學士知湖州倅領日厯移守撫州歲餘提舉太平觀㫖復命編日厯書成加中大夫顯謨學士守徽州十二年知泉州移宣州閲月改鎮江遭讒言落職永州居住更七八年乞致仕不許卒於貶所二十四年六月也年七十六後二年詔贈端明學士自幼已卓越有大志學舉子業既成得春秋左氏西漢書讀而好之鋭意欲與之並年甫冠徒步游太學有司第其文屢出諸生上徽宗親製君臣慶會閣詩羣臣進和喜事者集為一錄公適見之擬和一章屬詞用韵句法清新出衆作之右即日傳布諸公喜而稱之博學強記自六經百家太史之籍先儒箋疏傳註之書兵家族譜方言地志星經厯法佛老之衆説與夫萬里海外蠻夷異域荒怪之序錄靡不記覽其為辭章明於道德達於世務指事折理引物託喻馳騁古今貫穿經傳該備衆體葢數十萬言自成一家在江西徐州俯師川洪炎洪芻有能詩聲自負無所屈一日俯見公詩於僧壁唶曰此我輩人也率二洪詣舍上謁既去公曰騷人墨客撚須琢句以自鳴其不平耳烏足尚也至是數年卒以大手筆稱天下金華勸講石室紬書典冊施之朝廷樂歌薦之郊廟鴻文碩學暴耀一世人知其名家有其書而詩律高妙興寄深逺亦非近世詩人之所能及大璫梁師成用事小人朋附目為隱相武人呉可者師成許以能詩至出入卧内公罷符寶可過公致師成意曰聞名乆矣幸不鄙過我禁從可拱而俟公謝不往客曰吾曹望隱相之門如在天上召而不往何也公曰若使我與可輩為伍耶草高麗答詔上顧輔臣稱公得代言之體乆之麗人謝表至上復稱公以所御白團扇親書紫誥仍兼綰黄麻似六經十字以賜縉紳榮之論諸大將擁重兵高位崇秩子女玉帛已極富貴之欲而根據盤互浸成外重之勢陳所以待之者三事一曰示之以法二曰運之以權三曰別之以分後十年卒如其策又言今國家所有不數十州所謂生財必生於此數十州之民何以堪之惟痛加裁損軍中之冒請禁中之泛取乃可爾臣復有過計者自古以兵權屬人乆未有不為患者今將驕難制意偏裨中必有一二英雄宜精擇十餘人各授以數千兵直𨽻御前合為數萬以漸消諸將之權此萬世計也言淮南洊經虜冦民去本業不耕之田千里相望流民非朝夕可還國家欲保淮南勢須屯田臣謂春間便可遣劉光世或呂頤浩率所招安人馬過江營建寨柵使之分地而耕既固行在藩籬且清東西羣盗此萬世一時也言宣和諸臣交通貴倖一時誤恩官有至銀青光祿大夫者臺諌極論方就鐫褫詔墨未乾而當甄復盍依祖宗法至中大夫而止論繳數人國論以為允又言元符以來並無日厯可謂闕典古者有國必有史有史必有官漢法太史公位在丞相上天下計書先上太史公副上丞相自唐至本朝亦以宰相監總國之重事願留聖心上欣納翌日輔臣請擇所付上曰無以易藻矣始在太學與王黼有纎芥後黼入相嫌恨不除竟坐廢斥而言者指公為黼黨出居永州累赦不宥卒厄於窮裔以死孫覿曰建炎紹興間大盗據中原羣惡嘯聚環四海為盗區矣天子慨然仗一劒出入兵間禁暴除殘拯溺弔凶於戎馬蹀血之餘以建中興之烈當是時公為翰林一時詔令多出其手凡上所以指授諸將感厲戰士訓飭在位哀閔元元之意具在誥命之文開示赤心明白洞達不出户窺牖而天威咫尺坐照萬里學士大夫傳誦以比陸宣公居亡幾何權臣植黨除不附已公亦抵罪斥居永州積十二年更四赦不得還間過勝日幅巾葛屢登西山循鈷鉧潭入愚溪並湘流沈文以弔古人而自肆於山水年益高文益奇詩益工華妙精深與柳儀曹相望於數百載後文章格力與之相上下何其盛也又序公文曰天下有能事而文章為難工自漢迄唐千有餘歲一時大手筆作為文章閎麗精深桀然視天下而自立不朽葢幾人而已杜子美詩格力自天雄跨百代為古今詩人之冠至他文輒不工荀卿所謂藝之至者不兩能信矣夫道散文弊作者衆矣詞句儇淺益不逮前其間心競力取馳騁上下欲一蹴以造古人之域而擇之不精守之不固狥名而媮習鄙而陋固不足與於斯文左太冲積十年之勤僅成一賦劉伯倫以一酒德頌終身而一能之善一語之工亦遂列於作者之林而名後世今公之文所謂閎麗精深桀然視天下後世者也公生平無所好至讀古聖賢之書屬而為詞章如㗖土炭嗜昌歜而為一病寤寐千載心慕手追貫穿百家網羅舊聞推原天人道德之㫖古今興壞理亂得失之迹而意有適者必寓之於此登高望逺屬思千里凡耳目之所接雜然觸於中而發於詠歌者必寓之於此﨑嶇兵亂潛深伏隩悲歌慷慨酣醉亡聊而不平有動於心者亦必寓之於此技與道俱習與空會文從字順體質渾然不見刻畫如千石之鍾萬石之簴叩之輒應愈叩而愈亡窮何其盛也綦崇禮北海先生字叔厚世為高密人後徙淮之北海登政和八年上舍第調淄州淄縣簿秩滿改學正除博士改正字丁母憂歸建炎戊申宰邵州邵陽道州倅俱不就除尚書工部員外郎尋為起居郎攝給事中召試政事堂頃刻為制誥三篇詞翰竒偉上亟歎其能拜中書舍人四年兼權直學士院除吏侍求便郡拜徽猷直學知漳州明州紹興二年復為吏侍權直院丐他局移兵侍進直院俄除翰學兼侍讀兼史館修撰引疾在告丐去不允換寶文直學士知紹興府浙東帥朞年丐閒許之三任太平觀祠十二年上章告老八月年六十進爵高密侯贈朝議大夫幼而穎邁不好嬉弄讀書學文月開日益儔輩莫敢望甫十歲能作銘以志邑人之藏屬辭比事音節皆中律呂父見而大驚顧謂皇妣曰吾門自高祖以來劬躬積善之報其在斯乎駕幸平江有㫖故鄒浩追復龍圖閣待制公當行詞推上所以褒䘏遺直之意有曰處心不欺養氣至大言期寤意引裾嘗犯於雷霆計不惜身去國再遷於嶺徼具臣動色志士傾心又曰英爽不忘想生氣之猶在姦諛已死知朽骨之尚寒同省舍人李正民見之曰比吏房詞頭皆常常除目不足騁辭今君為鄒草制良可喜也及錄黄具公告假而李獨直以已名行下公戯之曰君固欲掛名道鄉公制但恐潤色非工反為名累耳李笑曰人當知出君手不知吾併得掠美幸矣其文為同舍所重如此嘗上言車駕駐臨安即以浙西為根本宜固江淮之守然後可以圖興復西蜀在萬里外當召用其士大夫以慰安逺人之心至於繩外臺奉令簡忽之愆革諸將第功遷補之濫汰冗兵撙浮費皆時所難言者御筆處分召至都堂令條具進討固守利害公奏曰金人自靖康以來無歲無兵及乘輿南渡已酉之冬直冦江淛逮其歸師齟齬謂可以休矣乃且移兵以冦關陜乘我富平之敗遂窺巴蜀幸呉玠一勝稍挫其鋒然其圖我葢未忘也今偵諜所傳皆言金人併兵以趨川陜可以知其情矣葢以向來江表用兵非敵形勢之便故二三歲來悉力窺蜀其意以謂蜀若不守江淛自摇故必圖之不置非特報前一敗而已則是今日利害在吾蜀兵之勝負吾兵占勝而金不得近蜀則必氣索而衆離若乘其敗而西自襄漢而東自淮海進兵以攻討則我必大得志而中原定矣為天下者審夫議論規模所存而已規模者國家所恃以立議論者規模所恃而定議論定則規模立規模立而國家之勢成矣議論不定則規模不立規模不立而國家之勢危矣夫規模議論尤急於天下多事之際議論定則成不定則敗規模立則存不立則亡此成敗存亡之機也竊以為今日之議論規模宜不出此三者恢復中原以成再造之功上也因所有之地而疆理之中也茍目前之安而無所為下也語其上則今之力誠未可為守其下則吾之勢未可復立惟度時量力就其中者為之中者既成則其上者可馴而致茍止於下則雖志於中者不可復得矣欲望陛下發自聖志明詔大臣母取言高以害實治母偷茍安以玩歲月議論審其可用規模定其適中以此立政事以此任人材以此責功効如是而期月之間治功不成未之見也今已過防秋且逺近傳聞通使人情恐便舒緩謂宜申戒㳂江將帥明逺斥堠防阨險要選練士卒日訓于師常如遇敵以為先事之備庶無後悔茍和議遂成亦未可以弛備况今日耶公再入翰林凡五年所撰詔命數百篇文簡意明不私美不寄怨固已得代言之體而慷慨論事無所囘避不虚為侍從帷幄之臣秦檜上章辭位上召公出檜所獻二策大畧欲以河北人還金人中原人還劉豫上又曰檜言南人歸南北人歸北朕北人將安歸又檜言臣為相數月可驚動天下今無聞故公載之制詞畧曰自詭得權而舉事當聳動於四方逮兹居位以陳謀首建明於二策罔燭厥理殊乖素朝川陜宣撫副使呉玠以功進檢校少師兩鎮節度使公當制有曰陸海神臯既失秦川之利銅梁劒閣敢言蜀道之難言者謂秦雖淪陷而川未嘗失也指以為病上知其非公猶援唐故事自謂失職力引疾求去遂除知紹興逆雛導鄰國入冦揚楚震擾上躬御戎衣次於呉會公以近臣承寧方面謂浙東一道為行都府肘腋之地備豫不可不謹密疏於朝得便宜從事於是繕城郭厲甲兵輸錢帛以供王師犒給之須簡舟艦以扼海道衝突之患疚心夙夜殆廢寢食及春大駕凱旋七州數十縣之民按堵自如不知邊書羽檄之遽公之力也公平居不為崖岸嶄絶之行亷儉寡欲獨覃思於學問文章白首不倦彊記黙識繇唐虞三代以暨國朝之隆君臣事迹先後數千載如指諸掌視唐常楊為不足道上每曰綦公之文有體真學士也秦檜罷政公草詞頭著其惡無所囘隱檜深憾焉及為太師怙權張甚必修怨焉而公已殁矣然身後所得恩澤其家畏懼不敢陳士大夫亦無敢為之保任閲十年矣猶稱詔下台州取壬子八月所賜御筆衆論嗟愕檜死朋憸盡逐識者慨公之不及見也趙思誠祭之曰公妙齡秀發聰敏過人辭章之妙追古作者博習詩書六藝之文旁通諸子百家之編下逮傳記小説靡不該貫奕棋音律悉皆洞曉酒酣氣振議論風生長歌慷慨旁若無人真一時之英也誠為確論中年頓挫場屋晚方登第一主縣簿即踐華要當官直氣敢言多面折人無所忌避雖始終以文翰際遇而朝廷有大議論上必咨訪故内外憚之如臺諫然初拜掖垣即兼内職後兩領天官亦如之在玉堂前後五載上屢欲大用為權臣中沮不果建炎間駐蹕靡定詔令多不時下公受命立成上每嘉奬曰綦某詞知體語言輕重得宜無可㸃檢者時議以為中興之功非特將士宣力然詔令亦有助焉樓鑰序公文集曰南渡之行公在帝側實代王言詔㫖所至讀者感動諸將奔走承命如陸宣公之在奉天也尋入翰苑當羽檄旁午書詔填委之會而播告之修不匿厥㫖呂忠穆以首相開督府訓辭尤為宏偉有曰盡長江表裏之封悉歸經畧舉宿將侯王之貴咸聽指呼其能布宣威靈張大國體類此葢公篤意經術博覽彊記以直道自任才高而氣剛平時為文不為崖異之言而氣格渾然天成故一旦當書之任明白洞達雖武夫逺人曉然知上意所在非規規然取青嫓白以為工者比也楊萬里序之曰記覽極其博辭章極其麗而正君定國扶世立教根於自然其進言也曰畏天曰愛民曰法祖宗曰務學曰從諫曰進賢退不肖其説經也探聖賢之本㫖別訓詁之是非取正而舍竒尚通而惡鑿以今凖古據舊鑒新皆正心修身齊家治國平天下之要何其多取哉鴻筆麗藻冠於一時有功中興獨當上意如威鳳祥麟斯亦偉矣而自放泉石深入仙城囘縈之中雖萬鍾千駟不與易也一觴一詠興寄事外雖不多賦顧其閒雅澹泊弗琱而工豈營度悲鳴所能幾耶呂本中初名大中字居仁其先東萊人自文靖公始家京師以正獻公恩補假承務郎紹聖間黨事追貶正獻亦奪官元符中復官政和五年調興仁濟陰簿繼為泰州士曹丁母憂吉除大名路撫斡宣和六年除密院編修靖康初遷職方員外郎引嫌除直祕閣主管明道宮紹興初召直言為祠部員外郎尋丐閒除直祕閣主管崇道觀六年召賜進士出身擢起居舍人屢辭不允兼權中書舍人七年四月直龍圖閣知台州尋改崇道觀冬除常少八年拜中舍人旋兼侍講權直學士院史館修撰後忤秦檜言罷提舉太平觀紹興十五年六月卒遷上饒年六十二隆興二年追復敷文待制自少講學即聞父祖至論又與諸君子晨夕相接薰陶常言德無常師主善為師此論最要又謂學者當熟究孝經論語中庸大學然後遍求諸書必有得矣從游楊力叩㣲㫖復造劉安世陳瓘之門請益公之學問端緒深逺葢如此六飛幸呉郡欲進蹕建康公論自古創業中興者必有根本之地以制四方之地必有根本之兵以制四方之兵今所仰以為根本之地者不過兩浙江東福建而已然而諸路凋殘民力已困所仰以為根本之兵者禁衞是也而單弱不可用乞令大臣廣選才畧先求二者之要而力行之苗亘監階州倉草埸以贓獲罪黥之公奏曰近歲官吏犯贓多抵黥罪且既名士人行法之際宜有所避况四方之逺或有枉濫何由盡知若遽施此刑異時察其非辜雖欲深悔亦無及矣又此刑既用臣恐後世不幸姦臣弄權必且借之以及無罪使國家此刑不絶則紹聖以來憸人盗柄縉紳遭此殆無遺類矣願酌處常罰以稱陛下仁厚之意疏再上從之駕幸建康公疏言當今之計必先為恢復事業乃可觀釁而動若但有其志而無其業恐益他患今江南二浙科須實繁閭里告病尤當戒謹倘有水旱乏絶之虞奸究竊發未審何以待之復請於九江鄂渚荆南諸處多宿師旅臨以重臣至如孫氏以來名將皆言西陵建平國之蕃表今二處正在荆峽間當精擇守臣假之權柄以待緩急則江南自守之計差為備矣論任人當別邪正邇來建言用事之臣稍稍各狥私見不主正説元祐紹聖混為一途其意皆有所在若不早察必害政體靖康間公與秦檜同為郎意懽甚秦又公父所薦御史也趙鼎耳熟公名亦大欽鄉之公之眞拜西掖也趙秦適為左右揆論議多不諧秦有專擅之意欲排不附已者公為陳同人于野亨之意當以大同至公圖濟艱難秦不然之又力勸其不可汲用親黨亡幾何除目果下公即奏還之秦諭且令書行卒不聽秦始怨公矣哲宗實錄成趙除特進公行其制曰謂合晉楚之成不若尊王而賤伯秦見此語指為破和議不樂也公繳還制勅甚衆抑僥倖明是非未嘗茍合趙能容多聽從秦皆以為罪遂誣公阿附首台趙鼎去言者希合論公為朋比罷之公去秦之勢張矣公以切直忤柄臣一斥不得復用貧甚人多為公戚而公方且深居講明道要其視摧抑擯棄為士之常初不以介意也公器藴閎厚行誼純篤誠意充積表裹無間與人忠信樂易即之藹然莫見其喜愠平日學問以窮理盡性為本卓然高逺不可企及宋名臣言行錄別集上巻七
