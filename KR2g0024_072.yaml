body:
  text: 宋名臣言行録外集卷十四宋李幼武纂集魏挺之艮齊先生字元履後改掞之字子實然以元履聞也久故稱者莫能易也家建之建陽縣招賢里兩以鄉舉試禮部皆不第閩帥汪應辰建守陳正同薦于朝時相尼之不得召乾道四年詔舉遺逸部刺史芮燁言其行誼特詔徴之賜同進士出身授左迪功郎守太學録後罷為台州教九年閏月卒年五十八淳熙三年追贈宣教郎直祕閣幼有大志少長遊郡庠事胡公憲竒之已而遍從鄉之儒先長者逰間適四方又盡交其先達名士於是聞見日廣而聲稱日益大嘗客衢守章傑家㑹故相趙忠簡薨海上歸葬常山傑雅怨趙公又希秦檜意逮繫其家人劾治甚急人畏其凶虐無敢議者元履獨慨然以書譙傑長揖徑歸傑亦不能害也被召命辭謝不獲則以布衣入見極陳當世之務大要勸上以修德業正人心養士氣為恢復之本上奬嘆開納釋奠于先聖職當分獻先賢之從祀者則先事白宰相王安石父子以邪說亂天下不應祀典河南二程倡明絶學以幸方來其功大請言於上廢安石父子勿祀而追爵二程使從食又言太學之教宜以德行經術為先其次尤當使之通習世務以備官使今一以空言浮說取人非是不聽政事有係安危治亂之機而宰相不能正臺諌侍從不敢言者亦無不抗章盡言以諌至三四上不納則移病杜門以書質責宰相語尤切宰相雅知元履招徠之至是始不能平而元履前已數求去矣遂以寧親豫告於學無不講而尤長於前代治亂廢興存亡之說以及本朝故事之實皆領略通貫識其大者平居論說聽者悚然與人交盡其情然不為茍合長善救失惟恐不及後進有一長必亟稱而力推之位尊望重者茍有不合已意亦面質不避大抵為人最隆於義也平日制行以急病讓夷為心一旦起布衣有列於朝則無隱君父言衆人之所不敢言其比於區區自謀者相去豈止十百而已哉自少時已有志於當世晚而遇主謂可以行其學然其仕不能半嵗而不合以歸間獨喟然嘆曰上恩深厚如此而吾學不至無以感悟報塞吾罪大矣豫告而歸張南軒致書略曰兄抗論切直悚動一時此書亦庶幾不虛矣但非惟善言之不用而遽使直士引去使人重憂歎耳聞太學多士有欲閉何蕃之意亦可見人心所同也晦庵哭之文曰猗歟元履才英氣豪凌空趠逺志節堅髙爰自弱齡聲華秀發事賢友仁其聞四達逮夫中嵗考古驗今訂以經傳益宏益深聞人之善若獲於已推之揚之情曷能已視人之厄若已擠之是振是拔力無有遺婆娑丘林嵗月遲莫聘幣鼎來片言感悟謂當用世遂究厥施誰謂落落乃遄其歸歸來考槃于澗于陸慺慺之忠永矢弗告謂當暫愒尋復詔追誰謂一疾乃訖于斯念昔交誼兄膠我漆更攻互磨兄玉我石世途艱險孟門太行兄行我憂兄歸我藏與兄同心誰則如我奚必梁丘君可亦可兄實髙明卒監此心顧託警勵琅琅其音訶佛詆巫考禮正恪奉承靡他葬又得卜長坂之阿兄所樂游孰云兹今有墳其丘謂我宜銘亦兄所寄行髙文卑祗以為纍日月有時漬綿束芻長慟寢門愧恨何如恭惟神靈尚記疇昔感此哀誠來飲來食蔞翣在門往寧厥宫沒而不朽君子之終張南軒撰君墓表朱晦翁跋曰元履之葬某實銘之其曰事有係安危治亂之機者則曽覿召還之命也時覿勢方盛某竊過憂恐貽異時丘隴之禍故不欲察察言之而敬夫復表其墓亦放此意故常私念使吾亡友盡言之忠不白於後世其咎乃繇於我每竊愧焉其後孝宗因納鄭鑑之言而思元履前所進說顧語執政龔公茂良等歎其直諒將復召而用之則聞其死矣嗟悼久之即下詔曰朝廷不可無直諒之士掞之雖死其以宣教郎直祕閣告其第蓋是時上雖以舊恩遇覿厚然實不及以政事元履自明皆深詆覿者上皆不怒而亟寵褒之無間存沒逺近傳聞感歎興起某且復記贈官事以明孝宗納諌思賢抑制近習之微意深可為後聖法亦幸因得追補志銘之闕庶有以慰元履於地下而自贖其顧望回隱之咎云掞之本以白衣召見天子悅之擢為學官在職未幾數上書論政以至力遏近幸之不當進者遂不自安而告歸以卒上則初未始厭其言也越五年而眷念不忘咨嗟閔悼錫命追榮如此嗚呼偉哉甚盛德也所以感人心而厲臣節為如何耶因書所記并刻于石以答揚先帝之光訓俾彌億萬年不墜于地是則不惟聖子神孫永有觀法而任事之臣有志之士亦得以稱誦道說更相勉勵而益勸於忠讜云晦翁記贈告後劉清之靜春先生字子澄先世臨江人後徙吉之廬陵登紹興二十七年第授袁州宜春簿未上丁父憂服除改嚴州建德簿轉瑞州髙安丞改撫州宜黃宰龔茂良周必大薦于孝宗召對除太常簿丁憂服闋倅鄂州嵗滿諸司薦知常州未上改衡州當路惡之諷言者論罷差主管雲臺觀寧宗嗣位越月起知袁州而已病矣淳熙十六年九月歿享年五十七四五嵗讀李瀚䝉求至龔遂勸農文翁興學誦不絶口父母因語之曰此二君子教人讀書耕田也人亦不過耕與學耳公聞之欣然自是讀書勤甚比長受業於兄蚤夜力學志意自修専以儀刑先世希慕往哲為事博極書傳而不専科舉之習孝宗召對首論民困兵驕大臣退託小臣茍偷數事又言用人四事一曰辨賢否二曰正名實三曰使材能四曰聽換授除太常簿以啓謝諸公有曰有如懷祿希世將恐初心之遂亡倘或獻諛取容何待已知之不厚得守常州擬奏事略曰今日之俗惟知得而忘義詔令一下仕者曰增秩乎士曰免舉乎兵曰受賞乎民曰蠲租乎有是則欣然奉承否則雖有良法美意利國而便人謂之空文視之如無也蓋為治之道有政有教理也義也人心所同謂今世明於理義者為難其人不亦誣乎今日當精擇百官求其明於義理者以為監司為學官為守令為將帥則風俗知義上下一心陛下又與大臣端本清源所以儀刑萬邦者不出於他而舉出於理義將以紹復大業斯無難矣公孝友誠篤質直好義意廣而心和強敏而有立初以進士得官也欲應博學宏詞科及見朱晦翁即盡取所習詞業焚之慨然志於義理之學罷官嚴陵亟至東萊吕公書院講論經義留數月乃去廣漢張公守嚴陵時尚未識公已深知公為人其後書問往復神交心契公天資既髙復從二三君子講學故所造日益超詣而當世巨儒如玉山汪公巽巖李公皆敬慕之公之學以力行切已為務不事空言燕居端坐終日欽欽非翻閲經史則省察性情見義必為無所顧慮訓誘後進唯恐失一士有一善則亟稱而成就之常曰茍志於學而乃唯性理文書是傳是玩嚮善士大夫是扳是慕與向來眩於文章溺於訓詁流於異教者同一轍也且如一言之差在於常情為未害試思是時此心存乎不存一步之違在於常情為未傷試思是時此心定乎不定有志者於容貌顔色詞氣用力如曽子或於視聽言動用力如顔子則先儒之訓簡易明白皆可舉而行誰能禦之與人交推誠懇惻語約理盡見有親者必勉之以孝敬見有子者必勉之以教子為急務見初仕者必勉之以事君澤民為志聞人之善樂道不巳聞人之過慘然如痛在已尤愛惜士類常歎曰介甫不慿注疏欲修聖人之經不慿今之法令欲新天下之法可謂知務苐出於已者反不逮舊故上誤裕陵以至于今後之君子必不安於注疏之學必不局於法令之文此二者既正則人才自出治道自舉書贄晦翁略曰王承告其子毗學之所入者淺體之所安者深間習禮學不如式瞻儀刑諷誦文辭不如親承音㫖某讀此未嘗不慨然太息也學之於人切矣宜乎父子之間見其至情丁寧而不敢忽也始某讀論語得元祐以來諸老先生說以為世徒有此書耳他日有告以今時二三君子之所在者于時坐不安席遂欲起而從之已而不能則有三焉體弱不能徒行貧無僕馬不可以逺適一也位卑身賤有在上者則不可扳而求之二也世道之衰屈身於勢利者不怪一從學士真儒考德而問業則曰是好名者三也云云二三君子不幸已死則無可言者幸而執事者在此有可見之便其又奚說願見蓋十五六年矣語曰經師易遇人師難遭願以素絲之質附近朱藍伏惟誨之某少壯不務學力長大懶拙於義理少所開明又獨立無朋夙夜兢兢而學未加進臨事接物亦多齟齬非時異事殊某未之學耳此學二字向來愚見只說學之為學無與為對言此學則是吾亦自招彼學而與之抗耳故不必言此學若世人不肯明言此學者乃要與外邉鶻突臨時向背耳尚何云學哉晦翁復書曰執事以盛年壯氣清節直道發軔雅途既有聞於當世矣而悅學好問之意勤勤有加又將有意於古人為巳之學者而然耶來書深以異學侵畔為憂自是而憂之則有不勝其憂者惟能於講學體驗處加功使吾胸中洞然無疑則彼自不能為吾疾矣願以聖賢之言反求諸身一一體察須使一一曉然無疑積日既久自當有見但恐用意不精或貪多務廣或得少為足則無由明爾若夫涵養之功則非他人所得與在賢者加之意而已若致知之事則正須朋友講學之助庶有發明不知今者見讀何書作如何玩索與何人辨論惟毋欲速毋蓄疑先後疾徐適當其可則功日進而不窮矣公沒晦翁祭之文曰子澄以樂易之姿躬篤淳之行立志髙雅信道深堅處家庭則孝弟達聞交朋友則信義昭著居間則其講道著書有以樂衆人之所不樂從官則其養民善俗獨能憂衆人之所不憂至於收恤宗黨而接引後來蓋孜孜焉無所不用其至若其樂人之善而矜人之惡又汲汲焉唯恐不盡其誠故賢者與之遊則常幸其有思齊聞過之益不賢者與之處則常病其有明汚招過之羞然世之賢者少而不賢者多是以子澄之得譽寡而蒙毁衆道不得行於一州而遂齎志以沒地也是豈不可為之深悲而痛恨也耶豫以無能蚤結交好切磋之益嵗晚益親然而病不得伸執手之悲沒不得展撫棺之慟聞訃纍月乃能使人病衰而不文言又不足以盡其區區之意引首西望涕泗交流嗚呼子澄其尚能有以知豫之悲也耶或言公在衡州立望祀山川壇晦翁曰而今有司只合奉行朝廷制度士大夫自去創立亦自不便張敬夫亦好如此恐非中庸不敢作禮樂之意宋名臣言行録外集卷十四
