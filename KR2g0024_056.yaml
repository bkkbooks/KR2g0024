body:
  text: 宋名臣言行録别集下卷十一宋李幼武纂集李顯忠忠襄公字君錫綏德青澗人初名世輔高宗改賜今名其先唐諸公子也自唐以來世為蘇尾九族都巡檢使祖孫相承長雄其鄉建炎二年以功補初階稍遷鄜延路兵馬都監充第六將知同州密為恢復計志不就遂奔西夏紹興九年自夏國歸朝授護國軍承宣使龍神衛四廂郡指揮使十年為三京招撫使司前軍都統制兼樞密院都統制十二年除保信軍節度使浙東馬步軍副都總管尋降平海軍承宣使提舉台州崇道觀台州住二十三年復寧國軍節度使殿前司右軍統制次年改選鋒軍統制二十九年除都統制亮渝盟充御前先鋒都統制尋除御前諸軍都統制三十二年授淮西制置使京畿河西淮北壽亳州招討使授太尉主管侍衛馬軍司孝宗登位兼權池州駐劄御前諸軍都統制隆興初兼淮西招撫使自靈壁還責授果州團練副使潭州安置又移撫州嵗餘移信州乾道初召還復容州防禦使尋復隨州觀察使浙東馬步軍副都總管丐祠改提舉台州崇道觀再召除威武軍節度使左金吾衛上將軍六年除侍衛馬軍司七年復太尉九年丐祠提舉江州太平興國宮淳熙四年召除提舉萬壽觀奉朝請五年七月朔薨年六十九贈開府儀同三司隴西郡開國公嘉定二年賜諡公之在母也數日不能娩有僧過門聞之請觀之曰所生乃男子當以刀劒七弓矢鎧甲各一置母左右夜未半雞鳴犬吠乃生也果然公生立於蓐火光燦然一族異之公生而卓異長七尺風神堂堂自幼倜儻有逺略忠壯秩當任子公慨然曰男兒當自立功名於戰陳取富貴何藉門䕃耶公知同州與王世忠號鐵幡竿者令頓遇等潛謀通屬將距渭水共為恢復之計乃遣使臣白彥忠黃士成崔佺以書抵宣撫吳玠冀出兵外應時薩里罕挾貴驕恣過郡邑則擇良家或官吏妻女侍飲不從則隂賊之公常扼腕一日召公計事公疑不利於已稱疾不往薩里罕怒領兵數百人并其首領桀黠者百餘人欲以掩公至則踞坐聽事公使人扶掖見之薩里罕作色誚公公謝以墜馬傷足請犒從者公密戒左右多與之酒使盡醉殺之别館又殺其親兵數百人出伏甲於幕下擒薩里罕縳馬上將以南歸為質謀迎北狩之轅公有恩於州人州人甚愛之見公舉事咸歡呼鼓舞以手加額曰復見趙官家有日矣擁逼出門㑹有人告變捕公者兵刃四合公與親隨崔臯拓跋忠等近百人決圍而出且戰且前由漢村經臨高原撲地河伍交原凡關隘兵悉控扼公每揮戈大呼馳之莫不驚潰公衆憩原上望追騎益多公擁薩里罕謂追者曰追我急即急殺之矣故金騎尾而不逼有勸公殺以絶望者公曰彼衆我寡殺之肯舍我乎雖死無益吾固有所處乃解其縳謂曰欲生耶欲死耶能從我三事我活汝不則殺汝吾以死戰追騎皆非我敵汝嘗見吾戰矣豈誑汝者薩里罕曰公果活我唯公命公於是授之三箭使折以自誓公曰汝國本逺夷大宋優禮厚幣講好修睦而汝國遽墜大信猖狂至此我宋何負焉今還語而主歸我二聖復我疆土繼好息兵免南北生靈無罪被殺一也造謀舉事悉自我出吾家屬洎同州之民無與也汝無遷怒戮及不辜二也吾既舍汝汝無縱兵追我我獲汝必不汝放三也薩里罕聽命唯謹次第折箭且曰如敢背盟有如此箭公麾之使去敵騎得薩里罕即東馳莫敢回顧公始欲擁薩里罕歸朝值洛水泛濫無舟可渡又虜人㑹合諸道軍馬斷南歸之路不得已遂奔夏國公鄉里鄰於夏境夏人服其家世久矣公至夏主甚喜遣翰林學士楊其姓者郊勞禮意良厚楊推誠公亦無隱自兹無彼我之間楊因暇日語及金人自得志於中原恃其强盛每見侵陵亦有并吞之意知公雄傑故深相結納將倚為用有間者自延安來報自公之西金人即飭兵分捕公之家屬二百口無長幼悉遇害公抱終天之痛每念之切齒裂眦恨不即死以復讐天大雪公中夜自挈壺酒過楊楊延之臥內相與對酌因訴父兄遇害甚慘泣數行下屬楊借兵將以復讐楊惻然翌日為公請夏主曰彼能為吾立功固不靳借兵時有豪酋號青靣野乂者有射騎數萬恃勇桀驁要索無厭擾邊十餘年矣夏主患之顧國中無能制之者以是屬公公欣然自任問須兵幾何公曰當以計取得精鋭五百足矣夏主曰此虜未易輕圖與騎三千公命裹糧捲甲晝夜疾驅既逼其境遇行者俘以自隨奄至其穴乃伏騎於旁岡阜間譟其三面虜倉卒惶駭野乂者金冠鐵面具畫如鬼物故號野乂少選野乂持大刀跨馬名赤駝指呼布陳公謂之曰汝徒恃犬羊衆實不勇果勇能與我挑戰乎野乂問公為誰公曰因汝不臣其主汝主有請大國命我伐汝無多言速出戰野乂怒揮刀躍馬而前公豫戒一騎俟我與之交馳從旁過之及鋒未接一騎出焉野乂顧視間公伺隙投鎗徒手捽其背野乂身偃公挾以歸其徒窘蹙散遁伏騎乘之餘衆悉降獻俘之日夏主大悅將妻以女公辭以父喪即日出兵十萬授公乃鼓行而東先是金人既族其家度公必為復讐之舉兼自丙午嵗用兵至是幾及一紀彼既厭兵且為王師敗於兩淮思欲息肩割三京請和知公之在夏未嘗一日忘東向也公軍所至無不望風迎降獨延安閉門拒守公謂之曰吾之此來止求捕害吾親者若得其人吾於延安之人何憾焉已而監軍薛昭者縋城見公云始告捕者蘇常栁仲二人耳俄而有捕二人以獻者公詰之遽服因剖心以祭時敵人既還侵地國家賜赦安集薛因出詔示公公未悉真僞有耿煥者多識與公有舊為公言真詔也公即率所屬南望拜赦郡人安堵公流離僑寄於三國間十有餘年備厯艱險還朝之志萬折必東顧勢未可姑待效見歸報朝廷及三京既還無所用力因說夏人俱南夏人往往懷土公度不可强但取願從者得三千餘人公鄜延部曲數萬衆皆願隨公蓋公在長安被詔止許量帶軍馬前來赴闕又於內揀選三千人時夏國招撫使王樞見公說夏人歸南反謀公歸夏公怒遂擒樞同時領衆歸朝高宗賜對便殿奬諭曰卿忠義歸朝立功顯著燕犒賜賚恩意甚渥時公年三十也金人冦邊朝廷大舉進討劉光世充三京等路宣撫處置使表公為本司前軍都統制上以宸翰賜公曰卿將所部與張俊㑹合如立竒功與卿建節諸將㑹淮西戰於拓臯烏珠大敗公追至孔城獲耄倪之被虜者以萬計公生西邊長遊隴蜀梁宋間熟悉敵情至山川險易兵馬强弱如指掌因上恢復之策於朝時當軸者方主和議慮公矛盾其事降平海軍承宣使公居丹丘從容暇豫與參政錢端禮賀允中兩府曹勛郡守蕭振日為棋酒之樂徜徉於泉石間無廢間色時岩壑朱敦儒亦居是邦羣公每有勝政朱必以詩詞紀之時金使言公私遣人過界詔令分折㑹公上恢復之策秦檜怒乃奏顯忠不遵禀聞奏止用申狀遂降官奉祠台州居住金人擾境公以池州都統移軍舒城除禦營先鋒都統制候騎報賊東京郭副留韓將軍兵萬人渡淮公領趙康年曹髙麥韋永壽劉彪等與敵戰於大人洲首挫其鋒乘勝捲擊過淮敵軍溺死者千餘人俘降甚衆復還舒城入合淝又携張師顏馬司精鋭由安豐花壓鎮取順昌公先聲所暨城中震悚至則拔之擒王千戶等俘降數千人又遣曹高麥分兵襲蒙城擒劉承德而還後亮親擁兵犯淮西朝廷命建康都統王權拒於合淝權退保和州竟失守有詔命公駐軍蕪湖以扼裕溪口之衝尋報權棄軍渡江人情洶懼督府被㫖罷權兵柄檄公㑹軍采石始權失律也時雍國虞允文參贊督府訪權所以敗之實其軍咸詆權失且曰非我輩不戰之罪亦非金之善勝蓋權望風先遁我輩何能自振虞公曰朝廷已令李將軍交此軍爾謂如何衆合辭云用李公則我輩有所賴公於是領權軍亮至揚林瞰江築高臺植二黃旗中張黃蓋亮躬擐金甲執小紅旗麾軍恃衆以為江可渡也公即措畫依山列馬步軍成陳五分戈船以其二泊於東西兩岸其一泊中流藏其二於蘆洲港中伏之賊麾戰艦渡江呼聲振天地賊舟及岸敵漸登陸遣時俊王琪盛新戴臯張振張榮逆擊之我師鼓勇一以當十俘斬之餘降者甚衆又疾遣戈船併進以神臂尅敵弓射之中者洞貫敵溺水死者不可勝計賊於是退遁向者港中所匿戈船出斷其後奪賊船二十餘艘繼以輕舸縱火焚其戰艦火光蔽日烟熖徹天亮既敗公遂募軍校抵亮所諭之曰今管軍非王權乃曩時擒撒離喝李世輔汝衆逼江將何為曷若稍却容我渡軍為一戰決勝負今汝臨水而陳是不欲戰也亮聞之走淮東尚留精兵於和為後拒公分兵絶江陳於和之城下賊出迎敵公身先將士殊死戰賊敗走入城我軍躡之賊縱火公領軍塗甲冒火而進遂復和州公又遣章永壽頓遇趙宣李宗正等襲至香林塘追擊大破之又分遣將校於蜀山假寨以來邀擊虜衆所向無不克捷公伺得亮將犯京口乃遣戈船令戰士踏車左右岢峩巨艦舳艫相銜掀舞於湍流駭浪中逆折下上勢若遊龍諸酋憑壘觀之莫不喪氣亮乃作僞詔遣校尉張干秩拿舟來諭王權謂亮提兵過瓜洲似與權有先約雍公與公議公曰此其用間耳然亦當以朝廷已罪王權之事答之庶絶其冀望雍公以為然遂作檄曰昨王權望風退舍使汝鴟張至此朝廷已將權重置典憲今統兵乃李世輔也汝豈不知其名若往瓜洲渡江我固有以相待無虛言見訹但備一戰以決雌雄可也遣所獲女真二人賫往亮得書大怒數諸酋不用命致楊林之敗將斬之諸酋哀懇久之曰姑赦汝旦日各備戰艦百艘約五日必絶江違令者死諸酋退自計曰南人用李世輔統兵為備甚固我輩進必敗退則誅進退等死死中求生可乎遂殺亮亮斃詔班師以功擢侍衛馬司諸子得對便殿各賜金帶孝宗登極公陛對論用兵大計稱㫖蒙玉音奬諭賜田七十頃明年擢領殿岩㑹都督張浚自任恢復之責以招撫使命公節制殿前馬司及池州駐劄御前諸軍由淮西而進建康都統邵宏淵為之副建康鎮江駐劄御前諸軍及步司軍馬𨽻焉進自淮東公即禡牙建斾誓衆啓行五月渡淮僞都統蕭琦領兵拒戰於陡溝張左翼公指謂諸將曰此所謂拐子馬敵之長技也張榮請為先鋒公授以方略一鼓而敵騎奔潰公進軍距靈璧才數里蕭陳以待公遣時俊員琦率兵擊之張師顏等繼進良久公遣曹高麥等以千騎橫衝賊軍又遣李舜舉領白旗子策之蕭大敗轉城西遁靈璧城中步卒洎僞官相繼出降遂復靈璧初邵宏淵取虹縣公取靈璧然後併兵而西公剋期得靈璧矣聞邵猶攻虹縣未下戊戌公領輕騎東趨虹縣遣靈璧降人入城諭以禍福曰汝逃則無所戰則不敵能死決戰不然速降猶保首領城破必殺無赦頃之大周仁踰城詣軍前曰我等素聞李威名餘則不知也今願以城降邵之圍虹縣也凡數日不能下及公至始降邵以功不自已出嫌隙始萌公趨卲奏捷邵曰賊降相公耳公曰此來本為國事將此功與公奏捷願無疑也邵終怏怏乃曰今收復兩城功已顯著請從此回軍以全功賞公言男師廉師顏與都統男世雄同得聖訓令到南京然後取㫖今大軍入境才得二邑以為何辭而遽回軍萬一搖動衆心有誤大計邵愈不協乃與其徒唱言虜且大至吾屬虜矣公曰今軍勢方張正當仰遵聖訓復占地以慰中原來蘇之望遂軍靈璧癸卯蕭琦領家屬降公於靜安鎮公待以禮命將官吳溫館伴甲辰公軍傳於宿州城東公軍自入境秋毫不擾所至壺漿接踵人情翕然咸謂復見天日於是盡得虛實是日邵軍亦至始合戰於城南大王湖自旦至晡凡數十陳虜軍敗北殺萬餘人其大漢軍釋甲棄仗稽顙乞降者亦萬數乙已公閉營休士邵與張訓通王存皆言軍止有來早一食且乏攻具以何攻城不若還軍靈璧就糧而歸公曰所以約賫軍食者正欲宿州就糧耳令諸軍破城早飯邵衆竊笑公遂申嚴賞罰率厲將士翌日丙午曉色未分不施攻具士卒坎城爭先而上即開門進軍與城內賊軍巷戰公麾軍蕩擊之遂收復宿州破賊而食果如公言邵軍尚未越濠遂遣撥發官王儀等屢往督促邵始渡濠登城郡帑金帛即追庫務官吏對宏淵等按簿籍僅得十萬緡米斛半之公盡以犒軍使劉持攝州事用郡人所舉也先是都督魏公移書於公曰昨陛辭日面奉聖訓車馬渡淮即令邵侯聽公節制仍令具知禀守待繳奏邵殊不樂至是復以公移軍分節制邵益銜公殆不可與共功矣僞元帥巴薩領兵來自南京號十萬合宿州散卒大戰於城南兩軍殺伐相當是日統制李福輒離陳數里匿於櫻桃園適督府察視虛實者見之為公言又李保棄其軍號隱避不戰公召福保對諸將詰其罪二人伏辜遂斬之公與邵議曰虜既數敗諸公以謂進兵如何邵曰今得宿州虜雖敗走必以重兵拒我於南京公曰虜又敗當如何邵曰洪州必有虜兵又曰聞虜己召陜西諸路軍馬㑹於東京必來大戰公笑謂邵曰不然今虜數為王師所敗其心固怯我師乘破竹之勢南京之兵吾勝之必矣然後取徐州徐州有糧八十萬吾得徐州則軍食足乃可休士傳檄山東蓋山東吾向知亳州嘗以恩結其人頗見信重聞吾提兵之來山東必響應則不勞而下也山東既下可以重賞募土豪數萬為前驅王師繼之則河南故地指日可復雖陜西兵至道路遙逺人馬疲困吾以逸待勞戰必勝矣况陜西之兵皆吾鄉里部曲必不為虜用此吾萬全之策也邵雖心伏其謀以歸心之切終不以為然辛亥遲明親援抱鼓激勵士衆戰酣公免胄躍馬揮戈所向披靡孛撒退却者三虜大敗西走時宏淵擁兵坐視且與其將佐宣言曰當此盛夏搖扇於清涼猶且畏熱况烈日中披甲苦戰人何以堪衆心遂搖無鬬志矣壬子夜忽鼓譟公遣騎覘之曰建康中軍統制周宏及邵都統世雄陽為虜劫寨自遁黎明馬軍去幾盡癸丑督府命移軍入城虜謂我怯乃率餘兵攻南城又分兵潛攻東北城陷虜兵已登陴公親揮巨斧手殺數千百人將士爭奮擊虜下城虜兵攻南城者斃於櫑木矢石積尸齊羊馬牆濠水盡赤虜既數敗苦熱乏食咸已逺遁乃揚言陜西兵二十萬將至邵衆既扇於前及聞此士心益不固公曉之曰始吾奄至出其不意入境半月而南兵之救方來陜西去幾里而能遽至是耶若以盛夏不可興師周宣王六月北伐諸葛亮五月渡瀘自古豈自盛夏而成功者乎此特虜見怖而走止吾追兵耳姑留三日觀之於是有中公以飛語者曰是欲降敵耳不然盍去至曉一城恟恟公度不可遏乃歎曰天未欲平中原耶而沮撓若此㑹勑書至有見可而進勿墮虜計之語公遂整軍而歸公自提軍渡淮首尾二十日與强敵七戰七克連拔三城降金右翼都統蕭琦萬戶富察特默國戚同知大周仁三百戶百人長及王甲等破宿州斬瑪延萬戶拉雅千戶城內外殺死并捉到畨賊及當陳殺死左翼都統前後降到并纍殺死虜衆共四萬餘人於是軍聲大振士卒咸有吞敵之氣大軍所至秋毫無犯是以中原之民日望王師之來以為內應公所統軍馬連日接戰傷折不過千人諸司自有實籍可見公提大軍渡淮入賊之境不備芻糧就敵糧草至於首先登城巷戰立功傷中將士亦是就宿州府庫金銀錢帛以充激賞且宿州之役係國家恢復大計旬日間連下三城殺降數萬虜衆奔北不暇賊所起山東河北簽軍皆欲內叛相應賊勢危亡指日可待不幸宏淵等自棄大功怯戰退走誤國大事更相鼓唱張大虜勢復以退師為是公還至盱眙見魏公納印待罪唯歸過於已不復自明俟命於建康除醴泉觀使奉朝請趨召赴闕奏事中途得㫖責授果州團練副使安置長沙居九月上知符離之役特以邵不協故過不在公移撫州嵗餘又移信州公一日對於選德殿上愛其姿貌魁傑命寫真閣下越明年按視營屯還敷奏深合上意復太尉録前功也未幾引兵丐祠居㑹稽嵗賜米三千石閲五年上思之詔奉朝請中使勞問江津賜銀合茶藥入見上撫存甚渥繼又出內帑金賜之公智勇根於天性自其兒時無他好與鄉里同輩惟以馳射為戲不舍晝夜夜則對燭二燈人挾一矢射之中者使不中者負而返公常十中八九一日行壽春道中馬忽辟易有虎自林間躍出公背發一矢中口貫頷於地後騎爭以戈斃之公之用兵竒智百出以勇果濟之故先計後戰卒如所料適大敵餘人奪氣公方優游甚暇屢以少擊衆取勝御軍嚴肅令使必行諸子有從軍者臨敵公常戒之曰汝曹無恃我故不用命軍有常刑必不汝私於是諸子奮勇先登皆立竒功公雖不喜文飾然前代治亂近時得失亹亹言之使人聽之不倦議論切中於事情人所不逮靖康間公遨遊三國萬死來歸忠烈昭然上貫白日及敗兀术於拓臯挫逆亮於采石西取順昌北復符離雖志不就亦足暴白於世矣公逮啓手足呼門人諸子謂之曰吾束髮從軍及壯為將殺伐不為不多然未嘗以私憾戮一人今年已七十官至二府行矣無纎毫纍所不獲者國恩未報大讐未復耳且囑諸子曰汝曹當竭節盡忠以追繼吾志則吾死瞑目矣且口占遺表之意言竟寂然而逝宋名臣言行録别集下卷十一
