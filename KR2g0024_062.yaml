body:
  text: 宋名臣言行録外集卷四宋李幼武纂集張載橫渠先生明公字子厚先世大梁人後寓鳳翔嘉祐二年登進士第為祁州法遷丹州雲巖縣令除渭州僉判熙寧二年冬被召除崇文校書明年移疾歸十年春復召還同知太常禮院議禮不合復以疾歸卒年五十八少孤無所不學喜談兵當康定用兵時年十八慨然以功名自許上書謁范文正公一見知其逺器欲成就之責之曰儒者自有名教可樂何事於兵因觀讀中庸先生讀其書雖愛之猶未以為是也又訪諸釋老之書反求之六經嘉祐初見二程於京師共語道學先生涣然自信曰吾道自足何事旁求乃盡棄異學淳如也吕與叔作行狀一作盡棄其學學焉尹焞言之伊川曰表叔平生議論謂頥兄弟有同處則可若謂學於頥兄弟無是事頃年屬與叔刪去之不謂尚存幾於無忌憚矣尹焞云先生昔在京座虎皮說易聽從甚衆一夕二程至論易次日先生撤去虎皮曰吾平日為諸公說者皆亂道有二程近到深明易道吾所弗及汝輩可師之在雲巖政先敦本善俗知京兆王公樂道延致郡學先生教人以德語學者孰能少置意科舉相從於堯舜之域聞法語亦多從之者神宗即位二年吕晦叔薦之曰張某學有本原西方之學者皆宗之上即命召見上問治道皆以漸復三代為對他日見執政語之曰新政之更懼不能任事求助於子何如先生曰朝廷將大有為天下士願與下風若與人為善則孰敢不盡如教玉人追琢則人亦故有不能執政默然所語多不合寖不悅命校書崇文辭復按獄浙東或曰張某以道德進不宜使之治獄執政曰淑問如臯陶猶獻囚此何傷獄成還朝㑹弟天褀以言得罪先生益不安乃謁告西歸歸居於橫渠故居終日危坐一室左右簡編俯而讀仰而思有得則記之或中夜起坐取燭以書其志道精思未始須臾息亦未始須臾忘也學者有問多告以知禮成性變化氣質之道學必如聖人而後已聞者莫不動心有自得之者窮神化一天人立大本斥異學自孟子以來未之有也嘗謂門人曰吾學既得於心則修其辭命辭命無差然後斷事斷事無失吾乃沛然精義入神者豫而已矣熙寧九年秋集所立言謂之正䝉出示門人曰此書豫厯年致思之所得其言殆與前聖合大要發端示人而已其觸類廣之則吾將有待於學者正如老木一株枝别固多所少者潤澤華葉耳慨然有意三代之治論治人先務未始不以經界為急講求法制粲然備具要之可以行於今如有用者舉而措之耳嘗曰仁政必自經界始方與學者議古之法共買田一方畫為數井推先王之遺法明當今之可行皆有志未就公去朝築室南山下敝衣蔬食専精治學以知人而不知天為賢人而不為聖人自秦漢以降學者之大弊也故其學尊禮貴德安命樂天時以為難公持論不變也先生氣質剛毅德盛貌嚴然與人居久而日親其治家接物大要正已以感人人未之信反躬自治不以語人雖未有諭安行而無悔故識與不識聞風而畏聞人之善喜見顔色答問學者雖多不倦有不能者未嘗不開其端有可語者必丁寧以誨之惟恐其成就之晚再移疾西歸過洛見二程曰某病不起尚可及長安也行至臨潼沐浴更衣而寢及旦視之亡矣公卒門人欲諡為明誠中子以質明道明道以問溫公溫公復書曰子厚平生用心欲率今世之人復三代之禮郊特牲曰古者生無爵死無諡爵謂大夫以上也檀弓記禮所由失以謂士之有誄自孫賁父始子厚官比諸侯之大夫則宜諡矣然曾子問曰賤不誄貴幼不誄長禮也唯天子稱天以誄之諸侯相誄猶為非禮況弟子而誄其師乎孔子沒哀公誄之不聞弟子復為之諡也今諸君欲諡子厚恐不合於古禮非子厚之志與其以陳文範陶靖節王文中孟貞曜為比其尊之也曷若以孔子為比乎明道詩哭之曰歎息斯文約共修如何夫子便長休東山無復蒼生望西土誰供後學求千古聲名聨棣蕚二年零落去山丘寢門慟哭知何恨豈獨交親念舊遊朱晦翁贊之曰蚤悅孫吳晚逃佛老勇撤臯比一變至道精思力踐妙契疾書訂頑之訓示我廣居先生言書多閲而好忘者只為義理未精耳理精則須記了無去處也仲尼一以貫之蓋只著一義理都貫却學者但養心識明靜自然可見死生存亡皆知所從來胸中瑩然無疑止此理爾孔子言未知生焉知死只略言之死之事只生是也更無别理富貴之得不得天也至於道德則在已求之而無不得者也學者不可謂少年自緩便是四十五十二程從十四嵗時便鋭然欲學聖人今盡及四十未能及顔閔之徒小程可如顔子然恐未如顔之無我謂范巽之曰吾輩不及古人病源何在范請問答曰此非難悟設此語者蓋欲學者存意之不忘庶遊心寖熟有一日脫然如大寐之得醒耳朱子云橫渠此意正要學者將此題目時時省察使之積久貫熟而自得之耳非謂只要如此說殺也又言義理有疑即濯去舊見以來新意朱曰此說甚當最有理若不濯去舊見何處得新意來今學者有二種病一是主自家意思一是舊有先入之說雖欲擺脫亦被他自來相尋曰讀書少則無由考校得義精蓋書以維持此心一時放下則一時德性有懈讀書則此心常在不讀書則終看義理不見書須成誦精思多在夜中或靜坐得之不記則思不起但通貫得大原後書亦易記所以觀書者釋已之疑明已之未達每見每加新益則學易進矣於不疑處有疑方是進朱曰近覺先生成誦之說最為捷徑蓋未論看得義理如何且是收得此心有歸著處不至走作然亦須是専一精研使一書通透爛熟都無記不起處方可别換一書乃為有益又曰言有教動有法晝有為宵有得瞬有養息有存朱曰此語極好君子終日乾乾不可食息間亦不必終日讀書或靜坐存養亦是天地之生物以四時運動春生夏長同是不息及至秋冬凋落亦只藏於其中故明年復生若使至秋冬已絶則來春無緣復有生意學者常喚令此心不死則日有進曰為天地立心為生民立極為前聖繼絶學為萬世開太平朱曰此道自孟子後千有餘嵗若天不欲此道復明則不使今人有知者既使人有知者則必有復明之理此皆先生以道自任之意明道曰子厚以禮教學者最善使學者先有所据守子厚賦髙才其學更先從雜博中來伊川曰子厚謹嚴才謹嚴便有迫切氣象無寬舒之氣上蔡云橫渠嘗言吾十五年學個恭而安不成明道曰可知是有多少病在又云橫渠教人以禮為先大要欲得正容謹節意謂世人汙漫無守便當以禮為地教他人就上面做功夫然其門人下稍頭溺於刑名度數之間行得來因無所見處如喫木札相似更沒滋味遂生厭倦故其學無傳之者明道嘗與橫渠在興國寺講論終日而曰不知舊日曽有甚人於此處講此事先生銘其書室之兩牖東曰砭愚西曰訂頑伊川曰是起爭端不若止曰東西銘明道曰西銘某得此意只是須得子厚如此筆力他人無緣做得孟子已後未有人及此得此文字省多少言語要之仁孝之理備於此須臾而不於此則便不仁不孝也西銘原道之宗祖自孟子後未見此書觀西銘能養浩然之氣者游酢得西銘讀之即涣然不逆於心曰此中庸之理也能求之語言之外者也又論𢎞毅曰西銘言𢎞之道訂頑之言極純無雜秦漢學者所未到伊川語訂頑意極完備乃仁之體也學者體此意令有諸已其地位已髙到此地位自别有見處不可窮髙極逺恐於道無補也訂頑立心便達天德問西銘如何伊川曰此橫渠文之粹者也曰充得盡時如何曰聖人也橫渠能充盡否曰言有多端有有德之言有造道之言有德之言說自已事如聖人言聖人事也造道之言則智足以知此如賢人說聖人事也橫渠道儘髙言儘醇自孟子後儒者都無他見識楊時致伊川書曰西銘言體而不及用恐其流遂至於兼愛伊川答之曰橫渠之言誠有過者乃在正䝉西銘推理以存義廣前聖所未發與性善養氣之論同功豈墨氏之比哉西銘明理一而分殊墨氏則二本而無分分殊之弊私間而失仁無分之罪兼愛而無義分立而推理一以止私勝之流仁之方也無别而迷兼愛以至於無父之極義之賊也子比而同之過矣且彼欲使人推而行之本為用也反謂不及不亦異乎伊川答先生書曰所論大槩有苦心極力之象而無寬裕溫柔之氣非明睿所照而考索至此故意屢偏而言多窒小出入時有之明所照者如目所覩纎微盡識之矣考索至者如揣料於物約見倣佛耳能無差乎更望完養思慮涵泳義理他日自當條暢南軒與朱子書曰西銘近日常讀理一分殊之指龜山後書終未之得蓋斯銘之作政為學者私勝之流昧夫天理之本然故推明理一以極其用而其分之殊自不可亂蓋如以民為同胞謂尊髙年為老其老慈孤幼為幼其幼是推其理一而其分固自在也故曰分立而推理以止私勝之流仁之方也龜山以無事乎推為理一引聖人老者安之少者懷之為說恐未知西銘推理一之指也朱子答曰天地之間理一而已然乾道成男坤道成女二氣交感化生萬物則其大小之分親疏之等至於十百千萬而不能齊也不有聖賢者出孰能合其異而反其同哉西銘之作意蓋如此程子以為明理一而分殊可謂一言而蔽之矣蓋以乾為父坤為母有生之類無物不然所謂理一也而人物之生血脈之屬各親其親各子其子則其分亦安得而不殊哉一統而萬殊則雖天下一家中國一人而不流於兼愛之蔽萬殊而一貫則雖親疏異情貴賤異等而不梏於為我之私此西銘之大指也觀其推親親之厚以大無我之公因事親之誠以明事天之道蓋無適而非所謂分立而推理一者夫豈専以民吾同胞長長幼幼為理一而必默識於言意之表然後知其分之殊哉且所謂稱物平施者正謂稱物之宜以平吾之施云爾若無稱物之義則亦何以知夫所施之平哉龜山第二書蓋欲發明此意然言不盡而理有餘也故愚得因其說而遂言之朱曰熹既為西銘解後得尹氏書云楊中立答伊川論西銘書有釋然無惑之語伊川讀之曰楊時也未釋然乃知此論所疑第一書之說伊川蓋亦未之許也龜山語録有曰西銘理一而分殊知其理一所以為仁知其分殊所以為義所謂分殊猶孟子言親親而仁民仁民而愛物其分不同故所施不能無差等耳或曰如是則體用果離而二矣曰用未嘗離體也以人觀之四肢百骸具於一身者體也至其用處則首不可以加屨足不可以納冠蓋即體而言分已在其中矣此論分别異同合有歸趣大非答書之比豈其年髙德盛而所見始益精歟因復表而出之以明答書之說誠有未釋然者而龜山所見蓋不終於此而已也問西銘曰更須仔細看他說理一而分殊而今道天地不是父母父母不是天地不得分明是一理乾道成男坤道成女則凡天下之男皆乾之氣凡天下之女皆坤之氣從這理便徹上徹下都便是一個氣下並朱子語西銘自首至末皆是理一分殊乾父坤母固是一理分而言之便見乾坤自乾坤父母自父母問自惡㫖酒至勇於從而順令此六聖賢事可見理一分殊乎曰惡㫖酒育英材是事天顧養及錫類則是事親每一句皆存兩義推類可見問天地之塞如何是塞曰塞與帥字皆張子用字之妙處塞乃孟子塞天地之間體乃孟子氣體之充者有一毫不滿不足之處則非塞矣帥即志氣之帥而有主宰之意西銘一篇正在天地之塞吾其體天地之帥吾其性兩句乾為父坤為母便是理一而分殊豫兹藐焉混然中處便是分殊而理一西銘有個劈下來底道理有個橫截斷底道理竊意當時語意似謂每句直下而觀則事天事親之理皆在焉全篇中斷而觀之則上専是事天下専是事親各有攸屬問向日曽以西銘仁孝之理請問䝉令截斷橫看後來見得孝是發見之先仁是天德之全事親如事天即是孝自此推之事天如事親即仁矣老吾老幼吾幼自老老幼幼之心推之至於疲癃殘疾皆如兄弟顛連而無告乃始盡故以敬親之心不欺暗室不愧屋漏以敬其天以愛親之心樂天循理無所不順以安其天方始謂之性竊意橫渠大意只是如此不知是否曰他不是說孝是將孝來形容這仁事親底道理便是事天底樣子人且逐日自把身心來體察一遍便見得吾身便是天地之塞吾性便是天地之帥許多人物生於天地之間同此一氣同此一性便是吾兄弟黨與大小等級之不同便是親疏逺近之分故敬天當如敬親戰戰兢兢無所不至愛天當如愛親無所不順天之生我安頓得好令我富貴崇髙便如父母愛我當喜而不忘安頓得不好令我貧賤憂戚便如父母欲成就我當勞而不怨或曰先生謂事親是事天底樣子說盡西銘之意矣知化則善述其事窮神則善繼其志這志便只是那天地帥吾其性底志為人子便要述得父之事繼得父之志如此方是事親如事天便要述得天之事繼得天之志方是事天若是違了此道理便是天之悖德之子若害了這仁便是天之賊子若思濟惡不悛便是天之不才之子若能踐形便是天地克肖之子這意思血脈都是從天地之塞吾其體天地之帥吾其性說緊要都是這兩句若不是這兩句則天自是天我自是我有何干涉吾其體吾其性有我去承當之理問潁封人之錫類申生其恭二子皆不能無失處豈能盡得孝道曰西銘本不是說孝只是說事天但推事親之心以事天耳二子就此處論之誠是如此蓋事親却未免有失處若天道純然則無失之處只是推此心以奉事之耳問無逃而待烹申生未盡子道何故取之曰天不到得似獻公也人有妄天則無妄若教自家死便是理合如此只得聽受之問西銘只是仁孝繼志述事曰是以父母比乾坤主意不是說孝只是以人所易曉者明其所難曉者耳問西銘専為理言不為分設曰西銘書橫渠所以示人至為深切而伊川又以理一分殊贊之言雖至約而理則無餘矣蓋乾之為父坤之為母所謂理一者也然乾坤者天下之父母也父母者一身之父母則其分不得不殊矣故以民為同胞物為吾與者自其天下之父母者言之所謂理一者也然謂之民則非真以為吾之同胞謂之物則非真以為我之同類矣此自其一身之父母者言之所謂分殊者也又以其曰同胞曰吾與曰宗子曰家相曰老曰幼曰聖曰賢曰顛連而無告則於其間又有如是等差之殊哉但其所謂理一者貫乎分殊之中而未始相離耳此天地自然古今不易之理夫子始發明之非一時救弊之言姑以強此而弱彼也問西銘止以假塗非終身之學曰西銘之言指吾體性之所自來以明父乾母坤之實極樂天踐形窮神知化之妙以至於無一行之不慊而沒身焉故伊川以為充得盡時便是聖人恐非専為學者一時所見而發也問龜山語録曰西銘理一為仁分殊為義曰仁只是流出來底便是仁各自成一個物事底便自義仁只是那流行處義只是那當做處西銘理一而分殊不是伊川說破也難理㑹並朱子語橫渠著正䝉時處處置筆硯得意即書明道云子厚却如此不熟上蔡語録問橫渠曰由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名曰本只是一個太虛漸漸細分說得密耳太虛便是這四者之總體而不雜乎四者而言由氣化有道之名氣化是那隂陽造化四時寒暑晝夜雨露霜雪山川木石金水火土皆是這個便是那太虛只是便雜却氣化說雖氣化而實不離乎太虛未說到人物各具當然之處朱子語問太虛便是太極圖上面底圓圈氣便是圓圈裏隂陽靜動否曰然又曰合虛與氣有性之名有這氣道理便隨在裏面無此氣則道理無安頓處如水中月須是有此水方映得那天上月若無此水終無此月也心之知覺又是那氣之虛虛底聰明視聽作為運用皆是有這知覺方運用得道理所以橫渠說人能𢎞道是心能盡性非道𢎞人是性不知檢心論正䝉說道體處如太和太虛虛空云者正是說氣說聚散處其流乃是個大輪回蓋其思慮考索所至非性分自然之知若語道理惟周子說無極而太極最好如由太虛有天之名由氣化有道之名合虛與氣有性之名合性與知覺有心之名亦說得有理由氣化有道之名如所謂率性之謂道是也然使明道形容此理必不如此說伊川所謂橫渠之言誠有過者乃在正䝉以清虛一大為萬物之原有未安等語槩可見矣又曰虛是說理橫渠之言大率有未瑩處有心則自有知覺又何合性與知覺之有問說太和所謂道一段考索許多亦好其後乃云不如野馬紛紛不足謂之太和却說倒了曰彼以太和狀道體與發而中節之和何異問正䝉中說得有病處還是他命辭不出有差還是見得差曰他是見得差正䝉是窮盡萬物之理熹自十四五時讀程張書至今四十餘年但覺其義之深指之逺而近世紛紛所謂文章議論者殆不足復過眼信乎孟氏以來一人而已然非用力之深者亦無以信其必然也舊嘗擇其言之近者别為一書名近思録云問橫渠似孟子否曰橫渠嚴密孟子宏闊橫渠之學是苦心得之乃是致曲問孟子平正橫渠髙處太髙僻處太僻曰是橫渠用工親切程氏規模廣大學者用工要當如此也橫渠之於程子猶伯夷伊尹之於孔子並朱子語張戩字天褀橫渠之弟登進士第調陜州閿縣簿移鳳翔普潤縣令改知懷安軍金堂縣轉太博熙寧二年為御史裏行明年出知公安縣改夏縣監鳳翔司竹監九年卒年四十七知金堂誠心愛人既去而人思之熙寧初以御史召進對未嘗不以堯舜三代之事進于上前惻怛之愛無所遷避大要啓君心進有德謂反經正本當自朝廷始王安石變法公上疏論非是乞罷條例司及追還常平使者不報并劾曽公亮陳升之趙抃依違不能救正韓綘代陳升之領條例司公言絳左右狥從王安石與為死黨遂參政柄李定諂佞自幕官擢臺職陛下惟安石是信今輔以絳之詭隨臺臣又得李定之比繼繼其來芽蘖浸盛臣豈敢愛死而不言哉又言吕惠卿刻薄辨急假經術以文飾姦言附㑹安石惑誤聖聽不宜勸講君側章十數上最後言今大惡未去橫斂未除不正之司尚存無名之使方授臣今更不敢赴臺供職又詣中書爭之聲色俱厲公亮俯首不答安石以扇掩面而笑公曰某之狂直宜為參政所笑天下之人笑參政亦不少矣日録云公為裏行請罷條例司因詣中書極陳其事辭氣甚厲介甫以扇掩面而笑公怒曰參政笑戩戩亦笑參政所為事耳豈惟戩笑天下誰不笑之者嘗與介甫爭辨因舉經語為證介甫曰安石却不㑹讀書賢却㑹讀書公不能答伊川曰却不向道只這個便是不㑹讀書遺書公篤實寬裕儼然正色雖喜愠不見於容然與人居溫厚之意久而益親終日言未嘗及於利樂道人之善而不及其惡樂進已之德而不事無益之言其清不以能病人其和不以物奪志常雞鳴而起勉勉矯強任道力行每若不及德大容物沛若有餘常自省小過差必語人曰我知之矣公等察之後此不復為矣橫渠嘗語人曰吾弟德性之美吾有所不如其不自假而勇於不屈在孔門之列宜與子夏相後先伊川云天祺有自然德氣似個貴人氣象只是却有氣短處規規太以事為重傷於周至却是氣局小宋名臣言行録外集卷四
