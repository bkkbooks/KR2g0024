body:
  text: 宋名臣言行録續集卷四宋李幼武纂集歐陽珣字全美吉之永和人中崇寧五年進士乙科授忠州教知杭州鹽官罷起授南安録靖康初如京師遇國難議割地力爭忤時相命出使河朔進秩朝請郎將作監丞至深州猶力爭金怒殺之紹興中録其節子夭官其壻臨江曾敏恭靖康初朝廷議割三鎮地公率其黨九人上書曰地不可割越一日集議何㮚而下三十六人無異辭公廷爭謂割地奉金非䇿且曰金志不在地願力戰戰敗而失其地他日我師取之直舉以與之他日我師取之曲時宰懷諼迷國反白遣公蒞割河朔地㑹深州等郡義不肯臣金皆固守不下金人以公至城下俾致朝命公慟哭謂城上人曰朝廷為姦臣所誤汝等勉為忠義以報國吾不愛一死以謝朝廷金人怒執公送燕山遂死之初公詣闕欲論事時蓋靖康元年之冬金勢方張甚公道出豫章㑹故人為帥惎公姑勿行行且及禍公歎曰吾平生患不得死所國蹙如此而謀國者日益鄙吾將有所開說說不合而死是吾得死所矣庸可避既被命赴金軍即取告身文書畀同年生戴特立曰持此歸報吾家吾不生還矣遂行三松王才臣曰公之死難真舍生取義仗大節寧死不折者所謂英雄豪傑之士可以為事君之法也觀其與故人帥及同年生之言其不肯折節以茍生蓋素所蓄積非偶然一決之諒也豫嘗論女真諸逆酋其用兵行師未必得與劉淵石勒比而吾國又帖然無典午氏內阻外訌之警顧乃長驅直鶩莫或齟齬之者吾國空無人焉耳方金兵南牧河朔諸郡人自為守金貪利不顧絶黃河懸師深入以犯京師此兵家之所忌也當是時使得竒男子假朝廷一節糾合燕趙義附之士據險出竒以躡其後使彼懷反顧之憂此一竒也奈何反先割地以肉飼虎耶此豫因公之事拊膺扼腕痛悼于已往也從孫文龍建公祠堂守道記之曰靖康建炎間廬陵郡死國事者二人監丞陽公死燕山忠襄楊公死金陵死一爾有二焉楊公死城歐陽公死使命有謂余曰歐陽公誠死使命與致命于敵國不我從則死之義也公之往也吾國則有辭矣勢焰方熾京師方急三鎮雖天下根本不敢愛也以是紓禍且為後圖公奉命割地可也既至深軍民固守不下公知人心未解即反其辭告之曰朝廷為姦臣誤至此若等宜忠義報國吾已辦一死矣金人怒執殺之此之謂違使命以死非死使命也義歟余曰公得死尚何言當崇殿之間淵聖非決有棄地意公亦力言不可且謂戰敗而失其地他日我師取之直舉以與之他日我師取之曲時宰既詆其說又強以行大類漢遣狄山乘障事事不出武帝而出張湯耳使公竟致使命不死矣而豈公夙心哉當其慷慨城下痛哭以勉守者但見有吾心不見有使命非違使命也此時宰之命非君父之命此君父之命非宗廟社稷之命也臣受命于君君受命于宗廟社稷揚揚出疆舉地以與人曰有使命在吾為宗廟社稷懼矣使皆類此一𨽻可辦何以知義之士大夫為古語有之為人臣而不通春秋者守經事而不知其宜遭變事而不知其權故曰大夫出疆有可以安國家利社稷則専之當時人心如此使所在皆固守不下其紓禍猶不愈于割地耶況不可割吾前言耶夫前言忤時宰意一宜死知不可顧不得已為此來二宜死固守不下者今搖之使背國歸虜豫何人三宜死死而死耳吾猶萬一覬吾地之存夫義無定名要于忠忠不在小諒歸于為國公得死尚何言云云嗚呼公死何地公像在此公子為誰公世有祠其地址通衢面大江停車艤舟顧瞻而徘徊者尚其念曰人誰無死陳彬曰謹按國史丙午之厄崇圮之殷以割地出使死焉者三一死于絳一死于磁其一死深則公也絳磁二使挾必割之計以往謂可逭死于金然終不能逭于絳磁之軍民公主必不可割之議以往死固前定而詬金如奴就刃如歸公身死金亦氣死等死一也馨風穢聞越百年而如新公不死而未死之懦夫骨已寒矣又熟籌之河朔二埀瀛滄頭角魏府心胸邢洺真定左右髀金縱不自愛死引髯蛇吭舒醉虎膊越塹踰藩即我仇讎儻迓一戈旁一矛嬰所必趨蛇立可刳虎立可仆公始以微官率九人扼媚金者而奪之氣念此至熟庭謀不輯黽俯共命君命曰可君義曰否孰與先辦一死自獻于殿陛猶可殉義改命也然死固等爾河朔軍民百千萬億儻御命往者類如絳磁婉娩奉金謂棄地棄人皆上本指軍民固未忍以此負國而忍使吾君先負此曲于軍民耶城下要盟梁溪丞相恥之然寧請身代棁鄴往力丐毋以使節他畀亦知此曹子望金口呿決不敢吐一健語以震蘇吾國軍民心膽也觀公抵深面城痛哭曰朝廷為姦臣所誤汝等當戮力報國萬衆竦然知棄城者非朝廷也解揚登車宋城之人有以城斃而不從于夷公一死不躁用于殿陛間而用于幽朔亦知舍介秋而豫忌者非正論所能激曽不如邉朔沈徑之風猶能鼓動于一死之下以堅其不負宋之良心也罕以凶元幾縶于潞太行之梁伊澗之翟昫海之魏﨑嶇戎馬撓腋摶脅使不輕得食息公一死所激猶幾年而未已耶郡有賢牧罔羅軼蹟以風厲于厥邦厥民血氣心知莫非臣子秉彛好德一是忠愛生則烏可已矣公耿耿于今猶生生直為生幸生為罔巍然炳然臨女無二于心獨無慨乎銘曰枉矢蛇行南絶河津超騰次舍凌躐勾陳蟣蝨臣工寸鐵排闔河山兩戒有戰無割附耳纊聰軺星北馳嚼齦勵衆握節死之救日之弓救月之矢力胡能及心弗能已一士死命萬夫死心燕南列城濬湯屹金委彼懦夫行尸卧胔九原倘逢顔忸顙泚古誰無死之死骨香千古大間巋然斯堂宇文虛中肅愍公字叔通成都華陽人紹興十五年公初使金為所留後為金用公知東北之士憤為左袵密以信義感發之從者如響乃與其翰林學士髙士談同謀欲因金主亶郊天就劫殺之先期以蠟書來告于朝欲為之外應秦檜拒不納㑹事亦覺公與其子師瑗皆坐誅闔門無噍類留正曰公之忠亦可考矣方建炎之初以資政殿大學士奉命使金國留繫北庭抗節不屈故相秦檜用事盡歸其孥于虜中則紹興十二年也公在金既久其諸名王大族皆尊信之不疑因與其子師瑗暨僞翰林學士髙士談謀為復讎之舉欲因九月金主祭天而劫之金之諸王宗親約為內應不幸而功不成者天也而金人自此上下相疑浸行誅戮矣公之家巳碎于金手跡其禍端由于蠟彈之繳還則秦檜之為也是時國家中興二十年而公之事不顯最後張魏公招韓王來歸始能言其詳公無子有女以族人紹節為之孫明詔命以京秩至淳熙十一年更與恩澤二名令曽孫承受所以勸天下之為人臣者也宋名臣言行録續集卷四
