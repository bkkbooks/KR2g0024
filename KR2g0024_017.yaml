body:
  text: 宋名臣言行録後集卷七宋朱子纂集司馬光溫國文正公字君實陜州人舉進士甲科位至丞相事仁宗英宗神宗哲宗贈太師配享哲廟公自成童凛然如成人七嵗聞講左氏春秋大愛之退為家人講即了其大義自是手不釋書至不知饑渴寒暑年十五書無所不通文詞醇深有西漢風蘇內翰撰行狀又邵氏後録云豫見溫公親書一帖云光年五六嵗弄青胡桃女兄欲為脫其皮不得女兄去一婢子以湯脫之女兄復來問脫胡桃皮者光曰自脫也先公適見訶之曰小子何得謾語光自是不敢謾語幼時患記誦不如人羣居講習衆兄弟既成誦遊息矣獨下帷絶編逮能倍誦乃止用力多者收功逺其所精誦乃終身不忘也公嘗言書不可不成誦或在馬上或中夜不寢時詠其文思其義所得多矣家孰記山谷云范純甫言公初宦時年尚少家人每每見其卧齊中忽蹶起著公服執手版危坐久率以為常竟莫識其意純甫嘗從容問之答曰吾時忽念天下事夫人以天下安危為念豈可不敬邪冷齊夜話交趾貢異獸謂之麟公言誠僞不可知使其真非自至不為瑞若僞為逺人笑願厚賜而還之因奏賦以諷行狀有司奏六月朔日當食公言故事食不滿分或京師不見皆賀臣以為日食四方見京師不見天意人君為隂邪所蔽天下皆知而朝廷獨不知其為災當益甚皆不當賀詔從之後遂以為常初至和三年仁宗始不豫國嗣未立天下寒心而不敢言惟范鎮首發其議公時通判并州聞而繼之上疏言禮大宗無子則小宗為之後者為之子也願陛下擇宗室賢者使攝儲二以待皇嗣之生退居籓服不然則典宿衛尹京邑亦足以係天下之望疏三上其一留中其二付中書公又與鎮書此大事不言則已言一出豈可復反願公以死爭之於是鎮言之益力及公為諌官復上疏且面言上因令公以所言付中書公曰願陛下自以意諭宰相後復上疏面言臣向者進說陛下欣然無難色謂即行矣今寂無所聞此必有小人言陛下春秋鼎盛何遽為此不祥之事小人無逺慮特欲倉卒之際援立其所厚善者耳唐自文宗以後立嗣皆出於左右之意至有稱定䇿國老門生天子者此禍可勝言哉上大感悟曰送中書公至中書見韓琦等曰諸公不及今定議異日夜半禁中出寸紙以某人為嗣則天下莫敢違琦等皆曰唯敢不盡力後月餘詔英宗判宗正寺固辭不就職明年遂立為皇子除知制誥辭至八九乃改天章閣待制公有上龎丞相啓云光於屬文性分素薄又懶為之當應舉時強作科場文字雖僅能牽合終不甚工頗慕作古文又不能刻意致力窺前修之藩徒使其言迂僻鄙俚不益世用雖親舊書啓不免假手於人今知制誥掌為天子作詔文宣布華夷豈可使假手答書啓者為之邪以是觀之光之不受知制誥出於赤誠非飾讓也仁宗崩英宗以哀毁致疾慈聖光獻太后同聽政公首上疏言章獻明肅太后保佑先帝進賢去奸有大功於趙氏特以親用外戚小人故負謗天下今太后初攝大政大臣忠厚如王曾清純如張知白剛正如魯宗道質直如薛奎者當信用之鄙偎如馬季良讒諂如羅崇勳者當疏逺之則天下服英宗疾既平皇太后還政公上疏言治身莫先於孝治國莫先於公其言切至皆母子間人所難言者治平中韓魏公建議於陜西刺義勇凡三丁刺一每人支買弓弩箭錢三貫文省共得二十餘萬人深山窮谷無得脫者人情驚撓而民兵紀律疏略終不可用徒費官錢公時為諌官極言不便持劄子至中書魏公曰兵貴先聲後實今諒祚方桀驁使聞陜西驟益兵豈不震懾公曰兵之用先聲為無其實也獨可以欺之於一日間耳少緩則敵知其情不可復用矣今吾雖益兵然實不可用不過十日西人知其詳不復懼矣魏公不能答復曰公但見慶厯陜西鄉兵初刺手背後皆刺靣充正兵憂今復作俑爾今已降敕榜與民約永不充軍戍邉矣公曰光終不敢奉信魏公怒曰君何相輕甚邪公曰相公長在此坐可也萬一均逸偃藩他人在此因相公見成之兵遣之運糧戍邉反掌間耳魏公默然竟不為止其後不十年義勇運糧戍邉率以為常一如公之言龍川志王廣淵除集賢院公言廣淵姦邪不可近昔漢景帝為太子召上左右飲衛綰獨稱疾不行及即位待綰有加周世宗鎮澶淵張美掌州之錢穀世宗私有求假美悉力應之及即位薄其為人不用今廣淵當仁宗之世私自結於陛下豈忠臣哉願黜之以厲天下行狀下同神宗即位首擢公為翰林學士公力辭不許上面諭公古之君子或學而不文或文而不學惟董仲舒揚雄兼之卿有文學何辭為公曰臣不能為四六上曰如兩漢制詔可也公曰本朝故事不可上曰卿能舉進士取髙等而云不能四六何也公趨出上遣內臣至閣門強公受告拜而不受趣公入謝曰上坐以待公公入至庭中以告置公懷中不得巳乃受除御史中丞上疏論修心之要三曰仁曰明曰武治國之要三曰官人曰信賞曰必罰其說甚備且曰臣昔為諌官即以此六言獻仁宗其後以獻英宗今以獻陛下平生學力所得盡在是矣延和登對言張方平參政姦邪貪猥不協物望上作色曰朝廷每有除拜衆言輒紛紛非朝廷好事光曰此乃朝廷好事也知人帝堯所難况陛下新即位萬一用姦邪臺諌循默不言陛下何從知之此乃非朝廷好事也日録甲寅豫初赴經筵上自製自書資治通鑑序以授光光受讀降再拜讀三家為諸侯論上顧禹玊等稱美久之同上邉吏上言西戎部將嵬名山欲以橫山之衆取諒祚以降詔邉臣招納其衆公上疏極論以為名山之衆未必能制諒祚幸而勝之滅一諒祚生一諒祚何利之有若其不勝必引衆歸我不知何以待之臣恐朝廷不獨失信於諒祚又將失信於名山矣若名山餘衆尚多還北不可入南不受必將突據邉城以救其命陛下獨不見侯景之事乎上不聽遣將种諤發兵迎之取綏州費六十萬西方用兵蓋自是始行狀執政以河朔災傷國用不足乞今嵗親郊兩府不受金帛送學士院取㫖公言兩府所賜以匹兩計止二萬未足以救災宜皆减半公與學士王圭王安石同對公言救災節用宜自貴近始可聽兩府辭賜安石曰常衮辭賜饌時議以為衮自知不能當辭位不當辭祿且國用不足非當今之急務也公曰衮辭祿猶賢於持祿固位者國用不足真急務安石言非是安石曰不足者以未得善理財者也公曰善理財者不過頭㑹箕斂以盡民財民窮為盜非國之福安石曰不然善理財者不加賦而上用足公曰天下安有此理天地所生財貨百物止有此數不在民則在官譬如雨澤夏潦則秋旱不加賦而上用足不過設法隂奪民利其害甚於加賦此乃桑𢎞羊欺漢武帝之言太史公書之以見武帝之不明爾至其末年盜賊蜂起幾至於亂若武帝不悔禍昭帝未變法則漢幾亡爭議不已王圭進曰救災節用宜自貴近始光言是也然所費無幾恐傷國體安石言亦是惟明主裁擇上曰朕意與光同然姑以不允答之日録又云臣非謂今日得兩府郊賚能富國也欲陛下以此為裁省之始爾且陛下強裁省之則失體今大臣以河北災傷憂公體國自求省郊賚從其請所以成其美何傷體之有安石創立制置三司條例司建為青苗助役水利均輸之政置提舉官四十餘貟公上疏逆陳其利害曰後當如是行之十餘年無一不如公言者天下傳誦以公為真宰相雖田父野老皆號為司馬相公而婦人孺子知其為君實也邇英進讀蕭何曹參事公曰參不變何法得守成之道故孝惠髙后時天下晏然衣食滋殖上曰漢常守蕭何之法不變可乎公曰何獨漢也使三代之君常守禹湯文武之法雖至今存可也武王克商曰乃反商政政由舊然則雖周亦用商政也書曰無作聰明亂舊章漢武帝用張湯言取髙帝法紛更之盜賊半天下元帝改宣帝之政而漢始衰由此言之祖宗之法不可變也後數日吕惠卿進講因言先王之法有一年一變者正月始和布法象魏是也有五年一變者巡狩考制度是也有三十年一變者刑罰世輕世重是也有百年不變者父慈子孝兄友弟恭是也前日光言非是其意以諷朝廷且譏臣為條例司官耳上問公惠卿言何如公曰布法何名為變若四孟月朔屬民讀法為時變月變邪諸侯有變禮易樂者王巡狩則誅之王不自變也刑新國用輕典亂國用重典平國用中典是謂世輕世重非變也且治天下譬如居室弊則修之非大壞不更造也大壞而欲更造非得良匠美材不成今二者皆無有臣恐風雨之不庇也公卿侍從皆在此願陛下問之三司使掌天下財不才而黜可也不可使兩府侵其事今為制置三司條例司何也宰相以道佐人主尚安用例茍用例則胥吏足矣今為看詳中書條例司何也惠卿不能對則詆公曰光為侍從何不言言而不從何不去公作而答曰是臣之罪也上曰相與論是非爾何至是講畢賜坐戶外將出上令徙戶內左右皆避去上曰朝廷每更一事舉朝洶洶何也公曰青苖出息平民為之尚能以蠶食下戶至饑寒流離况縣官法令之威乎惠卿曰青苖法願取則與之不願不強也公曰愚民知取債之利不知還債之害非獨縣官不強富民亦不強也臣聞作法於凉其弊猶貪作法於貪弊將若之何昔太宗平河東立和糴法時米斗十餘錢草束八錢民樂與官為市後物貴而和糴不解遂為河東世世之患臣恐異日之青苖猶河東之和糴也上曰陜西行之久矣民不以為病公曰臣陜西人也見其病不見其利朝廷初不許也而有司尚能以病民况立法許之乎上曰坐倉糴米何如坐者皆起曰不便上已罷之幸甚上曰未罷也公曰京師有七年之儲而錢常乏若坐倉錢益乏米益陳奈何惠卿曰坐倉得米百萬斛則省東南百萬之漕以其錢供京師何患無錢公曰東南錢荒而粒米狼戾今不糴米而漕錢棄其有餘取其所無農末皆病矣侍講吳申起曰光言至論也公曰此皆細事不足煩人主但當擇人而任之有功則賞有罪則罰此則陛下職也上曰然行狀邇英讀通鑑賈山上疏因言從諌之美拒諌之禍上曰舜堲讒說殄行若臺諌欺罔為讒安得不黜光曰進讀及之爾時事臣不敢論也及退上留光謂曰吕公著言藩鎮欲興晉陽之甲豈非讒說殄行也光曰公著平居與儕輩言猶三思而發何故上前輕發乃爾外人多疑其不然上曰此所謂靜言庸違者也光曰公著誠有罪不在今日向者朝廷委公著專舉臺官公著乃盡舉條例司之人與條例司互相表裏使熾張如此乃始逼於公議復言其非此所可罪也上言安石不好官職及自奉養可謂賢者光曰安石誠賢但性不曉事而愎此其短也又不當信任吕惠卿惠卿真奸邪而為安石謀主安石為之力行故天下并指安石為奸邪也上曰今天下訩訩者孫叔敖所謂國之有是衆之所惡也光曰然陛下當審察其是非然後守之今條例司所為獨安石韓絳惠卿以為是天下皆以為非也陛下豈能獨與此三人共為天下邪遂退上問近相陳升之外議云何光對陛下擢用宰相臣愚何敢與上曰第言之光曰閩人狡險楚人輕易今二相皆閩人二參政皆楚人必將援引鄉黨之士充塞朝廷天下風俗何以更得淳厚上曰然今中外大臣更無可用者獨升之有才智曉民政邉事他人莫及光曰升之才智誠如聖㫖但恐不能臨大節而不可奪爾昔漢髙祖論相以為王陵少戅陳平可以輔之平智有餘然難獨任真宗用丁謂王欽若亦以馬知節參之凡才智之士必得忠直之人從旁制之此明主用人之法也上曰然升之朕固已戒之矣上又曰安石何如光曰人言安石姦邪則毁之太過但不曉事又執拗爾上曰韓琦敢當事賢於富弼但木強爾光曰琦實有忠於國家之心但好遂非此其所短也上因問至吕惠卿光曰惠卿憸巧非佳士使安石負謗中外皆惠卿所為也近日不次進用大不合衆心上曰惠卿明辨亦似美才光曰惠卿文學辨慧誠如聖㫖然用心不端陛下更徐察之江充李訓若無才何以動人主上因論臺諌天子耳目光曰臺諌天子耳目陛下當自擇人今言執政短長者皆斥逐之盡易以執政之黨臣恐聰明將有所蔽䝉也上曰諌官難得卿更為擇其人光退而舉陳薦蘇軾王元規趙彥若邇英進讀通鑑三葉畢上更命讀一葉半讀至蘇秦約六國從事上曰蘇秦張儀掉三寸舌乃能如是乎光曰臣所以存其事於書者欲見當時風俗專以辨說相髙人君委國而聽之此所謂利口覆邦家者也上曰卿進讀每存規諌光曰非敢然也欲陳著述之本意耳吕晦叔曰昨使契丹虜中接伴問副使狄咨曰司馬中丞今為何官咨曰今為翰林兼侍讀虜曰不為中丞邪聞是人甚忠亮上謂晦叔曰司馬光方直其如迂闊何晦叔曰孔子上聖子路猶謂之迂孟軻大賢時人亦謂之迂闊况光豈免此名大抵慮事深逺則近於迂矣願陛下更察之並日録韓琦上疏論青苗之害上感悟欲罷其法安石稱疾求去會拜公樞副公上章力辭至六七曰上誠能罷制置條例司追還提舉官不行青苗助役等法雖不用臣臣受賜多矣不然終不敢受命上遣人謂公樞密兵事也官各有職不當以他事為辭公言臣未受命則猶待從也於事無不可言者安石起視事青苗法卒不罷公亦卒不受命則以書喻安石三往反開諭切至猶幸安石之聽而改也且曰巧言令色鮮矣仁夫忠信之士於公當路時雖齟齬可憎後必徐得其力諂諛之人於今誠有順適之快一旦失勢必有賣公以自售者意謂吕惠卿對賔客輒指言之曰覆王氏者必惠卿也小人本以利合勢傾利移何所不至其後六年而惠卿叛安石由是天下服公先知魏公言君實初除樞副竟辭不受時公在魏聞之亟遣人賫書與潞公勉之云主上倚重之厚庶幾行道道或不行然後去之可也似不須堅讓潞公以書呈君實君實云自古被這般官爵引得壞了名節為不少矣後得寬夫書云君實作事今人所不可及須求之古人魏公語録老先生嘗謂金陵曰介甫行新法乃引用一副當小人或在清要或為監司何也介甫曰方法行之初舊時人不肯向前因用一切有才力者候法行已成即逐之却用老成者守之所謂智者行之仁者守之先生曰介甫誤矣君子難進易退小人反是若小人得路豈可去也必成讎敵他日將悔之介甫默然後果有賣荆公者雖悔之無及元城語録熙寧七年上以天下旱蝗詔求直言公讀詔泣下欲默不忍乃復陳六事一青苗二免役三市易四邉事五保甲六水利此尤病民者宜先罷又以書責宰相吳充曰天子仁聖如此而公不言何也行狀潞公謂溫公曰彥博留守北京遣人入大遼偵事回云見虜主大宴羣臣伶人劇戲作衣冠者見物必攫取懷之有從其後以鞭撲之者曰司馬端明邪君實清名在夷狄如此公愧謝公嘗問康節曰光何如人曰君實腳踏實地人也公深以為知言康節又曰君實九分人也其重之如此公居洛嘗同范景仁登嵩頂由轘轅道至龍門涉伊水至香山憩石樓臨八節灘凡所經從多有詩什自作序曰逰山録士大夫爭傳之公不喜肩輿山中亦乘馬路險䇿杖以行故嵩山題字云登山有道徐行則不困措足於平穩之地則不跌慎之哉公知永興軍上章曰臣之不才最出羣臣之下先見不如吕誨公直不如范純仁程皓敢言不如蘇軾孔文仲勇决不如范鎮若臣罪與鎮同則乞依鎮例致仕若罪重於鎮或竄或誅所不敢逃帝必欲用公召知許州令過闕上殿謂監察御史程皓曰卿度光來否皓對曰陛下能用其言光必來不能用其言光必不來帝曰未論用其言如光者常在左右自可無過公果辭召命帝嘗謂左丞蒲宗孟曰如光未論别事只辭樞密一節朕自即位以來惟見此一人帝之眷禮於公如此不衰特公以新法不罷義不可起元豐官制成帝曰官制將行欲取新舊人兩用之又曰御史大夫非光不可蔡確進曰國是方定願少俟之王圭亦助其說至元豐七年秋資治通鑑成進御時拜公資政殿學士賜帶如二府品數者修書官亦遷秩召范祖禹及公子康為館職時帝初感疾既安語宰輔曰來春建儲以司馬光吕公著為師保神宗知公之深如此並聞見録神宗崩公赴闕庭衛士見公入皆以手遮額曰此司馬相公也民遮道呼曰公無歸洛留相天子活百姓所在數千人聚觀之公懼㑹放辭謝遂徑歸洛太皇太后聞之詰問主者遣使勞公問所當先者公言近嵗士大夫以言為諱閭閻愁苦於下而上不之知明主憂勤於上而下無所訴其罪在羣臣而愚民無知歸怨先帝宜下詔首開言路從之下詔榜朝堂而當時有不欲者於詔語中設六事以禁切言者曰若隂有所懷犯非其分或扇搖機事之重或迎合巳行之令上以觀望朝廷之意以僥幸希進下以眩惑流俗之情以干取虛譽若此者必罰無赦太皇太后封詔草以問公公曰此非求諌乃拒諌也人臣惟不言言則入六事矣時有應詔言事而坐越職贖銅者公具論其情且請改賜詔書行之天下從之於是四方吏民言新法不便者數千人公方草具所當行者而太后已有㫖散遣修京城邏卒罷减皇城內覘者止御前工作出近侍之無狀者三千餘人戒飭中外無敢苛刻暴斂廢導洛司物貨場及民間戶馬寬保馬限皆從中出大臣不與公上疏謝當今急務陛下已略行之矣小臣稽慢罪當萬死行狀拜門下侍郎元豐之末天下多故二聖嗣位民日夜引領以觀新政而進說者以為三年無改於父之道欲稍損其重者毛舉數事以塞人言公慨然爭之曰先帝之法其善者雖百世不變可也若安石惠卿等所建為天下害非先帝本意者改之當如救焚拯溺猶恐不及况太皇太后以母改子非子改父衆議乃定遂罷保甲團教依義勇法嵗一閲保馬法不復買見在者還監牧給諸軍廢市易法所儲物皆鬻之不取息而民所缺錢皆除其息京東鑄鐵錢河北江西福建湖南鹽及福建茶法皆復其舊獨川陜茶以邉用未罷遣使相視去其甚者戶部左右曹錢穀皆領之尚書凡昔之三司使事有散𨽻五曹及寺監者皆歸戶部使尚書周知其數量入以為出元祐元年正月公始得疾詔公與尚書左丞吕公著朝㑹與執政異班再拜而已免舞蹈公疾益甚歎曰四患未除吾死不瞑目矣乃上疏論免役五害乞直降敕罷之率用熙寧以前法有未便州縣監司節級以聞為一路一州一縣法詔即日行之又論西戎大略以和戎為便用兵為失時異議甚衆獨文彥博議與公合衆不能奪遂詔諸將皆𨽻州縣軍政委守令通决之公奏以文學德行吏事武略等為十科以求天下遺材命文臣升朝以上嵗舉經明行修一人如進士髙選皆從之行狀元祐初溫公輔政是嵗天下斷死刑千人其後二吕繼之嵗嘗數倍此豈智力所能勝邪談叢公既改新法或謂公曰元豐舊臣如章惇吕惠卿輩皆小人他日有以父子之義間上則朋黨之禍作矣不可不懼公正色曰天若祚宋必無此事遂改之不疑聞見録公好學如飢渴之嗜飲食於財利紛華如惡惡臭誠心自然天下信之退居於洛往來陜洛間皆化其德師其學法其儉有不善曰君實得無知之乎博學無不通音樂律厯天文書數皆極其妙晚節尤好禮為冠婚喪祭法適古今之宜不喜釋老曰其微言不能出吾書其誕吾不信不事生産買第洛中僅庇風雨有田三頃躬親庶務不舍晝夜行狀公與其兄伯康友愛尤篤伯康年將八十公奉之如嚴父保之如嬰兒每食少頃則問曰得無飢乎天少冷則拊其背曰衣得無薄乎范大史集朝無咎言溫公有言吾無過人者但平生所為未嘗有不可對人言者耳東坡集公初患厯代史繁重學者不能綜况於人主遂約戰國至秦二世如左氏體為通志八卷以進英宗恱之命公讀其書置局祕閣以其素所賢者劉攽劉恕范祖禹為屬官神宗尤重其書以為賢於荀恱親為製序賜名資治通鑑詔邇英讀其書賜潁邸舊書二千四百二卷書成拜資政殿學士仍賜金帛行狀遼人夏人遣使入朝與吾使至彼中者彼必問公起居及為相遼人敕其邉吏曰中國相司馬矣慎毋生事開邉隙神道碑先生每與君實說話不曾放過如范堯夫十件事只爭得三四件便已先生曰君實只為能受盡人言儘人忤逆更不怒便是好處程氏遺書蘇內翰軾作公神道碑銘曰於皇上帝子惠我民孰堪顧天惟聖與仁聖子受命如堯之初神母詔之匪亟匪徐聖神無心孰左右之民自擇相我興授之其相維何太師溫公公來自西一馬二童萬人環之如渴赴泉孰不見公莫如我先二聖忘巳惟公是式公亦無我惟民是度民曰樂哉既相司馬爾賈於途我耕於野士曰時哉既用君實我後子先時不可失公如麟鳳不鷙不摶羽毛畢朝雄狡率服為政一年疾病半之功則多矣百年之思知公於異識公於微匪公之思神考是懷天子萬年四夷來同薦於清廟神考之功司馬康字公休文正公之子舉明經中第事神宗哲宗位至司諫贈右諫議大夫君性端謹性至孝居毋憂勺飲不入口者三日杖而後能起見者哀之文正居洛十五年往來陜洛間士之從學於公者退與君語未嘗不有得塗之人見其容止雖不識皆知其司馬公之子也公薨執喪如夫人哀毁有加焉治喪皆用禮經家法不為世俗事得遺恩悉以與族人范太史撰墓志君為講官嘗上疏厯陳前世治少而亂多祖宗創業之艱難積纍之勤勞以勸上及時向學守天下大器又勸太后每於禁中訓導其言切至又言孟子為書最醇正陳王道尤所宜觀覽上曰方讀孟子尋詔講筵官編修孟子節解為十四卷以進君已病矣猶自力解孟子二卷㑹除諌議未受條具諸所當言以待曰得一對極言而死無所恨矣疾病召醫於兖鄉民聞之詣醫告曰百姓受司馬公恩深今其子病願速往來告者日夕不絶醫遂行至則疾不可為也沒二聖嗟悼不已所以優恤賻贈之甚厚墓志宋名臣言行録後集卷七
