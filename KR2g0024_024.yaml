body:
  text: 宋名臣言行録後集卷十四宋朱子纂集陳襄字述古福州侯官人登第事仁宗英宗神宗官至樞密直學士太常侍讀卒年六十四公既孤且多病常以先君侍郎之言為念居間益自策勵上事繼母以孝下教弟妹以義方求士之賢者親而友之得其鄉士陳烈周希孟鄭穆為之友四人者氣古行髙磨礲鐫切相期以天下之重為已任時學者方溺於雕篆之文以相髙所謂知天盡性之説皆指以為迂濶而莫之講公與三人者獨以斯道鳴於海隅聞者始皆笑之而驚四人者不為變守之益堅躬行於其家由家逹於州閭人卒信而化之父兄皆飭其子弟請從之由是閩中士人宗之謂之四先生雖有誕突恣傲不可率者不敢失禮於其門巳而四先生之名傳之四方從之學者日益衆葉祖洽行狀公主建州之浦城簿會邑闕令公獨當縣事邑之封疆逺多世族前後令罕能制蔽蒙請託習以為常公夜寐夙興務究其弊訟之難聽而積久者窮極本源剖決無留有請託者惜其士類不欲遽繩以法每聽訟必數人環列於前私謁者無所發由是邑人知公之不可干老姦宿贓縮手喪氣民畏且愛爭圖公之像以神事之至今先有詔郡邑興學公遂諭邑之富人出所餘以繕學舍學成使邑之子弟造焉公為入學講説不斁士之自逺方來者至數百人部使者安刑部積始至其縣公即以十事便於民者干之安皆行之人受其賜行狀公知浦城縣日有人失物捕得莫知的為盜者述古乃紿之曰某廟有一鐘能辨盜至靈使人迎置後閣伺之引郡囚立鐘前自陳不為盜者摸之則無聲為盜者摸之則有聲述古自率同職禱鐘甚肅祭訖以帷蔽之乃隂使人以墨塗良久引囚逐一令引手入帷摸之出乃驗其手皆有墨惟有一囚無墨訊之遂承為盜蓋恐鐘有聲不敢摸也此亦古之法出於小説筆談仙居為縣僻陋民不知教公於正嵗因耆老來賀作勸學一篇使門人管師復讀於庭且諭之曰吾秩滿即去爾有子弟亟遣就學於是耆老相與感泣歎嗟從之翕然每過社稷孔子廟必下而趨邑人自是有所矜式學者興起縣有西圃蕪廢弗葺縱民耕種其中然每有興建必為民利故瓦木之資不責於民而樂輸之下至織席之微亦願出所得以助焉及公之去也老幼攀車遮道幾不得出境判尚書祠部遇權貴人奏乞寺觀名額且度僧人道士公堅執著令不為行因奏言近年以來自宫闈宦官以及要近一例陳乞蓋秉政大臣不為陛下愛惜典刑首為瀆亂所有詔令未敢奉行行狀出知常州郡庠下窄不足以容生師公勤於經始成以不日其規模氣象遂為諸郡庠序之冠公晨入其中坐授諸生經義旁決郡事由是毗陵學者盛於二浙治平初召還將行委官閲公帑得雜收無名錢數百萬因召積年有官逋未償情可矜而力不足者悉以輸之蓋公淡於宴樂故有餘足以周物行狀常州運渠橫遏震澤積水不得北入於江以為常蘇數邑民田之害者纍世矣公以渠之丈尺對民田之步畝分授以浚深廣有制不月而成遂削望亭古偃而震澤積水乃克北流民害以除而田旱有溉豐穰嵗饗矣祠堂記熙寧二年陳述古學士襄自右史遷臺雜近例左右次補知制誥臺雜乃敘遷三司副使於是特降旨候知制誥闕與召試襄辭曰陛下以義使臣則臣敢不惟命是聽豈可計較資地以為輕重况義之所在知無不言夫豈知鈇鑕之在前而寵祿之居後哉一有顧利避害之心則依違姑息無所不至身且不正焉能正人乃許追寢前命明年以言青苗事復為右史又嵗餘始掌誥命吕氏家孰記公將終妻子環泣求所以語後者公索紙筆書先聖先師四字付其子而絶行狀富丞相當國日引陳襄述古為上客述古所以告富公者盡仁義也有不悅富公者造為五鬼之號而襄在其一夫流言待無知者而傳至智者則止矣以富公之賢其門豈無善士以述古之賢而肯為人作鬼乎呂氏家孰記劉恕字道原筠州人試經義説書皆第一事神宗官至祕書丞道原少穎悟俊拔讀書過目即成誦年四嵗坐客有言孔子無兄弟者道原應聲曰以其兄之子妻之一坐驚異范太史撰墓碣皇祜初光為貢院屬官時有詔士能講解經義者聽别奏名應詔者數十人問以春秋禮記大義其中一人所對最精詳先具注疏次引先儒異説末以巳意斷之凡二十問所對皆然主司驚異擢為第一及發糊名乃進士劉恕光以是慕重之司馬公作十國紀年序前世史自太史公所記下至周顯德之末簡䇿極博而於科舉無所急故近嵗學者多不讀鮮有能道之者獨道原篤好之為人強記紀傳之外閭里所録私記雜説無所不覽坐聽其談衮衮無窮上下數千載間細大之事如指掌英宗雅好稽古詔光編次厯代君臣事仍謂光曰卿自擇館閣英才共修之光對曰館閣文學之士誠多至於專精史學臣所得而知者惟和川令劉恕一人而巳上曰善退即奏召之與共修書史事之紛錯難治者則以委之光蒙成而巳王介甫與道原有舊介甫參大政欲引道原修三司條例道原固辭以不習金榖之事因言天子方屬公以政事宜恢張堯舜之道以佐明主不應以財用為先介甫雖不能用亦不之怒及呂獻可得罪道原往見介甫曰公所以致人言蓋亦有所未思因為條陳所更法令不合衆心者宜復其舊則議論自息介甫大怒遂與之絶即奏乞監南康軍酒得之方介甫用事呼吸成禍福凡有施置舉天下莫能奪髙論之士始異而終附之面譽而背毁之口是而心非之者比肩是也道原獨奮厲不顧直指其事是曰是非曰非或面刺介甫至變色如鐵或稠人廣坐介甫之人滿側道原公議其得失無所隱惡之者側目愛之者寒心至掩耳起避之而道原曾不以為意見質厚者親之如兄弟姦諂者疾之如讎用是困窮而終不悔此誠人之所難也昔申棖以多欲不得為剛微生髙以乞醯不得為直如道原者可以為剛直之士矣道原家貧至無以給旨甘一毫不妄取於人其自洛陽南歸也時巳十月無寒具光以衣襪一二事及舊貂褥賮之固辭強與之行及頴州悉封而返之於光而不受於他人可知矣尤不信浮屠説以為必無是事曰人如居逆旅一物不可乏去則盡棄之矣豈得齎以自隨哉可謂知之明而決之勇矣並十國紀年序先公言荆公笑道原耽史而不窮經相見必戲之曰道原讀到漢八年未而道原厯詆荆公之學士子有談新經者道原怒形於色曰此人口出妖言面帶妖氣范太史遺事徐積節孝先生字仲車楚州人中進士第官至宣德郎賜節孝處士先生因具公裳見貴官忽自思云見貴官尚必用公裳豈有朝夕見母而不具公裳者乎遂晨夕具公裳揖其母童蒙訓初從安定胡先生學潛心力行不復仕進自言初見安定先生退頭容少偏安定厲聲云頭容直積因自思不獨頭容心亦要直也自此不敢有邪心同上先生事母謹嚴非有大故未嘗去其側日具太夫人所嗜或不獲即奔走闤市人或慕其純孝損直以售之太夫人飲食時率家人在左右為兒戲或謳歌以説之故太夫人雖在窮巷而奉養與富貴家等無須臾不快也應舉貢禮部不忍一日去其親遂徒步載母西入京師一日借人書册經夕還之人知其必不校乃誣曰册中有金葉先生遜謝賣衣償金聞者皆不平強使歸金先生終不受年過壯未娶或勉之答曰娶非其人必為母病豫非敢忘嗣固有待也以羅城君諱石平生不用石器遇石則避而不踐或謂先生曰天下用石多矣必避之然後為孝歟他日山行奈何先生曰此吾私迹則然吾豈固避之哉吾遇之怵然傷吾心乃思吾親不忍加足其上他日若有君命敢從私乎太夫人既以疾終先生號慟嘔血絶而後蘇哭不輟聲水漿不入口七日廬墓三年卧苫枕塊縗絰不去身至雪夜哀號伏墓呼太夫人問寒否如平生顛委僵仆手足皆裂不顧也所居茅舍不蔽風雨而農夫樵父瞻仰如神有爭訟者必造之先生以義裁決皆悅服而去不復造有司太守迎先生入學先生居州學舍尚設考妣几筵晨昏起居執㸑滌器饋食如生冬以火溫衾夏揮扇去蚊蚋思母平時所甘旨以供祀未嘗一日不奉酒也平日教學者每以治心養氣為先曰修身務學為文之要莫大於此晚乃著書未成而病嘗曰吾之書大要以正治心以直養氣而巳或問立朝之要則曰以正輔君或問修身之要則曰以正修其身自逺方寄巨軸請教者乃大書一正字與之先生天文之學尤造其妙門人問之則曰昔有學天文於譙周者周曰天下事可學者甚多何獨天文先生於前代名將酷慕諸葛武侯以其所學之廣所養之厚也嘗謂兵者實大賢盛德之事非小才小智所能用亦不獨用之難也言之亦難若其所養不至而易言之鮮不敗事先生為文率用腹稿口占嘗曰文字在胸中出之未暇者不可勝記先生一日升堂訓諸生曰諸君欲為君子而使勞已之力費已之財如此而不為猶之可也不勞巳之力不費巳之財何不為君子鄉人賤之父母患之如此而不為猶之可也父母欲之鄉人榮之何不為君子並行狀王資深撰陳無巳名師道一字履常以侍從合薦為徐州教授官至祕書省正字無已苦節厲志自其少時蚤以文謁南豐曽舍人曽一見竒之許其必以文著時人未之知也在頴賦六一堂詩有向來一瓣香敬為曽南豐之句謝克家撰文集序傅公欽之初為吏部侍郎聞師道遊京師欲與相見先以問秦觀觀曰師道非持刺字俯理色伺候乎公卿之門者殆難致也公曰非所望也吾將見之懼其不吾見也子能介於陳君乎公知其貧甚因懷金餽之及覩其貌聽其論議竟不敢以出口道卿集陳履常居都下逾年未嘗一至貴人之門章子厚欲一見終不可得中丞傅欽之侍郎孫莘老薦之軾亦挂名其間會朝廷多知履常者故得一官蘇內翰答李豸書辱書喻以章公降屈年德以禮見招不佞何以得此豈侯嘗欺之耶公卿不下士尚矣乃特見於今而親於其身幸孰大焉愚雖不足以齒士猶當從侯之後順下風以成公之名然先王之制士不傳贄為臣則不見於王公夫相見所以成禮而其弊必至於自鬻故先王謹其始而為之防而為士者世守焉師道於公前有貴賤之嫌後無平生之舊公雖可見禮可去乎且公之見招蓋以能守區區之禮也若昧冒法義聞命走門則失其所以見招公又何取焉雖然有一於此幸公之他日成功謝事幅巾東歸師道當御欵段乘下澤候公於上東門外尚未晚也後山集答秦少遊書宋名臣言行録後集卷十四
