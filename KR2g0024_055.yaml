body:
  text: 宋名臣言行錄别集下巻十宋李幼武纂集劉錡武穆公字信叔秦州成紀人大觀間以父仲武功補三班借職政和六年差充秦鳳經司機宜宣和二年改熙河徽宗即位授閤門祇候尋差潼川㢘訪使者靖康初授閤舍九月知洮州兼洮東安撫建炎二年知西寧州兼㳂邊安撫隴右都䕶張浚奏其功陞右武大夫熙河都監餘仍舊四年宣司授開州團練使涇原經略安撫兼知渭州紹興初降知岐州統制文政州兵馬二年統制成都弓兵三年差成都兵鈐兼節制文龍州尋復開州團練使充宣司統制官綿威茂州石泉軍㳂邊安撫司叅議四年召對除帶御器械尋差江東總管駐建康六年差權提舉宿衛親兵尋充浙西淮東㳂海制置使復主管馬軍司扈從幸金陵七年差兼督府咨議軍事八月充淮西制副使守廬州兼淮西安撫八年充密院都統制駐京口九年除果州團練使神龍衛四廂都指揮使權主管侍衛馬軍十年除濟州防禦使仍舊職充東京副畱守兼節制軍馬順昌戰功拜鼎州觀察使尋除樞密院都承㫖授武泰軍節度使侍衛親軍都虞候㳂淮制置使淮北宣撫判官秦檜惡之罷知荆南湖北帥二十五年知潭州兼帥使二十七年除太尉知荆州三十一年召易鎮威武軍除鎮江都統制京東河東招討使疾甚召除萬夀觀使遣使宣醫知不可起許致仕是月薨于都亭驛年六十五贈開府儀同三司紹興十年公赴東京副畱守任又以兵戍陳汴隨軍家口畱順昌公乃帶王彥所刺八字軍以行絶江淮至穎上與屬官杜亨道王羲賓及將佐捨舟陸行抵順昌府守臣陳䂓得報敵騎已入東京䂓以示公時公所部選鋒遊奕兩軍及老幼輜重相去尚逺公遣騎趣之是夕纔抵岸公見規曰事急矣城中有糧則能與君守䂓曰有米數萬斛公曰可矣規亦力畱公共守公又見劉豫時所蓄毒藥猶在足以害敵召諸將議曰吾軍逺來未及息肩敵已壓境今當如何有欲便舟順流而下者有欲守者公曰某本赴官畱司今東京既陷幸全軍至此有城池可守機不可失當同心力以死報國家衆議始定即鑿舟沉之示無去意通判汪若海㳂檄至行在公以奏附若海行即與屬官登城區處城外有居民數千家恐為賊有悉焚之分命諸統制官許青守東門賀輝守西門鍾彥守南門杜把守北門且眀斥候及募土人作鄉道間探於是軍人皆奮曰平時人欺我八字軍今日當為國家立功公親於城上督衆設戰具修壁壘凡六日粗畢而賊之遊騎已渡河至城外公豫設伏擒其千戸阿哈等二人詰之云韓將軍在白沙渦下寨距城三十里公夜遣千餘兵擊之殺敵頗衆既而葛王褒及龍虎大王軍併至城下凡三萬餘人公以神臂弓及强弩射之稍引去復以歩兵邀擊溺于河者甚衆奪其器甲及生獲女眞漢兒皆謂賊遣銀牌使馳詣東京告急于烏珠矣時公見陳蔡以西皆望風投拜又有王山者舊為烏珠所用嘗知順昌至是復來城下烏珠欲再令守順昌公慮有茍全性命者賣已於外故順昌官吏軍民皆不許登城用已所部兵守之時虜衆圍城四日乃移寨於城東號李村距城二十里公遣驍將閻充以銳卒五百募土人前導夜刼其寨是夕天欲雨電光所燭見辮髮者殱之甚衆既而報烏珠親綂兵至先是烏珠在龍徳宫得告急之報即索靴上馬麾其衆出京頃刻而集過淮寧畱一宿治戰具備糗糧自東京往復千二百里不七日而至公聞烏珠至近境乃登城㑹諸將於東門問策將安出或謂今已屢捷宜乗此勢具舟全師而歸公曰朝廷養兵十五年正欲為緩急之用而已挫賊鋒軍聲稍振雖多寡不侔然有進無退兼賊營近在三十里而四太子又來援吾軍一動被敵追及老小先亂必至狼狽不惟前功俱廢致金遂侵兩淮震驚江浙則平生報國之志反為悞國之罪不如背城一戰於死中求生可也衆以為然皆欲效命公呼帳下曹成等二人諭之曰吾遣爾作間事捷有厚賞第如我言虜必不殺汝今遣騎綽路置汝隊中汝遇敵必墜馬使為所得敵長問我何人則曰太平邊帥子喜聲色朝廷以兩國講好使守東京圖逸樂爾已而遣探騎果遇敵二人被執烏珠問之對如其言烏珠喜遂下令不用負鵝車砲具行翌日公行城上見二人逺來心知其歸即縋上金械二人以文書一巻繫于械公取焚之烏珠至城外責諸將用兵之失衆曰今者南兵非昔之比國王臨城自可見烏珠見其城陋謂諸將曰彼可以靴尖趯倒耳即下令來早府治㑹食諸軍所得玉帛子女聽其自畱男子長成者皆殺且折箭為誓以激其衆平眀金併兵攻城凡十餘萬而府城惟東西兩門受敵公所部不滿二萬而可出戰者僅五千賊先攻東門公出兵應之賊敗退烏珠自將牙兵三千往來為援皆帶重甲三人為五貫以韋索號鉄浮屠每進一歩即用拒馬子遮其後示無反顧復以鉄騎馬左右翼號拐子馬悉以女眞充之前此攻所難下之城並用此軍故又名長勝軍時敵諸軍各居一部衆欲擊韓將軍公曰擊韓雖退烏珠精兵尚不可當也法當先擊烏珠烏珠一動則餘軍無能為矣時叛將孔彥舟酈瓊趙榮輩騎列于陣外有河北簽軍告官軍曰我輩原是左䕶軍本無鬭志惟兩拐子馬可殺故官軍皆憤時方極暑我居逸而彼暴露早涼則不與戰逮未申間彼力疲而氣索公忽遣數百人出西門敵方來接戰俄以數千人出南門戒令勿喊但以短兵極力與戰統制官趙樽韓直皆被數矢戰不肯已公遣屬扶歸士殊死鬭入敵陣中斫以刀斧至有奮手捽之與俱墜于濠者敵大敗殺其衆五千横屍滿野烏珠乃移寨於城西掘塹以自衛欲為坐困官軍之計是夕大雨平地水深尺餘公遣兵劫之上下皆不寧處烏珠之未敗也秦檜奏俾公擇利班師公得詔不動至是烏珠不能支乃作筏繫橋而去至泰和縣臥兩日至陳州數諸將之罪自韓常而下皆鞭之於是復以葛王褎守歸徳府自擁其衆還汴京自是不復出矣時淮西宣撫使張俊遣行營都統制王徳將所部統勝軍援公俊既不樂公而徳復撥𨽻劉光世軍遷延未行建康畱守葉夢得諭徳曰朝廷頒賞格能立竒功者使相節度皆即軍中書告舊未聞也且劉錡名素出爾下今自奮報國爾能救錡則可謂竒功矣徳復慮公怒之夢得曰吾已上章以百口保爾矣徳遂行未至順昌賊遁去順昌錄曰錡方被圍時遣价求援于朝得報已差行營左䕶軍統制王徳躬率前軍來援十二日金軍既退之後徳方移文來問賊勢動息二十二日夘時以數十騎列城下錡邀入具飯已憇於子城樓上申時出門遣人致意曰不果奉别今且復囘又數日傳聞申樞密院某已解順昌圍矣方賊在城下得遞到御筆劉錡擇利班師錡以方應敵未敢輕動賊退後十日又被㫖先發老小還駐鎮江遂津發老小輜重并被傷之士船載而行以統制官杜杞焦文通兩軍防䕶東下又聞徳申宣撫司云某以全軍裹送劉太尉老小出穎河矣先上賜公空名告身千五百命書塡將佐之有功者公復繳上謂不若自朝廷給之為榮至是始具功狀以聞凡統兵官之立功者皆以上所賜椀帶予之其有過者則杖責之斥為士伍金之始至也統領田守忠正將李忠恃勇深入皆手殺數十人而後死公加厚優恤遂以犒軍銀帛十四萬疋兩均給將士軍無私焉於是公方欲進兵乗金虚而檜召公還洪皓時在燕山密奏順昌之役金震懼喪魄燕之珍寶悉取而北意欲捐燕以南棄之王師亟還自失機㑹可惜也上謂宰執曰用兵之際賞罰欲眀劉錡以孤軍首挫賊鋒烏珠遁去其功卓然自觀察使便除節鉞即自降制上賜手札曰卿之偉績朕所不忘烏珠自順昌敗後遂保汴京畱屯京亳出入許鄭之間簽兩河軍與畨部共十餘萬以謀再舉至是果入冦陷夀春府犯廬州守臣陳䂓病朝廷命公自太平州渡江援淮西公兩至廬州廵其城曰不足守也乃結陣徐行號令諸軍占擇地利共趨東闗依水據山以遏虜衝自金人渡淮淮南之人惟視公兵以為安危公既得東闗之險稍休士卒兵力復振敵據廬州不敢舉兵逼江者懼公乗其後也江南由是少安烏珠陷廬州次侵和州公移屯濡須塢至尖山清流下闗兩與賊遇俱捷至拓臯其地坦平敵自以為騎兵之利也隔河相距㑹夜大雨公遣人㑹合張俊及沂中之軍時俊為宣撫使詔沂中副之自臨安晝夜疾馳六日至厯陽翌日諸將各以軍來而俊未至公與諸將分軍為三並進渡水擊賊田師中欲俟俊至王徳曰事當機㑹復何待公即與徳上馬率先迎敵沂中軍繼之兀术鉄騎十餘萬分為兩隅夾道而陣徳與師中揮兵先薄其右隅賊陣動乃以拐子馬兩翼而進沂中令萬兵各持長斧堵而前公與諸軍合擊之敵兵望見曰此順昌旗幟也即退走屯于紫金山詔光世世忠沂中錡諸將以捷書繼至軍聲大振蓋自兵興以來未有今日之盛建康畱守葉夢得亦奏自用兵以來未有此舉詔奬之拓臯役之眀日俊至諸軍皆㑹俊之姪子蓋指揮諸軍公呼子蓋語之曰爾安得擅揮吾軍如此號令將安出他日當以軍法從事俊聞之不悅自是與公有隙初諸軍之捷議當並以竒功奏俊獨抑公功數日内侍至勞賜諸軍公獨不與又數日諸軍復廬州班師忽濠州王進告急俊以諸軍往解圍至黄連阜距州十里頓兵不進濠州失守公謂俊曰我軍乏食不如退軍就糧俊不從意金兵且退欲以收復濠州為功公曰賊得一州而遽退必有謀也宜嚴備之俊又不從俾沂中將神勇歩騎六萬人直趨濠州遇伏而敗時大雨水潦公軍至藕塘則沂中軍已入滁州俊軍巳趨宣化公軍方食俊遽至曰金有兵來奈何公語俊無恐某自以歩兵禦敵願宣撫觀之遂設三覆以待之俄而俊至曰探者之妄也乃俊所遣戚方殿後之軍爾公與俊益不相下一夕俊軍士縱火劫公軍擒得十六人梟首槊上餘皆逸公往見俊俊怒曰俊為宣撫爾為判官何得斬俊軍人公曰不知宣撫軍人但斬劫寨賊爾俊曰有卒歸來言未嘗劫寨呼二人出對公正色曰某為國家將帥有罪宣撫當言于朝豈得與卒伍對事長揖上馬去及班師之日俊沂中皆先渡江公駐和州不渡以聞而聽命焉得詔許乃渡俊沂中益憾之是役也三軍進退皆主於俊而沂中俊之腹心也軍旅之事二人謀之公不與聞俊沂中既還朝言淮西事時秦檜為相主其說罷公上謂大臣曰朕於諸帥聽其言則知其用心觀其所為則知其材人皆言劉錡善戰朕謂順昌之勝所謂置之死地然後生未為善戰也錡之所長在於循分守節危疑之中能自立不變此最為可取上以公知荆南府充湖北路安撫使罷其兵張俊深忌公與岳飛每言飛赴援遲而公戰不力也飛請畱公掌兵不許時有處士孫元濟聞除公荆南竊與人云譬之奕碁此著最髙也人問其故元濟曰陜蜀諸軍但知吳氏襄漢諸軍尚思岳家江陵在蜀漢之間而錡有威名為諸將所服且聞有詔或遇緩急旁郡之兵許之調發銷患未形此廟筭也非吾君大聖其孰能與此公自順昌之勝金人畏之下令有敢言其姓名者罪不赦上亦知其能遂以公為浙淮浙西制置使尋命進屯揚州公引兵屯揚州將渡江以軍禮久不講乃建大將旗鼔以行軍容整肅江浙人所未見也鎮江城中香烟如雲霧觀者塡擁公發揚州時公病上遣中使將醫往視公曰錡本無疾但邊事如此至今猶未決用兵候敵人侵犯然後使錡當之既失制敵之機何以善後此錡所以病也中使以奏公遂行日發一軍時病已不能食惟啜粥而已先是金萬户髙景山以兵數萬犯揚州公提大軍禦之於清河冦以氊裹舟載糧挽而上公募善沒者鑿舟沈之敵大驚公俄病嘔血殆不能支猶乗肩輿臨敵指揮俄而敵犯楊子橋欲以邀公公以兵保𤓰洲賊騎逼江公遣麾下設伏於皂角林與賊報戰誘賊入張弩俄發賊大敗斬景山俘數百人奏至上曰劉錡在淮東屢捷可謂與國宣力遂遣使以金五百銀七萬兩徧勞有功將士上又曰使人人如此立功將來凱旋王爵亦所不吝公在𤓰洲數日無日不戰公恐人心不固乃遣人自鎮江取妻子以安人心至是有詔令公專防江上㑹公病已劇遂肩輿渡江劉汜以千五百人塞𤓰洲渡方亮之南也枚數本朝諸大將問其下孰敢當之者皆隨姓名而答如響至公則莫有應者乃曰朕自當之順昌之役亮時年十八以萬户從軍公之勝兀术之敗亮所親見故其出師也欲自當公而卒不果有金使舘都亭驛與其副飲酒其副不肯飲訶之曰酒中安得有劉四廂何不飲有使金者見其廐卒怒詈馬之不食草者亦云葢其威名素著於南北云宋名臣言行錄别集下巻十
