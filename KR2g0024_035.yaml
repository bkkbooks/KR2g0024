body:
  text: 宋名臣言行録别集上卷三宋李幼武纂集張燾忠定公字子公饒州德興人以門廕補太學齊郎升上舍政和八年廷試三人授太學録宣和初除博士三年連丁內外艱吉再為博士靖康初李綱為京城守禦使辟兼機幕遷正字以越職言事送吏部髙宗即位例復行營及宣司官屬之責降者倅常州改湖州以論事不報請祠駕回臨安以吕頥浩薦除尚書司封員外郎改起居舍人秋以祠祿歸六年秋再以起居郎召尋權給舍改兼外制七年真拜中書舍人罷主祠尋加集撰八年召拜兵侍兼權吏書冬兼史館修撰九年秋除寶文閣學知成都府十三年冬主江州太平觀二十五年帥鄉部兼行官留守居二年進端明殿學士二十九年召還感疾除提舉萬夀觀兼侍讀再移病歸尋促覲正除吏書三十年充館伴金國賀正使疾復作加資政殿學士致仕明年冬再帥本路復主興國祠孝宗受禪除同知隆興元年遷參政以老病不拜除資政殿大學士三年薨年七十五詔求直言公疏曰陛下踐位於傾危中繼遭叛逆號令不能感人心政事不能厭人望卑詞厚禮祈還二聖未有以感動敵情豈胸中之誠未修乎又言賢不肖雜進大臣惟親舊是用金方陵犯乃欲議和淮冦縱橫乃欲實粟京師疏繆如此而侍從不言臺諫不論其職安在又請置御營司分諸將為六軍命大臣大將為使副各典一軍以收兵權舉淮南之地分置征鎮使自戰守又乞躬行實德以率百官又言欲知敵情當厚設爵賞募間探事皆預備毋蹈往嵗維揚之失又奏臣屢言規模先定乃可為國遷都大事也期年之間方進臨江復退還浙輔弼重任也一紀之間下命相之制者十有四進退執政無慮二十餘人規模安在上曰非不欲立規模正緣宰輔數易耳金廢豫使來議和秦檜主之朝論籍籍公請詢可否於衆上乃令侍從臺諫即日條奏公疏數百言大槩謂天方佑宋當自治以需天時屈膝事人非臣所知又率侍從極陳失計嘗面折御史中丞勾龍如淵曰達觀其所舉君昔薦七人後皆北面張邦昌今囁嚅附㑹墜敵計中他日必然背君親矣監察御史施廷臣擢侍御史府丞莫將賜出身超拜起居郎皆上書迎合者翻黃下吏部公執奏曰故事遷除未有如此之驟力詆兩人引疾卧家秦素厚公命樓照問疾許直翰苑公曰今日進退在我遷官則在他人某惟有去耳秦語人曰張子公守正官職不能動也和議成復河南陜西境土九年正月上以祖宗陵寢久淪異域詔公同光山軍節度使判大宗正事士㒟修奉灑掃賜銀絹有差以二月已已陛辭自武昌信陽入蔡潁五月丙戌至永安軍戊子朝謁諸陵庚寅修奉畢辛卯由鄭歷汴宋宿泗州淮南以歸六月入對公奏頻年陵下石澗涸竭使至而水流如故上驚異久之又陳使事十餘條如謂劉豫初廢人情洶洶而我斥堠不明坐失機㑹酈瓊部伍皆西陲徑兵今在河南尚可收用新疆租賦已蠲而使命絡繹推恩支費猶用兵興時例願加裁損非甚不得已勿遣使以寬民力上悉嘉納公往朝拜陵寢民夾道歡迎遂入柏城披荆履蘖隨宜葺之而去及還奏言諸陵下澗水自兵興以來久涸二使到日水即大至父老驚異以為中興之祥上問諸陵寢如何公不對惟言萬世不可忘此賊上黯然成都謀帥上語宰相張某髙明練達和正有守可寬西顧但朕惜其去耳臺評朝論亦謂當留公力請行因奏蜀困征繇臣當宣布德意寬一路之民上曰豈惟本路凡四川寬恤悉以付卿公奏主和者達蘭也今為其姪烏珠所戕勢必渝平乞道京洛關陜因得觀形勢利便謁世將於河池共議邊計且言和尚原最為衝要自原以南則入川路散失此原是無蜀也今諸軍戍陜西饋餉雖寬如緩急何宜斂兵避蜀口仍乞錢五百緡為儲峙世將奏行之公以十年春至階益與世將尺牘交馳講畫素定是夏虜果敗盟窺蜀吳璘及楊政郭浩大破之俘獲萬計其後公除西府蜀人唐文若草制云保蜀之功蓍龜先見蓋謂此也公開府適承嵗旱大發積粟以賑饑民撫存黎稚蕃部禁戢貪吏開修渠堰蠲落江田稅決遣獄訟修文翁舊學時與諸生講論經理葺諸葛武侯廟杜少陵草堂新張乖崖祠政無不舉蜀人大悅有㫖促覲公奏兩郡王名分宜早定上曰朕懷此久矣人所難言開春當議典禮公頓首謝時風俗侈靡財用匱乏公勸上止北貨之貿易省非時之賜豫罷土木減冗吏躬行節儉民自富足上嘉奬再三又言甲庫萃工巧以蕩上心酒庫酤良醖以奪官課教坊樂工員數百增俸給賜賚耗蠧不資上曰卿可謂責難於君明日罷甲庫諸局以酒庫歸有司減樂工數百人金使施宜生副使耶律翼來公館伴宜生素聞公名畏慕之一見顧翼曰是使南朝不拜詔者也宜生閩人公以首丘桑梓語之宜生敬公頗漏敵情公密奏之且言宜早為之備上深然之再帥江東完顔亮巳深入人情洶懼公不敢辭亮死褒復求和詔㳂江帥守條具進討恢復計人人馳至幽燕公獨乞持重養威觀釁而動巳而諸將追躡果無功公外和內剛臨事有仁者之勇在蜀四年尤著惠愛百姓皆繪像以事後帥李璆贊云公昔在蜀千載一人公今去蜀千百其身願公再來以慰斯民蓋實録也鄭㲄字致剛建城南鄉之龍池人政和八年以貢士中第除安陸教官待次權信陽尉用賞改承務郎監南康酒稅除臺簿髙宗即位除監察御史建炎二年除司諫又遷中丞三年苗傳誅反正升僉書樞密院事七年薨于位享年五十駐蹕錢塘苗劉逆亂以上為睿聖皇帝冊皇太子即位公庭立面折之不能奪私謂逆焰熾甚非結外援不可為者上章待罪求去將北走平江金陵與頥浩等議興復計太后降詔不允遷中丞二凶肆行殺戮日至都堂侵紊機政公奏乞告示傳等便宜軍法行之所部士卒可也餘當聞之朝廷付有司以正典刑又言近日差除多出二人之意又更迭出入都堂殆無虛日其所以敢爾者必恃兵之强也王莽之兵非不强昆陽一敗莽卒授首乞告示傳等宜一遵典法章留中不下公懇請降付三省施行亂臣雖以加害臣死職不避也章下傳等果出怨言謂直擬其為王莽雖懷恨疾然亦少戢矣聞二凶以樞密召頥浩以禮書召浚又分俊之兵以五百人歸陜西及浚不受命俊不分兵遂謫浚以散官居彬州擢俊以節度知鳳翔公知皆其姦謀假朝命使外無强兵謀臣內生變亂得以自肆遂奏乞留頥浩知金陵浚不當謫遣所親謝嚮變服為賈人徒步如平江見浚等具言城中事令嚴設兵備張聲勢持重緩進使其自遁毋致城中之變驚動三宫此為上䇿撰杜鵑詩四句親寫令携去執呈諸人以為驗詩云杜鵑飛飛無定棲寄巢生子百鳥依園林花老晝夜啼安得百鳥挾以歸取杜甫言蜀天子化作杜鵑生子百鳥巢之意以杜鵑喻天子以百鳥喻百官言內外百官當同心共謀挾天子反帝位以歸宫也嚮至平江以詩遍呈浚等莫不嗟嘆感激奮勵為赴難計忽宣詔以上為皇太弟大元帥幼主為皇太姪監國公震恐不知所為具章謂太后聽政所以保有宋宗廟社稷今乃使趙氏子孫不得居帝位二十日之間降二皇帝使天下無君詔書一出則天下貢賦不至必有仗義而起兵者䝉太后開納宣諭褒美令臣往都堂同議遂得不降詔書於四方漸謀復辟滕康字子濟應天府宋城人擢崇寧五年第調通州秋晉州推興元教除正字著佐尚書工部員外郎嵗餘移禮部為司業連丁艱靖康二年除常少擢起居舍人權給事中進起居郎兼討論祖宗法度檢討官試中書舍人罷除集撰提舉洞霄幸平江再除中書舍人左諫議翰學除端明殿學士同僉書密縣亡何除權知三省樞密院從衛太后奉神主之江表至洪遇兵渡江退保䖍州論罷提舉明道責授少監分司南京永州居住未期年許自便復左朝請大夫依前宫祠紹興二年薨年四十八八年追復龍圖閣學士上開元帥府於濟州以檄召公有詞學精贍明習憲章之語公至率先羣臣勸進請築壇如髙邑故事公相登極禮儀其告天及肆赦之文皆出公筆詞㫖激揚聞者無不感動流涕公精忠出於天性平時臨事未嘗詭隨及居論思之地知無不言見有未合於公論者必反復開陳䝉上聽納而後巳顯謨直學士孟忠厚乞用父減年轉朝奉郎公言忠厚隆祐太后之姪祖宗之來無母后兄弟之子班侍從者從之武議大夫康義用登極恩遷遙郡刺史公封還詞頭力陳義者內侍康履之父也自古召亂不出於外戚之撓法則出於內侍之干政登極恩各遷官一等義乃以御寶批降驟遷五等觀此有異於墨敕斜封乎凡再降重令行下終不從命人皆重公有守駕幸平江陛對奏曰去嵗郊禮前數日太陽示變驗之圖史為異甚大而日官不以聞朝廷不知告使陛下修厥事以應天者未至比逆臣敢萌不軌天之示象前已著明惜朝廷不知先事而戒也陛下即位行再嵗矣恩幸斂怨而幾蹈覆轍姦宄犯順而未即授首陛下盍察人心所嚮而少留聖意乎今惻怛憂民之政徒為空言而百姓不以為恩哀痛責躬之詔不著事實而四方不以為信忠佞並馳而多士解體刑賞失當而三軍沮氣臣願陛下取建炎初年以來所下詔書所舉政事熟思審度參稽得失而罷行之上褒諭有諫臣風建炎三年吕頥浩建幸武昌為趨陜計既還建康又建欲盡棄中原焚室廬徙居民於東南公力持不可時在諫省語中丞張守曰吾曹當以死爭既執政又懇言之上悟而止頥浩歎曰公真執政之才也孰能受命三日而決此大計乎諫官袁植請誅汪黃公言倘如植言傷陛下好生之德矣上首肯久之即批出罷植翌日見上曰昨日觀罷袁植之命有忠厚之言未聞殺戮之事可戒大哉王言也太祖以來未嘗戮一大臣國祚綿長過於兩漢者此也上大悅王庶敏節公字子尚慶陽人崇寧五年進士第除慶州法秦州察推改司儀曹兼秦鳳路提僉宰涇州保定縣倅懷德軍涇原經司機宜言免靖康初為陜西運判兼制置解監使歷京西漕改知懷州直徽猷陜西都漕建炎初除龍直鄜延經略安撫使兼知延安升集撰龍制節制陜西六路軍馬制置永興軍路以延安失守自劾去俄丁母憂張浚宣撫奏知興元授參議利路經撫使利夔制置使節制陜西五路加徽直知成都又改嘉州俄奉祠被宣撫使劾提舉太平觀復起為參謀改知遂寧辭復宫觀再詔除湖北安撫知鄂州復顯制改知荆南府荆河北安撫使七年復徽直除兵侍八年遷兵書除樞副視師江淮金使來促還以疾乞罷以資學知潭州兼湖南安撫使明年言者劾罷提舉洞霄宫十二年責嚮德軍節度副使道州安置冬卒貶所隆興中追復資學左通議大夫金人入冦公方調官京師李邦彥問計公曰朝廷宿將名動夷夏者無踰种師道宜付以西兵使入援然後遣使諭河北河東州守各置兵並河要害處或果敢疾驅渡河犯畿甸可詔兩河州縣各部勒軍馬邀截其歸路京師持重固守出竒兵絶其樵採不過兩月使無匹馬隻輪之返邦彥未能決明日以告樞密院蔡攸曰陜西豈復有兵有亦安可用公曰某近以涇原幕屬罷本路步騎號十餘萬備邊外尚可得十萬不兩月可集京師他何慮哉不能用建炎初年詔公治延為鄜延經略力辭八月麟府丹等州告急遂分遣兵將自撫州而南㳂河至馮翊據守要害賊乘氷渡河犯晉寧繼侵丹州公遣别將捍賊屢克明年賊至馮翊清水河渡兵破潼關諸處公初聞賊渡河檄諸路約共討賊而迄無應者獨遣劉光烈斷河橋與賊戰於窟泉乘勝破大散關賊犯鄜坊公乃并河東援兵從間道據守要害時危急報至公掃壁赴救將至靈畤賊火康定而去兵有自熙河還者併趨龍坊公復進兵同官檄劉延亮設伏於神水峽邀其歸路賊知公至一夕而遁知延安以涇原統制曲端為都統制公政嚴多誅殺將士嘗曰設曲端誤我亦當斬之端聞而恨未有以報時敵驟至延安正軍才二萬公召諸路兵未集端不出兵為援公退屯龍坊金乘虛陷延安數日端至以兵衛公且曰節制何自至此哉節制固知愛身不知為天子愛城乎公曰吾數令不從誰其愛身者端怒謀即軍中誅公而併其兵因問公印何在欲奪之㑹朝廷遣謝亮使夏國端夜往見之曰延安五路喉襟今既已失春秋大夫出疆之義得以専之使者茍一誅敗將南歸而報乃使者展節之時也亮曰奉使有㫖以人臣而擅誅於外是跋扈也公為則可自為之亮無預也端乃去公以故忿端欲殺之張浚自富平敗歸始思曲端及公之言可用公時持母喪居蜀乃併召之公地近先至㑹浚於平涼適慕洧西叛金人侵軼不巳衆議退屯川口以俟變定浚連夜西還公力陳撫秦保蜀之䇿勸進收熙河秦鳳兵扼龍關以為後圖浚不納浚承制復公龍圖待制知興元時敵已逼河池浚謂公曰不早聽公勢果乃爾興元屏翰四蜀公能為我保此乎公曰某獨為相公疏逺客請先所親乃復遍詢張深陳唐劉子羽孫渥輩皆屏氣失色公毅然起曰諸公平日自言以忠許國事危皆逡巡私已忠國家者如是乎公遂受命羽書益急張深劉子羽徑趨小益行府移閬中而興元帥事草創留統制司王宗尹柴斌兵二千馬不滿百使公守公募民為兵教以坐作進退之法廣張聲勢示之威嚴虜懾公威名遂略階成鳳三州而退相繼河東陜西潰師多舊部曲往往來歸不數日有精兵二萬公又籍興元府梁洋諸州邑及三泉强壯每兩丁取一三丁取二與免户下物力錢二百千號曰義士每五十人為一隊知縣為軍正尉為軍副日閲武於縣月閲武於州不半年有兵數萬每遇州教則厚犒賞之教閲有方可以出戰則令尉改京秩張浚言於朝其後合興洋三泉四郡義士至七萬餘人公知荆南府兼湖北經略安撫使公既老愈通習天下事因入對首言今日之患莫大於士氣之委靡願振拔名節士起其氣又論安危在修己治亂在立政成敗在用人上韙其言公因請曰臣肝膽未盡吐也願賜臣間得縷數于前上乃燕見之公言益深嘗跪而問曰陛下欲保江南無所復事如曰紹復大業都荆為可荆州左吳右蜀利盡南海前臨江漢可出三川涉大河以圖中原曹操所以畏關羽也上大異之時荆南屢為盜殘公至鎮江與士卒披荆棘致材用治城隍繕府庫廨舍畢修陶瓦為民室廬闢市區如承平時流庸四集公乃下令有欲吾田者肆耕其中吾不汝賦有能持吾錢出而得息者視其息與去之日多少授其職有差武吏爭出應令未幾還輸其息府庫大充得以養兵遂成軍隱然為雄藩公為兵部尚書論制敵之道在於愛民周文王問太公以為國太公曰愛民而巳兵書無不本諸愛民者今縉紳無一言及民何也敵之强弱吾無與也顧在我者何如耳古之巳衰而興者未有不由於威令行紀綱立既盛而衰者未有不由於威令不行紀綱不立求古之言不若論今之事羣臣有言慮合聖心者願略煩文為簡易與之反覆圖成敗上歎曰大臣才也遂除公樞密副使三辭不聽遂論江西淮南廣東盜發四十餘輩出於凍饑宜蠲平賦役治部使者守令貪虐以慰安其心且曰負陛下恩德壞陛下天下者彼則去矣陛下為宗廟社稷主何所之乎自酈瓊叛張浚擅棄盱眙而歸諸將稍肆紹興戊午命公視師江淮公素有威嚴臨發勞師於都教場軍容嚴整公便服坐壇上自大將三衙以下雖身任使相悉以戎服步由轅門庭趨受命拜賜而出莫敢仰視自多事以來所未有時殿前都虞候楊沂中怒繫其統制吳錫户侍向子諲謂錫可用公奏釋之使統兵屯淮西遂以張俊前部張宗顔將七千駐淮西巨師古將三千屯太平州取韓世忠兩軍屯天長泗州使緩急相為聲援劉錡軍鎮江為左根本時朝廷以諸將權重欲撫循偏禆以分其勢張俊覺之謂行府錢糧官劉時曰鄉人能為我言於子尚否易置偏禆似未宜遽先處巳可也不知身在朝廷之上能幾日公聞之曰為我言於張七不論安與未安但一日行一日事耳公初論金不可和於道上疏者七及見上又六疏有曰先帝北征而不復天地鬼神為之憤怒陛下與賊有不共戴天之仇忍復見其使乎其將何以為心其將何以為容其將何以為說且彼之議和割地不過以畫河畫淮二者而巳若曰畫淮則我之固有而淮之外亦有見今州縣所治如泗州漣水軍是也既為我有何用和為若曰畫河則東西數千里荆棘無人之地倘欲宿兵守之財賦無所從出彼必厚索嵗帛以重困我矣不如拘其使而怒之及金使至公再上章力執前議有曰陛下當北狩之役龍飛睢陽匹馬渡江扁舟航海以至苗劉之變艱難萬狀終無所傷天之相陛下厚矣至今雖未能克復故疆鑾輿順動而大將互列而官軍雲屯百度修舉較前之日可謂小康何苦不念父母之仇不思宗廟之恥不痛宫闈之辱不恤百姓之寃逆天違人以事金人乎秦檜方挾金自重以為功絀其說公語之曰公不思東都抗節存趙時而忘此仇耶檜大恨公又抗章求去遂以副樞出知潭州尋詔落職典祠檜怒公異已不附和議諷言者論其居江州强奪民田責授節副道州安置後卒于貶所其子之荀之竒撫棺而哭曰秦檜秦檜此讐必報親舊皆掩其口曰禍未巳也沈與求字和仲湖州人政和五年登進士第靖康初為常博建延末為侍御史紹興二年除中丞遷吏書三年提舉太平觀七年以龍圖直學知鎮江召為吏書兼權翰學兼侍讀除參政五年兼樞密院六年除資政殿學士知明州未幾提舉洞霄七年除同知密院尋知院六月卒年五十二公以軍儲窘乏首陳屯田利害為集議二卷上之又言先務之急莫如兵今兵權不在朝廷雖有密院及兵房兵部但奉行文書而巳願詔大臣講求利害益修軍政助成中興公居侍御占象者言夜有赤氣亘天有白氣如練貫之公言此天心仁愛陛下出變示警也且天子所在謂之朝廷今䖍州一朝廷秦州一朝廷號令之極至為詔矣願敕張浚等止降指揮勿得為詔令又論相天子之職也願親書所屬意之臣姓名禱於天地占而用之仍舉行開寶故事使參政得與宰相輪日知印又論劉光世軍名及罷浙西預借苗米置諸軍功罪簿詔三省以次施行公言徽嚴水泉暴湧漂及城郭廬舍臨安火延居民至萬餘家天變異常同時而見可畏也陛下當於行事之際思其所未至者加之以誠則天地感格隂陽和平災異之生顧為福耳逆豫於京東造舟則海道當防議者多欲於明州向頭設備公言使賊舟得至向頭則巳入吾腹心之地矣如通州料角泰州石港水勢湍險海舟至此必得沙上水手方能轉入倘於此為備益拘水手養之以待用則虜亦安能衝突詔以付都督府上飭近侍出金盤樽斚賜光世三帥酒一行并以所飲食器賜之陛辭而退公曰將軍國之爪牙推轂受帥則聞之矣天子御坐賜巵酒而親勸之未之前聞其禮甚重臣聞英宗待司馬光嘗有是賜其後淵聖用李綱實踵行之光世等乃䝉寵榮如此必思所以圖報公再居言路或疑其論范宗尹所引用者悉出之公曰近世人材視宰相出處為進退蓋習以成風今當别人之正邪能否而公言之豈可謂一時所用皆不賢而使視宰相為進退哉汪徹莊敏公字明逺饒州浮梁人登紹興八年進士第主新喻簿改吉州教憂吉改沅衡二州教二十六年万俟卨相薦為正字遷校書郎二十九年擢監察御史尋進侍御三十年知密院八月遷侍御明年除中丞荆襄宣諭三十二年入對拜參政六月視師荆襄隆興初入奏乞祠除資政學士提舉洞霄宫罷居台州明年冬復端明學士知建康乾道初召知密院升樞使二年引疾以觀文學士再領洞霄越三月起知鄂州兼管內安撫使改知寧國四年改福州帥本路七年告老八月薨年六十三孫道夫奉使北境回言金主亮詰以關陜買馬非約恐將求釁于我公因言立國惟文武二道而人才尤不可偏要當求於無事之時望詔帥臣監司於本路大小使臣舉智謀可充將帥勇鷙可率士卒者其侍從臺諫如有所知亦許論薦公為侍御極陳利害且曰慮之有素則事至而安靜慮之無素則事至而倉猝自講和以來諸將擁重兵髙爵厚祿養成驕恣朝廷宜有以懾其心作其氣戰士役以伎藝而老病之不汰逃亡之不補宜有以搜閲之使有鬬心而樂為用文武官平居常患其冗臨事則無人可用當預選實才不泥資格以備緩急之用公上言昔慶歷之初京師一日無雲而震仁宗以天變如此由夏竦姦邪亟命黜之前日無雲而有雷聲人情駭異其變蓋在大臣紹興辛巳正月夜風雷雨雪交作公言春秋魯隱公時大震電繼以雨雪孔子以八日之間再有大變謹而書之今一夕之間二異交至隂盛也今臣下無姦萌戚屬無乖剌又無女謁之私意者殆為金人乎願陛下飭大臣常謹於備邊也公言天下之勢强弱無定形在吾所以用之陛下屈已和戎厚遺金繒而彼輒出惡言以憾吾國若將唾掌而取三尺之童無不痛憤願陛下赫然睿斷置帥江上而専付閫外之任益兵上流而增重荆襄之勢渡師淮甸而守其要害嚴備海道而遏其牽制然後以不共戴天之讐在原之戚下詔以告中外將見上下協心其氣百倍機㑹之來間不容髮在陛下斷之而巳公為中丞入對言講和之久將帥養驕軍政隳弊軍士之廩給薄者幾無以自活宜優恤之以養其力又言淮南山水寨舊來鄉豪自相結習當隨宜存恤使自為守無令監司州縣擾之庶收其用又言軍旅將起宜條其不急大加節約以徇今日之務從之公為湖北京西宣諭使自鄂渚至襄陽撫諸軍御前都統制田師中握兵久且耄公恐緩急不可仗奏罷之議者又欲置襄陽而并力守荆南公奏襄陽重地為荆楚門户不可棄也夀皇登極命公督師荆襄公遣趙樽守唐王宣守鄧别選偏將分據要害又請賜皇甫倜軍號官爵初蜀師頓德順軍為金所圍公欲以兵助倜牽制之㑹上命中使齎手筆勞公曰卿文武兼資以戰以守臨機制變公因奏金方併力拒西師宜分遣趙樽王宣潜師襲洛仍令兩淮犄角中原遺民必響應一舉可定豈特解西師而巳上以議和喻㫖未宜逺略公念襄漢宿兵饋糧艱阻昔之沃壤彌望荆榛乃與漕臣議因古長渠築堰通流募閒民汰冗卒十人為甲五甲為隊三隊為屯授地給牛各有等差付之種谷授之廬舍而薄其課秋成苐輸種餘谷官以緡錢市之畫為三十八屯規模詳密人方勸趨而西師退保敵勢遂張蓋隆興初年也周麟之字茂振祖居成都後為海陵人䇿進士尉常州武進中宏博第一宣州教不赴授學録兼祕省校勘敕令所刪定改正字尋權中舍責徽州倅髙宗更化除著佐郎兼禮部員外郎進大著起居舍人復攝西掖真拜中書舍人兼實録院同修撰直學士院上徽宗實録兼同修國史拜兵侍南郊充執綏徙給事中除翰學兼侍讀使金還兼吏書纍官佐朝奉大夫紹興三十年同知樞密再命使金力辭責祕監分司南京居瑞州孝宗登極沛恩復故官沮之者特許自便隆興二年薨年四十七南渡三十五載金人渝盟天子茹威未討議遣使賀遷謂是役也將覘國厭難視常時萬不侔矣公曩嘗修好為所敬禮即出節命之受詔治任行有日㑹天申節慶使至特嫚書指各將相大僚且索兩淮襄漢地中外噫鳴人自為忿翌日公入奏言金之意可卜宜練甲申警靜以觀變使不當遣上曰卿言是也彼欲割地今何以應之公對曰講信之始分畫封圻故應有載書存願出以示使者厥請將自塞如公計其人果無語上既奮然濯征獨玉帛之舉朝論未一公語所親曰死國臣子常分況吾素志耶借殺身而有益國家其甘如飴顧今不可耳遂上疏極爭之曰臣聞事有必至理有固然固不待上智而後知昔日之和戎今日之渝平是已纍日已來側聽聖訓仰見廟謨雄斷不惑羣䇿惟是遣使一事遲回至今曉夕深思蓋有不可者七若彼有速亡之形我有恢復之冀有血氣者類能言之在陛下審處而應之耳臣當竭智畢力協贊事機倘使搖尾乞憐復下穹廬之拜臣切恥之疏入上大怒陳康伯見公以國事勉之公語侵康伯康伯曰上若遣某聞命即行公卒辭之詔撰張浚碑文成奏御天筆批其後十八字曰志銘敘事詳盡造語簡要披覽再四但有歎嘉士林傳玩以為寵公姿儀灑落進止凝重班冠玉筍望之者意神仙中人宋名臣言行録别集上卷三
