body:
  text: 宋名臣言行録外集卷五宋李幼武纂集邵雍康節先生字堯夫其先范陽人徙衡漳又徙共城三十嵗來遊於洛葬其親於伊川遂為河南人嘉祐中詔舉遺逸留守王拱辰薦之授試將作監簿熙寧初復求逸士中丞吕誨等復薦之補頴州團練推官三辭不獲而後受命終稱疾不之官十年卒年六十七贈祕書省著作郎元祐中特賜諡始學於百源堅苦刻厲冬不爐夏不扇夜不就席者數年衛人賢之先生歎曰昔人尚友千古而吾未嘗及四方遽可已乎於是走吳適楚過齊魯客梁晉久之而歸曰道在是矣蓋始有定居之意少時自雄其才慷慨有大志既學力慕髙逺謂先王之事為可必致及其學益老德益劭玩心髙明觀於天地之運化隂陽之消長以達乎萬物之變然後頽然其順浩然其歸在洛三十年始至蓬蓽環堵不蔽風雨躬爨以養其父母居之裕如講學於家未嘗強以語人而就問者日衆鄉里化之逺近尊之士人之道洛者有不之公府而必之先生之廬先生德氣粹然與人言必依於仁義忠信樂道人之善而未嘗及其惡故賢者悅其德不賢者服其化所以厚風俗成人材者先生之功多矣先生之學得之於李挺之挺之得之於穆伯長推其源流逺有端緒而先生淳一不雜汪洋浩大其所自得者多矣覃思於易夜不設席旦不再食三年而學以大成大名王豫天悅瑰偉博達之士也精於易聞先生之篤志愛而欲教之與語三日得所未聞始大驚服卒捨其學而學焉於書無所不讀著皇極經世六十卷晚猶喜為詩平易而造於理有擊壤集二十卷自為之序居洛四十年安貧樂道自云未嘗攢眉所居寢息處為安樂窩自號安樂先生又為甕牖讀書燕居其下旦則焚香獨坐晡時飲酒三四甌微醺便止不使至醉也嘗有詩云斟有淺深存燮理飲無多少係經綸莫道山翁拙於用也能康濟自家身大寒暑則不出每出乘小車用一人挽之為詩以自詠曰花似錦時髙閣望草如茵處小車行司馬公贈以詩曰林間髙閣望已久花外小車猶未來隨意所之遇主人喜客則留三五宿又之一家亦如之或經月忘返雖性髙潔而接人無賢不肖貴賤皆歡然如親嘗自言若至大病自不能支其遇小疾得有客對話不自覺疾之去體也學者來從之問經義精深浩博應對不窮思致幽逺妙極道數間與相知之深者開口論天下事雖久存心世務者不能及也與富文忠早相知富初入相謂門下士田棐大卿曰為我問邵堯夫可出當以官職起之不即命為先生處士以遂隱居之志田為先生言先生不答以詩謝之曰相招多謝不相遺將謂胸中有所施若進豈能禁吏責既間安用更名為願同巢許稱臣日甘老唐虞比屋時滿眼清賢在朝列病夫無以繫安危富終不相忘乃因明堂祫享赦詔天下舉遺逸富意謂河南必以先生應詔時文潞公尹洛以兩府禮召見先生先生不屈遂以福建黃景應詔富不樂奏乞再舉遺逸從之王拱辰尹洛乃以先生應詔穎川薦常秩皆先除試將作監簿先生與秩皆不起富時已丁憂去位矣熙寧二年詔舉遺逸吕誨吳充祖無擇皆薦先生時歐公參政素重秩故穎州再薦秩先生除祕書省校書郎穎州團練推官辭不許既受命即引疾不起且以詩答鄉人曰平生不作皺眉事天下應無切齒人斷送落花安用雨裝添舊物豈須春幸逢堯舜為真主且放巢由作老臣六十病夫宜揣分監司無用苦開陳秩以職官起時王介甫方行新法天下紛然以為不便思得山林之士相合秩賜對盛言新法之便乃除諌官以至待制帝浸薄之介甫主之不忘然亦知其為人矣始為隱者之服烏帽縚褐見卿相不易也溫公依禮記作深衣冠簮幅巾紳帶每出朝服乘馬用皮匣貯深衣隨其後入獨樂園則衣之嘗謂先生曰先生可衣此乎先生曰某為今人當服今人之衣溫公歎其言合理熙寧三年初行新法天下騷然先生閒居林下門生故舊仕宦四方者皆欲投劾而歸以書問先生先生曰正賢者所當盡力之時新法固嚴能寬一分則民受一分之賜矣投劾而去何益嘗過士友家晝卧見其枕屏畫小兒迷藏題詩其上云遂令髙卧人欹枕看兒戲蓋熙寧間也熙寧中洛陽以清德為朝廷尊禮者大臣曰富韓公侍從曰司馬溫公吕申公位卿監以清德早退者十餘人好學樂善有行義者幾二十人先生隱居謝聘皆相從忠厚之風聞於天下里中後生皆知畏亷恥欲行一事必曰無為不善恐司馬端明邵先生知富公自汝州得請歸洛養疾築第與先生天津隱居相邇富曰自此可時相招矣先生曰某冬夏不出春秋時間過親舊間公相招未必來不召或自至富謝客戒子曰先生來不以時見先生一日過之富作詩云先生自衛客西畿樂道安閒絶世機再命初筵終不起獨甘窮巷寂無依貫穿百代嘗探古吟詠千篇亦造微珍重相知忽相訪醉和風雨夜深歸富嘗令二青衣蒼頭掖之以行一日與先生論天下事富喜甚不覺獨步下堂先生不為起徐指二蒼頭戲富曰忘却柱杖矣富常患氣痞先生曰好事到手畏慎不為他人做了鬱鬱何益富笑曰此事未易言也蓋為嘉祐建儲耳富雖剛勇遇事詳審不萬全不發先生因戲之富一日有憂色先生問之富曰先生度某之憂安在先生曰豈以安石罷相惠卿參政惠卿凶暴過安石乎富曰然先生曰公無憂安石惠卿本以勢利合勢利相敵將自為仇矣不暇害他人也未幾惠卿果叛安石富謂先生曰先生識慮絶人逺矣一日薄暮溫公見先生曰明日僧修顒開堂說法富公晦叔欲偕往聽之晦叔貪佛已不可勸富公果往於理未便光後進不敢言先生曷不止之先生曰恨聞之晚矣明日富果往後先生因見富謂曰聞上欲用裴晉公禮起公富笑曰先生以謂某衰病能起否先生曰固也或人言上命公公不起一僧開堂公乃出無乃不可乎富驚曰某未之思也富以先生年髙勸學修養先生曰不能學人胡走亂走也熙寧癸丑王荀龍仲賢魏公客也因入洛見先生出魏送行詩顔體大書極竒偉先生曰吾少日喜作大字李挺之曰學書妨學道故嘗有詩曰憶昔初書大字時學人飲酒與吟詩若非益友推金石四十五年成一非洛之交逰年長者拜之年等者友之年少者以子弟待之未嘗少異於人故得人之歡心每嵗春二月出四月天漸熱即止八月出十一月天漸寒即止故有詩云時有四不出大風大雨大暑大寒㑹有四不赴公㑹葬㑹生㑹醵㑹每出人皆倒屣迎致雖兒童奴𨽻皆知尊奉每到一家子弟家人爭具酒饌問其所欲不復呼姓氏但曰吾家先生至也雖閨門骨肉間事有未決者亦求教先生以至誠為之開諭莫不悅服十餘家如先生所居安樂窩以待其來謂之行窩故其沒鄉人挽詩云春風秋月嬉遊處冷落行窩十二家洛陽風俗之美如此治平間與客散步天津橋上聞杜鵑聲慘然不樂客問其故則曰洛陽舊無杜鵑今始至有所主客曰何也先生曰不二年上用南士為相多引南人専務變更天下自此多事矣客曰聞杜䳌何以知此先生曰天下將治地氣自北而南將亂自南而北今南方地氣至矣禽鳥飛類得氣之先者也春秋書六鷁退飛鸜鵒來巢氣使之也自此南方草木皆可移南方疾病瘴瘧之類北人皆苦之矣至熙寧初其言乃驗謂本朝五事自唐虞而下所未有者一革命之日市不易肆二克服天下在即位後三未嘗殺一無罪四百年方四葉五百年無心腹患熙寧十年夏感微疾氣日益耗神日益明笑謂溫公曰雍欲觀化一巡如何溫公曰未應至此先生笑曰死生亦常事耳張橫渠喜論命來問疾因曰先生論命否當推之先生曰若天命則已知之矣世俗所謂命則不知也橫渠曰先生知天命矣載尚何言程伊川曰先生至此他人無以為力願自主張先生曰平生學道豈不知此然亦無可主張時居正寢諸公議後事於外有欲葬近洛城者先生已知呼伯溫入曰諸公欲以近城地葬我不可當從伊川先塋耳七月初四日大書詩一章曰生于太平世長于太平世死于太平世客問年幾何六十有七嵗俯仰天地間浩然獨無愧以是夜五更捐館伊川又問從此永訣更有見告乎先生舉兩手示之伊川曰何謂也先生曰面前路徑須令寬路窄則自無著身處況能使人行也辨惑明道言堯夫病革言試與觀化一遭子厚言觀化他人便觀得自家又如何觀得化嘗觀堯夫詩意才做得識道理却於儒術未見所得又云堯夫臨終時只是諧謔須臾而去以聖人觀之則亦未是蓋猶有意也比之常人甚懸絶也他疾甚革頥往視之因警之曰堯夫平生所學今日無事否他氣微不能答次日見之却有聲如絲髮來大答云你道生薑樹上生我亦只得依你說是時諸公都在㕔上議後事他在房間便聞得諸公恐喧他盡出外說話他皆聞得一人云有新報云云堯夫問有甚事曰有某事堯夫曰我將為收却幽州也以他人觀之便以為怪此只是心虛而明故聽得問堯夫未病時不如此何也曰此只是病後氣將絶心無念慮不昏便如此又問亦先知死何也曰只是一箇不動心釋氏平生只學這箇事將這箇做一件大事學者不必學他但燭理明自能之只如堯夫事他自如此亦豈嘗學也元祐中韓康公尹洛請諡于朝常博歐陽棐議曰君少篤學有大志久而後知道德之歸且以為學者之患在於好惡先成乎心而挾其私智以求於道則蔽於所好而不得其真故求之至於四方萬里之逺天地隂陽屈伸消長之變無所不可而必折衷於聖人雖深於象數先見默識未嘗以自名也其學純一而不雜居之而安行之而成平夷渾大不見圭角其自得深矣云云按諡法溫良好樂曰康能固所守曰節按朝以道集叔弼後謂以道曰棐從母王宣徽夫人得疾洛陽先妣夫人亟以棐入洛時先公參大政臨行告戒曰洛中有邵堯夫吾獨不識汝為吾見之棐既至洛求教先生特謂棐徐道其立身本末甚詳出門揖送猶曰足下其無忘鄙野之人於異日棐伏念先生未嘗辱教一言雖欲不忘亦何事耶歸白大人則喜曰幸矣堯夫有以處吾兒也後二十年棐入太常為博士次當作諡議乃恍然周省先生當時之言落筆若先生之自序無待其家所上文字也張岫述其行略曰先生治易書詩春秋之學窮意言象數之藴明皇帝王霸之道著書十餘萬言研精極思三十年觀天地之消長推日月之盈縮考隂陽之度數察剛柔之形體故經之以元紀之以㑹參之以運終之以世又斷自唐虞訖于五代本諸天道質以人事興廢治亂靡所不載其辭約其義廣其書著其㫖隱嗚呼美矣至矣天下之能事畢矣明道銘其墓曰嗚呼先生志豪力雄闊步長趍凌髙厲空探幽索隱曲暢旁通在古或難先生從容有問有觀以沃以豐天不憗遺哲人之凶云云晦庵贊其畫像曰天挺人豪英邁蓋世駕風鞭霆厯覽無際手探月窟足躡天根閒中今古醉裏乾坤二程待太中公訪先生於天津之廬先生攜酒飲月陂上歡甚語其平生學術出處之大致明日明道謂周純明曰昨從堯夫先生游聽其議論振古之豪傑也惜其無所用於世周曰所言何如曰內聖外王之道也謂程子曰子雖聰明然天下事亦衆矣子能盡知耶子曰天下之事頥所不知者固多然堯夫所謂不知者何事時適雷起堯夫曰子知雷起處乎子曰頤知之堯夫不知也堯夫愕然曰何謂也子曰既知之安用數推之以其不知故待推而後知堯夫曰子以為起於何處子曰起於起處堯夫愕然稱善朝以道嘗以書問邵之數于伊川伊川答書云頥與堯夫同里巷居三十餘年世間事無所不問惟未嘗一字及數先生與商州趙守有舊時章惇作商州令趙厚遇之一日趙請先生與章同㑹章議論縱橫不知敬先生也因語及洛中牡丹之盛趙因謂章曰先生洛人也知花為甚詳先生因言洛人以見根撥而知花之髙下者知花之上也見枝葉而知者知花之次也見蓓蕾而知者知花之下也如公所說乃是知花之下也章慙服默然趙因謂章從先生學章從先生游欲傳數學先生謂章須十年不仕宦乃可學蓋不之許也上蔡云堯夫直是豪才在風塵時節便是偏霸手段如富公身都將相嚴重有威人不敢仰視他將做小兒樣看或問邵所學何如謝曰他只見得天理進退萬物消長之理便敢做大於聖人門下學上達事更不施工所以差却堯夫精易之數事物之成敗終始人之禍福修短算得來無毫髮差錯如指此屋便知起於何時至某年月日而壞無不如其言然二程不貴其術明道云堯夫欲傳數與某兄弟某兄弟那得工夫要學須二十年工夫堯夫初學於李挺之師禮甚嚴雖在一野店飯必襴坐必拜欲學堯夫亦必如此伯淳聞說甚熟一日因監試無事以其說推算之皆合出謂堯夫曰堯夫之數只是加一倍法以此知太𤣥都不濟事堯夫驚拊其背曰大哥你怎恁地聰明他日伊川問明道加倍之數曰都忘之矣因嘆其心無偏繫者如此伯溫云邢和叔亦欲從先君學先君略為開其端倪和叔援引古今不已先君曰姑置是此先天學未有許多言語且當虛心滌慮然後可學此和叔留别詩有圯下每慙呼孺子床前時得拜龎公之句先君和云觀君自比諸葛亮顧我殊非黃石公斷章云出人才業尤須惜慎勿輕為西晉風上蔡云堯夫之數邢七要學堯夫不肯曰徒長姦雄程曰皓接人多矣不雜者三人張子厚邵堯夫司馬君實或問康節詩嘗有莊老之說如何朱子曰便是他有些子這個曰如此莫於道體有異否曰他常說老子得易之體孟子得易之用體用自分作兩截程子謂其不雜以今觀之亦恐未然程曰堯夫放曠又曰堯夫猶空中樓閣朱子曰程子稱之言看得四通八達又曰堯夫豪傑之士根本不帖帖也堯夫有詩云頻頻到口微成醉拍拍滿懷都是春又曰梧桐月向懷中照楊栁風來面上吹不止風月言皆有理又曰卷舒萬古興亡手出入幾重雲水身若莊周大抵寓言要入他放蕩之場堯夫却皆有理故要得從心妄行總不妨堯夫又得詩云聖人喫緊些兒事其言太急迫此道理平鋪地放著裏何必如此堯夫之學先從理上推意言象數言天下之理須出於此四者我得此大者則萬事由我無有不定然未必有術要之亦難以治天下國家其為人則直是無禮不恭堯夫詩雪月風花未品題他便把這些事便與堯舜三代一般此等語自孟子後無人曽敢如此道來直是無端須信畫前元有易自從刪後更無詩這箇意思元古未有人道來並程語朱子曰雪月風花未品題此言事物皆有造化問他說風花雪月莫是曽㸃意思否朱曰也是見得眼前這個好曰意其有與自家意思一般之意曰也是他有這些子若不然却淺陋了問康節心胸如此快活廣大安得如之曰他是甚麼樣工夫下並朱子語問近日學者有厭拘撿樂舒放惡精詳喜簡便者自謂慕堯夫為人如何曰邵子這道理豈易及哉他胸襟中有這個學能包括宇宙終始古今如何不做得大放下得今人却恃個甚復敢如此因誦其詩云日月星辰髙照耀皇王帝伯大鋪舒可謂人豪矣言康節為人須極㑹處置事為他神間氣定不動聲氣須處置得别蓋他氣質本來清明又養得來純厚又不曽枉用了心他用心都在緊要上為他靜極了看得天下事理精明嘗於百原深山中闢書齊獨處其中王勝之嘗乘月訪之必見其燈下正襟危坐雖夜深亦如之若不是養得至靜之極如何見得道理到此他看見天下之事才上手來便成四截其先後緩急莫不有定動中機會事到面前便處置得下康節甚喜子房以為子房善藏其用以老子為得易之體孟子為得易之用合二者而用之想見善處事康節詩儘好看問舊見無垢引心贊云廓然心鏡大無倫盡此規模有幾人我性即天天即性莫於微處起經綸不知如何曰是殆非康節之詩也林少穎云朱內翰子發作也如康節云天向一中分造化人從心上起經綸多少平易實見得者自别又問一中分造化曰本是一個而消息盈虛便生隂陽事事物物皆恁地邵詩云真樂攻心不奈何熹謂此非真樂也真樂便不攻心如顔子之樂何嘗恁地先生誦其詩云施為欲作千鈞弩磨礪當如百錬金問千鈞弩如何曰只是不妄發如子房在漢謾說一句當時承當者便須百碎問邵詩云須探月窟方知物未躡天根豈識人又先生贊之云手探月窟足躡天根莫只是說隂陽否答云先天圖自復至乾陽也自姤至坤隂也陽生人隂生物手探足躡亦無甚意義但姤在上復在下上故言手探下故言足躡或誦其詩云若論先天一事無後天方要著工夫先生問如何是一事無對曰出於自然不用安排先生默然問康節男子吟曰詩乃是說他先天圖數之從起處天根月窟指復姤二卦而言先天乃伏羲本圖非康節自作雖無言語而所該甚廣凡今易中一字一義無不自其中流出者太極却是濓溪自作發明易中大槩綱領意思而巳故論其格局則太極不如先天之大而詳論其義理則先天不如太極之精而約蓋合下規模不同而太極終在先天範圍之內又不若彼之自然不假思慮安排也若以數言之則先天之數自一而二自二而四自四而八以為八卦太極之數亦自一而二剛柔自二而四剛善剛惡柔善柔惡遂加其一以為五行而遂自及於萬物蓋物理本同而象數亦無二致但推得有大小詳略耳周子從理處觀邵子從數上觀皆只是此理問先天圖隂陽自兩邉生若將坤為太極與太極圖不同如何曰他自據他意思說即不曽契勘濓溪底若論他太極中間虛者便是他亦自說圖從中起今不合披橫圖在中間塞却待取出放外他邉生者即是隂根陽陽根隂這個有對從中出却無對問先天圖有自然之象數伏羲當初亦不知其然否曰也不見得如何但圓圖是有些子造作模樣如方圖只是據見在底畫圓圖便是就這中間拗做兩截恁地轉來底是竒恁地轉去底是偶便有些不甚依他當初畫底然伏羲當初也只見箇太極下面有個隂陽便知是一生二二又生四四又生八恁地推將去做成這物事先天圖一日有一個恁地道理一月有一個恁地道理以至合元會運世十二萬九千六百嵗亦只是這個道理先天圖今所寫者是以一嵗之運言之若大而古今十二萬九千六百年亦只是這圈子小而一日一時亦只是這圈子都從復上推起去問圖雖無文終日言之不離乎是何也曰一日有一日之運一月有一月之運一嵗有一嵗之運大而天地之終始小而人物之生死逺而古今之世變皆不外乎此先天圖傳自希夷又自有所傳蓋方士技術用以修煉參同契所言是也邵子天地定位否泰反類一詩正是發明先天圓圖之義此圖只是精微不起於康節希夷以前巳有只是祕而不傳問圖心法也圖皆自中起萬事萬化生乎心何也曰其中間白處便是太極三十二隂三十二陽便是兩儀十六隂十六陽底便是四象八隂八陽底便是八卦康節云先天圖心法皆從中起且只說圓圖又云文王八卦應地之方這是見他不用卦生底次第序四正卦出四角似那云云意思問邵之學似揚雄如何曰數言熹看康節易了都看别人底不得他說那太極生兩儀兩儀生四象人都無甚𤣥妙只是從來更無人識揚子太𤣥一𤣥三方九州二十七部八十一家亦只是這個他却識只是以三為數皆無用了他也只是見得一個粗底道理後人便都無人識太元擬易方州部家皆自三數推之𤣥為之首一以生三為三方三生九為九州九生二十七為二十七部九九乘之斯為八十一家首之以八十四所以凖六十四卦贊之以七百二十九所以凖八十四爻無非三數推之康節之數州是加倍之法康節其初想只是得太極生兩儀兩儀生四象心只管在那上轉久之理自透徹想見一舉眼便成四片其法四之外又有四焉凡物才過到二之半時便煩惱了蓋已漸趨於衰也謂如是花方蓓蕾則知其將盛既開則知其將衰其理不過如此理在數內數又在理內康節是見得一個盛衰消長之理故能知之若說他知得甚事如歐陽叔弼定諡之類此知康節之淺者也問康節數學曰且未須理會數自是有此理有生便有死有盛必有衰且如一朵花含蘂時是將開略放時是正盛爛熳時是衰謝又如看人即其氣之盛衰便可以知其生死蓋其學本於明理若曰渠能知未來事則與世間占覆之術何異其去道逺矣其知康節者末矣蓋他玩得此理熟了事物到面前便見更不待思量康節以四起數疊疊推去自易以後無人做得一物如此整齊包括得盡想他每見一物便成四片了但才到二分以上便怕乾卦方中便知有個姤卦來蓋緣他於起處推將來至交接處看得分曉康節易數出於希夷他在靜中推見得天地萬物之理如此又與他數合所以自樂問康節善談易見得透徹曰然伊川又輕之嘗有柬與橫渠云堯夫說易好聽今夜試來聽他說看某謂此便見伊川不及孔子處只觀孔子便不如此伊川之學於大體瑩徹而小節目猶有疏處康節能盡得事物之變而大體乃有未粹易是互相博易之義觀先天圖可見東邉一畫隂便對西邉一畫陽蓋東一邉本皆是陽西一邉本皆是隂東邉隂畫皆是自西邉來西邉陽畫皆是自東邉來姤在西是東邉五畫陽過復在東是西邉五畫隂過互相博易而成易之變雖多般然此是第一變問程子所謂易只說反復往來上下者莫便是指此言之否曰看得來程子之意又别邵子所謂易程子多理會他底不得蓋他只據理而言都不曽去問他聖人說數說得疏到康節說得密了他也從一隂一陽起頭他却做隂陽太少乾之四象剛柔太少坤之四象又是那八卦他說這易將那元亨利貞全靠著那數三百八十四爻管定那許多數說得太密了易中只有個竒偶之數是自底大衍之數却是用以揲蓍底康節盡歸之數所以二程不肯問他學若是聖人用數不過如大衍之數便是他須要先揲蓍以求那數起那卦數是恁地起卦是恁地求王天悅雪夜見康節於山中猶見其儼然危坐蓋其心地虛明所以推得天地萬物之理其數以隂陽剛柔四者為凖四分為八八分為十六只管推之無窮有太陽太隂少陽少隂太剛太柔少剛少柔今人推他數不行亦是無他胸中所見皇極經世紀年甚有法史家多言秦廢太后逐穰侯經世書只言秦奪宣太后權伯恭極取之蓋實不曽廢來皇極經世以元經㑹以㑹經運以運經世問天開於子地闢於丑人生於寅是如何曰此是邵子皇極經世中說今不可知他只以數推得是如此他說寅上生物是到寅上方有人物也有一元十二㑹三十運十二世十二萬九千六百年為一元嵗月日時元㑹運世皆自十二而三十自三十而十二至堯時㑹已在已午之間今則及未至戌上說閉物到那裏則不復有人物矣問易與經世書同異曰易是卜筮經世是推步是一分為二二分為四四分為八八分為十六十六分為三十二又從裏面細推去問經世書水火土石只是金否曰他分天地間物事皆是四如日月星辰水火土石雨風露雷皆是相配邵之學只把元㑹運世四字貫盡天地萬物邵之學其骨髓在皇極經世其花草便是詩又云其詩多說間靜樂底意思太煞把做事了先生曰這個未說聖人只顔子之樂亦不恁地邵之厯十二萬九千六百分大故密今厯家所用只是萬分厯萬分厯已自是多了他如何肯用十二萬分康節之學抉摘窈微與佛老之言豈無一二相似而卓然自信無所汚染此其所見必有端的處康節之學本於明理因論其學曰似老子只是自要尋個寬間快活處人皆害不得後來張子房亦是如此方衆人紛拿擾擾時他自在背處莊子比康節見較髙氣較豪康節又有規矩或問先生須得堯夫先知之術先生久之答曰吾之所知者惠迪吉從逆凶滿招損謙受益若是明日晴後日雨吾安能知耶康節曰思慮未起鬼神莫知不由乎我更由乎誰此間有術者遇人來問事心下默念則他說相應不念則說不應問姓幾畫口中默數則他說便著不數者說不著宋名臣言行録外集卷五
