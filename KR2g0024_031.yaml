body:
  text: 宋名臣言行録續集卷七宋李幼武纂集孫昭逺忠愍公字顯叔其先居眉州今為鄭州管城人登元祐九年進士第調長沙尉丁外艱服除主興國軍永興簿辟河東經幹為鳳翔府天興縣主簿政和二年知亳州譙縣改解州安邑縣兼鹽池皆不赴為永興撫幹再任都大茶幹宣和二年倅滑州攝守除河北運副靖康初召為水部員外郎除祕撰西道副都總管許便宜從事髙宗即位除河南尹西京留守西道都總管改京西北路制撫使二年正月為叛兵所害享年五十八詔贈徽制幼警敏力學喜屬文年二十四登進士第時策問首及熙豐凡不主新法者皆在末甲公其一也金圍太原我師多潰欽宗命折彥質乘傳招集彥質言汾州潰兵二萬過河津乞選朝臣同陜西帥臣招集仍委官部還河東詔命公往公言軍士逃歸其氣已索理難復遣不若就令西戍猶冀有功又言長安河中不可不為備今所在州縣調保甲乘城其實自衛不若擇要害地使控扼公至督其進且曰天子初命四道總管也兵得調發官得廢置財得移用急則援王室今京師圍急旦莫望救至逗遛可乎言詞慷慨聞者感動又遍檄諸帥使出師已而環慶帥王似熙河帥王倚各以師來會而涇原帥席貢秦鳯帥趙點鄜延帥張深皆不至公二十八疏劾之合諸路兵得十餘萬范致虛命馬祐昌統之斬杜常夏淑于華陰公與致虛同出關俄祐昌遇敵於石壕千秋間戰敗績致虛還京兆公獨與王似王倚留陜金併兵攻陜陷之時兩蜀輸金帛助河東公用其屬計止之河池藉以募兵得精鋭數千軍甫振而京師陷乃遣使詣太元帥府建炎初上詔公入覲公御下嚴整所過肅然內鄉賊尚虎擁數萬餘公遇而破之為都總管悉以所提西兵數千付張俊止以蜀兵數百上道七月至洛收集散亡招撫豪傑調兵陜西河北合義兵萬餘人柵伊陽使民入保會罷四道都總管以公為京西北路制置安撫使西師既非所隸悉引去公數以洛無城池而強敵對境侵牧之狀聞于朝又與諸子書曰今日扞禦甚難若假一嵗庶或可保吾四男二女今不復念要為忠義死耳汝曹加意讀聖人書行古人事無以我為念十二月金兵來攻公悉衆扞之驍將姚慶戰偃師死之公即命將官王仔等奉啓運諸殿神御間道走行在金兵益熾公戰益不利而金巳破𡵨雍秦隴南侵唐鄧陳蔡潰兵滿野公猶招集之已而見公麾下單弱欲擁公南公罵曰若等平日衣食縣官不以此時報國今將何為叛兵怒起擊公遂死焉天資孝友輕財重義遇事剛果議論詳明待人以誠未嘗干進好學老而不衰與人論古今及本朝故實纚纚可聽晚值時艱志大而命不副士論惜之張南軒跋公帖曰公之數帖其處死蓋已素定事豫則立豈不信乎自熙寧相臣以釋老之似亂孔孟之真其説流遁蠧壞士心波蕩風靡中間變故仗節死義之臣鮮聞焉論篤者知其有自來也觀公訓敇諸子從事經史大抵以實用為貴以涉虛為戒其不受變於俗可知卒有以自立宜也郭永勇節公字慎思大名府元城人以祖任為上黨簿改丹州法擢清河丞尋宰太原太谷縣調東平府録倅鄭州除本路漕移河西倉河東憲丁憂詔力起之建炎二年十一月兵破大名罵賊不降遇害紹興初贈中大夫資政學士公天資雄爽氣剛直身長七尺美鬚髯望之如神人焉杜充守大名名甚盛公畫數策遺之一日見公公問其目曰未暇讀也公數充曰人有志而無才好名而遺實驕蹇自用而有虛聲以此當大任鮮不顛沛公等足與治乎充大慙太原帥多用重臣宴享豪侈苛取諸縣以給之太谷民富其斂尤亟公以書抵幕府曰非什一而取皆民膚血也以資觴豆之費仁者忍為是耶脫不獲命令有投劾而歸耳府不敢迫府遣卒數輩號警盜刺諸縣短長遊蠧不歸莫敢忤公械致之府府為并他邑追還燕山之役公漕本路郭藥師屯邊怙恩暴甚與民市不償直復歐之非壞目折支不已安撫王安中莫敢問公曰安中不治且難制公請見而顯責之乃見藥師曰上推赤心置將軍腹中遇之者無不至而未有寸功報上今乃縱部曲殘民平居尚爾如緩急何藥師謝無愧容公謂安中曰他日亂邊者必此人也金趨京所過城邑欲立取之會天大寒城池皆凍金藉氷梯城不攻而入公在大名聞之先弛濠魚之禁人爭出魚氷不能合金至城下睥睨久之歎息而去金再犯京中外阻絶或以兩宫北狩告公公號絶仆地家人舁歸不食者數日聞元帥府檄書至始勉強一餐忠義蓋天性也駕幸維揚命宗澤守京澤將復兩河以大名當衝要檄公與杜充張益謙相為掎角公得檄大喜即日夕謀戰守具因結東平權邦彥為援不數日聲振河朔巳沒州縣皆叛金響應金亦畏之不敢動逺近晏然澤死益謙代杜充守京裴憶為漕皆齷齪小人會范瓊脅邦彥南去劉豫舉濟南來冦大名塊然孤城居其間金以十倍師攻之公率士晝夜乘城伺闔則出兵狙擊或勸益謙委城遁者公曰北門所以蔽遮梁宋金得志則席卷而南朝廷危矣借力不敵猶當死守徐挫其鋒以待援至奈何棄之因募士齎帛書夜縋城出告急朝廷且請先為備金攻益急俘東平濟南人大呼城下曰二郡巳降降者富貴不降無噍類益謙輩相顧色動公大言曰今日正吾儕盡節之時及行城拊將士曰王師至矣吾城堅完可守汝曹努力賊不足畏衆皆感泣質明大霧四塞金以車發斷碑殘礎雨城中樓櫓皆壞左右蒙盾而立多碎首者良久城陷公安坐城樓上或掖之以歸諸子環泣請去公曰吾世受國恩當以死報然巢傾卵覆汝輩亦何之兹命也奚懼益謙意率迎降金曰城破而不降何也雜然以公不從為辭金遣騎召公正衣冠南向再拜訖易幅巾而入尼瑪哈曰沮降者誰公熟視久之曰不降者我尚奚問金見公狀貌魁傑且夙聞其賢乃自為夷語數十言欲以富貴啖公而降之公嗔目唾罵曰無知之徒恨不醢汝以報國何説降乎金惡其言麾之使去公復厲聲曰胡不速我死當率義鬼悉滅爾曹大名人在縶者無不以手加額為之出涕金令斷所舉手并其家害之公博通古今得錢即以買書藏書萬卷因事為文皆可録而不求人知見古人立名節者未嘗不慨然掩卷終日而尤慕顔魯公為人喜面折人過退無異言聞秋毫之善必咨嗟奬成如不及士友以此嚴憚而歸之嗚呼靖康之祻豈不哀哉以二百年全盛之中國而在位皆拘攣章句之徒謂名節為非所急士之精鋭消耎盡矣一旦為金所乘無不全軀保妻子奉頭鼠竄或甘心汙辱之地而不悔公以身徇國至勉其家必死非所謂烈丈夫而不為世所推移者哉汪藻贊楊邦乂忠襄公字希稷吉州吉水人政和乙未上舍解褐調歙州婺源尉改蘄州教滿授廬州教除南京宗博會省官改建康教辟攝溧陽宰建炎三年詔舉文武全材當路舉之除建康倅兼提領沿江措置使司事兵陷建康不降遇害年四十四次年贈直祕閣立廟建康紹興二年三月復贈朝奉大夫賜諡廟號褒忠七年四月上幸建康復贈徽猷閣待制二聖北狩羣盜蜂起公攝宰溧陽訓民為兵五里一堠號令期會明信而肅𫀆鼓一鳴逺近畢集未幾府兵叛閉關殺官吏四境狼顧慮變公閲民兵繕軍實申號令刻日趍府討叛賊畏公威聲亟白部刺史從招諭發運方公會諸郡之兵于城下公率民兵首集士整而奮觀者偉之巳而羣凶授首傾邑請留於太守尋命為真初兵之叛也溧陽舊縣鎮射士數十百以羽檄往戍他所乘隙離次而歸劫巡檢為魁甲而趍溧陽將屠之邑人大恐慮無以禦時有私販摘山者趙明坐縣獄公引出至庭欲誅之因謂嘗閲爾簡記所與甚衆且悉里中豪健誠能集爾徒為邑人誅賊不惟赦爾罪當上功畀爾官明即請所與偕往公飲之酒縱使自去衆皆危之公曰第傒吾殄賊勿恐也越翌日明果得衆若干報公當詣賊紿而執之於是諭富民出財以須給賞賊就擒公悉斬於市留其首二人上府以正刑部刺史議奏功公悉推遜僚佐曰殺人而利賞非吾志邑人德公肖像祠之建炎三年閏八月李成剽江北杜充擁兵六萬保建康十一月充謂成師老遣戰艦進擊之偶會金金大至與成合我師敗績賊取我舟以濟奪馬家渡充出兵復戰不利潰而入無復紀律居數日金知充無鬭志進營於南門外鐵佛寺充下令官吏兵民用命城守公信其言明日充悉師出下水門乘舟以遁金陵空無兵守知府陳邦光驚懼不知所為即日率父老出城迎降金帥亦強公以行公至街橋大呼曰我豈為降虜者欲赴水父老救免既至金營邦光以下皆拜願降公獨僵卧不起邦光乃啓曰通判素有瞑眩疾金帥曰四太子者令掖出療之遣所降官屬勸降公閉口不答明日復遣所親厚者説之曰公故貧有兄埀老仰分祿寡嫂孤姪逺來就養五子尚幼一女未嫁今去鄉數千里無所於寄寧不念此國家事勢至此公不降將誰為公曰兹人之常情吾獨無情乎家國事不兩立吾計決矣願無辭費明日四太子置酒令偽知府事號張太師者及邦光召公議事公拒不往衆挽以至庭其二人巳就位虛一席以俟公及階以首觸柱礎疾呼曰我豈生與犬豕均飽者流血被面憒不蘇者久之左右掖以出金帥命拘之他室明日邦光復請出諭使降乃釋出至庭邦光降階語曰事固無可奈何願少回意毋為徒死無益也公瞋目曰爾以從臣守藩臨難不能死甘心屈膝他人茍生復幾何時使人人效爾朝廷何賴時坐有從官曰劉團練者取幅紙書死活二字示之曰汝無多言忠於趙氏即書死字下歸我書活字下公視吏有簪筆側立者即取筆書字曰死金帥怒復拘之先是公刺血書襟曰寧作趙氏鬼不為他邦臣金帥初不知也明日復引公出南門寨問公意如何答曰直不能降虜耳四太子甚怒公乃大罵曰我食趙氏祿終不負國汝女真豈是真天子乃使我從汝國家何負汝而敢肆凶殘吾恨未劒汝頸吾為死怖耶遂裂巾褫衣以祈速死見所書襟知不可屈遂害之剖腹取其心聞者哀壯之方杜充之遁也或告公盍去諸公曰我通守也茍去城誰與守我尚愛生也哉雖然吾仲氏惟一子不可無炊火乃命其姪孺文御其母以奔溧陽而屬其子明日城陷公被害時有斗子陳大伯者嘗從公為傔至公被囚陳在傍不去罵四太子陳亦舉甓擊之不中遂同遇害又有主山寨曰賈三郎者武勇絶人時號為賈山寨亦被執賈命其子結里人為鬻薪者置兵於薪以入閽人索之事覺金磔其父子於市公神色明秀長身山立見者畏愛居無事時溫良惠和與物無忤及遇事勇決強毅萬夫不能奪也其德行修於家稱於鄉信於友至於以身殉國立天下萬世臣節之端凌霜貫日非一時適然也金主冦江建康震擾人皆禱於公廟楚巫占之曰吉狄主其殂狄旅其逋大邦其寧乎有老人夢公告之者亦云贈直祕閣告詞略曰懦夫偷生名不稱於沒世烈士砥節死有重於泰山以爾稟質剛方值時艱厄介胄之士望風而速奔城郭之臣蒙恥以求活爾能明事君之義抗死職之忠誓不屈於畨酋寧自甘於血刃口不絶罵言不忍聞綽有張御史之風無愧顔常山之節云云紹興七年上幸建康上曰顔真卿異代忠臣朕尚官其後楊邦乂為朕死節可不厚加褒贈徽制告詞略曰故忠襄公云云方戎馬之絶江以二車而捍敵守既屈膝脅衆士以偕降爾獨挺身嬰孤城而益厲抗彼虎狼之衆奮乎鋒鏑之間罵不絶音死而後巳朕方規復土宇進幸江濵覽萬里之山川考纍朝之人物捨生取義如汝幾人故老興悲有歎息而談者英風激懦思奮迅以從之顧廟貌之具存凛精爽之如在雖已加於贈恤念未究於哀榮爰升次對之聨用彰仁者之勇九原可作其隨會之與歸千載猶生歎相如之不泯葉夢得撰褒忠廟碑歌詩曰茫茫華夏以限四極有不能虔乃嚙上國既殄我民爾則逆天惡稔而誅天胡捨旃在昔肅氏厥篚砮矢不我來庭敢干我紀揭揭楊侯梗其喉牙萬夫一軀莫我敢加誰謂爾狂我憑我抑誰謂爾殘我唾我斥天子曰嘻惟我有臣曷不贖之人百其身屹屹崇岡侯安于域桷梴旅楹侯有廟食惟皇上帝命侯來歸顧瞻山川申我王威侯食而康旗纛旖旖百靈齊發從侯北指侯車轟轟于我故疆覆其穴巢何有虎狼告功帝閽帝笑為喜四方其平侯祀百世曷慕匪忠曷畏匪死簡於帝衷惟忠弗畏明明天子與帝一心是播是崇是顯自今有流滔滔貫于南邦我詩孔昭配此大江復撰改葬祭文曰嗟夫不死子糾孔子不病管仲之仁而餓死首陽之下則稱伯夷叔齊曰不降其志不辱其身天下不以死為難而以得其死為不易嗟夫君之節壯矣方金之毒是邦也聞以十萬衆而屈者矣未聞以一身之微而能抗之者也云云君棄其生不顧其家既棄其家不顧其身尚何有此既腐之胔哉惟天子正大義于天下揭而示之曰吾有臣如此而後之人聞君之風而畏者亦曰此吾大夫楊君之藏也則天子之寵與君之節將與兹山並存而不泯也吉守李彌遜立公祠於郡庠杉溪劉才叩撰奉安祭文曰陰虹吐氛暫翳圓景斗於星中孤光炯炯洪河潰溢滔天橫騖屹然中流見此砥柱屬時多艱逺歷中否乾維坤軸臲卼軒輊彼蠢蠢而貪生望賊兵而風靡堂堂忠襄鐵石肝腸矯矯兮人中之龍其肯屈節而生降蹈九死而不悔豈憚夫凶鋒之與逆鋩卒抗憤而玉折激勞烈以遐彰云云建炎巳酉敵騎渡江主將宵遁守輒屈降虜欲脅公百計俱設書字於紙示以死活公直奮筆就死不懾敵知公心終不可回遂肆殘毒梁壞山摧徑氣旁徹地裂天開萬身莫贖嗚呼哀哉相彼泰華攙天獨出烈日秋霜下肅萬物惟公之節冠山跨日姦顱逆胔生死愧恨忠胸義膽聞風爭奮惟公之功啓迪興運云云遊九言為吏金陵再拜墓道為辭曰山雲起兮陰陰木嘯風兮蕭森罥荒榛兮頽隧野鳥怨兮清音噫丙午兮燕安藹搢紳兮多盤繫苞桑兮弗戒渝舊好兮開邊兵釁生兮召戎傾大地兮塵蒙粲承平兮百載莽夷門兮廟宫我踰邠兮梁山蛇荐食兮江干擁貔貅兮首鼠紛雅拜兮後先公獨立兮慨陳人自靖兮此身寧為鬼兮趙氏肯涅緇兮北庭肴醴飼兮茍哺弗自知兮貌頳握玉麟兮拜跪曽莫自顧其彛倫豈曰余兮獨死汝尸坐兮偷生振英聲兮階下氣烈動兮清寧凛名義兮身世九鼎重兮一羽輕翳翳兮幽藏頽陽照兮山荒髮毛爪齒兮一世同腐廟貌圭衮兮千古之光春秋兮代謝勿替兮蒸嘗東山楊長孺贊公畫像曰面若嚴霜目如電光身作長江乾坤翳翳衣冠毅毅鈇鉞易易棟撓鼎欹無虎無貔有軾有泥埀天貫日惟忠惟一青竹鴆筆犬羊雖粗知大丈夫此可革乎人誰無死國爾斯偉何千億祀松溪先生李天麟言公未第時處郡庠足未嘗涉茶坊酒肆同舍欲壞其守暇日邀之往娼館紿以為巳之親戚公淳實信之不疑坐定娼艷粧而出公愕然疾趨而歸閉戶號泣解其衣冠悉焚之其後果能立節竒偉誠齋曰正是如此大凡立身行巳須是立腳之初便確乎不可拔到後來習得定死生祻福都不能奪宋名臣言行録續集卷七
