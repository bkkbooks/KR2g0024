body:
  text: 宋名臣言行錄後集巻一宋朱子纂集韓琦魏國忠獻王字稺圭相州人中進士第二人事仁宗英宗神宗官至丞相配享英宗廟庭天聖五年仁宗初臨軒試進士公年二十名在第二時唱名第一甲方終太史奏日下五色雲見左右從官皆賀於殿上監左藏庫時方貴髙科多徑去為顯職公獨滯於筦庫衆以為非宜公處之自若不以為卑冗職事亦未嘗茍且並家傳徙開封府推官理事不倦暑月汗流浹背府尹王博文大器重之曰此人要路在前而治民如此眞宰相器也胡氏傳家錄以右司諌供職勸上明得失正朝廷紀綱親近忠直放逺邪佞時災異數見公以災變屢發主於執政者非才累言於上未見納公又奏曰豈陛下擇輔弼未得其人耶若杜衍范仲淹孔道輔宋郊胥偃衆以為忠正之臣可􅊀進擢不然嘗所用者王曾吕夷簡蔡齊宋綬亦人所屬望也章十上不報公抗䟽乞出上乃罷宰臣王隨陳堯佐叅政韓億石中立等家傳公又言賞罰當從中書出今數聞有内降不可不止玉曾蔡齊宋綬當世名臣宜大用上納其說王沂公見公論事切直有本末謂公曰比年臺諌官多畏避為自安計不則激發近名如君固不負所職諫官宜若此沂公天下正人公得此益自信行狀民間作銷金服玩公請以先朝舊制禁絶之乃下詔申諭未幾有犯者開封以刑名未明申請審刑院議止徒三年公奏大中祥符八年敕犯銷金者斬請復用之詔同詳定阮逸胡瑗等所造鍾律公曰祖宗舊法遵用斯久屬者㣘一士之偏議變數朝之定律臣切計之不若窮作樂之源為致治之本使政令平簡民物熈洽海内擊壤鼔腹以歌太平斯乃上世之樂可得以氣象求乎既逹其源又當究當今之所急國家方夏寧一又弛邊備犬戎之性豈能常保願陛下與左右弼臣緩兹求樂之誠移訪安邉之議急其所急在理為長遂詔將來南郊用和峴舊樂發解開封府舉人時惟禮部貢院置封彌謄錄二司開封止有封彌官公請並設謄錄司以示至公從之公言自古興儉以勸天下必以身先之今欲减省浮費莫如自宫掖始請令三司取入内内侍省并御藥院内東門司先朝及今來賜予支費之目比附酌中皆從减省無名者一切罷之公為諌官三年所存諌稿欲歛而焚之以效古人慎密之義然恐無以見人主從諌之美乃集七十餘章為三巻曰諌垣存稿自序於首大畧曰諌主於理勝而以至誠將之並家傳以益利路人飢為體量安撫使公至則蠲减稅以募人入粟招募壯者等第刺以為廂禁軍一人充軍數口之家得以全活檄劒門關民流移而東者勿禁簡州艱食為甚明道中以災傷嘗勸納粟後糶錢十六餘萬歸於常平公曰是錢乃賑濟之餘非官緡也發庫盡以給四等以下戸逐貪殘不職吏罷冗役七百六十人為饘粥活飢人一百九十餘萬蜀人曰使者之來更生我也家傳元昊初叛兵鋒銳甚中國久不知戰人心頗恐授公陜西安撫使趣上道公勇欲自効馳至延安則𦍑已解圍去然士氣沮傷將吏往往移病求罷職公即選練材武治戰守器慰安居人收召豪傑與之計議范雍守延州朝廷以為不能欲以趙振代公奏曰願留雍以觀後效無已則范仲淹為可以為國家計非私仲淹也若涉朋比誤陛下事當族慶人陳叔慶等陳邉防策補官東南公奏曰忠義憤懣為國獻計雖稍收用乃置於僻左實覊縻之非所以開示誠意招徠人才也康定元年夏竦都䕶西師公副之未幾遣學士晁宗慤内侍王守忠督出兵攻賊公曰如詔意為便不則元昊聚兵出不意攻伐我倉卒赴敵必敗合府争之公所論不得用使持奏還而元昊掠鎮戎軍偏將劉繼宗逆戰果不利詔下切責俾以進兵日月來上衆復㑹議乃畫攻守二䇿求中决公馳驛奏闕下上許用攻䇿已而執政以為難公不得已獨上章曰元昊精兵不出四五萬餘皆婦女老弱舉族而行我四路之兵不為少分戍數十城寨彼聚而來故常衆我散故常寡相遇毎不敵是以元昊能數勝今不究此失乃待賊大過以二十萬重兵惴然守界濠不敢與虜角臣實痛之願更命近臣觀賊之隙如不可不擊則願不疑臣言奏雖未下知兵者以公言為然公往來塞下勤苦忘寢食期有以報上出按屯至涇原聞元昊乞和公諭諸將曰無約而降者謀也宜益備遽調兵兵未集賊果入鈔山外公指圖授諸將曰山間狹隘可守過此必有伏或致師以怒我或為餌以誘我皆無得輙出待其歸且惰也邀擊之而禆將任福王仲寳狃小勝數違節度公檄之曰違節度有功亦斬福猶進兵遇伏遂戰死疾公者乞置公大罪後大帥使收餘兵得檄福衣帶間封上之朝廷知罪在諸將止左遷右司諌知秦州公在秦增廣州城以保固東西市招集屬戸益市諸羌馬討殺生羌之鈔邉者厲兵以待賊訖公去秦賊不敢窺塞慶厯二年陜西四帥皆改觀察使公為秦州觀察使曰吾君憂邉臣子何可以擇官獨不辭初京師所遣戍兵脆懦不習勞苦賊嘗輕之目曰東軍而土兵勁悍善戰公奏增土兵以抗賊而稍减屯戍内實京師又以籠竿城據衝要乞建為德順軍以蔽蕭關鳴沙之道既任事久嵗補月完甲械精堅諸城皆有備賞罰信於軍中將亦習戰闘識形勢毎出輙有功公方建請於鄜延渭三州各以土兵三萬為一軍軍雖别屯而耳目相通為一視虜所不備互出𢷬之破其和市屠其種落困撓其國因以招横山之人度横山隳則平夏兵素弱必不能支我下視興靈穴中爾章既上又與范公定謀益堅而元昊黠賊知不可敵亦歛兵不敢近塞並行狀公駐延安忽有人夜攜匕首至卧内遽褰幃帳公起坐問曰誰何曰某來殺諌議又問曰誰遣汝來曰張相公遣某來盖是時張元夏國正用事也公復就枕曰汝攜予首去其人曰某不忍願得金帶足矣遂取帶而出明日亦不治此事俄有守陴卒報城櫓上得金帶者納之時范純祐亦在延安謂公曰不治此事為得體盖行之則沮國威今乃受其帶是堕賊計中矣公嘆曰非琦所及麈史公與范公同召拜樞密使副公自請捍邉至五表不聽既至又與范公伸前議同决䇿上前期以兵覆元昊會夏國送欵公謀不果用范公毎恨齟齬功不就故作閱古堂詩叙其事傳於世初夏人方議和公以謂邉備不可弛請與范公俱出按行遂命公宣撫陜西范公宣撫河東范請益兵屯河陽蒲中及以兵從公以為不必請兵上前議未合退於殿廬中猶争公曰若爾則臣乞自行不用朝廷一人一騎范色忿欲再請對道公語公笑止之㑹富公賛公說卒不發兵范亦不以為忤家傳公至關陜以兵數雖多而雜以疲弱耗用度選禁軍不堪征戰者停放一萬二千餘人後田况乞選諸路軍不堪戰者為廂軍云若謂兵驕久一旦澄汰恐致亂則去年韓琦汰邉兵萬餘人豈聞有為亂者哉家傳時仁宗以天下多事急於求治手詔宰相杜衍曰朕用韓琦范仲淹富弼皆中外人望有可施行宜以時上之又開天章閣賜坐咨訪急務公條九事大畧備西北選將帥明按察豐財用抑佞倖進有能退不才去冗食謹入官繼又獻七事議稍用而小人巳側目不安二府皆合班奏事公必盡言事雖屬中書公亦對上指陳其實同列尤不恱獨仁宗識之曰韓琦性直行狀蘇子美軰為進奏院事發仁宗為讒者所惑夜遣中使散入大臣家捕同飲者公明日對曰夜来聞遣官遶京城捕館職甚駭物聽此事但付有司自有行遣上色悔久之别錄諸人欲以進奏院事傾正黨宰相章得象晏殊不可否賈昌朝參政陰主之張方平宋祁王拱辰皆同力以排至列狀言王益柔作傲歌罪當誅公時在右府因兩府同對言益柔狂語何足深計較方平等皆陛下近臣今西邉用兵有何限大事不為論列而同狀攻一王益柔其情亦可見上遂釋然别錄徙知鄆州京東素多盗捕盗之法以百日為三限限不獲者抵罪盗未必得而被刑者衆公請獲他盗者聽比折除過捕者有免刑之路故盗多獲朝廷著為天下法至今用之家傳徙鎮定定州久用戎將治兵無法度至於驕不可使公至即用兵律裁之察其横軍中尤不可教者捽首斬軍門外士死攻圍賻賞其家恤其孤兒使繼衣廪恩威既信則倣古兵法作方貟銳三陣指授偏將日月教習之由是定兵精勁齊一號為可用冠河朔嵗大歉為法賑之活飢人七百萬鄰城旁路刺取其法視中山隱然為雄鎮聲動虜中行狀定卒惡米陳下執籌不請公時為帥聞之馳入倉羣卒約十餘人皆持米前訴公曰米乃如此餘人皆退後出懷中米一裹曰琦亦請此朝廷置此米一㪷約八鐶内地不售一百今雖陳下售猶不失四鐶適皆自汝扇揺命盡戮十卒於前公凝然不動一軍股栗遺事中書習舊弊毎事必用例五房史操例在手顧金錢惟意所去取所欲與白舉用之所不欲行或匿例不見公令刪取五房例及刑房斷例除其冗繆不可用者為綱目類次之封縢謹掌毎用例必自閱自是人知賞罰可否出宰相五房史不得髙下於其間行狀公自為相即與當時諸公同力一德謀議制作銓補天下士所汲引多正直有名或忠厚可鎮風俗以公議用之士莫知出何人門下嘉祐四年下祫享赦事多便民者命諸路舉學行尤異篤遣詣京師館於太學試舍人院差使授官立柴氏後為崇義公法春秋存亡繼絶之義擇才臣詣四方寛恤民力籍戸絶田租為廣惠倉以廣賑䘏募耕唐鄧廢田勸課農作守令治最者久其任以率吏課裁定令敕以省疑讞弛茶禁以便東南之民議者以謂近於三代之仁義多公所論議施行行狀仁宗春秋髙繼嗣未立天下以為憂雖或有言者而大臣莫敢為議首公數乘間伏奏乞選立太子上頋曰後宫一二欲就館卿毋亟後誕育皆皇女公一日挾孔光傳進對曰漢成帝立二十五年無繼嗣已議立帝弟之子定陶王為太子成帝中材常主猶能之以陛下之明何難於此哉太祖為天下長慮澤流至今惟陛下以太祖心為心則無不可矣仁宗感悟始以英宗判宗正寺英宗力辭宦官宫妾勢未便中外皆危之公復啓曰陛下屬之以大任而不肯當盖其沉逺詳重識慮有以過人非有他也猶豫不决招讒慝生變故且名未正則尚得以辭名體一定父子之分明則浮議亦不得復揺矣仁宗欣納曰如此則宜乘明堂大禮前亟立為太子乃召樞密大臣諭其事或愕曰此大事毋遽上頋曰朕意决矣曰誠如此敢為天下賀又召學士為詔書學士亦請對然後進藁英宗既為太子尚堅卧公又奏曰今既為陛下子何所間哉願令宫人就諭㫖及本宫族屬敦勸上如其請始就興寧宫㑹仁宗棄天下平旦入預大議英宗即帝位宫門徐開追百官班宣遺制衛士坐甲諸司幕廡下治䘮人情肅然日至午市肆猶有未知者公性厚重未嘗名其功其門人親客或燕坐從容語及太子定䇿事必正色曰此仁宗聖德神斷為天下計太后母道内助之力朝廷定議久矣臣子果何預焉行狀仁宗嗣未立公請置内學教宗子建儲之意黙存其中事未及行仁宗倦勤勢漸廹更不暇置内學毎進對罷即論太子天下本不可不豫立以係天下心語日益切時有二宗子育宫中公謂二宗子陛下亦必自能見其孰聰明知否上以英宗為言公即將順乞降聖㫖劄子權判宗正司後兩府通簽御劄張昇太尉見之懼深罪公何不與之素議及次日殿上大言此事係社稷陛下不可錯上曰此事與相公商量來昇下殿至中書又詰公公曰此甚入思慮來不錯昇退公笑曰若素議豈不壞了事遺事英宗初為皇太子時允弼最尊屬心不平且有語國朝制度嗣天子即位先親王賀次六軍次見百官公是時先獨召允弼入稱先帝晏駕太子即位大王當賀允弼曰皇子為誰曰某人允弼曰豈有團練使為天子者何不立尊行公曰先帝有詔允弼曰焉用宰相遂循殿陛上公叱下曰大王人臣也不得無禮左右甲士已至遂賀次召諸親王見六軍百官中外晏然遺事英宗即位已數月初掛服於柩前哀未發而疾暴作大呼語言恐人所不可聞左右皆反走大臣軰駭愕癡立莫知所措公亟投杖於地直趨至前抱入簾曰誰激惱官家且當服藥内人驚散公呼之徐徐方來遂擁上以授之曰皆須用心照管官家再三慰安以出仍戒當時見者曰今日事惟某人見某人見外人未有知者復就位哭處之若無事然歐公歸以語所親曰韓公遇事真不可及並别録英宗初以驚疑得疾雖平而疑未解潜晦自居猶若疾者靣壁卧不受藥餌公日率同僚自捧藥以進公俯而懇告則或熟視而不言或取藥覆公之衣而不頋公或跪於榻上者移時或拜於床下者數四太后毎勞公曰相公亦不易勝矣大王汝自勸及大王勸之尤不頋也然須公強之而後服别録英宗遇貂璫少恩禮左右不恱多道禁中隱密者雖大臣亦心惑之公獨屹然不動昌言於衆曰豈有前殿不曾差了一語而一入宫門得許多錯來琦深疑此事簾前亦屢以此為對自爾人情知公意不搖妄傳語言者遂息慈夀一日送密札與公有為孀婦作主之語仍勅中貴俟報公但曰領㫖公以山陵有事呈乞晚臨後上殿諸公不預既見謂上曰官家不得驚有一文字進呈只是不可泄陛下今日皆太后力恩不可報然既非天屬之親願加意承奉便自無事上曰謹奉教公又云此文字臣不敢留幸宫中宻焚之若泄則間遂開卒難合矣他日光獻對中書泣訴英宗疾中語言起居狀繼而樞密院對語亦如前富弼謂公曰適聞簾下說否弼不忍聞盖富意亦以太后之意為然而歸咎於英宗及公力勸太后徹簾不敢令冨公預聞後中書已得光獻㫖還政宻院猶未知也迨手書出富公愕然因此不恱家傳英宗既自外來又方寢疾不豫人情向在太后公慮宫中有不測者一日因對深以言動太后曰臣等只在外靣不得見官家内中保䕶全在太后若官家失照管太后亦未安穏太后驚曰相公是何言語自家更是用心公即曰太后照管則衆人自照管同列為縮頸流汗既而吴奎曰語不太過否公曰不得不如此别錄公潜察英廟巳安而曹后未有還政意乃先建議英廟曰可一出祈雨使天下之人識官家上然之咨太后太后怒曰獨不先禀此耶孩兒未安恐未能出公曰可以出矣后曰人主出不可以不備禮儀方處䘮素仗未具公曰此小事朝廷頤㫖即辦不數日素仗成上遂幸相國寺京師之疑巳解太后不久即還政曹后初未還政公力引古以動之云前世母后更聦明者多莫不以固吝權位敗名德太后若脫然復辟則是千古所未有請閱史書一一可見太后曰自家何敢望賢人公察其意囬矣即連賛成之後數日批出云某日更不御殿公亟令捲簾徹坐乃徃白上上曰莫未否公曰已得親詔矣上遂釋然初曹后難於還政公說曰當别與太后議儀制山呼警蹕益衛士五百人之類太后既允即以諷上上曰相公苦崇奬母后是豈好事公曰臣等亟以此誘之方肯放下陛下何惜此邪並别錄帝疾甚時有不遜語后不樂大臣有不預立太子者隂進廢立之說惟宰相韓琦確然不變叅政歐陽脩深助其議嘗奏事簾前慈聖嗚咽流涕具道不遜狀琦曰此病故爾病已必不爾子病母不容之乎慈聖不懌曰皇親軰皆笑太后欲於舊窩中尋兎兒聞者驚懼皆退數歩獨琦不動曰太后不要胡思亂量少間修乃進曰太后事仁宗數十年仁聖之德著於天下婦人之性鮮不妬忌昔温成之寵太后處之裕然何所不容今母子之間而反不能忍邪后意稍和修復進曰仁宗在位嵗久德澤在人人所信服故一日晏駕天下禀命奉戴嗣君無一人敢異同者今太后一婦人臣等五六措大爾非仁宗遺意天下誰肯聽從太后黙然久之而罷後數日獨見英宗帝曰太后待我無恩公曰自古聖帝明王不為少矣然獨稱舜為大孝豈其餘皆不孝邪父母慈愛而子孝此常事不足道惟父母不慈而子不失孝乃可稱但恐陛下事之未至爾父母豈有不慈者帝大悟自是不復言太后短矣熈寧中歐公退居頴上間言及此曰古所謂社稷臣韓公近之龍川志英宗初立外六班有謀變者或言於公公曰事不成不過族耳吾不懼也既而卒無事英宗即政公以其勇智不世出可與有為乃考尋中書祖宗御批得百餘畨俱闕畧不全補綴僅能識其字皆經國長筭大䇿如取太原伐江南伐犬戎付中書之類編成十餘軸英宗一見之不覺避御座是時同列皆謂公有不言教萬乘事後上僊公哭之慟曰何事不可為别錄入内都知任守忠者姦邪反覆間諜兩宫時司馬温公在諌院吕諌議為侍御凡十餘章請誅之英宗雖悟未施行宰相韓琦一日出空頭勅一道叅政歐公已簽書矣叅政趙槩難之問歐公曰何如曰苐書之韓公必自有說公坐政事堂以頭子勾任守忠立廷下數之曰汝罪當死責蘄州團練副使蘄州安置取空頭勅填之差使臣即日押行其意以為少緩則中變矣聞見錄公臨大節處危疑茍利國家知無不為若湍水之赴深壑無所忌憚或諌曰公所為如是豈惟身不自保恐家無處所殆非明哲之所尚公嘆曰為人臣者盡力以事其君死生以之頋事之是非何如爾至於成敗天也豈可豫憂其不成遂輟不為哉聞者愧服温公撰祠堂記治平中夏國汛使至將以十事聞朝廷未知其何事也時大常少卿祝諮館伴既受命先見樞府已而見丞相公曰樞宻何語曰樞府云若使人議及十事苐云授命館伴不敢輙及邉事公笑曰豈有止主飲食而不及他語邪公乃徐料十事以授祝曰彼及某事則以某辭對辯某事則以某辭折及宴果及十事凡八事正中公所料夏人竦服燕談濮安懿王以英宗踐阼例當改封上尤詳謹不欲遽既踰大祥始詔兩制議其禮兩制謂當稱大國封皇伯中書擬所生稱皇伯無經據又封爵須下誥名之則未得其中方下三省再議英宗復詔罷之而臺諌官攻中書不已尤指歐陽公諸公莫不避匿自解公獨謂人曰此中書事皆共議何可獨罪歐陽公士大夫嘆其平直忠諒不肯推謗與人行狀治平三年上疾革二府問疾罷公奏曰陛下久不視朝中外憂懼宜蚤建太子以安衆心上頷之公請上親筆指揮上乃批曰立太王為皇太子公曰太王乃頴王也煩聖躬更親書之上又批於後云太王頴王某公曰欲乞只今晚宣麻上頷之時神宗在側聞是命辭於榻前者久之制下又設置東宫官屬由是國本定矣神宗既即位王陶自東宫入御史府為中丞意有所觖望奏彈宰相不押常朝班朝廷以宰相日奏事埀拱退詣文德殿押常朝班或已過辰正則御史臺放班行之已數十年為故事陶憤不勝乃肆詆誣上察其奸罷陶言職行狀陶言公不押常朝班為䟦扈帝遣近臣以陶言示公公奏曰臣非䟦扈者陛下遣一小黄門至則可縛臣矣帝為之動出陶知陳州聞見錄一日上謂公近有欲以二大國封濮王者如何公曰先帝遵守典禮不敢爵父而陛下豈可爵祖又當以何親稱之邪此必黨濮議者欲求必勝殊不頋上累聖德而措先帝於重不幸也願深察之上欣然納焉家傳公為相日曾公為亞相趙康靖歐公為叅政凡事該政令則曰問集賢該典故則曰問東㕔該文學則曰問西㕔至大事則自决之人以為得相體麈史英宗上僊今上即位一日遂懇辭位上流涕謂相公欲何之公一日又持四方士人見責不退書開陳以謂清議不容如此豈敢安位上又流涕不語請益堅他日忽宣諭已有恩命云亦不久在外虚席以待故除兩鎮除鎮安德勝等軍節度兼侍中判相州有衮衣待還之語公復進見謂制語太過使臣不得安外乞改之上不許遺事詔復知相州仍令赴闕朝覲陛辭之日上從容訪問政事公因進言用人當辨邪正為治之本莫先於此上曰侍中國之龜鑑朕敢不從家傳公自長安入覲朝廷欲留之公隂知時事遂堅請相陛辭日上謂卿去誰可屬國者公引元老一二人上問金陵何如公曰為翰林學士則有餘處此地則不可上又不答公便退後有問公何以識之公曰嘗讀金陵答楊忱一書窺其心術只為一身不為天下以此知非宰相器遺事公自永興過闕神宗問曰卿與王安石議論不同何也公曰仁宗立先帝為皇嗣時安石有異議與臣不同故也帝以公之語問荆公公曰方仁宗欲立先帝為太子時春秋未髙萬一有子措先帝於何地臣之論所以與琦異也荆公強辯類此公請冊英宗為皇嗣時仁宗曰少俟後宫有就閣者公曰後宫生子所立嗣退居舊邸可也盖公有以處之矣然荆公當英宗世屢詔不至實自慊也聞見録改判大名時朝廷行青苖法衆議謂非便臺諫官及言者皆以罪斥中外無復敢言者公慨然上䟽乞罷其法條例司䟽難頒下及令進奏官指揮本院將中書劄子頒行天下公再奏曰臣詳制置司䟽駁事件即將臣元奏要切之語多從刪去唯舉大概用偏辭曲說為阻難及引周禮國服為息之說文其繆妄上以欺罔聖聽下以愚弄天下之人將使無復敢言其非者臣不勝痛憤至再有辨列按周禮泉府掌以市之征布歛市之不售貨之滯於民用者以其價買之物掲而書之以待不時而買者買者各從其抵鄭衆釋云書其價掲着其物也不時買者謂急求也抵故價也臣謂周制民有貨在市而無人買或有積弊而妨民用者則官以時價買之書其物價示民若有急求者則以官原買價與之此所謂王道也經又云凡賖者祭祀無過旬日䘮紀無過三月鄭衆釋云賖貰也以祭祀䘮紀故從官貰買物唐賈公彦䟽云賖與民不取利也經又云凡民之貸與其有司辨授之以國服為之息鄭衆釋云貸者謂從官借本價也故有息使民弗利以其所賈之國所出為息也此所謂王道也而鄭康成云以其於國服事之稅為息也於國事受園㕓之田而貸萬泉者則期出息五百臣謂周禮園㕓二十而稅一近郊十一逺郊二十而三甸稍縣都皆無過十一唯其漆林之征二十有五鄭康成盖約此法謂從官貸錢若受園㕓之地貸萬錢者出息五百公彦因而解謂近郊十一者萬錢朞出息一千逺郊二十而三者萬錢朞出息一千五百甸稍縣都之民萬錢朞出息二千臣謂如此則須漆林之戸取貸方出息二千五百也然當時未必如此也今放青苗錢凡春貸十千半年之内便令納利二千秋再放十千至年終又令納利二千則是貸萬錢者不問逺近之地嵗令出息四千也周禮至逺之地止出息二千今青苗取利尚過周禮一倍則制置司所言比周禮貸民取息立定分數已不為多亦是欺罔上聽且謂天下之人皆不能辨也且今古異制貴於便時周禮所在有不可施於今者其事非一若謂泉府一職今可施行則上言以官錢買在市不售及民間積滯之貨候民急求則依原買價與之民有祭祀䘮紀就官中借物限旬日三月還官而不取其利制置司何不將此周公太平已試之法盡申明而行之豈可獨舉注䟽貸錢取息之利事以詆天下之公言哉上始得公䟽意已大悟亟欲寢罷王安石引疾在告唯叅政趙抃等對上論欲罷之意抃乃曰此主於安石乞更俟安石出議之安石既出執之益堅聞者惜之未幾御史中丞吕公著亦言青苗非便安石欲黜之上曰須别坐事令出既而又曰公著言韓琦近有章䟽朝廷亦當聽納自古執政若與藩臣生間隙至有舉晉陽之甲以逐君側之惡者安石遽曰只此可逐矣公著遂坐誣大臣欲舉晉陽之甲罷知蔡州諌官孫覺聞之曰此言覺嘗奏之今貶公著誤也公既以言忤權臣又公著告詞明坐所因公益恐悚遂以疾上章乞知徐州章四上神宗遣内侍李舜舉慰諭之乃止家傳初法下曰琦舊臣也義不敢黙及不聽曉官屬亟奉行曰琦一郡守也其敢不如令行狀公知揚州王荆公初及第為簽判毎讀書至逹旦略假寐日已髙急上府多不及盥潄魏公見荆公少年疑夜飲放逸一日從容謂荆公曰君少年毋廢書不可自棄荆公不答退而言曰韓公非知我者魏公後知其賢欲收之門下荆公終不屈故荆公熈寧日錄中短魏公為多毎曰韓公但形相好耳作畫虎圖以詆之公薨荆公挽詩云幕府少年今白髮傷心無路送靈輀猶不㤀少年之語也聞見錄太宗真宗嘗獵於大名之郊題詩數十篇賈魏公時刻於石公留守日以其詩藏於班瑞殿之壁既成客有勸公摹本以進者公曰修之則已安用進為客亦莫喻公意韓絳来遂進之公聞之嘆曰昔豈不知進邪顧上方銳意四夷事不當更導之耳别錄公曰御軍自有中道嚴固不可愛亦不可若當其罪雖日誅百人何害人自不怨遺事魏公潞公俱嘗鎮北門魏公時朝城令决一守把兵士方二下輙悖罵不已令以解府魏公使前問云汝罵長官信否對曰當時乘忿實有之公即於解狀判處斬從容平和畧不變色潞公時復有解一卒猶前者潞公震怒問之兵對如實公亦判處斬以此見二公之量不同如魏公則彼自犯法吾何怒之有不惟學術之妙亦天資之髙爾元城語錄公所厯大藩皆有遺愛戎狄尤畏公名凡使契丹及來使者必問韓侍中安否今何在其子忠彦使幕外虜主問左右孰屢使南朝識韓侍中觀忠彦貎類父否或對曰頗類命畫工圗之而去館伴王興功遽以告忠彦北門為聘使道舊與京尹書皆押字不名及公留守則名於書其副使成禹錫仍喻來介曰以侍中在此故特名毎南來渉臨清界即戒其下曰此韓侍中境無多需索也行狀熈寧七年春契丹遣汛使蕭禧來言代北對境有侵地請遣使分畫帝遣中使賜富弼韓琦文彦博曾公亮手詔問以計䇿公䟽曰臣觀近年以來朝廷舉事則似不以大敵為恤虜人見形生疑必謂我有圖復燕南之意故造此釁端屢遣使以争理地界為名觀我應之之術如何爾其所致虜之疑者七事髙麗臣屬契丹於朝廷久絶朝貢乃因商舶招諭而來於國家初無損益而契丹謂以圖我一也吐蕃部族不相君長未嘗為邉患而強取其地建熈河一路戕其老弱以數萬計契丹聞之當謂行將及我二也邉近四山地勢髙仰不可為溏濼向聞遣使部兵徧置榆栁以制虜騎三也義勇民兵將校甚整教習益精而忽創團保甲一道紛然義勇人十去其七破可用之成法得增數之虚名四也河外城池工築並興增置守具檢視器械五也創都作院頒降弓刀新様大作戰車費財殫力先自困弊六也置河北三十七將各專軍政州縣不得關預聲言出征又深見可疑之形七也夫契丹素為敵國因疑起事不得不然亦其善自為謀者也今横使再至初示偃蹇以探伺朝廷况代北初與雄州素有定界若優容而與之虜情無厭浸淫不許虜遂持此以為已直縱未大舉勢必漸擾諸邉卒隳盟好臣昔曾言青苖錢事而言者輙肆厚誣非陛下之明幾及大戮自此聞新法日下實避嫌疑不敢論列今親被詔問事係國家安危言及而隱罪不容誅臣嘗竊計始為陛下謀者必曰自祖宗以來因循茍簡治國之本當先冨強則可以鞭笞四夷盡復唐之故疆然後制作禮樂以文太平故散青苗錢為免役法次第取錢又内外置市易務新制日下更改無常官吏違者坐徙不以赦降監司督責以刻為明今農怨於畎畝商旅嘆於道路官吏不安其職恐陛下不盡知也夫欲攘斥四夷以興太平而先使邦本困揺衆心離怨此則陛下始謀者大誤也又好進之人不頋利害但得邉事將作富貴可圖必曰虜勢已衰特外恃驕慢爾以陛下神聖文武若擇將臣領大兵深入虜境則幽燕之地一舉可復此又未之思也今河朔累嵗災傷民力大乏將官麄勇寡謀保甲未經訓練若驅重兵頓於堅城之下粮道不繼腹背受敵雖曹彬米信名德宿將猶以此致岐溝之敗也臣今為陛下計謂冝遣使報聘優致禮幣具言朝廷向来興作乃修備之常與北朝通好之久自古所無豈有他意且疆土素定當如舊界請命邉吏退近者侵占之地不可持此造端隳累世之好如將官之類因而罷去以釋虜疑萬一聽命則可以遷延嵗月陛下益養民愛力選賢任能踈逺奸䛕進用忠鯁使天下恱服邉備日充虜果敗盟然後一振威勢恢復故疆快天人之心雪祖宗之憤矣富文曾皆舉不與之論時荆公再入相曰將欲取之必姑與之也以筆畫其圖命天章閣待制韓縝奉使舉與之盖東西棄地五百里云祖宗故地荆公輕以畀鄰國又建以與為取之論至後世姦臣以伐燕為神宗遺意卒致天下之亂荆公之罪可勝言哉聞見錄初為館職所與遊者皆一時英俊石曼卿氣豪邁多戯侮同舍獨見公不敢少慢但時呼為韓家盖當時市井小民凡所畏尊官則呼厥姓曰某家故石效此語自在館閣已有重望於天下與同館王拱辰御史蕭定基同發解開封府舉人二公時有爭喧公安坐幕中閱試巻如不聞拱辰忿不助已詣公室謂公曰此中習宰相氣度耶公和顔謝之及公為樞副石介有慶厯盛徳頌曰予早識琦琦有奇骨可屬大事敦厚如勃後為相歐陽永叔作晝錦堂記曰臨大節處大事埀紳正笏不動聲色而措天下於泰山之安可謂社稷之臣矣天下傳之以為知言家傳公惟務容小人善惡白黒不大分故小人忌之亦少如范富歐尹嘗欲分君子小人故小人忌怨日至朋黨亦起方諸公斥逐獨公安焉後扶持諸公復起皆公力也遺事公既解相印王丞相曰為古人所未嘗任大臣所不敢天下以為名言歐公亦曰進退之際從容有餘德業兩全謗讒自止過周公逺矣行狀公為相作久旱喜雨詩斷句云須㬰慰滿三農望收歛神功寂似無人謂此真做出宰相事業也在北門重陽有詩云不羞老圃秋容淡且看寒花晚節香公居常謂保初節易保晚節難故晚節事事尤著力所立特全又作喜雪詩云危石盖深鹽虎重老枝擎重玉龍寒人謂公身雖在外自任以天下之重如此遺事公雖在外然其心常係社稷至身老而心益篤雖病不忘國家或有時聞更祖宗一法度壞朝廷一紀綱則泣血終日不食別錄公曰琦平生仗孤忠以進毎遇大事即以死自處幸而不死皆偶成實天扶持非琦所能也同上公云臨事若慮得是劄定脚做更不移成敗則任他方可成務又嘗謂大臣以李固杜喬為本其弊猶恐為胡廣趙戒若以胡趙自處弊可知也並遺事公言慶厯中與希文彦國同在西府上前争事議論各别下殿不失和氣如未嘗争也當時相善三人正如推車子盖其心主於車可行而已公論君子小人之際當以誠待之但知其小人當淺與之接耳凡人至於小人欺已處必露其明以破之公獨不然明足以照小人之欺然毎受之未嘗形色也並别錄公因論進退曰處去就之難者不可猛而有迹遺事孫和甫奉使虜中過魏請教於公公曰勿以為夷狄而鄙薄之甚善公在魏府僚屬路拯者就案呈有司事而狀尾㤀書名公即以袖覆之仰首與語稍稍潛巻以授之並别錄公在大名日有人獻玉盞二隻云耕者入壞塜而得表裏無纎瑕可指亦絶寳也毎開宴召客特設一棹覆以錦衣置盞其上一日召漕使且將用之酌酒勸座客俄為一吏誤觸倒玊盞俱碎坐客皆愕然吏且伏罪公神色不動笑謂座客曰凡物之成毁亦自有數俄頋吏曰汝誤也非故也何罪之有坐客皆嘆公寛厚不已遺事公帥定州時夜作書令一侍兵持燭侍兵旁視燭燃公鬚公遽以袖摩之而作書如故少頃囬視則已易其人矣公恐主吏鞭之亟呼視之曰勿易渠已解把燭矣軍中感服别錄公姿貌英特美鬚髯骨骼清聳眉目森秀圗繪傳天下人以謂髙山大岳望之氣象雄傑而包育微細畜泄雲雨藏匿寳􅏜盖自然也行狀公在相位所進用人惟以公議所在凡薦引於上前未嘗輙漏其語間因上有宣諭或同僚談說人始聞之家傳有問公郭逵衆人皆謂出公力曰用人等事非人臣所得專須還他主上若用人是則將順非則開陳何謂琦力始英宗欲郝質在西府公謂質固得但二府論道經邦一黥卒主之恐反使不安如狄青為中外所伏一旦居此論議紛然而去愛之適所以害之英宗沉吟久之曰如此則用郭逵粗勝質遂然之遺事公元勲盛德如此聞人一小善則曰琦不及也别錄公平日奬進人才極博至心許者不過一二人多見其與人長㤀人短而用之謂太濫其實胸中不啻黒白公論時望諸公皆不以經綸許之謂才器須周可當四面入麄入細乃經綸事業今皆可當一面才也遺事公論近世宰相獨許裴晉公本朝惟師服王沂公又嘗云若晉公㸃檢着亦有未盡處君子成人之美不可言也不知摘晉公何事或問威克厥愛允濟如潞公臨大事全是威何如曰待威而後濟者亦是也然不湏以威而能濟者觀公意豈以德不足者必待威以立事耶古人謂鵰鶚百鳥望而畏之鸞鳯百鳥望而愛之其服則一其品相逺矣遺事公嘗言仁廟議配享清議皆與沂公而不與申公誠意不可欺如此又曰頃時丁冦立朝聞天下一善言皆歸之萊公未必盡出萊公也聞一不善事必歸之晉公未必盡出晉公也盖天下之善惡争歸焉人之修身養誠意不可不謹又曰沂公為相論其事則無可數者論其人則天下信之以為賢相申公以進賢自任恩歸於己時士皆出其籠絡獨歐范尹旋收旋失之終不受其籠絡遺事或問君實晦叔天下屬望他日大用當何如公曰才偏規模小吴長文子璟素以堅挺有節槩稱公亦稱之及幕府有闕門下有以璟為言者公曰此人氣雖壯然包蓄不深發必暴且不中節當以此敗置而不言不踰年璟敗皆如其言趙君錫被召别公請教公曰平日之學正為今日若不錯餘不錯矣公平日謂成大事在膽未嘗以膽許人往往自許也潞公在西府人有以公進退諷潞公者潞公曰彦博豈敢望韓公韓公地位别彦博則有些麄材蒙朝廷擢備兩府耳人頗與潞公自知之明並遺事錢明逸久在禁林不合意出為秦州居常怏怏不事事公聞之語人曰已雖不欲獨不思所部百萬生靈邪别錄公屢薦歐陽公而仁宗不用他日復薦之曰韓愈唐之名士天下望以為相而竟不用使愈為之未必有補於唐而談者至今以為謗歐陽修今之韓愈也而陛下不用臣恐後之談者謗必及國不特臣也陛下何惜不一試之以曉天下後世也上從之談叢公晚與永叔相知而相親最深永叔深服公之德量嘗曰累百歐陽修何敢望韓公公曰永叔相知無他琦以誠而已公知永叔不以繫辭為孔氏書又多不以文中子為可取中書相會累年未嘗與之言及也别錄石守道編三朝聖政錄將上一日求質於公公指數事其一太祖惑一宫鬟視朝晏羣臣有言太祖寤伺其酣寢刺殺之公曰此豈可為萬世法已溺之乃惡其溺而殺之彼何罪使其復有嬖將不勝其殺矣遂去此等數事守道服其清識遺事石守道作慶厯詩忠邪太明白公與范公適自陜西來朝道中得之范公拊股謂公曰為此怪鬼軰壞了公曰天下事不可如此如此必壞别錄公言始學行已當如金玉不受微塵之汚方是及其成德有所受亦有所不害者不然無容矣公嘗謂忠義之心人皆有之惟其執之不固勉之不力是以不及於古人並遺事公嘗從容議及養兵事慨然曰琦有所思而得之未嘗語人人亦未必信養兵雖非古然積習既久不可廢之又自有利處不為不深昔者發百姓戍邉無虚嵗父子兄弟有生離死别之苦議者但以不如漢唐調兵於民獨不見杜甫石壕吏一篇調兵於民其弊至此後世既收拾強悍無頼者養之以為兵良民雖歛稅良厚而終身保骨肉相聚之樂此豈小事又其練習戰陣而豪壯可使安得與農民同日道也别錄公謂處事不可有心有心則不自然不自然則擾太原土風喜射故民間有弓箭社琦在太原不禁亦不驅故人情自得亦可寓兵備於其間後宋相繼政頗著心處之下令籍為部伍仍湏用角弓太原人貧素用木弓自此有賣牛買弓者人始騷然矣此出於有心也遺事公天性清簡獨觀書文晝夜不倦餘暇則喜書札素愛顔魯公書而加以遒徤自成一家端重剛勁類其為人行狀崔公孺公夫人之弟也公執政用監司非其人則曰公居陶鎔之地宜法造化為心造化者以蛇虎害人之物故置蛇於藪澤置虎於山林今公乃置於通衢使為民害可乎公嚴憚之記聞或問伊川量可學否曰可學進則識進識進則量進曰如魏公可學否曰魏公是間氣胡氏傳家錄論韓魏公范文正公皆是天資不由講學上蔡語錄宋名臣言行錄後集巻一
