body:
  text: 宋名臣言行錄外集巻十五宋李幼武纂集陸九齡復齋先生字子夀撫之金谿人入太學為學錄乾道四年登進士第授桂陽軍教以親老道逺淳熙甲午改興國軍教丙申到任丁憂服闋庚子春調全州教九月卒享年四十九幼明悟端重少長補郡博士弟子員時秦檜當國塲屋無道程氏學者先生從故編得其説獨委心焉乆之新博士且至聞其雅以放逸自許慨然歎曰此非吾所願學也賦詩徑歸覽書無滯礙繙閲百家晝夜無倦於隂陽星厯五行卜筮靡不通曉性周謹不肯茍簡涉獵所習必極精詳兄弟皆志古嗜學燕居從容講論道義誾誾侃侃和而不同伯仲之間自為師友雖先生所以成徳其資取者非一端然家庭追琢封植之功與為多焉休假則與弟子適場圃習射曰是固男子之事也自是里中士始不敢鄙弓矢為武夫末藝乙未嵗湖之南嘗有茶冦聲摇旁郡聚落皆入保並舍民走郡請先生主之郡如其請門人多不悦先生曰古者長比閭之士即伍兩之率也士而恥此則豪俠武斷者専之矣今文移動以軍興從事郡縣欲事之集勢必假借主者彼乘是取必於閭里亦何所不至哉冦雖不入境閲習屯禦皆可為後法先生和順不違物而非意自不能干簡直不狥人而與居乆益有味四方學者踵門請益羣疑塞胷紏纒膠轕雖善辨者不能解先生從容啓告莫不涣然失其疑而退非唯動悟孚格固有所本亦其用力於自治者既専且乆人之疾疢皆嘗折肱浮湛滑濇適中其病聴之者於心有戚戚焉至於杆格不入必寛養以俟其可未嘗無益而雜施之也天下之治方術者多矣囿於異端小道者既不足與議晚進新學間有聞君子之餘論者又多既其文而不既其實摹規而畫員擬矩而作方雖或似之而卒非也方其勇於求道之時憤悱直前葢有不由階序者矣然其所志者大所據者實有肯綮之阻雖積九仞之功不敢遂有毫釐之偏雖立萬夫之表不敢安公聴並觀却立四顧弗造於至平至粹之地弗措也晦菴餞東萊至鵝湖先生兄弟來㑹講論先生作詩云孩提知愛長知欽古聖相傳只此心大抵有基方築室未聞無址忽成岑留情傳註翻榛塞著意精㣲轉陸沉珍重友朋勤琢切須知至樂在如今象山和云墟墓興衰宗廟欽斯人千古最靈心涓流積至滄浪水拳石崇成泰華岑易簡工夫終乆大支離事業竟浮沉欲知自下升髙處真偽須先辨只今晦菴和云徳業風流夙所欽别離三載更關心偶扶藜杖出寒谷又枉籃輿度逺岑舊學商量加邃宻新知培養轉深沉却愁説到無言處不信人間有古今東萊柬晦菴曰子夀前日經過留此二十餘日幡然以鵝湖前見為非甚欲著實看書講論心平氣下相識中甚難得也晦菴答曰子靜似猶有舊來意思子夀言其雖巳轉步而未曽移身回思鵝湖講論時氣勢今何止十去七八耶先生屬纊之夕與其昆弟語惟以天下學術人材為念少焉正卧整衣衾理鬚髯怡然而終所謂仁以為已任死而後已者葢於此見之張南軒與先生不相識晚嵗還書相與講學問大端期以世道之重無幾何而張公沒又半嵗而先生下世豈道之顯晦果有數存乎其間耶先生沒東萊又與晦翁帖曰陸子夀不起可痛篤學力行深知舊學之偏求益不巳乃止於此於後學極有所係也晦菴祭之曰學匪私説惟道是求茍誠心而擇善雖異序以同流如我與兄少不並遊葢一生而再見遂傾倒以綢繆念昔鵝湖之下實云識面之初兄命駕而鼎來載季氏而與俱出新篇以示我意懇懇而無餘厭世學之支離新易簡之規模顧予聞之淺陋中獨疑而未安始聴瑩於胷次卒紛繳乎談端徐度兄之不可遽以辯屈又知兄必將反而深觀遂逡巡而旋返悵猶豫而盤旋别來幾時兄以書來審前説之未定曰予言之可懐逮予辭官而未獲停驂道左之僧齋兄乃枉車而來教相與極論而無猜自是以還道合志同何風流而雲散乃一西而一東云云烏乎今兹之嵗非龍非蛇何獨賢人之不淑屢興吾黨之深嗟惟兄徳之尤粹儼中正而無邪至其降心以從善又豈有一豪驕吝之私耶陸九淵象山先生文安公字子靜復齋之弟登乾道八年進士第淳熙元年授洪之靖安簿未上丁繼母憂服闋調建之崇安簿八年以史浩薦除都堂審察不赴九年以侍從薦除國正十年遷勅令所刪定官十一年修寛恤詔令書成改承奉郎十三年轉宣義除將作監丞後省疏駁得㫖主管台州崇道觀十六年滿祠光宗登極除荆門守紹熙三年冬卒於官享年五十四嘉定三年賜諡生有異稟端重不伐究心典籍見於躬行幼不戲弄靜重如成人三四嵗時侍父賀行遇事物必致問一日忽問天地何所窮際父笑而不答遂深思至忘寢食五嵗讀書紙隅無捲摺讀不茍簡勤於攷索嘗曰丱角時聞人誦伊川語自覺若傷我者又曰伊川之言奚為與孔孟之言不類初讀論語即疑有子之言支離登第考官吕祖謙能識其文於數千人之中他日謂先生曰未嘗欵承教僅得之傳聞一見髙文心開目明知其為江西陸子靜也史浩薦之曰淵源之學沉粹之行輩行推之而心悟理融出於自得淳熙辛丑二月寓白鹿洞書院講君子喻於義小人喻於利曰學者於此當辨其志人之所喻由其所習所習由其所志志乎義則所習者必在乎義所習在義斯喻於義矣志乎利則所習者必在乎利所習在利斯喻於利矣故學者之志不可不辨也科舉取士乆矣名儒鉅公皆由此出今為士者固不能免此然場屋之得失顧其拔與有司好惡如何耳非所以為君子小人之辨也而今世以此相尚使汨沒於此而不能以自拔則終日從事者雖曰聖賢之書而要其志之所鄉則有與聖賢背而馳者矣推而上之則又惟官資崇卑禄廪厚薄是計豈能悉心力於國事民隠以無負於任使之者哉從事其間更厯之多講習之熟安得不有所喻顧恐不在於義耳誠能深思是身不可使之為小人之歸其於利欲之習恒焉為之痛心専志乎義而日勉焉博學審問慎思明辨而篤行之由是而進於場屋其文必皆道其平日之學胷中之藴而不詭於聖人由是而仕必皆共其職勤其事心乎國心乎民而不為身計其得不謂之君子乎朱子䟦曰熹率僚友與俱至于白鹿書院請得一言以警學者子靜既不鄙而惠許之至其所以發明敷暢則又懇到明白而皆有以切中其隠㣲深痼之病聴者莫不竦然動心焉於此反身而深察之則庶乎其可以不迷入徳之方矣自少時聞靖康事慨然有感於復讎之義訪求智勇之士與之商確益知武事利病形勢要害人物短長貴溪有山先生登而樂之結茅其上山形如象遂名曰象山號象山翁四方學徒大集至數百人從容講道詠歌怡愉有終焉之意示象山學者曰道不逺人顧人離道耳古人謂宿道鄉方二三君子母徒宿吾方丈日鄉羣山得無愧於宿道鄉方之言斯可矣吾方以此自省因書此以自警藝之進不進亦各視其才雖無損益於其道然至於有棄日有遺力與未知其方而不能問於知者則其道亦可知矣荆門素無城壁先生以為此自古戰爭之場今為次邉在江漢之間為四集之地南捍江陵北援襄陽東䕶隨郢之脅西當光化夷陵之衝荆門固則四鄰有所恃否則有腹背心脇之虞由唐之湖陽以趨山則其涉漢之徑已在荆門之脅由鄧之鄧城以涉漢則其趨山之道巳在荆門之腹餘有間途淺津坡陀不能以限馬灘瀨不能以濡軌者所在尚多自我出竒制勝徼敵兵之腹脅者亦正在此雖四山環合易於備禦義勇四千強壯可用而倉廪藏庫之間麋鹿可至累政欲修築子城憚重費不敢舉先生審度決計召集義勇優給庸直躬自勸督役者樂趨竭力工倍二旬訖築故事上元郡設齋醮曰為民祈福先生㑹吏民講洪範五皇極皇建其有極歛時五福用敷錫厥庶民惟時厥庶民于汝極錫汝保極一章代醮事曰皇大也極中也洪範九疇五居其中故謂之極是極之大充塞宇宙天地以此而位萬物以此而育古先聖王皇建其極故能參天地贊化育當此之時凡厥庶民皆能保極比屋可封人人有士君子之行協氣嘉生薫為太平嚮用五福此之謂也皇建其有極即是歛此五福以錫庶民捨極而言福是虛言也是妄言也是不明理也惟皇上帝降𠂻于下民𠂻即極也凡民之天均有是極但其氣稟有清濁智識有開塞天之生斯民也使先知覺後知使先覺覺後覺古先聖賢與民同類所謂天民之先覺者也以斯道覺斯民者即皇建其有極也即歛時五福用敷錫厥庶民也今聖天子皇建其極是彛是訓于帝其訓無非歛此五福以錫爾庶民守令承流宣化即是承宣此福為天子以錫爾庶民也凡爾庶民知愛其親知敬其兄者即惟皇上帝所降之𠂻天子所錫之福也若能保有是心即為保極宜得其夀富康寧是謂攸好徳考終命凡爾庶民知有君臣上下知有中國夷狄知有善惡是非知有父慈子孝兄友弟恭夫義婦順朋友有信即惟皇上帝所降之𠂻天子所錫之福也身或不夀此心實夀家或不富此心實富縱有患難心實康寧或為國死事或殺身成仁亦為考終命若論五福但當論人一心此心若正無不是福此心若邪無不是禍世俗不曉只將目前富貴為福目前患難為禍不知富貴之人若其心邪其事惡是逆天地逆鬼神悖聖賢之訓畔君師之教天地鬼神所不佑聖賢君師所不與忝辱父祖自害其身此時回思亦有不可自欺自瞞者若於此時更復自欺自瞞是直欲自絶滅其本心也縱是目前富貴正人觀之無異在囹圄糞穢中也患難之人其心若正其事若善事不逆天地不逆鬼神不悖聖賢之訓不畔君師之教天地鬼神所當佑聖賢君師所當與不辱父祖不負此身仰無所愧俯無所怍雖在貧賤患難中心自亨通正人觀之即是福徳作善降之百祥作不善降之百殃積善之家必有餘慶積不善之家必有餘殃但自考其心則知福祥殃咎之至如影隨形如響應聲實必然之理也初讀書至宇宙二字忽大省曰宇宙内事即已分内事已分内事即宇宙内事曰四方上下曰宇古往今來曰宙宇宙便是吾心吾心即是宇宙千萬世之前有聖人出焉同此心同此理也千萬世之後有聖人出焉同此心同此理也東海有聖人出焉同此心同此理也西海有聖人出焉同此心同此理也南海有聖人出焉同此心同此理也北海有聖人出焉同此心同此理也人心至靈此理至明人皆有是心心皆具是理念慮之不正者頃刻而知之即可以正慮念之不正者頃刻而失之即為不正有可以形迹觀者有不可以形迹觀者必以形迹觀人則不足以知人必以形迹繩人則不足以教人又曰今天下學者惟有兩途一途朴實一途議論公與季兄復齋講貫理學號江西二陸其學務窮本原不為章句訓詁惟孟軻書是崇是信葢謂此心之良天所與我信口能及此則宇宙無非至理聖賢與我同類公見理昭徹加以涵養故能成已成物四方之士風動雲集公矩矱端嚴對之者非心邪念自然銷沮論説爽厲聴之者如指迷途出荆棘質諸遺編義利之分王覇之别天理人欲凡介於毫芒疑似之間者辨之弗措叩之弗竭自非學本正大充乎自然安能如是之周流貫通動與理㑹哉孔煒議諡某發本心之問先生舉是日扇訟是非以答某忽省此心之清明忽省此心之無始末忽省此心之無不通是知先生之心非口説所能贊述所可得而言者日月之明先生之明也四時變化先生之變化也天地之廣大先生之廣大也鬼神之不可測先生之不可測也欲盡言之雖窮萬古不可得而盡也雖然先生之心與萬古之人心一貫無二致學者不可自棄門人楊簡撰行狀東萊柬晦菴曰子靜留得幾日鵝湖氣象已全轉否若只就一節一目上受人琢磨其益終不大也晦菴答曰子靜舊日規模終在其論為學之病如此即只是意見如此即只是議論如此即只是定本某因與説既是思索即不容無意見既是講學即不容無議論統論為學規模亦豈容無定本但隨人材質病痛而救藥之即不可有定本耳渠却云正為多是邪意見閑議論故為學者之病某云如此即是自家呵叱亦過分了須著邪字閑字方始分明不教人作禪㑹耳又教人恐須先立定本却説上面整頓方始説得無定本底道理今如此一槩揮斥其不為禪學者幾希其病恐未必是看人不看理自是渠合下有些禪底意思又自主張太過須説我不是禪而諸生錯㑹了故其流遂至此初先生之兄子美九韶嘗有書與晦菴言太極圖説非正曲加扶掖終為病根意謂不當於太極上更加無極二字晦菴答云不言無極則太極同於一物而不足以為萬化根本不言太極則無極淪於空寂而不能為萬化根本又曰無極只是無形太極只是有理子美不以為然而詆濓溪不巳先生因為之辨以詆濓溪第一書曰易之大傳曰形而上者謂之道又曰一隂一陽之謂道一隂一陽已是形而上者況太極乎極者中也言無極則是言無中也豈宜以無極字加於太極之上無極二字出於老子聖人之書無有也晦菴答曰大傳既曰形而上者謂之道矣而又曰一隂一陽之謂道此豈真以隂陽為形而上者哉正所以見一隂一陽雖屬形器然其所以一隂而一陽者是乃道體之所為也故謂道體之至極則謂之太極謂太極之流行則謂之道雖名二物實無兩體周子所以謂之無極者正以其無方所無形狀以為在無物之前而未嘗不立於有物之後以為在隂陽之外而未嘗不行乎隂陽之中以為通貫全體無乎不在則又初無聲臭影響之可言也今乃深詆無極之不然則是直以太極為有形狀有方所矣直以隂陽為形而上者則又昧於道器之分矣又於形而上者之上復有箇太極乎之語則是又以道上别有一物為太極矣如老子復歸於無極乃無窮之義非若周子所言之意也第二書曰兄若實見太極上面必不更加無極字下面必不更著真體字上面加無極字正是疊床上之床下面著真體字正是架屋上之屋老氏以無為天地之始以有為萬物之母以常無觀妙以常有觀徼直將無字撘在上面正是老氏之學豈可諱也晦菴答曰詳老氏之言有無以有無為二周子之言有無以有無為一正如南北水火之相反更請仔細著眼未可容易譏評也先生再書辭加憤厲晦菴答之以為凡辨論亦須平心和氣仔細精詳反覆商量務求實是乃有歸著如不能然但於匆遽急迫之中肆支蔓躁率之詞以逞其忿懟不平之氣則豈有君子長者之意乎如曰未然則我日斯邁而月斯征各尊所聞各行所知無復可望於必同也晦菴曰熹見延平因論象山之學子靜説話常是兩頭明中間暗或問暗是如何曰是他那不説破處他所以不説破處便是禪鴛鴦綉出從君看莫把金針度與人他禪家自愛如此問象山師承曰他們天資也髙不知師誰然也不問師傳人學多是就氣稟上做偏了子夀兄弟氣象甚好其病却是盡廢講學而専務踐履却於踐履之中要人提撕省察悟得本心此為病之大者要其操持謹質表裏不二實有以過人者惜乎其自信太過規模窄狹不復取人之善將流於異學而不自知耳子靜平日所以自任正欲身率學者一於天理而不以一毫人欲雜乎其間子靜之學於心地工夫不為無所見但便欲持此陵跨古今更不下窮理細宻工夫卒并與其所得者而失之如陸氏之學則在近年一種浮淺頗僻議論中固自卓然非其儔匹其徒傳習亦有能修其身能治其家以施之政事之間者但其宗㫖本自禪學中來不可揜諱子靜使氣好為人師要人悟子靜分明是禪但却成一个門戸尚有所據曽祖道曰頃年亦嘗見象山晦菴笑曰這好商量公且道象山如何對曰象山之學某曉不得更是不敢學曰如何不敢學對曰象山與某言目能視耳能聴鼻能知香臭口能知味心能思手足能運動如何更要甚存誠持敬硬要將一物去治一物須要如此做甚詠歸舞雩自是吾夫子家風某對他曰是則是有此理恐非初學所到地位象山曰吾子有之而必欲外鑠以為本可惜某曰此恐只是先生見處今要他便如此却恐成猖狂妄行蹈乎大方者矣象山曰纒繞舊習如落陷穽卒除不得晦菴曰子靜所學分明是禪又曰江西大抵秀而能文若得人㸃化是多少明快葢有不得不任其責者吕伯恭門徒氣宇厭厭四分五裂各自為説乆之必至銷歇子靜則不然精神𦂳峭其説分明能變化人使人旦異而晡不同其流害未艾也並朱子説宋名臣言行錄外集巻十五
