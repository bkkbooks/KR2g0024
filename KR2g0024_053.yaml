body:
  text: 宋名臣言行録别集下卷八宋李幼武纂集嶽飛信國武穆王字鵬舉相州安陽人靖康初𨽻宗澤軍轉武翼郎建炎初上即位上書忤用事者奪官尋詣河北招討司效用與王彥不協復歸澤軍為留守司統制以竒功轉武功郎三年轉武經大夫轉武略大夫借英州刺史轉武德大夫授真州刺史遷武功大夫昌州防禦使通泰州鎮撫使兼知泰州尋充神武副軍統制權留洪州授親衛大夫建州觀察使紹興二年以本職權知潭州兼權荆湖帥司都總管六月授中衛大夫武安軍承宣使三年召九月至引見詔落階官加鎮南軍承宣使江西沿江制置使又除江西舒蘄州制置使神武後軍統制四年兼荆南鄂嶽州制置使又除黃復州漢陽軍德安府制置使辭不許移屯鄂州加清逺軍節度使湖北荆襄制置使五年入覲加鎮寧崇信軍節度使加檢校少保封公荆襄招討使六年兼營田使易武勝定國兩鎮之節除宣撫副使駐襄陽丁母憂即日起復命職位中增河東路節制河北路召七年正月入見二月起復太尉三月扈從至建康又令節制光州夏詣督府議事不合上表乞解兵歸廬山上連詔還軍力辭不許以和議成進秩不受三詔乃拜加開封府儀同三司十年加少保兼河南北陜西諸路招討使有詔班師上章請罷致仕不許召十一年秦檜主和召授樞密副使請還兵罷宣撫使入覲檜益憾之力請解兵万俟卨章再上不報羅汝楫六章亦不報八月授萬壽觀使奉朝請檜譖之囚於棘寺賜死年三十九一家皆逺徙孝宗即位追復原官改葬録其子孫立廟鄂州天資敏悟強記書傳尤好左氏春秋傳及孫吳兵法家貧拾薪為燭為文初不經意人誦則剖是非析義理若精思者初見上於元帥府從劉浩解東京圍與金兵相持滑州南敵兵至王迎斬其將金大敗斬首數千級得馬數百匹上即位王上書數千言請上還京乘二聖蒙塵未久敵穴未固親率六軍迤邐北渡天威所臨將士一心則中原指期可復矣大忤用事者奪官歸田里張所招撫河北一見王與語大悅待以國士補官禆將中軍因問時事王曰本朝都汴惟倚河北以為固茍深溝髙壘峙列重鎮使敵入吾境一城之後復困一城一城受圍諸城或撓或救則敵不敢犯而京師根本之地固矣河南之有河北猶燕雲之有金坡諸關河北不歸則河南未可守諸關不獲則燕雲未可有童貫取燕雲而不知爭關是以虛名受實禍今為招撫計直有進取河北地以為京師援爾從王彥渡河至衛州新鄉縣王約彥出戰不進王獨引所部鏖戰奪其纛舞而示諸軍諸軍鼓譟爭奮遂拔新鄉擒千户阿里布又戰敗之眀日戰侯兆川又破之益北擊敵戰於太行山擒拓拔雅爾烏居數日與敵遇王單騎持鐵鎗刺殺金帥所謂黑風而王其號者走其衆三萬杜充棄京師之建康王説之曰中原地尺寸不可棄況社稷宗廟在京師陵寢在河南尤非他地比充不聼金人與李成共寇烏江縣充閉門不出王扣寢閣諌之因流涕被靣固請出視師充竟不出金由馬家渡渡江充遣王迎敵戰方酣王􅊅先遁獨王力戰其後士卒乏食諸將皆欲叛去王灑血厲衆曰我輩荷國厚恩當以忠義報國立功名書竹帛死且不朽今日之事有死無二輒出此門者斬詞色慷慨士皆感泣烏珠入臨安王領所部邀擊之六戰皆捷俘諸路剃頭簽軍首領四十八人察其可用者結以恩信遣還金營令夜斫營燒毁炮車器械乘其亂交擊大敗之金之簽軍涉其地者皆相謂曰嶽爺軍來也爭來降附金犯常州王邀擊四戰皆捷戰于清水亭金大敗橫尸十五里烏珠復趨建康王設伏于牛頭山上待之夜令人混敵營擾其營敵驚自相攻烏珠次於龍灣王自牛頭山馳至南門與戰大破之烏珠奔淮西王入城撫定獻俘行在所上詢所俘人得二聖音問感動久之王奏曰建康為國家形勢要害之地宜選兵固守乞益兵守淮拱護腹心上嘉納紹興初上命張俊討李成俊請以王軍同討王至鄱陽與俊合三月次洪州俊召王計之曰某與李成數戰不利為我計之王曰敵貪而不慮後若以騎兵三千自上流出生米渡出其不意破之必矣飛願為先鋒俊大喜王濳出賊軍之右首突賊陳所部從之賊大敗王以紅羅為幟刺嶽字其上白之平眀選二百騎建旗而前敵易其少薄之伏發大敗走賊將馬進走成所成怒引兵來王遇之樓子莊大破之殺馬進成走降偽齊曹成亂執向子諲據道州賀州命王捕之王入賀州境夜焚賊寨成奔桂嶺竄連州嶺表悉平三年召至行在所諭令係金帶上殿賜御札於旗曰精忠嶽飛令行師必建之金侵淮圍廬州上賜札曰淮報緊急朕非卿到終不安心王遣牛臯渡江自提兵趨廬州與臯會偽齊五千騎逼城臯以所從騎遙謂曰牛臯在此爾輩何為見犯敵衆愕視及張嶽字旗精忠旗示之敵衆自潰王令臯追擊敵相踐及殺死者相半廬州平上賜札令王具守禦策公奏曰金豫皆有可取之理攻討之謀正不宜緩如及此時以精兵二十萬直搗中原誠易為力襄陽隨郢地皆膏腴來春即可措置營田陛下欲屯大兵於鄂州則襄陽隨郢量留軍馬又於安復漢陽亦量駐兵六州之屯且以正兵二萬為固守計就撥湖南江西糧斛朝廷支降劵錢為一年支遣候營田就緒攻守皆利也襄陽重地既為偽將李成所據湖襄之民亦不奠枕士大夫自蜀來者茫然莫知所向一日宰執奏事朱勝非謂當先取之上曰今便可議就委嶽飛如何時飛為江西制置使駐軍鄂嶽趙鼎曰知上流利害無如飛者上命飛收復襄陽飛率王萬等自鄂渚趨襄陽朱勝非許飛迄事建節且命沈昭逺往總軍餉趙鼎請上親筆詔監司帥守餉飛軍無闕庶幾必濟飛等進軍於是劉豫求救於虜虜偽之兵俱來我師與遇連戰大破之遂復襄陽及郢隨諸州飛分遣王貴張憲連擊賊兵又復鄧州軍聲大振上謂宰執曰嶽飛既收復襄郢尼瑪哈聞之必怒況今已是六月下旬便可講防秋事倘敵人南來朕當親統諸軍分頭迎敵使之無遺類即中原可復若依前逺避為泛海計何以立國也初飛遣張憲引兵攻隨州月餘不能下牛臯請行乃裹三日糧往衆皆笑之糧未盡而城破飛進復郢州董先頗有功先臯皆久在京西故飛以為將李成聞郢州失守乃棄襄陽遁去與虜偽合兵屯鄧之西北飛遣王貴張憲至城下賊兵來戰董先出竒邀擊大破之賊將高伸入城據守將士蟻附而上遂克之飛移屯德安府軍聲大振捷奏至上曰朕素聞飛行軍極有紀律未知能破敵如此飛自池州來朝召見加鎮寧崇信節度賞淮西之功也飛為荆湖襄陽制置使主兵八萬至鼎州討湖賊楊太太為其下所殺楊欽領其衆數十萬以拒命先是都督張浚親臨湖以觀賊勢疑未可攻復欲還朝為防秋之計會飛來以小圖白浚曰此易擒爾浚曰恐妨防秋之備飛請浚少留限八日擒之乃遣飛往初任士安王俊郝政領兵二萬餘慢王􅊛不稟其令以此無功飛始至鞭士安以折其氣使為賊餌先揚言嶽太尉兵二十萬至矣及是止見士安等軍賊併力拒之飛伏大兵四合賊敗走悉乘小舟入水寨賊將陳瑫內變劫偽太子鍾子儀船獲金交床與龍鳯簟等詣飛降餘黨相繼皆降飛入水寨殺賊殆盡惟夏誠寨恃險固守飛擇善罵者二千餘人夜往罵之且悉衆運草木流下填滿乃長驅入營遂擒誠果應飛之讖於是浚言除楊太就戮外招到黃誠周倫等衆二十餘萬湖寇盡平李龜年記録楊么本末曰初賊自恃其險官軍陸襲則入湖水攻則登岸賊中為之語曰有能害我須是飛來蓋言其險非有羽翼莫能近也俄詔用嶽飛適值大旱湖水涸飛命軍士伐君山之木為巨筏無數賊不意以木筏塞諸港汊賊戰敗急趨舟欲出湖而港汊已滿舟為所礙不能遁戮死外盡招降之飛來之讖於是乎驗飛謂出軍每以發糧為患京西湖北平即募民營田給以牛種假之口食分任官吏責其成功又為屯田之法使戍伍兵戰之暇盡力南畝行之二三年省漕運之半上嘗書曹操諸葛亮羊祜三事賜之逆豫有南窺之意韓世忠自淮陽已還楚州張俊既城盱眙遂進屯泗州飛遣兵至蔡州焚其積聚張俊承詔入覲力請上進臨建康上發臨安先詣上天竺寺燒香道旁有執黃旗報捷乃飛遣王貴郝政董先攻下虢州寄治盧氏縣賊衆獲糧十五萬石上至臨平鎮於舟中與宰執論飛之捷上曰飛捷固可喜淮上諸將各據要害雖為必勝計然兵家不勝惟慮敗耳萬一小跌不知如何更宜熟慮上詔公入覲參謀官薛弼亦移書促公行至是飛偕弼入奏事公以手疏言儲二事衝風吹紙動搖飛聲戰讀不能句公退弼進上視之色動弼曰臣在道常怪飛習寫細字乃作此奏雖其子弟無知者此據小歷所載按飛家集乃云詔飛援順昌時將發手書密奏略曰今欲恢復必先正國本以安人心然後不常厥居以示無忘復讎之意張戒默記曰弼以甲子正月道由建昌謂戒曰弼之免於禍天也往者丁巳嵗被旨從鵬入覲與鵬遇於九江之舟中鵬曰某此行將陳大計弼請之鵬云近諜報虜酋以丙午元子入京闕為朝廷莫若正資宗之名則虜計沮矣弼不敢應抵建康與弼同日對鵬第一班弼次之鵬下殿靣如死灰弼造膝上曰飛適奏乞正資宗之名朕諭以卿雖忠然握重兵於外此事非卿所當與也弼曰臣雖在其幕中然初不與聞昨到九江但見飛習小楷凡密奏皆飛自書耳上曰飛意似不悅卿自以意開諭之弼受旨而退嗟夫鵬為大將而越職及此其取死宜哉弼又曰不知若箇書生教之耳飛字鵬舉故隱語但曰鵬云飛升宣撫使因扈駕至建康以劉光世所統王德酈瓊等兵五萬餘𨽻飛且詔德曰聽飛號令如朕親行飛上疏論恢復略曰望陛下假臣日月勿拘其淹速使敵莫測臣之舉措萬一得便可入則擬兵直趨京洛據河陽陜府潼關以號召五路之叛將叛將既還王師前進劉豫必棄汴京而走河北京畿陜右可以悉復至於東京諸郡陛下付之韓世忠張俊亦可便下臣然後分兵濬滑經略兩河則劉豫父子斷必成擒假令汝穎陳蔡堅壁清野商於虢略分屯要害進或無糧可因攻或難於餽運臣須斂兵退保上流賊必襲而南臣俟其來當率諸將或挫其鋭或待其疲賊利速戰不得所欲勢必復還臣當設伏邀其歸路小入則小勝大入則大勝然後復圖再舉設若賊見上流斂兵併力侵淮上或分兵攻犯四川臣即長驅搗其巢穴惟願陛下戒勑有司廣為儲備俾臣得以一意靜慮不以兵食亂其方寸則謀定計密必能濟此大事疏奏御札答曰有臣如此朕復何憂進止之機朕不中制飛復奏述前志賜札報曰覽卿近奏鋭然以恢復為請豈天實啓之將以輔成朕志行遂中興也方率厲將士將合師大舉會檜主和忌其成功沮之議遂寢飛奉詔詣督府與張浚議而淮西之兵猶未有所付浚意屬吕祉乃謂飛曰王德為將淮西軍之所服也浚欲以為都統制仍命吕祉以督府參謀領之如何飛曰德與酈瓊等夷素不相下吕尚書雖通材然書生不習軍旅不足以服其衆浚曰張宣撫如何曰飛之舊帥也然其人暴而寡謀且酈瓊之素所不服曰然則楊沂中爾飛曰沂中視德等耳浚艴然曰浚固知非太尉不可也飛曰都督以正問飛不敢不以正對豈以得軍為念耶飛去夏以內艱奪情􅊩職既與浚忤即日上章乞解兵柄以終喪步歸廬山廬於墓側以張憲權管軍事浚怒乃命參議官張宗元為宣撫判官監其軍上速詔飛還軍飛力辭詔屬吏造廬起之飛不得巳乃趨朝既見猶請待罪上優詔答之俾復其位而還宗元浚竟用王德統淮西軍而以吕祉監之果召變上與宰執言飛未解帥事上曰飛頃入對請由商虢取關陜欲併統淮右之兵而行朕問何時可畢對曰期以三年朕諭飛駐蹕于此以淮甸為屏蔽若輟淮甸之兵雖能定中原朕亦何惜第恐中原未復而淮甸失守則行朝未得奠枕而卧也飛無以對飛既復任宗元乃還王庶出視帥江淮飛以書與之曰今嵗若不舉兵當納節請間庶稱其壯節金人敗盟公遣將李寶孫彥與金人戰于曹州屢敗之大戰于宛亭縣敗之寶又及金人戰于宛亭敗之又遣牛皋戰於京西敗之進戰於黃河上又敗之又遣統制張憲戰于穎昌府敗之復穎昌府憲又戰陳州界敗之復陳州又遣統制董先姚政戰穎昌府敗之又遣將王成戰鄭州敗之復鄭州又遣統制孟邦傑復永安軍至夜遣其將劉政劫之於中牟縣敗之又遣將張憲韓青戰河南府敗之又遣將楊遇戰南城軍敗之復河南府南城軍又遣將梁興董榮戰絳州垣曲縣敗之興又戰孟州王屋濟坦兩縣敗之公與烏珠戰偃城縣敗之再戰又敗之殺其將卾爾多貝勒張憲又戰臨穎縣敗之王貴姚政與烏珠大戰于穎昌府敗之又命張憲傅選寇成戰臨穎縣敗之公屢獲捷方欲深入而宰相秦檜陰助金人勸上纍詔班師公憤恨而還所復州縣尋復失和議成公上表云謂無事而請和者謀恐卑詞而益幣者進願定謀於全勝期收地於兩河唾手燕雲終欲復讐而報國誓心天地尚令稽首以稱藩達蘭烏珠皆在祁州奉使王倫行至祁見之時世忠嶽飛吳玠吳璘軍各遣間招誘中原民金得其蠟彈旗榜出以詰倫曰議和之使既來而暗遣姦諜如此君相紿且不測進兵耳倫言所議靖民乃主上誠意邊臣見久而無成或乘時希尺寸為已勞則不可保主上決不之知若上國孚其誠意確許之平則朝廷一言戒之誰敢爾者二酋相視無語詔湖北京西招討使嶽飛往駐江州飛奏巳至上曰淮西既無事飛不須更來趙鼎曰此有以見諸將知尊朝廷上曰劉麟敗北朕不足喜而諸將知尊朝廷為可喜也公既為湖北京西宣撫副使又詔為宣撫使時淮東江東宣撫使韓世忠張俊皆以立功而公以列將拔起世忠俊不平公先皆屈巳下之書數通俱不答及公破楊么獻樓船各一兵徒戰守之械畢備世忠始大悅而俊益忌之公參謀官薛弼雖每勸公調護而幕中之輕鋭者復教公勿苦降意於是公與俊隙始深矣初上詔公以兵援淮西公念前此每勝復被召還乃以乏糧為辭及濠州已破而公始來援故俊與檜皆恨之小厯載飛先數言和議非計秦檜大惡之金之入冦上命飛以兵援淮西飛力疾即日就道上賜詔奬之張俊貽飛書以前途乏糧為言飛不為止時賜札有曰卿聞命即往廬州糧餉之艱卿不復顧俊疑飛漏其言歸朝乃倡言飛逗遛不進以糧乏為辭及同行楚州城俊欲修城為守備飛曰當戮力以圖恢復豈可為退保計俊歸復反其言謂飛欲棄山陽與檜謀令万俟卨劾飛對將佐謂山陽不可守沮喪士氣始有殺飛意矣初給事中范同力助和議至是又以諸大將久握重兵難制獻計于檜請皆除樞密而罷其兵權檜用之乃密奏上以拓臯之捷召世忠俊飛並詣行在論功行賞時世忠俊己至而公獨後檜與參政王次翁憂之乃謀以明日率三大將置酒湖上欲出則語直省官曰姑待嶽少保來益令堂厨豐其宴具如此展期以待至六七日及公至即鎖院壬辰以世忠俊為樞使公為副使惟俊與檜意合故力贊和議也王次翁敘記曰紹興辛酉金人有飲馬大江之謀大將張韓皆欲先事深入唯飛駐軍淮西不肻動上以親札促其行者凡十有七飛偃蹇如故最後又降親札曰社稷存亡在卿此舉飛奉詔移軍三十里而止上始有誅飛意又世忠軍中親校溫濟者以世忠隂事來告朝廷置濟於湖南世忠連上章乞遣濟至軍中語甚不遜是時三大帥皆握重兵輕視朝廷其年拓臯之捷有旨令大將入論功行賞俊世忠已至而飛獨未來檜為相先臣參政大臣止二人檜憂之甚先臣為之謀以明日率三大將置酒湖上欲出則語直省官曰姑待嶽少保來益令堂厨豐其宴具如此展期以待六七日飛既到以眀日鎖院皆除樞密使趣令入院供職罷其兵柄晡時有旨鎖院明日宣麻是夜將半以制分命三大帥軍中列校使各統所部自為一軍更其銜曰統制御前軍馬凡其所統升黜賞罰得專達之諸校喜於自便莫不欣然受命明日三大帥入受元樞之制既出其所部皆已散去導從盡以密院之人上之此謀惟先臣與檜預之天下歎服三帥既罷兵柄先臣語伯庠等曰吾與秦檜謀之巳久雖外示間暇而終夕未嘗交睫脫致紛紜滅族非所憂所憂宗社而已事幸而成上之英斷與天合也吾何力之有自烏珠復取河南飛深入不巳烏珠以書抵檜曰爾朝夕以和請而飛方為河北圖必殺飛而後可和於是檜與俊謀置飛於死地矣先以淮西山陽之事罷之右諫議万俟卨言飛議棄兩淮地專守大江以南且提重兵十餘萬無橫草之勞倡言棄兩淮以動朝廷此不臣之漸也宰執奏事上曰山陽要地屏蔽淮東無山陽則通泰不能固賊來徑趨蘇常豈不搖動其事甚眀比遣張俊嶽飛往彼措置戰守二人登城行事飛於衆中倡言楚不可守城安用修蓋將士戍山陽厭久欲棄而之他飛意在附下以要譽其言如此朕何賴焉檜曰飛對人之言乃至是中外或未之知也張憲王貴王俊皆飛故部曲也張俊知貴俊於飛憲有間遂誘俊告憲謀還飛兵柄於貴執憲歸于張俊行府院吏以為密院無訊囚法俊不從自鞫之使憲誣服以為得雲手書命已謀之獄成俊以告檜械送行在下之棘寺逮繫飛父子初命何鑄治其獄鑄眀其無辜改命万俟卨遂誣飛父子致書于憲貴令虛申警報以動朝廷及令憲措置使飛還軍且謂其書皆已焚矣無可證者或教卨以臺評所措淮西事為言遂以逗遛詰飛而所賜飛之御札與往來道途日月皆可考乃命評事元龜年雜定之以傅會其獄而收其御札送官以滅迹飛困於考掠亦無服辭檜一日手書小紙付獄即報飛死矣竟以衆證蔽罪飛賜死憲雲戮于市籍沒資産徙家嶺南官屬坐罪者六人洪皓在虜中蠟書馳奏以為虜所大畏服不敢以名稱者惟飛至以父呼之諸酋聞其死皆酌酒相慶先是張憲之獄未成万俟卨為御史中丞何鑄以除執政奉使乃改命卨推勘而飛與子雲皆係獄矣初公之在湖北也辛次膺舟行過鄂公燕待之既而延入小閣盡出所被宸翰具言上眷之渥且執次膺手曰前夕夢為棘寺逮對獄吏曰辛中丞被旨推勘飛方懼不敢告人而公適至公自諌官補外他日必為獨坐飛或不幸下獄願公救之次膺悚然不知所對至是公悟昨夢乃新中丞也初檜居永嘉祕撰主管玉隆觀薛弼嘗遊其門又卨為湖北提刑弼時終撫本路除劇盜伍俊歸功于卨至是治飛獄弼雖為公參謀官無一辭纍及先是獄之成也世忠嘗以問檜檜曰飛子雲與憲書不明其事體莫須有世忠曰莫須有此三字何足使人甘心因爭之檜不聽公知書而待士且濟人之貧用兵先計後戰屢勝強虜號為良將其死天下寃之詔鄂州建嶽飛祠宇以忠烈廟為額從州人請也飛忠孝出於天性初從駕渡河留妻養母河北陷沒飛遣人求訪凡十八往返乃獲迎歸母痼疾藥餌必親嘗遇出師必戒家人謹侍養母喪既葬廬於墓側御札數四強之而後起自有敵難飛立志慷慨以必取中原滅讐虜為念臨危誓衆或至流涕將士莫不感奮聞車駕所在未嘗背之而坐自奉甚薄少飲酒能至數斗上嘗戒之曰卿異時到河朔乃可飲酒遂絶口不飲吳玠嘗盛飾名姝以遺之却而不受上欲為營兵第於行都飛辭謝曰金人未滅臣何以家為故起復制詞有厲嫖姚辭第之志之語每與士卒最下者絶甘分少其馭軍以重搜選謹訓練公賞罰明號令嚴紀律同甘苦為要張俊嘗問用兵之術曰仁信智勇嚴五者不可缺一問嚴曰有功者重賞無功者重罰止兵休舍輒課士卒藝程注坡跳濠皆被重鎧習之子雲嘗習注坡而馬躓怒欲斬之諸將力祈乃免猶鞭之數百約束必眀簡而使人易從行師秋毫不犯有取民一縷以束芻者立命斬之尤善以寡勝衆其從杜充也以八百人破羣盜王善等五十萬衆其破曹成也以八千人破其衆十萬其戰烏珠也於穎昌則以背搜八百於朱仙鎮之對壘則以背嵬五百皆破其衆十餘萬背嵬之名起於西蕃飛善用之皆以一當百郾城之役烏珠合諸酋之兵以進飛命雲領背嵬遊奕馬軍直貫其陳初烏珠有徑軍號鐵浮屠拐子馬所至莫當是役以萬五千騎來飛命步人以巨斧入其陳勿仰視第斫馬足一馬躓則餘皆相躓藉而斃官軍奮擊之僵死如山烏珠大慟曰自初起兵皆以此勝今已矣拐子馬由是遂廢其出竒制勝多類此自結髮從戎十餘年間大小百餘戰未嘗敗北其伐叛也常以廣上德意為先而釋其餘好禮下士恂恂如諸生未嘗言功伐襄漢之役詔劉光世以五千人為牽制之師六郡既復光世師始至飛奏乞先賞光世諸將或有功多而賞薄者必為之開陳不當得則一級不妄豫子雲屢立竒功匿不以聞或自朝廷舉行猶辭不巳初以上書失官從張所補官所以謗謫行至長沙盜劉忠欲劫以叛所不從遇害飛訪求其子鞠之奏補以官且為所申雪死難之由人皆義之宋名臣言行録别集下卷八
