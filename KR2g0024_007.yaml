body:
  text: 宋名臣言行錄前集巻七宋朱子纂集杜衍祁國正獻公字世昌越州人擢進士甲科相仁宗以太子少師致仕公幼時祖父脱㡌使公執之㑹山水暴至家人散走其姑投一竿與之使挾以泛公一手執㡌漂流乆之救得免而㡌竟不濡記聞公聴獄訟雖明敏而審覈愈精故屢決疑獄人以為神其簿書出納推析毫髪終日無倦色至為條目必使吏不得為奸而已及其施於民者則簡而易行知乾州未滿嵗安撫使察其治行以公權知鳳翔府二邦之民爭於界上一曰此我公也汝奪之一曰今我公也汝何有焉夏人叛命陜西困於科歛吏縁侵漁調發督迫民至破産不能足往往自經投水以死公在永興語其人曰吾不能免汝然可使汝不勞爾乃為區處計較量物有無貴賤道里逺近寛其期㑹使以次輸送由是物不涌貴車牛蒭秣宿食来往如平時而吏束手無所施民比他州省費十六七吏部審官主天下吏員而居職者類以不乆遷去故吏得為奸公始視銓事一日選者三人爭某闕公以問吏吏受丙賕對曰當與甲乙不能爭遂授他闕居數日吏教丙訟甲負某事不當得公悟召乙問之乙謝曰僕已得他闕不願爭公不得已與丙而笑曰此非吏罪乃吾未知銓法爾因命諸曹各具格式科條以白問曰盡乎曰盡矣明日勑諸吏無得升堂使坐聴行文書而已由是吏不與銓事與奪一出於公其在審官有以賂求官者吏謝不受曰我公有賢名不乆見用去矣姑少待之慶厯初上厭西兵之乆出而民弊亟用富韓范而三人者遂欲盡革衆事以修紀綱而小人權倖皆不悦獨公與相佐佑而公尤抑絶僥倖凡内降與恩澤者一切不與每積至十數則連封而面還之或詰責其人至慙恨涕泣而去上嘗謂歐陽修曰外人知杜衍封還内降耶吾居禁中有求恩澤者每以杜衍不可告之而止者多於所封還也其助我多矣此外人及杜衍皆不知也然公與三人者卒皆以此罷去公多知本朝故實善決大事初邉將議欲大舉以擊夏人雖韓公亦以為可舉公爭以為不可大臣至有欲以沮軍罪公者然兵後果不得出契丹與夏人爭銀瓮族大戰黄河外而鴈門麟府皆警范文正安撫河東欲以兵從公以為契丹必不來兵不可妄出范公怒至以語侵公公不為恨後契丹卒不來並歐公撰墓志公為相蔡君謨孫之翰為諌官屢乞出於是蔡除福州之翰安州公云諌官無故出終非美事乞且仍舊上可之退書聖語時陳恭公為執政不肯書曰吾初不聞公懼遂焚之由此遂罷相議者謂公當俟明日審奏不當遽焚其書也公言始在西府上每訪以中書事及為相中書事亦不以訪公因言君臣之間能全始終者葢難也志林公嘗謂門生曰凡士君子作事行已當履中道不宜矯飾矯飾過實則近乎偽又曰今之在上者多擿發下位小節是誠不恕也衍知兖州時州縣官有累重而素貧者以公租所得均給之公租不給即繼以公帑量其小大咸使自足尚有復侵擾者真貪吏也於義可責又曰衍厯知州提轉安撫未嘗壊一箇官員其間不職者即委以事使之不暇惰不慎者諭以禍福俾之自新從而遷善者甚衆不必繩以法也其有文學政事殊行絶徳者雖不識面未嘗不力薦於朝有一善可稱一長可錄者亦未嘗不隨所能而薦之有門生為縣令公戒之曰子之才器一縣令不足施然切當韜晦無露圭角毁方瓦合求合於中可也不然無益於事徒取禍爾門生曰公平生以直亮忠信取重天下今反誨某以此何也公曰衍厯任多厯年乆上為帝王所知次為朝野所信故得以申其志今子為縣令巻舒休戚係之長吏夫良二千石者固不易得若不奏知子焉得以申其志徒取禍爾予所以欲子毁方瓦合求合於中也嘗謂門生曰作官第一清畏無求人知茍欲人知同列不慎者衆必譛已為上者又不加明察適足取禍耳但優游於其間黙而行之無愧於心可也公一日憂見于色門生曰公今日何以不悦公曰適覩朝報行某事行某事非便所以憂爾又一日喜見于色門生未及問公曰今日見朝報某人進用某人進用社稷之福也公又曰孔子稱不在其位不謀其政苐衍荷國恩之深退居以来家事百不關心獨未能忘國爾公食于家惟一麵一飯而已或羙其儉公曰衍本一措大爾名位服用皆國家者俸入之餘以給親族之貧者常恐浮食焉敢以自奉也一旦名位爵禄國家奪之却為一措大又將何以自奉養耶又嘗戒門生曰天下惟浙人𥚹急易動柔懦少立衍自在幕府至於監司人尚不信及為三司副使累於上前執奏不移人始信之反曰杜衍如是莫非兩浙生否其輕吾黨也如此觀子識慮髙逺志尚端慤他日植立當為鄉曲之顯謹勿少枉為時所上下也門生嘗從容問公曰公在相位未朞年而出使蒼生不盡被公之澤天下甚鬱望公曰衍以非才乆妨賢路遽得解去深遂乃心然獨有一恨爾門生曰公之恨何也公曰衍平生聞某人之賢可某任某人之才可某用未能悉薦而去此所以為恨也並語錄韓公言公公心而樂與人善既知其人無復毫髪疑間始琦為樞宻副使論難一二事公不樂乆之相亮每事問曰諌議看来未諌議曽看便將来押字琦益為之盡心不敢忽以此見公存心至公不必以出於已為是賢於人逺矣別錄公享客多用髹器客有面稱嘆曰公為相清貧乃爾耶公命侍人盡取白金燕器陳於前曰衍非乏此雅不好爾然公性好施亦卒不蓄也張唐公侍讀壊曰公之好施人所能及也其不妄施人之所不能及也家塾記公退寓南都不殖資産第宅卑陋居之裕如也烏㡌皂綈袍革帶親故或言宜為居士服公曰老而謝事尚可竊髙士名邪范仲淹文正公字希文蘇州人中進士第事仁宗位至參政公二嵗而孤母夫人貧無依再適長山朱氏既長知其世家感泣去之南都入學舍掃一室晝夜講誦其起居飲食人所不堪而公自刻益苦居五年大通六經之㫖為文章論説必本於仁義歐公撰神道碑公處南都學舍晝夜苦學五年未嘗解衣就寢夜或昬怠輙以水沃面往往饘粥不充日昃始食同舍生或饋珍饍皆拒不受遺事公以進士解褐為廣徳軍司理日抱具獄與太守爭是非守盛怒臨之公不為屈歸必記其往復論辨之語于屏上比去至字無所容貧止一馬鬻馬徒步而歸汪藻撰祠堂記晏殊留守南京公遭母憂晏公請掌府學公常宿學中訓督學者夜課諸生讀書寢食皆立時刻往往潛至齋舍詗之見先寢者詰之其人紿云適疲倦暫就枕耳問未寢時觀何書其人亦妄對則取書問之其人不能對乃罰之出題使諸生作賦必先自為之欲知其難易及所當用意亦使學者准以為法由是後學者輻湊公服中上宰相書言朝政得失及民間利病凡萬餘言王曽見而偉之時晏殊亦在京師薦一人為館職曽謂殊曰公知范仲淹捨不薦而薦斯人乎已為公置不行宜更薦仲淹也殊從之遂除館職頃之冬至立仗禮官定議欲媚章獻請天子帥百官獻夀于庭公奏不可殊大懼召公責怒之以為狂公正色抗言曰仲淹受明公誤知常懼不稱為知已羞不意今日更以正論獲罪於門下也殊慙無以應並記聞嵗大旱蝗詔公奉使安撫江淮還以太平州民所食烏昧草進呈乞宣示六宫戚里用抑奢侈燕談公知開封為百官圖以獻曰任人各以其才而百職修堯舜之治不過如此因指其遷進遲速次序曰如此而可以為公可以為私亦不可以不察由是吕丞相怒至交論上前公求對辨語切坐落職知饒州碑貶饒州謝表云此而為郡陳優優布政之方必也立朝増蹇蹇匪躬之節天下歎公至誠許國始終不渝不以進退易其守也燕談公為將務持重不急近功小利於延州築青澗城墾營田復承平永平廢寨熟羌歸業者數萬戸於慶州城大順以據要害奪賊地而耕之又城細腰胡盧於是明珠滅藏等大族皆去賊為中國用公之所在賊不敢犯其城大順也一旦引兵出諸將不知所向軍至柔逺始號令告其地處使往築城至於版築之用大小畢具而軍中初不知賊以三萬騎来爭公戒諸將戰而賊走追勿過河已而賊果走追者不渡而河外果有伏賊既失計乃引去諸將皆服公為不可及所得賜賚皆以上意分賜諸將使自為謝諸蕃質子縱其出入無一人逃者蕃酋来見召之卧内屏人徹衛與語不疑居邉二嵗士勇邉實恩信大洽乃決䇿謀取横山復靈武而元昊數遣使稱臣請和上亦召公歸矣公領延安閲兵選將日夕訓練又請戒諸路養兵蓄鋭毋得輕動夏人聞之相戒曰無以延州為意今小范老子腹中自有數萬甲兵不比大范老子可欺也戎人呼知州為老子大范謂雍也名臣傳公帥邠延涇慶四郡威徳著聞夷夏聳服熟戸蕃部率稱為龍圖老子至元昊亦以此呼之燕談仁宗時西戎方熾韓公為經略招討副使欲五路進兵以襲平夏時公守延州堅持不可時尹洙為經略判官一日將命至慶州約公以進兵公曰我師新敗士卒氣沮但當自謹守以觀其變豈可輕兵深入耶以今觀之但見敗形未見勝勢也洙歎曰公于此不及諱公也韓公嘗云大凡用兵置勝敗於度外今公乃區區過慎此所以不及也公曰大軍一動萬命所懸而乃置於度外仲淹不見其可洙議不合遽還魏公遂舉兵入界次好水川元昊設伏全師陷沒大將任福死之魏公遽還至半途而亡者父兄妻子數千人號於馬首皆持故衣紙錢招魂而哭聲震天地魏公不勝悲憤掩泣駐馬不能前者數刻公聞而歎曰當是時難置勝敗於度外也筆錄公與韓琦協謀必欲收復靈夏横山之地邉上謡曰軍中有一韓西賊聞之心骨寒軍中有一范西賊聞之驚破膽元昊大懼遂稱臣名臣傳初西人籍為鄉兵者數萬既而黥以為軍唯公所部但刺其手公去兵罷獨得復為民其于兩路既得熟羌為用使以守邉因徙屯兵就食内地而紓西人饋輓之勞其所設施去而人徳之與守其法不敢變者至今尤多自公坐吕公貶羣士大夫各持二公曲直吕公患之凡直公者指為黨或坐貶竄及吕復相公亦再起被用於是二公驩然相約戮力平賊天下之士皆以此多二公然朋黨之論遂起而不止上既賢公可大用故卒置羣議而用之公為參政每進見上必以太平責之公歎曰上之用我者至矣然事有先後而革弊於乆安非朝夕可也既而上再賜手詔趣使條天下事又開天章閣召見賜坐授以紙筆公惶恐避席退而條列時所宜先者十數事上之其詔天下興學取士先徳行不専文辭革磨勘例遷以别能否減任子之數而除濫官用農桑考課守宰等事方施行而磨勘任子之法僥倖之人皆不便因相與騰口而嫉公者亦幸外有言喜之為佐佑㑹邉奏有警公即請行乃以公為河東陜西宣撫使至則上書願復守邉即拜資政殿學士知邠州兼陜西四路安撫使其知政事纔一嵗而罷有司奏罷公前所施行而復其故言者遂以危事中之賴上察其忠不聴並碑慶厯四年四月戊戌上與執政論及朋黨事公對曰方以類聚物以羣分自古邪正在朝未嘗不各為一黨不可禁也在聖鑒辨之耳誠使君子相朋為善其於國家何害記聞慶厯中刼盗張海横行數路將過髙郵知軍晁仲約度不能禦喻軍中富民出金帛具牛酒迎勞且厚遺之海悦徑去不為暴事聞朝廷大怒時公在政府富公在樞府富公議欲誅仲約以正法公欲宥之爭於上前仲約由是免死既而富公愠曰方今患法不舉方欲舉法而多方沮之何以整衆公宻告之曰祖宗以來未嘗輕殺臣下此盛徳事奈何欲輕壊之且吾與公在此同寮之間同心者有幾雖上意亦未知所定也而輕導人主以誅戮臣下他日手滑雖吾輩亦未敢自保也富公終不以為然及二公迹不安公出按陜西富公出按河北公因自乞守邉富公自河北還及國門不得入未測朝廷意比夜傍偟遶床嘆曰范六丈聖人也龍川志公為參政與韓富二樞並命鋭意天下之事患諸路監司不才更用杜杞張昷之輩公取班簿視不才監司每見一人姓名一筆勾之以次更易富公素以丈事公謂公曰六丈則是一筆焉知一家哭矣公曰一家哭何如一路哭耶遂悉罷之遺事歐余王蔡為諌官時謂之四諌四人力引石介執政欲從之公為參政獨曰介剛正天下所聞然亦好異使為諌官必以難行之事責人君以必行少拂其意則牽裾折檻叩頭流血無所不為主上富春秋無失徳朝廷政事亦自修舉安用此諌官也諸公伏其言而罷筆錄慶厯中議弛茶鹽之禁及減商税公以為不可茶鹽商税之入但分減商賈之利耳行於商賈未甚有害也今國用未減嵗入不可闕既不取之於山澤及商賈須取之於農與其害農孰若取之於商賈今為計莫若先省國用國用有餘當先寛賦役然後及商賈弛禁非所當先也其議遂寢皇祐二年吴中大饑殍殣枕路時公領浙西發粟及募民存餉為術甚備吳人喜競渡好為佛事公乃縱民競渡太守日出宴于湖上自春至夏居民空巷出遊又召諸佛寺主首諭之曰饑嵗工價至賤可以大興土木之役于是諸寺工作鼎興又新敖倉吏舍日役千夫監司奏劾杭州不恤荒政嬉遊不節及公私興造傷耗民力公乃自條叙所以宴遊及興造皆欲發有餘之財以惠貧者貿易飲食工技服力之人仰食於公私者日無慮數萬人荒政之施莫此為大是嵗兩浙惟杭州晏然民不流徙皆公之惠也並筆談公嘗與吕申公論人物申公曰吾見人多矣無有節行者公曰天下固有人但相公不知爾以此意待天下士宜乎節行者之不至也别録公言幕府辟客須可為已師者乃辟之雖朋友亦不可辟葢為我敬之為師則心懐尊奉每事取法於我有益耳遺事公曰吾遇夜就寢即自計一日食飲奉養之費及所為之事果自奉之費與所為之事相稱則鼾鼻熟寐或不然則終夕不能安眠明日必求所以稱之者聞見後錄公之子純仁娶婦將歸或傳婦以羅為帷幔者公聞之不悦曰羅綺豈帷幔之物耶吾家素清儉安得亂吾家法敢持至吾家當火於庭公戒諸子曰吾貧時與汝母養吾親汝母躬執爨而吾親甘㫖未嘗充也今而得厚禄欲以養親親不在矣汝母又巳早世吾所最恨者忍令若曹饗富貴之樂也公在杭州子弟以公有退志乘間請治第洛陽樹園圃以為逸老之地公曰人茍有道義之樂形骸可外況居室哉吾今年踰六十生且無幾乃謀樹第治圃顧何時而居乎吾之所患在位髙而艱退不患退而無居也且西都士大夫園林相望為主人者莫得常遊而誰獨障吾遊者豈必有諸已而後為樂耶公語諸子弟曰吾吴中宗族甚衆於吾固有親疎然吾祖宗視之則均是子孫吾安得不恤其饑寒哉且自祖宗来積徳百餘年而始發於吾若獨享富貴而不恤宗族異日何以見祖宗於地下今亦何顔以入家廟乎並遺事公輕財好施尤厚於族人既貴於姑蘓近郭買良田數千畆為義庄以養羣從之貧者擇族人長而賢者一人主其出納人日食米一升嵗衣縑一匹嫁娶喪𦵏皆有贍給聚族人僅百口燕談公自政府出歸姑蘓焚黄搜外庫惟有絹三千匹錄親戚及閭里知舊散之皆盡曰宗族鄉黨見我生長幼學壯仕為我助喜我何以報之哉巵史公以朱氏長育有恩常思厚報之及貴用南郊所加恩乞贈朱氏父太常博士暨諸子皆公為葬之嵗别為饗祭朱氏他子弟以公䕃得補官者三人公在睢陽遣堯夫到姑蘓取麥五百斛堯夫時尚少既還舟次丹陽見石曼卿問寄此乆何如曼卿曰兩月矣三喪在淺土欲葬之而北歸無可與謀者堯夫以所載麥舟付之單騎自長蘆㨗徑而去到家拜起侍立良乆公曰東吳見故舊乎曰曼卿為三喪未舉方留滯丹陽時無郭元振莫可告者公曰何不以麥舟與之堯夫曰已付之矣冷齋夜話晏殊判南京公以大理寺丞丁憂權掌西監一日晏曰吾有女及笄仗君為我擇婿公曰監中有二舉子富皋張為善皆有文行他日皆至卿輔並可婿也晏曰然則孰優范曰富修謹張疎俊晏曰唯即取富為壻後改名即弼也為善後亦更名方平云筆錄公與南都朱某相善朱且病公視之白公曰某常遇異人得變水銀為白金術吾子幼不足傳今以傳君遂以其方并藥贈公公不納強之乃受未嘗啟封後其子寀長公教之義均子弟及宷登第乃以所封藥併其術還之遺事公少有大節其於富貴貧賤毁譽歡戚不一動其心而慨然有志於天下常自誦曰士當先天下之憂而憂後天下之樂而樂也碑种世衡字仲平工部侍郎放之兄子以廕補官位至東染院使知武功縣用刑嚴峻杖人不使執拘之使自凭欄立磗上受杖杖垂畢足或落磗則更從一數之人亦服其威信或有追呼不使人執帖入鄉村但以片紙牓縣門云追某人期某日詣縣庭其親識見之驚懼走告之皆如期知澠池縣縣旁山上有廟世衡葺之其梁重大衆不能舉世衡乃令縣幹剪髪如手搏者驅數對於馬前云欲詣廟中教手搏傾城人隨往觀之既至而不教謂觀者曰汝曹先為我致廟梁然後觀手搏衆欣然趨下山共舉之須臾而上其權數皆此類初康定元年春夏戎犯延安君時為大理丞任鄜州從事建言延安東北二百里有故寛州請因其廢壘而興之以當冦衝左可致河東之粟右可固延安之勢北可圖銀夏之舊有是三利朝廷從之以君董役事君膽勇過人雖逼戎落曽不畏憚與兵民暴露數月且戰且城然處險無泉議不可守鑿地百有五十尺始至于石工徒拱手曰是不可井矣君曰過石而下將無泉耶爾其屑而出之凡一畚償爾百金工復致其力過石數重泉果沛發萬人歡呼曰神乎雖虜兵重圍吾無困渇之患矣既而朝廷署故寛州為青澗城范公撰墓志初至青澗城教吏民習射雖僧道婦人亦習之以銀為射的中者與之既而中者益多其銀重輕如故而的漸厚且小矣或爭徭役優重亦使之射射中者得優處有過失亦使之射射中則釋之由是人人皆能射羌酋蘓慕恩部落最強世衡皆撫而用之嘗夜與慕恩飲出侍姬以佐酒既而世衡起入内潛於壁隙窺之慕恩竊與侍姬戲世衡遽出掩之慕恩慙懼請罪世衡笑曰君欲之耶即以遺之由是得其死力諸部有貳者使慕恩討之无不克並記聞青澗東北一舍而逺距无定河河北有虜寨虜常濟河為患君數使屬羌擊之往必破走前後取首級數百牛羊萬計未嘗勞士卒也故功多而費寡建營田二千頃嵗取其利募商賈使通其貨或先貸之本速其流轉嵗時間其息十倍乃建白城中芻糧錢幣軍須城守之具皆不須外計一請自給募錄在青澗為屬吏所訟不法事按驗皆有狀鄜延路經略使龎公奏世衡披荆棘立青澗城若一一拘以文法則邉將无所措手足詔勿問及徙知環州將行别龎公拜且泣曰世衡心腸鐵石也今日為公下淚矣慶厯三年春范文正巡邉至為環慶經略使知環州以屬羌多懐貳心宻與元昊通以世衡素得屬羌心而青澗城已完乃奏徙世衡知環州以鎮撫之有牛奴訛素屈強未嘗出見州官聞世衡至乃來郊迎世衡與約明日當至其帳慰勞部落是夕雪深三尺左右曰奴訛凶詐難信且道險不可行世衡曰吾方以信結諸羌可失期耶遂冒雪而往既至奴訛大驚曰吾世居此山漢官無敢至者公了不我疑耶帥部落羅拜皆感激心服並記聞涇原葛懐敏定川之敗戎馬入縱于渭子仲淹領慶州蕃漢兵往扼邠城又召君分援涇原即時而赴羌兵從者數千人屬羌為吾用自此始君曰羌兵可用乃復教士人習弧矢以佐官軍由是縁邉諸城獨環不求増兵不煩益糧而武力自振夏戎聞屬羌不可誘又人皆善射烽火相望無日不備乃不復以環為意墓誌始元昊冦邉王師屢撓虜之氣燄益張常有并吞關中之意其將剛浪㖫號野利王某號天都王元昊倚為腹心凡勝我軍皆二將之䇿也公方城青澗謀有以去之有王嵩者本青澗僧將軍察其堅朴誘令冠帶因出師以賊級予之白於帥府表授三班借職充經略司指使且力為辦其家事凡居室騎從衣食之具悉出將軍嵩感恩既深將軍反不禮以奴畜之或掠治械繫數日嵩雖不勝其苦卒無一辭望將軍將軍知可任兵事居半年召嵩謂之曰吾將以事使汝吾戒汝所不言其苦雖有甚于此者汝能為吾卒不言否嵩泣對曰䝉將軍恩教致身榮顯常誓以死報而未知其所況敢辭捶楚乎將軍乃草遺野利書書辭大抵如世間問起居之儀惟以數句隠辭如嘗有私約而勸其速行之意書於尺素且膏以蠟置衲衣間宻縫之告嵩非濵死不得泄如泄之當以負恩不能成吾事為言并以畫龜一幅棗一部為信牌遺野利嵩受教至野利所居致將軍命出棗龜投之野利知見侮笑曰吾素竒种將軍今何兒女子見識度嵩别有書嵩佯目左右既而答以無有野利不敢匿乃封其信上元昊數日元昊召野利與嵩俱西北行數百里至一大城曰興州先詣一官寺曰樞宻院次曰中書有數羌人雜坐野利與焉召嵩廷詰將軍書問所在嵩堅執前對稍稍去巾櫛加執縳至于捶楚極苦嵩終不易其言又數日召入一官寺㕔事廣楹皆垂班竹箔緑衣小竪立其左右嵩意元昊宫室也少頃箔中有人出又以前問責之曰若速言死矣嵩對如前乃命曳出誅之嵩大號且言曰始將軍遣嵩宻遺野利王書戒不得妄泄今不幸空死不了將軍事吾負將軍吾負將軍箔中急使人追問之嵩具以對乃禠衲衣取書以進書入移刻始命嵩就館優待以禮元昊于是疑野利隂遣愛將假為野利使使于將軍將軍知元昊所遣未即見命屬官入館勞之問虜中山川地形在興州左右言則詳迫野利所部多不能悉適擒生虜數人因令隙中視之生虜能言其姓名果元昊使將軍意決乃見之使者傳野利語將軍慢罵元昊而稱野利有心内附乃厚遣使者曰為吾語若王速決無遲留也度使者至嵩即還而野利已報死矣將軍知謀已行因欲并間天都又為置祭境上作文書於版以弔多述野利與天都相結有意本朝悼其垂成而失其文雜紙幣伺有虜至急爇之以歸版字不可遽滅虜人得之以獻元昊天都以此亦得罪元昊既失二將乆之始悟為將軍所賣遂定講和之䇿焉吕與叔文集寳元中党頃犯邉有明珠族首領驍悍最為邉患世衡為將欲以計擒之聞其好擊鼔乃造一馬持戰鼓以銀裹之極華焕宻使諜者陽賣之入明珠族後乃擇驍卒數百人戒之曰凡見負銀鼓自隨者併力擒之一日羌酋負鼔而出遂為所擒筆談宋名臣言行録前集巻七
