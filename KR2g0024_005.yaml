body:
  text: 宋名臣言行録前集卷五宋朱子纂集王曽沂國文正公字孝先青城人由鄉貢試禮部御前皆第一相仁宗公青州發解南省廷試皆為首冠中山劉子儀為翰林學士戲語之曰狀元試三場一生喫著不盡公正色答曰曾平生之志不在溫飽筆録祥符中公在掖垣時瑞應沓臻公嘗請對上語及之公奏曰斯誠國家承平所感而致然願推而勿居異日或有災沴則免夫輿議退又白于執政及後飛蝗旱暵乃亟被擢用焉言行録公以建昭應宫上疏陳事之不便者五條以諌請殺其制其餘論事甚衆皆削其稿惟此疏偶存同上章聖不豫劉后諷宰臣丁謂欲臨朝中外洶洶無敢言者公謂后戚錢惟演曰漢之吕后唐之武氏皆非據大位其後子孫誅戮不得保首領公后之肺腑何不入白皇后萬一宫車不諱太子即位太后輔政豈不為劉氏之福乎若欲稱制以取疑于天下非惟為劉氏之禍恐亦延及公矣惟演大懼入白之其議遂止政要初章聖上仙外尚未聞中書密院同入問起居召詣寢閣東面垂帷明肅傳遺命輔立皇太子及皇太后權聽斷軍國大事退而發哀公于殿廬草具遺制丁謂欲去權字加淑妃為皇太妃字公執咨曰皇帝沖年太后臨朝斯已國家否運稱權猶足示後況言猶在耳何可改也且增減制書有法豈期表則之地先欲亂之耶曷為更載立妃之文必若尊禮當俟事定而議謂勃然曰參政却欲擅改遺制乎公曰曽適來寢殿中實不聞此言若誠有之豈敢改也諸公無相同者遂依違而行然權字遂不敢去故謂之敗公首被爰立之命言行録章獻明肅太后權處分軍國事聽斷儀式久而未定公時判禮儀院乃采蔡雍獨斷所述東漢故事皇帝在左母后在右同殿埀簾中書樞密院以次奏事如儀人心乃定言行録丁謂既逐李迪于衡州因大行貶竄王欽若丁度等皆投之逺方時公參知政事不平之曰責太重矣謂熟視久之曰居停主人恐亦不免也公踧然而懼因密謀去之內侍雷允恭既有力于謂謂深德之至是允恭為山陵都監謂為山陵使允恭擅移山陵上穴謂知其非而重違允恭無所可否既而上穴有石石盡水出公具得其事以謂擅易陵地意有不善欲奏之而未得間語同列曰曾無子欲令弟子過房來日奏事畢略留奏之謂不以為疑太后聞之大驚即命差官按劾其事而謂不知也謂既得罪山陵竟就下穴蓋謂所坐欲庇允恭耳然其邪謀深逺得位嵗久心不可測雖公以計傾之而公議不以為非也龍川志公在中書聞謂卒顧謂同列曰斯人平生多智其在海外猶能用智而還若不死數年未必不復用斯人復用則天下之不幸可勝道哉吾非幸其死也筆録天聖初公嘗詮録古先聖賢事迹凡六十事繪事以獻上嘉納之降詔褒美仍勑鏤板模印均賜近侍因命禁署月繪二十軸以進焉又建議請擇名儒勸講尋命孫奭馮元更侍經筵言行録魏公言公當國門下未嘗顯拔一人希文乘間輒諷之曰明揚士類宰相之任也公之盛德獨少此耳公徐應之曰司諌不思耶恩若已出怨將誰歸希文惘然歎曰真宰相也别録公嘗以大臣執政不當收恩避怨曰恩欲歸已怨使誰當聞者歎服歸田録公嘗言始參大政屬故王太尉當國每進用朝士必先望實或曰某人才某人賢則曰誠知此人然厯官尚淺且俾養望嵗久不渝而後擢任則榮途坦然中外允愜故公執政之日遵行是言而人皆心服公留守洛陽屬嵗歉里有囷積者飢民聚黨脅取鄰郡以強盜論報死者甚衆公但重笞而釋之逺近聞以為法全活者數千計公嘗語曰昔楊文公有言人之操履無若誠實吾每欽佩斯言茍執之不渝夷險可以一致公再涖大名治政益信于俗民居軍伍咸畫像以事之時敵使往來入境皆云此府王公在焉必沐浴潔服而入公在閣下纍年時楊文公已居內制楊性恢諧好嘲誚凡僚友無不狎侮至公則曰第四廳舍人不敢奉戲故李翰林昌武尤所歎服嘗曰若王舍人可謂不可得而親疏也並言行録魏公言公德器深厚而寡言當時有得其品題一兩句者人皆以為榮琦為諌官時因納劄子忽云近日頻見章疏甚好只如此可矣向來如髙若訥輩多是擇利范希文亦未免近名要須純意于國事爾魏公别録公與孫沖同榜沖子京一日往辭公相留云喫食了去飭子弟云已留孫京喫食安排饅頭饅頭時為盛饌也食後合中送數軸簡紙開看皆是他人書簡後截下紙其儉德如此韓莊敏遺事胡文定公曰李文靖淡然無欲王沂公儼然不動資稟既如此又濟之以學故是八九分地位也李迪文定公字復古其先趙郡人後家濮州舉進士第一相真宗仁宗以太傅致仕公為舉子時從种放明逸先生學將試京師攜明逸書見栁開仲塗以文卷為贄與謁俱入久之仲塗出曰讀君之文須沐浴乃敢見因留之門下一日仲塗自出題令公與諸子及門下客同賦賦成驚曰君必魁天下為宰相文定所擬賦題不傳如王沂公初作有物混成賦識者知其決為宰相蓋所養所學發為言辭可以觀矣聞見録公罷陜西都轉運使還朝時真宗方議東封西祀修太平事業知秦州曹瑋奏羌人潛謀入冦請大益兵為備上大怒以瑋虛張敵勢恐喝朝廷以求益兵以迪新自陜西還召見示以瑋奏問其虛實欲斬瑋以戒妄言者迪因奏曰瑋良將必不妄言臣觀陛下意不欲從鄭州門出兵耳秦之旁郡兵甚多可發以戍秦臣在陜西籍諸州兵數為小册常置鞶囊中以自隨今未敢以進上曰趣取之迪于鞶囊取以進上指曰以某州某州兵若干戍秦州卿即傳詔樞密院發之既而敵果大入冦瑋迎擊大破之遂開山外之地奏到上喜謂迪曰山外之捷卿之功也記聞上將立章獻后迪為翰林學士屢上疏諌以章獻起于寒微不可母天下由是章獻深銜之周懷政之誅上怒甚欲責及太子羣臣莫敢言迪為參政俟上怒稍息從容奏曰陛下有幾子乃欲為此計上大寤由是獨誅懷政等而東宫不動搖迪之力也公在翰林仍嵗旱蝗國用不給一日歸沐忽傳詔對內東門上出三司所上嵗出入財用數問何以濟公曰祖宗初置內藏庫欲復西北故土及以支凶荒今邉無他費陛下用此以佐國用賦斂寬民不勞矣上曰今當出金帛數萬借三司公曰天子于財無內外願下詔賜三司以顯示德澤何必曰借上悅並記聞真宗不豫大漸之夕公與宰執以祈禳宿內殿時仁宗幼沖八大王元儼者有威名以問疾留禁中纍日不肯出執政患之無以為計偶翰林司以金盂貯熟水曰王所須也公取案上墨筆攪水中盡黑令持去王見之大驚意其有毒也即上馬去聞見録真宗既疾甚李迪丁謂同作相內臣雷允恭者嬖臣也自劉后以下皆畏事之謂之進用皆雷之力嘗傳宣中書欲以林特為樞密副使迪不可曰除兩府須面奉聖旨翌日爭之上前聲色俱厲謂辭屈俯首鞠躬而已謂既退迪獨留納劄子上皆不能省記而二相皆以郡罷允恭傳宣謂家以中書闕人權留謂發遣謂因直入中書見同列召堂吏諭之索文書閲之來日與諸公同奏事上亦無語衆退獨留及出道過學士院問院吏今日學士誰直曰劉學士筠謂呼筠出口傳聖旨令謂復相可草麻筠曰命相必面得旨果爾今日必有宣召麻乃可為也謂無如之何他日再奏事復少留退過學士院復問誰直曰錢惟演謂復以聖旨語之惟演即從命既復相乃逐公及其黨正人為之一空將草公責詞時宋宣獻知制誥當直請其罪名謂曰春秋無將漢法不道皆其事也宋不得已從之及謂貶朱崖宋猶掌詞命即為之詞曰無將之戒深著于魯經不道之誅難逃于漢法天下快之龍川志真宗不豫冦凖得罪丁謂李迪同為相以其事進呈上命除凖小處知州謂退署其紙尾曰奉聖旨除逺小處知州迪曰嚮者聖旨無逺字謂曰與君面奉德音君欲擅改聖旨以庇凖耶由是二人鬭鬩更相論奏上命翰林學士錢惟演草制罷謂政事惟演遂出迪而留謂外人先聞其事制出無不愕然上亦不復省也迪貶衡州團練副使嵗餘除祕書監知舒州章獻上仙迪時以尚書右丞知河陽召復為相迪自以受不世之遇盡心輔佐知無不為吕夷簡忌之潛短之於上嵗餘罷出知某州迪謂人曰迪不自量恃聖主之知自以為宋璟而以吕為姚崇不知其待我乃如是也並記聞魯宗道肅簡公字貫夫亳州人舉進士官至參政事真宗仁宗仁宗在東宫公為諭德其居有酒肆在側號仁和酒有名於京師公往往易服微行飲于其中一日真宗急召公將有所問使者及門而公不在移時乃自仁和肆中飲歸中使遽先入白乃與公約曰上若怪公來遲當託何事以對幸先見教兾不異同公曰但以實告曰然則當得罪公曰飲酒人之常情欺君臣子之大罪也中使嗟歎而去真宗果問使者具如公對真宗問何故私入酒家公謝曰臣家貧無器皿酒肆百物具備賔至如歸適有鄉里親客自逺來遂與之飲然臣既易服市人亦無識臣者真宗笑曰卿為宫臣恐為御史所彈然自此竒公以為忠實可大用晚年每為章獻言羣臣可大用者數人公其一也後章獻皆用之歸田録公為正言事有違誤風聞彈疏真宗稍厭之公一日自訟于上前曰臣在諌列而諌守臣職也陛下以數而厭之豈非事納諌之虛名俾臣尸素茍祿乎臣竊愧之願得罷去上悅其忠慰勉以遣他日追念其言御筆題殿壁曰魯直掇遺章獻太后臨朝公屢有獻替太后問唐武后何如主對曰唐之罪人也幾危社稷太后默然時有上言請立劉氏七廟者太后以問輔臣衆不敢對公獨曰不可退謂同列曰若立劉氏七廟如嗣君何帝太后將同幸慈孝寺欲以大安輦前帝行公曰婦人有三從在家從父既嫁從夫夫歿從子太后乃命輦後乘輿行執政多任子于館閣讀書公曰館閣育天下英才豈紈袴子弟得以恩澤處耶吾子誠幼已任京官然終不使慁國恩樞密使曹利用恃權驕橫公屢折之帝前時貴戚用事者莫不憚之目為魚頭參政因其姓且言骨鯁如魚頭也薛奎簡肅公字宿藝絳州人中進士第事仁宗官至參政公舉進士時贄謁馮魏公首篇有囊書空自負早晚達明君之句馮捲卷而謂之曰不知秀才所負何事讀至第三篇春詩云千林如有喜一氣自無私乃曰秀才所負者如此記事公在開封以嚴為治肅清京師京師之民相戒曰是不可犯也及居蜀則以惠愛稱蜀人喜亂而易搖公鎮以無事又能破姦發伏無一不中蜀人愛且畏之以比張詠而不苛契丹使蕭從順來朝時莊憲明肅太后垂簾聽政從順謂南使至契丹者皆見太后遂亦請見朝議患之未有以決公獨以理折之從順乃止拜參政入謝上曰先帝嘗言卿可用吾今用卿矣公益感激自勵而素剛毅守節不茍合既與政尤挺立無所牽隨然遂欲繩天下無細大一入于規矩往往不可其意則歸卧于家歎息憂愧輒不食家人笑其何必若此公曰吾慚不及古人而懼後世譏我也並歐公撰墓志明肅太后欲以衮冕謁太廟諌疏交上宰臣執議俱不之聽公關右人語氣明直不文其談獨于簾外口奏曰陛下大謁之日還作漢兒拜耶女兒拜耶明肅無答是夕報罷野録公知開封明參政鎬為府曹官公待之甚厚直以公輔期之其後公守秦益嘗辟以自隨優禮特異有問公何以知其必貴公曰其為人端肅其言簡而理盡凡人簡重則尊嚴此貴臣相也其後果至參政歸田録蔡齊文忠公字子思其先洛陽人徙萊州舉進士第事仁宗官至參政祥符八年真宗采賈誼置器之説試禮部所奏士讀至公賦有安天下意歎曰此宰相器也凡貢士當賜第者考定必召其髙第數人並見又參擇其材質可者然後賜第一及公召見衣冠偉然進對有法天子以為無能過者亟以第一賜之歐公撰行狀真宗好文雖以文辭取士然必視其形神器識或取其所試文辭有理趣者徐奭鑄鼎象物賦云足惟下正詎聞公餗之欹傾鉉乃上居實取王臣之威重齊置器賦云安天下于覆盂其功可大皆以為第一歸田録公喜酒既登第通判濟州日飲醇酎往往至醉時太夫人年已髙頗憂之一日賈存道賈同字希德門人私諡存道先生過濟公館之數日存道愛公之賢慮其以酒廢學生疾乃為詩示公曰聖君恩重龍頭選慈母年髙鶴髮垂君寵母恩俱未報酒如成病悔何追公矍然起謝之自是非親客不對酒終身未嘗至醉燕談通判濰州民有告某氏刻為稅印為姦利者已逾十年蹤迹連蔓至數百人公歎曰盡利于民民無所逃是為政者之過也為緩其獄得減死者十餘人餘皆釋而不問濰人皆曰公德于我使我自新為善人由是風化大行真宗新棄天下天子諒隂丁謂専權欲邀致公許以知制誥公拒不往已而冦萊公王文康公皆以不附黜公歸歎曰吾受先帝之知至此豈宜為權臣所脅得罪非吾懼也契丹祭天于幽州以兵屯界上界上驚騷議者欲發大軍以備邉公獨料其必不動後卒無事公在大位臨事不回無所牽畏而恭謹謙退未嘗自伐天下推之為正人搢紳之士倚以為朝廷重錢惟演作樞密直學士題名記附離丁謂輒去冦凖姓氏云逆凖不書公言于仁宗曰冦凖社稷之臣忠義聞天下豈可為姦黨所誣哉遂令磨去並行狀宋名臣言行録前集卷五
