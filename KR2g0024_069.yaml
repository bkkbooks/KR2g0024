body:
  text: 宋名臣言行録外集卷十一宋李幼武纂集胡宏五峯先生字仁仲文定公之季子自幼志於大道嘗見楊中立於京師又從侯師聖於荆門而卒傳文定之學晚嵗嘗被召旨不幸寢疾不克造朝而卒先生優遊南山之下餘二十年玩心神明不舍晝夜力行所知親切至到析太極精微之旨窮皇王制作之原綜事物於一原貫古今於一息指人欲之偏以見天理之全即形而下者而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極體用該備可舉而行先生之於斯道可謂見之明而擴之至矣張南軒曰知言一書乃其平日之所自著其言約其義精誠道學之樞要制治之蓍龜也或問於南軒曰論語一書未嘗明言性子思中庸獨有天命之謂性一語而孟子始道性善今先生知言反復論性為甚詳無乃與聖賢之意或有異乎南軒曰無以異也夫子雖未嘗明言性而子貢蓋嘗識之曰夫子之言性與天道不可得而聞也是豈真不可得聞哉蓋夫子之言無非性與天道之流行也至孟子時如楊墨告子之徒異説並興孟子懼學者之惑指示大本使知所止今之異端則又異乎古自謂識心見性其説開廣故髙明之士往往樂聞而喜趨之一溺其間則喪其本心隳弛萬事毫釐之差霄壤之謬其禍可勝言哉先生於此又烏得而忘言也其言有曰誠成天下之性性立天下之有情效天下之動心妙性情之德又曰誠者命之道乎中者性之道乎仁者心之道乎惟仁者為能盡性至命學者能精察於視聽言動之間卓然知夫心之所以為妙則性命之理蓋可默識然後知先生之意與古人若合符節矣不然不知求仁而居然論性則幾何其不流於異端之歸乎知言曰天命之謂性性天下之大本也堯舜禹湯文王仲尼六君子先後相詔必曰心而不曰性何也曰心也者知天地宰萬物以成性者也南軒改作而主性情也六君子盡心者也故能立天下之大本人至于今賴焉不然異端並作物從其類而瓜分孰能一之道充乎身塞乎天地而拘於軀者不見其大存乎飲食男女之事而溺於流者不知其精諸子百家臆之以意飾之以辨傳聞襲見蒙心之官命之理性之道置諸茫昧則巳矣悲夫此邪説暴行所以盛行而不為其所惑者鮮也然則奈何曰在修吾身天理人欲同體而異用同行而異情進修君子宜深别焉朱子曰天理人欲同體而異用一句説得不是天理人欲如何同得又曰如是即是性可以為善亦可以為惡却是一團人欲窠子將甚麼做體吕東萊曰知言勝似正蒙朱子曰蓋後出者巧也朱子曰正蒙規模大知言小又曰近世為精義之説莫詳於正蒙而五峯亦曰居敬所以精義也此言尤精切簡當深可玩味謂天命為不囿於物可也以為不囿於善則不知天之所以為天矣謂惡不可以言性可也以為善不足以言性則不知善之所自來矣知言中此等議論與其他好處自相矛盾者甚多却與告子楊子釋氏蘇氏之言幾無以異昨來所以不免致疑者正為如此惜乎不及供灑掃於五峯之門而面質之耳知言中議論多病近疏所疑與敬夫伯恭議論如心以成性相為體用性無善惡心無死生天理人欲同體異用先識仁體然後敬有所施先志於大然後從事於小如本天道變化為世俗酬酢及論遊夏問孝之類此類極多又其辭意多迫急少寬裕良由務以智力探取全無涵養之功所以至此然其思索精到處何可及也知言之書用意精切但其氣象急迫終少和平又數大節目亦皆差誤如性無善惡心為巳發先知後敬之類皆失聖賢本旨五峯善思然思過處亦有之五峯臨終謂處德美曰聖門工夫要處只在個敬此為名論五峯有本亭記理固是好然其文章排布是文人之文並朱子語南軒序先生文集曰先生非有意於為文者也其一時詠歌之所發蓋所以紓寫其性情而其他述作與夫問答往來之書又皆所以明道義而參異同非若世之為文者徒從事於言語之間而已也粵自蚤嵗服膺文定公之教至于沒齒惟其進德之日新故其發見於辭氣議論之間者亦月異而嵗不同雖然以先生之學而不得大施於時又不幸僅得中夀其見於文字間者復止於此豈不甚可歎息至其所志之逺所造之深綱領之大義理之精後之人亦可以推而得焉南軒見先生先生辭以疾他日見孫正孺而告之孫道五峯之言曰渠家好佛宏見他説甚南軒方悟前此不見之因於是再謁之語甚相契遂授業焉南軒曰栻若非正孺幾乎迷路胡憲籍溪先生字原仲建之崇安人文定公從父兄之子稍長從文定學始聞程氏之説尋以鄉貢入大學一旦歸隱故山從臣薦之召授本州添教尋監南嶽廟為福建帥司準遣奉祠改祕省正字病求去以左宣教郎主管崇道觀歸而卒紹興三十二年也享年七十七生而沉靜端慤不妄言笑長聞程氏之説入太學會元祐學有禁乃與鄉人劉致中隂講而竊誦焉又講易於涪陵處士譙天授久未有得天授曰是固當然蓋心為物漬故不能有見唯學乃可明耳先生喟然歎曰所謂學者非克已工夫也耶自是一意下學不求人知一旦揖諸生歸先生歸故山力田賣藥以奉其親非其道義一毫不取於人文定稱其有隱君子之操而鄉人士子慕從之遊日以益衆一時賢士大夫聞其名者亦皆注心髙仰之紹興已卯公由司直改正字將就職晦翁送行有詩曰執我仇仇詎我知謾將行止驗天機猿驚鶴怨因何事只恐先生袖手歸其後又寄詩曰先生去上藝香閣閣老新峩豸角冠時劉琪自祕書丞除察官留取幽人卧空谷一川風月要人看一章甕牖前頭列畫屏晚來相對靜儀刑浮雲一任間舒卷萬古青山只麼青二章五峯見之曰其言有體而無用因别賡之曰幽人偏愛青山好為是青山青不老青山出雲雨太虛洗盡塵埃山更好似為籍溪解嘲晦翁致書略曰前日聞極論天下事至於慷慨灑涕有以見仁人之心不能忘世如此天其或者一試大儒之效乎聞之喜而不寐伏計必有規模素定於胸中某切謂天下形勢當路所不可不知也救之之術獨在救其本根而巳不過視天下人望之所屬者舉而用之使其舉措用舍必當於人心則天下之心翕然其氣力易以鼓動如羸病之人針藥所不能及灸其丹田氣海則氣血萃於本根而耳目手足利矣秦檜用事天地閉塞幾二十年先生亦以泊然無復當世之念及檜死羣賢稍復進用先生為正字當奏事殿中而病不能朝即草疏言金人大治汴京宫室勢必敗盟今元臣宿將惟張浚劉錡在而中外有識皆謂金果南牧非此兩人莫能當惟陛下急起而用之臣死不恨矣時二公皆為積毁所傷上意有未釋然先生獨極意顯言無所避疏入即求去矣先生質本恬淡而培養深固平居危坐植立時然後言望之枵然如稿木之枝而即之溫然雖當倉猝不見其有疾言遽色人或犯之未嘗校也其讀書不務自為訓説嘗纂論語説數十家復抄取其要附以巳説晦翁祭之文曰惟公之生氣質溫良弱冠而學有志四方發軔蓬蒿至於臨漳學承於家行著于鄉乃獻王府乃遊膠庠中退而休客彼洛陽有隱其居惟蜀之莊公乃束修踵門于堂一語妙契發乎天光浩然東歸衡泌洋洋我簞我瓢我糟我粳或漁於溪或圃於岡水鯉鮮腴藥頴豐長以是為養胡考寧康以是為樂逍遙相羊我心悠悠嵗月於荒華髮斑衣名聞帝旁弓旌鼎來聘幣是將義不去親欲隱彌彰乃命典教於梓於桑作人之功於今靡忘中祕之官典册是藏公晚而居羣儒所望陳謨帝前震聲廟廊人曰先生允仁且剛旋反舊廬既夀且臧云胡不淑奄忽而亡又曰先生教諸生於工課餘暇以片紙書古人懿行或詩文銘贊之有補於人者粘置壁間俾往來誦之咸令精熟劉子翬病翁先生字彥沖忠顯公之次子以忠顯勳補承務郎辟真定幕府忠顯薨執喪過禮服除倅興化軍秩滿以最聞詔還蒞故官先生始以哀毁致疾自以不堪吏責遂丐祠主管武夷沖佑觀以歸十有七年四為崇道祠官纍階右承議郎享年四十七紹興十七年十二月終少負竒材未冠遊太學聲譽出等夷世家屏山下潭溪之上有園林水石之勝既得祠祿於是俯仰其間盡棄人間事自號病翁獨居一室危坐或竟日夜嗒然無一言意有所得則筆之於書或詠歌以自適間數日輒一走忠顯墓下瞻望徘徊涕泗嗚咽或纍日而後反兄弟之間怡怡如也忠肅公即先生之猶子也幼開爽嗜學先生愛且竒之教以文行經業不少懈而必使務其逺者大者與胡原仲劉致中為道義交相見講學外無一雜言與他所遊亦皆海內名士無不歎服深逺自以為不及而先生之心未嘗少自足雖聞常人有片言之善無不從容咨叩必竭兩端而後巳至族黨後生來問學者則亦隨其器識告語成就終日無倦色晦庵一日請問先生平昔入道次第先生欣然告之曰吾少未聞道官莆田時以疾病始接佛老之徒聞其所謂清淨寂滅者而心悅之以為道在是矣比歸讀吾書而有契焉然後知吾道之大其體用之全乃如此抑吾於易得入道之門焉所謂不逺復者則吾之三字符也佩服周旋罔敢失墜於是作復齋銘聖傳論以見吾志汝尚勉哉先生始得微疾即入謁宗廟泣别母夫人前遍以書告決素所與往來者召其姪珙付以家事指示葬處中外孤遺人人為計久逺昏宦舍業之既巳則日與學者論説修身求道之要作訓誡數百言彈瑟賦詩淡然如平日居兩日而沒學尤深於易家有東西二齋東以復名西以蒙名蒙齋之記有曰三代而下易學廢矣六國之士為談説所蒙兩漢之士為章句所蒙晉魏之士為虛無所蒙隋唐之士為詞藻所蒙皆處偏滯而不反如波衮沙反以自渾如谷騰霧反以自暝初不知其豁然者常存也今吾與二三子既知之矣可不兢兢肅肅以養其聖耶跋浩然子曰學易者必有門户復卦易之門户也入室者當自户始學易者當自復始是知復之一義為聞道之要言進修之捷徑學者踐之真積力久將有捷裂泮奐沛然流出於胸臆間所謂易者是自知之矣撰維民論曰民心無常去就無定自古及今天下之民必有所屬堯舜之民禹維之桀解其維而夏亡啇之民文武維之幽厲解其維而周亡自秦漢以來此治亂興亡循環不巳也我宋統御皆以寬厚為治至哉仁宗之仁也三代而下一人而巳笑言承恩咳唾為澤薰酣沉浸四十餘年所以維民者盡矣講經制之道曰國富而節人有拂心因窘而節人有恕心今主計之官無出入之制隨田取足不量民力焉兵以衛民食於民官以治民食於民茍出不臨戎居不司事勿食可也郡縣巳併旋復員缺可減復增或慮裁抑之行衆將咨怨殊不思費用之廣浩於丘山非天降而地溢也一取於民耳此經制之道有未盡也聖傳論曰吾觀古聖賢進德之速未有如湯者湯之盤銘曰茍日新日日新又日新夫豈有瞬息悠悠意度哉樂善如貪契理如函聞非如獲利舍過如遺蛻德必日新也日新之學非踐履純實不自覺知彼謂聖道一言可契非由階級不假修為以日就月將為初學以真積力久為鈍才是自誣也先生有復齋蒙齋二琴嗣子玶葆藏之門人朱熹敬為作銘復齋曰匪金匪石含玉真兮雷伏於腹閟其神兮硜然一作萬物皆春含我覿器寶懷若人兮主靜觀復修厥身兮與時皆詘而不及其伸兮蒙齋曰抑之幽然者若直其遇險而止寫之冷然者若導其出山之泉蓋先生之言不可得而聞矣若其亨貞之意則託兹器而猶傳又跋文集曰先生文辭之偉固足以驚一世之耳目然其精微之學靜退之風形於文墨有足以發蒙蔽而銷鄙吝之萌者尤覽者所宜盡心也先生有聞筝詩曰月髙夜鳴筝聲從綺窗來隨風更迢遞縈雲暫徘徊餘音若可玩繁絃互相催不見鳴筝人遙知心所懷寧非舊寵棄豈念心期乖含情鬱不發寄曲宣餘哀一彈飛霜零再撫流光頺每恨聽音稀銀甲生浮埃幽幽孤鳳吟衆鳥聲難諧盛年嗟不偶况乃容華衰道同符片諾志異勞事媒棲棲墻東客亦抱凌雲才晦翁跋曰此詩先生少所作也規模意態全是學文選樂府諸篇不雜近世雜體故其氣韻髙古而音節華暢時輩少及晚嵗筆力老健出入衆作自成一家則巳稍變此體矣嘗謂學詩且當以此等為法庶不失古人本分體製向後若能成就變化固未易量然變亦大是難事變而正則縱橫妙用何所不可一失其正却似反不若守舊法之為穩也跋先生遺帖曰先生壯嵗棄官端居味道一室蕭然無異禪衲視世之聲色權利人所競逐者漠然若亡見也熹蚤以童子獲侍左右先生始亦但以舉子見期某竊窺見其自為與教人者若不相似暇日僭請焉先生欣然嘉其志乃開示為學門户朝夕誨誘不倦其後屬疾某適在外亟歸省問甚喜曰病中無可與語幸子之歸也自是教詔益詳期許益重至為具道平生問學次第傾倒亡餘一日授詩一篇乃其手書歿後發其所封遺書復有片紙屬某末有勉力大業之語某泣受寶藏不敢失墜以示子孫及同志使知跂慕前修景行之懿問原道謂軻之死不得其傳程子以為非見得真實不能出此語屏山乃以為孤聖道絶後學何如笑曰屏山只要説釋子道流乃得其傳耳又問如十論之作於夫子全以死生為言似以此為大事了久之乃曰他本是釋學但只是翻騰出來説許多話耳並朱子語劉勉之白水先生字致中建之崇安人鄉舉詣太學歸過南京見劉忠定楊文靖授業後以中書數臣薦詔詣闕未及召見給札後省謝病歸紹興十九年二月卒年五十九自幼強學日誦數千言耳目所接一過不復忘為文肆筆而成滂沛閎闊凌厲頓挫儕輩少能及之踰冠入太學時蔡京用事方禁士毋得挾元祐書制師生連坐法犯者罪至流徙名為一道德者而實以鉗天下之口君心獨知其非是隂訪伊洛程氏之傳得其書而藏去深夜同舍生皆熟寐乃始探篋解裘下帷然膏潛抄而默誦之聞譙公天授嘗從程夫子遊兼邃易學適以事至京師即往叩之盡得其學之本末既而遂厭科舉之業一日棄録牒揖諸生歸見劉元城楊龜山皆請業焉劉公尤竒其才留語數十日告以平生行己立朝大節以至方外之學他人所不及聞者無不傾盡先生拜受其言精思力行朝夕不怠久而若有得焉昔聞一言之善融會貫通皆為已用而踐履日巳莊篤與籍溪胡原仲屏山劉彥沖兩先生友善日以講論切磋為事其於當世之務若不屑焉而論説區處巨細顯微皆有條理亂後故山室廬荒頓乃即建陽近郊蕭屯别墅結為草堂讀書其中力耕稼以自給淡若無求於世而一時賢士大夫莫不注心髙仰之中書舍人吕公居仁知公之深嘗以小詩問訊有老大多材十年堅坐之句世傳以為實録時國家南渡幾十年謀復中原以攄宿憤而未有一定之計方且寤寐俊傑與圖事功吕公乃與同列曽公天遊李公似之張公子猷三數人者共列其行誼志業以聞於朝特詔詣闕將行屏山先生為作招劍之文以祝之其卒之亂曰寶劍來奉君王撫四夷定八荒時乎時毋深藏其所望於先生者如此秦檜専國柄方決和戎之策惡聞天下正論意山林之士不顧利害敢盡言觸忌諱尤不欲使見天子談當世事苐令策試後省給札俾上其對先生知道不易行即日謝病歸杜門髙卧十餘年造養益熟名聞日尊故相趙忠簡出鎮南州道出里門紆轡入謁坐語移日彌加歎重然而去未幾即遭讒竄海外以沒同時知先生者亦皆廢錮不復用先生竟不及一試於用而卒有志之士莫不哀之先生學本為己而才周世用臨事裁處不動聲氣平居嚴敬自持若不可犯而接物之際恂恂和悅色笑可親其臨財亷一介不妄取少時婦家富而無子謀盡以資産歸女氏既謝不取又擇其宗屬之賢者舉而畀之使奉先祀晦庵曰熹之先君子蚤與先生遊相好將沒深以後事為寄且戒某往學焉及棄諸孤先生慨然為經理其家事而教誨某如子侄既久以其息女歸之親舊羈貧收恤扶助亦皆曲盡恩意學子造門隨其財品為説聖賢教學門户以及前言往行之懿終日娓娓無倦色自壯至老如一日也李侗延平先生文靖公字願中南劒之劒浦人父諱涣贈右朝議大夫先生為季子晚以一子舉進士試吏旁郡更請迎養遂自建安如鉛山訪外家兄弟於昭武過其門弟子故人於武夷潭溪之上徜徉而歸會閩帥王山汪公以書禮車乘來迎先生往見至之日疾作卒于府治之館舍年七十一隆興元年十月十五日也少遊鄉校有聲巳而聞郡人羅仲素得河洛之學於龜山之門遂往學焉羅公清介絶俗雖里人鮮克知之見先生從遊受業或頗非笑先生若不聞從之纍年受春秋中庸論孟之説從容濳玩有會于心盡得其所傳之奧羅公少然可亟稱許焉於是退而屏居山里結茅水竹之間謝絶世故餘四十年簞瓢屢空怡然自適中間郡將學官聞其名而招致之或遣子弟從遊受學州郡士人有以矜式焉初龜山倡道東南士之遊其門者甚衆然與其濳思力行任重詣極如羅公蓋一人而巳先生既從之學講誦之餘危坐終日以驗夫喜怒哀樂未發之前氣象為如何而求所謂中者若是蓋久之而知天下之大本其有在乎是也蓋天下之理無不由是而出既得其本則凡出於此者雖品節萬殊曲折萬變莫不該攝洞貫以次融釋而各有條理如川流脈絡之不可亂大而天地之所以髙厚微而品彚之所以化育以至於經訓之微言日用之小物玩之於此無一不得其衷焉由是操存益固涵養益熟精明純一觸處洞然泛應曲酬發必中節後學答問窮夜不倦隨人淺深誘之各不同而要以反身自得而可以入聖賢之域矣故其言曰學問之道不在多言但默坐澄心體認天理若真有所見雖一毫私欲之發亦退聽矣久乃用力於此庶幾漸明講學始有力耳又曰學者之病在於未有灑然氷釋凍解處縱有力持守不過茍免顯然悔尤而巳若是者恐未足道也又曰今人之學與古人異如孔門諸子羣居終日交相切磨又得夫子為之依歸日用之間觀感而化者多矣恐於融釋脫落處非言説所及也不然子貢何以言夫子之言性與天道不可得而聞也耶嘗以黃太史之稱濓溪周夫子胸中灑落如光風霽月云者為善形容有道者氣象嘗諷誦之而顧謂學者曰有此於胸中庶幾遇事廓然而義理少進矣語中庸曰聖門之傳是書其所以開悟後學無遺策矣然所謂喜怒哀樂未發謂之中者又一篇之指要也若徒記誦而巳則亦奚以為哉必也體之於身實見是理若顔子之歎卓然見其為一物而不違乎心目之間然後擴充而往無所不通則庶乎可以言中庸矣語春秋曰春秋一事各是發明一例如觀山水徒步而形勢不同不可拘以一法然所以難言者蓋以常人之心推測聖人未到聖人灑然處豈能無失邪其於語孟他經無不貫達茍有疑問答之必極其趣嘗曰讀書者知其所言莫非吾事而即吾身以求之則凡聖賢所至而吾所未至者皆可勉而進矣若直以文字求之悅其詞義以資誦説其不為玩物喪志者幾希以故未嘗為講解文義然其辨析精微毫釐畢察嘗語問者曰講學切在深潛縝密然後氣味滋長蹊徑不差若槩以理一而不察乎其分之殊此學者所以流於疑似亂真之説而不自知也先生資稟徑特氣節豪邁而充養完粹無復圭角精純之氣達於面目色溫言厲神定氣和語默動靜端詳間泰自然之中若有成法平居恂恂於事若無甚可否及酬酢事變斷以義理則有截然不可犯者早嵗聞道即棄場屋超然逺引若無意於當世然憂時論事感激動人其語治道必以明天理正人心崇節義厲亷恥為先本末備具可舉而行非特空言而巳異端之學無所入於其心然一聞其説則知其詖淫邪遁之所以然者蓋辨之於錙銖眇忽之間而儒釋之邪正分矣先生之道德純備學術通明求之當世殆絶倫比然不求知於世而亦未嘗輕以語人故上之人既莫之知而學者亦莫之識是以進不獲施之於人退未及傳之於後而先生方且玩其所安樂者於畎畝之中悠然不知老之將至蓋所謂依乎中庸遁世不見知而不悔者先生庶幾焉韋齋朱松謂先生如冰壺秋月瑩徹無瑕朱晦庵祭之曰猗歟先生早自得師身世兩忘唯道是資精義造約窮深極微凍解冰釋發於天機乾端坤倪鬼袐神彰風霆之變日月之光爰暨山川草木昆蟲人倫之至王道之中一以貫之其外無餘縷析毫差其分則殊體用混員隱顯昭融萬變並酬浮雲太空仁孝友弟灑落誠明清通和樂展也大成婆娑丘林世莫我知優哉遊哉卒嵗以嬉云云嗚呼先生而止於斯命之不融誰實尸之合散屈伸消息滿虛廓然大公與化為徒古今一息曷計短長物我一身孰為窮通嗟惟聖學不絶如線先生得之既厚以全進未獲施退未及傳殉身以歿孰云非天熹也小生總角趨拜恭惟先君實共源派誾誾侃侃斂袵推先冰壺秋月謂公則然施及後人敢渝斯志從遊十年誘掖諄至春山朝榮秋堂夜空即事即理無幽不窮相期日深見勵彌切蹇步方休鞭繩巳掣安車暑行過我衡門返斾相遭涼秋巳分熹於此時適有命召問所宜言反覆教詔最後有言吾子勉之凡兹衆理子所自知奉以周旋幸不失墜歸裝朝嚴訃音夕至失聲長號淚落懸泉何意斯言而決終天云云問先生言行晦庵曰他却不曽著書充養得極好凡為學不過是恁地涵養將去初無異義只是先生晬面盎背自然不可及延平初亦是豪邁底人到後來也得琢磨之力問先生靜坐之説聞先生頗不以為然如何曰此亦難説靜坐理會道理自不妨只是討要靜坐則不可若理會得道理明透自然是靜常見先生説舊見羅先生説春秋頗覺不甚好不知到羅浮極靜後又理會得如何某心嘗疑之以今觀之是如此蓋心下熱閙如何看得道理出問延平謂常存此心勿為事物所勝曰先生㴠養得自是别真所謂不為事物所勝者古人云終日無疾言遽色他真個是如此曰先生嘗云人之念慮若是於顯然過惡萌動此却易見易除却怕於匹似間底事爆起來纒繞思念將去不能除此尤害事熹向來亦是如此先生意只是要得學者靜中有個主宰存飬處問延平行狀云終日危坐以驗夫喜怒哀樂之前氣象為如何而求其所謂中者與伊川之説若不相似曰這處是舊日下得語太重今以伊川之語格之則其下工夫處亦是有些子偏只是被李先生靜得極了便自見得是有個覺處問延平欲於未發之前觀其氣象此與楊氏體驗於未發之前者異同如何曰這個亦有些病那體驗字是有個思思了便是巳發若觀時恁著意看便也是巳發問此體驗是著意觀久恁平常否曰此是以不觀觀之又曰延平説人心中大段惡念却易制伏最是那不大段計利害乍往乍來底念慮相續不斷難為驅除今看得來是如此李先生取人大抵令於靜中體認大本未發時氣象分明即處事應物自然中節此乃龜山門下相傳指訣大抵思索義理到紛亂窒塞處須是一切掃去放教胸中空蕩蕩地了却舉起一看便自覺得有下落處此説向見李先生曽説來今日方真實驗得如此若著些利害便不免開口告人却與不學之人何異向見李先生説若大段排遣不去只思古人所遭患難有大不可堪者持以自比則亦可以少安矣始者甚卑其説以為何至如此後來臨事却覺有得力處不可忽也舊見李先生説少從師友幸有所聞中間無講習之功幾成廢墜然賴天之靈此個道理時常在心目間未嘗敢忘此可見其持守之功矣然則所見安得而不精所養安得而不熟耶並朱子語朱松韋齋先生字喬年徽之婺源人政和八年同上舍出身授建州政和尉丁外艱服除調南劍州尤溪尉監泉州石井鎮紹興四年召試館職除正字丁內艱服闋召對改左宣教郎祕書省校書郎遷著作佐郎尚書度支員外郎兼史館校勘厯司勳吏部兩曺兼史職如故修哲宗實録書成轉奉議郎以年勞轉承議出知饒州未上請間得主管台州崇道觀滿秩再請命下而卒紹興十三年三月二十四日也贈官通議大夫公生有俊才自為兒童時出語巳驚人少長遊學校為舉子文即清新灑落無當時卑弱陳腐氣及去場屋始放意為詩文其詩初亦不事雕飾而天然秀發格力間暇超然有出塵之態逺近傳誦至聞京師一時前輩以詩鳴者往往未識其面而巳交口譽之其文汪洋放肆不見涯涘如川之方至而奔騰蹙沓渾浩流轉頃刻萬變不可名狀人少能及一日發憤折節益取六經諸史百氏之書伏而讀之以求天下國家興亡理亂之變與夫一時所以應時合變先後本末之序期於有以發為議論措之事業如賈長沙陸宣公之為者聞龜山楊氏所傳河洛之學於是益自刻厲痛刮浮華以趨本實日誦大學中庸之書以用力於致知誠意之地自謂辨急害道因取古人佩韋之義以名其齋蚤夜其間以示警飭由是向之所得於觀考者益有以自信而守之愈堅故嘗曰士之所志其分在義利之間兩端而巳然其發甚微而其流甚逺又謂父子主恩君臣主義是為天下之大戒無所逃於天地之間如人食息呼吸於元氣之中一息之不屬理必至於斃是以自昔聖賢立法埀訓所以維持防範於其間者未嘗一日而少忘御史胡世將撫諭東南公謁而説之曰今日廟堂之議未知其但欲襟憑江漢控引荆吳以保東南而巳乎抑當克復神州汛掃陵闕據中原而撫三河也嘗聞不取關中中原不可復不取荆淮東南不可保今既進不能以六師之重通道荆襄循漢沔以赴興元結連跖跋控引五路東向以圖中原退又不能移蹕建康治兵訓武北爭荆淮以為固守之計而但蹙處一方費日月於道途未知漂漂者竟何如耶嘗病士溺於俗學而不明君臣之大義是以處成敗之間者常有茍生自恕之心而闕於舍生取義之節將使三綱淪墜而有國家者無所恃以為安又言宜鑒既往之失深以明人倫勵名節為先務而又博求魁磊骨鯁沈正不回之士置之朝廷使之平居無事正色立朝則姦萌逆節銷伏於冥冥之中一朝有急則奮不顧身以抗大難亦足以禦危辱凌暴之侮則庶幾神器尊安而基祚強固矣金使議和公與史院同舍胡公珵等共疏言曰金方吞噬未厭而一旦幡然與我和者為和之説以侮我耳又慮我蓄鋭待時為和之説以撓我耳金之和使即秦之衡人六國不悟衡人割地之無饜以亡其國今國家不悟金使請和之得策其禍亦豈可勝言哉而執事者方以為吾為梓宫母后淵聖天屬之故昔項羽置太公爼上而約髙祖以降矣唯髙祖不信其詐謀而不為之屈日夜思所以圗楚者卒能蹙羽於鴻溝之上使其力屈而太公自歸此可以觀其計之得失矣公念國步日艱人心未服而天子無自將之兵諸道無典戎幹方之實二三大將人擁重兵強不可令事蓋有不可知者則又數數建言宜復武舉責實用必其洞曉韜鈐長於綏御者以儲將帥之才下州郡選驍勇悉送行在以補周衛之缺精擇帥守使搜卒乘以壯藩維之勢皆久長之至計反復倦惓不能自巳其於請建太學明人倫以倡節義之風而厲茍偷之習則又平日之所深慮而每言之所謂如人食息呼吸於元氣之中一息之不屬理必至於斃焉者非若後來諸人承望風旨但以課試文墨為粉飾太平之具而巳也然而國是巳定言無所入由是公之求去愈力而檜之怒公愈甚遂使言者論公獨以懷異自賢陽為辭遜為罪而出之屏居建溪之上日以討尋舊學為事手抄口誦不懈益虔蓋玩心於義理之微而放意於塵垢之外有以自得淡如也公性孝友與人交重然諾不以生死窮達二其心接引後進教誘不怠聞人之善推奬如不及至於邪佞猥瑣簡賢附勢之流與己異趣則鄙而逺之或不忍正視其面施於吏治亦皆果決眀辨抑邪與正無所顧避晚既屬疾自知必不起而處之泰然略無憂懼色手書告訣所善胡公憲劉公勉之劉公子翬屬以其子而顧謂熹往受學焉其志道服膺死而後巳埀裕後人不使迷於所鄉者又如此云宋名臣言行録外集卷十一
