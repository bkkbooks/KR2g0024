body:
  text: 宋名臣言行錄别集下巻七宋李幼武纂集劉光世鄜國武僖王字平叔延慶之次子宣和二年以平方臘功為鄜延路兵馬副總管康王發濟州以所部兵來從以為五軍都提舉上即位以為御營使司都統制後加奉國軍節度使御營使司提舉一行事務以平張遇等冦加檢校少保兼太尉御營副使後除兩浙西路安撫大使兼知鎭江府加開府儀同三司集慶軍節度使紹興二年加寧武軍節度使三年加檢校太傅江東宣撫使五年加少保静武寧國軍節度使淮西太平州宣撫使後趙鼎言論罷為太一宫使九年加號和衆輔國功臣復陜西五路宣撫使封雍國公後臺論罷宣撫使改萬壽觀使十年加太保三京招撫處置使十一年罷為萬壽觀使奉朝請于行在十二年正月薨年五十有四贈太師謚武僖開禧元年八月追封鄜王達蘭居祁州而其衆尚留承楚公守鎭江乃以金銀銅為三色錢其文曰招納信寳獲虜人則燕餞而遺之未幾踵至得數千人皆給良馬利器用之如華人因創赤心竒兵兩軍頗得其用詔遣仇愈往鎭江究乏糧之實上曰光世一軍月廢廩給萬數如此宜速謀屯田富直柔曰辛道宗具陜西弓箭手法頗類屯田宗尹曰容細議之公入覲頗自激昻奏云錢糧不乏器甲漸足臣之官職又超衆人所願竭力報國也他日史官紀中興名將書臣功第一上曰卿不可徒為虚言當見之行事上以語宰執於是朱勝非等皆歎上馭將得其道因其言而誘掖之也上下詔親征時光世軍在馬家渡張俊軍在采石遂詔光世以所部兵援世忠且令俊移軍建康而三大將權均兼持私隙莫肻恊心上詔魏矼田如鼇往分之矼至光世軍中諭之曰賊衆我寡合力猶懼不支况軍自爲心將何以戰爲諸公計當㓕怨隙不獨可以報國身亦有利光世意許矼因勸之移書二帥以示無他使為掎角已而二帥皆復書交致其情光世遂以書奏于上仍進屯太平州賊軍東路劉猊所統既敗引數騎遁去西路劉麟所統聞猊敗亦望風而潰公乘勝追擊亦捷通兩路所得船數百艘車數千兩器甲金帛錢米軍須之物不可勝計初水賊邵清擾通泰有大小戰船三千餘至是抵太平州城下詔遣公討之賊又犯江陰軍及崇眀鎭遂為公兵所圍勢蹙乃降張榮敗達蘭於泰州獲其壻佛寧俘馘不可勝計榮聞公在鎭江乃遣人獻捷上功狀公聞于朝尋以榮知泰州公為江東西安撫使置司建康置背嵬親隨軍皆鷙勇絶倫一以當百者又自出新意造尅敵弓斗力雄勁射鐵馬一發應絃而倒初韓世忠之軍建康也詔江東漕臣月給錢十萬緡以所税上供經制等錢應副至是光世移屯又增月樁錢五萬七千緡轉運劉景眞告乏于朝詔通融應副宰執進呈光世乞與世忠軍一般支錢糧上曰諸將之兵用命則一其所支豈容有異又曰光世一軍蒐汰冗雜約留兵幾何可以贍足范宗尹曰今月給錢十六萬緡米三萬斛若留精兵三萬更汰其使臣罷軟者可以足用上曰待作手書與之不用文飾只如家人禮直示朕意庶幾光世不疑委曲聽命遂賜光世手書及玉帶張守曰陛下深得御將之道光世軍儲抑省則國用少紓矣又罷平江府織御服局上諭輔臣方軍興有司匱乏豈可以朕服御之物為先且省七萬緡助劉光世軍費也金人犯淮公遣酈瓊自廬州統兵聲言過淮至芍池乃輕兵間道徑趨光州急攻城欲破偽知州許約勢窮乃降遂復光州偽齊分道入冦公駐兵廬州與楊沂中相應遣王徳酈瓊將精卒安豐出謝步遇賊將皆敗之偽齊築劉龍城以窺淮西公遣王師晟破之盡俘其衆而還加公三鎭節度使張浚入見因獨對言劉光世驕惰不戰不可為大將請罷之上令與趙鼎議浚見鼎具道其故鼎曰不可光世將家子將率士卒多出其門若無故罷之恐人心不可及鼎去位浚必欲罷之而命吕祉先往淮西撫軍詹至遺浚書曰吕尚書之賢固一時選然於此軍恩威曲折卵翼成就恐不得比前人兼此軍已付王徳徳雖有功與酈瓊輩等夷恐其下有不能平者願擇軍中偏裨素為軍中所親附者為徳副㑹祉還朝而瓊等訟徳于督府乃命徳還建康而復命祉往節制之祉密奏罷瓊而被害有㫖少師劉光世賜第中書舍人勾龍如淵繳奏上曰今財力困匱營繕實難但以光世罷兵柄奉朝請恩禮可加於舊則諸將知後福之有終皆效力矣於是秦檜退而稱上馭諸將深得光武遇功臣之意公以疾丐祠上謂宰執曰光世功臣朕未嘗忘聞其疾中無聊昨日以玩好物數種賜之光世大喜秉燭夜觀幾於四更朕於宫中玩好之物未嘗經目止要賜勲舊賢勞耳詔以光世為萬壽觀使光世蚤貴為大將御軍姑息無克復志論者咎之張俊循國忠烈王字伯英秦州三陽人少為弓箭户政和七年為都指揮使靖康中加武義大夫見上於元帥府擢後軍統制轉榮州刺史進桂州團練使尋加貴州防禦使進徐州觀察使遷拱衛大夫上即位除御營前軍統制權秦鳯兵鈐帶御器械落階官除正任觀察使二年升秦鳯路馬步軍副總管進武寧軍承宣使三年平苗劉拜鎭西軍節度使御前右軍都統制尋為浙東招置使四年授浙西江東制置使加神武右軍都統制除檢校少保定江昭慶軍節度使尋改江西招討使紹興初改江淮招討使拜太尉四年為浙西江東宣撫使屯建康尋改淮西宣撫五年加開府儀同三司江東宣撫使六年改授崇信奉寧軍節度使屯盱眙加少保鎭洮崇信奉寧軍節度使七年充淮西安撫使屯廬州八年賜安民靖難功臣拜少傅九年進少師封濟國公兼河南招討使兼樞密院十一年加太傅廣國公進益國公十二年罷為醴泉觀使後還三鎭節鉞封清河郡王十六年改静江寧武靖海軍節度使二十一年拜太師二十四年六月薨年六十九追封循王淳熈十五年配享高宗王初勒兵從梁揚祖勤王大元帥見其英偉擢用之張澂自京師來賫蠟封詔大元帥以兵付副帥還京師上以大計問王王曰此金詐謀耳今大王居外此乃天授豈可徙彼因請進兵上許之遂之濟州已而聞京師陷王勸進上涕泣不許王曰大王皇帝親弟人心所歸不早正大位無以稱人望上乃過應天即位建炎初王奏敵勢方張宜且南渡又請移左藏庫于鎮江金犯眀州王自越州領兵至時已無船可載王因納隠士劉相如之策遂畱以抗敵王下令曰天子且廵海道汝輩宜用命進者重賞不進者不貸嵗餘敵至王令統制官劉寶先與之戰若不勝則以兵横衝之既而寶兵少却統制官楊沂中田師中統領官趙密與之戰又不勝寶率兵再進沂中舍舟登岸與師中密等皆死戰而守臣劉洪道率州兵以射其旁遂大破之王為江淮招討使討李成入辭頗言成兵衆上曰汝將全軍設為朕攻一郡若何王曰臣朝至而夕入可也上曰成竭力攻九江兩月不能下則雖衆何能為俊大以為然上因謂俊今日諸將獨汝未嘗立功王曰臣何為無功上曰如韓世忠擒苗𫝊劉正彥則功績顯著卿殆不如俊恐悚承命誓必擒成以獻宰執奏張俊行軍事李囘曰俊軍極肅上曰朕亦聞之犯軍律者巳誅六七人矣范宗尹曰臣以書奬其美上曰待亦作詔勉之立功俊心忠赤惟好官職正當以此使之張守曰陛下深得御將之道矣王復筠州臨江軍馬進走江州王追殺之成遂遁於是王軍有鐵山之號趙鼎因奏事言比張俊遣使臣來説諸大將每得金字牌則踴躍奔命無敢不䖍由陛下素有以結其心也上曰諸將奉命此固美事朝廷出號令亦須審重使其得之若降自雲霄之上其誰敢慢乎王為神武右軍統制發所部屯婺州有司請合用錢理須樁辨緣行在至婺州不通水路難以津搬契勘便錢之法祖宗以來行於諸路為便詔尸部印押見錢闗子降付婺州召人入中執闗子赴杭越搉貨務請錢每千搭十錢為優潤有偽造者依川錢引抵罪東南㑹子法葢張本於此王乞以眀堂恩任子宗元文資吏部言有礙條法詔特許之武臣非使相而以文資禄子孫自此始王為江東宣撫見都統制王徳在建康每以厚幣結之故徳以兵八千歸之王為淮西宣撫言軍中營寨未辨張守乞增支錢上因言財用皆出民力若此之費必不可已茍可巳須極愛惜王嘗奏軍中費陛下無限錢糧上語之朕何嘗有一錢與卿此皆百姓膏血也卿須知百姓膏血不可竭務與朝廷為一體則中興之功不難致矣趙鼎奏王措置河道事上曰俊每事必親臨所以有濟因言朕每論將帥須責其挽弓騎馬人未知朕意必謂古有文能附衆武能威敵不在弓馬之間抑不知不能弓馬何以親臨行陣而率三軍使之赴難況今時艱將帥宜先士卒此朕之深意也王引兵還建康入對因言劉光世解軍政閑居自適有登仙之歎上不樂因諭之曰卿初見朕時何官曰修武郎是時家貲如何曰貧甚嘗從陛下求戰袍以禦寒上曰今日貴極富溢何所自耶曰皆陛下所賜上曰卿旣知此宜思自效而有羨於光世何耶王惶懼頓首至流涕誓以死報上召王至宫中諭之曰朕來日東去卿在此無與民爭利勿興土木之工王悚息承命王見地無磗面再三歎息上曰此事非難但艱難之際一切從儉庶幾少紓民力朕為人主雖以金玉為飾亦無不可若如此非特一時士大夫之論不以為然後世以朕為何如主也樞副使王庶措置江淮遂移王軍下張宗顏七千人軍淮西巨師古三千人屯太平州默記曰戊午夏庶視師江淮移偏師張宗顏守廬州乃分兵之漸宣撫使張俊特不恱大理丞劉時者秦人庶辟以行俊飲之醉曰卿能為我言於子尚否易置偏裨似未宜遽先處己可也不知身在朝廷之上得幾日其已安乎庶聞之復曰為我言於張七不論安與未安但一日行一日事耳庶雖不折竟如王之言王親統大軍出廬州命統制官趙密出西路密引衆徑往蘇邨時水漲三尺涉六晝夜乃逹宿城與虜遇敗之而統制官王徳自壽春趨宿夜半襲破賊營降偽守馬秦乘勝趨亳與王㑹又下之王軍至城下父老列香花迎軍王軍威甚盛而智謀勇敢賴徳為多王入見上問曾讀郭子儀傳否王對以未曉上諭云子儀方時多虞雖總重兵處外而心尊朝廷或有詔至即日就道無纎介顧望故身享厚福子孫慶流無窮今卿所管兵乃朝廷兵也若知尊朝廷如子儀則非特身享福子孫昌盛亦如之若恃兵權之重而輕視朝廷有命不即稟非特子孫不享福身亦有不測之禍卿宜戒之烏珠復犯泗州詔王於鎭江府置司措置江淮戰守王命其姪統制官子益提兵於維揚盱眙之間伺賊進止俊不以兵渡恐妨和議既而敵久不至王以問鎭江守劉子羽子羽曰此虜異時入寇飄忽如風雨今更遲囘是必有他意也王與副使楊沂中為腹心而與淮北宣判劉錡有隙及拓臯之戰奏賞諸軍錡獨不與時三帥權均然諸軍進退多出於王而錡以順昌之功驟貴諸將亦頗嫉之諸將議班師王令錡先自采石渡歸太平州而王與沂中耀兵於濠梁以撫淮民然後王取宣化渡歸建康府而沂中由𤓰洲渡歸行在庶道路次舍不相妨啟行纔數里諜報敵攻濠州益急王馳騎邀錡錡乃囘軍繼進宰執奏近報韓世忠距濠州三十里張俊亦至濠州五十里又岳飛已離池州渡江去㑹師矣上曰首禍者惟烏珠戒諸將無務多殺謀取烏珠可也澶淵之役達蘭既死真宗詔諸將按兵縱契丹勿邀其歸路此朕家法也朕兼愛南北之民豈忍以多殺為意乎是日沂中渡江遂歸行在王渡江歸建康府而錡亦歸太平州王兵八萬皆强壯精鋭為諸軍之冠上遣王與岳飛同往楚州總淮東一全軍還駐鎮江謂宰執曰士大夫言恢復者皆虚辭非實用也用兵自有次第朕遣二將使按閱兵馬措置戰守葢按閲於先則兵皆可戰兵既可戰則能守矣待彼有釁然後可進討以圖恢復此用兵之法也莫將等使金囘上曰將等來敵意未可知但勑諸軍嚴為之備彼若議和何傷於好如懐姦詐初無失策昨張俊奏事常與之議及此俊亦深曉云兵交使在其間和與戰自不相妨也王因奏事乞催淮西之賞上曰功賞後時不在朝廷在將帥王問所以然上曰軍士有出戰者有輜重者有守營者凡所謂戰功者皆戰士也今更不分全軍皆要推賞動數萬人朝廷何以行之王曰誠如聖諭初因一軍如此故諸軍效之臣今既蒙專任當戒諸統制官只保眀實出戰者庶可漸革前弊罷三宣撫司以其兵𨽻密院以王為樞密使王奏臣巳到院治事見管軍馬乞撥属御前時王與檜意合故力贊和議且覺朝廷欲罷兵權即首納所統兵王居位嵗餘無求去之意檜乃令臺臣江邀論之上未許至是邀又言其過王乃求去遂罷職加三鎭節度奉朝請進封清河郡王上臨王喪謂秦檜曰張俊遽亡曩日張通古來俊極宣力與韓世忠等不同恩數宜從優厚遂賜貂冠朝服以斂命内侍張去為䕶葬事王麾下將佐如楊沂中田師中王寶趙密劉寶皆建節鉞或至公帥幕府諸僚為侍從帥守者甚衆上曰俊在明受間有兵八千屯呉江朱勝非降指揮與秦州差遣俊不受進兵破賊實為有功可與贈小國一字王於是特封循王國朝淳化以後異姓不封眞王其追封葢自俊始宋名臣言行錄别集下巻七
