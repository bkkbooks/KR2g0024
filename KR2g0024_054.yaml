body:
  text: 宋名臣言行録别集下卷九宋李幼武纂集張九成崇國文忠公字子韶其先涿郡范陽人後徙開封紹興三年狀元及第授宣教郎鎮東軍簽除常博五年改著佐六年除著作尋除直徽猷浙東憲固辭言丐休致八年除宗少除權禮侍尋兼侍講權刑侍除祕撰提舉太平觀奉祠既久毁之亦甚謫守邵州丁謫居南安軍二十六年復祕撰知溫州以疾辭已卯夏卒年六十八復敷文待制寶慶乙酉贈太師封諡公夙學天成八歲默誦六經通大㫖父積書坐旁命客就試公答如響且置卷斂袵曰精粗本末無二致勿謂紙上語不足多下學上達某敢以聖言為法諸老驚歎曰真竒童子也十歲善文時儕稱雄十四游郡庠閉閣終日寒折膠暑爍金不越戶限比舍生穴隙以視則斂膝危坐對置大編服膺勿懈若與神為伍乃更相警服而師尊之公射策集英殿略曰祻亂之作天所以開聖人願以剛大為心毋遽以驚憂自沮又曰臣觀金人有必亡之勢而中國有必興之理特在陛下何如耳又曰今日待敵之計當先用越王之法以驕之使侈心肆意無所忌憚天其滅之將見權臣爭强篡奪之禍起矣又曰前世中興之主以剛德為尚去讒節欲逺佞防奸皆其本也又曰陛下之心臣得知之方當春陽盡敷行宫别殿花氣紛紛切想陛下念兩宫之在北邊塵沙漠漠不得共此融和也其何安乎盛夏之際風窗水院涼意凄清切想陛下念兩宮之在北邊蠻氊擁蔽不得共此疏暢也亦何安乎澄江瀉練夜桂飄香陛下享此樂時必曰西風凄動兩宫得無憂乎狐裘溫暖獸炭春紅陛下享此樂時必曰朔雪袤丈兩宫得無寒乎至於陳水陸飽珍竒必投筯而起曰鴈粉腥羊兩宮所不便也食其能下咽乎居廣厦處深宮必撫兒而歎曰穹廬甌脫兩宮必難處也居其能安席乎今閭巷之人皆知有父兄妻子之樂雖陛下貴為天子富有四海以金人之故使陛下冬不得溫夏不得凊昏無所於定晨無所於省問寢之私何時可遂乎在原之急何時可救乎日往月來何時可歸乎每歲時遇物想惟聖心雷厲天淚雨流撫劒長吁思欲清蠻帳以還二聖之車此臣心之所以知陛下者如此又曰搜攪小蟲驅馳駿馬道路之言有若上誣聖德者深察其源蓋亦有自彼閹人私求禽馬動以陛下為名且閹寺聞名國之不祥也今此曹名字稍稍有聞此臣之所憂也賢士大夫宴見有時宦官女子實居前後有時者易疏前後者難間聖情荏苒不知其非不若使之安掃除之役候門戶之司凡交結往來者有禁干與政事者必誅陛下日御便殿親近儒者講詩書之㫖趣論古今之成敗將見聞閹寺之言乃狐狸夜號而鴟梟晝舞也上感其言擢置第一曰九成文雖不甚工然上自朕躬下逮百執事之人無所回避擢置首選誰謂不然楊時遺九成書曰廷對自更科以來未之有也非剛大之氣不為得失回屈不能為也策言僞豫比之狐狸鴟梟或傳以示豫豫不勝忿榜之康莊手劒以屬刺客衆為寒心公曰欺天罔人惡積禍稔殆自斃矣後因陛對上語之曰逆豫榜卿廷策謀以致害非卿有守豈能獨立不懼故制詞有逆賊聞風而悚懼之語公歸海昌簦笈雲集公遜辭不獲乃語言曰幼而學之壯而欲行之太學平天下之道自格物入夫子不踰矩之道自志學入一心之所營即經綸天下之業一身之所履即綏定國家之事耳目乃禮樂之原其可弗正夢寐乃居處之驗其可弗思諸君亦深求而自得之以無愧所學有詔經筵官分講讀經史公講春秋一日論日食曰日食之變本於惡氣惡氣之萌本於惡念不芟夷藴崇之絶其本根將奔騰四達上觸乎天則日月薄蝕五星失序下觸乎地則災及五穀怪妖迭見中觸乎人則為兵為火札瘥備至則惡念之起可不應時撲滅乎上聳然曰誠在朕念慮間當為卿戒之公進講畢上嘗論王道曰易牛微事耳孟子遽謂是心足以王朕竊疑之公曰陛下不必疑疑則心與道二不忍一牛仁心著見此則王道之端倪推此心以往則華夏蠻貊根荄鱗介舉天下萬物皆在陛下仁政中豈非王道乎上問籲俊尊上帝如何公曰陛下之心即上帝也招徠賢俊格非心於未萌之初是乃所以尊之也他日上語近臣曰朕於張九成所得甚多九成為禮侍嘗從容於上曰敵情多詐議者不究異日之害而欲姑息以求安不可不察㑹秦檜聞九成在經筵講書及西漢災異事大惡之九成入見面奏曰外議以臣為趙鼎之黨雖臣亦疑之上問其故九成曰臣每造鼎見其議論無滯不覺坐久則人言臣為鼎黨無足怪也既而再章求去上命以次對出守檜必欲廢置之奏除祕撰奉祠江州太平觀免謝辭九成既免喪秦檜取㫖上曰可與宮觀此人最是結交趙鼎之深者自古朋黨惟畏人主知之此人獨無所畏既而詹大方言頃者鼓唱浮言九成實為之首徑山僧宗杲和之今已逺竄為首者豈可置而不問望罷九成宮觀投之逺方以為傾邪者之戒落職編置南安軍公與徑山主僧宗杲為莫逆交時緇流之赴宗杲者二千餘衆徑山雖巨剎至無所容宗杲更敞千僧閣以居之而公往來其間檜恐其議已於是言者論公與宗杲謗訕朝政上在經筵嘗問髙閌曰向來張九成嘗問朕左傳載一事或干餘言春秋只一句書之何也朕答之云聖言有造化所以寓無窮之意閌曰說春秋者雖多終不能發眀正如窺造化也上曰九成所問極是閌曰陛下所答亦極是上因問九成安否翌日謂秦檜曰張九成今在何處檜曰九成頃以唱異惑衆為臺臣所論既與郡乃乞祠觀其意終不肻為陛下用上曰九成清貧不可無祿公謫居南安前步帥解潛亦謫居焉病劇公往省之謂曰太尉平日所懷亦有不足者否潛泣曰一生惟仗忠義誓與敵死以雪國耻而不肻議和遂為秦檜所斥此心惟天知之公曰無愧此心足矣何必天知然人亦無不知者但有遲速耳潛曰聞此言心中豁然矣即逝公壯之因歎曰武人一念正氣猶待人之決況吾儕讀聖賢書平日安可不正此心乎公在南安或問公曰近日士大夫氣殊不振曾無一言及天下事者豈皆無人材耶公曰大抵人材在上之人作成若摧抑之則此氣亦索有道之士不任其事安肻以自取辱哉秦公方斥異已大起告訐此其志欲殺賢者然未必不反激人之言子姑俟之公謫居十四年談經自樂手不停披歲久庭磚足蹟依然公題于柱曰豫平生嗜書老來目病執書就眀于此者十四年矣倚立積久雙跌隱然可一笑也因自號橫浦居士晏敦復字景初元獻公曾孫登大觀三年第宣和末除吏部外郎檢正吏侍厯禮工部權吏書紹興十五年薨時伊川道學為天下宗師公不逺千里而見焉先生一見竒之由是學問日益純正士類推重上方鋭意恢復為內修外攘之計公進治本之說曰朝廷者天下之本也自古未有朝廷治而天下不治者亦未有朝廷不治而天下治者故曰正朝廷以正百官正百官以正萬民正萬民以正四方此不易之序也上命宰執諭㫖令條其防秋利害乃上疏曰臣竊以淮甸實今日朝廷之藩籬也經營固不可後分屯諸將措畫營田未為失計惟進退之計不可不審先為不可勝以待敵之可勝乃今日所當務者云云臣又聞自古用兵必由內重而外輕然後根本固而理勢順今諸將在外朝廷猶當增飭守衛都督府亦當於江上固守為諸軍聲援眀州等處海道舟船亦宜嚴為防備無使妄動使虜為盜來不可犯去無所得斯足矣其他不可輕議也時用兵不常公慮朝廷輕舉因言於上謂天下之事所宜謹重而不可忽者莫大於兵蓋兵凶器戰危事一舉而勝猶懼後悔舉而不勝後將若何且以越王勾踐事吳未嘗一日忘之也然必謀之二十二年國之父兄請報者再而後勾踐許焉勾踐欲謀者四而後范蠡許焉在我者惟人事修而天時至矣又必在彼者天人之際皆有滅亡之兆乃始蹶而趨之以務及時彼其所以卒能滅吳而雪㑹稽之耻者誠以必勝之策出於萬全故也今國家恢復之計誠不可後舉兵北嚮必欲有成則不可不謹重而後發也秦檜為相制下朝士皆相慶公退而有憂色或謂公曰檜之作相天下之福公獨不悅何耶曰姦人相矣張致逺魏矼聞之皆以公言為過其後乃服胡銓之貶昭州也臨安遣人械送范如圭方疇同見公為銓求援公曰頃嘗言檜之姦諸公皆不以為然今方專國便敢如此趙元鎮雖無狀不至是也此人得君何所不為公即往見知府張澄曰銓論宰相天下共知祖宗朝言事官被謫開封府亦不如是澄愧謝曰即追回矣公素剛嚴為世所憚及居天官秉心益公執法甚固請謁不行親故有以書至視其封題有并及同字者即却之不納惟務抑僥競清流品甄序人物區别賢否一時銓總號為平允中興以來凡曰選格法多公所裁定士無淹滯之歎上嘗歎曰晏敦復凝重剛方當公介然衡總有序擲發清眀事無姦滯山濤毛玠無以過之金人遣使至境求和而要我以難行之禮上厭兵革且謂南北軍兵久困征役姑欲屈已就和以紓目前之患乃降御札令在廷侍從臺諌之臣詳思所宜條奏公奏言臣竊以自古外國為中國患世皆有之未有若今日之甚者自古外國與中國通和亦世皆有之未有非中國强盛力足以制之而自肻與中國和好者也然所謂屈已者當思有益於事則小屈可為也倘於大事非徒無益又且因而别致禍患則可不深思熟慮之乎一事既屈則又以他事來屈我矣小事既屈則必有大事來屈我矣臣又竊料專以和議為是者必謂和議既成則兵可不用而得休息是大不然臣竊謂和議與用兵二者不可偏廢若和議既成之後金之命令有必不可從者不免違異而金以逆命來則兵可不用乎時宰相方以和議為已功力贊屈已之說以謂此事當斷自宸𠂻不必謀之在廷上將從其請而外論羣起計雖定而未敢必行羣臣有附宰相而求進乃說宰相公為天下大計而羣議橫起何不擇人為臺官使盡擊去之則公之事遂矣宰相納其說遂擢言者居中司又引其黨與使居橫榻公私切憤歎曰主憂臣辱主辱臣死今天子為姦臣所誤臣子豈可坐視自同衆人而不為盡言之乎乃上疏言仰惟陛下聖孝天至痛梓宫之未還念兩宫之未復不但屈己與金議和夙夜焦勞誠心懇切孜孜汲汲惟恐後時特以衆論未同故未敢輕屈爾幸而日者上自朝廷下逮百執事之臣小大一心無復異議朝夕進對從容獻納庶幾天聽為回卒不致屈此宗社之福也彼時廷臣乃務迎合輒敢抗章力贊此議以為一身進取之資不恤君父屈辱之耻核情定罪大不容誅乃由寮官超擢御史大夫御史府朝廷綱紀之地陛下耳目之司也前日勾龍如淵以附㑹此議而得中丞衆論固已嗤鄙之矣今廷臣又以此而躋橫榻一臺之中長二皆然既同鄉曲又同心腹唯阿相附變亂是非豈不紊國家之紀綱蔽陛下之耳目乎衆論沸騰方且切齒而莫將者又以此議由寺丞而擢右史如淵廷臣庸人也初無所長但知觀望而將奸人也考其平昔奚所不為陛下奈何遽與此輩斷國論乎詩曰憂心悄悄愠于羣小孔子曰小人成羣斯可愠矣今如淵廷臣將輩漸以成羣豈國家之福哉伏望睿斷幡然而改特加斥逐庶幾杜羣枉之門公為吏書即罷知衢州方議和之初公力詆屈已之非檜患其不附巳使腹心人訹之曰公若曲從兩地旦夕可至公曰吾終不以身計而誤國家況吾薑桂之性到老愈辣請勿復言檜卒不能屈公凡論奏上未嘗不嘉納嘗面諭曰卿鯁峭敢言無所回避可謂無忝爾祖矣宋名臣言行録别集下卷九
