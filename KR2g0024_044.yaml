body:
  text: 宋名臣言行録别集上卷十二宋李幼武纂集趙密字叔微太原清源人政和四年用材武試崇政殿授河北隊將以步將戍燕大元帥建府檄統先鋒援京師以功補閣門祗候建炎間轉武節郎左軍統領進武功大夫為統制紹興初升親衛大夫康州刺史總管涇原馬步軍進中衛協忠大夫和州團練防禦使拜宣州觀察使十二年以龍神衛四廂都指揮使受詔主管侍衛步軍除定江軍承宣使進崇信軍節度使録管軍十年勞轉太尉三十二年拜開府明年頷殿巖又明年告老以萬壽觀奉朝請隆興二年進少保虜犯淮孝宗起公重臨和議旋成乞歸除醴泉使乾道元年致仕尋病卒壽啓八帙贈少保公生四歲知學所居茂林芾翳異人不知所從來憩其下而吒曰是宜有貴人宗黨子弟爭出揖了弗視最後目公曰兒是已壯當以疆場之事傑立語罷索酒一引空其罍去不復見金陷揚州士民爭從乘輿渡江衆數萬畏不得免公露立水濵麾舟訖濟悉拱手加額稱為佛子至以標其軍受詔入衛時方多虞申警千般幾通夕不敢寐忠勤結知自兹始以其生於酉命繡雞於旗並錫之斧及賜常御巾履海冦朱明暴閩連歲不少戢臨以官軍勢益甚以諉公即擇畀張守忠方略且戒之曰海道與陸異窮之則日月相持非䇿之善要在拊集矜定之爾南北通好戎備頗玩弛整理訓齊常若待敵賞勵介士空單帑藏不惜笥無兼衣虜亮南下諸道御之徼賞者得一級匹馬亦飛驛告捷公言彼傾國涉吾地那得久堅壁以老之伺間而圖之萬全計也屑屑上功那用許亮竟自滅公天性簡諒幼嗜兵書雖用武爵顯而詩書爼豆之習終身不少置資治通鑑或成誦不脫口間暇接賔客笑言融怡處躬渾然無微玷可指王德字子華通逺軍人從劉光世勤王為前軍統制以斬韓世忠部將編管江州光世為御營副使復起為統制纍功加中亮大夫同州觀察使加清逺軍節度使張俊入樞薦為建康駐劄御前諸軍都統制秦檜忌其英勇罷為浙東副總管紹興駐劄復為湖北總管荆南駐劄紹興二十四年卒善謀有膽勇方張遇據池州劉光世往討之以百餘騎進為遇所敗公以兵救之得免追至江州敗之雄勇無敵軍中號為王夜義金犯揚州光世兵潰公引兵四百至和州城外會張育聚兵五萬據和州移文令公聽其節制公不從育親領三千兵來却之公盡伏其兵於深林草中育至不見公乘馬往來於草中尋之公與弟青並王世忠挺鎗躍出刺育墜馬斬之復移文城中招育諸將令聽節制諸將聞之皆降公乃入據其城待育一家如親戚撫其諸將皆如故舊人心歸焉俄而羣賊張和尚以兵五萬來冦置書於公曰昔張育殺我骨肉故我來復仇耳公書解之不聽又來索育之骨肉公盡斬育一家遣其頭勸之退兵和尚曰此但育一家而已必盡斬其一軍老少我乃退兵矣公乃宴諸將告之咸請死戰乘鋭一擊潰之和尚走為鄉兵所殺其衆盡降公領兵十萬渡建康見光世光世喜分為六軍軍威大振金人冦淮南公與戰于滁州桑根敗之再戰于和州又敗之未幾逆豫復遣兵入冦公被命往戰于滁州渦口敗之又戰于安豐縣敗之斬三千級劉麟亦領兵犯廬州而聞猊先為楊沂中所敗遂望風而走公等擊之降其兵數千光世請宫祠罷兵以公為都總管命吕祉往節制其軍酈瓊王世忠等不伏訴公于朝公奏諸將驕暴命公以本軍歸御營而瓊等果叛拓臯之戰金人將邢王韓常等以鐵騎十餘萬為兩隅夾道而陳公曰金右隅皆徑騎吾將先破之乃與田師中麾兵薄其右隅金陳動公乘勢大呼馳擊諸軍皆鼓譟金大敗劉錡謂公曰昔聞公威略如神今果見之請以兄禮事公烏珠冦淮西命公與戰昭關敗之又戰仙宗鎮敗之楊沂中戰烏珠於拓臯烏珠陳兵三十萬沂中輕進為賊所包部下多死公以騎軍橫擊大破之殺金萬餘沂中幸免遂復廬州張俊大軍至亳州城外公已下宿州即乘勝趨亳州與俊會酈瓊聞之謂葛王褒曰夜乂公來矣其鋒未易當請避之遂遁時俊軍甚盛而智謀勇敢賴公為多公亦先計後戰故未嘗敗烏珠再圍濠州公勸張俊沂中急往擊之俊以糧乏俱退軍黃連鎮濠州陷俊密令沂中往收復之金伏兵數十萬皆起沂中被圍殿前司兵幾殲公與田師中等往救之力戰濠州奪沂中出而烏珠退兵於是有節使之命張子蓋字德高其先鳳翔人後徙秦州初從韓世忠捕苗傅補承信郎又從叔俊遷武功郎紹興六年敗劉猊授武功大夫閣門贊舍明年除御械授昌州刺史江東路馬步軍都總管十年授登州防禦使兼宣司衙兵副統制明年以功除興寧軍承宣使和議成除建康駐劄御前諸軍統制十三年授神龍衛四廂都指揮使兩浙西路馬步軍都總管高宗幸俊居授安德軍節度使三十二年為鎮江都統授海州尋以疾還鎮江授檢校少保淮東招撫使未赴卒年五十一贈太尉紹興七年烏珠陷廬州冦含山縣漸犯歷陽時張俊諸軍雖已趨裝未發俊遣渡江諭諸將曰先得和者勝公及王德鼓譟而行徑至城下馳騎先登入和州金退屯昭關會劉錡自東關引兵出清溪邀擊金俊遣公與錡會大戰于拓臯敗之軍勢赫張烏珠復犯濠州公又敗之於周梁橋公自鎮江往謁張浚浚與語見其智識過人謀慮精審與圖規取山東之計浚奏公才勇而性剛氣直願優容之且乞益以精甲資以財用俾屯淮上措置招徠金攻海州急詔公往援之公至鎮江乃整齪師渡江至楚州金知公且至有退意有大呼于城外者曰我知爾大軍來也頃之公率騎軍至步軍猶在後也魏勝出城外與公議戰公先至楚州時淮東漕龔濤謂金十倍兵力不支宜虗張聲勢攻淮陽使之必救則海州可解公曰彼不救淮陽奈何乃亟趨漣水擇便道以進金聞公至斂大伊兵陳磨行公率鋭騎先進諸軍絶道以請曰敵近不可進公不從賊望公旗斷二橋而去公夜布橋而進翌日至石湫堰賊萬騎陳於河東公與相射至暮解鞍抹馬憩於河西賊不敢動中夜大軍至即架梁以渡黎明翼衆軍追之二十里賊再陳於海州西北諸軍見賊兵衆不敢前攻曰彼衆我寡利於速戰不可使賊知吾虛實亟遣統制張圯等掠敵圯中流矢公令諸將曰事急矣國之安危在此一舉奮臂大呼馳入陳諸將繼之殊死戰賊大敗擁入河溺死者半金復整軍來戰公再率精鋭擊之獲車馬鎧仗萬計暮至新橋西金再陳問主軍者誰答以張循王姪金嘆服曰小鐵山也公又率軍追殺會日晡賊殲焉餘騎遁去公還定海州民皆出迎以手加額至繪像祠之李寶字原闕乘氏人初從嶽飛為馬軍後為統領至紹興三十年為淮西馬步軍副總管兼知黃州改添差兩浙西路副總管平江府駐劄兼副提督海船三十一年入奏事請徙守江陰從之後以海州功超授右武功大夫靜海軍節度使京東招討使浙西沿海制置使公少無賴尚氣節鄉人號為潑李三嶽飛入朝公願歸軍中飛未之奇也公怏怏與其徒謀北歸事露飛盡斬之公抗言欲歸者寶也衆皆不預飛奇而釋之公願歸山東會合忠義人立功飛許之募得八百人赴飛軍飛乃以公統領軍馬屯襲城守黃州乞於沿江州縣招水軍效用千人詔許三百又請器甲弓矢及乞鎮江軍中官兵曹洋等五千人自𨽻從之三十一年公入奏事翌日上謂輔臣曰寶非惟驍勇兼其心術可以倚仗朕素識其人觀之久矣他日未易量先是公言連江接海便於發舶無若江陰臣請徙守萬有一不任甘死無赦上從之公即遣其子公佐與邊士寧潛入金境伺動靜至是金謀益泄復召至闕問方略公奏以海道無險要可守萬一金艦散入諸洋則難以蕩滅臣止有一䇿出萬全上問何如對曰凡用兵之道自戰其地與戰人之地不同自戰其地者必生之兵也戰人之地者必死之兵也必生者易破而必死者難却今金未離巢穴臣仰憑天威掩出不意因其驚擾而疾擊之可以得志上曰善問所總舟幾何曰堅全可涉風濤者得百一十皆舊例所用防秋者所總人幾何曰僅三千止是二浙福建五分弓弩手非正兵也旗幟器甲亦已粗備事急矣臣願亟發陛辭賜寶帶鞍馬尚方弓刀戈甲之屬公自行在還江陰即謀進發軍士洶洶爭言西北風力尚徑迎之非利公下令大計已定不可搖敢再有出一語者斬遂以舟師三千人進發平江守洪遵給資糧器械濟之放蘇州大洋行三日風果怒甚舟散漫不能收公慷慨顧左右曰天欲以試李寶耶此心如鐵石不變矣即酹酒自誓風亦隨止退泊明州關澳追集散舟不浹旬復故而禆將邊士寧自密州還言魏勝已得海州矣公大喜促其下乘機進發而大風復作波濤如山者經月未得進海陵踰淮慮魏勝在海州睨其後乃分軍數萬攻海州公師至東海縣金圍海州鼓聲震十數里勝使人邀公同擊金新橋公麾兵登岸以劍畫地令曰此金界非復吾境當力戰因握槊前行接金奮擊士皆一當十金驚出意外亟引去於是勝出城迎公公維舟犒士遣辨者四出招納降附聲振山東豪傑聚衆爭為應援公與金舟遇于密州膠西縣陳家島敗之初亮用降人倪詢商簡梁三兒等計造戰船數百使蘇保衡等統之約以十月十八日至海門山入錢塘江幹事畢令雄州刺史阿瓦來江上迎報敵舟泊唐家島公舟泊石臼山相距三十餘里而北風日起公憂之有大漢軍水手數百來降大漢軍簽起工等户也公問之頗得北軍事實禆將曹洋請逆戰朐山縣宰高敞曰不可彼衆我寡宜避之洋曰彼雖衆皆不諳海道且降人云女真在船中惟匍匐而略不能動雖衆何為公伺敵未覺遣其將曹洋黃瑞禱于石臼神祈風助順得卜如期楫師歡抃夜漏將盡起碇進船風猶未順衆有難色良久風忽自柂樓中來鏗如鐘鐸衆喜爭奮引帆握刃俄頃過山薄虜鼓聲震蕩海波騰躍敵驚失措囂呼分拿掣碇舉帆彌亘數里而帆皆以油纈為之舒張如錦繡忽為波濤卷聚一隅窘蹙搖兀無復行次公命以火箭射之著其油帆煙熖隨發延燒數百艘火不及者猶欲前拒公叱健士躍登其舟以短兵擊刺殪之舟中其餘簽軍皆中原舊民脫甲而降者三千餘人獲其副都統完顏鄭家努等五人斬之阿瓦亦被殺保衡舟未發亟引去得倪詢等三人及虜詔書印記征南行程歷與器甲糧斛以萬計公盛兵厲氣欲乘勝席卷公佐切諫謂亮渡淮已陷通泰得逺地失近土且有腹背憂公即日還師駐東海視緩急為援遣曹洋奏捷捷奏至上大喜即召見洋曰朕獨用李寶果立功為天下倡矣即賜詔褒諭書忠勇李寶四字表其旗幟上至鎮江未就舍先乘馬幸江下觀戈船公從上行因陳俘獲與所得百尺舟上奬諭甚至因歎曰始朕用寶謗書盈篋至謂必復從偽今竟如何宋名臣言行録别集上卷十二
