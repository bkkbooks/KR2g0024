body:
  text: 宋名臣言行録前集卷十宋朱子纂集陳搏希夷先生穆修才种放逋魏野李之林附字圖南亳州人周世宗賜號白雲先生太宗賜號希夷摶隱居華山多閉門獨卧至百餘日不起周世宗召至闕下令於禁中扄戶以試之月餘始開摶熟寐如故甚異之因問黃白之術曰陛下為天下君當以蒼生為念豈宜留意於為金乎世宗不悅放還山太宗即位再召之留闕下數月延入宫中與語遣中使送至中書宰相宋琪等問曰先生得元默修養之道可以授人乎曰練養之道皆所不知然正使白日升天何益於治聖上龍顔秀異有天人之表洞達古今治亂之旨誠有道仁聖之主正是君臣合德以治天下之時勤行修練無以加此琪等表上其言上喜甚談苑摶負經綸之才歷五季亂離遊四方志不遂入山隱居自晉漢以後每聞一朝革命顰蹙數日人有問者瞪目不答一日方乘驢遊華隂市聞太祖登極驚喜大笑問其故又笑曰天下自此定矣太祖方潛龍時搏嘗見天日之表知太平有日矣遁迹之初有詩云十年蹤迹走紅塵回首青山入夢頻紫陌縱榮爭及睡朱門雖富不如貧愁聞劍戟扶危主悶見笙歌聒醉人携取舊書歸舊隱野花啼鳥一般春豈淺丈夫哉邵伯溫易學辨惑太宗召赴闕賜詩云曽向前朝出白雲後來消息杳無聞如今若肯隨徵召總把三峯乞與君先生服華陽巾草履垂絛以賓禮見賜坐燕談太平興國初召至闕求一靜室休息乃賜館於建龍觀扄户熟寐月餘方起上方欲征河東搏諫止之九年復來朝始陳河東可取暨王師再舉果執劉繼元平并州太宗問搏曰堯舜之為天下今可致否對曰堯舜土階三尺茅茨不剪其迹似不可及然能以清淨為治即今之堯舜也並辨惑被召至闕下間有士大夫詣其所止願聞善言以自規摶曰優好之所勿久戀得志之地勿再往聞者以為至言倦遊録康節嘗誦希夷之語曰得便宜事不得再作得便宜處不可再去又曰落便宜是得便宜故康節詩云珍重至人嘗有語落便宜處得便宜蓋可終身行之也後復再召摶辭曰九重仙詔休教丹鳯銜來一片野心巳被白雲留住搏好讀易以數學授穆伯長穆授李挺之李授康節邵堯夫以象學授种放放授廬江許堅堅授范諤此一枝傳於南方也世但以為學神仙術善人倫風鑒而巳非知圖南者也穆修字伯長汶陽人後居蔡州師事圖南少豪放性褊少合多遊京洛間人嘗書其句於禁中壁間真宗見之深加賞嘆問侍臣曰此為誰詩或以穆修對上曰有文如此公卿何以不薦丁晉公在側曰此人行不逮文由是上不復問蓋伯長與晉公有布衣舊晉公赴夔漕伯長猶未仕相遇漢上晉公意欲伯長先致禮伯長竟不一揖而去晉公銜之由是短於上前後晉公貶珠崖徙道州公有詩云却謗有虞刑政失四凶何事不量移可見其不相善也公登進士第後為潁州文學參軍故當時呼之曰穆參軍老益貧家有唐本韓栁集乃丐於所親厚者得金用工鏤板印數百帙携入京師相國寺設肆鬻之坐其旁有儒生數輩至其肆輒取閲公奪取怒視謂曰先輩能讀一篇不失一句當以一部相送遂終年不售時學者方從事聲律未知古文伯長始為之倡其後尹洙師魯始從之學古文又傳其春秋學李之才字挺之青州人倜儻不羣師事伯長伯長性嚴急稍不如意或至呵叱挺之承順如事父兄登科任孟州司戶挺之性坦率不事儀矩時太守范忠獻公以此頗不悅後忠獻建節移鎮延安郡僚多送至境外挺之但别於近郊衆或讓之挺之曰情文貴稱公實不我知而出疆逺送非情豈敢以不情事范公未幾忠獻謫守安陸過洛三城故吏無一人往者獨挺之沿檄往省之忠獻始稱嘆遂受知焉又嘗為衛州共城令時康節居祖母服築室蘇門山百源之上挺之自造其廬問曰子何所學曰為科舉進取之學耳挺之曰科舉之外有義理之學子知之乎曰未也願受教挺之曰義理之外有物理之學子知之乎曰未也願受教挺之曰物理之外有性命之學子知之乎曰未也願受教於是康節始傳其學並邵伯溫易學辨惑种放字明逸隱居終南山豹林谷聞希夷先生之風往見之希夷一日令灑掃庭除曰當有佳客至明逸作樵夫拜庭下希夷挽而上之曰君豈樵者二十年後當為顯官名聞天下曰放以道義來官祿非所問希夷曰君骨相當爾雖晦迹山林恐竟不能安後真宗召為司諫帝携其手登龍圖閣論天下事辭歸山拜諫議大夫後改工部侍郎先是希夷為明逸卜上世葬地於豹林谷下不定穴既葬希夷見之言地固佳安穴稍低世世當出名將明逸不娶無子自其姪世衡至今為將帥有聲聞見録希夷嘗戒放曰子他日遭逢明主不假進取迹動天闕名馳寰海名者古今之美器造物者深忌之天地間無完名子名將起必有物敗可戒之放至晚節侈飾過度營産滿豐鎬間門人戚屬亦怙勢強併嵗入益厚遂喪清節玉壺清話放以處士召見真宗待以殊禮名動海內後謁歸終南山恃恩驕倨王嗣宗知長安放至通判以下羣拜謁放小俯垂首接之而巳嗣宗內不平放召其姪出拜嗣宗嗣宗坐受之放怒嗣宗曰向者通判以下拜君君扶之而巳此白丁耳嗣宗狀元及第名位不輕胡為不得坐受其拜放曰君以手搏得狀元耳何足道也嗣宗怒遂上疏言放實空踈才識無以逾人專飾巧詐盜虛名陛下尊禮放擢為顯官臣恐天下竊笑益長澆偽之風且陛下召魏野野閉門避匿而放隂結權貴以自薦達因抉摘放隂事數條上雖兩不之問而待放之意浸衰記聞放别業在終南山後生從之學者甚衆性嗜酒躬耕種秫以自養所居有林泉之勝殊為幽絶真宗聞之遣中使携畫工圖之開龍圖閣召輔臣觀焉上嘆賞之其後甘棠魏野郊居有幽趣帝亦使人圖之故野有詩曰幽居帝畫看燕談處士魏野字仲先居於東郊架草堂有水竹之勝好彈琴作詩清苦多聞於時上祀汾隂召之辭疾不至以詩贄王文正公曰從前輔相皆頻出獨在中書十五秋泰嶽汾隂俱禮畢這回好伴赤松遊公覽之喜形於色以酒茗藥物為答旦得詩感悟以疾屢辭政柄遂拜太尉玉清昭應宫使王文正遺事野謂冦準曰自古功名蓋世少有全者因與詩曰好去上天辭將相歸來平地作神仙及貶始悔不用野之言仁宗政要野子間亦不仕嘉祐中賜號清逸處士溫公集云林逋字君復居杭州西湖之孤山真宗聞其名賜號和靖處士詔長吏嵗時勞問逋工筆畫善為詩如草泥行郭索雲木呌鉤輈頗為士夫所稱又梅花詩云踈影橫斜水清淺暗香浮動月黃昏評詩者謂前世詠梅者多矣未有此句也又其臨終為句云茂陵他日求遺藁猶喜初無封禪書尤為人稱誦歸田録逋景祐初尚無恙范文正公亦過其廬贈逋詩曰巢由不願仕堯舜豈遺人又曰風俗因君厚文章到老醇其激賞如此青箱雜記胡瑗安定先生字翼之泰州人纍舉不第以范文正薦官至太常博士侍講布衣時與孫明復石守道同讀書泰山攻苦食淡終夜不寢一坐十年不歸得家問見上有平安二字即投之澗中不復展讀曽孫滌所記師道廢久矣自明道景祐以來學者有師惟先生暨孫明復石守道三人而先生之徒最盛慶歷四年春天子開天章閣與大臣講天下事始慨然詔州縣皆立學於是建太學於京師而有司請下湖州取先生之法以為太學法至今為著令歐公撰墓表在湖州置治道齋學者有欲明治道者講之於中如治兵治民水利算數之類嘗言劉彛善水利後纍為政皆興水利有功程氏遺書先生尤患隋唐以來仕進尚文詞而遺經業茍趨祿利及為蘇湖二州教授嚴條約以身先之雖大暑必公服終日以見諸生解經至有要義懇懇為諸生言其所以治巳而後治乎人者學徒千數日月刮劘為文章皆傳經義必以理勝信其師説敦尚行實後為太學四方歸之庠舍不能容旁拓步軍居以廣之五經異論弟子記之目為胡氏口義蔡端明撰墓志侍講讀乾元亨利貞不避諱上與左右皆失色侍講徐曰臨文不諱上意遂解曽孫滌記在湖學時福唐劉彛中往從之學者數百人彛為髙弟熙寧二年召對上問曰胡瑗文章與王安石孰優彛曰胡瑗以道德仁義教東南諸生時王安石方在場屋修進士業臣聞聖人之道有體有用有文君臣父子仁義禮樂歷世不可變者其體也詩書史傳子集埀法後世者文也舉而措之天下能潤澤其民歸於皇極者其用也國家纍朝取士不以體用為本而尚其聲律浮華之詞是以風俗偷薄臣師瑗當寶元明道之間尤病其失遂明體用之學以授諸生夙夜勤瘁二十餘年專切學校始自蘇湖終于太學出其門者無慮一千餘人故今學者明夫聖人體用以為政教之本皆臣師之功也上曰其門人今在朝者為誰對曰若錢藻之淵篤孫覺之純明范純仁之直溫錢公輔之簡諒皆陛下所知也其在外明體適用教於民者逮數十輩其餘政事文學粗出於人者不可勝數此天下四方之所共知而嘆美之不足者也上悅李豸書侍講當召對例須先就閣門習儀侍講曰吾平生所讀書即事君之禮也何以習為閣門奏上令就舟次習之侍講固辭上亦不之強人皆謂山野之人必失儀及登對乃大稱旨上謂左右曰胡瑗進退周旋舉合古禮曽孫滌記皇祐至和間為國子直講朝廷命主太學生千餘人先生日講易每講罷或引當世之事以明之至小畜以謂畜止也臣止君也已乃言及中令趙公補所碎劄子呈於藝祖之事塵史判國子監其教育諸生有法先生語諸生食飽未可據案或久坐皆於氣血有傷當習射投壺遊息焉是亦食不語寢不言之遺意也程伊川曰凡從安定先生學者其醇厚和易之氣望之可知也仁宗朝嘗上書請興武學其略曰頃歲吳育巳建議興武學但官非其人不久而廢今國子監直講內梅堯臣曽注孫子大明深義孫復而下皆明經旨臣曽任邉陲丹州推官頗知武事若使堯臣等兼蒞武學每日只講論語使知忠孝仁義之道講孫吳使知制勝御敵之術於武臣子孫中選有智略者二三百人教習之則一二十年之間必有成效臣已撰成武學規矩一卷進呈時議難之吕厚明記時方尚詞賦獨湖學以經義及時務學中故有經義齋治事齋經義齋者擇疏通有器局者居之治事齋者人各治一事又兼一事如邉防水利之類故天下謂湖學多秀異其出而筮仕往往取髙第及為政多適於世用若老於吏事者由講習有素也歐公詩云吳興先生富道德詵詵弟子皆賢才王荆公詩云先取先生作梁柱以次收拾桷與榱家孰記初為直講有旨專掌一學之政遂推誠教育多士亦甄别人物故好尚經術者好談兵戰者好文藝者好尚節義者皆使之以類羣居相與講習胡亦時召之使論其所學為定其理或自出一義使人人以對為可否之當時政事俾之折𠂻故人皆樂從而有成今朝廷名臣往往胡之徒也李豸記為國子先生日畨禺有大商遣其子來就學其子儇宕所齎千金仍病甚瘠客於逆旅若將斃焉偶其父至京師閔而不責携其子謁胡先生告其故曰是宜先警其心而後教誘之以道者也乃取一帙書曰汝讀是可以先知養生之術知養生而後可以進學矣其子視其書乃黃帝素問也讀之未竟惴惴然懼伐性命之過甚痛悔自責兾可自新胡知其巳悟召而誨之曰知愛身則可以修身自今以始其洗心向道取聖賢之書次第讀之既通其義然後為文則汝可以成名聖人不貴無過而貴改過無懷昔悔第勉事業其人頴脫善學二三年登上第而歸李豸記治家甚嚴尤謹內外之分兒婦雖父母在非節朔不許歸寧有遺訓嫁女必須勝吾家者娶婦必須不若吾家者或問其故曰嫁女勝吾家則女之事人必欽必戒娶婦不若吾家則婦之事舅姑必執婦道曽孫滌記孫復泰山先生字明復晉州人舉進士不中退居泰山用富范薦官至直講先生少舉進士不中退居泰山之陽學春秋著尊王發微魯多學者其尤賢而有道者石介自介而下皆以弟子事之孔道輔聞先生之風就見之介執杖履侍左右先生坐則立升降拜則扶之及其往謝也亦然魯人由是始識師弟子之禮莫不嗟嘆之歐公撰墓志退居泰山之陽枯稿憔悴鬚鬢皓白故相李文定守兗見之歎曰先生年五十一室獨居誰侍左右不幸風雨飲食生疾奈何吾弟之女甚賢可以奉箕帚先生固辭文定曰吾女不妻先生不過一官人妻先生德髙天下幸壻李氏榮貴莫大於此先生曰宰相女不以妻公侯貴戚而固以嫁山谷衰老藜藿不充之人相國之賢古無有也豫不可不成相國之賢遂娶之其女亦甘淡薄事先生盡禮故當時士大夫莫不賢之澠水燕談先生治春秋不惑傳注不為曲説以亂經其言簡易明於春秋諸侯大夫功罪以考時之盛衰而見王道之治亂得於經之本義為多墓志先生惡胡瑗之為人在太學常相避瑗治經不如先生而教養過之邵氏後録范文正在睢陽掌學有孫秀才者索遊上謁文正贈錢一千明年孫生復道睢陽謁文正又贈一千因問何為汲汲於道路孫生戚然動色曰母老無以養若日得百錢則甘旨足矣文正曰吾觀子辭氣非乞客也二年僕僕所得幾何而廢學多矣吾今補子學職月可得三千以供養子能安於學乎孫生大喜於是授以春秋而孫生篤學不舍晝夜明年文正去睢陽孫亦辭歸後十年聞泰山下有孫明復先生以春秋教授學者道德髙邁朝廷召至乃昔日索遊孫秀才也筆録石介徂徠先生字守道兗州人進士及第官至直講守道為舉子時寓學於南都其固窮苦學世無比者王瀆聞其勤約因會客以盤餐遺之石謝曰甘脆者亦介之願也但日饗之則可若止得一餐則明日何以繼乎朝饗膏粱暮厭粗糲人之常情也介所以不敢當賜便以食還王咨重之倦遊録慶歷三年吕夷簡罷相夏竦罷樞使而杜衍章得象晏殊賈昌朝范仲淹富弼韓琦同時執政歐陽修余靖王素蔡襄並為諫官先生喜曰此盛事也歌頌吾職其可巳乎乃作慶歷聖德詩略曰衆賢之進如茅斯拔大姦之去如距斯脫衆賢謂衍等大姦斥竦也詩且出泰山先生見之曰子禍始於此矣先生不自安求出通判濮州歐公撰墓志聖德詩云維仲淹弼一夔一卨又曰琦器魁礧豈視扂楔可屬大事重厚如勃其後富范為宋名臣而魏公定䇿兩朝措天下於泰山之安人始歎先生之知人燕談先生非隱者其仕嘗位於朝矣然魯之人不稱其官而稱其德以為徂徠魯之望先生魯人之所尊故因其所居之山以配其有德之稱曰徂徠先生其遇事發憤作為文章極陳古今治亂成敗以指切當世賢愚善惡是是非非無所諱忌世俗頗駭其言由是謗議喧然而小人尤嫉惡之相與出力必擠之死先生安然不惑不變曰吾道固如是吾勇過孟軻矣墓志天聖以來穆伯長尹師魯蘇子美歐陽永叔始倡為古文以變西崑體學者翕然從之其有楊劉體者人戲之曰莫太崑否守道深嫉之以為孔門之大害作怪説三篇上篇排佛老下篇排楊億於是新進後學不敢為楊劉體亦不敢談佛老後歐蘇復主楊大年家孰記介既卒夏英公言於仁宗曰介實不死北走胡矣尋有旨編管介妻子於江淮又出中使與京東部刺史發介棺以驗虛實是時吕夷簡為京東轉運使謂中使曰若發棺空而介果北走則雖孥戮不足以為酷萬一介尸在未嘗叛去即是朝廷無故發人塜墓何以示後世邪介之死必有棺殮之人及內外親戚及會葬門生無慮數百至於舉柩空棺必用凶肆之人今皆檄召至此劾問之茍無異説即皆令具軍令狀以保任之亦足以應詔也中使大以為然遂合數百狀皆結罪保證中使持以入奏仁宗亦悟竦之譛尋有旨放介妻子還鄉而世以夷簡為長者及竦之死也仁宗將往澆奠吳奎言於上曰夏竦多詐今亦死矣仁宗憮然至其家澆奠畢躊蹰久之命大閹去竦面羃而視之世謂剖棺之與去面羃其為人主之疑一也亦所謂報應者耶筆録張安道雅不喜介謂狂譎盜名所以與歐范不足至人目以姦邪一日謁曽祖至祖父子容書室中見介書曰吾弟何為與此狂生遊又問黃景微何在問前日狂生以羔鴈聘之不受何不與喫了羊著了絹一任作怪何足與之較辭受義理也曽祖除御史中丞固辭不拜石介以書與祖父以不拜為非其略云內相為名臣子容為賢子天下屬望所係非輕豈可以辭位為亷安道見者此書也蘇氏談訓蘇洵老泉先生字明允眉州人常舉進士茂材異等不中歐公上其書韓公復薦之遂除校書郎君少不喜學年巳壯猶不知書始大發憤謝其素所往來少年閉戶讀書為文詞嵗餘舉進士再不中退而嘆曰此不足為吾學也悉取所為文數百篇焚之益閉户讀書絶筆不為文辭者五六年涵蓄充溢抑而不發久之慨然曰可矣由是下筆頃刻數千言其縱橫上下出入馳驟必造於深微而後止蓋其稟也厚故發之遲志也慤故得之精自來京師一時學者皆尊其賢學其文以為師法以其父子俱知名故號老蘇以别之歐公撰墓志永叔一見權書衡論目為荀卿子獻其書於相由是名動天下士爭誦其文時文為一變時相韓公琦嘗與論天下事亦以為賈誼不能過也初作昭陵禮廢缺琦為大禮使事從其厚調發趨辦州縣騷然先生以書諫琦且再三至引華元不臣以責之琦為變色然顧大義稍省其過甚者及先生歿琦亦頗自咎恨以詩哭之曰知賢不早愧莫先於余者矣張安道撰墓表嘉祐初王安石名始盛黨友傾一時歐陽修亦善之勸先生與之遊而安石亦願友於先生先生曰吾知其人矣是亦不近人情者鮮不為天下患安石之母死士大夫皆吊先生獨不往作辨姦一篇先生既沒三年而安石用事其言乃信辨姦略云山巨源見王衍曰誤天下蒼生者必此人也郭汾陽見盧杞曰此人得志吾子孫無遺類矣自今言之其理固有可見者以吾觀之王衍之為人也容貌言語固有以欺世而盜名者然使晉無惠帝雖衍百千何從而亂天下乎盧把之姦固足以敗國然不學無文非德宗之鄙暗亦何從而用之由是言之二公之料二子亦容有未必然也今有人焉口誦孔老之言身履夷齊之行收召好名之士不得志之人相與語言私立名字以為顔淵孟軻復出而隂賊險狠與人異趣是王衍盧杞合而為一人也其禍可勝言哉夫面垢不忘洗衣垢不忘浣此人之至情也今也不然衣巨盧之衣食犬彘之食囚首喪面而談詩書此豈其情也哉凡事之不近人情者鮮不為大姦慝以蓋世之名而濟未形之惡雖有願治之主好賢之相猶當舉而用之則其為天下之患必然而無疑者非特二子之比也墓表東坡中制科王荆公問吕申公見蘇軾制䇿否全類戰國文章若安石為考官必黜之故荆公後修英宗實録謂蘇明允為戰國縱橫之學云聞見録因論權書衡論曰觀其著書之名已非豈有山林逸民立言垂世乃汲汲於用兵如此所見安得不為荆公所薄曰大蘇以當時不去二虜之患則天下不可為又其審敵篇引朝錯説景帝削地之䇿曰今日夷狄之勢是亦七國之勢其意蓋欲掃蕩二虜然後致太平爾曰才以用兵為事只見搔擾何時見天下息肩時節以仁宗之世視二虜豈不勝如戰國時然而孟子在戰國時所論全不以兵為先豈以崇虛名而受實敝乎亦必有道矣龜山語録宋名臣言行録前集卷十
