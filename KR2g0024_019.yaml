body:
  text: 宋名臣言行録後集卷九宋朱子纂集曾鞏字子固建昌軍人中進士第事英宗神宗官至中書舍人通判越州嵗飢度常平不足以賑給而田居野處之人不能皆至城郭至者羣聚有疾厲之虞前期喻屬縣召富人使自實粟數總得十五萬石視常平價稍增以豫民民得從便受粟不出田里而食有餘粟價為平為州務去民疾苦急姦強而寬貧弱曰為人害者不去則吾民不寧是時州縣未屬民為保伍公獨行之部中使譏察居人行旅出入經宿皆有籍記有盜則鳴鼓相援又設方略明賞搆急追捕且開人自言故盜發輒得公所至出教事應下縣責其屬度緩急與之期期未盡不復移書督促期盡不報按其罪期與事不相當聽縣自言别與之期而按與期者即有所追逮州不遣人至縣縣毋遣人呼其門縣初未甚聽公小則罰典吏大則并劾縣官於是莫敢慢事皆先期而集民不知擾所省文移數十倍天子察公賢欲用公一日內出手詔中書門下曰曾鞏以史學稱宜典五朝史事遂以公為修撰近世修國史必衆選文學之士以大臣監總未有以五朝大典獨付一人如公者公夙夜討論未及屬稿會正官名擢中書舍人不俟入謝諭使就職時自三省至百執事選授一新除吏日至數十人人舉其職事以戒辭約義盡論者謂有三代之風上亦數稱其典雅並弟文昭公撰行述初為太平州司戶守張伯玊前輩人也歐陽荆公諸名士共稱子固文章伯玊殊不顧間語子固吾方作六經閣其為之記子固凡謄藁六七終不當伯玉之意則謂子固曰吾自為之其書於紙曰六經閣者諸子百家皆在焉不書尊經也云云子固始大畏服益自勵於學矣聞見録初見神宗上問曰卿與王安石布衣之舊安石何如對曰安石文學行義不減揚雄然吝所以不及古人曰安石輕富貴非吝也對曰非此之謂安石勇於有為吝於改過上頷之談叢子固罷檢討以錢醇老代之元素曰曾公亮知山隂賤市民田數十頃為人所訟曾易占時在越幕説守倅曰曾宰髙科他日將貴顯用兹事敗之可惜父會為明守衰老宜與謀俾代其子任咎守倅從之會由是坐贓追停曾公猶以私坐監當深德易占後易占以信州縣宰坐贓英州編管亡匿於曾公别墅會赦自出子固訟寃再劾復往英州因死焉子固時不奔喪為鄉議所貶介甫為作辨曾子以解之子固及第鄉人作感聖恩道場以為去害也子固好依漕勢以陵州依州以陵縣依縣以陵民溫公日録按公父死南都杜祁公為治其喪時惟公在側今文集有謝杜公書可見又荆公撰墓志亦云至南京病卒此言不奔喪者溫公傳聞之誤也中書舍人王震序公之文曰先生以文章名天下久矣異時齒髮壯志氣鋭其文章之標鷙奔放雄渾瓌偉若三軍之朝氣猛獸之抉怒江湖之波濤煙雲之姿狀一何竒也方是時先生自負要似劉向不知韓愈為何如爾中間從外徙世頗謂偃蹇不偶一時後生輩蜂出先生泊如也晚還朝廷天下望用其學而屬新官制遂掌書命於是更置百官舊舍人無在者已試即入院方除目填委占紙肆書初若不經意午漏盡授草院吏上馬去凡除郎御史數十人所以本法意原職守而為之訓敕者人人不同咸有新趣而衍裕雅重自成一家余其時為尚書郎掌付制吏部一日得盡觀始知先生之學雖老不衰而大手筆自有人也嗚乎先生用未極其學已矣要之名與天壤相弊不可誣也曾肇文昭公字子開鞏之季弟中進士第事神宗哲宗徽宗官至翰林學士諌官王覿言執政忤旨落職知潤州公封還詞頭言覿之一身出入內外不足為重輕而陛下寄腹心於大臣寄耳目於臺諌二者相須不可闕一今覿一言論及執政即日去之是何異愛腹心而塗耳目豈不殆哉上悟加覿直龍圖閣楊文靖公撰行狀哲宗既親政追用舊臣盡復熙豐之法數稱公議禮有守及公入對不及埀簾事所陳皆國家大體以謂人主雖有自然之聖質必賴左右前後皆得其人以為立政之本宜於此時慎選忠信端良博古多聞之士置諸左右以參諷議以備顧問與夫深處法宫之中親近􅉏御之徒其損益相去萬萬矣忤貴近意故不得留除知徐州上皇即位欽聖太后權同聽斷一日二府奏事簾中宣諭曰神宗在宫中嘗稱曽肇可用召還除中書舍人即日請對言治道在廣言路而已會日食四月朔故事當降詔求直言特命公草詔因具著所以言於上者敷告中外於是投匭者日以千數故上得盡聞天下事公嘗奏言近世帝王善為治者莫如唐太宗善言治者莫如唐陸贄太宗貞觀之治論者謂庶幾成康史官掇其大者别為一書謂之貞觀政要陸贄事唐德宗知無不言言無不盡要其歸必本於帝王之道必稽於六藝之文此二書雖一代之文章實百王之龜鑑願陛下取此二書置之座右留神省覽發言行事以此為凖庶幾聖德有補萬一公在邇英讀史記至堯崩三年之喪畢因言堯舜同出黃帝舜且為堯喪三年者舜嘗臣堯故也侍讀溫益進言曰史記世次不足信若堯舜同出則舜娶堯女為娶從祖姑公以史記世次禮記祭法大傳之説質於上前益語塞時有陳大中至正之論者以元祐紹聖均為有失魯公稱上命命公推此意為詔諭天下公見上言陛下欲建皇極以消弭朋黨須先分君子小人賞善罰惡不可偏廢開説甚至已而詔自中出上命魯公相公適視草禁中因舉數事為戒所謂休息百姓總核庶工甄敘材良敦奬正直澄清風俗振肅紀綱退與魯公言未嘗不丁寧反覆以此也本朝學士弟草兄制惟韓氏與公無他比也士論榮之元祐士大夫再被降黜公義不獨全請與俱貶言者繼之落職知和州並行述蘇軾文忠公字子瞻老蘇之長子中進士第再中制科優等事仁宗英宗神宗哲宗官至禮部尚書兼端明殿翰林侍讀二學士公生十年而先君宦學四方太夫人親授以書聞古今成敗輒能語其要太夫人嘗讀東漢史至范滂傳慨然太息公侍側曰某若為滂夫人亦許之否乎太夫人曰汝能為滂吾顧不能為滂母耶弟黃門公撰墓志嘉祐二年歐文忠公考試禮部進士疾時文之詭異思有以救之梅聖俞時與其事得公論刑賞以示歐公歐公驚喜以為異人欲以冠多士疑曽子固所為子固歐公門下士也乃置公第二復以春秋對義居第一以書謝諸公歐公見之以書語聖俞曰老夫當避此人放出一頭地士聞始譁不厭久乃信服同上公言頃試制科中程後英宗即欲便授知制誥相國韓公曰軾之材逺大之器也他日自當為天下用要在朝廷培養之使天下之士莫不畏慕降伏皆欲朝廷進用之然後取而用之則人人無復異辭矣今驟用之則士未必以為然適足以纍之也乃授直史館公聞之曰韓公可謂愛人以德矣李豸談記王介甫用事多所建立公與介甫議論素異既還朝置之官告院四年介甫欲更變科舉上疑焉使兩制三館議之公議上即日召見問何以助朕公辭避久之乃曰臣竊意陛下求治太急聽言太廣進人太鋭願陛下安靜以待事來然後應之上竦然曰卿言朕當詳思之介甫之黨皆不恱命攝開封推官意以多事困之公決斷精敏聲聞益逺會上元有旨市浙燈公密疏舊例無有不宜以玩好示人即有旨罷殿前初䇿進士舉子希合爭言祖宗法制非是公為考官退擬答以進深中其病自是論事愈力介甫愈恨墓志謝景溫言范鎮舉蘇軾為諌官軾向丁憂多占舟船販私鹽蘇木及服闋入京多占兵士介甫初為政每贊上以獨斷上專信任之軾為開封府試官䇿問進士以晉武平吳以獨斷而克苻堅伐晉以獨斷而亡齊桓專任管仲而霸燕噲專任子之而敗事同而功異何也介甫見之不恱軾弟轍辭條例司言青苗不便介甫尤怒乃定制䇿登科者不復試館職以軾轍兄弟故也軾有表弟與軾不叶介甫召之問軾過失其人言向丁憂販私鹽蘇木等事介甫雖銜之未有以發軾又數上章言時政得失擬進士䇿皆譏刺介甫及詔兩制舉諌官衆論以為當今宜為諌官者無若傅堯俞蘇軾故舉堯俞者六七人而景仁舉軾景溫恐軾為諌官攻介甫之短故力排之介甫下淮南江南東西荆湖北夔州成都六路轉運司體量其狀蓋軾眉州人其入京也適本州迎新守軾因帶以來耳溫公日録通判杭州時髙麗入貢使者發幣於官吏書稱甲子公却之曰髙麗於本朝稱臣而不稟正朔吾安敢受使者亟易書稱熙寧然後受之時以為得體徙知湖州以表謝上言事者摘其語以為謗遣官逮赴御史獄初公既補外見事有不便於民者不敢言亦不敢默視也緣詩人之義託事以諷庶幾有補於國言者從而媒糵之欲必置之死上憐之以黃州團練副使安置公幅巾芒屨與田父野老相從溪谷之間築室於東坡自號東坡居士墓志為文要有溫柔敦厚之氣對人主語言及章疏文字溫柔敦厚尤不可無如子瞻詩多所譏玩殊無惻怛愛君之意荆公在朝論事多不循理惟是爭氣而巳何以事君君子之所養要令暴慢邪僻之氣不設於身體又曰凡詩必使言之者無罪聞之者足以戒此所以尚譎諌也如東坡詩則言之安得無罪而聞之豈足以戒乎龜山語録東坡下御史獄張安道致仕在南京上書救之欲附南京遞府官不敢受乃令其子恕持至登聞鼓院投進恕徘徊不敢投久之東坡出獄其後東坡見其副本因吐舌色動久之人問其故東坡不答其後子由亦見之云宜吾兄之吐舌也此事正得張恕力或問其故子由曰獨不見鄭昌之救蓋寬饒乎其疏有云上無許史之屬下無金張之託此語正是激宣帝之怒爾且寬饒正以犯許史輩有此禍今乃再訐之是益其怒也且東坡何罪獨以名太髙與朝廷爭勝耳今安道之疏乃云其實天下之奇材也獨不激人主怒乎僕曰然則是時救東坡者宜為何説先生曰但言本朝未嘗殺士大夫今乃方開端則是殺士大夫自陛下始而後世子孫因而殺賢士大夫必援陛下以為例神宗好名而畏義疑可以此止之元城語録介甫與子瞻初無隙惠卿忌子瞻才髙輒間之中丞李定亦介甫客也不服母喪子瞻以為不孝作詩詆之定以為恨劾子瞻作詩謗訕遂下御史獄謫居黃州後移汝州過金陵見介甫甚款子瞻曰軾欲有言於公介甫色動意子瞻辨前日事也公曰所言者天下事也介甫色定曰姑言之公曰大兵大獄漢唐滅亡之兆祖宗以仁厚治天下正欲革此今西方用兵連年不解東南數起大獄公獨無一言以救之乎介甫舉手兩指示子瞻曰二事皆惠卿啓之安石在外安敢言子瞻曰固也然在朝則言在外則不言事君之常禮耳上所以待公者非常禮公所以事上者豈可以常禮乎介甫厲聲曰安石須説又曰出在安石口入在子瞻耳蓋介甫嘗為惠卿發其無使上知私書尚畏惠卿恐子瞻泄其言也介甫又語子瞻曰人須是知行一不義殺一不辜得天下弗為乃可公戲曰今之君子爭減半年磨勘雖殺人亦為之介甫笑而不言聞見録溫公議改免役為差役差役行於祖宗之世法久多弊編户充役不習官府又虐使之多以破産而狹鄉之民或有不得休息者先帝知其然故為免役使民以户髙下出錢而無執役之苦行法者不循上意於雇役實費之外取錢過多民遂以病若量出為入毋多取於民則足矣溫公知免役之害而不知其利欲一切以差役代之方差官置局公亦與其選獨以實告而君實不恱嘗見之政事堂條陳不可溫公忿然公曰昔韓公刺陜西義勇公為諌官爭之甚力韓公不樂公亦不顧軾昔聞公道其詳豈今日作相不許軾盡言耶溫公笑而止為侍讀進讀至治亂盛衰邪正得失之際未嘗不反覆開導覬上有所覺悟上雖恭默不言聞公所論説輒肯首善之嘗侍上讀祖宗寶訓因及時事公厯言今賞罰不明善惡無所勸沮又夏人寇鎮戎殺掠幾萬人帥臣掩蔽不以聞朝廷亦不問事每如此恐成衰亂之漸杭本江海之地水泉鹹苦唐刺史李泌始引西湖水作六井民足於水及白居易復浚西湖淤水入運河自河入田所溉至千頃然湖水多葑久廢開治至是積二十五萬餘丈而水無幾矣運河失湖水之利取給於江潮潮濁多淤河行闤闠中三年一淘為市井大患而六井亦幾廢公始至浚二河以茅山一河受江潮以鹽橋一河受湖水復造堰閘以為湖水畜泄之限然後潮不入市且以餘力復完六井又取葑田積湖中為長堤以通南北募人種菱湖中而收其利以備修湖杭人名其堤曰蘇公堤云頴有宿賊尹遇等數人羣黨驚劫殺變主及捕盜吏兵者非一朝廷以名捕不獲被殺者噤不敢言公召汝隂尉李直方謂之曰君能擒此當力言於朝乞行優賞不獲亦以不職奏免君矣直方退緝知羣盜所在分命弓手往捕其黨而躬往捕遇直方有母年九十母子泣别而行手戟刺而獲之然小不應格推賞不及公為言於朝請以巳之年勞改朝散郎階為直方賞朝廷不從其後吏部以公當遷以符會公考公自謂已許直方卒不報元祐七年上祀南郊公以兵部尚書為鹵簿使上因太廟宿齋行禮畢特至青城儀衛甚肅五使乘車至景靈宫東櫺星門外忽有赭蓋犢車青蓋犢車百餘輛衝突而來東坡呼御營巡檢使立於車前曰西來誰何敢爾亂行曰皇后并某國太夫人國婆婆國婆婆乃上之乳母某國大長公主也東坡曰可以狀來比至青城諭儀仗使御史中丞李端伯之純曰中丞職當肅政不可不聞李以中宫不敢言東坡曰軾當自奏即於青城上疏劾之明日中使傳命申敕有司嚴整仗衛談記公謫惠州獨以少子過自隨瘴癘所侵蠻蜒所侮胸中泊然無所芥蒂人無賢愚皆得其歡心疾苦者畀之藥殞斃者納之竁又率衆為大橋以濟病涉者惠人愛敬之後三年大臣以流竄者為未足也四年復以瓊州别駕安置昌化昌化非人所居食飲不具藥石無有所僦官屋以庇風雨有司猶謂不可則買地築室昌化士人畚土運甓以助之為屋三間人不堪其憂公食芋飲水著書以為樂時從其父老遊亦無間也墓志蘇轍字子由老蘇次子舉進士復中制科事仁宗英宗神宗哲宗官至門下侍郎轍年十九舉進士釋褐二十三舉直言仁宗親䇿之於廷時上春秋髙始倦於勤轍因所問極言得失䇿入轍自謂必見黜然考官司馬君實第以三等范景仁難之蔡君謨曰吾三司使也司會之言吾愧之而不敢怨惟胡武平以為不遜力請黜之上曰以直言召人而以直棄之天下謂我何宰相不得已置之下第除啇州軍事推官頴濱遺老傳神宗嗣位既二年矣求治甚急轍以書言事即日召對延和殿時介甫新得幸以執政領三司條例上以轍為之屬不敢辭介甫急求財利而不知本吕惠卿為之謀主轍議事多牾一日介甫出一卷書曰此青苗法也諸君熟議之有不便以告勿疑他日轍告之曰以錢貸民使出息二分本以救民之困非為利也然出納之際吏緣為姦雖有法不能禁錢入民手雖良民不免非理費用及其納錢雖富民不免違限如此則鞭箠必用州縣事不勝煩矣唐劉晏掌國計未嘗有所假貸有尤之者晏曰使民僥幸得錢非國之福使吏倚法督責非民之便吾雖未嘗假貸而四方豐凶貴賤知之未嘗逾時有賤必糴有貴必糶以此四方無甚貴甚賤之病安用貸為晏之所言則常平法耳今此法見在而患不修公誠有意於民舉而行之劉晏之功可立俟也介甫曰君言有理當徐議行之後有異論幸勿相外也自此逾月不言青苗會河北運判王廣廉召議事廣廉嘗奏乞度僧牒數千道為本錢於陜西漕司私行青苗法春散秋斂與介甫意合即請而施之河北自此青苗法遂行於四方初元豐中河決大吳先帝知故道不可復還因導之北流水性已順惟河道未深隄防未立嵗有決溢之患本非深害而潞公欲以河為重事中書侍郎吕微仲樞密副使安厚卿從而和之力主回河之計轍謂諸公不因其舊而修其未全乃欲取而回之其為力也難其為責也重既而回河之議紛紛而起遂使河朔生靈財力俱困李邦直為中書侍郎鄧聖求為尚書右丞二人久在外不得志遂以元豐事激怒上意會廷䇿進士邦直撰䇿題即為邪説以扇惑羣聽轍論之曰先帝在位近二十年而終身不受尊號裁損宗室恩止袒免減朝廷無窮之費出賣坊場雇募衙前免民間破家之患罷黜諸家誦數之學訓練諸將慵惰之兵置寄祿之官復六曹之舊嚴重祿之法禁交謁之私行淺攻之䇿以制西戎收六色之錢以寬雜役凡如此類皆先帝之睿算有利無害而元祐以來上下奉行未嘗失墜者也至於其他事有失當何世無之父作於前子救於後前後相濟此則聖人之孝也漢武帝外事四夷內興宫室財用匱竭於是修鹽鐡𣙜酤均輸之政民不堪命幾至大亂昭帝委任霍光罷去煩苛漢室乃定光武顯宗以察為明以讖決事天下恐懼人懷不安章帝深鑒其失代以寬厚愷悌之政後世稱焉臣願陛下反覆臣言謹勿輕事改易若輕變九年已行之事擢用纍嵗不用之人人懷私忿而以先帝為詞則大事去矣奏入不報再以劄子面論之上不恱李鄧從而媒糵之乃以本官出知頴州轍奏曰熙寧雇役之法三等人戶並出役錢上戶以家産髙強出錢無藝下戶昔不充役亦遣出錢故此二等人戶不免咨怨至於中等昔既已自差役令又出錢不多雇法之行最為其便罷行雇法上下二等欣躍可知唯是中等則反為害且以畿縣中等例出役錢三貫若經十年為錢三十貫而已今差法既行諸縣手力最為輕役農民在官日使百錢最為輕費然一嵗之用已為三十六貫二年役滿為費七十餘貫罷役而歸寬鄉得間三年狹鄉不及一嵗以此較之則差役五年之費倍於雇役十年賦役所出多在中等如此條目不便非一故天下皆思雇役而厭差役今五年矣則臣所謂宜因兹修法為安民靖國之術者也然大臣恃權恥過終莫肯改並頴濱遺老傳宋名臣言行録後集卷九
