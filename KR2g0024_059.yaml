body:
  text: 宋名臣言行録外集卷一宋李幼武纂集周敦頤濂溪先生元公字茂叔元名敦實避厚陵藩邸名改今名道州營道人景祐三年用舅氏龍圖鄭公向奏試將作監簿康定初授洪州分寧簿慶厯四年以部使者薦除南安軍司理六年令郴邑皇祐二年令桂陽至和元年用薦者改理丞宰洪之南昌嘉祐初改太子中舍合州僉六年轉國博倅虔州授尚書虞部員外郎以失火對移永州四年權知邵州熙寧初用趙抃吕公著薦擢廣東漕三年轉虞部郎中改提刑聞水嚙其母墳求南康軍以歸上其印分司南京六年趙公再尹成都復奏起之朝命及門而六月七日卒享年五十七嘉定庚辰賜諡淳祐辛丑上幸學封汝南伯與程張朱並從祀天聖已已年十三志趣髙逺濂溪舊有小橋亭先生常釣逰其上吟風弄月至今父老能言之先生博學力行聞道甚蚤遇事剛果有古人風為政精密嚴恕務盡道理慶厯初赴分寧簿縣有獄久不決先生至一訊立辨衆口交稱之慶厯乙酉為南安司理時郡獄適有囚法不當死運使王逵欲深治之先生獨力爭不聽置手板歸取告身委之而去曰如此尚可仕乎殺人以媚人吾不為也逵感悟囚得不死六年丙戌年三十年少不為守所知虔之興國宰程公珦假倅南安視先生氣貌非常人與語果知道者令二子師之即明道伊川也朱晦翁曰濂溪在當時人見其政事精絶則以為宦業過人見其有山林之志則以為襟懷灑落有仙風道氣無有知其學者惟程太中知之宜其生兩程夫子也八年在郴守李初平知其賢不以屬吏遇之既薦諸朝又周其不給聞先生論學嘆曰吾欲讀書如何先生曰公老無及矣請為公言之初平遂日聽其語二年而有得皇祐初年初平卒子幼先生曰吾事也為護其喪歸葬之往來經紀其家始終不懈士大夫皆指君曰是能葬舉主者至和初年赴南昌宰人見先生來喜曰是能辨分寧獄者吾屬得所訴矣於是更相告語勿違教命蓋不惟以得罪為憂實以汚善政為恥也嘗得疾更一晝夜始蘇友人潘興嗣視其家服御之物止一弊篋錢不滿數百嘉祐丙申冬至合州已亥嵗蒲宗孟泛蜀江道合陽初見先生相與欵洽連三日夜退而歎曰世有斯人歟乃以其妹歸之先生初娶陸氏繼以蒲焉在合州郡民心恱誠服事不經先生手吏不敢決茍下之人亦不從趙清獻為使者或譖之清獻惑臨之甚威比去猶不釋而先生處之超然也五年東歸王荆公江東提刑與先生相遇語連日夜荆公退而精思至忘寢食六年倅虔州趙清獻為守熟視其所為乃寤執其手曰幾失君矣今日乃知周茂叔也熙寧初吕公著聞名力薦之會清獻公在中書擢授廣東運判有啓謝吕云在薄宦有四方之遊於高賢無一日之雅四年領憲事盡心共職務在矜恕不憚出入之勤瘴毒之侵雖荒崖絶島人迹所不至處皆緩視徐按以洗寃澤物為已任俄得疾聞水嚙其母墓遂乞南康改葬畢曰強疾而來者為葬爾今猶欲以病汚麾紱耶先生自少信古好義以名節自砥礪奉已甚約俸祿悉以周宗族奉賔友及分司而歸妻子饔粥或不給而亦曠然不以為意襟懷飄灑雅有髙趣尤樂佳山水遇適意處或徜徉終日廬山之麓有溪焉發源於蓮花峯下潔清紺寒合於湓江先生濯纓而樂之築書堂其上名之曰濂溪志鄉閭在目中也因語友人潘興嗣曰可仕可止古人無所必結髮為學將有以設施可澤於斯人者必不得已止未晚也此濂溪者異時與子相從於其上歌咏先王之道足矣王君貺嘗見先生以有世契受其拜及坐大風起先生説大畜一作風天小畜卦君貺起曰適來不知受却公拜今却當請納拜先生走避之程明道曰昔受學於茂叔令尋仲尼顔子樂處所樂何事茂叔窗前草不除問之云與自家意思一般再見茂叔後吟風弄月以歸有吾與點也之意觀天地生物氣象茂叔謂看一部華嚴經不如看一艮卦注言各止其所也荀子言飬心莫善於誠茂叔以為荀子元不識誠既誠矣心焉用養耶皓年十六七時好田獵既而自謂巳無此好茂叔曰何言之易也但此心潛隱未發一日萌動如初矣後十二年暮歸在田野間見獵者不覺有喜心乃知果未也劉立之曰明道從茂叔問學窮性命之理邵康節謂伊川極論天地萬物之理以及六合之外伊川歎曰平生惟見周茂叔論至此朱晦翁贊公像曰道喪千載聖逺言湮不有先覺孰開後人書不盡言圖不盡意風月無邊庭草交翠孔文仲祭之曰公年甚壯玉色金聲從容和毅一府盡傾朱曰觀此濂溪清和氣象可想矣蒲宗孟曰茂叔仕而有所為亦大槩見於人至其孤風逺操寓懷塵埃之外常有髙棲遐遁之意則世人未必盡知黃山谷詠之曰茂叔人品甚髙胸中灑落如光風霽月好讀書雅意林壑初不為人窘束世故云云短於取名而惠於求志薄於徼福而厚於得民菲於奉身而燕及􅑱嫠陋於希世而尚友千古延平李侗以灑落如光風霽月為善形容有道者氣象朱晦翁曰所謂灑落者只是形容一箇不疑所行清明髙逺之意若有一毫私吝心何處更有此等氣象邪只如此有道者胸懷表裡亦自可見朱曰道之在天下者未嘗亡惟其託於人者或絶或續故其行於世者有明有晦是皆天命之所為非人智力之所能及也夫天髙地下而二氣五行紛紜錯揉升降往來於其間其造化發育品物攸殊莫不各有固然之理最其大者則仁義禮智之性君臣父子昆弟夫婦朋友之倫是巳是其周流充塞無所虧間夫豈以古今治亂為存亡者哉然氣之運也則有淳漓判合之不齊人之稟也則有清濁昏明之或異是以道之所以託於人而行於世者惟天所畀乃得與焉若先生者其天之所畀而得斯道之傳者歟不然何其絶之久而續之易晦之甚而明之亟也蓋自孟氏沒而此道之傳不屬我宋受命五星集奎開文明之運然後氣之漓者醇判者合清明之稟得以全付乎人而先生出焉不繇師傳默契道體建圖屬書根極領要當時見而知之有程氏者遂廣大而推明之使夫天理之微人倫之著事物之衆鬼神之幽莫不洞然畢貫于一而周孔孟氏之傳焕然復明非天所畀孰能與於此江州書堂記又曰先生之言其髙極乎無極太極之妙而實不離乎日用之間其幽探乎陰陽五行造化之賾而實不離乎仁義禮智剛柔善惡之際其體用一源顯微無間秦漢以下誠未有臻斯理者而實不外乎六經論語中庸大學七篇之所傳也蓋其所謂太極云者合天地萬物之理而一名之耳以其無器與形而天地萬物之理無不在是故曰無極而太極以其具天地萬物之理而無器與形故曰太極本無極也是豈離乎生民日用之常而自為一物哉其為陰陽五行造化之賾者固此理也其為仁義禮智剛柔善惡者亦此理也性此理而安焉者聖也復此理而執焉者賢也自堯舜以至孔孟所以相傳之説豈有一言以易此哉先生之所以繼往聖開來學而有大功於斯世也隆興祠堂記又曰自孟氏沒而聖道不傳俗儒之學內局於章句文辭之習外雜於老子釋氏之言而所以修巳治人者一出於私智人為之鑿今蓋千餘年矣先生奮乎百世之下乃深探聖賢之奧疏觀造化之原而獨心得之立象著書闡發幽祕辭義雖約而天人性命之微修巳治人之要莫不畢舉先生之功為大矣袁州祠堂記又曰秦漢以來天下之士莫知所以為學是以天理不明而人欲熾道學不傳而異端起人挾其私智以馳騖一世宋興有濂溪者作然後天理明而道學之傳復續蓋有以闡夫太極陰陽五行之奧而天下之為中正仁義者得以知其所自來言聖學之有要而下學者知勝私復理之可以馴致於上達明天下之有本而言治者知誠心端緒之可以舉而措之於天下其所以上接洙泗千載之統下啓河洛百世之傳者脈絡分明而規模亦宏逺矣韶州祠堂記張南軒曰自秦漢以來言治者汨於五伯功利之習求道者淪於異端空虛之説而於先王發政施仁之實天理人倫之教莫克推而講明之故言治者若無豫於學而求道者反不涉於事民莫睹乎三代之盛可勝歎哉惟先生崛起於千載之後獨得微指於殘編斷簡之中推本太極以及乎陰陽五行之流布人物之所以生化於是知人之為至靈而性之為至善萬物有其宗萬事循其則舉而措之則可見先王之所以為治者皆非私智之所出孔孟之意于以復明至于二程先生則又推而極之凡聖人之所以教人與學者之所以用功本末始終精粗該備於是求道者有其序而言治道者有所本矣南康軍祠堂記又曰先生之學淵源精粹實自得於其心而其妙乃在太極一圖窮二氣之所根極萬物之所行而明主靜之為本以見聖人之所以立人極而君子之所當修為者由秦漢以來蓋未有臻於斯也故其所養內充暗然而日章雖不得大施於時而蒞官所至如春風和氣隨時發見被飾萬物百世之下聞其風者猶將咨嗟興起之不暇先生論刑嘗曰刑者民之司命情偽微曖其變千狀茍非中正明達果斷者不能治也夫中正者仁之所存而明達者知之所行果斷者又勇之所施也韶州祠堂記又曰去古益逺儒學陵夷吾先生起於逺方乃超然有所自得於其心本乎易之太極中庸之誠以極乎天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治先王之禮樂刑政可舉而行如指諸掌於是河南二程先生兄弟從而得其説推明究極之廣大精微殆無餘藴學者始知夫孔孟之所以教蓋在此而不在乎他學可以至於聖治不可以不本於學而道德性命初不外乎日用之實而詖淫邪遁之説皆無以自隱其形可謂盛矣然則先生發端之功顧不大哉道州祠堂記又曰先生生乎千有餘載之後超然獨得夫大易之傳所謂太極圖乃其綱領也推明動靜之一源以見生化之不窮天命流行之體無乎不在文理密察本末該貫非闡微極幽莫能識其指歸也然而學者若何而進於是哉亦曰敬而已矣誠能起居食息主一而不舍則其德性之知必有卓然不可掩於體察之際者而後先生之藴可得而窮太極可得而識矣葉水心曰道之暗鬱於後者天與人殊而人與已殊道非其道而學非其學也理不盡徒膠昔以病今心不明姑舍巳以辨物勤苦而種皆文藻之末鹵莽而穫皆枝葉之餘揚雄韓愈猶然况其下者乎自周子二程以來天之命我者屬乎不離也我之事天者吻乎有合也舜文之道即巳之道也顔孟之學即已之學也辭華不黜而自落功利不抑而自退其本立也兩迷者岐也四達者路也邪不亂正燭火暗室也煜日方旦也幽不掩明大經大法未嘗不炳然具見而何塞路之有此其所以過之逺也覺於是而進余所進也安於是而止余亦止之南安軍二先生祠記魏鶴山曰頥奮乎百世之下始探造化之至賾建圖著書闡發幽祕即斯人日用常行之際示學者窮理盡性之歸使誦其遺言者始得以曉然於洙泗之正傳而知世之所謂學者非滯於俗師則淪於異端蓋有不足學者於是二程親得其傳而聖學益以大振雖三人於時皆不及大用而嗣往聖開來哲發天理正人心使孔孟絶學獨盛於本朝而超出乎百代功用所關誠為不小請諡奏又曰先生奮自南服超然獨得以上承孔孟氏埀絶之緒河南二程子神交心契相與疏瀹闡明而聖道復著曰誠曰仁曰太極曰性命曰陰陽曰鬼神曰義利綱條彪列分限曉然學者始有所凖的於是知身之貴果可以位天地育萬物果可以為堯舜為周公仲尼而其求端用力又不出乎暗室屋漏之隱躬行日用之近亦非若異端之虛寂百氏之攴離也相與翕然宗之張楊遊吕侯謝尹張諸儒口傳面授至近世朱吕推而大之蓋自道湮民散千有五六百年而後得所師承嗚呼幸哉又曰聖逺言湮俗淪士散求道者離乎器而不知一理二氣之互根言性者離乎氣而不知元亨變化之實理知剛柔之為善惡不知剛不一於善柔不一於惡也知陰陽之為動靜不知陰不一於靜陽不一於動也先生始為圖書貫融而劈析之二程親得其傳道日以章逮胡子朱張推衍究極亦幾無餘藴矣先生所得之奧不俟師傳匪由智索神交心契固巳得其本統不然嗜溪流之紺寒愛庭草之交翠體夫子之無言窮顔淵之所以樂是果何味而獨嚅嚌之邪故能發前聖之所未發覺斯人之所未覺使高逺者不墮於荒忽使循守者不淪於滯固私意小智何所容其巧詭經僻説何所肆其誣功用豈不偉哉臧格議諡真西山曰自荀楊以惡與混為性而不知天命之本然老莊氏以虛無為道而不知天理之至實佛氏以剗滅彞倫為教而不知天敘之不可易周子生乎絶學之後乃獨探本源闡發幽祕二程子見而知之朱子又聞而知之述作相承本末具備自是人知性不外乎仁義禮智而惡與混非性也道不離乎日用事物而虛無非道也教必本乎君臣父子夫婦昆弟而剗滅彛倫非教也闡聖學之戶庭祛世人之矇瞶千載相傳之正統其不在兹乎百聖相傳敬之一言實其心法蓋天下之理惟中為至正惟誠為至極然敬所以中不敬則無中也敬而後能誠非敬則無以為誠也氣之決驟軼於奔駟敬則其銜轡也情之橫放甚於潰川敬則其隄防也故周子主靜之言程子主一之訓皆其為人最切者而朱子又丁寧反復之學者倘於是而知勉焉戒於思慮之未萌恭於事物之既接無少間斷則德全而欲泯矣朱子曰先生之學其妙具於太極一圖通書之言亦皆此圖之藴而程先生兄弟語及性命之際亦未嘗不因其説觀通書之誠動靜理性命等章及程氏書李仲通銘程邵公志顔子好學論等篇則可見矣潘清逸志先生之墓敘所著書特以作太極圖為稱首然則此圖當為先生書首不疑也然先生既手以授二程本因附書後傳者見其如此遂誤以圖為書之卒章不復釐正使先生立象盡意之微旨暗而不明而驟讀通書者亦復不知有所總攝此則諸本之失也又嘗讀朱內翰震進易説表謂此圖之傳自陳搏种放穆修而來而五峯胡氏作序又以為先生非止為种穆之學者此特其學之一師耳非其至者也夫以先生之學之妙不出此圖以為得之於人則決非种穆所及以為非其至者則先生之學又何以加于此圖哉是以切嘗疑之及得志文考之然後知其果先生所自作而非有受於人者二公蓋有未嘗見此志而云云耳然胡公所論通書之指曰人見其書之約也而不知其道之大也見其文之質也而不知其義之精也見其言之淡也而不知其味之長也人有真能立伊尹之志修顔子之學則知此書之言包括至大而聖門之事業無窮矣此則不可易之至論讀是書者所宜知也遺文跋又曰通書夫子所作本號易通與太極圖並出程氏以傳於世而其為説實相表裏大抵推一理二氣五行之分合以紀綱道體之精微決道義文辭祿利之取舍以振起俗學之卑陋至論所以入德之方經世之具又皆親切簡要不為空言顧其宏綱大用既非秦漢以來諸儒所及而其條理之密意味之深又非今世學者所能驟而窺也是以程氏既沒而傳者鮮焉其知之者不過以為用意髙逺而巳通書序朱子既為太極圖説則録以寄張敬夫敬夫以書來曰先生所與門人講論問答之言見於書者詳矣其於西銘蓋屢言之至此圖則未嘗一言及也謂其必有微意是則固然然則所謂微意者果何謂耶熹竊以為此圖立象盡意剖析幽微周子蓋不得巳而作也觀其手授之意蓋以為惟程子為能當之至程子而不言則疑其未有能受之者爾夫既未能默識於言意之表則馳心空妙入耳出口其弊必有不勝言者觀其答張閎中論易傳成書深患無受之者及東見録中論橫渠清虛一大之説使人向别處走不若且只道敬則其意亦可見矣若西銘則推人以之天即近以明逺於學者日用最為親切非若此書詳於性命之原而略於進為之目有不可以驟而語者也濓溪圖與書雖簡古淵深未易究測然其大指不過語諸學者講學致思以窮天地萬物之理而勝其私以復焉其施則善於家而達於天下其具則復古禮變今樂政以養民而刑以肅之也是乃所謂伊尹之志顔子之學而程氏傳之以覺斯人者先生之精立圖以示先生之藴因圖以發而其所謂無極而太極云者又一圖之綱領所以明夫道之未始有物而實為萬物之根柢也夫豈以為太極之上復有所謂無極者哉太極書如易六十四卦一一有定理毫髮不差自首至尾只不出陰陽二端而已始處是生生之初終處是已定之理太極圖熹若不分明别出許多節次出來如何看得未知後人果能如此子細去看否問太極圖自太極以至萬物化生只是一個圈子何嘗有異曰人物本同氣稟有異故不同問太極圖何以不言禮智而言中正莫是此圖本為發明易道故但言中正是否曰亦不知是如何但中正二字較有力問先生謂程子不以太極圖授門人蓋以未有能受之者孔門亦未嘗以此語顔曾如何曰焉知其不曽説曰觀顔曾做工夫處只是切巳做將去曰此亦何嘗不切已皆非在外乃我所固有也曰言此徒長人臆度料想之見曰理會不得者固若此若理會得者莫非在我便可受用何臆度之有問太極圖自一而二自二而五即推至於萬物易則自一而二自二而四自四而八自八而十六自十六而三十二自三十二而六十四然後萬物之理備西銘則止言陰陽洪範則止言五行或略或詳皆不同何也曰理一也人所見有詳略耳然道理亦未嘗不相值也問太極圖之説曰以人身言之呼吸之氣便是陰陽軀體血肉便是五行其性便是理又曰其氣便是春夏秋冬其物便是金木水火土其理便是仁義禮智信又曰氣自是氣質自是質不可滚説問太極圖何為列五者於陰陽之下曰五常是理陰陽是氣有理而無氣則理無所立有氣而後理方有所立故五行次陰陽又問如此則是有七曰義智屬陰仁禮屬陽按太極圖列金木水火土於陰陽之下非列仁義禮智信於陰陽之下也以氣言之曰陰陽五行以理言之曰健順五常之性此問似欠分别大凡看道理要見得大頭腦處分明下面節節只是此個道理散為萬殊如孔子教人只是逐件事説個道理未嘗説出大頭腦處然四方八面合聚湊來也自見得個大頭腦若孟子便已指出示人至周子説出太極已是大段分明指出矣且如惻隱之端從出處推上去則是此心之仁仁即所謂四德之元元即太極之動處如此節節推上去亦自見得總腦處若看得太極處分明則盡見得天下許多道理皆自此出事事物物皆有此個道理元無虧欠也今人多疑濂溪之學出自希夷某曰濂溪書具存如太極圖希夷如何有此説近世諸公知濂溪者甚淺如吕氏童蒙訓稱其用意髙逺夫通書太極之説所以明天理之根源究萬物之終始豈用意而為之人何逺近髙下之可道哉太極圖若無通書却教人如何曉得故太極圖得通書而後明問通書多説幾太極圖上却無此意曰五性感動動而未分者便是問誠無為幾善惡一段看此與太極圖相表裏曰然周子一書都説這道理通書文雖髙簡而體實淵慤且其所論不出乎陰陽變化修巳治人之事未嘗劇談無物之先文字之外也通書中數數拈出幾字要當如此瞥地即自然有個省力處問通書便可上接語孟曰比語孟便較分曉精深結搆得密語孟説得較闊並朱子語宋名臣言行録外集卷一
