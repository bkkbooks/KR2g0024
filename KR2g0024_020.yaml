body:
  text: 宋名臣言行錄後集巻十宋朱子纂集韓絳康國獻肅公字子華叅政忠憲公之子也登進士甲科相神宗哲宗拜司空檢校太尉致仕為江南東西路體量安撫問百姓疾苦縣邑以衙前為重役一當其役則破家竭産民至有嫁祖母與母而析生異居以避役者公為五則衙前法奏行之民以為便劉貢父撰行狀孫沔吕溱等守藩犯法從官聨章請貰其罪公曰法自貴者始更相救援則公道廢矣遂并劾之為三司使内諸司吏有干恩澤者詔已許之公執條例奏禀上曰朕不知條例當為卿改後有此等事亦須執奏三司事多與宫省相關近習有所干請即語條例公未嘗詭隨行狀公在三司時議欲使官户量出免役錢兼并之家計田頃承役唯存鄉役及弓手之外並與蠲除單丁女戸在第一等者亦量納役錢其錢一切以免役錢雇召如此即不限田而官戸兼并之家不敢過制以貪利中人得以置田以為生品官不必充役而無業之民得以應募矣至是上手札取之公具錄以進上令學士草詔訪問既進入上以未見哀痛惻怛之意手定詔藁密封示公令公潤色以進用以咨訪焉王荆公領條例司深以公言為然遂推廣衙前之法以及它役行狀熈寧二年九月夏羌大入慶州境公為陜西宣撫使裂諸路兵置七將間其無偹互出𢷬之至是深入破敵者十七戰皆㨗招降數萬人李邦直撰神道碑公之入相繼王荆公之後政事有未便者賢士大夫或置不用公將更易振舉之奏古者冡宰制國用今天下財用出入宰相乃不預聞始置局中書稽考天下財用之數量入以為出援用司馬光上曰吾於光豈有所愛顧光未肯來耳行狀三司使發市易官罪而同列佑之欲弗責方創賈人免行錢孫尚書永議有異而同列欲論永罔上故不實上書人鄭俠激切下獄而執政馮公京嘗賙俠同列欲以黨俠為重坐公辨帝前不得直數求罷上為逐市易官稍寛二臣者而他相至欲復留故賈人劉佐任市易公固言不可論上前未决公再拜曰臣言不用辱相位請從此辭上愕曰兹小事何爾邪公奏曰小事弗伸况大事乎上為罷佐遣使持手詔諭公使就位公乃起後數月固稱疾出知許州初進士科進擢速公言偶程文占上選未見材實勞最蠟衆人指期為卿輔殆亡所謂自是始議間年一貢士而殺其恩李邦直撰神道碑韓維字持國忠憲公之子䕃補事仁宗英宗神宗官至門下侍郎公篤志好學嘗以進士薦禮部父任執政不就廷試乃以父任守將作監主簿丁外艱服除闔門不仕仁宗患搢紳奔競諭近臣曰恬退守道旌擢則躁求者自當知恥於是宰相文彦博宋庠等言公好古嗜學安於静退乞加甄錄以厚風俗召試學士院辭不赴除國子監主簿行狀神宗潛邸英宗命韓魏公擇宫僚用王陶韓維等皆名儒厚德之士神宗内朝拜稍急維曰維下拜王當效之一日侍坐近侍以弓様靴進維曰王安用舞靴神宗有愧色亟令毁去聞見錄神宗嘗與公論天下事語及功名公曰聖人功名因事始見不可有功名心神宗拱手稱善行狀除起居注侍邇英講筵是時英宗方免䘮簡黙不言公上疏曰邇英閤者陛下燕閒之所也侍於側者皆獻納論思之臣陳於前者非聖人之經則厯代之史也御燕閒則可以留漏刻之永對大臣則可以極諮訪之博論經史則可以窮仁義之道成敗之源今禮制終畢臣下傾耳以聽玊音語曰時然後言陛下之言此其時也臣雖不敏請秉筆以俟除翰林學士承㫖入對延和殿時京師旱神宗曰久不雨朕夙夜焦勞柰何公曰陛下憂旱傷損膳避殿此乃舉行故事恐不足以應天變書曰惟先格王正厥事願陛下痛自責已下詔廣求直言以開壅蔽大發恩令聽蠲免以和人情後數日上疏曰近日畿内縣督索青苗錢甚急往往鞭撻取足至伐桑為薪以易錢貨旱災之際重罹此苦夫動甲兵危士民匱財用於荒夷之地朝廷處之不疑行之甚銳至於蠲除租稅寛裕逋負以救愁苦之民則遲遲而不敢發望陛下自奮英斷行之過而養民猶愈於過而殺人也因奏對面論神宗感悟有㫖根究市易免行利害權治方田編排保甲罷議東西川市易命公草詔求直言其畧曰朕之聽納有不得於理與獄訟非其情與賦歛失其節與忠謀讜言欝於上聞而阿䛕壅蔽以成其私者衆與詔出人情大恱是日大雨知熈州王韶赴闕奏事將領景思立敗績韶還任上表待罪奏斬獲首級公草批答曰方其敗時卿適在朝何嫌而上章引咎勉綏新附之衆毋以多殺為功讀者竦然行狀邇英讀三朝寳訓至天禧中有二人犯罪法當死真宗惻然怜之曰此等安知法殺之則不忍捨之則無以勵衆乃使持去笞而遣之以斬訖奏又祀汾隂日見一羊自擲道左怪問之曰今日尚食殺其羔真宗慘然不樂自是不殺羊羔維讀畢因奏言此特真宗小善爾推其心以及天下則仁不可勝用也真宗自澶淵之役却狄之後十九年不言兵天下富庶其源盖出於此昔孟子論齊王不忍觳觫之牛以為是心足以王外人皆云陛下仁孝發於天性毎行見昆蟲螻蟻違而過且勅左右勿踐履此亦仁術也臣願陛下推此心以及百姓則天下幸甚東坡集初公與王安石雅相厚善安石執政公議國事始多異同至是議者欲廢三經義公以為安石經義宜與先儒之說並行不當廢司馬光與公平生交俱以耆舊進用至臨事未嘗一語附合務為茍同人服其平行狀先生云持國服義最不可得一日頤與持國范夷叟泛舟於頴昌西湖須臾客將云有一官貟上書謁見大資頤將謂有甚急切公事乃是求知巳頤云大資居位却不求人乃使人倒來求已是甚道理夷叟云只為正叔大執求薦章常事也頤云不然只為曾有不求者不與求者與之遂致人如此持國便服程氏遺書傅堯俞獻簡公字欽之鄆州人未冠登進士第事神宗哲宗官至中書侍郎公為御史諌官四年所上百六十餘章多觸忌諱詆權倖名重朝廷而風節凛然聞於天下仁宗春秋髙未立嗣公上疏請建宗室之賢以繫天下望時國用乏言利者爭獻計富國公奏曰今度支嵗用不足誠不可忽欲救其弊陛下宜躬自儉刻身先天下無奪農時勿害啇旅如是可矣不然徒欲紛更為之無益聚歛用則天下殆矣英宗初即位有疾皇太后同聽政至是上疾平公上書請天子聽政又再疏太后請還政天子未聽久之頗聞内侍任守忠有䜛間語公又上疏太后曰天下之可信者無大於以天下與人亦無大於受天下於人殿下今日誅竄䜛人則慈孝之聲並隆於天下矣於是太后遂還政而逐守忠等公在英宗時最被眷遇一日奏事殿中上曰多士盈廷孰忠孰邪公曰大忠大佞固不可移中人之性繫上所化上敬納其言熈寧三年王安石新用事方變法令公以母䘮服除至京師安石素善公謂公曰舉朝紛紛今幸公來已議以待制諌院奉還矣公謝曰恩甚厚但恐與公所謂新法者相妨耳且為言新法之不善者安石大怒乃以為權同判流内銓行狀拜中書侍郎論事率由大公而未嘗容心其薦引多得吉人良士及薨太皇太后諭近臣曰傅侍郎清直一節終始不變金玊君子人也嗟惜久之温公嘗歎曰清直勇三德吾於欽之畏焉洛之君子邵雍曰欽之至清而不耀至直而不激至勇而能温此為難爾人以雍言為然並墓誌范忠宣撰公在上前吐論激切事已則終不復言出為和州也通判楊洙乘間問曰公以直言斥居此何為言未嘗及御史時事公曰前日言職也豈得已哉今日為郡守當宣朝廷羙意而反呫呫追言前日之闕政與誹謗何異行狀彭汝礪字器資饒州人舉進士第一事神宗官至吏部尚書故事進士第一人無入吏部選者公在選十年人以為淹而公處之澹如也罷為館閣校勘江西運判辭日復上疏論時事且言今不患無將順之臣患無諌争之臣不患無敢為之臣患無敢言之臣神宗察其忠慰諭久之以起居舍人召既至執政有問新舊之政者公曰政無彼此之辨一於是而已今所更大者取士及差役法行之而士民皆病未見其可執政不能屈紹聖元年上初專聽斷召二三大臣條舉熈寧元豐政事人人争獻所聞公居之如不能言者或問之曰在前日則無言之者於今則人人而能言之矣以寳文閣待制知江州入辭上勞問甚寵曰卿非久别也問所欲言者公曰陛下今所復者其政不能無是非其人不能無賢不肖政唯其是則政無不善人唯其賢則人無不得矣並曹内翰撰墓誌宋名臣言行錄後集巻十
