body:
  text: 宋名臣言行録别集上巻四宋李幼武纂集葉夢得字少藴蘇州吳縣人紹聖四年登進士第尉丹徙崇寧元年除婺州教三年召為儀禮武選編修官四年遷祠部員外郎五年徙起居郎大觀初為中書舎人兼實録院修撰兼直學士院二年為翰學三年以龍圖閣學知汝州尋免提舉洞霄政和五年除顯制知蔡州六年復閣職重和初知潁昌宣和二年提舉鴻慶七年召為吏書再提舉鴻慶靖康初知潁昌建炎二年召為翰學拜户書三年遷尚書左丞資政學士提舉中太乙兼侍讀紹興初為江東帥三年祠十年召除建康留守十二年知福州十四年授崇信軍節度使十八年卒於湖州為編修纔六日蔡京亟薦之召對論自古帝王為治必先自治其心今國勢有安危法度有利害人材有邪正民情有休戚若不先治其心或誘之以貨利聲色則所謂安危利害邪正休戚者未嘗不顛倒易位而況求其功乎上異之京謂曰公言得無意乎公曰此某所學也論朋黨之弊曰朋黨之勝本於重内輕外且今之自外召入者茍有寸長計日可取貴顯又況阿附趨佞别以智巧得之一居要位非譴謫則不去而居外任者非被罪廢黜則孤寒無援之人也夫以内為榮進之途則茍可以安於内者人誰不營以外為譴黜之所則茍可以免於外者人誰不避祖宗時宰相罷班或補外未幾皆復召用至於執政從官更出迭入未嘗有間夫使不慕居内不畏處外内外去來各適為志士大夫茍知自愛則亦何必捨彼而趨此蔡京復相所立法度巳嘗罷者皆復行公召對論周官太宰以八柄詔王馭羣臣所謂廢置賞罰者王之事也太宰得以詔王而不得自専陛下前日所立者出于陛下乎出於大臣乎及罷之又復之亦出於陛下乎出於大臣乎今一大臣進以為可作則法度從而立一大臣進以為不可作則從而廢無乃陛下有未了然於中而不出於已者乎願度其可復者復之可罷者罷之則天下治矣京初欲以童貫為陜西宣撫取青唐公聞見京問之曰貫以八寶恩除節使已非祖宗法今又以執政之任付之青唐朝廷所必欲得也使成功則何以處之乎京有愧色既得青唐公又見京問何以賞貫京沈思未有以答公曰節度使上惟有開府儀同三司不識朝廷遂與之否京曰恐未至是公曰幸甚外人以為必進此官矣某憂不能寐前為節使某不當制無可言今若進使相萬一某當制決不敢命辭然亦不敢逃謫勢必過嶺倘相公念之得一善地足矣京笑曰公慮事毎過好相戾此人亦何可犯衆窺公者多何不自畏禍公曰幸不至此則已設或有之今日言與他日言其受禍一也何遲速之間公在朝廷數正京過差京初察其無他間多開納有不然者特以為介僻不通人情或曰畏懦易動以浮言耳未以為過也自石公弼附張康國鄭居中等始頗追咎薦非其人然公所薦士固不一非欲為之黨者京再召公見之問還朝當何先人材孰可用公曰公所以見議於天下者權太盛意太果以喜怒為賢否以恩怨為廢置耳方公居位時士以諛説日獻不暇何敢輒逆耳幸今出外踰年公所聞必亦多矣惟虚心平氣求抵於是而已然今有大患自童貫用事天下之權半分於宦者今則梁師成楊戩等數十輩踵貫而起宰執用舎多出此曹公不能先痛裁制使國柄復歸朝廷雖公之喜怒哀怨且不得騁况求其是乎宰相公嘗為之得失亦何計京改容曰極是積漸至此京不得為無罪因論俞㮚頗力學有志於逺大似與目前稍異京曰某亦知之既相即用㮚為中丞而㮚首陳六弊無所顧望又發劉柄為舉子時為富人竇盥代筆取貸事炳方自拱州道見京教京盡除居中等黨法度不問是非一切皆復得召為户書京方得倚為腹心於是積前事大憾公謂蔣猷曰前為其屬石公弼今為其薦俞㮚兩敗吾事遂有相惡意而劉柄等從而媒孽曰夢得蓋欲自為門户素何嘗以公為是炳與其弟焕蔣猷翟汝文蔡靖毛友十數人皆居中所逐者相繼召用獨公不召為户書請上南渡阻江為險以備不虞巡幸上曰自揚至𤓰洲五十里聞警而動尚未晚公曰鄲河僅通一舟恐非一日可濟也復乞命重臣為宣總使一居泗上總兩淮及東方之師以待敵一居金陵總江浙之路以備退保不報公言靖康之失在固守京城而不知避也事有緩急必當從權伏望陛下通下情逺斥候如必至於過江則亟降詔以諭中外則人心安矣又願取諸要郡東則鄆徐南京西則穎夀和州南則唐襄荆渚各立軍數使之召募仍命大將與帥參治復選近臣為總帥以節制之又乘輿或駐兩浙則鎮江金陵尤當先治陛下毋以宇文虚中奉使未囬意和議為可恃也靖康正縁恃和議而墮虜計今安可待萬里之報哉宰執從臣議幸杭州未決吕頥浩及公以首叩地願且留此為江北聲援不然金乘勢渡江愈狼狽矣宰執以為是方臘之亂江浙被賊諸州皆蠲其賦而兵無所給乃詔發運陳亨伯經制東南亨伯請以七路之財補其乏始設比較酒務量添酒價及商税額亦増一分并賣契紙與公家出納毎緡收二十三文並號經制錢靖康罷之至是公言經制之法添酒價増税額并賣契紙等錢皆求於民之所欲而弗强其所不欲故酒價雖髙未有驅之使飲税額雖増未有迫之為商者其他類此望復行之公為留守團結㳂江民兵數萬至是呼集分據江津仍遣其子模領數千人守馬家渡金果使吾叛將酈瓊以輕兵來犯覺有備乃去初建康屯重兵嵗費錢八百萬緡米八十萬斛𣙜貨務所入不足以贍至是禁旅與諸道之師皆至公被命兼總四路漕計以給饋餉軍用不乏故諸將得悉力以戰無匱未幾以觀文殿學士寵之公帥福建宰執奏公措畫弭盜之事上曰盜之竊發多縁守令非人掊克所致宜令帥司條具凡有害於民者除之自此公或招或捕或誘之相戕三䇿並用程瑀字伯㝢祖守新安賜宅歙縣後徙居浮梁王父以季女妻同邑臧氏久而未字公生乃以嗣其姑初為臧氏由上舎擢第一政和六年釋褐授太博提舉京兆學事未行除校書郎四年丁臧氏憂召除兵部員外郎七年充送伴髙麗使秋引法歸本宗借給事中奉使河東假户侍河東幹當使還除左正言乞外不許忤㫖除屯田郎官又添監漳州税務髙宗即位除司封員外郎遷光禄少卿第進士改司業丐外祠主管明道宫紹興初召赴行在入對大臣議論不合力丐外直秘閣江東提刑明年除常少入覲拜給事中兼侍講三論權邦彦不報丐罷除兵侍不拜除龍制知信州臺官疏留復給事中久之復申前請御批與郡知信州給舎疏留復留疏論席益數日為言者論罷提舉明道四年除徽制知撫州以親老丐祠提舉興國六年連丁兩憂吉除守嚴州未行改宣州奉祠十二年召拜兵侍兼侍讀翊善尋加兵書與端揆不合乞祠除龍學知信州上饒大水奏入時宰惡之遂稱疾請祠提舉太平觀十九年進封廣平郡開國侯明年陸陞之訐李光野史棘寺謂不合與通書問降授朝議大夫二十二年正月薨享年六十六金人陷燕山又陷太原嫚書至朝廷遣使議和衆首䑕莫敢往公獨抗疏奮然請行遂使河東或以咎公公厲色曰當朝廷危急之秋茍利國家雖捐軀不計也將行㑹欽宗登極金聞相顧失色始有講和意及金將至河上王師焚橋不戰而北京城大震宻議南狩右丞李綱持堅守之説衆心稍定金使來邀大臣議事詔李税鄭之望往既議金繒數且許割三鎮地有㫖公與秦檜往河中乃入奏云臣等但願奉使講和未嘗請割地則自有主議之人不報即見吳敏申前説敏見拒甚力遂行夜至金營無所係屬樞宻路允迪以坐氈假公席地而卧遲明上馬北去暮則張幕藉草野宿越數日糧糒告盡僅分甌粥将至中山金命一軍與公俱至城下諸師已先得朝廷宻諭俾勿割城守甚嚴金使王汭來至城下遥語復不能下遂與俱至燕山而還時靖康元年四月也本朝諸公聞公南歸舉笏相慶歸對於崇政殿欽宗曰國事艱難極知卿奮不顧身慰勞備悉公奏乞修塘濼飭土兵増莫州戍又奏金人所恃者馬今當修武備為險阻使不得馳突始可與較勝負上曰卿料金今冬來否公曰臣謂必來朝廷以臣為張皇然臣不敢保其不來陛下第力為戰守之計紹興初入對疏言金人肆亂於今七稔陛下自南都遷維揚自維揚遷㑹稽惟奔播畏避此豈金真不可敵哉顧吾不敢與之敵耳因畫十事曰厲志氣躬勤儉訪賢才求將帥申紀律治財賦廣召募治舟師謹命令責事實又言陛下朝夕孜孜曷嘗不以兵戎未息為憂然積弊之極文移困於煩多士俗淪於奔競職業曠於因循財用蠧於浮靡以縱姦為長厚以厭事為簡靖毁譽失真徧私害正望詔大臣一新庶政或可興衰撥亂言治天下之道必自學始然人君之學不在章句當攷治忽之跡賢否之辨而其要又在於正心誠意言漢光武親臨戰陣上曰朕方欲措置江上軍將定疊即單騎往按視撫勞以作厲士氣公曰累年金人入冦皆望風逃避陛下能屈萬乘則士氣自振矣居瑣闥以平奏自任抗論無所阿避㑹除權邦彦僉書樞宻公論其五罪凡三疏不報委以次官書讀公乃丐罷復除給事中言内藏之建小欲助有司經費大欲有事戎虜至仁逺慮則欲警急可以取辦不至横索於民南渡以來内藏不復有所積故嵗撥左藏錢易數萬充之至是復令兑借不識所費何至如是望陛下俯憂時事之艱難仰觀祖宗之志慮踐節儉之言䘏供輸之困上方厲精稽古留神經學一日與公從容論左氏春秋窮究指歸且曰胡安國近進政論極好公曰安國經行素髙兼達治體朱震亦深此學上乃召問繼又訪人材於公因薦徐俯曽開程俱范冲皆一時名流十二年和議成公入見言陛下上念太母俯憂生民甘心屈已力主和議卒使强悍革心迄從聖欲更願陛下不以今日為愈於昔時謂可以少休猶加聖心復言今日祖宗之故地未復父兄之深讐未雪豈得遽為休兵偃武計願陛下厲志而已景靈宫朝獻後公因言土木之功勞人費財營造之過禍敗隨之如近日景靈與外殿之役誠不可已臣願此外一切禁止公酷嗜論語研精覃思隨所見疏二冊練唐洪先興祖蚤以是書從難疑辨惑者二十年得公所説即為序冠其編首有曰養孝弟之本原明忠恕之不二感發於孔子之一貫流涕於周公之四言凡若此類皆古今學者不能到公忘其書益行尚書郎魏安行將漕京西鋟板流傳或以示檜檜怒曰伯㝢著書相謗後世信其言為是而議檜為何人洪魏何至作序鋟板耶乃諭言者論洪魏褫官南臺符下京西搜書焚板王大寶字元龜其先居温陵徙潮以舎選試禮部建炎戊申登龍飛榜第二名授南雄教移病滿百日罷紹興初除樞宻院計議五年諸王宫教皆未上罷八年監登聞院主管崇道再祠閑居復八年除連州守尋知袁州除司業兼崇政説書召直敷文知温州三十年福建憲㫖與祠家居累嵗廣東憲除禮侍踰旬試右諫議大夫月餘兼侍講試兵侍力請外以敷直提舉興國乾道改元召落致仕試禮書不兩月罷予祠言者欲鐫職上不許六年四月薨享年七十七趙丞相自温陵守謫潮公從之游日講論語趙公喜謂公曰元龜昔監鼓院而乞祠得無望乎公謝不敢趙曰人有讒公者故有是命觀公文章學識直諒勁正廷臣無出右者抑何誣也且吾此來平時薦引之人蔑有至者公獨肯來不賢而能如是哉吾過矣吾過矣又謂欲知讒者名乎曰不願知也趙益稱歎久之知連州張魏公先謫是州即命其子栻從公學紹興戊午黨議浸起張趙客貶斥無虚日人為累息公獨泰然州帑素窘魏公俸不時得公以經制錢給之魏驚曰如累公何公曰得䘮命也魏嘆息知袁州宗丞沈清臣以詆和議忤時相貶沅道過袁公曰吾同年生也留之數日僚吏白恐觸丞相嗔公笑不答尋理舊著周易證義六巻表進於朝上謂宰相王某所進書深得經㫖孝宗居潜公於講筵奏云陛下富於春秋儲貳之事大未容輕議切見天族近屬毓徳郡藩有年矣欲望斷自淵衷擇可立者寵以王爵係中外之望進讀畢聖語温粹公喜曰上受直言古所未有孝宗即位明年公奏漢髙祖開基孝文躬節儉天下一歸於淳厚唐髙祖剏業太宗行仁義天下一歸於富庶望詔大臣尚敦朴損虚費則淳厚富庶之俗復見於今又言艱難以來曰征曰和浮議不根陛下即位四方翹首以望恢復而國是未定願斷以國是則中外協力成功矣言即政之初當念祖宗積累之基痛河朔陷溺之民革奸蠧之宿弊篤緝熈光明之聖學戒飾内外務崇節儉嚴緝盜賊以固根本尋除侍講上曰太上謂卿䆳於易學故有是除魏公都督公力贊其議所奏强本足用之説十蓋六七已而師潰而歸羣議洶洶公持之益堅即進曰近日宿州退保衆議紛紜危疑之情虚實未辨若非果斷持重何以息羣情止横議在官悉心力知無不為自入仕四十三年居官僅七稔閑居權要素所知者一不通問疾革忽喟曰大恩未報中原雖戴宋未忘玩嵗愒日正恐恢復之期非日月可冀言訖而瞑宋名臣言行録别集上巻四
