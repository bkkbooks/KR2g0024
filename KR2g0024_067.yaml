body:
  text: 宋名臣言行錄外集巻九宋李幼武纂集尹焞和靖先生字彦明一字徳充其先洛陽人靖康初召到京師懇辭還山誥授和靖處士以榮其歸虜陷洛陽舉家遭禍公獨竄身入蜀居涪陵紹興五年以崇政殿説書召力辭七年始就職除祕書郎八年除少監除直徽猷閣仍説書轉太常少卿權禮侍兼侍講轉徽猷待制九年觀祠而去十年請老如紹興居二年歿年七十二少孤奉母陳氏以居為進士業年二十師事伊川程夫子先生應進士舉答䇿問議誅元祐黨人先生曰噫尚可以干禄乎哉不對而出告於伊川曰吾不復應進士舉矣伊川曰子有母在先生歸告其母母曰吾知汝以善為養不知汝以禄養於是先生退不復就舉伊川聞之曰賢哉母也大觀中新學日興有言者曰程頤倡為異端尹焞張繹為之左右先生遂不欲仕而聲聞益盛徳益成同門之士皆尊畏之伊川曰我死而不失其正者尹氏子也金人陷洛先生之家死于難先生死復蘇竄于長安山中轉徙四五年而長安陷劉豫僭位使人來招之先生夜逃去徙步渡渭乆之止于涪紹興間上以從臣薦召之力辭居一年後赴召至九江有言者攻毁程氏先生復辭曰學程氏者焞也生事之二十年今又二十年矣請就斥上召益急至上前又辭上曰卿尚可辭耶朕渇卿乆矣知卿之從伊川也俟卿講學不敢以有他先生遂就職㑹金議和先生上奏曰本朝兵禍亘古未聞賴祖宗徳澤之厚陛下勤撫之至所以億兆之心無有離異前年徽宗皇帝寧徳皇后凶問遽来莫究不豫之狀天下之人痛心疾首而陛下方且屈意降心迎奉梓宫請問諱日為事遂使敵意益驕謂我無人再啟和議於今日意欲潛圖混一臣妾中國陛下十二年勤撫之功當決於此矣況先王之禮父母之讐不與共戴天兄弟之讎不反兵今信仇敵之詐謀而覬其肯和以紓目前之急豈不失不共戴天反兵之義乎又與宰相秦檜書曰金與我有不共戴天之讐靖康以來屢墮其術今若一屈便為口實要怨侮兵自困自斃豈忍為此議乎比聞主上以父兄未返降志辱身於九重之中有年矣然亦未聞金人悔禍還二帝於沙漠繼之梓宫崩問不詳天下之人痛恨切骨則金人謀我欵我之心不言可見天下方望相公有以革其已然豈意為之已甚乎先生之學學聖人者也曰聖人必可以學而至也而不可以為也玩味以索之踐履以身之涵養以成之有叙於是乎下學上達窮理盡性而無贅無外者學之正也先生莊正仁實不過於心不欺闇室自誠而明以之開物成務推而放之四海而凖其於聖人六經之言耳順心得如出諸已天下知道者必宗之不知者必慕之吕稽中撰墓誌馮忠恕曰先生學聖人之學者也聖人所言吾當言也聖人所為吾當為也詞章云乎哉其要有三一曰玩味諷味言辭研索歸趣以求聖賢用心之精㣲二曰涵養涵泳自得藴蓄不憢存養氣質成就充實至於剛大然後為得也三曰踐履不徒誦其空言要須見之行事躬行之實施於日用形於動靜語黙開物成務之際不離此道所謂修學如此而已所謂讀書如此而巳記善錄序公問伊川如何是道曰行處是道或問明道如何是道曰於君臣父子兄弟夫婦朋友上求公因蘇昞見伊川自後半年方得大學西銘看言初見伊川時教某看敬字某請益伊川曰主一則是敬當時雖領此語然不若近時看得親切祈寛問如何是主一願先生善諭公言敬有甚形影只收歛身心便是主一且如人到神祠中致敬時其心收歛更不著得毫髪事非主一而何公言昔與范元長同見伊川偶有幹先起下階伊川謂范曰君看彦明他時必有用於世元長次日説如此葢伊川平日元不曽許人一日看大學有所得欲舉以問伊川伊川聞之公曰心廣體胖偶只有所樂伊川曰到這裏和樂字也著不得明道嘗曰天下事只是感與應耳公初聞之以問伊川伊川曰此事甚大當自識之公曰綏之斯来動之斯和是亦感與應乎曰然嘗請益於伊川曰某謂動靜一理伊川曰試喻之適聞鍾聲某曰譬如鍾未撞時聲固在也伊川喜曰且更涵養伊川教人専以敬以直内為本公獨能力行之公言先生教人只是専令用敬以直内若用此理則百事不敢輕為不敢妄作不愧屋漏矣習之既乆自然有所得也往年先生自涪陵歸日日見之一日讀易至敬以直内處因問先生不習無不利時則更無睹當更無計較也耶先生深以為然且曰不易見得如此且更涵養不要輕説温州鮑若雨與鄉人十輩乆從伊川伊川遣之見和靖次日伊川曰諸人謂予靳學不以教渠果否公曰某以諸公来依先生之門受學某豈敢輙為他説萬一有差便不悮他一生伊川頷之公在瀘州一室名遂志齋取易致命遂志之義在涪陵所居名習堂取學而時習之義在千福院一室名六有齋取横渠所謂言有教動有法晝有為宵有得息有養瞬有存之意一室名三畏齋取畏天命畏大人畏聖人之言之意公與張繹同時師事伊川張繹以髙識公以篤行俱為所稱伊川問公與繹尋常見處有同否有差否自覺如何為我言之公曰某不逮思叔如凡請問未達三四請益尚有未得處乆之乃得如思叔則先生纔説便㸃頭會意往往造妙某雖愚鈍自保守得若思叔則某未敢保他伊川笑曰也是也是自是每同請益退伊川必謂諸郎曰張秀才如此不待尹秀才肯得祁寛所語錄公言某與思叔既相友善伊川歸自涪思叔始見穎悟疏通伊川亦便喜之自此同遊處伊川以族女妻之甚相敬待和靖嘗因侍坐稟伊川曰張某每聞先生語言下解悟某聞先生語須再三尋思或更請問然後解悟然他日持守思叔恐不及某先生以為然思叔長於為文又善辦事先生沒未幾思叔亦沒和靖被召嘗曰思叔若在到今自當召用必能有為於世伊川嘗言晚得二士記善錄先生嘗言學者所以學為人也徐名度字惇立尹門人問曰某有意於學而未知所以為問先生曰此語自好若果有此意歸而求之有餘師又語人曰放教虛閑自然見道先生在從班時朝士迎天竺觀音於郊外先生與往有問何以迎觀音也先生曰衆人皆迎某安敢違衆又問曰然則拜乎曰固將拜也問者曰不得已而拜之與抑誠拜也曰彼亦賢者也見賢斯誠敬而拜之矣徐度語及蘇氏使民戰栗義問曰如何先生艴然曰訓經而欲新竒無所不至矣先生日看光明經一部有問之曰母命不敢違朱子云如此便是平日闕却諭父母於道一節便致得如此門人贊曰丕哉聖謨六經之編耳順心得如誦已言朱曰要當至此地位始是讀書人耳朱子序曰程夫子有言涵養必以敬進學則在致知二言者夫子教人所以造道入徳之大端而不可以偏廢者也若尹先生者其學於夫子而有得於敬之云乎何其説之約而居之安也先生言行錄序又曰先生晚嵗片紙手書聖賢所示治氣養心之要粘之屋壁以自警戒熹竊念前賢進修不倦死而後巳其心烱烱猶若可識捧讀終編恍然自失因以自詔云或問朱子以和靖立朝議論曰和靖不觀他書只是持守得好他語錄中説涵養持守處分外親切有訾朝廷文字多是門人代作和靖言經雖以誦説而傳亦以講解而陋此言深有味也和靖主一之功多而窮理之功少故説經雖簡約有益學者但推説不去不能大發明在經筵請講少開悟啟發之功紹興初入朝滿朝注想如待神明然亦無大開發處時髙宗好看山谷詩尹云此人詩有何好處陛下看此做甚麽只説得此一語問和靖専於主敬集義處少曰和靖主敬把得定亦多近傍理和靖在程門直是十分鈍底被他只就一个敬字做工夫終做得成和靖持守有餘而格物未至故所見不精明無活法伊川先生纔説病便有藥和靖却似合下便把作死馬醫此道之傳真未易以屬人也和靖守得𦂳見得不甚透如俗語説他只抱得个不哭底孩兒和靖才短只𦂳守伊川之説並朱子語和靖曰伊川門人馮理字聖先曰二十年聞先生教誨今有一竒特事先生問之理曰夜間燕坐室中有光先生曰頤亦有一竒特事理請問之先生曰每食必飽張繹字思叔河南壽安人家甚㣲年長未知讀書為人傭作一日見縣官出入傳呼道路思叔頗羡慕之問人何以得如此或告之曰此讀書所致耳思叔始發憤從人受學執勞苦之役教者憐其志頗勸勉之後頗能文入縣學府學被薦以科舉之學不足為也至僧寺見道楷禪師悦其道有祝髪從之之意時周恭叔官洛中思叔亦從之恭叔謂之曰子他日程先生歸可從之學無為空祝髪也伊川歸自涪陵思叔始見之時從學者甚衆伊川獨許思叔因讀孟子志士不忘在溝壑勇士不忘喪其元始有自得處後更窮理造㣲少能及之者矣和靖言某與思叔既相友善思叔始見伊川思叔穎悟疏通先生亦便喜之自此同遊處先生以族女妻之甚相敬待學者從之漸衆思叔三十嵗方見伊川後伊川一年卒初以文聞於鄉曲後來作文字甚少伊川每云張繹朴茂朱子曰思叔敏似和靖伊川稱其朴茂然亦狹無展拓氣象思叔最後進然深惜其早世使天予之年殆未可量也問程門誰真得其傳曰也不盡見得劉質夫張思叔輩又未見有文字看程門諸公力量比之康節横渠皆不及馬伸東平先生字時中或作時仲時舉東平人弱冠登第晦迹州縣靖康初以樞臣薦召為監察御史中興初擢殿中侍御史湖廣路撫諭還臺言執政貶濮州監税卒紹興初追贈諌議大夫崇寧初元祐學有禁姦人用事出其黨為諸路學使専紏其事伊川之門學者無幾雖宿素從遊間以趨利叛去公方自吏部求為西京司法鋭然為親依之計至則因張繹以求見先生初以非其時恐貽公累公執贄凡十反愈恭且曰使伸得聞道雖死何憾況不至於死者乎先生聞而歎曰此真有志者遂引而進之自爾出入凡三年公暇雖風雨必日一造焉公調成都郫縣丞至任未幾會納冬米成都浩穰守以委公公辭以多弊不可為守問其故公曰弊之大者由諸司吏人封抄拒之則速禍守曰君既知其弊尚何辭公至場中則諸邑人紛然矣豐飲食玩好文飾美女凡可以蠱訹者無所不至前此主者不能自謹一墮計中則束手受制莫敢誰何公盡逐之嚴察吏卒不容纎芥負米至者畧無留滯時倉使孫侯按部至境早行見負擔者道傍假寐以待曉怪而問焉俱應曰今年好受納官某等至無邀阻故爭先詰其主名曰馬縣丞也孫歎息不已抵郡即呼吏書牒薦之即日改秩公常以此語人云人之利鈍自有時但當行直道無用干人也靖康初樞宻孫傅以卓行薦公中丞秦檜素髙其節迎辟為監察御史令人取願狀公曰中丞取臺官但問堪不堪無問願不願金立張邦昌而去公首具書請邦昌迎元帥康王書成率同院僉與俱往相顧無一首肯公遂以書自抵銀臺司進之吏視書不稱臣辭不受公投袂叱曰逆類吾今日不愛一死正為此爾而欲吾稱臣耶出即以繳申尚書省尚書省以示邦昌邦昌得書氣沮恐敗誅甫議迎隆祐太后為垂簾計其書略曰相公不幸迫於强敵使當偽號閤下此時豈以義為可犯君為可忘宗社神靈為可欺所以忍死須臾而詭聴之者其心若曰與其虛遜於人而實亡趙氏之宗者孰若虛受於已而實存趙以歸耳金人既北相公於義即合憂懼自列於朝上皇子惟康王在外天下所係國統有歸宜即發使通問掃清宫室率羣臣共迎而立之閣下退就北面之列請歸死有司如此則明主必能照察今乃謀不出此尚當非據羣心狐疑不知所謂靖康二年四月八日狀云伏見金人犯順刼二帝北行且逼立相公使主國事相公所以忍死就位者自信兵退必能復避也忠臣義士不即就死城中之人不即生變者亦以相公必立趙孤也今兵退多日吾君之子已知所在獄訟謳歌又皆歸往相公尚處禁中未就臣列道路傳言以謂相公外挾金人之威使人游説康王且令南遁然後為乆假不歸之計伸知相公必無是心但為金人未逺因循未能盡改雖然人心未孚一旦喧閧辜負初心望速行改正易服歸省庶事取太后命而後行仍速迎奉康王歸京日下開門撫勞勤王之師以示無間應内外赦書施行恩惠收人心等事權行拘收俟立趙氏了日然後施行庶幾中外釋疑轉禍為福不然伸有死而已必不敢輔相公為宋朝叛臣也王及之言於邦昌以寧徳宫府藏所有及池塘魚藕之利可盡取以資用公復引義白於都堂曰古者人臣去國三年不反然後收其田里今吾君狩猶未出疆天下之人方欲追挽而不可得君之府藏燕遊忍一朝而毁乎髙宗龍飛公撫諭湖廣還將入奏於道中採訪得執政汪黄不法事作彈文方具稿而何兑追及於建康見之曰先生方以使還且當奏職事徐論似未晚公曰彼忌我若未及言而有遷除奈何然吾當有以探之時方召孫覿謝克家乃言此二人皆小人不可用如覿親草降表極其筆力以媚金人受其二女乃負國之賊也果不報遂除司農卿公固辭乃繳進彈文執政怒甚搜求無以為罪乃指章中言邵成章上書事邵中官也以為趍向不正遂貶濮州監税時用事者必欲寘公死地以濮迫㓂境故有是命有識者惜其去至戚嗟相弔且危之公襆被就道無憂懼色人益歎服公天姿重厚雖勇於為義而恥以釣名不幸卒為仇陷於死或云王淵屯淮上受黄宻㫖加不利於公知與不知莫不痛之常曰志士不忘在溝壑勇士不忘喪其元今日何時溝壑乃吾死所也故其臨事奮不顧身每如此公晨興必整衣冠端坐讀中庸一過然後出視事公曰吾志在行道使吾以富貴為心則為富貴所累使吾以妻子為念則為妻子所累是道不可行也故其在廣陵隨身行李一擔而圖書半之山東巳擾而家屬尚留東平胡文定時政論曰伸言汪黄自言官黜為監當而其言則有狀矣不慎命令則以下還都之詔也廣布私恩則以復祠官教官之闕也黜陟不公則以罷衛膚敏而用孫覿不祥之人也杜塞言路則以貶吳給張誾邵成章也妨功害能則以沮宗澤與許景衡也私收軍情則以各置親兵千人請給獨厚也同惡相濟則以力庇罪人王安中也凡舉一事必立一證皆衆所共知亦衆所共見當時罷之反以為言事不實而重責之是罰沮忠讜捐軀為國之人邪説何由息公道何由行乎靖康金議立邦昌公抗言於稠人曰吾曹職為爭臣豈可緘嘿坐視當共入議狀乞存趙氏秦檜不答少焉屬稿就呼臺吏連名書之檜既為臺長則當列於首以呈檜檜猶豫公帥同僚合辭力請檜不得已始肯書名公遣人疾馳以達於金故秦氏所藏猶云檜筆也公死檜還自金揚言已功盡取富貴公之子孫漂泊閩中有甥何珫得其元稿累欲上之而其子止之云秦之凶燄其可犯耶紹興乙亥春珫忽夢公衣冠如平生云秦氏將敗趣使往陳之珫即持其稿以呌閽檜大怒誣以他罪下珫大理竄嶺外未幾檜果殂其家訟寃詔復珫官公之忠績遂得别白孟厚字敦夫洛人和靖云敦夫來從伊川又為王氏學舉業特精獨處一室糞穢不治嘗獻書於伊川伊川云孟厚初時説得也似其後須沒事生事一日伊川語之曰子何不見尹焞張繹朋友間最好講學然三公皆同齒也敦夫見和靖曰先生令厚来見二公若彦明所願見如思叔莫不消見否和靖曰只不消見思叔之心便是不消見焞之心也伊川嘗謂學者曰孟厚不治一室亦何益學不在此假使洒掃得潔淨莫更快人意否伊川之葬門人畏黨禍莫敢至獨敦夫與尹張范棫邵溥送焉侯仲良字師聖河東人二先生舅氏華隂先生無可之孫人有欲館侯子於其門者侯子造焉則壁垂佛像几積佛書其家人又常齋素欲侯子從之侯子遂行或問之侯子曰疏食士之常分若食彼之食則非矣吾聞用夏變夷未聞變於夷者也人有父在而身為祖母忌日飯僧者召侯子侯子不往或問之侯子曰主祭祀者其父也而子當之則無父矣吾何往焉雅言胡文定與楊大諌書云侯某去春自荆門潰卒甲馬之中脱身相就於漳水之濵今已兩年安於覊苦守節不移固所未有至於講論經術則通貫不窮商確時事則纎㣲皆察尹和靖曰伊川謂侯子議論只好隔壁聴朱子曰詳味此言以驗此書竊謂其學大抵明白勁正而無深潛縝宻沈浸醲郁之味故於精㣲曲折之際不免疎略時有罅縫不得於言而求諸心乃其所見所存有此氣象非但文字之疵也説侯子論語周行已字恭叔永嘉人自太學蚤年登科未三十見伊川持身疾苦塊坐一室未嘗窺牖幼議婚母黨之女登科後其女雙瞽遂娶焉愛過常人伊川曰頥未三十時亦做不得此事然其進鋭退速每歎惜之嘗酒席有所屬意既而宻告人曰勿令尹彦明知之又曰知又何妨此不害義理伊川歸和靖偶及之伊川云此禽獸不若也又曰父母遺體以偶賤倡可乎謝上蔡云學者須是胸懐擺脱得開始得或問周恭叔恁地放開如何曰他不是擺脱得開只為立不住便放却忒早胡文定云人須是於一切世味淡薄方好不要有富貴相周恭叔才髙識明初年甚好後來只私累太重若把得定儘長進在王蘋字信伯世居福之福清自其考徙平江守臣孫公祐薦其學行於朝召見賜進士出身除祕書省正字尋兼史館校勘遷著作郎丐外倅常州奉祠致仕官至左朝奉郎壽七十二紹興二十三年卒先生資禀精粹充養純固平居恂恂儒者及語當世之務民俗利病若習於從政者然不徼名當世世亦罕知之為上言曰人心廣大無垠萬善皆備盛徳大業由此而成故欲傳堯舜禹湯文武之道擴充是心焉爾帝王之學與儒生異尚儒生從事章句文義帝王務得其要措之事業葢聖人經世大法備在方冊茍得其要舉而行之無難也楊文靖時程門先進嘗曰同門後來成就莫踰吾信伯朱震胡安國尹焞皆舉以自代文定論薦尤力謂其學有師承識通世務使司獻納必有補於聖時李郁西山先生字光祖邵武軍光澤縣人元祐黨人深之子游太學被鄉薦皆不第紹興初舉遺逸朱異行郡國還以公名對召對便殿除𠡠令所刪定官旋以憂去用進書恩改承務郎免喪㑹秦檜用事遂隠居乆之起家福建帥司幾宜以事忤帥不屈移病告老二十年卒年六十龜山既受學於程氏歸以其説教授東南一時學者翕然趨之龜山每告之曰唐虞以前載籍未具而當是之時聖賢若彼其多也晚周以來下厯秦漢以迄於今文字之多至不可以數計然曠千百年欲求一人如顔曾者而不可得則是道之傳固不在於文字而古之聖賢所以為聖賢者其用心必有在矣及公請見於餘杭則其告之亦曰學者當知古人之學何所用心學之將以何用若曰孔門之學仁而已則何為而謂之仁若曰仁人心也則何者而謂之人心耶公受言退求其説以進愈投而愈不合於是取論孟之書而伏讀之蚤夜不懈十有八年然後涣然若有得也龜山葢深許之而公之語學者亦曰學者於經讀之又讀而於其無味之處益致思焉至於羣疑並興寢食不置然後始當驟進耳公幼不好弄坐立必莊少長學於舅氏陳忠肅公器之踰冠乃見龜山而請業焉龜山一見竒之即妻以女秦檜用事公自度不能俯仰禄仕遂築室邑之西山往來讀書其間家亦窮空人有不堪其憂者公獨曠然不以為意然一時賢士大夫益髙仰之天資粹美而涵養有方其事上恭而有禮其御下嚴而有恩平居未嘗有惰容誨人終日無倦色自奉甚約而事親極其厚其於世務人情官政文法下至行陣農圃之事靡不究知然竟不及用於世以沒識者恨之嗚呼聖賢逺矣然其所以立言垂訓開示後學其亦可謂至哉顧自秦漢以來道學不傳儒者不知反已潛心而一以記覽誦説為事是以有道君子深以為憂然亦未嘗遂以束書不讀坐談空妙為可以徼幸於有聞也若龜山之所以教西山之所以學其亦足以觀矣宋名臣言行錄外集巻九
