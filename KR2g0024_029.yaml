body:
  text: 宋名臣言行録續集卷五宋李幼武纂集洪皓魏國忠宣公字光弼其先徽州人唐末避亂徙樂平之洪巖遂為饒州人登政和五年進士第主台州寧海簿攝令拜南京國博未上主兵饋有功為秀州録宣和六年丁大中憂禫中俄召見擢徽猷待制假禮書使金國不屈節紹興十年始歸進閣直提舉萬夀觀兼權直學士院忤秦檜出守饒州提舉太平觀丁大碩人憂服除得太平觀復責濠州團副使安置英州謫九嵗始復左朝奉郎主管崇道觀居袁州未踰嶺病革二十五年薨于南雄年六十八復敷文閣直學詔贈太師宣和六年秀州大水田不沒者什一流㷀塞路倉府空虛無賑救策公曰郡守以荒政自任悉籍境內粟留一年食發其餘糶於城之四隅升損市直錢五戒米肆揭賈於青白旗上巡行無時扶其旗靡者皆無敢貴糶不能自食者為主之立屋於東南兩廢寺十人一室男女異處防其淆僞涅黑子識其手東五之南三之負㸑樵汲有職民羸不可杖有侵牟鬭嚻者亂其手文逐之皆帖帖畏伏借用所掌發運名錢錢且盡㑹浙東綱常平米斛四萬過城下公遣吏鎖津栅諭守使截留守噤不肯曰此御筆所起也罪死不赦公曰民仰哺當至麥今臘猶未盡中道而止則如勿救寧以一身易十萬人命訖留之居亡何廉訪使者王孝竭至郡曰平江哀號訴饑者旁午此獨無有何也守具以對即延公如兩寺驗視民肅然無出聲孝竭曰吾嘗行邊軍政不過是也違制抵罪得為君脫之且厚賞呼吏草奏公曰免戾幸矣安所賞但食猶未足公能終惠復得二萬石乃可孝竭以聞米如請而得至麥秋民相攜以歸前後所活者九萬五千餘人州人既不死凶年公出無不以手加額呼為洪佛子上以國步艱難兩宫逺狩為憂公極言天道好還金人安能久陵中夏此正春秋邲郢之役天其或者警晉訓楚也所言反覆當上意上曰卿議論縱橫熟於史傳有專對之才朕方擇使無以易卿公以母老父喪懇辭不許擢徽制遷五官假禮書為奉使大金軍前令與宰執議國書公欲有所易輔臣護其文不喜遂抑遷官賜告一日歸别持太碩人拜且泣時淮賊蜂起公間關至太原留幾一年金遇使人禮益削及至雲中大酋尼瑪哈迫與副使官僞齊公曰萬里銜命不得御兩宫以歸大國度不足以有中原當還諸本朝乃違天以奉逆豫豫可磔萬假顧力不能忍事之耶今留亦死不即豫亦死偷生狗鼠間甘鼎鑊不悔也尼瑪哈怒命壯士擁以下執劍夾承之公不為動旁貴人嘆曰真忠臣也止劍士以目為跽請尼瑪哈怒少霽遂流遞于冷山流遞猶中國編竄也雲中至冷山行兩月程距金二千餘里地苦寒四月草始生八月而雪土廬不滿百皆陳王烏實聚落烏實使誨其二子或二年不給衣食盛夏至衣粗布畨課四隸採薪它山嘗久雪薪盡至乞馬矢煨麵而食困辱十年多為詩文以諷皆憂國傷時語烏實嘗得獻取蜀策持以問公公厯陳古事梗之烏實鋭欲吞中國曰孰謂海大我力可乾但不能使天地相拍爾公曰兵猶火也弗戢將自焚自古豈有四十年用兵不止者又數數為言所以來為兩國大事今既不受使乃令深入教小兒兵交使在禮不當執烏實或應或否一日大怒曰汝作和事官却口硬謂我不能殺汝邪公曰自分當死顧大國無受殺行人之名此去蓮花濼三十里使之乘舟一人蕩諸水以墜淵為言可也烏實義而止兩宫䝉塵五國城公嘗私遣人奏書并獻胡桃梨修栗麵諸物兩宫方知趙氏中興永祐陵諱聞公北鄉泣血旦夕臨後遇諱日即燕山開泰寺為文以薦曰千嵗厭世莫遂乘雲之仙四海遏音同深喪考之戚况故宫為禾黍改館徒饋於秦牢新廟遊衣冠招魂但歌於楚些雖置河東之賦莫止江南之哀遺民失望而痛心孤臣久縶惟歐血伏願盛德之祀傳百世以彌昌在天之靈繼三后而不朽故臣讀之無不掩涕金巳遣使約和烏實問所議十事公條析之甚至曰封册是虛名年號本朝自有金三千兩景德所無東北宜絲蠶大國有其地矣絹不可增也至於取淮北人景德之盟載書猶在可覆視也烏實曰吾欲取投附人誅之以懲後何為不可公曰昔魏侯景舉十三州地歸梁梁武欲以易其姪蕭明於魏景遂作亂陷臺城仆兩帝中國所監决不相從悟室稍悟乃曰汝性直所言不誑我吾與汝如燕遣汝歸議遂行既而莫將北來議不合囚涿州事復變未幾烏珠族烏實黨與坐死者數百千人獨公故與持論身幾死者數矣烏珠知之故得免公至燕燕人重公執節爭持酒食相勞苦公間行㕓市物色諜者得趙德書機事數萬言藏故絮中以歸曰順昌之役金震懼喪魄燕之珍器重寶盡徙以北意欲捐燕以南棄之王師亟還自失機㑹雖再躪河南後必更成具以烏實語并兩宫諸王主所居報上明年夏求得皇太后書遣邵武男子李微來歸上大喜因御經筵謂講讀官曰不知太母寧否幾二十年雖遣使百輩不如此一書遂官李微公復以書曰金巳厭兵勢不能久異時以婦女從軍令不敢攜朝廷不知虛實卑辭厚幣未有成約不若乘勝進擊再造猶反掌耳所取投附人只欲保江南歸之可也獨不監侯景之禍乎若欲復故疆報世讎不宜與胡銓封事此或有之知中國有人益生懼心張丞相名動殊方可惜置之散地并問李趙二相安否獻六朝御容徽宗御書其後和定祐陵及太后歸音皆先報凡四年中以文書至者九皆陳軍國利病宰執賀皇太后有來歸期上曰洪皓身陷北方乃心王室忠孝之節久而不渝誠可嘉尚二子皆中詞科亦其忠孝之報也先聖福善禍淫之理於此可見金法曾被任使者永不可歸欲以計墮公令校雲中進士試使者監上道公日損食陽為疾狀既至謂院官曰今取士以詩賦吾故學經耳曰豈不能出語策士乎考官孫九鼎者有太學舊以為疾聞得回燕金議遣奉使人各還其鄉因赦及之它使者幸稍徙多占淮北無敢言淮以南者公實以饒州聞張邵朱辨亦自言和州徽州人既議和還淮以南使者故公三人在遣中用事者多曰此等人若放了幾時更有今不留後必為我患歸計屢欲變參政王公使至燕公得其陰謀從坡上與館中人語為留守易王所獲對吏將馳流星騎上其事副留守髙吉祥素嘉公忠委曲護出之且易以它牘公行月餘方以元牘奏埀入境七追騎至及淮則在舟中矣至盱眙以奉使無狀自劾上方以來歸為喜報無罪可待日以御札趣覲既至闕登時見內殿奏事罷力求鄉郡養老母上曰卿忠貫日月志不忘君雖蘇武不能過豈可捨朕去也公見秦檜肆言無所避彌三日不休曰張丞相金所尊憚乃不得用錢塘暫蹕而景靈太廟土木之工示無中原耶檜謂公長子適曰尊公信有忠節得上眷但官職如讀書速則易終而無味要當如黃鐘大吕乃可閲九日直學士院金人來取趙彬輩三十人家屬詔歸之公曰金既限淮官屬皆吳人留不遣蓋慮知其虛實也彼方困於蒙兀姑示强以嘗中國宜謂之曰俟淵聖皇帝及皇族歸乃遣檜大怒公又言王倫輩以身狥國棄之不取緩急何以使人初檜在達蘭軍中達蘭圍楚州久不下使檜草檄諭降有實納者在軍知狀公與檜語及金事因曰憶實納否别時託寄聲檜色變而罷翊日李文㑹即奏公項事朱勔之壻夤緣改官以該討論乃求奉使比其歸也未能自脫特以和議既定例得放歸而貪戀顯列不求省母乃出公知饒州公責置英州閩人倪察為守老矣內無奧主聞知新州張棣以巧中胡銓遷客取使節欲效之即使兵馬都監俟其隙捕公家奴置獄中釀成其罪未及發而察死事乃解公天性强記書無所不讀雖食不釋卷稗官小說亦暗誦數千言宣政間春秋之學絶獨窮遺經貫穿三傳在冷山摘褒貶微㫖作詩千篇北人抄傳誦習欲刻板於燕公弗許男適書賜諡制書後曰臣聞足再刖而玉顯其美火百鍊而金知其精人臣忠邪至身後而是非始判發潛德之幽光誅姦諛於巳死孔子作春秋之㫖也先臣當戎馬紛紜之際使不可測之絶國十有五年然後歸陛下謂蘇武不能過且許筆賜其傳㑹先臣席弗暖而逐弗獲藏奎壁之寶今又十有五年弟遵入對陛下褒歎忠節復道前語恩隱再三寵之令諡生雖竒剝芬香多矣臣謂衛律李陵屢說而武不降先臣則為宇文虛中韓昉所逼三換官而不受張勝事泄武有擬劍幽窖之危先臣則不同龔璹仕齊寧蹈利刃冷山無以異於窮海之北糊口於烏實無異於靬王隻影南翔所不及牧羝者四嵗至若通永祐之表朝長樂於燕間道蠟書其至有九潛見王人幾僨牢戶問答往返皆存闕庇民之語投其詩又篇篇皆以戢兵為意此則武之所無者陛下以為武不能過聖訓明哉然燕王聲霍光之罪以武久縶而歸才得一典屬國楊敞無功乃為搜粟都尉遂謂光專權自恣疑有非常而秦檜排妒先臣不使一旬寓乎玉堂之直致陛下有大用之意而不遂終之流放醜地九年不返則得禍之酷特甚於武武之一子黨叛人而誅漢廷憐之為之逺贖胡出蘇氏賴以不絶而臣以先臣故獲戾亡檜至謂家傳强暴曲法免官非遇天日清明則亦禁錮就死嗚呼一言華衮萬世不刋易名崇終匹休麒麟圖畫諸孤不肖咸叨録用恩遍存歿又過蘇氏臣礱石以識異渥泰龜逢吉鎮之松區泄九京之寃鼓忠義之氣於兹見之西山真德秀跋賜冬服手詔曰蘇武之還自胸奴也詔拜為典屬國賜錢三百萬田宅副焉公之節亡愧蘇武而髙皇帝之所以寵錫者有過漢庭其褒表忠義皆可為後世法然武不幸見抑於霍光公亦不幸逢怒於檜相武之見抑不過不為公卿爾而公方違陰山之北復貶瘴嶺之南是公之不幸視子卿為甚而偃月之罪又浮於博陸也嗚呼思陵雲漢之章忠宣霜日之節將與萬古相為亡窮而權臣氣焰氷解燼滅久矣孫芹葦建忠貫日月祠堂趙汝騰記曰竊惟蹈不測之祻以狥國者決非全軀保妻子者所辦也至若絶漠不毛之地中國之音問隔絶嵗月推遷濱死數四卒全其志節而不可奪是非天資忠義絶人死生祻福一亳不足以動其心者能乎在漢則蘇中郎武在國朝則忠宣公是也然武為之猶易蓋胸奴不過漢一大縣漢威德又足以懾服之是雖欲置武於死地而終不敢故嚙氊茹雪卒賴以全若忠宣所值中原潰裂國威薾甚金虜席卷之勢方張使在其間凜凜白刃之加頸况公義不受爵言不避祻其去死者幾希由今觀之冷山之遞甚於海上雪薪之盡過於掘草尼堪僞齊之脅暴於衛律韓昉換授之迫峻於李陵雖在烏實之館而持論枘鑿又不如靬之愛武也是忠宣在金十五年甚於蘇中郎之十九年也武終始節旄不敢忘漢公於朝廷乃能奏中興之報於永祐修燕地之覲於顯仁又數以金事聞於中國此武之所不能及也武得歸李陵送之河梁賦詠以羡之公歸金猶以七騎追之幸已至淮舟中矣是間關之甚不尤難於武乎武歸僅得典屬國公歸亦僅得翰林權直武不過不為霍將軍所知耳公乃大為秦檜所擠陷魚肉蓋公帛書至榻前率譽胡公銓封事張公浚名望檜甚不悅及歸朝又數言張丞相不休檜愈不悅遂出領鄉郡其後坐官者向諤言公宜在相位檜怒甚遂竄公於英州竟客死身沒而謗始白其坎壈視武轉甚然直氣又加於武矣武有子罹上官之祻公有三子俱策異科長為相次樞府次內翰天之報公其不百倍於武乎張邵字才彥和州烏江人宣和三年登上舍第旋丁外艱建炎元年為衢州刑曹兼檢法三年召對會遣乏使公請行假禮書特轉五官直龍圖閣使虜十年始歸除祕撰主管沖佑改崇道觀十四年丁母憂吉奉祠十九年除敷文待制宫祠二十五年起知池州復請祠道由廣德軍六月丁酉公生朝先一日沐浴就寢詰旦家人起為夀安卧逝矣年六十一詔中外士民直陳時事公言有中原之形勢有東南之形勢今縱未能遽爭中原宜進都金陵因江淮蜀漢川廣之資以圖進取不應退自削弱九月公改承奉郎召對㑹遣泛使公毅然請行假禮書特轉五官除直龍圖閣武臣楊憲副之二弟祁皆補官仍添差祁明州觀察推官奉母以居公即日引道見金監軍郎君達蘭於濰州逼公拜公不可執置昌邑尋徙密州柞山寨以兵守之四年夏公聞達蘭過密以書抵之曰兵不在强弱在理曲直宣和以來我非無兵也帥臣初開邊隙謀臣復啓兵端是以大國能勝之其後僞楚僭立羣盜蜂起曾幾何時電掃無餘是人心天意未厭宋德也今大國復裂地以封劉豫窮兵不已曲有在矣達蘭得書執付豫使用之公升階揖豫以舊官呼之為陳君臣大義辭氣激烈豫怒繫之獄憲遂降閲半年豫知不可屈復以公送金拘之燕山圜福寺紹興元年也公又為書言豫挾大國之勢日夜南侵不勝則首鼠兩端勝則如養鷹飽而飛耳終非大國之利欲以間豫守者密以告金取其書去益徙公東北千餘里之中京後又北徙會寧府去燕三千里先是完顔旻死傳其弟晟晟死旻之孫亹立三世頗厭兵慕文教後生從公者皆習絃誦執經授大義爭饋錢榖布帛公自分終焉金嘗肆赦許我使者自便歸其鄉人人占籍淮北幸得稍南惟公與洪公朱少章實言家江南十二年二月甲子金忽召三人者改館致饋許之南歸公以四月辛未至燕山洪公先在五月朱自雲中至六月庚戌同發永平館七月壬戌次汴京都亭驛道中有輶軒唱和集公為之序八月庚子對行在上書言臣使北時道遇秦檜教臣堅持使節臣得奉以周旋又醫官榮州團練使李子厚語臣云檜在中京嘗代徽宗移書尼瑪哈述海上盟約及用兵講和利害結好基此會曹勛繳進其書詔付史館初公出疆遇檜於昌邑以忠義相勉故公在喪相與通問公因厯叙金有歸淵聖及諸王宗室意勸其遣使迎請秦浸不樂公天資徑偉遇事慷慨酒酣耳熱悲歌憤激常以功名自許方車駕留江上强敵逆臣連兵入冦公冒險出使人皆危之及被囚拘略無悔懼賦詩作文考詳史傳著述動盈編帙歸獻所聞納忠于朝將有施為以償素志既不遂歎曰身在異域視死如歸為國事也今士大夫有告言連坐之風一或抵罪家破名滅竟亦何禆悉取舊藁焚之惟晝夜潛心經典學道日以有得無田無廬未嘗過而問焉髙宗更化方且進用而公無意斯世矣朱辨字少章徽之婺源人入太學補內舍生靖康之難家碎賊手南歸及淮建炎二年正月請使問安補官借右武大夫吉州團練使充大金通問副使寓北庭不屈紹興十二年歸上髙其節俾易文資秦檜忌之奏換右宣教郎直祕閣主佑神觀有司校考十七年當廷數官檜又尼之僅轉奉議次年四月六日卒建炎戊申遣使問兩宫安否大夫無敢行者公聞之慨然攘袂自獻詔補官且命之曰朕方俯同晉國用魏絳以和戎爾其逺效侯生御大公而歸漢受命曰即與王倫行遇尼瑪哈于白水濼邀說甚切尼瑪哈不聽使就館雲中餽餉如禮而實以兵守之壬子嵗金忽遣宇文虛中來言和好可成當擇使副一人詣元帥府受書歸報虛中欲二人探籌以決去留公正色曰此市道之所為耳吾之來固自與以必死豈今日乃覬幸於先歸者哉願公亟受書歸報使吾君得以蚤申四海之養於兩宫則吾雖暴骨方外猶生之年也及倫行又請曰古之使者有節以為信今無節而有印則印亦信也公既還朝無所事此願留見授使某不幸一有意外之辱得抱以死死不腐矣倫揮涕解以授公公受而懷之卧起未嘗不與俱也逆豫盜據京邑金迫公仕豫且誘之曰此南歸之漸也公曰吾受命而北不受命而南且豫國賊吾常恨不食其肉又忍北面而臣之哉吾有死耳不願歸之金怒絶其餼遺以困之公反從中固拒驛門忍飢待盡誓不為屈金亦感動復慰安之致禮如故金又迫公換其官公曰自古兵交使在其間言可從從之不可從則囚之殺之何必換其官哉吾受本朝官今日有死而已誓不易以辱吾君也且移書金用事人耶律紹文等曰上國之威命朝以至則使人夕以死夕以至則朝以死又以書告訣於後使洪忠宣曰殺行人亦非細事吾曹不幸遭之亦命也命出於天其可逃哉要當舍生以全義耳金知終不可屈遂不復强然公以使事未報憂憤得目疾其㦉鬱愁嘆無憀不平之氣一於詩發之號聘逰集丁已嵗金諸酋相繼死滅公得河陽人密疏其事及北朝虛實使之間行歸報曰此不可失之時也後王倫復歸獻公奉送徽考大行之文有曰臣等猥以凡庸誤䝉採擇茂林豐草被雨露於當年絶黨殊鄰犯風霜於將老節上之旄盡落口中之舌徒存歎馬角之未生魂消雪窖攀龍髯而莫逮淚灑氷天上讀之感涕顧張忠獻喻以密㫖曰歸日當以禁林相處也公歸上引見勞苦嘉歎再三公謝且言曰臣聞人之所難得者時也而時之運無已事之不可失者幾也而幾之藏無形惟無巳也故來遲而難遇惟無形也故動微而難見陛下與金講和上則返梓宫次則迎太后又其次則憐赤子之無辜肉白骨於已朽此皆知時知幾之明驗也然時運而往或難固執幾動有變宜監未兆盟可守矣而詭詐之心宜默有以待之兵可息矣而銷戢之術宜詳以講之且金之君臣上不奉若天道下不求合民心人怨神怒不知修省以黷武為至德以茍安為太平虐民而不恤民廣地而不廣德此皆天助陛下中興之勢也若時與幾陛下既知之於其始圖惟厥終願留神焉上納之賜豫益厚朱文公曰國家自政宣以來公卿大臣荷國寵榮殊異優渥一旦狂圖誤國招祻使君父䝉塵越在沙漠苦寒無人之地一時遺臣賣國降虜之餘接迹於朝靦然相視乃無一人肯奔問官家者公以草野諸生平日未嘗沾一命之祿顧獨奮然出捐軀命請冒鋒鏑斧鑕之威以嘗不測之禍而死守不屈至於十有六年之久卒不汙受僞官爵竟得復持漢節歸見天子其忠義大節終始凛然雖竹帛所書丹青所畫無以過之和議之成雖若不在其身而風喻慫恿蓋亦與有力焉而公不肯自以為功還朝所建皆逺謀至計不欲朝廷遂以目前所就為安而必期有以致中興於異日者此其忠慮之深又與一時貪天之功以為己力而遂宴安江沱以至於忘讎而辱國者蓋萬萬不侔矣上賴太上深照其衷褒嘉賜賚前後甚寵而不幸厄於權臣使不獲申其志以死豈非天哉又曰建紹之間强敵憑陵兩宫隔絶天子不勝晨夕溫凊之念思得忠智敏辨之士往來兵間以通和好而見大夫偷惰畏縮無肯行者獨故魏公良臣與公以諸生自薦慷慨請行擁張蓋旜略相先後卒冒白刃致命北庭魏公尋以不受僞官握節以死而公必以死自誓偶得全璧而歸雖其所值有生死之不同然其捐軀狥國之本志素定於胸中者則未始不同也熹惟二公忠義大節固已載在史册傳之萬世特兩家絶域風霜之舊不可使後之人無聞焉宋名臣言行録續集卷五
