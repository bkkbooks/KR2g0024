body:
  text: 宋名臣言行録續集卷八宋李幼武纂集吕祉字安老建之建陽人宣和三年上舍釋褐主信陽簿未赴中學官改鄧州教建炎初召為審察除詳定一司刪定勑令明年監鼓院除右正言倅明州丐祠紹興初湖南憲尋直祕閣召為淮南宣參除直徽猷辭不行改直龍圖知建康除督參五年召為檢正八月權兵侍兼權戶侍十一月除給事中刑侍督參六年七月遷吏侍七年除兵書仍參議酈瓊叛守節不從遇害年四十六慶元間賜廟額奏曰自古撥亂同於創業創業之君如漢髙唐太是也漢髙任蕭何主管籥給軍食張良侍帷幄運籌䇿韓信則握兵在外唐太時房謀杜斷王魏議論英衛善兵亦各效其力願陛下廣髙祖之大度法太宗之英斷執政大臣因其所長咨訪任使如漢唐諸臣同心協力以濟艱難又曰自古得天下以人心之同失天下以人心之異自王蔡用事異同之論起士大夫雷同相從隨聲是非朋黨之風盛廉恥之道喪望下詔宣德意以鼓動士氣開正路杜私門則中興之業可圖矣中丞張守論張浚不宜西去吕頤浩難以專任移禮侍侍御王庭秀亦論頤浩差除不公罷職與郡公奏曰陛下信任大臣以圖治委曲覆護固為善矣然今日緣論大臣移一言官明日緣論大臣罷一言官則後日大臣行事果有失當誰復敢言願加聖慮務兩全之以協公議論致治之要以聰明為本善持飬之則聰明日益而天下蒙其福不善持養之則聰明日損而天下受其祻持養之道要在有益於聰明者為之有損於聰明者去之公除淮南宣參未至上言今屯兵淮甸表裹雖一而上下不接如人身四體不備今日荆楚之地不可不宿兵以固上遊之勢上納其言會江東謀帥遂用之建康自南渡後率以前執政或侍從為帥至是時有此授公既至對於內殿首論治道之要先自治而後治人兵家之法先為不可勝以待敵之可勝條具十事一曰形勢二曰軍政三曰守將四曰屯田五曰通貨六曰省費七曰謹賞八曰民兵九曰斥堠十曰間諜金若自洛孟渡河入陳蔡則夀春乃要害處也若自京東入淮陽則宿泗濠皆要害處也若自武關入襄鄧順流而下則武昌九江皆要害處也除武昌九江當備水軍戰艦合於沿江措置外要當於諸道要害處堅守蓋金多用詐謀竒計如去嵗遣范瓊世忠行只由一路去已先為彼所料矣彼乃於我軍相近處置虛寨設疑兵却遣輕騎由間道日行數百里使我罔測望風披靡而後大兵襲之要須監此而預為之備若擊其輕騎以挫其鋒則彼自却矣西北以山河為險故山河之表裏當加意焉東南以長江為險故長江之表裏當加意焉自建炎已酉嵗後長江表裹非敵騎蹂踐則賊馬燒殘纍年諸處間有軍馬然上下不接去來無常大非所以一統東南臣前日論之詳矣臣謂關中者天下上遊而江左則下流也上下之勢猶之首尾其中氣脈必相接續豈可一處間斷今欲復關陜必固四川襄陽荆南武昌九江池陽太平建康鎮江皆沿江也當命將分兵戍守使相維持則共奬王室有磐石之固矣公治建康先以彈壓之威繼以拊循之惠軍民畏愛與僚屬文士講求古今防守事迹著東南利害總論江流上下論江淮表裹論建康根本論凡四篇具圖獻於朝所以覽盡內外敷陳條具規模形勢之言也是年冬淮上有警江左戒嚴獨世忠統鋭卒在髙郵虜陷漣水乃破山陽又破旴𣅿遂犯成州公上言宜遣兵援世忠既而援兵不至世忠退保鎮江公再言置江北於度外非朝廷命帥宣撫兩淮之意且恐失中原人心因極陳守禦利害雖當急遣諸將且乞親御六軍庶幾上下協心可以不戰而勝於是降詔親征駕幸平江金已遁去悉如公策人始服焉凡北人不得志於南方而南方所以能立國者惟水軍戰艦是賴多用江南白丁以我所長攻彼所短也蓋水戰必用舟陸戰必用騎舟有舟師南人所長騎有騎士北人所長水戰無舟猶陸戰無騎舟師用北人猶騎士用南人俱非所長也云云今中原失守駐蹕吳會諸將重兵不屯江北而屯江南者特恃大江一水之隔而不思於江流要害處出竒制勝但欲俟其上岸而後擊之殊不知賊巳得險則有必死之志此杜充之兵不戰而潰也今沿江上下要害處亦自有數如使各自為治明逺斥侯則胡馬不復南向矣時論推公疏通練達因命兼權戶侍乃言財為國家先務今一嵗所入不足供一嵗之出臣所憂也然有三説一曰節二曰為三曰得人蓋今日支費百出固有不可節者亦有不可不節者今日利源廢壞固有不可為者亦有不可不為者內自朝廷外至州縣官吏甚衆惟得其人而政以舉則姦無所容利歸公上矣於是節其可節為其可為何患財不裕哉又奏國家養兵仰給東南數路而已取有限之財供無極之費正當講求利害然方今財用悉出民力而邑令乃近民之官也令得人則一邑足守得人則一郡足漕得人則一路足諸路足則朝廷足矣時大臣喜程氏學然瞢真偽且尚勢利故羣小競趍風俗愈壞臣僚論其弊有詔戒諭學者公奏程頤學於中庸以為入德之要是君子之中庸而時中也靖康以來其學頗傳其徒楊時驟躋要近小人歆豔之遂變其巾服更相汲引曰此為伊川之學也其惡直醜正而欲擠排之則曰彼為王氏之學非吾徒也然所謂為伊川之學者類非有守之士夷考其行有市井所不為者是小人之中庸無忌憚者也臣僚所論可謂切理中外交賀以為聖有謨訓使自今學者不迷所向道術裂而復合矣上知公謀慮精審命韓世忠張浚劉光世屯楚泗廬州始用公計將幸建康駕至平江聞劉麟猊率數十萬衆分兩路入冦凶焰甚盛光世退保當塗世忠過淮北久之亦退保山陽於是執政大臣皆請上還臨安且追諸將守江防海公獨抗議士氣當振賊鋒可挫榻前力爭至於再三天意既回遂用公策而執政猶復留身進説云異時誤國雖斬朝錯以謝天下亦將何及宸斷不惑亟命公往視師江上以馳入光世軍中而督遣其進戰也光世尚遲疑不即行公復以利害喻之令其將佐亦皆曉然始悉過江為擊賊計時駐蹕吳門而都督府慮光世難倚辦乃遣殿前楊沂中往泗州與張浚合光世令王德進軍遇劉麟兵敗之翌日又敗之德既再捷氣乃稍振衆皆踴躍赴敵浚遣沂中張宗顔等俱進猊麟敗走中興破賊之功無此之盛也大江之險所當固守守江之策有三節焉江之北出諸江河口一也江之中諸洲渚二也江之南諸口岸三也近嵗守江盡屯江之南諸口岸殊不知江之北出諸江河口一不守則賊船得以出江江之中諸洲渚一不守則賊船得以近岸已酉建康之禍正坐此也臣謂江之北出諸江河口宜築城堡或作水寨列鋭兵施強弩量艤戰艦以拒之使賊船不得出江江之中諸洲渚宜多伏戰艦以待之使賊船雖出江不得近岸江之南列兵戍守多備舟楫以俟濟師得利則進否則堅守而已夫京東全盛之地財賦所出劉豫所恃金所必援也今世忠浚沂中三軍列戍淮東與之相拒如物之有首也大梁者宋之京師劉豫竊據以為根本光世屯淮西嶽飛屯京西與之相拒如物之有左右翼也關中者形勢之國軍馬所聚劉益僭稱留府薩里罕貝勒兵所駐也吳玠與之相拒如物之有尾也物有首首動左右翼隨之然後尾應焉善用兵者無以異此臣以為今日之計當令諸將各張出兵聲勢以牽制使備我者非一其進討也當令世忠浚沂中首先併力以取京東三軍之進又有次第世忠當先渡淮與舟師泝清河水陸並進沂中次之兩軍相繼直趍淮陽彭城於三二十里內擇利地下連珠硬寨不必攻城俟其援至更互出兵擊之我數勝彼數挫則兩城不攻而自下然後引兵襲之張浚一軍却自宿州進與世忠沂中連衡于沂密濟鄆等郡則山東自平矣山東既平大梁必震恐光世嶽飛軍可進矣光世自陳潁進飛自襄鄧進與世忠浚沂中會于京師則京畿定矣京畿既動關中必搖動吳玠之兵可出矣山東既定京畿既定黃河一帶分兵戍列簡其精鋭數路並進以援吳玠則五路可復如是兩河之外忠臣義士奮臂而呼西北諸國聞風而應小小女真烏合之衆患起心腹變生肘腋必有倒戈而攻開門而降者吾之師不待渡河而天下定矣命公往合淝護諸將還朝奏事懇切皆不報留行朝再浹旬上令執政諭旨暫往續有處分復遣中使押賜鞍馬犀帶象笏公拜賜退謂家人曰君命如此義不可辭一死固不惜第恐無益於國妻孥對泣如訣别然以事有牙蘖往不保還也七月除王德都統制酈瓊軍皆盜光世紀律不嚴殊無忌憚所畏者唯德然與之舊皆等伍恥受其節制乃列狀詣都督府訟其過乞回避府謂德直寢之瓊等又詣御史臺或語之曰爾輩如此是訟宰相迹甚危矣遂憂懼不自安復訴於公曰不合激惱朝廷今日未知死所告尚書救取某等公慰諭之曰若以君等為是則大相誑張丞相但喜人向前儻能立功雖有大過彼亦能闊略况此小嫌疑乎當為辨之保無他慮衆皆感泣拜於庭下曰誠如尚書言誓當效死圖報乃密以利害聞于廟堂尋有旨召王德諸將謂德之往必有行遣而公先乞吳錫一軍屯廬州備緩急又遣運判韓璡詣建康而屬之曰諸將反側幸已定矣倘有他議則必愈乖煩賢運判白知丞相時督府機宜蓋諒别因一事過合淝璡問公蓋幕歸去曽一説否公曰亦曽屬渠第恐不敢盡達此意復煩開陳曲折諒果不敢盡言璡行至和州亦以疾作滯留已而諸將聞德留都督府為都統制且賜豫甚厚瓊等皆觖望曰初我訟彼罪也今彼既受賞我必有罰首領不保矣始萌叛意逼公與趙康直北行公猶於馬上諭瓊等無忘國家之恩無失忠孝之道至三塔距淮僅三十里公下馬立棗林下謂曰劉豫逆臣我如何見之此處是我死地更不去也瓊令人縛公上馬公又翻身落地大罵曰我不比你幾個負國賊天地不蓋載我不去又謂其下曰你軍中豈無一箇英雄人劉豫逆臣不要隨酈瓊去從逆不是好事衆皆感傷咨嗟涕泣又有人云吕尚書説得是千餘人環立不行瓊恐搖動衆心生變乃急策馬先渡淮令王師晟尚世元亟害公初王德與酈瓊交惡德乃劉光世愛將遂命德統其軍瓊等大噪列狀詣都督府訟其過德亦交訟乃召德以本軍還為都督府統制命公以都督府參謀領之公簡倨自處將士之情不達淮西轉運韓璡舊在光世幕中光世待之不以禮至是諸校或以罪去公聞瓊等反側密奏乞殿前司吳錫一軍扎廬州以備緩急且遣璡詣建康促之仍乞罷瓊及靳賽軍權書吏漏言於瓊瓊令人遮置郵盡得公所言軍官之罪詰朝諸將晨謁公坐定瓊袖出文書示統制張景曰諸兵官有何罪張統制乃以如許事聞之朝廷耶公見之大驚瓊執之云云令統領尚世元殺公世元以刃刺公且顧統領王師晟師晟不肯公罵瓊不已遂碎首折齒而死時有得公括髮之帛歸吳中者其妻吳氏持之自盡以徇葬聞者傷之公不務保其身而務身盡其節故死之後非特瓊等叛將不能侵邊僭逆之臣不討而自滅雖睿謀有道而公折衝禦侮之狀仗節死義之烈足以激昂人之善意殆不為無補也公為人質直明白好賢疾惡忠言至論未嘗不服也於學唯求實用於文不務空言初除兵侍自草謝表有願為志士殺身以成仁敢效鄙夫既得而患失之句可以見所養也宋名臣言行録續集卷八
