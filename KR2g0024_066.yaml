body:
  text: 宋名臣言行錄外集巻八宋李幼武纂集楊時龜山先生文靖公字中立先世𢎞農五世祖唐末避地閩中寓南劍州將樂縣因家焉熙寧九年中進士第調汀州户不赴乆之調徐州法丁憂服闋改䖍州司法改瀏陽宰除荆州教授遷餘杭宰除南京宗博後宰蕭山主祠差監常州市易務宣和四年以祕書郎召除邇英殿説書靖康初擢右諌議兼祭酒請閑除徽猷直學主祠改待制上即位除工侍兼侍講二年除龍圖直學主祠紹興五年卒年八十三嘉祐中有二程得孟子不傳之學於遺經以唱天下而升堂覩奥號稱髙弟在南方則游定夫謝顯道與公三人是也初授汀户不赴杜門種學渟滀涵浸人莫能測者幾十年燭理精深曉習律令䖍州有疑獄衆所不決者皆立斷宣和間公知時勢將變遂陳政事凡十餘事執政不能用而金人已入冦則又言今日所急者莫大於收人心邉事之興免夫之役毒被海内誤國之罪宜有所歸西城聚歛東南花石其害尤甚宿姦巨猾借應奉之名豪奪民財不可數計天下積怨鬱而不得發幾二十年欲致人和去此三者淵聖嗣位公乞對曰上皇引咎託以倦勤避位而宰執叙遷此何理也城下之盟辱亦甚矣主辱臣死而大臣首為竄亡自全之計陛下何賴焉乞正典刑童貫為三路總帥敵人侵疆棄軍而歸置而不問大河天險棄而不守敵人奄至城下而朝廷不知帥臣失職無甚於此宜以軍法從事防城所仍用閹人提舉覆車之轍不可復蹈淵聖大喜又上疏畧曰河朔朝廷重地三鎮又河朔要藩今一旦棄之與敵以二十州之地貫吾腹中距京城無藩籬之固戎馬疾驅不數日而至非經乆之計也四方勤王之師逾月而後集使之無功而去厚賜之則無名不與則生怨復有急召之宜有不應命者不可不慮也傳聞三鎮欲以死拒之今若以兵躡其後使腹背受敵宜可為也朝廷欲専守和議以契丹百年之好猶不能保況此勁敵乎夫要盟神不信宜審處之無至噬臍尋又言聞金人駐兵磁相刼掠無筭誓書之墨未乾而叛不旋踵肅王初約及河而返今挾之而往此叛盟之大者臣謂宜以肅王為問責其敗盟必得肅王而後已三鎮之民以死拒之於前吾以重兵擁其後必得所欲若猶未從則聲其罪而討之師直為壯是舉也直在我矣於是議者不一終失此機㑹太原諸郡皆告急矣太學生伏闕乞留李綱种師道軍民從之者數萬人執事慮其生亂引髙歡事掲榜於衢且請以禮起邦彦公言士民出於忠憤非有作亂之心無足深罪李邦彦首畫遁逃之䇿捐金割地質親王以主和議罷李綱而納誓書李鄴奉使失辭惟金人是聴此二人者國人所同棄而敷告中外乃推二人平難和議之功非先王憲天自民之意宜收還榜示以慰人心上皆從之或意太學生又將伏闕鼓亂公言諸生欲忠於朝廷耳本無他意但擇老成有行誼者為之長貳即定矣上喜曰此無踰卿者乃命兼祭酒言蔡京以繼述神宗為名實挾王安石以圖身利故推尊安石加以王爵配享孔子廟庭然致今日之病實安石有以啟之也謹按安石為邪説之事姑即一二明之昔神宗稱美漢文罷露臺之費安石乃言陛下若能以堯舜之道治天下雖竭天下以自奉不為過也夫堯舜茅茨土階其稱禹也克儉于家則竭天下者必非堯舜之道後王黼以三公領應奉司號為享上實安石自奉之説有以倡之也其釋鳬鷖之末章則曰以道守成者役使羣衆泰而不為驕宰制萬物費而不為侈按此章正謂能持盈則神祗祖考安樂之無後難耳而安石獨為此説後蔡京輩爭以奢僭相髙輕費妄用窮極滛侈實安石此説有以倡之也其害豈不甚哉乞正其學術之繆追奪王爵明詔中外毁去配享之像遂降安石從祀之列並胡文定撰誌五峯問此章直似迂闊何故載之文定曰此是取王氏肝心底劊子手段何可不書書之則王氏心肝懸在肉案上人人見得而蔽邪滛遁之辭皆破矣又言昔神宗不豫哲宗幼冲宣仁聖烈皇后有㫖令二王非宣召不得入内時王珪首請立延安郡王為皇太子餘人無言者退批聖語在中書仍關實錄院衆臣僉書本末詳具不可誣也元祐中蔡確去其黨始造姦謀冀徼後日之福紹聖初惇卞用事欲報復私怨遂實其説上誣聖母而以大逆之名加王珪以定䇿之功歸蔡確而已亦與焉此非私於確其實自為因以中傷元祐之人耳今乞陛下索紹聖中所修元祐時政記一觀庶以究竟事實昭洗王珪為臣不忠之名追奪蔡確冒受封贈之典濫恩所被悉行改正以釋天下憤鬱之氣上乃詔改宣仁聖烈皇后謗史公天姿夷曠濟以問學充養有道徳器早成積於中者純粹而宏深見於外者簡易而平澹閒居和樂色笑可親臨事裁處不動聲氣與之遊者雖羣居終日嗒然不語接人以和而鄙薄之態自不形也推本孟子性善之説發明中庸大學之道有欲知方者為指其攸趣無所隠也誌公仁厚寛大能容物又不見其涯涘不為崖異絶俗之行以求世俗名譽既舉進士得官聞二程之道即往從之學時從學者甚衆而先生獨歸閒居累年沈浸經書推廣師説窮探力索務極其趣涵蓄廣大而不敢輕自肆也明道在穎昌時公尋醫調官京師因往穎昌從學明道喜甚每言曰楊君最㑹得容易及歸送之出門謂坐客曰吾道南矣先是建州林志寧出入潞公門下求教潞公云此中無以相益有二程先生者可往從之因使人送明道處志寧乃語定夫及公公謂不可不一見也於是同行時謝顯道亦在謝為人誠實但聰悟不及公伊川自涪歸見學者多從佛學獨楊謝不變因歎曰學者皆流於夷狄矣惟有楊謝長進楊時於新學極精今日一有所問能盡知其短而持之大抵支離伯淳常與楊時讀了數篇其後盡能推類以通之伊川語胡文定云楊先生却是聰明過人伊川纔舉起新説有害道處楊節節推出来伊川云楊某煞聰明吕本中云嘗聞於前輩以為明道温然純粹終身無疾言遽色先生實似之上蔡云舊在二程之門者伯淳最愛中立正叔最愛定夫二人氣象亦相似南軒云宋興百有餘年四方無虞有儒生髙談詩書自擬伊傅而實竊佛老之似濟非鞅之術舉世風動雖巨徳故老有莫能燭其姦其説一行而天下紛紛多事反理之評詭道之論日以益熾邪慝相乘卒兆裔夷之禍攷其所致有自來矣先生奏其學繆請追奪王爵罷去配享雖公之説未得盡施然大統中興論議一正到今學者知荆舒禍本而有不屑焉則公之息邪説詎詖行放滛辭以承孟氏者其功顧不大哉公師事二程得中庸鳶飛魚躍之傳於言意之表踐履純固卓然為一世儒宗故見於行事深切著明如此瀏陽畫像記胡文定答陳幾叟書曰某於龜山宣和靖康中諸所建白詳載其本末此是他人不能言而龜山獨能言之又時然後發所以尤可貴也若龜山此舉可謂老婆心切矣世人不察其用心之所在知之者見其赴召則曰此御筆也夫違御筆者以大不恭論自政和末年以来已是海行㫖揮豈可以此定賢者之出處以其不可違而就假有論及申屠蟠笑而不答之事則又何辭以對故其赴召非畏海行㫖揮乃懼天下人在塗炭中而有惻然不忍之心是以不屑去耳又與宰相書曰楊某造養深逺燭理甚明混迹同塵知之者鮮知之者知其文學而已不知者以為蔡氏所引此公無求於人蔡氏焉能凂之上方嚮意儒學延置之經席朝夕咨訪禆補必多程子勸先生勿好著書著書則多言多言則害道學者要當察此曰學者須有所疑乃能進徳然須用力深方有疑今之士讀書為學葢自以為無可疑者故其學莫能相尚語仲素曰時嘗有數句教學者讀書之法以身體之以心驗之從容嘿會於燕閑靜一之中超然自得於書言象意之表六經之義驗之於心而然施之行事而順然後為得今之治經者工無用之文徼幸科第而已果何益哉讀書須先看古人立意所發明者何事不可只於言上求之如萬章問象日以殺舜為事孟子答舜所以處之之道其意在説聖人無偽此則不可不知若從枝葉上理㑹如象欲使二嫂使治朕棲之語此豈可信堯在上豈容有此解經欲得理通而語簡舊嘗解易簡而天下之理得云行其所無事不亦易乎一以貫之不亦簡乎如是則天下之理得矣又曰行其所無事一以貫之直是一个自然之理官司設法賣酒所在張樂集妓女以来小民此最為害教而必為之辭曰與民同樂豈不誣哉夫引誘無知之民以漁其財在百姓為之理亦當禁而官吏為之上下不以為怪不知為政之過也並語錄問龜山何意出来朱子曰他做人也茍且是時未免禄仕故胡亂就之茍可以少行其道龜山之心也然来得已不是及至又無可為者只是説沒𦂳要底事當此之時茍有大力量咄嗟間真能轉移天下之事来得也不枉既不能然又只是隨衆鶻突及欽宗即位為諌議大夫因爭配享事為孫仲益所攻孫言楊某曩與蔡京諸子遊今衆議攻京而楊某曰慎毋攻居安京長子攸龜山遂罷下並朱子語龜山之出人多議之惟文定之言曰當時若能聴用須救得一半此語最當文定云先生誌銘備載所論當時政事十餘條當時宰執中若能聴用委直院輩畫一條具因南郊赦文行下必須救得一半不至如後來大段狼狽也葢龜山當此時雖負重名亦無殺活手段若謂其懐蔡氏汲引之恩力庇其子至有慎勿攻居安之語則誣矣幸而此言出於孫覿人亦不信問伊川門人如此其衆何故後来更無一人見得親切或云㳺楊亦不乆親炙曰也是諸人有首無尾不曽盡心在上面各去奔走仕宦所以不能理㑹得透如康節從頭至尾極終身之力而後得之雖其不能無偏然就他這道理所謂安而成矣如濓溪資稟便髙他也去仕宦只他這所學自是從合下直至後来所以有成某看来這道理若不是􅍆生盡死去理㑹終不解得游楊謝三君子初皆學禪後來餘禪猶在故學之者多流於禪游先生大是禪學必是程先生當初説得太髙了他們只􅷄見上一截少下面着實工夫故流弊至此或謂龜山恐不如此曰只論語序可見龜山天姿髙朴實簡易然所見定更不窮究少年未見伊川時先本看莊列等文字後来此念熟了不覺時發出来游先生尤甚胡文定作龜山墓誌云其似栁下惠看来是如此又云龜山文字却弱似是合下㑹得易龜山立言却是有意含蓄而不盡遂多假借寄託之語殊不快人意問龜山立朝却有許多議論曰龜山雜博是讀多少文字龜山有辨荆公字説三十餘字夫荆公字説其説多矣而止辨三十字何益哉又不去頂門上下一轉語而隨其後屑屑與之辨使其説傳則吾之説不行矣劉安節字元承温州人元符三年擢進士第調越州諸暨簿除萊州教未行改河東提學召對擢監察御史除起居郎遷太常少卿責知饒州移宣州政和五年卒年四十九公天姿近道而敏於學問其所趨尚非世俗所謂學者嘗從當世賢而有道者游始以致知格物發其材沉涵熟復存心養性乆之於是有得其貌温望之知其有容遇人無貴賤小大一以誠雖忤已者未嘗見其有怒色恚辭也召對便殿公言春宫宜謹擇官屬雖左右趨走者必惟其人又論節儉及君子小人和同之異上稱善顧問甚悉知饒州州洊飢公至大發廩振之又檄旁郡無遏糴軍儲不足他日皆強取諸民公曰嵗荒如此重困之可乎他司宜有相通政應調適緩急耳移知宣州去饒州二日民遮留之涕泣不忍别耆老以為吾州自范文正後惟吾劉公而已至宣十日而水大至公分遣其屬具舟振溺而躬督之晝夜不少休所活幾數千人而逺近流民至者以萬數公發廩活之一無失所者鄒公浩以右正言得罪公與其所厚者數輩追路勞勉之朝廷震怒追逮甚力人皆惴恐公獨泰然既而哲宗察其無他有詔釋之而公亦自若也常曰堯舜之道不過孝悌天下之理有一無二乃若異端則有間斷矣其與人游常引其所長而隂覆其不及其所施置常在於公天下以為不如是則非所謂合内外通彼我也所治二州専以仁義教化平易近民民有訟委曲訓戒之問上蔡曰劉子進乎曰未見他有進處問所以不進者何曰只為未有根因指庭前茶䕷曰此花只為有根故一年長盛如一年宋名臣言行錄外集巻八
