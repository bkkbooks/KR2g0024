body:
  text: 宋名臣言行録外集卷十三宋李幼武纂集吕祖謙東萊先生成公字伯恭先河東人後徙夀春六世祖申國文靖公自夀春徙開封今為開封人以祖致仕恩補將仕郎登隆興元年進士第又中宏詞任南外睦宗院宗教丁母憂免喪除太學博召試館職除祕書正字丁父憂免喪主管台州崇道觀召為祕書郎兼國史編修遷著佐再遷大著兼禮郎冬以疾去職先是奉詔編類皇朝文鑑至是書成除直閣主管武夷沖佑觀病間除著作郎不就添差浙東帥議亦不就主管明道宫淳熙八年七月終年四十五嘉泰八年賜諡公之文學術業本於天資習於家庭稽諸中原文獻之所傳博諸四方師友之所講融液無所偏滯晚雖卧疾其任重道逺之意達於家政纎悉委曲皆可為後法史説曰史有二體編年之體始於左氏紀傳之體始於司馬遷其後如班范陳夀之徒紀傳之體常不絶至於編年之體無有能續之者溫公作通鑑正欲續左氏左氏之傳終云智伯貪而愎故韓魏起而亡之左氏終於此故通鑑始於此然編年與紀傳互有得失論一時之事紀傳不如編年論一人之終始編年不如紀傳要之二者皆不可廢韓魏之事溫公論之詳矣今當論看通鑑之法昔陳瑩中嘗謂通鑑如藥山隨取隨得然雖有是藥山又須會採若不能採則不過博聞強記而已壺丘子問於列子曰子好遊乎列子曰人之所遊觀其所見我之所遊觀其所變此可取以為看史之法大扺看史見治則以為治見亂則以為亂見一事則止知一事何取觀史如身在其中見事之利害時之禍患必掩卷自思使我遇此等事當作何處之如此觀史學問亦可以進智識亦可以髙方為有益讀史先看統體合一代綱紀風俗消長治亂觀之如秦之暴虐漢之寬大皆其統體也其偏勝及流弊處皆當考復須識一君之統體如文帝之寬宣帝之嚴之類統體蓋為大綱如一代統體在寬雖有一兩君稍嚴不害其為寬一君統體在嚴雖有一兩事稍寬不害其為嚴讀史自以意會之可也至于戰國三分之時既有天下之統體復有一國之統體觀之亦如前例大要先識一代統體然後就其中看一國之統體二者常相關也既識統體須看機括國之所以盛衰事之所以成敗人之所以邪正於幾微萌芽察其所以然是為機括讀史既不可隨其成敗以為是非又不可輕立意見易出議論須揆之以理體之以身平心熟看參會積纍經厯諳練然後時勢事情漸可識别與張敬夫書略曰從前病痛良以嗜欲粗薄故却欠克治經厯之功思慮稍少故却欠操存澄定之力積蓄未厚而發用太遽涵泳不足而談説有餘與晦翁書曰學者須是専心致志絶利一源凝聚停方始收拾得上晦翁致書曰承喻整頓收斂則入於著力從容遊泳又墮於悠悠此正學者之通患然程子嘗曰亦須且自此去到德盛後自然左右逢其原今亦當且就整頓收斂處著力但不可用意安排等候即成病耳又曰承喻所疑别紙求教然其病在於略知道體之渾然無所不具而不知渾然無所不具之中精粗本末賔主內外蓋有不可以毫髮差者是以其言常喜合而惡離却不知雖文理密察縷析毫分而不害乎本體之渾然也先生答曰所喻誠為至論晦翁再書曰所喻講學克已之功裒多益寡論得恰好然此二字各是一件工夫學者於此須是無所不用其極然後心目俱到無偏倚之患若如來喻便有好仁不好學之蔽矣且中庸言學問思辨而後繼之以篤行程子於涵養進學亦兩言之皆未嘗以此包彼而有所偏廢也先生答曰所喻致知克已不可偏甚善前此多見友朋每較量義理而於踐履處多不檢點故發裒多益寡之論然要如來喻乃完粹耳再書曰杜門進學所造想日深所謂凝聚收斂是大題目此不易之論乃工夫根本又曰伯恭嘗言道理無窮學者先要不得有自足心此至論也贊其畫像曰以一身而備四氣之和以一心而涵千古之祕推其有足以尊主而庇民出其餘足以範俗而垂世然而狀貌不踰於中人衣冠不詭於流俗迎之而不見其來隨之而莫睹其躅矧是丹青孰形心曲惟嘗見之者於此遍復見之焉則不但遺編之可續而已哭之曰天降割于斯文何其酷耶往嵗已奪吾敬夫伯恭胡為又至於不淑耶道學將誰使之振君德將誰使之復耶後生將誰使之誨斯民將誰使之福耶經説將誰使之繼事記將誰使之續耶若我之愚則病將孰為之針而過將孰為之督耶然則伯恭之亡曷為而不使我失聲而驚呼號天而慟哭耶嗚呼伯恭有蓍龜之智而處之若愚有河漢之辨而守之若訥胸有雲夢之富而不以自多詞有黼黻之華而不易其出此固今之所難而未足以議兄之髣佛也若乃孝友絶人而勉勵如弗及恬淡寡欲而持守不少懈盡言以納忠而羞為訐秉義以飾躬而恥為介是則古之君子尚或難之而吾伯恭猶欿然而未肯以自大也蓋其德宇寬洪識量間廓既海納而川停豈澄清而撓濁矧涵濡於先訓紹文獻於故家又隆師而親友極探討之幽遐所以稟之既厚而養之深取之既博而成之粹宜所立之甚髙亦無求而不備故其講道於家則時雨之化進位於朝則鴻羽之儀造辟陳謨則宣公獨御之對承詔奏篇則右尹祈招之詩上方虛心而聽納衆亦注目其敷施何遭時之不遂遽縈疾而言歸慨一卧以三年尚左圖而右書間逍遙以曳杖恍沂上之風雩衆咸喜其有瘳冀卒攄其素藴不則傳道以著書抑亦後來之程凖何此望之難必奄一夕而長終增有邦之殄瘁極吾黨之哀恫嗚呼哀哉我實無似兄辱與遊講摩深切情義綢繆粵前日之枉書尚粲然其手筆始言沈痼之難除猶幸死期之未即中語簡編之次第卒誇草樹之深幽謂昔騰箋而有約盍今命駕以來遊欣此旨之可懷懍訃車而偕至考日月之幾何不旦莫之三四嗚呼伯恭而遽死耶吾道之衰乃至此耶文鑑編得泛然亦見得近代之文如沈存中律厯一篇説渾天亦好文鑑編康節詩不知怎生地那天向一中分造化人從心上起經綸底詩却不編入讀文鑑曰詩好底都不在上面把作好句法又無好句法把作好意思又無好意思把作勸戒又無勸戒觀先生病中日記其翻閲論著固不以一日為懈至於氣候之暄涼草木之榮悴亦必謹焉則其察物內省蓋有非血氣所能移者矣比來不復見伯恭固為深恨然於此得窺其學力之所至以自警省則吾伯恭之不亡者其誨我亦諄諄矣日記跋向見説左氏之書極為詳博然遣詞命意亦頗傷巧矣博雜極害事伯恭日前只向雜博處用功却於要約處不曽子細研究如閫範之作旨意極佳伯恭天姿溫厚故其論平怒委曲之意多伯恭義理太多傷巧未免杜撰伯恭聰明看義理不子細向嘗與校程易到噬嗑卦和而且治處一本作和而且洽字據治字於理為是他硬執要作洽字和已有洽意更下洽字不得緣他先讀史多所以看粗了眼讀書須是先經為本而後讀史問東萊之學曰伯恭於史分外子細於經却不甚理會嘗有人問他忠恕楊氏侯氏之説孰是他却説公如何恁地不會看文字這個都好看來他要説為人謀而不盡心為忠傷人害物為恕恁地時方説不是門人曰他是相戲浙間一種史學故恁地曰史學甚易只是見得淺伯恭之學大槩尊史記不然則與陳同父説不合同父之學正是如此其學合陳君舉陳同父二人之學問而一之永嘉之學理會制度偏考究其小小者惟君舉為有所長若正則則涣然統紀同父則談論古今説王説霸伯恭則兼君舉同父之所長伯恭講論甚好但每事要鶻圇説作一塊又生怕人説異端俗學之非護蘇氏尤力以為爭校是非不如斂藏持養伯恭無恙時愛説史學身後為後生輩糊塗説出一般惡口小家議論賤王尊伯謀利計功更不可聽向見伯恭説少時性氣粗暴嫌飲食不如意便敢打破家事後因久病只將一册論語早晚間看忽然覺得意思一時平了遂終身無暴怒此可為變化氣質法伯恭舊時性極𥚹後因病中讀論語至躬自厚而薄責於人有省遂如此好並晦翁語張栻南軒先生宣公字敬夫魏國忠獻公之嗣子蔭補承務郎紹興間忠獻出督奏公充機宜以軍事入見上異之除直祕閣丁父憂服喪長沙會盜起郴桂帥守劉公珙時問籌䇿還朝極言公學行志業除撫州守未行改嚴州召為吏部員外郎未幾兼侍講尋除左司員外郎守袁州淳熙改元公家居纍年上念公除禁職守靜江經略治聞詔特轉承事郎進直寶文閣再任五年除祕閣修撰湖北運副即知江陵帥本路求間未得而病革且死猶手草遺表寫畢而絶比詔下除右文殿修撰提舉武夷沖佑觀則已不及拜矣淳熙七年二月也享年四十有八嘉泰八年賜諡公生有異質穎悟夙成忠獻愛之自其幼學而所以教者莫非忠孝仁義之實既長命往從胡仁仲之門問程氏學先生一見知其大器即以所聞孔門論仁親切之指告之公退而思若有得也以書質焉而先生報之曰聖門有人吾道幸矣公以是益自奮勵直以古之聖賢自期作希顔録一篇蚤夜觀省以自警䇿所造既深逺矣猶未敢自以為足則又取友四方益務求其所未至蓋玩索講評踐行體驗反覆不置者十有餘年然後昔之所造愈深逺而反以得乎簡易平實之地其於天下之理蓋皆瞭然心目之間而實有以見其不能已者是以決之勇行之力而守之固其所以篤於君親一於道義而沒世不忘者初非有所勉慕而強為之也孝宗即位慨然以奮伐仇敵克復神州為已任起忠獻公都督諸軍事忠獻奏以公書寫機宜文字公時年甫三十內贊密謀外參機務夙夜懍懍直以君父之責為已憂有人所不得而聞者矣間以軍事入見上即進曰陛下上念宗社之讐恥下閔中原之塗炭惕然於中而思有以振之此心之發即天理之所存也願陛下勿怠此心而親賢稽古以廣充之則不惟今日之功可以必成而千古因循之弊亦庶乎其可革矣上異其言忠獻入行相事上時時獨召公入問方略上皇亦召對勞問賜金帶以寵焉忠獻辭位去公亦罷歸用事者遂罷兵與金和金反乘隙縱兵入淮甸中外大震然廟算猶未決至勑諸將無得以兵向敵時忠獻已辭世即草土拜疏言我與金人義不同天日者雖嘗詔以縞素出師而玉帛之使未嘗不躡其後是以和戰之念雜於胸中而至誠惻怛之心無以感格乎天人之際此所以事屢敗而功不成也今雖悉為羣邪所誤以至於此然能以是為監而深察之使我胸中了然無纎介之惑然後明詔中外公行賞罰以快軍民之憤則是乃所以為破敵之一竒也然破敵之後益堅此心誓不言和専務自強雖折不撓使此心純一貫徹上下則遲以嵗月亦何功之不成哉知嚴州陛辭時宰相方籍恢復之説為身謀而其所以為術皆不出於正妄意公素論當與已合數遣人致殷勤公不答見上即言先王之治所以建事立功無不如志以其胸中之誠所以感格天人之心而與之無間也今規畫雖勞而事功不立豈吾日用之間念慮云為之際亦有私意之發以害我之誠者乎誠能克而去之使吾中扄洞然無所間雜則見義必精守義必固天人之應將不旋踵矣然欲復中原之地當先有以得吾民之心而所以得吾民之心者豈有他哉不盡其力不傷其財而已矣宰相方大言敵勢衰弱可圖往責陵寢之故以為兵端士大夫有憂其無備而召兵者皆斥去之於是公見上上曰卿知金人事乎公對曰不知也上曰金人飢饉連年盜賊四起公曰金人之事臣雖不知然境內之事則知之詳矣上曰何事公曰比年諸道嵗飢民貧而國家兵弱財匱小大之臣又皆誕謾不足倚仗正使彼實可圖臣懼我之未足以圖彼也上為默然久之公遂言曰陵寢隔絶誠臣子不忍言之至痛今不能正名仗義以將天討而欲以卑詞厚禮求之其屈甚矣而異論者猶以為憂雖其不知大義之所存無足深責然意其亦有以見我之未有必勝之形而不能不憂也夫必勝之形常在於早正素定之時而不在於兩陳決機之日為今之計但當下哀痛之詔明復讎之義顯絶金人不與通使然後修德立政用賢養民選將帥練甲兵通內修外攘進戰退守為一事又且必治其實而不為虛文使必勝之形隱然在目則雖三尺童子亦且奮躍而爭先矣尚何異論為過計之憂哉上為歎息褒諭以為前未始聞此論也一日奏事上問天公進對曰不可以蒼蒼者便為天當求諸視聽言動之間一念才是便是上帝鑒觀上帝臨女簡在帝心一念才不是便是上帝震怒公寢疾微吟云舍瑟而作敢忘事上之忠鼓缶而歌當盡順終之理疾革定叟求教公曰朝廷官爵莫愛他底一朋友求教力疾謂之曰蟬蛻人欲之私春融天理之妙將死自作遺表曰再世蒙恩一心報國大命至此厥路無由猶有微誠不能自已伏望陛下親君子逺小人信任絶一已之偏好惡公天下之見永清四海克鞏丕圖臣死之日猶生之年表來上邸吏以庶僚不得上遺表却之卒四日上乃聞之公為人坦蕩明白表裏洞然詣理既精信道又篤其樂於聞過而勇於徙義則又奮厲明決無毫髮滯吝意以至疾病垂死而口不絶吟於天理人欲之間則平日可知也故其德日新業日廣而所以見於論説行事之間者上下信之至於如此雖小人以其好惡之私或能壅塞於一時然至於公論之久長蓋亦莫得而掩之也公之教人必使之先有以察乎義利之間而後明理居敬以造其極其剖析精明傾倒切至必竭兩端而後已所為郡必葺其學於靜江又特乘暇日召諸生告語不倦民以事至庭中者亦必隨事教戒而於孝悌忠信睦姻任恤之意尤孜孜焉世俗鬼神佛老之説必屏絶之獨於社稷山川古先聖賢之奉為之兢兢雖法令所無亦以義起其水旱禱祠無不應也平生所著書唯論語説最後出而洙泗言仁諸葛忠武侯傳為成書其他如書詩孟子太極圖説經世編年之屬則猶欲稍更定焉而未及也然其提綱挈領所以開悟後學使不迷於所鄉其功則已多矣蓋其常言有曰學莫先於義利之辨而義也者本心之所當為而不能自已非有所為而為之者也一有所為而為之則皆人欲之私而非天理之所存矣烏乎至哉言也其亦可謂廣前聖之所未發而同於性善養氣之功者歟靖康之變國家之禍極矣小大之臣奮不顧身以任其責者蓋無幾人而其承家之孝許國之忠判決之明計慮之審又未有如公者雖降命不長不克卒就其業然其志義偉然死而後已則質諸鬼神而不可誣也朱子述行狀後嘗曰廷對須是直言蓋士人初見君又此是第一步此時可欺則是無往而非欺須是立得腳步是當曰天下之事莫大於賢者不肯為則必有小人乘間攘臂而為之此天下之禍所從起也如本朝熙豐之初役法當革也科舉當變也冗官當去也神宗皇帝慨然欲更張之而當時諸老大臣皆以為不可神宗不快於心一旦王介甫以為可以必更於是小人乘間用事而天下之禍從此起矣人言東漢之亡黨錮促之也曽不知東漢若無數君子其亡也尤速譬如羸病之服丹一旦死則歸罪於丹不知其所以能延數日之命者丹之力也使其不服丹則其死必速矣答鄭自明書云天理難窮資質難恃工於論人者察已常疏闊狃於訐直者所發多弊病讀經書須平心易氣涵泳其間若意思稍過當亦自礙却正理要切處乃在持敬若専一工夫積纍多自然體察有力只靠言語上苦思未是也晦翁致書略曰某切覸所存大抵莊重沉密氣象有所未足以故所發多暴露而少含蓄此殆涵養本原之功未至而然以此慮事吾恐視聽之不能審而思慮之不能詳也近年見所為文多無節奏條理又多語學者以所未到之理此皆是病理無大小小者如此則大者可知矣願深察此言朝夕點檢絶其萌芽勿使能立則志定慮精上下信服其於有為事半而功倍矣事之有失人以為言固當即改然亦更須子細審其本末然後從之為善向見舉措之間多有以一人言而為之復以一人言而罷之者亦太輕矣從之輕則守之不固必矣贊其畫像曰擴仁義之端至於可以彌六合謹善利之判至於可以析秋毫拳拳乎其致主之功汲汲乎其幹父之勞仡仡乎其任道之勇卓卓乎其立心之髙知之者識其春風沂水之樂不知者以為湖海一世之豪彼其揚休山立之姿既與其不可傳者死矣觀於此者尚有以卜其見伊吕而失蕭曹也耶哭之曰惟公家傳忠孝學造精微外為軍民之所屬望內為學者之所依歸治民以寬事君以敬正大光明表裏輝映自我觀之非惟十駕之弗及蓋未必終日言而可盡也顧聞公之臨絶首以納忠召賔佐而與訣委符節而告終蓋所謂得正而斃者又凜乎其有史魚之風此猶足以為吾道而增氣抑又可以上悟於宸聰又曰嗟惟我之與兄吻志同而心契或面講而未窮又書傳而不置蓋有我之所是而兄以為非亦有兄之所然而我之所議又有始所共向而終悟其偏亦有蚤所同擠而晚得其味蓋紛紛往反者幾十餘年末乃同歸而一致云云兄喬木之故家我衡茅之賤士兄髙明而宏博我狷狹而迂滯故我常謂兄宜以是而行之當時兄亦謂我盍以是而傳之來裔蓋雖隱顯之或殊實交須而共濟不惟相知之甚審抑亦自靖而無愧吕東萊哭之曰某昔以郡文學事公於嚴陵聲同氣合莫逆無間自是以來一紀之間面講書請區區一得之慮有時自以為過公矣及聞公之論綱舉領挈明白嚴正無繳繞回互激發偏倚之病然後釋然心悅爽然自失邈然始知其不可及此某所以願終身事公而不去者也其天姿澀訥交際酬酢心所欲言口或不能發明獨與公合堂同席之際傾倒肝肺無所留藏意所未安辭氣徑切反類世之強直者亦不自知其所以然夫豈士為知已盡自應爾歟我行天下愛而忘其愚亦有不減公者矣內反諸心豈敢負之乃獨勇於此而怯於彼抑有由也蓋公孳孳求益敦篤懇惻有以發其𡨕頑勇於改過奮厲明決有以起其緩縱而不立已不黨同胸懷坦然無復隔閡雖平生退縮固滯之態亦不掃而自除也使我常得從公豈無分寸之進使公以愛我之心充而廣之馴致於以虛受人之地公天下之身受天下之善行為社稷生民福孰可限量耶嗚呼公今其死矣亦無所復望雖然有一于此公在生之義上通于天養其志承其業油油翼翼左右彌縫不以存歿為二者公之事親也念大恩之莫報咎誠意之未孚雖身在外心靡不在王室鞠躬盡瘁唯力是視不以逺近為間者公之事君也義理之大一識所歸永矢靡他至於參觀遍考公而且博未嘗如世俗學士先生之言行曖曖昧昧不復廣求其進學之力不以在亡為勤惰者公之事師也公之此心蓋未嘗死我雖病廢猶有尊足者存亦安知不能追申徒而謝子産耶申徒事見莊子內篇五申徒嘉兀者也尊足事乃叔川無趾並見上晦翁序其文曰公自幼壯不出家庭而固已得夫忠孝之傳既又講於五峯之門以會其歸則其所以默契於心者人有所不得而知也獨其見於論説則義利之間毫釐之辨蓋有出於前哲之所欲言而未及究者措諸事業則凡宏綱大用巨細顯微莫不洞然於胸次而無一毫功利之雜是以論道于家而四方學者爭向往之入侍經帷出臨藩屏則天子亦味其言嘉其績且將倚以大用而敬夫不幸死矣云云敬夫天姿甚髙聞道甚蚤其學之所就既足以名於一世然察其心蓋未嘗一日以是而自足也比年以來方且窮經會友日反諸心而驗諸行事之實蓋有所謂不知年數之不足者是以其學日新而無窮其見於言語文字之間始皆極於髙逺而卒反就於平實此其淺深疏密之際後之君子其必有以處之矣敬夫見處卓然不可及從遊之久反復開益為多但其天姿明敏從初不厯階級而得之故今日語人亦多失之太髙敬夫髙明他將謂人都似他才一説時便更不問人曉會與否且要説盡他個某則性鈍讀書極辛苦故尋常與人言多不敢過為髙逺之論敬夫大聰明看道理不仔細敬夫最不可得聽人説話便肯改敬夫見識髙却不耐事伯恭耐事却有病敬夫見識純粹踐行純實使人望而敬之敬夫學問愈髙所見卓然議論出人意表近讀其語説不覺胸中灑然誠可歎服並晦翁語宋名臣言行録外集卷十三
