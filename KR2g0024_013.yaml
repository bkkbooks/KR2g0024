body:
  text: 宋名臣言行錄後集巻三宋朱子纂集文彦博潞國忠烈公字寛夫汾州人中進士第事仁宗英宗神宗哲宗位至丞相除太尉以太師致仕公幼時與羣兒擊毬一兒擊毬入柱穴中不能取公以水灌之毬浮出司馬温公幼與羣兒戱一兒墮大水甕中巳沒羣兒驚走不能救公取石破甕兒得出識者知二公之仁智不凡矣聞見後錄寳元中河東闕漕使堂上議難得可任者章郇公言聞搢紳間説文彦博者磊落有稱吕許公曰恨不識也可召來面詢之明日召至堂上退許公歎曰此大有福人何所任用不可遂自殿中侍御史差委明年就遷待制不出十年出將入相趙萊公錄公在成都米價騰貴因就諸城門相近院凡十八處減價糶賣不限其數張榜通衢米價遂減前此或限升斗以糶或抑市井價直適足以増其氣燄而終不能平其價乃知臨事須當有術也東齋記事公知益州喜遊宴嘗宴鈐轄廨舍夜久不罷從卒輒拆馬庌為薪不可遏軍校白之座客股栗公曰天實寒可拆與之神色自若飲宴如故卒氣沮無以為變記聞樞宻直學士明鎬討貝州久未下上深以為憂問於兩府叅知政事文彦博請自往督戰八年正月丁丑以彦博為河北宣撫使監諸將討貝州時樞宻使夏竦惡鎬凡鎬所奏請多從中沮惟恐其成功彦博奏今在軍中請得便宜從事不申覆上許之公至貝與明鎬督諸將築距闉以攻城旬餘不下有牢城卒董秀劉炳請穴地以攻城公許之貝城南臨御河秀等夜於岸邉穿穴棄土於水晝匿穴中城上不之見也久之穴成自教塲中出秀等以褐袍塞之走白公選取敢死二百命指使將之銜枚自穴入有虞候楊遂請行遂白軍士中有病欬者數人不可去請易之從之既出穴登城殺守者埀絙以引城外人城中驚擾遂生擒王則記聞知永興軍起居舎人毋湜鄠人也至和中湜上言乞廢陜西鐡錢朝廷雖不從其鄉人多知之争以鐡錢買物賣者不肯受長安為之亂民多閉肆僚屬請禁之彦博曰如此是愈使惑擾也乃召絲絹行人出其家縑帛數百匹使賣之曰納其直盡以鐡錢勿以銅錢也於是衆知鐡錢不廢市肆復安記聞至和初陳恭公罷相並用文富宣麻之際上遣小黄門密於百官班中聽其議論二公久有人望一旦復用朝士相賀黄門具奏上大恱予為學士後數日奏事埀拱殿上問新除彦博等外議如何余以朝士相賀為對上曰古之君用人或以夣卜茍不知人當從人望夢卜豈足憑耶故余作文公批答云永惟商周之所記至以夢卜而求賢孰若用搢紳之公言從中外之人望者具述上語也歸田錄公為相因進對言嘗聞徳音以搢紳多務奔競非裁抑之無以厚風俗莫若稍旌恬退之人則躁競者自知愧恥乃薦王安石韓維張瓌皆擢用焉龎籍時為樞使公與之同議省兵汰為民者六萬減廪給之半者又二萬唐介為御史論公専權植黨交結宫禁仁宗怒召二府示之疏唐公語益切樞副梁公適叱唐公下殿詔送臺劾之公獨留再拜曰御史言事職也願不加罪於是唐公既貶公亦罷相其後公再入相首薦唐公復召用焉嘉祐元年正月甲寅朔上御大慶殿朝㑹百官就列既巻簾上暴感風眩之疾僅能成禮而罷巳未契丹使者入辭置酒紫宸殿上疾又作左右扶入禁中公召内侍都知史志聰鄧保吉問上至禁中起居狀志聰等對以禁中事嚴宻不敢泄公怒叱之曰主上暴得疾係社稷之安危惟君軰得出入禁闥豈可不令宰相知天子起居欲何為者耶自今疾勢小有増損必一一見白仍命直省引至中書取軍令狀志聰等素謹愿及夕諸宫門白下鎻志聰曰汝曹自白宰相我不受任其軍令兩府謀以上躬不寜欲留宿宫中而無名辛酉公建議設醮祈福於大慶殿兩府晝夜焚香設幄宿於殿之西廡志聰等白故事兩府無留宿殿中者公曰今何論故事也戊辰以後上神思浸清罷醮兩府始分畨歸第不歸者各宿於其府記聞熈寜二年公為樞使陳升之拜相以公宗臣詔升之位公下公言國朝樞使無位宰相上者獨曹利用嘗在王曽張知白上卒取禍敗臣忝文臣粗知義理不敢紊亂朝著上從之日錄慶州軍亂二府入議公曰朝廷施為務合人心以静重為先不宜偏聴陛下即位以來厲精求治而人情未安者更張之過耳祖宗法未必不可行但有廢墜不舉之處耳王荆公曰所以為此將以去民之害何為不可若萬事隳頺如西晉風兹乃益亂也蓋荆公知公言為巳發故力排之韓魏公留守北京李稷以國傅為漕頗慢魏公魏公不為較待之甚禮俄公代魏公為留守未至揚言云李稷之父絢我門下士也聞稷敢慢魏公必以父死失教至此吾視稷猶子也果不悛將庭訓之公至稷謁見坐客次久之公着道服出語之曰而父吾客也只八拜稷不獲巳如數拜之聞見錄公判北京有汪輔之者新除運判為人辯急初入謁公方坐㕔事閲謁置案上不問入宅久之乃出輔之巳不堪既見公禮之甚簡謂曰家人頃令沐髮忘見運判勿訝輔之沮甚舊例監司至之三日府必作㑹公故罷之輔之移文定日檢按府庫通判以次白公公不荅是日公家宴内外事並不許通輔之坐都㕔吏白侍中家宴匙鑰不可請輔之怒破架閤庫鎻亦無從檢按也宻劾公不治神宗批輔之所奏付公有云侍中舊徳故煩卧䕶北門細務不必勞心輔之小臣敢爾無禮將别有處置公得之不言一日㑹監司曰老謬無治狀幸諸君寛之監司皆愧謝因出御批以示輔之輔之皇恐逃歸託按部逃出未㡬罷嗚呼神宗眷遇大臣沮抑小人如此可謂聖矣聞見錄元豐三年王堯臣子同老言至和三年仁宗不豫内外寒心先臣叅預朝政與文富請立英宗為嗣大計遂定㑹公來自北都過闗入覲神宗以問公對曰自至和以來中外之臣乞立皇嗣者甚衆臣等雖有請事未果行至嘉祐末琦等卒就大事蓋琦等功也於是手詔中書曰彦博蓄徳深厚善不自伐懐此大功絶口不言中外搢紳莫有知者今縁故臣子明其父勲始得本末乃知援立之功厥有攸在遂加公河東永興節度使公復力辭宴餞瓊林輔臣皆預兩遣中謁者遺詩以寵其行有報在不言之語當世榮之元豐間公以太尉留守西京未交印先就第廟坐見監司府官唐叅政介之子義問為運判退謂其客尹渙曰先公為臺官嘗言潞公今豈挾為恨邪當避之渙曰公所為必有理姑聽之明日公交府事以次見監司府官如常儀或以問公公曰吾未視府事三公見庶僚也既交印河南知府見監司矣義問聞之復謂渙曰㣲君殆有失於潞公也一日公謂義問曰仁宗朝先叅政為臺官以言彦博謫彦博亦罷相判許州未㡬彦博復召還相位即上言唐某所言正中臣罪召臣未召唐某臣不敢行仁宗用彦博言起叅政判潭州尋至大用與彦博用執政相知為深義問聞公之言至感泣自此出入公門下後薦以為集賢殿修撰帥荆南公之徳度絶人如此聞見錄元豐五年公以太尉留守西都時富韓公以司徒致仕公慕唐白樂天九老㑹乃集洛中公卿大夫年徳髙者為耆英㑹以洛中風俗尚齒不尚官就資聖院建大厦曰耆英堂㑹閩人鄭奐繪像堂中時富公年七十九文潞公與司封郎中席汝言皆七十七朝議大夫王尚恭年七十六太常少卿趙丙秘書監劉几衛州防禦使馮行巳皆年七十五天章閣待制楚建中朝議大夫王慎言皆年七十二大中大夫張問龍圖閣直學士張燾皆年七十時宣徽使王拱辰留守北京貽書潞公願預其㑹年七十一獨司馬温公年未七十潞公素重其人用唐九老狄兼謩故事請入㑹温公辭以晚進不敢班文富二公之後公不從令鄭奐自幕後傳温公像又之北京傳王公像於是預㑹者凡十三人公以地主攜妓樂就富公宅作第一㑹至富公㑹送羊酒不出餘皆次為㑹洛陽多占名園古刹有水竹林亭之勝諸老鬚眉皓白衣冠甚偉每宴集都人隨觀之潞公又為同甲㑹司馬郎中旦程大中珦席司封汝言皆丙午人也亦繪像於資聖院其後司馬温公與數公又為真率㑹有約酒不過五行食不過五味唯菜無限楚正議違約増飲食之數罰一㑹皆洛陽太平盛事也洛之士庶又生祠潞公於資聖院温公取神宗送公判河南詩𨽻于榜曰竚瞻堂塑公像其中冠劍偉然都人事之甚肅聞見錄公之在朝契丹使耶律永昌劉霄來聘軾奉詔舘客與使者入覲望見公殿門外却立改容曰此潞公也耶所謂以徳服人者問其年曰何壯也軾曰使者見其容未聞其語其總理庶務酬酢事物雖精練少年有不能及貫穿古今洽聞强記雖専門名家有不逮使者拱手曰天下異人也公歸洛西羌首領有温谿心者請於邉吏願獻良馬於公邉吏以聞詔聴之東坡集元祐初起公平章軍國重事召程正叔為崇政殿説書正叔以師道自居每侍講色甚莊繼以諷諌上畏之公對上恭甚進士唱名侍立終日上屢曰太師少休公頓首謝立不去時年九十矣或謂正叔曰君之倨視潞公之恭議者以為未盡正叔曰潞公三朝大臣事幼主不得不恭吾以布衣為上師傅其敢不自重吾與潞公所以不同也識者服其言聞見錄至和中陳執中為相臺官趙抃等言執中無材行不可任歐陽脩亦上書請退執中議久不决左右怪仁宗少遊燕黙有所思焦勞見於色居月餘如此因問上曰陛下得非思代陳執中者乎上曰然左右乃曰代執中者易得耳何至此耶上曰此老子却可慢人久之始用文富代之朝議皆謂得人數日問歐陽脩脩具以朝議為對上曰彦博有才然膽大弼前在政府甚好今復來恐多顧慮良久又曰弼前深為人所中傷今來亦焉能不顧慮然不若守前志不變也既而彦博恐不能謹畏後因郭申錫李傪争塞河事彦博意有所左右上由此罷之弼亦竟以多顧慮少所建明皆如上所料南豐雜識公謂予言初及第授大理評事知絳州翼城縣未赴任有客李本者三見訪而後得見之且言本有壻為縣廵檢幸公庇之又曰本非獨奉干亦有以奉助本嘗知其邑户口衆人猾難治因出一策文字皆景跡人姓名其首姓張比公至姓張人事巳敗縣未能給正簿尉皆云某等在此各嵗餘豈無過失為此人所持幸君之來必辨之矣於是公盡得其姦狀上于州决配之邑人皆悚畏記事趙槩康靖公字叔平應天府人中進士第事仁宗英宗神宗位至叅政公與歐陽脩同在舘及同脩起居注槩性重厚寡言脩意輕之及脩除知制誥是時韓范在中書以公為不文乃除天章閣待制公澹不以屑意及韓范出乃復除知制誥㑹脩甥嫁為脩從子晟妻與人淫亂事覺語連及脩脩時為河北轉運疾韓范者皆欲文致脩罪云與甥亂上怒羣臣無敢言者槩乃上書言脩以文學為近臣不可以閨房曖昧之事輕加汚衊臣與脩踪跡素踈脩之待臣亦薄所惜者朝廷大體耳書奏上不恱人皆為之懼公亦澹然如平日久之脩終坐降為知制誥知滁州執政私曉譬槩令求出廼出知蘇州遭喪去官服闋除翰林學士槩復表讓以歐陽脩先進不可超越奏雖不報時論美之記聞㑹郊祀當進階封且任一子京官公乞以封母郡太君宰相謂公曰方為學士擬封不久矣公曰母年八十二朝夕不可期願及今以為榮許之後遂以為例改知審賢院判秘閣與髙若訥同判流内銓若訥言往嘗知貢舉聞母病不得出㡬不能生公矍然即請郡以便親宰相謂旦夕為學士可少待也公不聴遂除蘇州以太子少師致仕居睢陽十五年猶以讀書著文憂國愛君為事集古今諌諍為諌林一百二十巻奏之上甚喜賜詔曰大夫請老而去者皆以聲迹不至朝廷為髙得卿所奏書知有志愛君之士雖退休山林未嘗一日忘也當置座右以時省閲並蘇内翰傳神道碑吳奎文肅公字長文濰州人舉五經又舉賢良方正事仁宗英宗神宗位至叅政始公少為吏晝則治公事夜輒讀書不寐者二十餘年劉貢父撰墓誌公始對策極論内降恩澤之為蠧政也及在諌官遂専以禁切左右御史有言事非其實者詔詰問從誰受公對言御史擇於風聞以言事朝廷用之救過失使其擇之不詳朝廷能容容之不能罪之可也若求主名則後莫有以告御史者矣是自蔽塞其耳目也上立罷不問奉使契丹彼中羣臣為其主加稱號謁公使入賀公自以使事有職賀無預也不為往北主畏其守義甚重之並墓誌神宗問政府地震之變曽公曰隂盛上曰誰為隂曽公曰臣者君之隂婦者夫之隂夷狄者中國之隂皆宜戒之上問公公曰但為小人黨盛耳上不懌韓魏公嘗云吳長文有識方天下盛推王安石以為必可致太平唯長文獨語所知曰安石心强性狠不可大用後果如所言别錄張方平文定公字安道宋城人中茂才異等及賢良方正直言極諌科事仁宗英宗神宗位至叅政以太子少師致仕公年十三入應天府學頴悟絶人家貧無書常就人借三史旬日輒歸之曰吾巳得其詳矣凡書皆一閲終身不再讀屬文未嘗起草宋綬蔡齊見之曰天下竒才也共薦之通判睦州時趙元昊欲叛而未有以發則為嫚書求大名以怒朝廷規得譴絶以激使其衆公以謂朝廷自景徳以來既與契丹盟天下忘備將不知兵士不知戰民不知勞蓋三十年矣若驟用之必有喪師蹶將之憂兵連民疲必有盜賊意外之患當含垢匿瑕順適其意使未有以發得嵗月之頃以其間選將厲士堅城除器為不可勝以待之雖元昊終於必叛而兵出無名吏士不直其上難以决勝小國用兵三年而不見勝負不折則破我以全制其後必勝之道也方是時士大夫見天下全勝而元昊小醜皆欲發兵誅之惟公與吳育同議議者不勝察以二人之論為出於姑息遂決計用兵天下騷動公獻平戎十策宰相吕夷簡見之謂宋綬曰君能為國得人矣然不果用其策元昊叛禁兵皆西而諸路守兵多㨂赴闕郡縣無備乃命調額外弓手公在睦州條上利害八事及是有㫖遣使於陜西河東京東西路刺弓箭手為宣毅保捷指揮公連上疏争之甚力不從所刺兵二十餘萬人皆市人不可用宣毅驕甚所至為冦自是民力大困國用一空識者以不從公言為恨元昊叛陜西四路置帥夏竦為總帥居長安不臨邉公為諌官言竦端坐長安未嘗臨敵諸路失律一皆不問有總師之名無總師之實乞據四路敗事加以責罸而罷總帥傳四路帥臣自任戰守之計從之龍川志慶厯元年西方用兵巳六年矣上既厭兵而賊亦困弊不得休息耕牧虜中疋布至十餘千元昊欲自致其道無由公慨然上疏曰陛下猶天地父母也豈與此犬豕豺狼較勝負乎願因今嵗郊赦引咎示信開其自新之路申敕邉吏勿絶其善意若猶不悛亦足以怒我而曲彼雖天地鬼神必將誅之仁宗喜曰是吾心也命公以疏付中書吕夷簡讀之拱手曰公之言及此是社稷之福也是嵗赦書開諭如公意明年十月始請降前三司使王拱辰請𣙜河北鹽既立法矣而未下公見上問曰河北再𣙜鹽何也仁宗驚曰始立法非再也公曰周世宗𣙜河北鹽犯輒處死世宗北伐父老遮道泣訴願以鹽課均之兩税而弛其禁世宗許之今兩税鹽錢是也豈非再𣙜乎仁宗大悟曰卿語宰相立罷之公曰法雖未下民巳户知之當直以手詔罷不可自有司出也仁宗大喜命公宻撰手詔罷之河朔父老相率拜迎於澶州為佛老㑹者七日以報上恩且刻詔書北京至今父老過其下必稽首流涕自陜右用兵公私困乏公言自祥符以來萬事惰弛務為姑息漸失祖宗之舊取士任子磨勘遷補之法既壊而任將養兵皆非舊律國用既窘則政出多門大商姦民乗隙射利而茶鹽香礬之法亂矣此治亂盛衰之本不可以不急治且比年以來朝廷頗引輕嶮之人布之言路違道干譽利口為賢内則臺諌外則監司下至吏胥僮僕皆可搆危其上自將相公卿宿貴之人皆争屈體以收禮後軰有不然者則謗毁隨之惴惴焉惟恐不免何暇展布心腹為國立事哉此風不革天下無時而治也並墓誌張公安道嘗為予言道非明民將以愚之國朝自真宗以前朝廷尊嚴天下私説不行好竒喜事之人不敢以事摇撼朝廷故天下之士知為詩賦以取科第不知其他諺曰水到魚行既以官之不患其不知政也昔之名宰相皆以此術馭天下仁宗初年王沂公吕申公為政猶持此論自設六科以來士之翹秀者皆争論國政之長短二公既罷則輕鋭之士稍稍得進漸為竒論以撼朝廷朝廷往往為之動摇廟堂之淺深既可得而知而好名喜事之人勝矣申公雖復作相然不能守其舊俗意雖不喜而亦從風靡矣其始也范諷孔道輔范仲淹三人以才能為之稱首其後晏元獻為政鄭公入參政多置諌官以廣上聴上方嚮之而晏公深為之助乃用歐陽脩余靖蔡襄孫沔等並為諌官諌官之勢自此日横鄭公尤傾身下士以求譽相師成風上以謙虚為賢下以傲誕為髙於是私説遂勝而朝廷輕矣然予以張公之論得其一不得其二徒見今世朝廷輕甚故思曩日之重然不知其敝也大臣恣為非横而下無由能動其害亦不細也使丁晉公之時臺諌言事必聴巳若仁宗中年其敗巳久矣至於申公非諸公並攻其短其害亦必有甚者蓋朝廷之重輕則不在此誠使正人在上與物無私而舉動適當下無以議之而朝廷重矣安在使下不得議哉下情不上通此亦人主之深患也可則從之否則違之豈害於重哉西漢之初専任功臣侯者如絳灌之流不可謂不賢至使賈誼董仲舒皆至死不得用事偏則害生故曰張公得其一不得其二也龍川志移鎮西蜀始李順以甲午嵗叛蜀人記之至是方以為憂而轉運使攝守事西南夷有卭部川首領者妄言蠻賊儂智髙在南詔欲來冦蜀攝守大驚調兵築城民大驚擾朝廷發陜西步騎戍蜀兵仗絡繹於道詔促公行公言南詔去蜀二千里安能為智髙冦我哉此必妄也臣當以静鎮之道遇戍卒兵仗輒遣還入境下令卭部川曰冦來吾自當之妄言者斬悉歸所調兵罷築城之役㑹上元觀燈城門皆通夕不閉蜀遂大安巳而得卭部川之澤人始為此謀者斬之梟首境上西南夷大震先是朝廷獲智髙母子留不殺欲以招智髙至是乃伏法復以三司使召還奏罷蜀横賦四十萬蜀人至今紀之知秦州時亮祚方驕僣閲士馬築堡篳篥城之西壓秦境上屬户皆逃匿山林公即料簡將士聲言出塞實按軍不動賊既不至言者因論公無賊而輕舉宰相曽公亮曰兵不出塞何名為輕舉有備而賊不至則以輕舉罪之邉臣自是不敢為先事之備矣英宗不豫召公賜坐出書一幅八字曰來日降詔立皇太子公抗聲曰必頴王也嫡長而賢請書其名上力疾書以付公墓誌上將召用介甫公言安石言偽而辨行偽而堅用之必亂天下由是介甫深怨之記聞知陳州時方置條例司行新法率欲以豊財而强兵公因陛辭極論其害皆深言危語曰水所以載舟亦所以覆舟兵猶火也不戢當自焚若行新法不巳其極必有覆舟自焚之憂上雅敬公不甚其言曰能少留乎曰退即行矣上亦悵然延和殿賜坐問祖宗禦戎之策孰長公曰太祖不勤逺畧如夏州李彛興靈武馮暉河西折御卿皆因其酋豪許以世襲故邉圉無事董遵誨捍環州郭進守西山李漢超保闗南皆十餘年優其禄賜寛其文法而少遣兵諸將財力豊而威令行間諜精而審吏士用命賊所入輒先知併兵禦之戰無不克故以十五萬人而獲百萬之用終太祖之世邉鄙不聳天下安樂及太宗平并州欲逺取幽薊自是嵗有契丹之虞曺彬劉延謙傅潛等數十戰各亡士卒十餘萬又内徙李彛興馮暉之族致繼遷之變三邉皆擾而朝廷始旰食矣真宗之初趙徳明納欵及澶淵之克遂與契丹盟至今人不識兵革可謂盛徳大業矣祖宗之事大畧如此亦可以監矣近嵗邉臣建開拓之議皆行險僥倖之人欲以天下安危試之一擲事成則身䝉其利不成則陛下任其患不可聴也並誌故事嵗賜契丹金繒服器召二府觀焉公以宣徽使與召衆謂天子脩貢為辱而陛下神武可一戰勝也公獨曰陛下謂宋與契丹凡㡬戰勝負㡬何兩府八公皆莫知也神宗以問公公曰宋與契丹大小八十一戰惟張賢齊大原之戰才一勝耳陛下視和與戰孰便上善之談叢自王安石為政始罷銅禁奸民日銷錢為器邉闗海舶不復議錢之出故中國錢日耗而西北南三虜皆山積公極論其害請詰問安石舉累朝之令典所以保國便民者一旦削除之其意安在師征安南公以謂舉西北壯士健馬棄之南方其患有不可勝言者若老師費財無功而還則社稷之福也公自念將老無以報上論事益切至論用兵起獄尤為反覆深言曰老臣且死見先帝地下有以藉口矣上為感動至永樂之敗頗思其言並誌宋名臣言行錄後集巻三
