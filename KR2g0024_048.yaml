body:
  text: 宋名臣言行錄别集下巻三宋李幼武纂集張浚魏國忠獻公字徳逺唐張九臯之後六世祖徙居綿竹中政和八年進士第調山南府士曹調褒城令辟熈河路察幹調恭州録何㮚薦召為審察除太常簿光堯即位除密院編修改虞部員外郎殿中侍御史遷侍御建炎三年以母在逺乞外補除集撰知興元知禮侍召對又除御營參軍同節制平江常秀江隂軍馬除知密院詔充川陜宣撫處置使加通奉大夫二年加檢校少保定國軍節度使四年二月本官提舉洞霄福州居住尋以資學提舉萬壽兼侍讀召知密院江上視師尋除宣奉大夫尚書右僕射同中書門下平章事兼密院都督諸路軍馬紹興初除金紫光禄大夫七年加特進辭九月得請授觀文大學士提舉興國言落職以朝奉大夫祕書監分司西京永州居住九年二月大赦復宣奉提舉洞霄復資政大學士知福州兼帥十一月除檢校少傅崇政軍節度使充萬壽觀使免朝請十二年封和國公十六年秦檜怒論罷以特進提舉興國連州居住二十年九月移永州二十五年復觀文殿大學士判洪州已在苫塊矣三十一年令湖南路任便居住十月復觀文大學士判潭州改建康兼畱守四月被㫖兼措置兩淮尋兼節制建康鎭江江池江隂軍屯駐軍馬孝宗即位召除少傅江淮宣撫使進封魏國公隆興初除樞使開都督府三月召降授特進宣撫江淮八月復都督號十二月拜右僕射兼樞使仍都督二年四月除少師保信軍節度使判福州除醴泉觀使二十六日薨贈太保加贈太師公甫冠預計偕入上庠及第調褒城令辟熈河路幹辦公到官徧行邊壘覽觀山川形勢時猶有舊日戍守將公悉召與握手飲酒問祖宗以來守邊舊法及軍陣方略之宜盡得其實故公起自疎逺一旦當樞筦之任悉通知邊事本末蓋自此也淵聖皇帝召涪陵處士譙定至京師將處以諫職定以所言不用力辭杜門不出公往見至再三問所得於前輩者定告公但當熟讀論語公自是益濳心於聖人之微言浚乞於沿江置强弩營選州禁兵縣弓手為之浚為平江府秀州控扼副使時苗劉赦書至平江浚即走介入杭問賊狀至江寧頥浩寓書於浚約共起兵鄭㲄亦遣所親謝嚮微服至平江見浚令嚴備而緩進浚慮苗傅等兵上抵平江則失枝梧乃令張俊先遣精兵二千扼吴江於是浚上表大略言國家多難正人主馬上圖治之時願請睿聖不憚勤勞親總要務復與二兇咨目且欲得辯士往説之使無他圖浚與蜀人馮轓有舊遣之見二兇為陳逆順先是二兇以書詆浚曰伊周之事非侍郎孰能當之浚復書略曰自古言涉不順謂之指斥乘輿事渉不順謂之震驚宫闕上春秋鼎盛一旦遜位似非所宜天祐我宋所以保佑聖躬者歴歴可考出質則虜人欽畏而不敢畱奉使則百姓謳歌而有所屬天之所興誰能廢之二兇得書言浚見詆以逆賊内不能堪朱勝非恐生他變乃奏貶浚彬州安置時兩宫音問幾不相通太后遣小黄門至睿聖宫白上曰張浚不得已貶彬州上方啜羮不覺羮覆於手頥浩自江寧至浚乘小舟迓之於郵中得堂帖乃貶命浚恐將士觀望即袖之語書吏云有㫖趣赴行在令申巳發之日是夜共宿城外頥浩呼其屬李承造草檄文浚為潤澤之諸將皆謂賊窮則邀駕入海浚又遣陳思恭等治舟師於海道以遮賊南遁於是傳檄内外勤王之師五萬發平江至秀州夜有刺客至帳前浚顧左右已睡問爾欲何為對曰某粗讀書知逆順豈為賊用況侍郎忠節安忍相害但見為備不嚴恐後有來者浚下執其手問姓名曰言之是徼利某河北人有母在今徑歸矣浚翌日取郡獄死囚斬以徇曰此刺客也後亦無他二兇聞勤王師來甚恐轓知可動乃白勝非曰張侍郎以國步艱難正當馬上治之主上傳位幼子恐有不測之變主上受淵聖詔為兵馬大元帥嗣聖易稱皇太姪太母埀簾聽政大元帥總兵征伐於外此最得策遂拉二兇同議都堂初浚戒轓乞以鉄劵賜二兇用釋其疑轓遂奏太后許之議遂定癸卯詔百官赴睿聖宫奏請人皆歡呼以為復辟丁未駕還行宫衆情大恱尋除苗劉為淮西制置使副時浚兵次臨平苗翊以重兵禦之戰敗走傳正彥遣兵援之不能進是夕遂開湧金門出遁浚等引勤王兵入都城人聳觀以手加額浚既見上召至禁中謂曰隆祐皇太后知卿忠義欲一識卿靣適埀簾見卿自庭下過矣浚惶恐謝上欲倚浚為相浚辭以晚進不敢當以浚知樞密院事時浚年二十三國朝執政自冦準以後未有如浚之年少者上問浚以方今大計浚請身任陜蜀之事置司秦川而別委大臣與韓世忠鎭淮東令吕頥浩扈駕來武昌張浚劉光世從行庶與秦川首尾相應上許之乃以浚為川陜等路宣撫處置使川陜京西湖南北為所部上親書御製中和堂詩賜浚曰願同越勾踐焦思先吾身其卒章曰髙風動君子属意種蠡臣初金冦京東命范瓊禦之瓊領兵轉入江西至召入見不肯釋兵且乞除殿前司職事公奏瓊大逆不道上以其事付公公退與劉子羽謀夜鎖吏於公府中作文字皆備偽遣張俊以千人渡江若捕他盜者因召俊瓊劉光世赴都堂計事俊將衆甲以來瓊從兵滿堦意象自若食巳子羽坐廡下遽取勑黄紙詣前麾下曰有勑將軍可詣大理置對公數瓊罪瓊愕然遂以俊兵擁縛付大理使光世出撫其衆以八字軍付王彥餘兵分𨽻御營衆軍頃刻而定賜瓊死浚發行在賜度僧牒二萬紫衣師號五千為軍費時劉錫趙哲皆在浚軍浚辟劉子羽傅雱馮康國王彥何佯甄援與俱康國將行往别臺諌趙鼎謂之曰元樞新立大功出當川陜半天下之重自邊事外悉當奏稟蓋大臣在外忌權太重也浚至襄陽畱二十餘日召帥守監司令預備儲峙以待上西幸時程千秋王擇仁之軍咸在及諸盜之來降者凡數萬人浚謂襄陽乃衿喉之地因薦千秋為京西制置假以便宜許之久任自属郡守貳以下皆得誅賞浚至漢中乃上奏曰漢中實天下形勢之地號令中原必基於此謹於興元積粟理財以待巡幸願陛下早為西行之計前控六路之師後據兩蜀之粟左通荆襄之財右出秦隴之馬天下大計斯可定矣浚承制以趙開為隨軍轉運浚知開有心計開言蜀民巳困惟𣙜利尚有贏餘於是大變酒法自成都始眀年遂徧四路尋變鹽法置合同塲收引税錢與茶法大抵相類而嚴密過之來者無所施其巧浚至秦川置司節制五路諸帥纔數日即出行闗陜移環慶帥王似知成都府而以武臣趙哲代之於是參議軍事劉子羽薦涇原都監吴玠浚與語大悦拔為統制官又以其弟小使臣璘領帳前親兵浚言大食獻珠玉已至熈州上諭大臣曰大觀以來川茶不以博馬惟市珠玉故武備不修今若捐數十萬緡易無用珠玉曷若惜財以養戰士遂命宣撫司無得受量賜以答其意薩里罕及哈芬等冦邠州浚遣統制曲端拒之兩戰皆捷至白店原薩里罕乘髙望之懼而號哭金人因目曰啼哭郎君遂引去浚上疏言陛下果有意於中興非幸闗陜不可願先幸鄂渚臣當糾率將士奉迎鸞輿永為定都大計上不許浚聞金大入冦上浮海東征亟治兵入衛至襄漢知金退乃還先是宰執登舟奏上上曰張浚措置陜西極有條理吕頥浩曰陛下雖失之杜充復得之張浚上曰浚自薦辛興宗作秦帥比至陜西見孫渥材優則奏罷興宗而用渥蓋其用心公也浚之西行也上命浚三年而後用師至是達蘭及烏珠皆在淮東約秋髙入冦浚聞烏珠躊躇淮上必再犯東南議出師攻取以分其勢士大夫多以為不可浚皆不聽劉子羽爭之曰相公不記臨行天語乎浚曰事有不可拘者假如萬一有前日海道之行變生不測吾儕雖欲復歸陜西號令諸將其可得乎子羽議遂塞浚乃決策治兵移檄河東問罪復永興軍金大懼遂調烏珠自京西令星馳至陜西與羅索等合而浚亦劄諸路兵合四十萬約日㑹于耀州以與金戰浚既定議出師募客將士皆心知其非而口不敢言上亦以金萃兵淮上命浚出兵分道由同州鄜延以擣其虚浚乃檄召諸路各以兵㑹合六路兵四十萬人馬七萬以劉錫為統帥諸軍行至富平縣將戰詐立曲端旗以懼金金帥羅索曰彼紿我也浚時已罷端兵柄安置萬州癸亥羅索擁兵驟至輿柴囊土藉淖平行進薄吾營錫等與之戰劉錡身率將士殺敵頗衆勝負未分而金鉄騎出不意直擊環慶軍他路兵無與援者㑹趙哲離所部哲軍望見塵起驚遁諸將軍亦退金遂乘勢而前富平戰敗諸軍還浚至彬州召錫等計事浚立堂上諸將立堂下浚問誤國有大事誰當任其咎者衆皆言環慶軍先走浚命擁趙哲斬之哲不伏且自言有復辟功浚親校以撾擊其口斬于堠下軍士為之喪氣浚遂以黄榜放諸軍罪哲已死諸將聽令浚命各歸本路歇泊令方脫口諸路之兵已行俄傾皆盡浚率帳下退保秦州於是陜西人情大震浚以闗陜失律上章待罪上謂宰執曰張浚放罪詔須早降因言浚用曲端趙哲劉錫見其過即重譴之浚未有失焉可罷也李囘曰須得勝浚者方可易上曰有才而能辦事固不少若孜孜為國無如浚者亦有人言其過朕皆不聽命放罪浚聞金入徳順軍遂移司興州惟親兵千餘人自隨其属官皆懼有建言不當逺去請築青陽潭左右四闗六屯浚以為然乃遣子羽單騎至秦州訪諸將所在時金兵四出道阻不通將士無所歸忽聞子羽在近宣撫司畱蜀口乃各引所部來㑹凡十數萬人軍勢復振浚哀死問傷録善咎巳人情粗安金破福津蹂同谷迫武興浚遂保閬州令劉子羽於闗外調䕶諸軍子羽頗得衆心又總領趙開兼都漕號善理財不加賦于民而軍用足浚承制以王庶知興元府時興元帥事草創倉廩乏絶師徒寡弱庶募民教之河東陜西潰師多舊部曲往往來歸不數月有衆二萬初浚以曲端在陜西屢嘗挫敵欲仗其威聲乃辟充本部統制端登壇將士歡聲如雷先是朝廷以曲端欲殺王庶疑其有反心遂以御營使司提舉官召之端疑不行議者喧言端反浚入辭獨以百口保之及端有白店原之敗庶乘此譖之呉玠亦以彭衙之敗憾端乃書曲端謀反四字於手心因侍浚立舉以示浚浚素知端庶不可並立且方倚玠為用恐玠不自安庶等知之即言端嘗作詩題柱有指斥乘輿之意曰不向闗中興事業却來江上泛魚舟此其罪也浚乃送端恭州獄有武臣康隨者在鳳翔嘗以事忤端端鞭其背有切骨恨浚以隨提㸃䕫州路刑獄端聞之曰吾其死矣呼天者數聲端有馬名鐵象日馳四百里至是連呼鐵象可惜者數聲乃赴逮既至隨命獄吏縶之維之糊其口熁之以火端乾渇而死士大夫莫不惜之軍民亦皆悵恨西人以是益非浚焉西事記曰浚之為人忠有餘而才不足雖昧於知人短於用兵而清修篤慎有志天下古人不能過也復果斷敢為諸將亦莫敢桀驁端初為五路統制拜威武將軍屢與金人角更勝迭負西人以為能然心常少浚浚乃廢之又曰使端不死一日得志逞其廢辱之憾一搖足則秦蜀非朝廷有雖殺之可也初烏珠駐兵於熈河秦雍至是相繼移塞欲窺蜀公令呉玠於鳳翔府之和尚原先處戰地誘致其來烏珠乃引衆十餘萬造浮橋於寶雞縣渡渭來犯玠遣吴璘雷仲率諸將選勁弓强弩分番迭射號駐隊矢接發不絶且繁密如雨敵稍却則以竒兵分繫斷其糧道又劫破金寨與之戰凡三十餘陣烏珠中箭而遁俘其將英格貝勒及酋領三百甲軍八百殺賊衆横屍滿野是役也烏珠往返萬里始末三年其衆損者踰半皆呻吟扶携以歸烏珠初有從馬數百至是僅留其六道由平陽府偽守蕭慶以三馬奉之於是北歸燕山西事記曰浚之敗賴吴玠獨全一軍據和尚原以守金人屢攻之不能克後大破虜軍殺其酋帥人疑不實蓋陜西之敗皆浚為之然金人不能取蜀亦其用玠之力也先是宰執奏浚今居閬為水運以給西軍上曰朕料浚必能立功宰執退至省未食而浚和尚原捷報已至乃相與歎仰聖眀知人善料敵如此既而浚以功除定國軍節度職仍舊公上言已運米五萬石至荆南欲理川口與行在相接上謂宰執曰兩日前言者猶請遣人副浚朕謂委之不專難以責成公在闗陜凡事雖以便宜行之然於鄉黨親舊之間少所假借於是士大夫有求於宣司而不得者始起謗議於東南朝廷疑之將召歸先為置副乃以王似為川陜等路宣撫處置副使詔與浚相見同治事浚尋上疏言鎭重寛厚於民不擾似之所長至於駕馭將帥裁處機事不為身謀似恐未可仗且外而劉子羽呉玠之徒與虜為仇内而張深程唐日夜謀議皆嘗立破虜之功各望照知寖加任使今一旦以無功侍從驟處副任人情謂何臣慮子羽之徒必自引去而似之庸常終至敗事臣等日夜治兵亦欲奉迎大駕以福中原而或者相為朋黨求撓臣權在臣去就甚輕而國家之計恐有未便詔知樞密院張浚罷宣撫處置令赴行在尋詔浚有大功久勞於外令學士院降詔先是監廣州鹽税呉伸上疏大畧謂浚忠有餘而智不足且復辟之功大失地之罪小天下之人所共知之其退保四川敵人卒未能下蓋亦浚之功也切見里巷㳺談咸曰張浚之來章疏列上必於失地之外吹毛求疵增其過惡使浚不至則必曰慢而不恭有違命之罪至則必曰覆軍之將有失地之罰將羣起而攻之必使罪去而後已使浚罪去不知誰可繼其忠乎御史常同辛炳俱有論列疏入不報浚既入見遂赴密院治事浚之出使也嘗以秦川館為學舍以待河北陜西之士來歸者給衣食養之又新復諸郡乞鑄印浚巳去朝廷逺亦先鑄給而後奏聞又浚之還取道東蜀䕫峽其至稍遲臺臣辛炳言浚被命宣撫不能成功輕失五路坐困四川用劉子羽輩皆小人而殺曲端趙哲為無辜以至設祕閣以崇儒擬尚方而鑄印及被召不肯出乞黜責浚遂落職奉祠炳等復交論浚跋扈不臣之罪大於是詔浚福州居住即日如福州從者皆去肩輿才兩人而已浚雖得罪猶上疏論金偽暫和其心必未已大略謂此敵情狀專以和議誤我亦云久矣彼勢促則言和勢盛則復肆前後一轍願陛下蚤夜深思益為備具處將士家屬於積粟至安之地使出而戰守者無反顧奔散之憂精擇竒才以撫川陜之師使積年屯邊者無懈惰懷望之意江淮川陜互為牽制斥逺和議用集大業竊見主兵官除吴玠王彥闗師古外如呉璘楊政可統大兵田晟可總一路王宗尹王喜等可為統制後皆有聲世服其能知人初浚知金無西顧憂必併力窺東南朝廷巳議講解乃極言其狀及劉麟引金兵入冦上思浚前言之驗而趙鼎亦乞召浚既入見遂命知樞密院浚請遣岳飛渡江入淮西以牽制金兵之在淮東者從之上曰君臣之間當至誠相與勿事形迹庶可同心叶徳以底於治朕於二三大臣當分委以事張浚專治軍器胡松年專治戰艦浚曰仁宗時亦嘗令韓琦范仲淹分事而治言者數以為辭不旋踵報罷上曰今日若不專責事無由集國用亦須委一大臣松年曰議論既定力行之必有效若今日行眀日罷徒紛紛無益耳松年時僉書樞密院事詔浚視師江上浚疾驅臨江召大帥韓世忠張浚劉光世與議且勞其軍將士見浚來勇氣十倍浚部分諸將遂留鎭江節度之魏良臣等自北軍囘浚遇之問以金事及大帥之語良臣謂金有長平之衆且出大言謂當割建州以南王爾家為小國索銀絹犒軍其數十萬仍約良臣等再使浚密奏不可以其言而動及不須令再往浚在鎭江時烏珠擁兵十萬於淮陽世忠移書與之為言張樞密已在此矣初金諜報浚得罪逺貶故悉力來冦至是烏珠問世忠所遣麾下王愈吾聞張樞密貶嶺外何得已在此愈出浚所下文書烏珠見浚書押色動即强言約日當戰浚再遣愈以世忠書往問戰期愈囘一日而金宵遁士馬乏食狼狽死者相属遣諸將追擊所俘獲甚衆浚奏捍賊次第且言相持已久恐其别生姦計巳與諸將議凡可以尅敵者無不為也上曰浚措置如此虜必不能遽為衝突參政沈與求曰晉元帝時石勒冦壽春相持三月晉臣至有勸降勒者王導拒之虜今逺來久相持非其利也上曰朕得浚何愧王導以趙鼎張浚為左右僕射浚仍兼都督諸路軍馬初浚在川陜念上繼嗣未立以紹興元年秋上奏曰荷陛下恩徳之厚事有千於宗廟社稷大計臣知而不言誰敢為陛下言者惟陛下察其用心貸以萬死竊見西漢之制人君即位首建儲嗣所以固基本屬人心臣願陛下特召大臣講眀故事仍先擇宗廟之賢優禮厚養以為藩屏至是入謝復陳宗廟大計莫先於儲嗣雖陛下聖徳昭格春秋方盛必生聖子惟所以係天下人不可以不早定議上首肯久之乃云宫中見養藝祖之後二人長者年九嵗不久當令就學浚出見鼎都堂相與仰歎聖徳自是鼎益相勉勵同志協謀以為為治之要必以正本澄原為先務誠能陳善閉邪使人君無過舉則國勢奠安醜虜自服是以進見之際於塞倖門抑近習尤諄切致意焉浚復奏事因書王朴平邊策以獻又奏臣昨奉清光竊見陛下於君子小人之分聖意拳拳於此宗社生靈之福也昔唐李徳裕言正人如松栢特立不倚邪人如藤蘿非附他物不能自起臣嘗推類而言之君子小人見矣小人在位則同於已者譽之以為君子異於已者排之以為小人不顧公議不恤治亂不畏天地鬼神彼其專於自營進身之計故好惡不公以至於亡身亡國亂天下而莫之悔惟陛下親學問節嗜慾清眀其躬以照臨百官則君子小人之情狀又何隠焉浚至鎮江視師召韓世忠親諭上㫖使舉軍前屯楚州以撼山東世忠欣然承命浚遂至建康撫張俊軍至太平州撫劉光世軍軍士無不踴躍思奮浚以諸路軍馬所用錢糧當從督府總制故悉以上佐兼之仍闗送尚書指揮行府闗三省指揮始此浚謂湖冦楊么據洞庭實為上流不先去之為腹心害將無以立國請自行上許焉初席益得么探者數百人皆傳致逺縣浚至醴陵召囚問之盡釋其縛給以文書俾分示諸寨令早降皆歡呼而往㑹岳飛兵至復令分屯鼎澧益陽壓以兵勢至是降賊將楊欽乘勝急攻水寨么窮蹙赴水死湖冦悉平得丁壯五六萬人老弱十餘萬浚一以誠信撫之乃更易郡縣奸贓吏宣布寛恩命岳飛進屯荆襄以窺中原浚率官屬泛洞庭而下浚自湖南轉由兩淮㑹諸將議防秋至是入見上勞勉之賜賚甚厚親書否泰二卦以賜浚浚奏自古小人傾陷君子莫不以朋黨為言夫君子引其類而進志在於天下國家而已其道同故其所趨嚮亦同曾何朋黨之有惟小人則不然更相推引本圖利禄詭詐之蹤莫可跡究故或為小異以彌縫其事或内外符合以信實其言人主於此何所決擇而可哉則亦在夫原其用人而已臣嘗考泰之初九拔茅茹以其彚征而象以為志在外蓋言其志在天下國家非為身故也否之初九拔茅茹以其彚征而象以為志在君則君子連類而退蓋將以行善道而未始忘憂國愛君之心焉觀二爻之義而考其心則朋黨之論自不攻而破矣臣又觀否泰之理起夫人君一心之微而利害及於天下百姓方其一念之正其畫為陽泰自是而起矣一念之不正其畫為隂否自是而起矣然而泰之上六隂已盡復變為陽則君子在外而否之所由生焉否之上九陽已盡復變為隂則小人在外而泰之所由生焉當今時適艱難民墜塗炭陛下若能日新其徳正厥心於上臣知其將可以為泰矣異時天道悔禍幸而康寧則願常思其否焉上嘗召對便殿問所宜為且命以所聞見置策來上浚承命條例以進號中興備覽凡四十一篇莫不備具上深嘉歎置之座隅自渡江以來三衙名存實亡逮公與趙鼎並相乃以楊沂中所將𨽻殿前司解潛部曲𨽻馬軍司統制官顏漸部曲𨽻步軍司沂中之軍本辛永宗部曲後又益以他兵故其衆特盛潛之軍纔二千餘漸所統烏合之兵而已時以雪寒命賑濟上謂公曰朕居燠室尚覺寒細民甚可念若湖南江西旱灾去處宜旱措置賑濟公曰陛下推是心以往則足以感召和氣況實恵乎上曰朕每以事機難眀專意精思或逹旦不寐公曰雜聽則易惑多畏則易移以易惑之心行易移之事終歸於無成而已以陸下聰眀茍大義所在斷以力行夫何往而不濟臣願萬機之暇澄心静氣保養天和庶幾利害紛至而不疑中興之業可成矣浚以金勢未衰而劉豫復據中原為謀叵測奏請親行邊塞分命諸將以觀機㑹上乃令浚往視師浚即張榜聲豫僭逆之罪時韓世忠駐軍承楚劉光世屯太平州張俊屯建康府而岳飛在鄂州朝論以為邊防未備空缺之處尚多浚獨謂楚漢交兵之際漢駐兵殽澠間則楚不越境而西蓋大兵在前雖有他岐捷徑敵人畏我之議其後不敢踰越而深入故太原未陷則尼瑪哈之兵不復濟河亦以此爾不然環數千里之地盡以兵守之然後可安乎上深以為然初言屯田者甚衆而行之未見其效至是公兼領屯田以出始置官屬凡所行之事皆畫一而去公至江上㑹諸大帥議事乃命世忠自承楚以圖淮陽命劉光世屯廬州以招北軍張俊練兵建康為進屯盱眙之計楊沂中領精兵為後翼岳飛進屯襄陽以窺中原於是國威大振上御書裴度傳遣使賜公以示至意公於諸大帥中獨稱世忠與飛可屬以大事時劉豫頗於偽境聚衆世忠自楚州引兵渡淮擊敗之直至淮陽而還上賜公手書曰世忠既㨗整軍還屯進退合宜不失事機亦卿指授之方卿更審虚實徐為後圖或遣岳飛一窺陳蔡使賊支吾之不暇也初公在淮上謀渡淮北向惟倚世忠為用世忠辭以兵少欲摘張俊之將趙密為助以行府檄俊俊拒之謂世忠有見吞之意公奏乞降聖㫖而俊亦稟于朝鼎白上曰浚以宰相督諸軍若號令不行何以舉事俊亦不可拒乃責俊當聽行府之命不應上稟於朝復下浚一面專行不必申眀慮失機事時議者以為得體公又渡江撫淮上諸屯屬方盛暑公不憚勞人皆感悦時防秋不逺公以方略諭諸帥太抵先圖自守以致其師而後乘機擊之上謂宰執曰近日金星犯畢占法邊有敗兵當諭與張浚令諸帥戒守邊者天既有象須修人事以應之公謂東南形勢莫重於建康實為中興根本且使人主居此則北望中原常懐憤惕不敢自遐自逸而臨安僻居一隅内則易生安肆外則不足以號召逺近係中原之心遂奏請聖駕以秋冬臨建康撫三軍而圖恢復時韓世忠自淮陽已還楚州張俊既城盱眙進屯泗州岳飛亦遣兵至蔡州焚其積聚至是公承詔入覲力請上進臨建康以為不可緩然朝論者極鮮惟上斷然不疑㑹牒報豫有南窺之意公復往江上視師劉豫聞上將親征告急於金主求兵為援金主聽豫自行至是分道入冦先是劉麟令鄉兵偽胡服於河南諸處十百為羣人皆疑之以為金偽合兵而至公奏金方疲於奔命決不能悉大衆復來此必皆豫兵而邊報不一劉光世奏禦賊事宜謂廬州難守張俊駐軍泗州亦請益兵衆情恟懼議欲移盱眙之屯退合淝之戍召岳飛盡以兵東下公獨以為不然乃以書戒俊及光世曰賊豫之兵以逆犯順若不勦除何以立國平日亦安用養兵為今日之事有進擊無退保而趙鼎折彥質皆移書抵公欲飛兵速下且擬條畫項目請上親書付公大略欲退師還江南為保江之計不必守前議於是世忠統兵過淮遇敵騎與額哩頁貝勒等力戰既而亦還楚州或請上回臨安公奏若諸將渡江則無淮南而長江之險與敵共之淮南之屯正所以屏蔽大江使賊得淮南因糧就運以為家計江南其可保乎今淮西之冦正當合兵掩擊況士氣甚振可保必勝若一有退意大事去矣又岳飛一動則襄漢有警復何所制願朝廷勿專制于中使諸將不敢觀望上乃手書報公近以邊防所疑事咨卿今覽所奏甚眀俾朕釋然無憂非卿識髙慮逺出人意表何以臻此公奉此詔異議乃息時劉光世舍廬州而退公怪之即星馳至采石遣人喻其衆曰若有一人渡江即斬以徇且督光世復還廬州光世遣王徳領兵至前羊市遇劉麟游兵敗之而賊衆數十萬已次於濠壽之間張俊拒之楊沂中為俊統制公即遣沂中至濠州與俊合且使謂之曰上待統制厚宜及時立大功或有差跌浚不敢私又遣張宗顏等自泗州來為其後繼猊以衆數萬欲犯建康沂中悉衆以出縱大軍乘之大破賊衆横屍滿野京東虜騎尋亦退走朔方大恐上以手書賜公曰賊雛犯順侵壽及濠卿奬率師徒臨敵益壯遂使凶渠宵遁同惡自焚寤寐忠勤不忘嘉歎仍令浚具上都督府隨行官吏軍兵推賞公言賞或濫加則將士解體遂惟保奏有功者浚還平江隨班入見力請幸建康且言天下者陛下之天下陛下自不致力以為之先則人有解體之意日復一日終以削弱異時復詔巡幸其誰信之何哉彼知以此為避地之計無意以圖天下故也中原遺民有自汴都來者言劉豫自猊麟敗後意沮氣喪其黨皆携貳虜中謂豫必不能立國而民心日望王師之來朝廷因是遂謀北伐公乃出行淮上撫諸軍且築廬州城五月還初以道君皇帝逺在沙漠公奏遣問安使何蘚往金國通問至是還始知道君及寧徳皇后已相繼上仙公遂奏臣近得此信不勝痛憤願陛下剛徤有為成敗利鈍在所不恤況孝悌可以格天推此心行之臣見其福不見其禍也公專任國政首言親民之官治道所急而比嵗内重外輕遂條具郡守監司省郎館閣之人迭補之法以郡守監司有治狀者除郎官郎曹資淺者除監司郡守館職未歴民事者除通判仍乞降詔又以太陽氛氣四合奏復賢良方正科皆從之乘輿發平江至建康幾事叢委公獨以身任之人情賴公以安每見必深言讐恥之大反復再三上未嘗不改容流涕時天子方勵精圖治事無巨細必以咨之賜諸將詔往往命公草之四方灾異必以聞祥瑞皆抑不奏上謂宰執曰昨日張浚呈馬因為區别良否皆不差浚曰臣聞陛下聞馬足聲而知良否上曰然浚曰物猶易知惟知人為難上曰人誠難知上曰邊事未靖軍需取於諸路者尚多斯民重困它日兵寢當一切蠲之雖常賦亦與除一二年朕之此心天實臨之浚曰聖意如此天必助順宰執奏事浚因論淮西地險可守陳與義曰見王徳淮西圖路幾不可方軌上曰地形雖險亦在將兵者如何耳李左車謂井陘之道車不得方軌騎不得成列而韓信卒由井陘以破趙是險不足恃也浚等歎服初公自淮西歸與趙鼎同在相位以招徠賢才為急務從列要津多一時之望人號為小元祐又以人主當務講學以為修身致治之本薦尹焞置之講筵有㫖促召赴闕㑹旱灾及酈瓊之變公力求去而周祕等交章論之遂罷職奉祠祕等復論公跋扈不臣等罪大乞逺竄上批浚散宫安置領表鼎營救之甚力且以公母老為請上意稍解遂命分司居永州初朝廷命趙鼎出使如公故事將行鼎言陛下建炎中遣張浚出使川陜國勢百倍於今浚有補天浴日之功陸下有山河之誓君臣相信古今無二而終致物議以被竄逐夫喪師失地浚則有之然未必如言者之甚也大抵專黜陟之典受不御之權則小人不安其分謂爵賞可以茍求一不如意便生觖望是時蜀士至於醵金募人詣闕訟之以無為有何以自眀故有志之士欲為國立功者每以浚為戒且浚有罪臺諌論之可也人主誅之亦無憾也今乃下至草澤行伍凡有求於浚而不得者人人投牒醜詆及其母妻甚者指為跋扈抑何甚哉時以金國使來講和大赦浚在永州上言金自宣和以來挾詐反覆非可結以恩信者借令金國有故上下紛雜天屬盡歸河南遂復數年之後人情益解士氣漸消彼或内變既平指瑕造隙肆無厭之欲發難從之請其將何辭以對自堯舜以來非兵無以立國未聞委質夷狄可以削平禍難逺而石晉近而叛豫著人耳目歴歴可想前後凡五上疏爭之公知福州之眀年奏言臣切念自羣下決回鑾之計國勢不振事機之㑹失者再三向使虜還梓宫歸兩殿供須一無所請宗族隨而盡南則我徳虜必深和議不拔人心懈怠國勢寖微異時釁端卒發何以支持幸今虜懷反覆士氣尚可作人心尚可囘願因權制變轉禍為福用天下之竒才據天下之要勢奪敵之心振我之氣措置一定大勲可集繼聞淮上有警連以邊計奏知又條畫海道舟船利害上嘉公之忠遣中使奬諭公時大治海舟至千艘為直指山東之計以俟朝命又眀年春獻緡錢六十萬助軍費詔奬之浚在宫觀因天申節繳奏無逸篇疏畧曰伏考周公無逸篇商王中宗髙宗周文王非徒自享安榮而有國長久自祖甲之後立王生則逸是以罔或克壽仰惟聖徳日新大孝之誠昭格天地壽福無疆宜過商宗周王甚逺公念檜欺君誤國使災異數見彗出西方欲力論時事以悟上意又念太夫人計氏年髙言之必被禍恐不能堪太夫人覺公形瘠問故公具言所以太夫人誦先雍公咸紹聖初舉科制策曰臣寧言而死于斧鉞不忍不言而負陛下至再三公意遂決乃言曰當今時勢譬若養大疽於頭目心腹之間不決不止決遲則禍大而難測決速則禍輕而易治惟陛下斷之於心謹察情偽豫備倉卒庶幾社稷有全安之理不然異時以國與敵者反歸罪正議此臣所以食不下咽而一夕不能安也檜見之大怒命臺諫論公章四五上以特進提舉江州太平興國宫連州居住公在連作四徳銘以示其人曰忠則順天孝則生福勤則業進儉則心逸連人相與鐫之於石家傳人誦焉公去國至是幾二十年退然若無能者而天下士大夫無賢不肖皆傾心徤將悍卒見之者必咨嗟歎息下至兒童婦女亦知有張都督每使者至虜必問公今安在和議定時國書中有不得輒易大臣之語葢檜恐公復用也尤忌公甚令臺臣王珉徐嚞每彈事必及公至目為國賊必欲殺之又令張柄知潭州汪君錫為湖南提舉以圖公又令張常先為江西運判箋注張宗元與公壽詩亦與獄株連及公又捕趙鼎子汾下大理令自誣與公等謀大逆獄上而檜病不能書矣檜既死上始親庶政公復官判洪州時喪母將歸𦵏行至江陵㑹以星變詔求直言公乃復奏大略謂向者講和陛下以太母為重爾幸而梓宫亟還此和之權也不幸用事之臣聽命于虜而隂蓄其邪心故身死之日天下相慶葢惡之如此方其豢於富貴聚斂珍貨皆為身謀而不為陛下謀也坐失事機二十餘年有識痛心夫賢才不用政事不修形勢不立而專欲受命於虜適足啟輕侮之心而政墮其計中也万俟卨湯思退見之大怒以為虜未有釁而浚所奏乃若禍在年嵗間者或笑以為狂湯鵬舉等交章論公名係罪籍唱為異議以動國是乞行竄逐謫居永州陳俊卿間為上言浚忠義且兼資文武可付以閫外臣素不識浚聞其失陜服散淮師而許國之心白首不渝今􅖏門念咎老而練事非前日浚也願且與一近郡以係人心庶緩急可以相及上納其言許浚自便俊卿又屢言浚可用尋命浚判建康府逆亮之斃其餘黨尚據雞籠山而李顯忠兵在沙上浚往沙上勞軍以建康激賞犒之一軍見浚以為從天而下浚諭顯忠曰聖駕將巡幸到此而賊未退得無慮乎上至建康浚迎謁道左衛士見浚復用至以手加額浚見上首言國猶身也元氣充則外邪逺朝廷元氣也用人才修政事治甲兵惜財用皆壯元氣之道也上嘉納之上欲付浚以江淮之事已而中止乃命楊存中為江淮等路宣撫使虞允文副之中書舍人劉珙不書錄黃具論其不可珙子羽子也上謂宰相曰珙之父為張浚所知此奏專為浚地爾乃寢存中宣撫之命俾專措置至是召存中還而以命浚上既還臨安有勸浚求去者浚念舊臣無它在者人心尤以已之去就為安危乃不敢言去日治府事細大必親焉出入將相三十年素為士卒所畏愛至是復總軍政皆樂為用浚謂金長於騎我長於步制騎莫如弩衛弩莫如車乃令專制弩治車又謂三國以後自北窺南未有不由清河渦口兩道以舟運糧葢淮北廣衍糧舟不出於淮則懼清野無所得有坐困之勢於是東屯盱眙楚泗以扼清河西屯濠壽以扼渦穎人心畢歸精兵可集即奏言之又乞多募福建海船由東海窺登萊由清河窺淮陽浚奏言兩淮之人素稱强力而淮北義兵尤為忠勁自虜殘虐遑遑無歸臣欲措置御前萬弩營募民强壯堪充弩手之人不刺臂面以御前効用為名令結為甲隊遞相委保有功同賞有罪同罰於建康置營詔從其請兩淮之人欣然願就浚親訓撫之未幾成軍金人圍海州詔鎭江都統張子蓋往援仍聽張浚節制浚為書勉子蓋以功名子蓋即馳赴之遇敵于石湫隘子蓋率精鋭先入虜遂大敗引去及奏功浚以去嵗淮上功賞之濫乃命統制官以下公共報眀有冐濫者重罪之孝宗即位召公赴行在賜公手書曰朕初膺付托以眇然一身當萬機之煩夙夜祇懼未知攸濟公為元老宜輔朕初政公其疾驅副朕至意公遂就道至即引見上改容曰久聞公名今朝廷所恃惟公賜坐降問再四公言人主以務學為先人主之學本於一心一心合天何事不濟所謂天者天下之公理而已必兢業自持使清眀在躬則賞罰舉措無有不當人心自歸讎敵自服上竦然曰當不忘相公之言又奏今日便當如創業之初每事以藝祖為法自一身一家始以率天下浚見上天錫英武力陳和議之非勸上堅意以圖事功且謂新政以人才為急人才以剛正為先因疏當今小大之臣有經挫折而不撓論事切直者凡十數人薦于上於是除公江淮宣撫使復往江上史浩議欲城𤓰州下公議公謂不守兩淮而守江干是示敵以削弱之形怠軍民戰守之氣不若先城泗州浩既參政公所規畫浩必沮之公謂臨幸建康以動中原之心用師淮堧進舟山東以遙為呉璘之援上召陳俊卿等問公動静飲食顏貌曰朕倚魏公如長城不容浮言搖奪制除公樞密使開都督府時虜將富察特黙及偽知泗州大周仁屯虹縣都統蕭琦屯靈壁公謂至秋必為邊患當及時掃蕩公上疏謂廟勝之道在人君正心以正朝廷正朝廷以正百官正百官以正萬民今徳政未洽宿弊未革願發乾剛奮獨斷盡循太祖太宗之法時命李顯忠出濠州以趨靈壁邵宏淵出泗州以趨虹縣公自往臨之軍事利鈍難必乞上以諸葛亮在建興六年所上奏置之左右顯忠圍靈壁敗蕭琦宏淵圍虹縣降富察特黙大周仁乘勝盡克宿州公恐盛夏人疲急召顯忠等還師而上亦戒諸將以持重皆未逹偽副元帥赫舍哩志寧率兵至顯忠與戰連日未決諜報敵大興河南之兵將至㑹邵與李不相能遂引而歸敵亦解去公時在盱眙去宿州不四百里傳云敵且至公亟北渡淮入泗州撫將士已乃還維揚待罪上對近臣未嘗名公獨曰魏公每遣使來必令視公飲食多寡肥瘠何如其眷禮如此詔議講和公累疏爭之曰自昔議和之臣始以怯懦誤國全身保家其終必至於降葢有草降表以待用而隂圖其富貴者矣不可不察已而召公赴行在公沿途復上疏爭之且曰自秦檜主和隂懷他志卒成逆亮之禍檜之大罪未正而其黨復出為惡臣聞立大事者以人心為本今内外之議未決而遣使之詔已下失中原之心失將士之心失四海傾慕陛下之心他日誰為陛下出力用命哉又曰竊謂徽宗欽宗不幸不返此亘古非常之巨變凡在臣庶不如無生且八陵痛隔赤子塗炭國家於虜大義若何況夫逆亮憑陵移書侮慢邀求大臣坐索壤地其事近在前嵗今議者不務力為自强之計因金帥一移書遂遣朝士奔走麾下再貽書則又欲遣侍從近臣趨風聽命復將裒吾民膏血以奉讐人欺陛下以欵之之名而共為和之之實其説固曰吾將欵之而後修吾兵政不知使命一遣嵗幣一出國書一正將士褫氣忠義解體人心憤怨何兵政之可修又不過曰吾將欵之而後理吾財用不知今雖遣使而兵不可省備不可徹重之以嵗幣之費虜使之來復有它須何財用之可理此可見其欺陛下以欵之之名而實欲行其宿志貪其富貴豈復以國事為心哉先是朝廷遣王之望龍大淵為通命使副公言臣見王之望龍大淵之望甚言守備不至臣竊以為金以大兵臨我自秋及春凡半年餘見我無備胡不直入徒以虛聲迫脇中外往者固不須論今嵗邊防更密坐待其來破之必矣及至入見又力陳和議之失上為止誓書留使人而令通書官胡昉先往諭敵以泗州不可割之意敵械昉等上聞之諭公曰和議之不成天也以湯思退與公為左右僕射公仍都督上書聖主得賢臣頌以賜之初議以四月進幸建康公又言當詔之望等還上從之幸建康之議思退初不與聞乃與其黨密謀為陷公計俄詔公行視江淮自公受任督府且將三年講論軍務不遑寢食所招來山東淮北忠義之士以實建康鎭江兩軍凡萬二千餘人萬弩營所招淮南壯士及江西羣盜又萬餘人要害之地城壁皆築其可因水為險者皆積水為堰置江淮戰艦諸軍弓矢器械悉備兩年冬金屯重兵十萬于河南為虚聲脇和亦有刻日決戰之語將士望金至成大功而金亦知吾有備卒不敢動至是公又以宰相來撫諸軍將士踴躍思奮金聞公來亦檄宿州之兵歸南京沿邊清野以俟淮北來歸者日不絶山東豪傑悉領節度且以檄諭契丹金益懼右正言尹穡論浚跋扈乃罷督府而以錢端禮王之望代之湯思退令之望盛毁守備以為不可恃又令穡論罷督府官屬馮方又論浚費國用不貲又論乞罷浚都督浚亦請解督府詔如其請言者詆浚愈力浚留平江上章乞致仕者八上許之上察浚之忠欲全其去制除少師判福州浚行次餘干以家事付栻杓曰吾嘗相國不能恢復中原盡雪祖宗之恥即死不當葬我先人墓左葬我衡山足矣疾革呼栻等于前問國家得無棄四郡乎且命作奏乞致仕而薨公之學一本天理尤深於易春秋論孟嘗論易疏曰易有太極是生兩儀太極一也兩儀三之也分為二而七八九六之數成五行之象於是大著又曰天數二十有五地數三十凡天地之數五十有五此天地之中數也何以知其然葢一三五七九合為天數而天數不過五二四六八十合為地數而地數不過五天地竒偶合之為十總之為五十有五自然之數皆不離中中故消息盈虛之妙闔闢變化之機皆在於我而動静莫違焉中其至矣銘養正書室曰天下之動以正而一正本我有養之斯吉道通天地萬化流出精思力行無忘朝夕為王十朋作不欺室銘曰泛觀萬物心則維一如何須臾有欺暗室君子敬義不忘栗栗西山眞徳秀跋曰衛武公年九十五矣猶作抑戒以自警曰相在爾室尚不愧於屋漏無曰不顯莫予云覯葢耄期不亂如此故其没也謂之叡聖武公張公作此銘於易簀之際其視武公尤有加焉王公與公均為一代正人故其詩與銘大略同㫖後之有志於正心誠意之學者當深味之於本朝大臣最重李文靖公謂近三代氣象又以冦忠愍富文忠范文正之事為可法異時歸老山林當作三賢堂於弊廬之側庶朝夕想像如見其人也每訓子及門人曰學以禮為本禮以敬為先又曰學者當清眀其心黙存聖賢氣象久久自有見處嘗作詩曰羣兇用事人心去大義重新天意回解使中原無左衽斯文千古未塵埃朱文公跋曰舉大義以清中原此公平生心事也觀於此詩可見其寢食之不忘然竟不得遂其志可勝歎哉以後並文公語文公跋公墨帖曰公平生心事無一念不在君親而其學又以虛静誠一求之於天為本故其與人言未嘗不依於此今觀其所與劉氏書帖詩文可見矣又曰公在京城中親見二帝北狩皇族係虜生民塗炭誓不與虜俱生委質艱難之際事有危疑人方畏避則挺然以身任之不以死生動其心南渡以來士大夫唱為和説其賢者則不過為保守江南之計夷狄制命率獸偪人莫知其為大變公獨毅然以虜未滅為巳責必欲正人心雪讐恥復守宇振遺黎顚沛百罹志踰金石晚復際遇主義益堅雖天嗇其功使公困於讒慝之口不得卒就其志然而表著天心扶持人紀使天下之人曉然復知中國之所以異於夷狄人類之所以異於禽獸者而得其秉彛之正則其功烈之盛亦豈可勝言哉論誅范瓊曰自靖康後紀綱不振王室陵夷公首唱大義率諸將誅傅正彥乘輿返正復論正瓊罪而後國法立人心服自武夫悍卒小兒竈婦深山窮谷裔夷絶域皆聞公名盎然歸仰忠義之感實自此始也杜甫詩云艱危須藉濟時才熹思至此不覺感歎濟時才分眀難得勉齋問志與才互相發否曰有才者未必有志有志則自然有才人多言張公才短然被他有志後終竟做得來乃正當張公才力雖不逮而忠義之心雖婦子孺子亦皆知之宋子飛言張公謫永州時居僧舍每夜與諸子弟賔客盤膝環坐至更定而寢率以為常或問文公趙張優劣曰若論理㑹朝政進退人才趙又較鎭密無踈失若論擔當大事竭力向前則趙不如張雖是竭力向前只是他才短慮事疎處多他盡其才方照管得若才有些不到處便弄出事來便是難趙公也是不諳軍旅之務所以不敢擔當萬一虜人來到面前無以應之不若退避耳宋名臣言行録别集下卷三
