body:
  text: 宋名臣言行録續集卷二宋李幼武纂集吳敏字元忠真州人大觀二年賜上舍出身靖康初以中大夫門下侍郎知樞密院事尋除少宰兼中書侍郎罷為觀文殿學士提舉崇福宫尋知揚州提舉明道宫紹興初知潭州力辭改資政學士提舉洞霄宫復觀文學士湖廣宣撫二年復宫祠三年卒公請三省密院並依祖宗法又請褒贈司馬光范純仁張商英仍罷元祐學術之禁以示好惡上猶憚元祐之名遂取筆塗純仁為仲淹曰庶不専顯元祐也故當日詔書仲淹仍序光下先是上每夕焚露香禱于天曰願盡力興復政事褒拔賢俊以救天下至是公奏上曰政事之規陛下定於露香之禱矣今當次第行之耳而臣有為臣私計者二事願言之昔唐李德裕有言宰相寧可亟罪不可使政令不歸中書今臣既備位願陛下如察其不能亟罷可也不可使政令不由二省上曰好公又曰蘇軾有言祖宗重臺諌乃是察大臣之為奸者蓋國朝之制似乎內重則天下之權萃于宰相故以臺諌察之臣雖任相事願陛下常開言路以通下情上又曰好又為上言藝祖受命初不得已親定澤潞維揚自是休息十年而後用師四方初親駕河東不能下退乃遣將平蜀自發兵至破蜀凡四十六日自古無如是之速然破蜀之後蜀中復亂三年而後定於是擢曹彬廢王全斌以厲諸將藝祖將將紀律自此分明于是下荆湖交廣平江南朝兩浙莫不如志蓋天造草昧艱難如此今陛下當法藝祖以武定天下然須持之以久以夷大難自蔡京王黼壞文髙俅童貫壞武綱紀大亂禍釁巳久願陛下克寬聖心無欲速則大業可成又言漢文帝用惇厚長者天下安富武帝用材天下始多事本朝仁宗皇帝恭儉寬仁所用皆重厚日計不足嵗計有餘神宗皇帝勵精政事王安石始用材急功利然風俗自是壞要之今日藝祖之英武仁宗之恭儉寬仁陛下所當法也又為上言為天下者當為一物近年以來有御前錢有朝廷錢有有司錢人材亦然有親擢有大臣薦引一天下而自為分别如此是以大壞其極至于君臣相疑而政令改行故臣願陛下常視天下為一物則事可成上皆嘉納又奏臣聞六經垂訓蓋天所以奠世法也三代以後凡生民有一飯之安皆六經之功世蓋由之而不知久矣獨恨更秦之禍禮樂缺亡而近者王安石以經術自任又廢其一意謂魯史既亡而三傳不足取信則春秋永無復可考不知聖人作經豈不料後世綿逺羣言次第湮沒而此經獨存當是時聖人豈不欲明其說于天下且人之立言辭不達意而必待補足其說則其義亦謬矣而聖人之經豈乃至此是弗思之甚也昔韓宣子適魯見易象與魯春秋曰周禮盡在魯矣易明天道而春秋著世法然則文王之易孔子之春秋皆周禮之所在也願下明詔復立春秋學官三嵗貢舉遂以取士庶幾共講聖人之遺經以輔世教並從之曹輔字載德南劔沙縣人元符三年中進士第調福州寧德尉憂吉除夀州安豐縣簿試中詞學兼茂科除𠡠令所刪定官倅安肅軍除南外宗室財用未一月改祕書正字上書編管郴州坐廢六年量移袁州靖康初召還除諌議尋遷給事中除御史中丞除僉書密院張邦昌僭位脅公視事歸卧私室病不出以死自誓遂奔濟州迎駕上即位差內侍押赴都堂供職是日得暑病連上三章乞致仕未允薨于位年五十九宣和初車駕輕出朝士大夫寒心莫敢言者公為正字慨然上書翌日上出示宰執令召赴都堂審問太宰余深曰小臣敢論許大事公曰臣有小大愛君之心一也深曰如言兵戈起于軫下無乃太峻否曰小臣言不激切無以感悟至尊少宰王黼曰有是事乎公曰兹事里巷細民無不知者相公當國獨不知邪曽此不知焉用彼相黼惡其侵巳令吏從公受詞公操筆曰區區之心一無所求愛君而已詞再卻之卒不易其語以聞上令與逺小監當既而編管郴州被㫖引對論事畢上曰今所慮在金人公曰有賢相則金不足慮上曰朕所慮為無將也公曰漢髙祖得蕭何為丞相何進韓信為大將軍屬以兵柄卒成帝業相得人則韓信出矣無將亦非所慮他日又面奏陛下用此數人于艱難之際敗事必矣又乞以河北河東陜西三路有習知山川險易出入向背繪為三圖以進標揭控扼形勢之地以究知分屯戰守制敵之要遣將出師則按圖指蹤而廟算決矣王雲出使遣人回奏大金意欲得十六字徽號及玉輅兖冕儀物之類且云不復索三鎮朝廷釋然解憂欲推尊借大為不可加之語以崇奉之乘輿上服徑推挽出境以為屈已愛民社稷大計當如此臣竊以為社稷大計在此一舉誠不可忽然或者知寬憂于一時而不知移禍于異日將使天地易位神民失歸逆行倒置有不忍言何則既與之以如是之名彼將緣名而責實既與之以如是之器彼將緣器而致用一二年間或以觀兵較獵或以省方巡狩為名悉其國衆進壓我境侈辭大意以號令我自謂據域中最大臣妾海宇當是時能俯首而聽之乎抑猶有以卻之也郤之則強弱不敵其禍甚于前俯首聽從則天地安得不易位神民安得不失歸乎又引魯仲連却帝秦之說以為證纍千餘言曲折詳盡此其大略也諸奉使計議人並改為和議左右二輔臣議不協遽圖引去公疏曰今之議者一于和非也一于戰亦非也一于和則敵勢慿陵國威沮折三鎮之求復尋前約一于戰則堂堂二百年基業決成敗于交鋒之間其危甚矣臣願以和為名以戰為實二者不可一廢惟吾先後用之耳上深然之又言金使王汭以和為名朝夕到闕恐謀國之臣便以甘言軟語為敵真情或至緩備墮金人計中則前日之禍踵而至矣因論朝廷宜急而緩者五事以獻如邢洛磁相當敵南衝而不命將分兵團集民伍置屯列寨之類是也皆一時要務金逼京城宰相何㮚領守禦公副之㮚忌公奏遣報謝北軍公留金營七日而歸㮚方信妖人郭京用六甲兵募市井無賴數千堅持出戰公曰自古用兵未有以妖術成功者力爭不從以病乞解機務凡三章未報京城已失守金人以大元帥握兵在外不自安欲令迎還京師朝廷不得已遣兵往興仁府迎之公密啓上曰方今外援獨康王耳不若留在外使敵猶有所憚上曰卿言極是但得一公文回報足矣公至興仁以其情語守遂收公文以歸金再邀鑾輿出郊議未決㮚奏事出云翌日車駕出城公遽云金意殆不可測此行恐與前日不同㮚厲聲詬公公又率馮澥共說之澥與㮚同鄉齒長冀幸一聽㮚不從及幸金營至北狩皆如所料將北去遣使押公還時邦昌僭立二十餘日矣既歸卧病不出邦昌屢脅公視事卒辭之以死自誓潛以書遣太學生楊願陳撲獻康王㑹王遣黃永錫至京師公因具述圍城及遭變始末附以進遂奔濟州迎駕公從駕至南京首陳五事一曰分屯要害以整兵伍二曰疆理新都以便公私三曰甄收人材駕御用之共圖勳烈四曰恩威並行叛而討之服而舍之五曰裂近邉之地為數節鎮以謹防秋上嘉納之孫傅忠定公字伯野海州人舉進士厯祕書省正字校書郎監察御史從禮部員外郎進祕書少監擢中書舍人以事忤宰相貶蘄州安置靖康初召拜給事中兼侍讀進兵書拜尚書右丞俄同知樞密院事欽宗再幸於金兼太子少傅行宫留守髙麗入貢公言使人所過郡調人治舟搔擾生事勞費民力以妨農時而于中國無絲毫之益宰相以其所論略與蘇軾同貶之嘗奏乞復祖宗法度欽宗問之公曰祖宗法惠民熙豐法惠國崇觀以來法惠姦時謂名言金攻京城急公親當矢石日夜不少休欽宗再幸北方久不得歸公屢貽書請之不報及廢立檄書至中外震駭公大慟久之曰吾唯知吾君仁聖可帝中國茍立異姓吾當死之又數請上還闕明日金大闢南薰門陳兵索道君皇帝后諸王妃主公獨留中宫太子不遣密謀欲以黃金五千兩匿太子于民間别以狀類太子者并宦者二人擊殺之并取當死囚數人以其首同死兒并宦者尸送金營告以宦者竊太子欲投軍前都人爭而殺之誤傷太子因以兵討定斬其為亂者茍尚不巳欲繼之以死越五日無肯當之者拊膺大慟曰吾太子傅義當同死生今主辱臣死之時虜雖不索吾當從太子行求見二酋以義責之庶幾萬一然後就死時方在皇城司有子來省公曰使若勿來而竟來耶吾已分死國矣叱使速去勿亂人意其子曰大人以身狥國尚何言哉願大人力保太子遂以留守事付王時雍有頃從皇后皇太子至南薰門求出守門止之曰軍中唯求皇后皇太子留守何出耶公曰主上既辱太子復出我宋之大臣且太子傅也上既不回當以死從太子金以尼瑪哈命召之而出不知所終許份字子大其先光之固始人今為閩人以父將恩補承務郎監國子監書庫崇寧初登甲科除祕書省校書郎遷實録院檢討官改國史編修主管太平宫特除直祕閣遷龍圖閣崇福宫祠除鴻臚卿以親老辭主明道宫丁吉除宗少除徽制提舉萬夀觀同修國史俄知鄧州兼荆安安撫提舉萬夀觀知蔡州改揚州兼淮東兵鈐奏事除徽猷直學士靖康初除龍圖直學士再任揚州以疾請祠提舉明道宫告老紹興三年十月薨年五十四知鄧州政尚寬厚務為勸戒而人盡其情庭無留訟蓋一本于誠信故人愛服之鄰路饑流死載道鄧州賴公獨安詔公賑濟公置場列室具器用異旗物鳴鼓給食率三日一詣問飢飽而勞苦其病羸凡十月全活饑民二萬六千九百有竒上殿論時政得失言多忤時相意上皇稱善而用事者極力排恨上曰許將之子賢能世其家朕舊知之故讒不行上宣諭揚州古名郡今委卿剗除宿弊公因請曰臣聞應奉司封記花竹凡山林之勝士民之居騷然無復遺地願悉罷去又言維揚一都㑹而止江都天長兩縣不足以供經費而泰州之泰興舊屬邑也願復之又言異時帥臣于經賦外增上供九萬四千餘斛而民不堪願如政和三年舊額上皆從之金人再入冦公即日檄一路兵勤王進討解亳州之圍而漕糧至畿甸者不絶時諸路兵入援所至或縱剽掠多不聽入州城軍士病之公大啓城闉至者撫勞而去秋毫無犯城之圯者公一新之不踰月而功就故金人兩至中都而維揚之民晏如也公之父當朝適值蔡京變法之秋中立不倚維持祖宗舊典抑其過甚京不得逞天下倚重上皇欲復用不果而有意于公公亦痛先志之不盡展時感激論事而小人又沮之連牧三郡愛民有古循吏之典刑亦略見施設矣錢即忠定公字中道世為開封人父居宜興今為毗陵人中熙寧九年進士第授安州司理移懷州推知臨安縣丞調福州察推丁吉調睦州推丁母憂吉宰穎昌府郾城縣奉二后園陵辟為京西漕屬崇寧中檄巡行塞下還除提舉鄜延路弓箭手就除陜西運判收復銀州㫖専董芻糧除鄜延經略安撫判官權帥事召除直龍圖知慶州兼環慶經略安撫踰年知延安兼鄜延帥除集撰徽猷待制顯謨直學士力詆童貫貶永州團練副使永州安置在永數月復徽制永興帥在道除興仁守改青州改河東帥知太原政和五年丐祠五疏乃提舉洞霄宫復徽直知宣州除龍圖閣學士三疏告老授正奉大夫致仕家居三年薨公初蒞事吏有誣服自盜抵死屬邑具獄上于郡公明其寃守將喜而謂曰劾縣獄當得賞答曰治獄得情乃其職擠人以論功非吾志也聞者歎服滕公甫力薦之稱有氣節異時必為名臣三衢有寃獄久不決屬部使者以閭里宿怨檄往按治挾薦牘動公風欲煆錬以快其私至則折獄平允全活二十三人或問之對曰吾寧老死選中豈忍以數十人易一薦哉自為幕府以方略聞後稍權帥事望實益孚上深知其才驛召赴闕入對上問西人兵力公曰夏國本數州之地盜據靈夏浸以強大元豐中兵其城下羌戎壅河決水士馬幾殱遂無成功上曰靈武終不可取耶公曰戎狄之民皆兵也居不糜廩粟動不勞轉輸故便于用衆雖兵之去來飄忽如風雨而不能持久又其所短也願申戒邉臣嚴飾武備搜練戎士積粟堅壘先為不可勝之計以觀其釁屈其所長而乘其所短則可以得志矣童貫宣撫陜西法有弛張可從宜者得罷行之長安萬物騰涌衆貨益輕乃嚴設科條欲力平之計司承望風㫖取市價率減什四違者重置于法民至罷市又行均糴法賤入民粟增估金帛以償之下至蕃兵射士之授田者咸被抑配全陜騷然幾至生變帥臣諸司不視利病奉行惟恐後公獨以為不可極陳其害章上不報時貫方用事權傾中外人皆危之公抗章繼上言益切至士大夫聞章中詆貫論事多質直語爭傳誦之种師道忠憲公字彛叔山西望族也弱冠以伯父諤䕃為三班奉職試法易文階為鎮洮軍推王欽臣辟為熙州推權同谷縣纍遷提舉秦鳳常平換莊宅使知德順軍忤蔡京意罷入黨籍屏居十餘年始得武功大夫忠州刺史涇原兵鈐知懷德軍召問得請提舉崇福宫久之復以涇原鈐轄知西安州遷左武大夫康州防禦拜龍神衛四廂都指揮使洺州防禦使知渭州節制諸道兵進侍衛親軍馬軍副都指揮使應道軍承宣使以靖夏城失守降隴州防禦使尋以都統制出蕭關還拜保靜軍節度使童貫伐燕命盡護諸將師無功密奏其助賊沮軍責授右衛將軍致仕上思之起為憲州刺史知環州尋還保靜軍節度使復致仕金人南來拜靜難軍節度使京畿兩河制置使將援兵至闕上别置宣撫司除同知樞密院京畿兩河宣撫使尋罷樞密及宣撫加檢校少傅鎮洮軍節度使留京師提舉中太二宫許翰論薦復節制河北除宣諭使尋復同知加太尉仍鎮洮軍節度使兩河宣撫使靖康初十一月四日卒政和初夏國議畫界其使焦彥堅以故地為請纍數百言公曰如言故地當以漢唐為正則君之疆土益蹙矣彥堅驚謝曰敢不唯公命自公守境國人受不擾之賜恨不獲伸子姪之禮于下執耳懷德為西方極邉公築同樂園于郊常從賔客鼓吹宴集其間吏民熙熙忘其身之在絶塞也公初為制置使聽用便宜檄取兵食公聞命即發㑹姚平仲嘗以涇原騎兵二千步兵一千更戍燕山未行公遂率與俱北至洛陽而斡里雅布師已屯于城之北或止公勿行曰賊勢方鋭我以偏師先犯之勝負見矣四方勤王之師視此以為去就盍止少駐汜水以謀萬全公曰吾兵少若遲回不進形見情得秪取辱焉今鼓行而前彼安能知吾虛實都人知吾來士氣自振何憂賊焉上聞其至喜甚開安上門命李綱迎勞既入見時已與金人議和上曰今日之事卿意如何公曰女真不知兵豈有孤軍深入人境而能善其歸乎上曰業已講好矣對曰臣以軍旅之事事陛下餘非所敢知也即拜同知公時被病特命母拜許肩輿入朝家人掖升殿金使王汭素頡頏方入對望見公拜跪稍如禮上顧笑曰彼為卿故也自敵渡河京師諸門盡閉市無薪菜公請啓西南壁聽民出入如平常又請緩與金帛禁游騎使不得逺掠俟彼惰歸扼而殱諸河執政聞其言止此易之上方倚公以謀國而种氏姚氏素為山西巨室兩家子弟不相下時平仲之父古帥熙河以兵勤王平仲恐功名之㑹獨歸于种氏乃以士不得速戰有怨言達于上上一日遣使五輩促公進戰公言過春分節可擊時相距才八日蓋遲其弟師中及姚古之至也平仲欲夜叩金營生擒斡里雅布奉康王以歸故公言不用既而平仲謀泄金先事設備及平仲率步騎萬人夜劫寨反為所敗而還初公請簡料勤王之師分為三等出戰餘皆守城先立理賞之格以示之選將分總距賊寨二三里環營守之絶其剽掠使其乏食趣姚古以所領西師㑹河朔將兵選精鋭五萬人自河陽駐滑州進屯賊營之後尅日併力攻之此必勝之䇿也不聽平仲敗公復言劫寨已誤然兵家亦有出其不意者今夕再遣兵分道攻之亦一竒也如猶不勝每夕以數千人擾之不十日賊遁矣李邦彥等畏懦不能用是日公分軍屯城西其後軍適虜掠之戰于板橋斬首十七級至夜遣人焚馬監東廊金懼于牟馳岡穿塹立寨為自衛之計公入對次見都堂李邦彥以下與議和戰之計答對往復而邦彥弗識獨大笑而已是後廟堂懲二月一日劫寨之事自此因噎廢食公與李綱遂俱掣其肘公知兵有謀艱難時獨巍然有柱石望為執政所二三故使其進退翕忽終不能用靖康之變公首先赴難上召問計安出公奏云臣以議和非也京師周回八十里如何可圍城髙數十丈粟支數十年不可攻也欲于城內劄寨而城上嚴守拒戰以待勤王之師不踰數月彼自困矣然業巳講和不可止金銀不足請見數與之如其不退乃與之戰且四鎮之地內保州乃宣祖陵寢斷不宜割與上令公于政事堂共議公見邦彥曰某在西土不知京城堅髙如此備禦有餘京師之民雖不能戰亦可使守但患無糧耳若糧食有餘器甲精鋭京師十萬衆盡皆兵也邦彥曰素不習武事不知出此公嘆曰相公不習兵豈不聞往古守城者乎又曰聞城外居民悉為賊殺掠畜産甚多亦為賊有當時既聞賊來何不悉令城外百姓撒去屋舍搬其所蓄盡入城中乃遽閉門以遺賊資何也邦彥曰倉卒之際不暇及此公笑曰好荒左右皆笑公與邦彥議人人異同惟李綱與公合奏公所議而請身任其責後以綱為守禦使用公計遣使以金帛不足事曉諭尼瑪哈尼瑪哈意不滿引兵攻城綱出兵小不利邦彥等歸罪公與綱而罷其兵兩日人情危駭而上不知也靖康太學遺録中丞許翰上疏曰伏見罷師道提舉中太一宫中外聞之悵然失色按師道沈毅有謀山西將士人人信服素聞其賢臣所詢訪數十百人皆言師道雖已老疾智慮不衰而朝廷以為老無計䇿不可復用且昔秦始皇老王翦而用李信兵辱于楚漢宣帝用充國之老終漢之世無西戎之患自吕望以來用老將收功者難一一數以古揆今則師道之老而木訥未當謂不可用也今無故解其兵權委之道館使士氣消沮民心疑惑臣竊恨之翰章纍上言復師道兵柄上曰師道老矣難用當使卿見之令相見于殿門外公寂然不語翰因言平仲城下用兵之失以感發之公始言我寡彼衆當分兵結寨守要地使糧道不通挫以持久可破也翰深歎息其言復上奏師道智慮未衰方時多故而虎臣置之散地非䇿也尼瑪哈之兵聞巳和而退命公宣撫河北駐滑州復命兼河東宣撫公乃請合山東陜西京畿之兵屯于青滄滑衛河陽預為防秋之計徐處仁等謂金人重載甫還豈能復來不宜先自擾費且示敵以弱議格不用公駐河陽金使王汭來禮甚倨公知金必大舉即上疏請幸長安以守禦事付將帥朝廷謂其怯復召還不能入見矣金陷京城上聞之慟哭曰朕不用師道言以至于此春初金之去也公嘗勸上半渡擊之不從曰異日必為後患至是果然宋名臣言行録續集卷二
