body:
  text: 宋名臣言行録續集卷六宋李幼武纂集張叔夜忠文公字稽仲耆之曽孫信州永豐人以蔭調蘭州録知襄城陳留二縣潁州倅舒海泰三州守召對除庫部員外郎開封少尹遷右司員外郎以事忤蔡京貶西安州倉草場久之召為祕書少監擢中書舍人給事中遷禮侍以徽制出知海州拜徽猷直學士知宣州又知濟南府加龍圖直學士知青州徙知鄧州四道置帥為南道都總管進延康殿學士加資政殿學士提舉南道兵守禦城上擢拜僉書樞密院事虜既議和命彈壓京城事二聖北狩扈從北去卒年六十三訃聞髙宗遙拜觀文殿學士醴泉觀使公喜論兵蘭州本先零故地最寒惟恃河為阻每氷合則嚴飭守備卒介胄纍月不得息公曰是當求其要害以守之乃博考山川講求利病上書力陳取天都之策謂天都介於五路之間乃西人嘯聚之區凡欲舉兵以冦諸路則必就彼㸃集然後議其所嚮以故每一聚兵則五路不得奠枕此當今之所宜先書再上樞庭行其策果得其地建為西安州政和間吏惰弗䖍凡命令之出於門下者豫書銜於後使先置名而徐填事目以行謂之空黃公極論其弊始立法禁劇賊宋江剽掠至海州趨海岸劫巨艦十數公夜募死士千人距十數里大張旗幟誘之使戰密伏壯士匿海旁約候兵合即焚其舟舟既焚賊大恐無復鬭志伏兵乘之江乃降山東羣盜競起公發精卒擊之盜帖息一方晏然靖康初金兵過河公謂若許講解則金人必有邀求縱之使去後必復來有輕中國心乞遣精騎邀擊及豫令河北邊鎮出兵斷其歸路願假臣騎兵與諸將併力追襲不報公帥師入援或勸其緩行者公曰國家危難如此忍顧身乎至尉氏遇賊游騎轉鬭而前於十一月晦至京師公入見具陳唐明皇避祿山之亂蓋嘗出幸今賊鋒鋭甚願駐驆襄陽以圖幸雍欽宗然之令提兵守城連四日大戰斬其金環貴將二人城破公被創猶父子力戰士皆殊死鬭殺傷相當然諸將無一人至者金議和欽宗再出郊公於太學前起居叩馬諫止不能回即號慟再拜衆皆哭欽宗回首字之曰嵇仲努力㑹金詔立異姓公乞立皇太子為君以從民望二酋怒追赴軍中至則抗論如初不少屈遂扈從北去道中惟時飲湯又不食粟至白溝御者曰過河矣乃矍然起仰天大呼遂不復語明日卒李忠定曰人材因事而奮節義臨難乃顯蕩陰之役血濺御衣獨有一嵇紹安史之亂首唱義兵獨有一顔真卿朱泚之變叱三館之士使不從賊獨有一何蕃豈易得哉靖康之季分四道總管以衛王室及金人再犯闕或擁兵坐視而不進或棄軍以自全獨公總師西道轉戰以達都城所謀不從城陷被執猶惓惓抗章欲立趙氏其忠於國家大節如此雖古人何以加諸綱嘗見所與家問勉以忠義固已歎服其後聞公遂死國事為之流涕嗟乎士固有一死非死之難處死之為難也如公之死得其所矣彼忘義而偷生者得不少有愧哉又曰士之立名節死國事雖志氣有所感激其平時胸次所養必有大過人者遇事而發非偶然也段太尉以笏擊朱泚或謂武人一時奮不顧身栁子厚獨為裒集遺事作傳以明其非真知言哉公忠義之節著矣臨去國日自期必死以書屬其家叙平生所操守真所謂中有所養臨大節而不可奪者耶書尾猶欲託不朽於墓表若區區於為名者是不然名固士君子之所貴也聖人以名節砥礪天下故士有舍生取義不求生以害仁者顔魯公知必死李希烈自為祭文墓志常置坐隅與公用心何異近世名節不立而惟自全之為務宜乎遭國家之大變而仗節死難之臣不能無愧於古人也如公卓然所立如此吁可畏而仰哉晦庵曰見鄭驤後張克戩忠確公字德祥耆之曾孫以蔭補三班借職復舉進士知河間縣又知吳縣治有聲擢衛尉丞從弟克公為御史中丞嘗論罷蔡京及京再相併坐廢踰年起知祥符縣久之知廣德軍京畿倉陛辭留為庫部員外郎出守汾州以守城功加直祕閣進直龍圖閣除右文殿修撰兵破汾州自引決事聞贈延康殿學士金人陷燕山長驅而南分兵冦太原太原距汾二百里尼瑪哈遣其將尼楚赫貝勒來攻縱兵四掠外援不至勢日孤危公畢力扞禦晝夕不少懈太原陷汾益危公召令軍民曰太原既陷吾固知亡矣然義不忍負朝廷辱祖父纍子孫不與此城同終始無以明吾節衆皆泣對曰公父母也願盡死公募士間道走京師上章曰自太原失守汾日受攻願陛下哀矜孤城勢不可久急遣軍馬倍程以來救護一城生靈之命不報自太原陷汾拒守蓋踰月矣一日諸酋列城下指呼督取降書公臨陴大罵不絶口炮中一酋立死翌日金攻城益急城從西北隅壞賊既入公朝服南嚮焚書拜舞乃自引決其家死於難者八人晦庵曰熹嘗銘張忠文公之廟因得讀其遺書而歎慕其風烈又得觀公子汾州家問尤深敬仰竊惟國朝承平百年德隆澤茂世臣喬木不為無人而一旦危難之際忠義之節乃獨萃於張氏之一門其亦盛矣公之大節如青天白日固不待贊述而后明而某獨於其筆札之精謹見其神氣之安間於其家人父子之間見其誓死之外唯以取恤遺孤為寄而無一毫內顧下流之私也嗚呼非其胸中有以大過人者何以及此先覺有言慷慨殺身者易從容就義者難若公之死其真所謂從容就義者耶鄭驤威愍公字潛翁信州玉山人登進士第厯仕州縣建炎元年除直祕閣知同州金兵陷城死之事聞贈官與張忠文公並立廟本州廟額曰旌忠愍節晦庵曰公擁羸卒守孤城以抗暴起方張之衆鄰援既絶遂以身殉豫讀其遺事未嘗不三復流涕也夫忠義之性出於人心之秉彜策名委質以事人者其講之宜熟矣而吾觀於前日中原之禍一時士大夫出身殉國死其官守如公者何少也豈非義利之分不明取舍之極不素定一旦倉卒則貪生畏死而惟利之從哉嗚呼如公者可謂得其本心而無愧於臣人之義矣是固有國家者所宜殷勤褒録以為臣子之勸使其有所鄉慕感激而興起其忠義之良心非獨以私於鄭氏之子孫而巳也南軒曰公守同州城陷死之可謂得其死矣讀其書辭胸中所處蓋已素定嗟夫義之所在君子蹈之如飢之必食渴之必飲不可後也若一毫私意間之則顧藉牽滯而卒失其正矣然則觀公之為豈不凛然可貴哉誠齊曰近世培溉人材忠孝成俗至本朝盛矣唐季五代全軀賣國之風於是一變慶歷元祐之間忠臣義士充盈朝野非諸老之賢祖宗之勤也豈一朝一夕哉自紹聖崇觀之大臣指諸老為姦邪挫揠消泯不盡不置也而靖康之禍猶有死國如公者此固前日姦邪之遺種而紹聖崇觀大臣之所消泯不盡者邪嘻慶歷元祐之奸邪亦何少哉至於消泯而不盡可以觀祖宗之澤矣晦庵曰靖康之難敵騎長驅都城危迫四面勤王之兵逡巡前却莫有至者而張忠文獨以南道之師千里赴難軍鋒鋭甚每戰必克乃以廟算猶豫卒不能有成功而﨑嶇顛沛之餘竭力致死猶以必存宗社為巳任事復不就則遂閉口絶食而以身殉焉其後虜人分兵西窺陜關所嚮降下無不如意則又有如鄭公者獨以孤城憊卒嬰其乘勝焱鋭之鋒蔽遮三秦以備巡幸虜兵大至鄰援四絶知不能守而勇氣彌厲誓必與郡俱為存亡城陷之日遂隕其生而不悔是其見危致命殺身成仁皆足以無愧於人臣之義向子韶忠毅公字和卿開封人忠簡四世孫元符二年與國學薦補假承奉郎三年擢進士第調保州法改承事郎監在京炭場以親嫌改授荆南府節判滿知蘇州吳江縣大觀三年除開封右曹次年轉朝散大夫坐李彪言蔡京事追三官停任四年叙朝散郎監保州稅五年以赦復官提㸃太霞宫尋知虢州不就六年差主管西外宗室財用七年徙南外復舊任宣和初知䖍州建昌軍未上改䕫州路漕六年還對延和殿知蔡州八年主明道宫俄知徐州靖康初除京東運副丁憂起知淮寧金至陳不屈遇害時年五十實二年二月二十二日也生有異稟莊重如成人比志學遊賢關清約如寒士人不知其為相門后族之子姪也其强學自勵焚膏繼晷不少懈同舍相與語曰君子之學息焉而後能安其學君何自苦如是公愀然對曰家門衰替敢不强勉而自惰乎伊川門人如劉安節輩訝其衰替之語因問之公曰先丞相事業寂寥久矣安節壯其言引為忘年交漕京東戶書聶昌以國用不足諷諸路進羡餘知密州郭奉世與昌有舊進萬緡昌薦諸朝請賞之以勸天下公劾奉世曰一路財用有餘不足相補設使密有餘財當具數聞部使者通融計㑹資兵吏之費安可不恤大計不顧他州進通用之財徼非道之寵不罰奉世無以懲姦而主計近臣首開聚斂之端浸不可長士論偉之蔡州闕守州人邀使者馬首願得公三年使者上其事而蔡巳除人矣乃起服就除知淮寧府公三拜章乞終喪不許公視事六月金兵至陳公率諸弟城守勵戰士開諭百姓曰汝等墳墓之國去此何之吾與汝當以死守之敵晝夜攻城公親擐甲胄冒矢石遣其子弟率赴東京留守司乞援兵未至金益其衆城陷公猶率衆巷戰力屈被執金坐城上欲降之酌酒於前左右按令屈膝公植立不動㦸手罵之遇害諫官疏曰去冬夷人入寇諸路守臣或望風逃遁傑然以忠義自奮誓以死守者陳州之向子韶是也至城陷猶率衆巷戰與介胄之士同斃於兵革之下行道之人稱頌咨嗟忠義之士奮發激昂願褒詔子韶忠節優加爵秩以旌顯之搜求其後以錫賚之天下聞風孰不踊躍奮厲為陛下盡死節乎公為人端慤夷易不事表襮一言之出洞見心膂通奉篤於睦族公承其志率諸弟分俸以均給本房之未仕及待闕者逺方珍異必以時至通奉有疾衣不解帶與人交主於忠信不為浮文末禮以投衆人耳目書尺不過一幅語嚴而意盡所至必與君子長者遊暇則觀書門無雜賓與人議論衎衎然必反復曲折歸於至當發為辭章典雅溫厚有唐詞人之風自始仕由幕職至縣令退為管庫進而處刺史二千石一以誠意為主不以色辭假人故居官可紀去必見思至其蹈大難臨大節而不可奪非茍然者蓋其胸中素定也宋名臣言行録續集卷六
