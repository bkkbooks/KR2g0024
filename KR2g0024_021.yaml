body:
  text: 宋名臣言行録後集卷十一宋朱子纂集范純仁忠宣公字堯夫文正公之次子以恩補官中進士第相哲宗文正公門下多延賢士如胡瑗孫復石介李覯之徒與公從遊晝夜肄業置燈帳中夜分不寢後公貴夫人猶收其帳頂如墨色時以示子孫曰爾父少時勤學燈煙迹也知襄城縣伯兄久心疾公承事照管如孝子召編校祕閣書籍以兄病辭不赴富公責之曰臺閣清資人豈易得小官出常調亦難事何必苦辭公曰富貴有命襄城民素不事蠶織鮮有植桑者公患之因民有罪而情輕者使植桑於家多寡隨其罪之輕重後按其所植榮茂與除罪自此人得其利公去民懷不忘至今號為著作林著作公宰縣時官也久旱不雨公度將來必闕食遂盡籍境內客舟召其主而諭之曰民將無食爾等商販唯以五榖貯於佛寺中候闕食時吾為汝主糶衆賈從命運販不停以至春首所蓄無慮十數萬諸縣饑獨境內之民不知也自陜西運副召還神宗問曰卿在陜西久主漕挽必精意邊事城郭甲兵糧儲如何對曰城郭粗完甲兵粗修糧儲粗備上愕然曰卿才能如此朕所倚賴而執事皆言粗何也公徐對曰粗者未精之辭如是足矣臣願陛下無深留意於邊事恐邊臣觀望要功生事結釁夷狄殘害生靈耗竭財用縻費爵賞不惟為今日目前之害又將貽他時意外之憂願陛下究孟子交鄰之道修孔子來逺之德使好生之德洽於夷狄彼將愛戴陛下如父母雖其酋首桀驁欲侵侮我疆其徒亦不為之用也並言行録為諌官前後為上言休兵省事節用富民進君子退小人愛人材申公論為急崇聚斂事苛刻親讒佞任偏聽為戒大則廷論小則疏逹未聽則連章纍牘不茍止其於君子小人之際尤反復激切無所諱避上方鋭於求治又言道逺當馴致事大難速成人材不可遽求積弊不可頓革公雅與荆公厚善至是數言其以五霸富國強兵之術誤惑人主失天下望曽子開撰墓志環慶大饑帥守坐不職罷去以公代之公到慶州餓殍滿路官無榖以賑恤公欲發常平封樁粟麥賑之州郡皆欲俟奏請得㫖而後散公曰人七日不食即死何可待報諸公但勿預吾寧獨坐罪公判留臺時一時耆舊多在洛公與司馬公皆好客而家貧相約為真率㑹脫粟一飯酒數行過從不間一日洛中誇以為勝事行狀除給事中時哲宗宣仁太后共政司馬溫公入相首改差役法公聞之謂人曰此事當熟講而緩行不然滋為民病且宰相職在求人變法非所先也還朝力為溫公言之溫公有所建請公復言宰相當虛心以延衆論不必謀自巳出謀自巳出則諂諛得乘間迎合而正士將卷懷退避公與溫公雖同志及臨事有所矯正類如此於是人皆服公平直墓志溫公欲令進士召朝官保任然後應舉又更貢舉法公曰舉人難得朝士相知士族近京猶可寒逺之士尤不易矣兼今之朝士未必能過京官選人京官選人未必能如布衣徒令求舉未必有益既欲不廢文章則雜文四六之科不如設在衆人場中不須别設一科也孟子恐不可輕黜猶六經之春秋矣溫公從之除兼侍講公語人曰國之本在君君之本在心人君之學當正心誠意以仁為體使邪僻浮薄之說無自而入然後發號施令為宗廟社稷之福豈務章通句解以資口舌之辨哉及在經筵進講必反覆開陳其說歸於人君可用而後止元祐三年有吳處厚者以蔡確題安州車蓋亭詩來上以為謗訕宣仁太后得之怒曰蔡確以吾比武后當重謫吕汲公為左相不敢言忠宣乞薄確罪不從初議貶確新州忠宣謂汲公曰此路荆棘巳七八十年吾輩開之恐不自免汲公又不敢言忠宣因乞罷政聞見録先是河北所科夫役許輸錢免夫上下皆以為便公獨憂曰民力自此愈困矣或曰每嵗差夫一丁費萬錢今以七千免一丁又免百姓奔走執役之勞豈不便乎公曰每嵗差夫雖曰萬錢然隨身者不過三千又得一丁就食於官今免夫所出七千盡歸於官矣民又儼然坐食於家蓋力者身之所出錢者非民所有今捨其所有而征其所無民安得不病此一事富民不親執役者以為便窮民有力而無錢者非所便也又况差夫必計其的確合用之數縱使所差倍其所役則力愈衆民愈不勞矣今若出錢以免夫雖三分之二亦可以取十分免夫錢其弊無由致察又從來差夫不及五百里外今免夫錢無逺不届若遇掊克之吏則為民之害無甚於此言行録宣仁寢疾宰輔入問后留忠宣曰卿父仲淹可謂忠臣在章獻朝勸后盡母道在仁宗朝勸帝盡子道卿當似之聞見録一日三省同登蘇轍獨進上前論殿試策題因引漢昭變更武帝法度事哲宗怒曰安得以漢武比先帝轍再拜而退曰臣引用失當容臣待罪公奏曰漢武雄材大略史無貶辭又轍所論非異同正欲救巳行之言望陛下宣住蘇轍尚書右丞鄧潤甫越次言曰先帝法度為司馬光蘇轍壞盡公曰不然法本無弊弊則當改上曰人謂秦皇漢武公奏蘇轍之所論事與時也非人也轍卒得罪去同上哲宗親政吕汲公欲遷殿中侍御史楊畏為諌議大夫忠宣曰天子諌官當用正人楊畏不可用汲公方約畏為助謂忠宣曰豈以楊畏嘗言公耶忠宣曰不知也蓋上初召忠宣畏嘗有言上不行忠宣故不知也忠宣因乞罷政上不許後楊畏首叛汲公凡可以害汲公者無所不至聞見録公在相位凡薦引人材必以天下公議所薦士未嘗知出於公公亦未嘗示恩意於人人或謂公曰身為宰相豈可不牢籠天下士使知出於門下公曰但願朝廷進用不失正人何必須使知出我門下邪言行録公在隨幾一年州事毫髮必親客至談笑終日無倦色公素苦目疾忽全失其明因上表乞致仕章惇戒堂吏不得上蓋懼公復有㫖陳終移上意遂貶公永州安置命下公怡然就道切戒子弟不得小有不平意曰不見是而無悶爾曹勉之人或謂公為近名公聞而歎曰七十之年兩目俱喪萬里之行豈其欲哉但區區愛君之心不能自巳人若避好名之嫌則無為善之路矣行狀永州命下忠宣欣然而往每諸子怨章惇忠宣必怒止之江行赴貶所舟覆扶忠宣出衣盡濕顧語子曰此豈章惇為之哉至永州公之諸子聞韓維少師謫均州其子告惇以少師執政日與司馬公議論多不合得免行欲以忠宣與司馬公議役法不同為言求歸白公公曰吾用君實薦以至宰相同朝論事不合即可汝輩以為今日之言不可也有愧而生者不若無愧而死諸子遂止聞見録公疾革精識不亂諸子侍側口占遺表凡八事命門生李之儀次第之聞見録表略云蓋嘗先天下而憂期不負聖人之學此先臣所以教子而微臣資以事君又曰若宣仁之誣謗未明致保佑之憂勤不顯本權臣務快其私忿非泰陵實謂之當然以至未究流人之往愆悉以聖恩而特叙尚使存殁猶汚瑕疵又復未解疆場之嚴幾空帑藏之積有城必守得地難耕凡此數端願留聖念言行録公嘗曰我平生所學唯得忠恕二字一生用不盡以至立朝事君接待僚友親睦宗族未嘗須臾離此也又戒子弟曰人雖至愚責人則明雖有聰明恕巳則昏爾曹但常以責人之心責已恕已之心恕人不患不到聖賢地位親戚間有子弟請教於公公曰唯儉可以助亷唯恕可以成德其人書於座隅終身佩服言行録公嘗曰人材難得欲隨事有用則緩急無以應手七年之病三年之艾非儲之以待則如病者何故雅以人材為已任每有薦引必先公議及其至也內舉有所不避其不可則人君所主亦必爭行狀公教子弟曰六經聖人之事也知一字則行一字要須造次顛沛必於是則所謂有為者亦若是豈不在人耶時西邊儒帥有以威敵斥境請於公者手自答曰大輅與柴車較逐鸞鳯與鴟梟爭食連城與瓦礫相觸君子與小人鬪力不惟不能勝兼亦不可勝不惟不可勝雖勝亦非也行狀公攝帥成都程子將告歸既見曰先生何以告我子曰公嘗言為將帥當使士卒視已如父母然後可用然乎公曰如何子曰公言是也然公為政不若是何也公曰可得聞與子曰舊帥新亡而公張樂大享將校於府門是教之視帥如父母乎曰亦疑其不可故使屬官攝主之也子曰是尤不可也公與舊帥同僚也失同僚之義其過小屬官於主帥其義重曰廢享而頒之酒食如何曰無頒也武夫視酒食為重事弗頒則必思其所以而知事帥之義乃因事而教也公曰若從先生言而不來則不聞此矣其喜聞義如此遺事科舉取人不得間有得者自是豪傑之士因科舉以進耳且資䕃得官與進士得官孰為優劣以進士為勝以資䕃為歉者此自後世流俗之論至使人耻受其父祖之澤而甘心工無益之習與孤寒之士角勝於場屋僥幸一第以為榮是何見識夫應舉亦自寒士無祿不得巳藉此進身耳如得巳何用應舉范公最有見識然亦以資䕃與進士分優劣建言於有無出身人銜位上帶左右字不可謂無所蔽也其言曰欲使公卿家子弟讀書耳此意甚善但以應舉得官者為讀書而加奬焉則彼讀書者應舉得官而止耳豈真學道之人至如韓持國自是經國之材用為執政亦了得不可以其無出身便廢其執政之材曰堯夫所别異者莫非此等人否曰執政不是合下便做亦自小官以次遷之如後來吳坦求等在紹聖中被駁了范博士以無出身故也彼自布衣中朝廷以學行賜之爵命至其宜為博士乃復以無出身奪之此何理也資䕃進士中俱有人惟其人用之加一右字亦自沮人為善龜山語録紹聖初哲宗親政用李清臣為中書侍郎范丞相純臣與清臣論事不合范公求去帝不許范公堅辭帝不得巳除觀文殿大學士判頴昌府召章惇為相未至清臣獨當中書益覬幸相位復行免役青苖法除諸路常平使者惇至不能容以事中之清臣出知北京建中靖國初上皇即位用韓忠彥為相清臣為門下侍郎忠彥與清臣有㜕故忠彥惟清臣言是聽清臣復用事范右丞純禮忠彥所薦清臣罷之劉安世呂希純皆忠彥所重清臣不使入朝外除安世帥定武希純帥髙陽張舜民忠彥薦為諌大夫清臣出之帥真定其所出與外除及不使入朝者皆賢士清臣素所憚不可得而用者忠彥懦甚不能為之主曽布為右相用范致虛諌疏云河北三帥連衡恐非社稷之福劉安世吕希純同日報罷清臣亦為布所陷出知北京伯溫常論紹聖建中靖國之初朝廷邪正治亂未定之際皆為一李清臣以私意幸相位壞之邪說既勝衆小人並進清臣自亦不能立於朝矣使清臣在紹聖初同范丞相在建中靖國初同范右丞劉安世吕希純張舜民以公議正論共濟國事則朝廷無後日之禍而清臣亦得相位享美名矣此忠臣義士惜一時治亂之機為之流涕者也聞見録公憂國愛君不以利害得喪二其心刻意名節難進易退雖屢黜廢志氣彌勵以為有文正之風焉其在朝廷專務奬進人材故天下善類視公用舍以為消長其論議平恕不為巳甚世謂使其言行於熙寧元豐時後必不至紛更盡申於元祐中必無紹聖大臣讎復之禍墓志王存字正仲潤州人中進士第哲宗朝官至尚書左丞初修起居注即乞復唐正觀起居郎舍人職事執筆隨宰相入殿上韙其言故事左右史雖日侍便殿而欲奏事必禀中書俟㫖公因對及之即詔左右史遇侍立許直前奏事遂著為令自公始也官制行上尤慎用人公因請自熙寧以來有緣議論得罪或詿誤被斥而情實納忠非有大過者隨材召擢以備官使語合上意自是收拔者甚衆公在政府時四方奏讞大辟刑部援比請貸而都省屢以無可矜恕却之公言此祖宗制也且有司援比欲生之朝廷破例欲殺之可乎公平居恂恂不為詭激之行至有所守確不可奪議論平恕無所向背溫公嘗曰並馳萬馬中能駐足者其王存乎並曽子開撰墓志蘇頌字子容泉州人移徙潤州中進士第相哲宗知江寧府江寧縣事每有發斂府移追擾吏係縲於道公至則曰此令職也府何與焉每因治訴旁問鄰里丁産多寡悉得其詳一日召鄉老更定户籍民有吝占不實者必曰汝家尚有某丁産何不自言相顧而驚無敢隱者一縣以為神明公請以獲盜多寡立縣令殿最法以為巡檢縣尉但能捕盜而不能使民不為盜能使民不為盜者縣令也且州縣物務嵗課稍虧官任有罰今良民罹奪剽之害而親民官獨不任責可乎鄒侍郎撰行狀天下以為當然者謂之公論公論蓋非强名乃天道也此道未嘗廢顧所在如何耳如唐虞三代與吾祖宗之時公論在上君相主之賢哲聚於朝不肖沉於下海內入於陶冶一歸於正如晚周及東漢之餘上之人不能主公論所用非其人於是乎清議在下而士知所尊畏恥為非義登其門者如龍從其死者如歸致黨錮之禍起視漢室為何等時也頃時王安石薦李定陳襄彈之未行間擢太子中允宋次道敏求封還辭頭翌日辭職罷之又下次直李大臨蘇子容相繼封還更奏復下至於七入子容與大臨俱落職奉朝請名譽赫然此乃祖宗德澤百餘年養成風俗公論之不可屈如此與齊太史書崔杼弒其君殺三人而執筆如初者何異其後攝官修起居注章衡行之賢不肖於此可見要之公論不可一日廢然在上則治在下則亂可以卜世也元城語録充北朝生辰國信使在契丹遇冬至本朝厯先北朝一日北人問公孰是公曰厯家算術小異遲速不同謂如亥時節氣當交則猶是今夕若踰數刻即屬子時為明日矣或先或後各從本朝之厯可也北人以為然遂各以其日為節慶賀使還奏之上喜曰朕思之此最難處卿之所對極中事理行狀元豐初白馬縣民有被盜者畏賊不敢告投匿名書於縣弓手甲得之而不識字以示門子乙乙為讀之甲以其言捕獲賊而乙爭其功吏以為法禁匿名書而賊以此發不敢處之死而投匿名者當流為情輕法重皆當奏蘇子容為開封尹方廢滑州白馬為邑上殿論賊可减死而投匿名者可免罪上曰此情雖極輕而告訐之風不可長乃杖而免之子容以謂賊不干巳者告捕而變主匿名本未足深過而先帝猶恐長告訐之風此所謂忠厚之至然熙寧元豐之間每立一法如手實禁鹽牛皮之類皆立重賞以勸告訐者此當時小人所為非先帝本意時范祖禹在坐曰當書之實録東坡集知滄州陛辭上曰朕每欲用卿輒為事奪豈非命邪然卿直道久而自明頓首謝兼語及偏親留京師未能偕行上問卿母誰氏對曰故龍圖直學士陳從易之女上曰是天聖間侍從邪對曰從易祥符中館職巳而外遷久之因自廣州罷還不蓄南物獨載俸餘見錢過嶺仁宗聞之擢知制誥上曰其清節過於馬援矣故謝表云憫臣之數竒多難特軫淵衷勉臣以直道自明屢形天語談訓元豐中上曰欲修一書非卿不可以契丹通好八十餘年盟誓聘使禮幣儀式皆無所考據朕欲成一書但患邇來修書者遷延嵗月不肯早成公曰恐須一二年可矣上喜曰果然及書成賜名魯衛信録奏篇上上讀序引大喜曰正類序卦之文公兼侍讀奏言國朝典章大抵㳂襲唐舊史官所記善惡咸備乞詔史官學士採録新舊唐書中臣主所行日進數事以備聖覽遂詔經筵官遇非講讀日進漢唐故事十條行狀公掌天官每選人改官京朝官使臣關升磨勘或以功過當升降者吏洗垢求瑕故為稽滯公敇吏曰某官緣某事當㑹某處仍引合用條格具委無漏落狀同上自是吏不得逞每訴者至必取案牘使自省閲訴者服乃退其不服公必往復詰難度可行行之茍有疑則為之奏請㦯建白都堂故士大夫受賜多而不得者亦以為無可憾行狀王禹玉元厚之諸公嘗問曰公記之博以至國朝典故本末無遺日月不差用何術也公曰某每以一嵗中大事為目欲記當年事則不忘矣如某年改元其年有某事某年上即位其年上有某事某年立后若太子其年有某事某年命相其年有某事則記事之一法也後觀太史公書是嵗孔子生是嵗孔子卒是嵗齊威㑹葵丘是嵗晉文始霸之類恐亦此意也元曰不然至於暗記經史默詠詩書以至士大夫家世閥閲名諱婚姻無遺忘者又以何法乃真强記爾公嘗言吾每聞前輩善言則終身佩服少時聞計用章郎中為吏以循良稱數典大郡政績尤異因造請求異聞其可紀者曰人主不宜有所好有所好則腹心肝膽皆在人矣故好征戰則孫武吳起之徒出而民殘於干戈矣好刑名則韓非張湯之徒出而民苦於刻核矣好聚斂則桑羊皇鎛之徒出而民困於掊克矣好順從則張禹胡廣之徒出而民弊於誇大矣豈惟人主學士大夫亦宜知之夫神龍騰驤豈可羈也然或豢養於人者謂其有嗜欲也又嘗言楊告謂吾曰嘗愛韓非一言以謂土木偶人者耳鼻欲大口目欲小此言可以喻大夫土木偶人而鼻先小目先大人或非之則無以為也鼻大則可小目小則可大凡事皆然不厭於三思而熟慮也人皆以非為刻薄此言非忠厚之言哉公在金華每進讀至弭兵息民則必反覆條奏援引古今使上不忘弭兵息民之意以謂人主之聰明不可有所嚮有所嚮則偏偏則為患大矣當今守成之際應之以無心則天下無不治矣公嘗云吾平生未嘗以私事干人主奏對惟義理之言故厯仕四朝中間雖謫不愧於觀過而神考以謂直久而自明也呂吉甫參政事使其親友謂公曰子容吾鄉里丈人行若從吾言執政可得也公笑而不答公云平生薦舉不知幾何人惟孟安序朝奉分寧人嵗以雙井一斤為餉知吾無苞苴之饋也公云人生在勤勤則不匱户樞不蠧流水不腐此其理也並談訓宋名臣言行録後集卷十一
