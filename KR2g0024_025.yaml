body:
  text: 宋名臣言行錄續集巻一宋李幼武纂集黄庭堅山谷先生文節公字魯直洪州分寧人登治平四年進士第調汝州葉縣尉熙寧中北京教元豐三年知吉州太和縣八年哲宗立除校書郎兼實錄院檢討集賢校理除右諌議大夫元祐二年正月除著佐兼史館三年五月除著作郎以趙挺之言復著佐六年七月除起居舍人以韓川言復舊職八年除編修官紹聖初知宣州改鄂州七月奉祠十二月責授涪州别駕安置黔州元符初移戎州三年徽宗即位赦復宣義郎監鄂州税十月復奉議郎定國軍僉判建中靖國元年三月除權知舒州崇寧元年知太平州九月罷奉祠二年十一月謫宜州羈管三年徙永州未聞命而卒紹興初特贈直龍圖閣累贈太師七嵗能作牧童詩八嵗作詩送人赴舉云送君歸去玉帝前若問舊時黄庭堅謫在人間今八年治平丙午先生再赴鄉舉詩題出野無遺賢主文衡者廬陵李詢讀先生詩中兩句云渭水空藏月傅巖深鎖烟擊節稱賞批云此人不惟文理冠場異日當以詩名擅四海先生遂膺首選詢字仲同幼武之先世也居廬陵之朋川登皇祐已夘第後以奉議郎致仕其孫忱字彦誠亦登科元祐六年為洪州獄掾與先生以世契交游備載書帖周益公跋之並先生年譜尉葉縣日作新寨詩有俗學近知回首晚病身全覺折腰難之句傳至都下半山老人見之擊節稱歎以為清才非奔走俗吏遂除北京教即為文潞公所知熙寧中為宫教五開府者酒餘脱淺色畨羅襖衣之先生醉中作詩曰疊送香羅淺色衣著來春氣入書帷到家慈母驚相問為説王孫脱贈時元祐中先生與趙挺之俱在館閣先生以其魯人意常輕之每庖吏來問食次趙必曰來日喫蒸餅一日聚飲行令先生云欲五字從首至尾各一字復合成一字趙沈吟乆之曰禾女委鬼魏先生應聲曰来力𠡠正整協趙之音合坐大笑趙又嘗曰鄉中最重潤筆每一誌文成則太平車中載以贈之先生曰想俱是蘿蔔與𤓰虀爾趙銜之切骨其後擠排不遺餘力卒致宜州之貶紹聖二年惇卞與羣姦論實錄詆誣俾前史官分居畿甸以待摘千餘條示之謂為無驗證繼而院吏考閲悉有據依所餘纔三十二事殊細瑣先生書鉄𤓰治河有同兒戲至是首問焉對曰某時官北都親見之真兒戲耳凡有問皆直辭以對聞者壯之東坡言挺之元豐末倅徳州先生方監徳平鎮挺之希合提舉官之意欲于本鎮行市易法而先生以為鎮小民貧不堪誅求若行市易必致星散公文往来士人傳笑崇寧三年初自蜀出峽留荆州待辭免乞郡之命與府帥馬珹甚歡閩人陳舉自臺出漕先生未嘗與交也承天寺僧為先生乞㙮記文成珹飯諸部使者於塔下環觀先生書碑碑尾但書作記者黄某立石者馬某而已舉與李植林虞相顧前請曰某等願託名不朽可乎先生不答舉由此憾之舉知先生昔在河北與挺之有怨挺之執政遂以墨本上之謂幸災謗國先生遂除名羈管宜州攜家南貶泊于零陵獨赴貶所時曽紆坐鈎黨先徙是郡先生留連逾月極歡洽相與酬唱如江樾書事之類也率游浯溪觀中興碑先生賦詩書姓名于詩左曽急止之云公詩文一出即日傳播厶方為流人豈可出郊公又逺徙蔡元長當國豈可不過為之防邪從之而止跋李資深書巻云余謫處宜州半載官司謂余不當居關城中乃抱被入宿子城南予所僦舍喧寂齋雖上雨旁風無有葢障市聲喧聵人以為不堪其憂余以為家本農桑使不從進士則田中廬舍如是又可不堪其憂邪既設卧榻焚香而坐與西隣屠牛之机相直用三文買鷄毛筆書此誠齋楊公記宜州祠堂略曰予聞山谷之始至宜州也有甿某氏館之太守抵之罪有浮屠某氏館之又抵之罪有逆旅某氏館之又抵之罪館于戍樓葢圄之也卒于所貶葢飢寒之也先生之貶得罪于時宰也亦得罪于太守乎鹿之肉人之食君子之殘小人之資也孰使先生之所挾足以授小人之資也哉夫豈不得罪于太守也先生得罪于太守則太守不得罪于時宰矣豈惟不得罪也又將取榮焉由今視之其取榮于當時者幾何而先生饑寒窮死之地今乃為騷人文士顧瞻鑽仰之場来者思而去者懐而所謂太守者猶有臭焉則君子之于小人患不得罪爾得罪奚患哉九江有碑工刻字甚工先生題其居曰琢玉坊崇寜初詔郡國刋元祐黨籍姓名太守呼使劖之工曰小人家舊貧止因開蘇内翰黄學士詞翰遂至飽暖今日以姦人為名誠不忍下手守義之曰賢哉士大夫之所不及也遂餽之以酒肉而從其請言元祐中與子瞻穆父飯寳梵僧舍因作草書數紙子瞻賞之不巳穆父無一言問其所以但云恐公未見藏真真蹟某心竊不平紹聖貶黔中得藏真自序于石陽休家諦觀數日恍然自得落筆便覺超異曰視前作可笑然後知穆父之言不誣且恨其不及見矣嘗戲東坡云昔右軍字為換鵝字韓宗儒性饕餮每得公一帖于殿帥姚麟換羊肉數斤可名二丈書為換羊書矣東坡在翰苑一日以生辰製撰紛冗宗儒繼作簡以圖報書來人督索甚急坡笑曰傳與本官今日斷屠嘗嘲一俗濁老人云濁氣撲不破清風倒射回東坡言無以復加云詩詞髙勝要從學問中來後來學詩者雖時有妙句譬如合眼模象隨所觸體得一處非不即是要且不是若開眼全體見之合古人處不待取證也又云詩不可鑿空強作待境而生便自工耳每作一篇先立大意長篇須曲折三致意乃可成章詩者人之情性也非強諌爭于庭怨忿詬于道怒鄰罵坐之為也其人忠信篤敬抱道而居與時乖違遇物悲喜同牀而不察並世而不聞情之所不能堪因發于伸吟調笑之聲胷次釋然而聞者亦有所勸勉比律吕而可歌列干羽而可舞是詩之美也其發為謗訕侵陵引頸以承戈披襟而受矢以快一朝之忿者人皆以為詩之禍是失詩之㫖非詩之過也詩評云詩意無窮而人才有限以有限之才追無窮之意雖淵明少陵不得工也不易其意而造其語謂之換骨法規模其意形容之謂之奪胎法評李白詩如黄帝張樂于洞庭之野無首無尾不主故常非墨工槧人所可及云古人有言并敵一嚮千里殺將要須心地收汗馬之功讀書乃有味棄書冊而游息書味猶在胷中乆之乃見古人用心處如此則盡心于一兩書其餘如破竹皆迎刃而解耳云人生嵗衣十疋日飯兩盂而終嵗荒然疲役此何理也男女婚嫁縁渠儂墮地自有衣食分齊所謂誕寘之隘巷牛羊腓字之其不應凍餓溝壑者天不能殺也今蹙眉終日正為百草憂春雨耳青山白雲江湖之湛然可復有不足之歎邪王榮老嘗官于觀州罷官渡觀江七日風作不得濟父老曰公舟中必有竒異此江神極靈當獻之得濟榮老顧無有止有黄麈尾以獻之風如故又以端研獻之風愈作又獻以宣包虎帳皆不驗夜卧念曰有魯直草書扇頭子題韋應物詩曰為憐幽草澗邉行上有黄鸝遶樹鳴春潮帶雨晚来急野渡無人舟自横乃取視戃惚之勢曰我猶不識鬼寧識之乎持以獻之香火未收天水相照如兩鏡對展南風徐来帆一餉而濟洪覺範謂此神必元祐遷客之鬼不然何嗜之深邪朱文公看東都事略謂學者曰只是説得一箇影子如黄公亦有好處不曽載得或問好在甚處曰他亦孝友后並文公語山谷善叙事情叙得盡后山叙得較有疎處若散文則山谷大不及后山后山山谷好説文章臨作時又氣餒了后山雅徤強似山谷然氣力不似山谷較大但却無山谷許多輕浮底意思任伯雨忠敏公字徳翁眉州眉山人舉進士調清江簿知雍丘縣元符三年召為大宗正丞遷左正言建中靖國初為度支員外郎知虢州崇寧二年京卞在東西府遂入黨籍以八寳赦恩提㸃明道宫卒年七十三紹興初元贈直龍圖閣公為正言言曽肇親兄布見任右僕射一居宰輔鈞衡之任一處禁宻論思之地于人情事勢豈無嫌畏公言紹聖時惇卞用事諌官御史出其引用欺罔朝廷庭堅近以言事不當除京東運判既而改汝州今又送吏部中外疑惑若陛下見其欺誣朋黨則庭堅不敢逃罪若非出聖意止是三省因陛下之意遂再三取㫖重行用以恐脅臺諌則此事不可不察言官畏三省非國之福也又言去嵗以瞎征投降因取湟鄯二州葢惇卞欲僥倖邀功故䝉昧朝廷隠諱邉患今湟州雖存勢又孤絶嵗費三百萬以守之安可以既乏之財追無窮之欲圖未集之衆棄巳成之師曾布議以元祐紹聖均為有失欲以大公至正消釋朋黨乃詔改今年為建中靖國元年或以建中乃徳宗奉天時號上曰太平乃梁末帝禪位時號太宗不以為嫌詔下公曰人才固不應分黨與然自古未有君子小人雜然並進可以致治者葢君子易退而小人難退二者並用終于君子盡去小人獨留徳宗坐此播遷建中乃其即位改元之號不可不戒趙挺之為中丞公言挺之始因章惇進既謟事蔡卞及卞黜責又諂事曽布出入門下殆無虚日故士論以其觀望險詐號為移鄉福建子乞加察焉布初為皇太后山陵使以挺之為儀仗使布與宦官劉援交通知禁中宻㫖就陵下諭挺之建議紹述以合上意挺之自此擊元祐舊臣不遺餘力而國論一變矣先是正月朔莫夜有赤黑氣起西北方散而為白公言正嵗之始建寅之月其卦為泰年方改元時方孟春月居正首日為壬戌是陛下本命而赤氣起于莫夜之幽以一日言之日為陽夜為隂以四方言之東南為陽西北為隂以五色推之赤為陽黒與白為隂以事推之朝廷為陽夷狄為隂君子為陽小人為隂徳為陽兵為隂今赤氣起于至隂之方有黒氣下起此宫禁隂謀下干上之證也漸衝正西散而為白白主兵此夷狄竊發之證伏願陛下收主柄抑臣下嚴敕宫禁以防慮幾㣲訓飭將士以遏絶生事用忠良黜邪佞正名分殛姦惡事至必斷無以寛仁傷大義使隂邪小人無得生犯上之心則可轉異為祥矣言天道幽逺理難取必伏見月暈圍畢昴謹按漢志曰畢昴天街也其北為胡其南為漢而參為趙魏之郊昔髙帝七年月暈圍參畢遂有平城之圍以此觀之象不徒示陛下當畏懼修省先事為備也言章惇身為上宰乆擅國柄迷國罔上毒流搢紳又風聞北使言遼主去年喫食次聞中國貶章惇遼主不覺放匕筯跳起曰甚好甚好南朝錯用此人北使又曰何故只如此行遣以此觀之惇之凶姦不獨孟子所謂國人皆曰可殺雖四海九州至於蠻貊莫不以為可殺也時紹述之論已興公居言職僅半載所上一百八疏皆係天下治亂安危宗廟宫禁細故不論曽布方用事公欲擊之布覺乃出公知虢州蔡卞追讎元符末言者疏巳罪惡而公論其欲追廢宣仁一事尤切至乃上疏自辨以公為首於是三省檢㑹公等前為諌官曽入章疏詆誣先朝故貶公昌化軍居三年以星赦移居道州宣和初卒江公望字民表睦州人舉進士第建中靖國初由太常博除左司諌以論事出守睢陽尋召為左司員外郎除直龍圖閣知夀州言落職蔡京用事貶南安軍以赦復官歸而卒建炎四年加贈諌議大夫徽宗嘗夢有題亭樹壁間數語者覺不曉所謂及公對所論列多與夢合上歎賞之閲之甚乆且曰聞卿徳望儒雅置之諌列簡在朕心不出大臣也退朝上甚喜以公與我夢合可以大任矣公言天下大器置諸安則安置諸危則危此知置之之地未知運之之手天下神器為者敗之執者失之此知運之之手未知藏之之道藏天下于天下而不得遯此所以為道也天下有常安之理聖人操妙用之手至人藏不動之道不動常動動常不動運常不運不運常運安常不安不安常安此宰制天下之妙理戰國之綜横秦漢之吞并有為之之敗執之之失矣故其妙不知所以藏其粗不知所以置天下無事亦幸爾陛下以仁為朴以義為削以信為繩以智為巧以禮為繪政以制其用刑以支其蠧啾啾萬鳴蠢蠢羣動同在一器虚而不實故衆實之所㑹靜而不動故羣動之所止止而無止則動亦寂矣㑹無所㑹則實亦空矣虚實一體動靜同役莫測其隠莫窺其用陛下以此藏之孰能移也得之于天人非容心也視之若弊屣非有愛也承之于宗廟非敢忽也行一不義殺一不辜非敢為也人愛亦愛之人棄亦棄之示至公也上而公輔下而有司百執事或坐而論道或作而行之各當其力也不在一曲不殢一隅東顧西眄左提右挈有如掌握之上陛下以此運之孰能弊也不畏多難而以無難為憂不矜無過而以改過為美居安慮危在治思亂以山河為金湯以夷狄為赤子外之郡國若犬牙之相制内之宗族若磐石之鎮安建極于四達之途躋民于仁夀之域陛下以此置之孰能危也累數百言上稱竒者數四讀終篇上曰卿文采甚竒每進劄子皆根義理不唯文采過人也他日又謂公曰卿前所進劄子禁中無事玩味不釋手句句義味巳令編入上等文字中與卿流傳不朽陳祐論曽布不從遂罷右司諌公對請祐責詞所謂觀望推引之語上曰欲逐曽布引李清臣為相且曰如此何可容又言曽布安可去公遽曰陛下臨御以来易三言官逐七諌臣非天下所期望今祐言宰相過失自其職也豈可便謂有他哉人君之于諌臣養之不可不素用之不可不審遇之不可不厚聴之不可不察去之不可不謹如此數者則用諌官之道盡矣上然之又抗疏論主繼述分元豐元祐起禍亂之源言甚懇切先是祐因進對上謂曰凡有公事宜與江公望議論可乃来祐見公公曰榻前一磗之地是人臣對君父極言天下事去處惟上不欺天中不欺君下不欺心則可免戾人見各有不同惟不可傅㑹祐他日為上誦之上以為名言公言増益邏者通舊為十人夫婦醜詆之言仇隙讐怨之語増情釋非擿隠抉伏豈清時美事又言陛下邇来蓄能鳴善鬬之禽籠竒羽佳喙之鳥夫志有欲而不禁則志荒志荒則政怠矣又言傳聞有姓賈中貴人臂鷂鶻入後苑中逐禽鳥臣未之信然終疑而不釋也夫從禽乃少年諸王之事以天子為諸王少年事何以自輕甚非萬乘取重于天下之道也上悉命縱之惟一鷴蓄乆頗馴雖以塵杖逐之不去乃刻公姓名于杖頭以志之南軒張栻序公奏藳曰徽宗皇帝親萬機厭朋黨之論收召豪傑以自近放逐之臣相繼起南荒越明年以建中靖國為元思與天下更始于是公由奉常博士擢左司諌自以不世之遇進見拳拳不敢不盡有所聞見言之惟恐不及而于逺便佞敦友睦消黨與容受直言尤極反復致意上往往開納㑹姦人得柄公旋即補外竄貶流落以死天下惜之乃紹興四禩有詔追錄贈諌議大夫制詞有曰惟世道之多變致國論之靡常是非或出于愛憎夷險獨持于一節權寵日忌竄斥莫遑嗚呼公亦庶幾無憾矣云云嗟乎不有君子其能國乎自祖宗有天下留意多士仁宗涵濡長育四十二年而收其用為元祐之政元祐諸君子雖厄窮百罹而直道隠然流風所被論議著見于元符之末建中靖國之初葢又彬彬如也元氣不傾雖裔夷侵食而中興之日旋踵即見人才之為國重輕如此然則為國計者其可忘封殖愛䕶伸忠直之氣遏導䛕之萌以夀天下之脈而人臣幸登王朝其又可遲回利害之途自同寒蟬卒蹈委靡陵夷以負吾國家也真西山徳秀序公文集曰釣臺嚴子陵之清風更千百年未有續之者至諌議江公出然後孤標峻節仰配而無慚或曰子陵不肯為萬乘故人屈褰裳去之翛然濁世之表萬物莫能攖江公間關從仕四十餘年至于觸權倖蹈艱險投荒萬里為萬世閔笑豈子陵匹邪嗚呼以此論人殆猶以驪黄觀馬非能有得于形色之外者也昔者禹稷顔子之憂樂伯夷下惠之清和可謂異趣矣而孔子孟子葢並賢之非以其時不同所處亦異而其道未嘗不一乎由是觀之子陵之不仕與公之仕未易斷以迹也葢子陵之不仕非以自潔也所以激昻節義而救西都頹靡之俗也公之仕非以自利也所以挾持世道而弭一時朋黨之禍也迹雖不同道豈異乎方其以卑官下僚自結人主精誠所格朕兆形焉豈非臣子難逢之㑹然是時也上雖有意嚮善而志未決元祐諸賢雖稍稍參用而勢未定正安危理亂之岐途也公懇懇盡言所以堅明主意保合善類者不遺餘力使公之道得行則二蔡之姦不攻而自卻紹述之説不沮而自消王室尊安戎狄退聴其為國家生民之福詎可量也哉奈何正邪消長之勢一分公之身弗獲安于朝廷之上自是二十年間疽蝕浸滛元氣日以凋耗天下之患有不可勝言者事變既極公之言遂為靈龜大蔡建炎中興褒表遺直公身雖不及見然髙風凜凜千載而下猶足以起衰懦而羞姦諛信乎其無媿于子陵也豐稷清敏公字相之明州鄞縣人舉進士為䝉城簿稍擢監察御史裏行除著作佐郎遷吏部員外郎利路憲哲宗立徙成都召為工部員外郎遷殿中侍御史遷右司諌改國子司業起居舍人太常少卿祭酒兼侍講拜刑侍以集賢院學士知穎州移江寧府召為吏侍出知河南厯真定穎昌應天府湖杭州徽宗立以左諌議召道除御史中丞左遷工書徙禮部以樞宻直學士知蘇州改越州蔡京相降寳文待制俄奪職知常州貶海州團練副使睦州安置移道州别駕台州居住又除名移越州徙婺州提舉明道宫卒年七十五疏曰陛下明足以燭萬事之統而不可用其明智足以應變曲當而不可用其智順考古道二帝所以聖儀式刑文王之典成王所以賢偏聴生姦獨任成亂此古今之大患帝王之深戒也願陛下以洪範為元龜祖訓為寳鑑一動于深宫之中思以為則于四海之内一言于細氈之上思以為法于千載之下則化行俗美中國安逺人服矣遷中丞首論蔡京之罪京貶又論章惇誤國惇黜又言宣仁佐哲宗退黜小人洎小人復用遂造誣謗今宜辨明又史官修神宗實錄輙以王安石日録亂之願擇史臣申飭成書又數言近習之非㑹曽布由内侍進將拜相公謂臺屬曰盍共論之遷工書布遂相朱晦庵序公遺事曰仲尼亟稱于水曰水哉水哉其詞約而㫖㣲矣而孟子論其所取之意乃直以源泉混混不舍晝夜盈科而後進放乎四海者言之非其深造黙識有以得乎聖人之心孰能知其所説之如此而有志之士欲有為于此世者又豈可以不察乎此而先立其本哉然自聖賢既逺道學不明士大夫不知用心于内以立其本而徒恃其意氣才力之盛以能有為于世者葢亦多矣彼其見聞之博詞氣之美論議之偉節槩之髙一時之間從其外而觀之豈不誠有以過人者然探其中而責其實要其乆而待其歸求其充然有以慰滿于人心而無一瑕之可指者什伯之中未見其可以一二數也嗚呼若公者其真所謂有本者歟觀其平居暇日所以治心養氣而修諸身者葢天下之物無足以累其志是以為子則孝為吏則亷進而立乎本朝則上自宗廟以及人主之身内自禁掖近幸之私而外及乎朝廷卿相之用知無不言言無不盡葢有當時法家拂士所為低回遷就而詭詞以幸濟者公獨正色誦言無少顧避退未嘗以語乎家而其計慮之明諌説之功所以不諧于時而卒驗于後者乃反因深文巧詆之筆而後顯及其出而賦政于外退處于鄉以至流放轉徙于荒寒寂寞之濵而遂奄然以沒其世則其所以處乎巨細顯㣲之間者又皆清明純潔而無一毫之歉是非所謂源泉混混而放乎四海者邪陳過庭忠肅公字賔王本名揚庭徽宗賜以今名越州山隂人舉進士為館陶簿澶州教宰中牟除宗學博擢祠部吏部員外郎遷右司使遼還遷常少起居舍人拜中書舍人禮侍拜御史中丞言忤權貴罷知蘄州未半道責海州團練副使黄州安置乆之自便欽宗立以兵侍召復拜中丞徙禮書擢右丞遷中書侍郎使金虜往河北死于燕山年六十贈開府儀同三司使遼國還徽宗問虜主苦風痺手足不舉及箭損二目是否公對恐傳者之妄今日之務當安不忘危治不忘亂雖盟好足恃亦宜以邉備為念上然之為右司凡四年時大臣各立黨不協同列或隂為向背唯公無所附也上曰陳過庭中立不倚者也方臘反公言致冦者蔡京養冦者王黼竄二人則冦自平又論朱勔父子本刑餘之人交結權近竊取名器賄賂狼籍罪惡顯著宜正典刑以謝天下由是大忤權貴公見自壬戌至戊辰七日之内彗星見于天之東北奏曰伏以陛下恭儉憂勤仁民愛物施于四海不宜致此災異凡明于天象者皆曰此金人滅亡之象稽之天理驗之人事金人殘暴自取滅亡決有是理雖然天道幽逺儻以幽逺而忽著明之戒似非古先哲王正厥事以應天變之義況戎敵未殄冦盗未平主威未振國勢未強權綱未舉紀律未嚴是非未明賞罰未當罪人巳得而未加明刑寛詔已頒而未䝉實惠倉庫未盈私室未富貴近之列未得正人州縣之間未皆亷吏命令數下而數易差除屢報而屢移朝有姑息之政吏多冗濫之員如是則星象埀戒其可忽乎切自警畏内修徳外修政進君子退小人奬亷潔蠲苛撓修兵甲選車徒備邉陲儲粮食恤民隠去冗吏除弊源庶幾去災為福矣金人再犯京師議割兩河須大臣偕行聶昌耿南仲皆以事辭公曰主憂臣辱臣願效死欽宗揮涕歎息留不遣及城陷始行二駕北狩公巳在河北因留不得歸死于燕山陳師錫字伯修建之建陽人舉進士為昭慶軍書記宰臨安縣召為監察御史知淮陽軍提㸃開封諸縣鎮事知解州入為考功員外郎知宣州移蘇州徽宗即位召為殿中侍御史諌官御史専以犯顔嬰鱗排擊奸邪為職若論而不切則不能起人主之意辨之不早則不能折禍亂之萌建中靖國初蔡京方為翰林學士承㫖雖明智之士未能知其必亂天下也公獨慨然論奏條其過惡章凡四五上而不已且曰若果用京則治亂自此分祖宗基業自此隳臣非自愛而憂之葢為陛下憂為社稷憂為天下賢人君子憂未幾京遂為執政盡逐異已者固寵市權營惑主聴握國柄者幾二三十年諌諍之路自此塞絶卒之兵革洊興生民塗炭公之言始效于此可不謂先見之明乎宋名臣言行録續集巻一
