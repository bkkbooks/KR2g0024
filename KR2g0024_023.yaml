body:
  text: 宋名臣言行錄後集巻十三宋朱子纂集范祖禹字淳甫成都人中進士第事神宗哲宗先嘗為太史著唐鑑官至内翰公未生河南郡太君夢一偉丈夫披金甲而至寝室曰吾故漢将軍鄧禹也既寤猶見之是日公生遂以為名初字夢得溫公以傳稱鄧仲華篤行淳備改字淳甫故稱淳甫家傳熙寜三年溫公修厯代君臣事迹辟公同編修又辟劉攽劉恕及溫公歸洛詔聽以其属自隨而二公在官所獨公在洛溫公專以書局事属之故公於此書致力尤多同上除正言客有言於溫公以公在言路必能協濟溫公正色曰子謂淳甫見光有過不言乎殆不然也遺事公在書局分職唐史考其成敗治亂得失之迹撮其機要論次成書名曰唐鑑元祐元年上奏進其書家傳元祐中客有見伊川先生者几案無他書唯印行唐鑑一部先生謂客曰近方見此書自三代以後無此議論崇寜中冲見欒城先生於頴昌先生曰老来不欲泛觀他書近日且看唐鑑遺事元祐初伊川除崇政殿説書時公為著作佐郎伊川謂溫公曰經筵若得范淳夫来尤好溫公曰他巳修史朝廷自擢用矣伊川曰不謂如此但經筵須要他溫公問何故伊川曰頤自度乏溫潤之氣淳夫色溫而氣和尤可以開陳是非導人主之意其後除侍講朝廷既相溫公申公詔起蜀公蜀公以書問於公公謂不當起蜀公得書大喜曰是吾心也吾所欲為者君實巳為之矣何用復出又與親舊書云比亦欲出而二即勸止遂巳冬大寒禁中出錢十萬貫以賜貧民公言朝廷自嘉祐巳前諸路皆有廣惠倉以救恤孤貧京師有東西福田院以收養大小廢疾至嘉祐八年增置城南北福田院共為四院此乃古之遺法也臣以為宜於四福院增葢官屋以處貧民不限人數委左右廂提舉使臣預設方略救濟不必專散以錢計其存活死損以為殿最其天下廣惠倉宜更舉行令官吏用心賑恤須要實惠及民上納用焉講讀論語畢賜宴於東宫賜御書唐人詩各一首公表謝曰臣願陛下篤志學問亦如好書益進道德皆如游藝又賦詩以獻退而節尚書論語孝經要切之語訓戒之言得一百十九事名曰三經要語進之是夏權住進講公上疏曰陛下今日學與不學係天下他日之治亂臣不敢不盡言之陛下如好學則天下之君子欣慕願立於朝以直道事陛下輔助德業而致太平矣陛下如不好學則天下之小人皆動其心欲立於朝以邪謟事陛下竊取富貴而專權利矣君子專於為義小人專於為利君子之得位欲行其所學也小人之得位将濟其所欲也用君子則治用小人則亂君子與小人皆在陛下心之所召也凡人之進學莫不在於年少之時陛下數年之後雖欲勤於問學恐不得如今日之專也蔡確既貶公上言聖人之道不過得中天下之事不可極意用刑寜失之寛不可失之急寜失之略不可失之詳偏見異論者皆以為黨確而逐之臣恐刑罰失中人情不安矣范忠宣之罷公嘗論列客有謂忠宣曰淳夫亦有言何也忠宣曰使純仁在言路見宰相政事如此亦豈可黙也禁中下開封覔乳母十人公在告聞之即上疏曰陛下未建中宫而先近幸左右好色伐性傷於太早陛下承天地宗廟社稷之重守祖宗百三十年基業為億兆之父母豈可不愛惜聖體哉又上疏皇太后曰千金之家有十三嵗之子猶不肯使近女色而况乎萬乘之主乎陛下愛子孫而不留意於此非愛子孫之道也譬如美木方長正當封植培壅以待其蔽日凌雲若戕伐其根豈不害哉有詔選后并令侍從禮官講求禮制公上疏言四事一曰族姓二曰女徳三曰隆禮四曰博議又與諸公討論講議約先王之禮參酌其宜為禮上之及中宮初建又解家人卦以獻嘗采集帝王學問及祖宗講讀故事為帝學八巻上之秘書監王欽臣奏差真靖大師陳景元校黃本道書公封還之以謂諸子百家神仙道釋葢以備篇籍異聞以示藏書之富本非有益於治道不必使方外之士讎校以崇長異學也昔王安石使其門僧智緣隨王韶誘説木征時人謂之安撫太師今乃有校書道士人必謂之編校太師矣事雖至微實損國體遂罷其命元祐七年邇英閣對公奏臣伏觀仁宗在位四十二年豐功盛徳固不得而名言所可見者其事有五畏天愛民奉宗廟好學納諌仁宗行五者於天下所以為仁也然仁宗每因事示人好惡皇祐中楊安國講直哉史魚邦有道如矢邦無道如矢君子哉􅕋伯玉邦有道則仕邦無道則巻而懷之仁宗曰伯玉信君子矣然不若史魚之直據孔子所言則史魚不若伯玉之為君子仁宗之言仁君之言也人君欲臣下切直故言伯玉不如史魚以開臣下切直之路由是天下知仁宗好直不好佞此聖人大徳也願陛下以此為法昭示所好以慰羣望上然之公勸上畏天愛民修身納諌稽法祖宗而專引仁宗行事以為故實又采集仁宗聖政數百事為仁宗訓典六巻以獻在經筵據經守正獻納尤多講尚書内作色荒外作禽荒甘酒嗜音峻宇雕墻有一於此未或不亡講畢再誦此六句却立云願陛下留意哲宗首肯者再三然後退就位講孟子今之樂猶古之樂孟子之心切於救民故勸齊王與民同樂而謂今之樂猶古之樂然世俗之樂鄭衞淫哇之聲非古先王之法豈可薦上帝配祖考降天神出地祇也今樂古樂如君子小人之不可同邪正之不可並如必欲以禮樂治天下國家則當如孔子答顔淵之言孔子所言者為邦之正道孟子所言者救世之急務此所以不同講公劉好貨太王好色曰孟子以王好貨勸以當如公劉與民同利以王好色勸以當如太王與民同欲然臣竊謂公劉非好貨乃是厚民太王非好色乃是正家人君不可好貨亦不可好色好貨則貪而害民好色則荒而害政孟子事中才以下之君故其言如此東坡嘗曰淳夫講説為今第一言簡而當無一冗字長語義理明白而成文粲然得講師三昧也公詰朝當講前一夕正衣冠儼然如在上前命子弟侍坐先案講其説平時溫溫其語若不出諸口及當講開列古義仍參之時事及近代本朝典故以為戒勸其音琅琅然聞者興起講王制巡狩柴望之禮曰古之人多因燔柴望秩之説乃附㑹為封禪之事或以求神僊或以祈福或以吿太平成功皆秦漢之侈心非古者巡狩省方之義為人臣凡有勸人主封禪者皆佞臣也李廌師友談記陳衍初管當御藥院公為諌議僦居城西白家巷東鄰陳衍園也衍每至園中不敢髙聲謂同列曰范諌議一言到上前吾輩不知死所矣太皇太后登遐公言太后新棄天下陛下初攬庶政乃宋室隆替之時社禝安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時不可不慎也太皇太后内定大䇿擁立陛下聽政之初詔令所下百姓呼舞至公無私焦刻勞苦專心一意保佑陛下斥逐奸邪裁抑僥倖九年之間始終如一故雖徳澤深厚結於百姓而小人怨者亦不少矣今必有小人進言曰太后不當改先帝之政逐先帝之臣此乃離間之言不可不察也當陛下即位之初中外臣民上書言政令不便者以萬數太后因天下人心之欲改與陛下司改之非以巳之私意而改也既改其法則作法之人及主其法者有罪當逐陛下與太后亦以衆言而逐之其所逐者皆上負先帝下負萬民天下之所讎疾而欲去之者也不如此則天下不安爾惟陛下清心照理辨察是非有以此言惑聖聽者宜明正其罪付之典刑此等既上誤先帝欲復誤陛下天下之事豈堪小人再壞邪初公與蘇公約皆上章論列蘇公巳具草見公之章遂附名同奏因謂公曰公之文經世之文也軾於朝廷文字失於過當不若公之言皆可行也公又上疏曰陛下嗣位幸頼太后以大公至正為心罷王安石惠卿等所造新法而行祖宗舊政故社稷危而復安人心離而後合乃至契丹主亦與宰相議曰南朝行仁宗故事可飭燕京留守使戒邊吏守約束無生事夫以夷狄之情如此則中國人心可知矣太后為陛下立太平之基巳有成效臣願陛下守之以静無所改為恭己以臨之虚心以處之有㫖召内臣十餘人公上疏言陛下初政未嘗行一美政訪一賢人而先進用内臣如此衆多之口必謂陛下私於近習臣竊惜之不報紹聖三年徙賀州謫詞云朕於庶言無不嘉納至於以訐為直以無為有則在所不赦公云吾論事多矣皆可以為罪也亦不知所坐何事後乃知坐向言乳媼事惇卞以謂上疏太母所以離間哲宗也然公先上皇帝疏後數日乃上太母疏止是勸上以愛身修徳太母以保䕶上躬而巳公每誦董仲舒正其誼不謀其利明其道不計其功曰君子行己立朝正當如此若夫成功則天也公言舊年子弟赴官有乞書於蜀公者公不許曰仕宦不可廣求人知受恩多則難立朝矣東坡好戲謔語言或稍過公必戒之東坡每與人戲必祝曰勿令范十三知公舊行第十三也並遺事哲宗即位宣仁后埀簾同聽政羣賢畢集於朝專以忠厚不擾為治和戎偃武愛民重榖庶㡬嘉祐之風矣然雖賢者不免以類相從故當時有洛黨川黨朔黨之號洛黨者以程正叔為領袖朱光庭賈易為羽翼川黨者以蘇子瞻為領袖吕陶等為羽翼朔黨者以劉摯梁燾王巖叟劉安世為領袖羽翼尤衆諸黨相攻不巳正叔多用古禮子瞻謂其不近人情如王介甫深嫉之或加玩侮故朱光庭賈易不平皆以謗訕誣子瞻執政兩平之是時既退元豐大臣于散地皆啣怨刻骨隂伺間隙而諸賢不悟自分黨相毁至紹聖初章惇為相同以為元祐黨盡竄嶺海之外可哀也吕微仲秦人戅直無黨范淳夫蜀人師溫公不立黨亦不免竄逐以死尤可哀也聞見錄鄒浩吏部侍郎字志完常州晉陵人中進士第厯揚州穎昌府教授元祐七年除太學博士出為襄州教授元符元年召對除右正言明年除名勒停羈管新州徽宗即位復宣徳郎添監袁州酒税除右正言遷右司諌起居舍人明年除中書舍人遷吏部侍郎除寳文閣待制知江寜府尋改知杭州未赴責授衡州别駕永州安置明年除名勒停昭州居住崇寜四年移漢陽軍居住五年復承奉郎遂歸常州大觀四年復直龍圖閣政和元年卒年五十二道鄉鄒公自少以道學行義知名於時其為人也和順積中而英華發外望之睟然見於顔面不問知其為仁人君子也其遇事接物猶虚舟然而堅挺之姿如精金良玉不可磨磷元符中用侍臣之薦擢居諌垣從人望也是時哲宗皇帝勵精求治用賢如不及一見即以公輔期之嘉言入告無不從者適中宮虚位之久大臣欲自結於嬖暱為保位之謀迎意媚合不以正公力言之以為公議不允忤上㫖姦諛之徒惡其害巳相與協力擠之於䧟阱之中又下石焉皆是也公之章留中不下乃偽為之加以詆誣不實之語如取他人之子而殺其母之類流布中外欲天下聞之真若有罪者其為謀深矣雖有端人正士無敢為公辨明者公既死迨今二十餘年昔之姦朋凋䘮略盡而正論行焉真偽是非始有在矣紹興三年其子柄集公之奏議一編属余為叙余於公非一朝燕游之好也知公為尤詳其事之本末皆余所親聞見者故詳著之以昭示来世庶乎使小人知君子之為善終不可誣也公之将亡余適還自京師聞公疾革未及弛擔即馳往省之見其薾然僅存餘息然語不及私猶以國事為問葢其平生以天下之重為巳任至埀絶而不忘也每追念及之愴然不能釋嗚呼世道䘮久矣不復有斯人也龜山集鄒公奏議集序張繹曰鄒浩以極諌得罪世疑其賣直也先生曰君子之於人也當於有過中求無過不當於無過中求有過程氏遺書志完修潔有志行記覽該總援茟數千言立就斯可畏者然自視如未足士有一善無貴賤必與之交無逺邇必欲收而取之正言姿志完云聖人之道備於六經六經千門萬户何從而入大要在中庸一篇其要在慎獨而巳俱於十二時中看自家一念從何處起即㸃檢不放過便見工力胡氏傳家錄田晝者字承君陽翟人故樞密宣簡公姪也人物雄偉議論慷慨俱有前輩之風鄒浩志完教授頴昌與承君遊相樂也志完性懦因得承君故遇事輙自激厲元符間承君監京城門志完除言官遣客見承君以測其意客問承君近讀何書承君曰吾作墨子詩有知君既得雲梯後應悔當年泣染絲之句為志完發也客言於志完志完折簡謝曰承君辭甚苦因約相見承君取告見之問志完曰平生與君相許者何如今君為何官志完愧謝曰上遇羣臣未嘗假以辭色獨於浩若相喜者今天下事故不勝言意欲使上益相信而後言貴有益也承君許之既而朋黨之禍大起時事日變更承君謝病歸陽翟田舎一日報立劉氏為皇后承君謂人曰志完不言可以絶交矣又一日志完以書約承君㑹頴昌中塗承君喜甚亟往志完具言諌立皇后時浩之言戅矣上初不怒也浩因奏曰臣即死不復望清光矣下殿拜辭以去至殿門望上猶未興凝然若有所思也明日浩乃得罪留三日臨别志完出涕承君正責曰使志完隠黙官京師遇寒疾不汗五日死矣豈獨嶺海之外能死人哉願君無以此舉自滿士所當為者未止此也志完茫然自失歎息曰君之贈我厚矣乃别去建中靖國初承君入為太宗正丞宰相曽布欲收置門下不能屈除提舉常平亦辭請知淮陽軍以去吏民畏愛之嵗大疾承君日自挟毉戸問病者藥之良勤得疾而卒聞見錄陳瓘忠肅公字瑩中南劎州人中進士甲科事神宗哲宗徽宗位至監察御史公為越州僉判蔡卞為帥待公甚厚初卞嘗為公語張懷素道術通神雖飛禽走獸能呼遣之至言孔子誅少正夘彼嘗諌以為太早漢楚成臯相持彼屢登髙觀戰不知其嵗數殆非世間人也公每竊笑之及将往四明而懷素且来㑹稽卞留少俟公不為止曰子不語怪力亂神以不可訓也斯近怪矣州牧既甚信重士大夫又相謟合下民視之從風而靡使真有道者固不願此不然不識之未為不幸也後二十年懷素敗多引名士或欲因是染公竟以尋求無迹而止非公素論守正則不免於羅織矣紹聖初章申公以宰相召道過山陽公隨衆謁之章素聞公名獨請登舟共載而行訪以當世之務公曰請以所乘舟為喻乘舟偏重其可行乎移左置右其偏一也明此則可行矣章黙然未答公復曰上方虚心以待公公必有以副上意者敢問将欲施行之叙以何事為先何事為後何事當緩何事當急誰為君子誰為小人諒有素定之論章竚思良久曰司馬光姦邪所當先辨無急於此公曰相公誤矣此猶欲平舟勢而移左以置右也果然将失天下之望矣章厲色視公曰光輔母后獨宰政柄不纂紹先烈肆意大改成緒悞國如此非姦邪而何公曰不察其心而疑其迹則不為無罪若遂以為姦邪而欲大改其巳行則悮國益甚矣乃為之極論熙豐元祐之事以為元豐之政多異熙寜則先志固巳變而行之溫公不明先志而用母改子之説行之太遽所以紛紛至於今日為今之計唯當絶臣下之私情融祖宗之善意消朋黨持中道庶乎可以救弊若又以熙豐元祐為説無以厭服公論恐紛紛未艾也辭辯淵源議論勁正章雖忤意亦頗驚異遂有兼取元祐之語留公共飯而别章到闕召公為太學博士公聞其與蔡卞方合知必害於正論遂以㛰嫁為辭久乃赴官於是三年不遷公為太學博士薛昂林自之徒為正錄皆蔡卞之黨也競推尊荆公而擠排元祐禁戒士人不得習元祐學術卞方議毁資治通鑑板公聞之因䇿士題特引序文以明神考有訓於是林自駭異而謂公曰此豈神考親製邪公曰誰言其非也自又曰亦神考少年之文爾公曰聖人之學得於天性有始有卒豈有少長之異自辭屈愧歉遽以告卞卞乃密令學中置板髙閣不復敢議毁矣嘗為别試所主文林自謂蔡卞曰聞陳瓘欲盡取史學而黜通經之士意欲沮壞國是而動摇荆公之學也卞既積怒謀因此害公而遂禁絶史學計畫巳定唯候公所取士求疵立説而行之公固預料其如此乃於前五名悉取談經及純用王氏之學者卞無以發然五名之下往往皆博洽稽古之士也公嘗曰當時若無矯揉則勢必相激史學往往遂廢矣故隨時所以救時不必取快目前也公因朝㑹見蔡京視日久而不瞬嘗以語人曰京之精神如此他日必貴然矜其禀賦敢敵太陽吾恐此人得志必擅私逞欲無君自肆矣尋居諌省遂攻其惡京聞公言因所親以自解且致情懇而以甘言啖公公曰杜詩所謂射人先射馬擒賊須擒王不得巳也於是攻之愈力公謂天下之事變故無常唯稽攷往事則有以知其故而應變王氏之學乃欲廢絶史學而咀嚼虚無之言其事與晉無異将必以荒唐亂天下矣故彈蔡京疏文有曰絶滅史學一似王衍重南輕北分裂有萌逮今三十餘年而所言無不騐矣公以紹聖史官專據荆公日錄以修裕陵實録變亂是非不可傳信故居諌省首論其事進日錄辨乞改實錄又因竄責合浦著尊堯集深闢誣妄以明君臣之義公謫台州朝廷起遷人石悈知州事且令赴闕之官士論訩訩咸以為将有處分於公也悈至果揚言怖公視事次日即遣兵官突来所居搜檢行李攝公至郡庭大陳獄具盖朝㫖取索尊堯副本而悈為此以相迫脅耳公知其意遂問曰今日之事豈被㫖耶悈失措而應曰有尚書省劄子出示公劄子所行葢取尊堯集副本以為係詆誣之書合繳申毁棄也公曰然則朝廷指揮取尊堯集耳追瓘至此復欲何為因問之曰君知尊堯所以立名乎葢以神考為堯而以王上為舜也助舜尊堯何謂詆誣時相學術淺短名分之義未甚講求故為人所法使請治尊堯之罪将以結黨固寵也君所得於彼者㡬何乃亦不畏公議干犯名分乎請具申瓘此語瓘将顯就誅戮不必以刑獄相恐悈不待公言畢屢揖公退尋語人曰不敢引其説尚自如此良可畏也繼又幽公於僧舍窘辱百端公安之不以為撓悈亦終不能為害公雖緣蔡氏得罪而首論私史力排王氏王蔡之黨如薛昂蹇序辰何執中鄧洵仁洵武蔡嶷之徒皆當時恊力排䧟欲殺公者亦不獨蔡京兄弟而已蔡嶷與公初不相識公上宰相書謫守海陵嶷為太學生以長書遺公論事合公議謂公諌疏婉而有理似陸宣公剛而不撓似狄梁公文章淵源發明正道則韓文公其人也至次年嶷以對策為大魁所陳時務與前書頓異於是愧悔而欲殺公以滅口密贊京黨出力尤甚公有斗餘酒量每飲不過五爵雖㑹親戚間有歡適不過大白滿引恐以長飲廢事每日有定課自雞鳴而起終日冩閲不離小齋倦則就枕既寤即興不肯偃仰枕上每夜必置行燈於床側自提就案人或問公何不呼喚使令者公曰起止不時若渉寒暑則必動其念此非可常之道偶吾性安之故不欲以勞人也公智明慮逺通易數如靖康變故隆祐埀簾國家中興之事往往預言之士大夫間有親聞者並遺事徐師川以才氣自負少肯降志於人常言吾於魯直為舅氏然不免有所切議至於了翁心誠服之忠宣范公晚年益以天下自任尤留意人才或問其所儲蓄人材可為今日用者答曰陳瓘又問其次曰陳瓘自好也宣和之末人憂大厦之将顛或問游定夫以當今可以濟世之人定夫曰陳了翁其人也劉器之亦嘗因公病使人勉公以毉藥自輔云天下将有頼於公當力加保養以待時用也其為士大夫所欽屬如此張天覺晚年亦好佛重道建華嚴閣作醮籙㑹黄冠釋子紛紛從之公雖被其薦引然素未相識及通書也至是代書簡之曰辟榖非真道談空失自然何如勲業地無愧是神仙公送其姪淵責沈文曰予元豐乙丑為禮部貢院㸃檢官適與范淳夫同舍公嘗論顔子不遷怒不貳過惟伯淳能之予問公曰伯淳誰也公黙然久之曰不知有程伯淳邪予謝曰生長東南實未知也予嘗以寡陋自愧了翁之子正由云了翁自是每得明道先生之文必冠帶然後誦之遺事並仝初蔡京為翰林學士承㫖以辭命為職潛姦隠慝未形於事公於是時力言京不可用用之必為腹心患聞者往往甚其言已而怙寵妄作悉如公言於是人始服公為蓍龜也昔王安石參大政士大夫相慶於朝吕獻可獨抗章論之雖溫公猶以為太遽未㡬變更祖宗故事流毒至今未殄也故溫公每謂人曰獻可之先見予所不及余以謂公之於京言之於未用之前獻可於文公論之於既用之後則公之先見於獻可有光矣龜山撰公祠堂記宋名臣言行錄後集巻十三
