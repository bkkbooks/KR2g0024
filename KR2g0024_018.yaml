body:
  text: 宋名臣言行録後集卷八宋朱子纂集吕公著申國正獻公字晦叔文靖之子以恩補官中進士第相哲宗贈太師歐陽修為翰林薦公文學行誼宜在左右稱公清靜寡欲有古君子之風及修使北中動問中國德行文章之士修以公及王荆公對家傳歐公嘗患士大夫少髙退之節乃薦公及張唐公王荆公韓持國欲以激厲風俗又薦荆公與公作諌官家孰記公侍經筵時仁宗春秋髙公於經傳同異訓詁得失皆粗陳其略至於治亂安危之要聞之足以戒者乃為上反覆申陳之仁宗嘗詔講官凡經傳所載逆亂事皆直言毋諱公因進講言弒逆之事臣子所不忍言而仲尼書之春秋者所以深戒後世人君欲其防微杜漸居安慮危使君臣父子之道素明長幼嫡庶之分早定則亂臣賊子無所萌其姦心故易曰履霜堅氷至由辨之不早辨也公每進講多傳經義以進規會講論語至人不知而不愠不亦君子乎公言在下而不見知於上者多矣然在上者亦有未見知於下者也故古之人君政令有所未孚人心或有未服則反身修德而不以愠怒加之如舜之誕敷文德文王之皇自敬德是也上知公意深切每改容鞠躬如在車之式並家傳公於講讀尤精語約義明可為當世之冠與司馬光同侍經筵光退語人曰每聞晦叔講便覺已語煩吕汲公撰神道碑自仁宗末率以二月開經筵至重午罷八月復開至冬至罷是嵗詔以九月五日開至重陽罷公奏願陛下日御邇英以循先帝故事詔即從之後講論語將畢公以尚書備二帝三王之道尤切於治術乞候進講論語畢日進講尚書從之英宗自太廟赴南郊問今之郊與古之郊何如對曰古之郊貴誠尚質今之郊盛儀衛事物采而已神宗自在藩邸即熟聞公與司馬光名及即位首召二人為學士朝論翕然稱得人神宗初御經筵公進講尚書至天乃錫王勇智上曰何以獨言勇智公曰仲虺方稱成湯能伐夏救民故以勇智言之然聖人之德當如易所謂聰明睿智神武而不殺者然後可以盡善時上方富於春秋故公以好勇黷武為戒並家傳夏秋淫雨京師地震公言君人者去偏聽獨任之弊而不主先入之語則不為邪説所亂顔淵問為邦孔子以逺佞人為戒蓋佞人惟恐不合於君則其勢易親正人惟恐不合於義則其勢易疏惟先格王正厥事蓋未有事正而世不治者惟陛下勉行而勉終之拜御史中丞入對上語及西陲事公退而奏曰惟當修嚴武備來則應之以逸待勞若臨遣大臣張皇武事或議深入或求竒功皆非國家至計後公去位朝廷遣大臣臨邉已而西征無功士卒內潰皆如公所料公知貢舉在貢院密上奏曰天子臨軒䇿士而用詩賦非舉賢求治之意且近世有司考校已專用䇿論今來殿試欲乞出自宸衷惟以詔䇿咨訪治道是嵗上臨軒遂以䇿試進士家傳介甫與晦叔素親患臺諌多橫議故用晦叔為中丞既而天下皆患條例司為民害晦叔乃復言條例不便介甫以晦叔叛已怨之尤深已而上語執政吕公著嘗言韓琦將興晉陽之甲以除君側之惡介甫因用為晦叔罪除知頴州溫公日録王荆公與吕申公素相厚嘗曰吕十六不作相天下不太平及薦申公為中丞其辭以謂有八元八凱之賢未半年所論不同復謂有歡兜共工之姦荆公之喜怒如此蓋孫覺莘老嘗為上言今藩鎮大臣如此論列而遭挫折若唐末五代之際必有興晉陽之甲以除君側之惡者矣上已忘其人但記美鬚誤以為申公也見聞録彗星見詔求直言公疏曰陛下有欲治之心而無致治之實者何哉此任事之人負陛下也何以言之士之邪正賢不肖蓋素定也今則不然前日舉之以為天下之至賢後日逐之以為天下之至不肖其於人材既反覆而不常則於政事亦乖戾而不審矣陛下獨不察之乎神道碑公居洛一日對康節長嘆曰民不堪命矣康節曰介甫者逺人公與君實引薦至此尚何言公作曰公著之罪也聞見録邇英進讀上留公論治道遂及釋老虛寂之旨公問曰堯舜知此道乎上曰堯舜豈不知公曰堯舜雖知此而常以知人安民為志碑初公自河陽入覲都人環觀相謂曰此公還朝百姓之幸也至是士民相慶既受命出殿門武夫衛卒皆歡抃咨歎慈聖光獻太后聞公進尤喜曰積德之門也溫公在洛聞公登樞以書遺都下友人曰晦叔進用天下皆喜以為治表聞其尤力辭光不敢致書君宜勸之早就職公既就職因奏自熙寧以來朝廷論議不同端人良士例為小人所沮格指為沮壞法度之人不可復用此非國家之利願陛下省察上曰當以次收用之上初即位韓絳即議復肉刑至是復詔執政議公以為後世禮教未備而刑獄繁肉辟不可復將有踊貴屨賤之議吳充議復置圜土衆以為難行王圭欲取開封死罪囚試以劓刖公曰刖而不死則肉刑遂行矣議竟寢上以慈聖既升祔大推恩於曹氏凡進官被賞者二百餘人公因言自古亡國亂家不過親小人任宦官通女謁寵外戚數事而已上深以為然諜告夏幽其主秉常上對二府議大舉兵伐之公曰如諜者所告則夏人誠有罪然陛下未審以何人為元帥未得其人則不如不舉五年四月公以西師無功奏曰外議皆謂王中正宜正典刑翌日公上奏乞解樞務章繼上面請尤切乃除資政殿學士定州路安撫使及永樂城陷奏至上開天章閣對輔臣曰邉民疲弊若此獨吕公著為朕言之他人未嘗及也公至定州謝表曰進不敢希功而生事退不敢弛備以曠官人人傳誦以為托實是時朝廷方經武事增修邉備趨時者爭獻北伐之䇿公至定武即為上言中國與契丹通好久邉境晏然無事塞上屯軍素有節制惟宜靜以鎮之保甲法新行被邉皆設教場日鳴金鼓課人誦戰法聲達於虜虜檄邉郡以為生事違誓約上委公處其事公即上奏以為遣邉人習戰法於境上非管子寓令之意也請一切罷去不聽並家傳哲宗即位公為邇英侍讀始至上言曰人君即位之始當正始以正天下修德以安百姓修德之要莫先於學學有緝熙於光明日新又新以至於大治者學之力也臣待罪講讀謹條上十議以禆聰明一曰畏天二曰愛民三曰修身四曰講學五曰任賢六曰納諌七曰薄斂八曰去奢九曰省刑十曰無逸居月餘除執政遂倚以為相其論薄斂之略曰昔鹿臺之財巨橋之粟啇紂聚之以喪國武王散之以得民由是觀之人主當務仁義而已何必曰利家孰記為君之道幾無出此十篇可為人君座右銘下蔡語録官制三省並建而中書獨為取旨之地門下尚書奉行而已公曰三省均輔臣也正如同舟共濟當一心並力以修政事乞事干三省者自今執政同進呈取旨而各行之遂定為令初執政三五日一集都堂長官專決同列多不與議及公秉政非有故日聚都堂遂為故事公始與司馬光輔政於是共推本先帝之意蓋欲鞭笞四夷以疆中國阜蕃邦財以佐其費有司奉行失其本旨先帝固嘗患之矣故欲更而未暇與已更而未定其詔墨記言具在而可考者有若干事若詰青苗之害則曰常平泉穀以禦水旱而貪散以求利至十之七八國失拯救之備而民之責償被笞箠者衆責興利之弊則曰大傷鄙細有損國體戒用兵之失則曰南安西師兵夫死傷者皆不下二十萬有司失一死罪其責不輕今無罪置數十萬人於死地朝廷不得不任其咎救官制之滯則曰更新官制以核正吏治至今頒行無緒有以啓寵四方貽譏後世於是二公與同志者建請以常平舊法改青苖以嘉祐差役參改募役罷保馬以復監牧損保甲教選以便農作除市易之令寬茶鹽之禁賜邉寨贖亡民和西戎於是民歡呼鼓舞以為便並神道碑溫公病中與公簡曰晦叔自結髮志學仕而行之端方忠厚天下仰服埀老乃得秉政平生所藴不施於今日將何俟乎比日以來物論頗譏晦叔慎默太過若此際復不廷爭事蹉跌則入彼朋矣光自病以來悉以身付醫家事付康惟國事未有所屬今日屬於晦叔矣公上奏曰自古治戎之䇿雖三代之盛亦不過來則禦之去則備之為備之道莫先於積穀初溫公議凡役人皆不許雇人以代然東南及西蜀諸路民有髙資或子弟業儒皆當為弓手執賤役既不許募代甚苦之公聞其弊即令一切聽雇募民情大恱上以邇英講讀論語畢賜執政講讀官左右史御筵於資善堂內出御書唐人詩分賜在坐翌日公上奏曰臣伏念陛下睿哲之性出於天縱而復內稟慈訓日新典學誠以堯舜三代為法則四海不勞而治將來論語終帙進講尚書二書皆聖人之格言為君之要道臣輒於其中及孝經內節要語共一百假進呈聖人之言本無可去取臣今惟取明白切於治道者庶便於省覽或逰意筆硯之間以備揮染亦日就月將之一助也居數日太皇太后宣諭曰吕相所進要語已令皇帝即依所奏每日書寫看覽甚有益於學問與寫詩篇不同也郎官何洵直失本部印公曰洵直誠有罪然重譴之則自今猾吏皆有以制主司矣乃薄其罪公在仁宗朝嘗請進士先䇿論神宗初又獻議以經術取士及知熙寧三年貢舉遂密啓臨軒專用䇿試未幾公以言青苖等事得罪去王安石專政乃盡罷詩賦一用經義獨以春秋為破缺不可讀廢其學學者不得以應試安石又與其子雱其徒吕惠卿升卿撰定詩書周禮義模印頒天下凡士子應試者自一語以上非新義不得用於是學者不復思索經意亦不復誦正經惟誦安石惠卿書精熟者輒得上第有司發䇿問必先稱頌時政對者因大為諛辭以應之又多以佛書證六經至全用天竺語以相髙晚向字學復以字書去取天下士於是學者不復解經而專解字往往辨析字畫説一字至數百言去經意益逺由是中外議者皆咎經義而思詩賦矣元祐初議者爭言科舉之弊請復舊制公曰先帝更新法度如造士以經術是為近古且仲尼六經何負於後世特安石課試之法為繆耳安石解經亦未必不善惟其欲人同已為大繆耳溫公亦以為詩賦不可復然論者習見經義之弊忿悶不可遏乃定制進士初場試經義次賦詩論䇿對經義者許引用古今諸儒之説及已見又詔立春秋科太學置春秋博士二貟禁有司不得於莊老書出題程文不得雜用申韓刑名之學及釋氏書仍罷試律義至是將廷試執政又以熙寧復䇿之初進士葉祖洽譏議祖宗自是對䇿者皆訕前朝以阿當世因以為䇿問可廢當復詩賦論題公曰天子臨軒發䇿延四方貢士詢以治道豈非近古良法邪至於對者是非邪正則在考官去取耳乃仍舊試䇿其後論科舉者亦未息以至公薨而詩賦益隆期盡廢經義而後已非公意也公晚多讀釋氏書益究禪理溫公博學有志行而獨不喜佛公每勸其留意且曰所謂佛學者直貴其心術簡要爾非必事事服習為方外人也並家傳公居家夏不排窗不揮扇冬不附火一日盛夏楊大夫瓌寶字器之將赴鎮戎軍倅來辭器之乃吕氏甥公於西窗下烈日中公裳對飲二杯器之汗流浹背公凝然不動雜志公平生未嘗行草書尤不喜人博曰勝則傷仁負則傷儉家孰記下同公平生未嘗較曲直聞謗未嘗辨少時書於座右曰不善加已直為受之蓋其初自懲艾也如此至和中手書東漢延篤與李文德書於座右又書古人詩好衣不近節士體梁穀似怕腹中書於屏風吕晦叔真大臣其言簡而意足孫莘老嘗言裕陵好問且曰好問則裕晦叔曰好問而裕不若聽德而聰人有非劉向強聒而不舍者晦叔曰劉向貴戚之卿此語可謂忠厚然向之眷眷於漢室而不忍去則是也至於上變論事亦可謂不知命矣龜山語録宋興以來大臣以三公平章軍國者四人而公父子居其二時論榮之吕希哲字原明正獻公之長子以恩補官充崇政殿説書正獻公教公事事循規矩甫十嵗祁寒暑雨侍立終日不命之坐不敢坐也日必冠帶以見長者平居雖天甚熱在父母長者之側不得去巾襪縛袴衣服唯謹行步出入無得入茶肆酒肆市井里巷之語鄭衛之音未嘗一經於耳不正之書非禮之色未嘗一接於目公嘗言人生內無賢父兄外無嚴師友而能有成者少矣家傳公從王安石學安石以為凡士未官而事科舉者為貧也有官矣而復事科舉是僥幸富貴利達而巳學者不由也公聞之遽棄科舉一意古學始與程先生頤俱事胡先生瑗公少程一二嵗察其學問淵源非他人比首以師禮事之而明道程皓橫渠張載孫公覺李公常皆與公遊由是知見日益廣大然公亦未嘗專主一説不私一門務略去枝葉一意涵養直截徑捷以造聖人專慕曾子之學盡力乎其內者其讀經書平直簡要不為辭説以知言為先自得為本躬行為實不尚虛言不為異行正獻公嘗語張耒曰此子不欺暗室守官京師不謁臺諌官遇遷轉即一見執政過此不見也正獻公廣用當世賢士人之有一善無不用也嘗以數幅紙書當世名士姓名既而失之後復見此紙則所書人悉用之矣正獻公嘗親書遺公曰當世善士無不用者獨爾以吾故不得用亦命也公為説書凡二年日夕勸導人主以修身為本修身以正心為主心正意誠天下自化不假他術身不能修雖左右之人且不能喻况天下乎公既除諌官纍辭未獲蘇子瞻在邇英戲謂公曰法筵龍象當觀第一義公笑而不答退謂范淳甫曰若辭不獲命必以楊畏為首時畏方在言路以險詐自任頗為子瞻所厚公故及之並家傳公為郡處令公帑多畜鰒魚諸乾物及筍乾菌乾以待賔客以減雞鴨等生命也雜録公晚居宿州真揚間十餘年衣食不給有至絶糧數日者公處之晏然靜坐一室家事一切不問不以毫髮事託州縣其在和州嘗作詩云除却借書沽酒外更無一事擾公私間居日讀易一爻遍考古今諸儒之説默坐沉思隨事解釋夜則與子孫評論商確得失久之方罷家傳仙源嘗言與侍講為夫婦相處六十年未嘗一日有面赤自少至老雖衽席之上未嘗戲笑雜志公與諸人云自少官守處未嘗干人舉薦以為後生之戒仲父舜從守官會稽人或譏其不求知者仲父對詞甚好云勤於職事其他不敢不慎乃所以求知也童蒙訓公為人處事皆有長久之計求方便之道只如病中風人口不能言手不能書而養疾者乃問所欲病者既不能答適足增苦故公嘗教人每事作一牌子如飲食衣裳寒熱之類及常所服藥如理中元之類常所作事如梳頭洗面之類及作人親筆書病者取牌子以示人則可減太半之苦凡公為人處事每如是也童蒙訓宋名臣言行録後集卷八
