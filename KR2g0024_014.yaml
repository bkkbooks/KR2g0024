body:
  text: 宋名臣言行録後集卷四宋朱子纂集胡宿文恭公字武平常州人中進士第事仁宗英宗官至樞密副使入內都知楊懷敏坐衛士夜盜入禁中驚乘輿斥出為和州都監懷敏用事久勢動中外未幾召復故職公知制誥封還詞頭不草制論曰衛士之變蹤迹連懷敏得不窮治誅死幸矣豈宜復在左右其命遂止歐公撰墓志朝議在官年七十而不致仕者有司以時按籍舉行公以謂養亷恥厚風俗宜有漸而欲一切以吏議從事殆非所以優老勸功之意當少緩其事使人得自言而全其美節朝廷是其言至今行之同上公謂亷恥之責當先士人功舊之甄宜厚武士邉防偏禆京師將校年七十者衆其間曽經行陳立功伐一旦下令悉令告老沮立功之心解守邉之體非所以為國養恩也時包拯建此議屢以辭氣折公公論不可奪朝廷卒從公議胡宗愈撰行狀皇祐新樂成議者多議論有詔新樂用於常祀朝㑹而郊廟仍用舊樂公言書稱同律而今舊樂髙新樂下相去一律難並用而新樂未施於郊廟先用之朝㑹非先王薦上帝配祖考之意皆不可近制禮部四嵗一貢士議者患之請更為間嵗公獨以為不然曰使士子廢業而奔走無寧嵗不如復用三嵗之制也衆皆以公言為非行之數年士子果以不便而卒用三嵗之制公通隂陽五行天人災異之說南京鴻慶宫災公以謂兩京聖宋所以受命建號而大火主於商丘國家乘德而王者也今不領於祠官而比年數災宜修火祀事下太常嵗以長吏奉祀啇丘自公始慶厯六年夏河北河東京東同時地震而登萊尤甚公以嵗推之曰明年丁亥嵗之刑德皆在北宫隂生於子而極於亥然隂猶强而未即伏陽猶微而未即勝此所以震也是謂龍戰之㑹而其位在乾今西北二虜中國之隂也宜為之備不然必有內盜起於河朔明年王則以貝州叛公又以為登萊視京師為東北易艮少陽之位也今二州並置金坑多聚民以鑿山谷陽氣損泄故隂盛而動縣官入金嵗幾何小利而大害可即禁止以寧地道皇祐五年正月㑹靈宫災是嵗冬至祀天南郊以二聖並配明年大旱公曰五行火禮也去嵗火而今又旱其應在禮此殆郊丘並配之失即言宜用迭配如初詳議官闕判院者當擇人薦於上公與同列得二人一人者監稅河北以水災虧課同列議曰虧課小失不足白上以纍才公不可至上前悉白之且曰此人小纍才足惜仁宗曰果得才小纍何恤遂除詳議官同列退誚公曰詳議欲得人公苦欲白上緣是不得奈何公曰彼得與不得一詳議官耳是固亦有命也宿以誠事主今白首矣不忍絲髮欺君以負平生之節為之開陳聽主上自擇耳同列驚曰某從公久乃不知公所存如此涇卒以折支不給出惡言欲為亂其後斬二人黥四人亂意乃息委公置獄治三司吏不時計度三司使護吏不肯遣公曰涇卒悖慢誠其罪然折支軍情所繫積八十五日而不與則三司豈得無罪耶陛下以包拯近臣不令置對可謂曲法申恩而拯猶不自省公拒制命臣恐主威不行而綱紀益廢矣拯懼立遣吏就獄嘉祐六年拜樞密副使羣臣方更張庶事以革弊公獨曰變法古人所難不務守祖宗成法而徒紛紛無益於治也又謂契丹與中國通好六十餘年自古未有也善待夷狄者謹為備而巳若界上交侵小故乃城寨主吏之職朝廷宜守祖宗之約不宜爭小利而隳大信深戒邉臣生事以為功並志上命公為青詞禱諸陵山川以求儲嗣公上疏仁宗謂漢文帝二年有司請蚤建太子是時文帝巳有元子猶對有司稱楚王吳王淮南王皆秉德以陪朕何為不豫哉太祖皇帝感昭憲太后遺言捨魏王而立太宗其神武英斷自開闢以來未之有也陛下必待聖嫡然後擬議非居安思危之道願察宗室之賢者立之則儲位定而人心安矣仁宗感悟遂罷祈禱行狀客有造公者具公服鞾板而忘記不易帽公與之對語盡禮而退終未嘗色動吕氏家孰記公每語後進曰富貴貧賤莫不有命當修身俟時毋為造物者所嗤燕談蔡襄忠惠公字君謨興化軍人中進士甲科事仁宗英宗官至端明殿學士范仲淹貶知饒州余靖上疏論救尹洙請與同貶歐陽修移書責司諌髙若訥皆坐貶公作四賢一不肖詩以記其事四賢謂仲淹靖洙修不肖斥若訥也其詩播於都下士人爭寫之鬻書者市之頗獲厚利政要慶厯初永叔安道王素俱除諌官公以詩賀之曰御筆新除三諌官喧然朝野競相歡當年流落丹心在自古忠良得路難必有謨謀禆帝右直須風采動朝端世間萬事俱塵土留取功名久逺看三人者以其詩薦於上尋亦除諌官記聞是時天下無事士大夫弛於久安一日元昊叛師久無功天子慨然厭兵思正百度以修太平既巳排羣議進退二三大臣又詔增置諫官四員使拾遺補闕所以遇之甚寵公以材名在選中遇事感激無所廽避權幸畏斂不敢撓法干正而上得益與大臣圖議明年屢下詔書勸農桑興學校革弊修廢而天下竦然知上之求治矣於此之時言事之臣無日不進見而公之補益為尤多歐公撰墓志御史吕景初吳中復馬遵坐論梁丞相罷臺職除他官公封還詞頭不草制其後屢有除授非當者必皆封還之而上遇公益厚曰有子如此其母之賢可知命特賜冠帔以寵之墓志陳執中參政公與孫甫上言執中剛愎不才若任以政天下不幸上不聽因求出知福州記聞公為政精明而於閩人尤知其風俗禮賢勸學除其甚害往時閩士多好學而専用賦以應科舉公得先生周希孟以經術教授學者至數百人公親至學舍執經講問為諸生率公為文章清遒粹美工於書畫頗自惜不妄為人書仁宗尤愛稱之御製元舅隴西王碑文詔公書之其後命學士撰溫成皇后碑文又敕公書則辭曰此待詔職也並墓志蘇子容云歐公不言文章而喜談政事君謨不言政事而喜論文章各不矜其所能也談訓王素懿敏公字仲儀以父旦遺恩補官召試賜同進士出身事仁宗官至端明殿學士以工部尚書致仕仁宗方留情政事思聞得失親除諌官而歐余王蔡相次進用公嘗言禮部取士不詢采行實顧文辭漫漶不足以應務請郡國置學擇明師使通知經術稍近三代里選之法自景德以來較今內外無名之費數倍于前請置官三司量一嵗所入其用非急者皆省去之㑹皇子生議欲因赦百官進官大賞賚諸軍公又言方元昊叛契丹數有所求縣官財用不足宜留金繒以佐邉費一官爵以賞戰勞其議為公止仁宗御天章閣出手詔問兩府大臣所以興治革弊之方公又疏時政姑息十餘事皆人所難言者王禹玉撰墓志仁宗問公曰大僚中孰可命以相事者公曰惟宦官宫妾不知姓名者乃可充選帝憮然有間曰惟富弼耳公下拜曰陛下得人矣既告大廷相富公士大夫皆舉笏相賀或密以聞帝益喜曰吾之舉賢於夢卜矣聞見後録慶厯中京師旱公為諌官乞親行禱雨帝曰太史言月二日當雨一日欲出禱公曰臣非太史然是日必不雨帝問故公曰陛下幸其當雨以禱不誠也不誠不可動天臣故知不雨帝曰明日禱醴泉觀公曰醴泉之近猶外朝也豈憚暑不逺出耶帝每意動則耳赤耳巳盡赤厲聲曰當禱西太乙宫公曰乞傳㫖帝曰車駕出郊不預告卿不知典故公曰國初以虞非常今久太平預告但百姓瞻望清光者衆耳無虞也諌官故不扈從明日特召公以從日色甚熾埃霧漲天帝玉色不怡至瓊林苑回望西太乙宫上有雲氣如香煙以起少時雷電雨甚至帝却逍遙輦御平輦撒蓋還宫又明日召公對帝喜曰朕自卿得雨幸甚又曰昨即殿廷雨立拜焚生龍腦香十七斤至中夜舉體盡濕公曰陛下事天當恭畏然隂氣足以致疾亦當慎帝曰念不雨欲自以身為犧牲何慎也公言王德用進女口事帝初詰以宫禁事何從知公不屈帝笑曰朕真宗之子卿王旦之子有世舊豈他人比德用實進女口巳服事朕左右何如公曰臣之憂正恐在陛下左右耳帝即命宫臣賜王德用所進女口錢各三百千押出內東門訖奏帝泣下公曰陛下既不棄臣言亦何遽也帝曰朕若見其人留戀不肯去恐亦不能出矣少時宫官奏聞女巳出內東門帝動容而起聞見後録知成都府先是牙校嵗輸酒坊錢以供厨傳之費前後日加豐而不知約故輸者益加困而不能勝公為一切裁約之鐡錢惟行於兩川嵗加鑄不止故錢輕貨重商旅不行公為罷鑄十年而物價以平利州路饑公遣發廪賑救民得無流徙詔適下而公奏至公為政在便人情蜀人録公所行為王公異斷墓志公自筮仕所至稱為能吏既升臺風力愈徑嘗與同列奏事上前事有不合衆皆引去公方論列是非俟得㫖乃退帝曰真御史也議者目公為獨擊鶻名賢詩話劉敞字原夫吉州臨江人中進士甲科事仁宗英宗官至集賢學士直集賢時方議定大樂天子使中貴人參其事公諌以為王事莫重於樂今才學滿朝辨論有餘足以增朝廷之光而顧使若趙談者居間臣恐為袁盎笑也弟舍人攽撰行狀秦州與羌人爭古渭州公奏請棄之謂假令新城足以蔽秦州長無羌胡之虞雖傾國守之可也不然地形便利賊能乘之以擾邉雖傾國爭之可也今何所重輕而縻國財困民力損士卒之命以貪咫尺之地時議者不同竟留之秦州坐是應接多事財用匱竭矣行狀判考功夏竦薨賜諡文正公曰此吾職也即上疏言諡者有司之事也且竦行不應法今有司各得守其職而陛下侵臣官疏三上天子嘉其守為更其諡曰文莊公曰姑可以止矣陳公撰墓志知制誥陳丞相以修注未一月為言上曰此豈計官資日月耶公謝日上又面諭曰外間事有不便當一一語朕也無幾何朝廷從禮院有所詢問禮生擅發印狀以報禮官莫知知禮院事吳充謫罰禮生而坐以出官公奏以謂朝廷久安吏習因循百司庶府茍且巳甚稍激厲振作未知如何而充以此得罪豈不傷事害政請追止前命巳而修起居注馮京復以言事奪職公因奏事上謂公曰吳充乃是振職馮京意亦無他中書惡其太直不與含容耳公奏言自古惟有人主不能容受直言或致竄謫臣下今則不然上慈仁好諌而中書不務將順聖德之美排逐言者乃是蔽君之明止君之善必且感動隂陽有風霧日食地震之變居五日地果震鎮戎軍而都下雪後纍日昏霾太陽色昏濁略皆如公言公又勸上收攬威權無使聰明蔽塞法令不行以消災變上深納之兩制諸公多求補郡者公上疏論邪臣正臣之分正臣常難進而易退邪臣常易進而難退願陛下參任觀之吕溱蔡襄歐陽修賈黯韓絳皆有真質無流心論議不阿執政有益當世者誠不宜許其外補使四方有以窺朝廷啓奸幸之心上悟頗留修等並行狀宦者石全彬以勞遷宫苑使領觀察使意不滿退而愠有言居三日正除觀察使公封還詞頭不草制其命遂止墓志奉使契丹公素知敵山川道里敵人道自古北口回曲千餘里至都河公問曰自松亭趨栁河甚直而近不數日可至中京何不道彼而道此蓋敵人常故迂其路欲以國地險逺誇示使者且謂莫習其山川不虞公之問也相與驚顧羞愧即吐其實曰誠如公言時順州山中有異獸如馬而食虎豹敵人不識以問公曰此所謂駮也為言其形狀聲音敵人益歎服治揚前守政苛吏民不安公以寬簡附之而民大和及至鄆月餘境內政清盜賊屏息先是西路久旱鄆尤多蝗公入境而雨至州數日蝗自出境亡去是時士大夫稍矜虛名每得官輒讓衆亦豫其恬退讓不失始利而得名益髙讓端無窮或四五讓至七八下至布衣福州陳烈等初除吏亦讓賜之粟帛亦讓公以為此皆挾僞求名要上迷衆其風不可長乃建言諸讓官或一讓或再讓或不得讓宜一以故事舊典為準是嵗將親大祫於太廟丞相欲加上尊號公以禮部兼領名表丞相請撰表公說止之曰陛下自寶元以來不受徽號至今且二十年天下之人莫不知天子持盈好謙今復加數字既不足盡聖德而前美並棄誠亦可惜願加深思富丞相不怡曰適已奏聞乃是上意欲爾不可止也公曰諾退謂子弟曰吾備位近臣當獻可替否寧得罪權門豈可使主上受虛名而棄實美耶遂上疏曰陛下尊號既巳云體天法道欽文聰武神聖孝德盡善極美復加大仁不足增光而曰至治有若自矜今百姓多困倉廪不實風俗未清賢不肖混淆獄訟繁多盜賊羣起水旱繼有四夷雖粗定亦本以重賂厚利羈縻之非畏威慕義者也未可謂至治然則讓而不居於聖德彌髙矣臣謂陛下永執至道以當天心必有一謙四益之報增加數字未足發揚光輝而反纍二十年昭升之美章凡四上天子得公奏顧侍臣曰我意本謂當如此遂斷章表不受公於是忤時相公學問廣博無書不通自浮屠老子以及山經地志隂陽卜筮醫藥天文略皆究知嘗齊太乙宫與內弟王欽臣夜語曰嵗星往來虛危間色甚明盛以吾觀之當有興於齊者嵗餘英宗以齊州防禦使入繼大統遂登大位並行狀宋名臣言行録後集卷四
