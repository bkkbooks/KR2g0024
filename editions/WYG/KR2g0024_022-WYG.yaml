body:
  text: 宋名臣言行錄後集巻十二宋朱子纂集劉摯忠肅公字莘老永静軍人登進士甲科相哲宗荆公初秉政公除御史論率錢助役官自雇人略舉十害時御史中丞楊繪亦上疏論新政并公章下司農寺司農條件詰難劾繪與公險詖欺誕中有向背有㫖分析公奏曰臣有言責采士民之説敷吿於陛下是臣之職也今有司駁奏據令分析是使之較是非争勝負交口相直無乃辱陛下耳目之任哉所謂向背則臣所向者義所背者利所向者君父所背者權臣願以臣章并司農奏宣示百官考定當否如臣言有取幸早施行若稍涉欺罔甘就竄逐奏入不報復上疏曰陛下夙夜勵精以親庶政天下未至於治安者誰致之耶二三年間開闔動摇無一物得安其所者盖自青苖之議起而天下始有聚斂之疑青苖之議未允而均輸之法行均輸之法方擾而邊鄙之謀動邊鄙之禍未艾而助役之事興其間又求水利也又淤田也又省併州縣也其議財則市井屠販之人皆召而登政事堂其征利則下至厯日而官自鬻之推此而往不可究言至於輕用名器淆混賢否忠厚老成者擯之為無能俠少儇辨者取之為可用守道憂國者謂之流俗敗常害民者謂之通變今三邊創痍流潰未定河北大旱諸路大水民勞財乏縣官減耗聖上憂勤念治之時而政事如此皆大臣誤陛下而大臣所用者誤大臣也居數日罷御史貶衡州公在南都幕府㑹司農寺行新令盡斥賣天下祠廟依坊場河渡法收浄利南都閼伯廟嵗為錢四十六貫微子廟十二貫公往見留守張公方平曰獨不能為朝廷言之耶張公矍然因託公為奏曰閼伯遷於商丘主祀大火火為國家盛德所乘厯世尊為大祀微子宋始封之君開國此地本朝受命建號所因又有雙廟者唐張巡許逺孤城死賊能捍大患今若令承買小人規利冗䙝瀆慢何所不為嵗收微細實損大體欲望詳酌留此三廟以慰邦人崇奉之意神宗即日批曰辱國瀆神此為甚者速令行下更不施行哲宗嗣位公復任言責上疏曰陛下春秋鼎盛在所資養願選忠信孝悌淳茂老成之人以充勸講進讀之任便殿燕坐時賜廷對執經誦讀以廣睿智公與同列奏事因論人材大槩公奏曰人材難得臣嘗厯觀士大夫間能否不一性忠實而有才識上也才雖不髙而忠實有守次也有才而難保可借以集事又其次也懷邪觀望隨勢改變此小人終不可用公教子孫先行實後文藝每曰士當以器識為先一號為文人無足觀矣並門人劉仿撰行實公自青社罷職知黄州又分司徙蘄州語諸子曰上用章丞相吾勢當得罪若章君顧國事不遷怒百姓但責吾曹死無所恨苐恐意在報復法令益峻奈天下何憂形於色初無一言及遷謫也劉大諌序公文集王巖叟字彦霖大名人舉明經事哲宗官至簽樞近臣被詔薦御史意属公而未及識或謂公曰可一往見之公笑曰此所謂呈身御史也卒不見墓誌除監察御史即上書論社稷安危之計在從諌用賢不可以小利失民心元祜元年遷左司諌一日並命執政其間有不協士望者公方權給事中即繳録黄并以諌職上疏既而命復下者再遂不由門下省以出公請對言益切退就閤門復上疏云臣為諌官既當言承乏給事又當駁非臣好為髙論喜忤大臣且命令斜出尤損紀綱凡八上章命竟寢九月除侍御史左右正言久闕公上疏願詔補諌臣無令久虚其職凡京城偷者所聚謂之大房多在僻逺每區容數十百人公密令掩捕毁徹隨情處决遂以無盜居民開戸而寢供備庫使曹讀以其物産貿易萬緡市儈稽違逾年止輸其半讀盡力無可頼一日開户外有錢聲償數皆足讀怪念之詢其由乃曰王公今日知府矣拜樞密直學士僉書樞密院事公遜謝而進曰陛下聽政以来納諌從善務合人心所以朝廷清明天下安静願信之勿疑守之勿失則宗社千萬世之福也用人之際望更加審察邪正難辨辨之少差治亂所係又少進曰陛下今日進聖學者正欲理㑹邪正兩字正人在朝則朝廷安人君無過舉天下平治邪人一進則朝廷便有不安之象非謂一人便能如此乃其類應之者衆上下䝉蔽人主無由得知不覺養成禍患爾二聖深然之公又進曰或聞有以君子小人參用之説吿陛下者不知果有之否此乃欲深誤陛下也自古君子小人無參用之理聖人唯説君子在内小人在外則成泰小人在内君子在外則成否君子既進小人不能與君子同事自然不得親近小人既進君子不肯與小人争進自然稍稍引去君子與小人競進則危亂之機也此際不可不察幸陛下常用心於此並墓誌張芸叟撰因侍講筵奏曰陛下退朝無事不知何以消日應曰看文字對曰陛下以讀書為樂天下幸甚大抵聖賢之學非造次可成須在積累積累之要在專與勤屏絶他好始可謂之專久而不倦始可謂之勤四字是積學之要願陛下特留聖意係年錄邇英進讀寳訓至節費公曰凡言節用非謂偶節一事便能有濟要當每事以節儉為意則積久累日國用自饒墓誌劉安世元城先生字器之大名人中進士第事神宗哲宗官至左諌議大夫公與溫公為同年契因遂從學於溫公熙寜一年舉進士不就選徑歸洛溫公曰何為不仕公以漆彫開吾斯未能信之語以對溫公説復從學者數年一日避席問盡心行已之要可以終身行之者溫公曰其誠乎吾平生力行之未嘗須臾離也故立朝行巳俯仰無媿爾公問行之何先溫公曰自不妄語始自是拳拳勿失終身行之言行錄劉安世從溫公學與公休同業凡一四日一往以所習所疑質焉公欣然吿之無倦意凡五年得一語曰誠安世問其目公喜曰此問甚善當自不妄語入余初甚易之及退而自隠括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘裕溫公言安世平生只是一箇誠字更撲不破誠是天道思誠是人道天人無兩箇道理因舉左右手顧之笑曰只為有這軀殻故假思以通之耳及其成功一也安世自從十五嵗以後便知有這箇道理也曽事事着力畢竟不是只有箇誠字縱横妙用無䖏不通以此杜門獨立其樂無窮恁怎生也動安世不得道䕶錄云溫公薦充館職因謂公曰知所以相薦否公曰獲從公遊舊矣溫公曰非也光居閒足下時節問訊不絶光位政府足下獨無書此光之所以相薦也擢右正言是時差除頗多政府親戚公言祖宗以来執政大臣親戚子弟未嘗敢受内外華要之職自王安石秉政以後盡廢累聖之制專用親黨務快私意數年間㢘恥掃地今廟堂之上猶習故態厯疏太師平章軍國重事彦博司空平章軍國事公著左僕射大防右僕射純仁門下侍郎固左丞存右丞宗愈堂除子弟親戚凡數十人且曰中書侍郎摯未見所引私親而依違其間不能紏正雷同循黙豈得無罪願出臣此章徧示三省俾自此以往厲精更始並言行錄㑹知漢陽軍呉處厚上蔡確安州所為謗詩公即論奏曰確詩十篇多涉譏訕而二篇尤甚借唐為喻謗訕君親至於滄海揚波之語其所包藏尤為悖逆葢􅃀自謂齒髪方盛足以有為意在他日時事變易徼倖復用攄泄禍心此而可舍國法廢矣已而蔡確責授光祿卿分司南京公與梁燾同上疏力争以為責命太輕未厭輿議疏十餘上始竄確於新州蔡確雖貶尚與章惇等自謂有定䇿功創造語言恐脅貴近公復言蔡確黄履邢恕章惇四人者在元豐之末號為死黨惇確執政倡之於内履為中丞與其僚属和之於外恕立其間往来傳送天下之事在其掌握聖上嗣位此實太皇太后聖慮深逺為宗廟社稷無窮之計彼四人者乃敢貪天之功以為已力伏望明正四凶之罪布吿天下除蔡確近巳貶竄外所有章惇黄履邢恕欲乞並行逐之逺方終身不齒由是三人亦皆得罪遷起居舍人兼司諌公偶為家人雇乳母牙媪以謂無有詰其故因言内降指揮見求乳母公怒曰汝何敢爾妄言且今上猶未納后安得有此媼云内東門司開封府錄實預其事公與府錄有契因折簡問之答如所聞即上疏言前世之主鮮有不以聲色為累至於近之太早御之無節則又不能保固真元增益夀考聖賢所戒可為寒心且世俗間粗有百金之産猶知愛其子孫以為嗣續之託而况國朝百三十年之太平六聖憂勤積累之業陛下繼而有之可不自愛自重以為宗廟社稷無窮之計乎若陛下實未嘗為則臣之所言猶不失諌官之職萬一有之則臣之進説巳是後時惟冀陛下愛身進徳留意問學清心寡慾增厚福基宣仁后初不知因公言始窮詰其事乃知雇乳母者為劉氏也后怒而撻之由是劉深以怨公自崇慶埀簾復祖宗舊政溫公既薨之後荆公之徒多為飛語以動摇在位誘之以利脅之以禍無所不至大臣多首鼠兩端為自全計吕范二相尤畏之欲用其黨以平舊怨謂之調停差除之際公與梁燾朱光庭每極力爭論吕公病之因薦熙豐舊人鄧溫伯為翰林承㫖意言官必爭因以逐之公言溫伯熙寜中王安石吕惠卿更相傾䧟溫伯始終反覆出入兩黨又附蔡確為之草制稱其有定䇿之功乞行罷黜疏累上不報即引疾在告陳乞宫觀乃除集賢修撰提舉西京崇福宫公徧厯言路正色立朝知無不言言無不盡每以辨是非邪正為先進君子退小人為急其面折廷争至雷霆之怒赫然則執簡却立伺天威稍霽復前極論一時奏對且前且却者或至四五殿廷觀者皆汗縮竦聽目之曰殿上虎宣仁后晏駕吕丞相使陵下范純仁奏乞除執政即用李清臣為中書侍郎鄧溫伯為尚書右丞時大臣卒用調停之説遂有李鄧之除二人皆熙豐之黨屢見攻於元祐乃以先朝事激怒上意㑹廷䇿進士李鄧撰䇿題厯詆元祐之政有復新法之意從而中傷元祐諸人公乃出鎮常山未㡬元豐舊人悉皆收召遂相章惇言者以公頃言蔡確落職知南安軍而吕丞相亦不免逺竄乃深媿於公其後范丞相門人狀范公之行曰使其言行於熙豐時後必不至紛更盡申於元祐中必無紹聖大臣復讎之禍或以此問公公曰微仲堯夫不知君子小人勢不兩立如冰炭故開倖門延入李鄧排去正人易若反掌調停之説果何益乎昔溫公為相日葢知其後必有反覆之禍然救生民之患如救焚拯溺猶恐不及何暇更顧異日一身之患哉世以公為知言並言行錄紹聖初黨禍起器之尤為章惇蔡卞所忌逺謫嶺外盛夏奉老母以行途人皆憐之器之不屈也一日行山中扶其母籃舁憇樹有大蛇冉冉而至草木皆披靡擔夫驚走器之不動也蛇若相向者久之乃去村民羅拜器之曰官異人也蛇吾山之神見官喜相迎耳官行無恙乎溫公門下士多矣如安世所守凛然死生禍福不變葢其平生喜讀孟子故剛大不枉之氣似之聞見録惇卞用事必欲致公於死故方竄廣東則移廣西既抵廣西則復徙廣東凡二廣間逺惡州軍無所不至人皆謂公必死然七年之間未嘗一日病年㡬八十堅悍不衰此非人力所及殆天相也或問何以至此曰誠而巳先是文及甫持䘮在河陽邢恕在懷州及甫以劉丞相摯任中司日嘗彈罷其左司郎啣怨不巳以書抵恕曰及改月遂除畢禫祭當外補入朝之計未可必當塗猜忌於鷹揚者益深其徒實繁司馬昭之心路人所知也又濟之以粉昆朋類錯立必欲以眇躬為甘心快意之地紹聖末蔡確子謂受㫖於翰林學士蔡京且迎合大臣乃上書引及甫為證訟劉丞相等誣䧟其父謀危社稷朝廷駭之委京究問置獄於同文館遂逮及甫就吏及甫稱鷹揚謂其父潞公也當塗者謂劉摯也其徒實繁者謂梁燾王巖叟劉安世孫升韓川之類也司馬昭之心路人所知者緣摯竄斥顧命宰相蔡確是時國勢甚危疑摯有傾摇之心意在不測如司馬昭廢辱之事也粉昆朋類者粉謂王巖叟面白如粉昆謂梁燾字貺之以貺為兄以兄為昆也欲以眇躬為甘心快意之地可為寒心者眇躬謂主上摯既懷無君之心有動摇不逞之意前巳甘心於蔡確輩今欲快意於主上是欲以主上為甘心快意之地有憂國之心者為可寒心也問有何照據則曰先父屏人説来即無的確照據時劉丞相王彦霖巳物故然而其謀本出於蔡京故京猶乞上殿親冩劄爭論不巳三省言蔡京奏摯等逆心則其一時黨附顯著之人同惡相濟豈得無之如劉安世常論禁中雇乳母事謂陛下巳親女寵又論不御經筵陛下巳惑酒色誣罔聖躬形於章疏者果何心也今摯貶死廢及子孫而安世不問罪罰殊科如此臣不知其説也詔劉安世移梅州安置公時執䘮不候服闋赴貶所時公在貶所有土豪緣進納以入仕者因持厚貲入京以求見惇犀珠磊落賄及僕𨽻久之不得見其人直以能殺公意逹之惇乃見之不數日薦上殿自選人改秩除本路轉運判官其人飛馭徑驅至公貶所郡将遣其客来勸公治後事涕泣以言公色不動留客飲酒談笑自若俄報運使距郡城二十餘里翌日當至家人聞之益號泣不食且治公身後事而公飲食起居如平常曾無少異至夜半伺公則酣寝鼻息如雷忽聞鐘動上下驚曰鐘聲何太早也黎明問之鳴鐘者乃運判一夕嘔血而斃矣明日有客唁者曰若人不死則公未可知矣然公亦無喜色於是見公處死不亂如此並言行錄公曰安世除諌官三日有大除拜安世便入文字凡二十四章又論章惇十九章及得罪惇必欲見殺人言春循梅新與死為隣髙竇雷化説着也怕八州惡地安世厯徧七州道䕶錄建中間公與蘇子瞻自嶺外同歸至宣和間内侍梁師成得幸貴震一時雖蔡京童貫皆出其下師成令呉可自京師来宋欲鈎致公引以大用且以書抵公可至三日然後敢出之且道所以来之意大槩以諸孫求仕為言以動公公謝曰吾若為子孫計則不至是矣且吾廢斥㡬三十年未嘗有一㸃墨與當朝權貴吾欲為元祐完人不可破戒乃還其書而不答人皆為公危之而公自若也言行錄先生曰金陵有三不足之説聞之乎僕曰未聞先生曰金陵用事同朝起而攻之金陵闢衆論進言於上曰天變不足畏祖宗不足法人言不足恤此三句非獨為趙氏禍乃為萬世禍也先生嘗云人主之勢天下無能敵者或有過舉人臣欲囘之必思有大於此者巴攬之庶㡬可囘也今乃教人主使不畏天變不法祖宗不恤人言則何事不可為也馬永卿編語錄先生曰金陵亦非常人其粗行與老先生略同其質樸儉素終身好學不以官職為意是所同也但學有邪正各欲行其所學者爾而諸人輙溢惡此人主所以不信而天下之士至今疑之以其言不公故愈毁之而愈不信也故攻金陵者只宜言其學乖僻用之必亂天下則人主必信若以為以財利結人主如桑洪羊禁人言以固位如李林甫姦邪如盧把大佞如王莾則人主不信矣葢以其人素有德行而天下之人素尊之而人主夷攷之無是事則與夫毁之之言亦不信矣此進言者之大戒語錄器之嘗謂予言當官處事須權輕重務合道理毋使偏重可也夫是之謂中因言元祐間嘗謁見馮當世當世言熙寜初與陳暘叔吕寳臣同任樞密𤾉叔聰明少比遇事之来迎刃而解而吕寳臣尤善秤停事毎事之来必秤停輕重令得所而後巳也事經寳臣處者人情事理無不允當器之因極言秤停二字最吾輩當今所宜致力童䝉訓器之云安世初登第與二同年謁李若谷參政三人同起身請教李曰若谷自守官以來常持四字曰勤謹和緩其間一後生應聲曰勤謹和既聞命矣緩之一字某所未聞李正色曰何嘗教賢緩不及事来且道世間甚事不因忙錯了吕氏雜録公自宣和元日以後謝絶賔客四方書問皆不啓封家事無巨細悉不問夏六月丙午忽大風飛瓦驟雨如注雷電晝晦於公正寝人皆駭懼而走及雨止辨色公巳終矣聞者咸異焉及𦵏楊中立以文弔之曰刼火洞然不燼惟玉搢紳往往傳誦以為切當公在宋杜門屏跡不妄交遊人罕見其面然田夫野叟市井細民以謂若過南京不見劉待制如過泗州不見大聖及公殁耆老士庶婦人女子持薫劑誦佛經而哭公者日數千人後二年虜人驅墳戸發棺見公顔貎如生咸驚曰必異人也一無所動葢棺而去言行錄昔有與蘇子瞻論元祐人材者至公則曰器之真鐵漢不可及也宋名臣言行錄後集巻十二
