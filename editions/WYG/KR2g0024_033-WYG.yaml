body:
  text: 宋名臣言行録别集上巻一宋李幼武纂集李邴文肅公字漢老濟州鉅野人崇寧五年登進士第尉徳州平原滿濮州鄄城丞外艱吉除編修國朝㑹要所撿閱文字宣和初特除校書郎二年擢尚書禮部員外郎三年夏進起居舎人冬試中書舎人五年秋遷給事中閱月權直學士院明年秋為翰林學士髙麗入貢充館伴提舉鴻慶宫七年冬除徽制知越州坐落職主崇福宫髙宗初元復右文殿修撰踰年召為兵侍再直學士院三年除翰學尋除端明殿學士同簽書樞宻院遷尚書左丞六月依祖宗舊制合三省官改參政進資政殿學士權知行臺三省樞宻院事辭仍本職提舉洞霄未閱月起知平江視事三日請祠以兄帥越失守連坐落職明年復端明紹興初還舊職十六年五月薨于泉州居第享年六十二累贈太師淳熈初諡文敏後易敏以肅車駕南波駐蹕杭州苗劉反露刃宫門上登樓撫諭公亟趨前責叱二兇兇燄稍息又諭殿帥王元擊賊元唯唯公扣宰相朱勝非問計䇿傳等皆在公反覆鐫詰人為公危公無懼色退勸勝非宻引外援制賊又謂傳所聽者正彦正彦則倚王世修為謀主宜陽許世修侍從以間之􅌸不濟矣太后埀簾旬餘勝非遂奏變故以來從官能助朝廷者惟公及鄭瑴協心于内誦言于外乃除公翰林學士張浚等義師起公與權直院張守分撰請復辟表及批答上御朝明日賜公親札略曰卿毅然正詞氣折兇醜萬衆動色具臣靦顔公謝表亦云謀寢淮南雖慙素望笏擊朱泚實厲壮心詰責兇渠激揚禁衛迨成復辟實與祕謨蓋出孤忠豈徼後福當時稱為實録上反正大赦公草赦文云斷鼇立極開闢功成取日授龍神明御正四方誦之公天姿髙明積學深至早歴清要號稱文士猝遇國難大節凜然為廊廟之器嘗奉詔編類平江勤王及奏請本末付禮部鏤板公既列上即匱藏元牘後自泉南繳納省中子孫始知一時定計具草手疏皆出公及朱丞相之手他執政著名押字而已罷政十七年避時相不復出讀書作文雖病不廢延納後進教誘無倦稱人之善覆䕶所短若親舊行已未至則質問再三使歸之正奉養簡薄振恤宗族治家嚴而恕毎愛徐孺子申屠子龍陶淵明之為人晚棄世故深造以道夫子所謂朝聞夕死者公蓋得之周益公曰濟水貫兖與徐居古九州之二其在四瀆得天地質信寛徐之氣其澤曰大野是為十藪之首鍾英炳靈今於公見之始以淵源之學華重之文藻飾王度中以剛大之氣扶顛持危晚以超卓之見居安資深允所謂間生之賢者也朱文公序公文集曰士君子所以立於斯世者不難於名而難於實不難於小而難於大此愚所以毎切有感於公之文而病世之所以知公者殊淺也宋之興百有餘年累聖相承専以文治而其盛極於崇觀政宣之間一時學士大夫執簡秉筆爭以文字相髙其所以歌詠太平藻飾治具者雜然並出如金石互奏宫徵相宣未有能優劣之者而公以傑出之材雍容其間發大詔令草大牋奏富贍雄特精能華妙愈出而愈無窮直将闗衆俊之口而奪之氣斯巳竒矣然使公之所立者獨恃此而無其實或徒䂓䂓然務為小廉曲謹以投世俗之耳目而其大者無稱焉則亦何足以名於一世而埀無窮哉而公扈蹕臨安適遭已酉三月五日之變當是之時一旦猝然事出非意羣公愕眙不知所以為䇿公獨挺身赴難神采毅然逆折兇渠諭以大義退而隂贊宰府為所以離貳逆黨尊復明辟之計者甚悉是以平賊之功雖由外濟而太上察公之忠首擢以為尚書左丞而又賜之手札至有萬衆動色具臣靦顔之語嗚呼天地之間理義之實孰有大於君臣之際者而公於是乃能竭其股肱之力以有成功是其所立豈獨以其文而巳哉然以功成不居退而老於江海之上杜門終日絶口不道前事雖所以告其子弟者亦常欿然退託如有不足之意是以世之君子鮮或知之其所可考而必信者獨賴聖謨神翰炳如日星是以天下之公論至於久而後定耳以是觀之則世之獨以文字知公者豈非淺淺哉權邦彥字朝美河間人崇寧四年賜上舎及第釋褐授青州教歴睦親西宅除太博改司業奉使契丹歸除集撰知易州欽宗即位召為左司靖康初改宗少直徽猷閣知冀州尋除天章待制改知東平建炎三年以寶文閣學士知江州明年改知建康改淮南江浙荆湖等路制置發運使紹興初入為兵書兼侍讀明年除僉樞尋權參政三年薨于位年五十四贈正議大夫公家儒學三世自兒童時嶷如成人七嵗聞講毛詩退能為家人説大義自是力學至忘寢食寒暑十三入郡學頭角巍然公之父友禄公遊見公竒之曰真名家駒一日千里為太博徽宗幸學設幄堂上延見諸生命公講下武詩言暢理明天顔喜甚恩錫有差遂有意用公而王黼銜公異議故報之使契丹國主面授國書責公雙跪公曰非南朝禮也行人不敢承命契丹竟莫奪公之志知冀州辭行欽宗勉之曰兵起北方士大夫皆取南卿獨請北真能體國公道逢士夫有自大名歸者語公北冦兵興毋往公曰吾得死所矣命駕亟行知江州日訓兵旅集舟積粟以防冦請朝廷分兵守武昌襄陽則表裏之形成賊不能窺我矣為發運使轉輸六路夕受命朝引道走江東西董媮懈檢欺隠覈逋亡責稽滯水陸餘五千里財用凑足於行在所億萬計詔嘉奨在樞筦知無不言言無不盡謂宜乘機者三祖宗徳澤在人人心不忘王師一興諸路響應一也内則淮海之賊騎悉往西北以虚其南外則林牙等侵大患在腹心以牽其北二也近覘者報虜兵疲於浚河之役而守淮之兵皆持挺之農夫三也譬諸弈爭先而巳安可隨應隨解不制人而制於人哉不然疆理淮堧以連下邳藩屏荆漢以通上流指顧隴蜀以成建瓴東下之勢亦䇿之次也朝廷用其次而已建中興十議一謂宜以天下為度進圖洪業恢復土宇勿茍安於東南二謂駕馭諸将宜威之以法而限之以爵三謂宜命講讀之臣於所論説之外取累朝訓典及三代漢唐中興故事日陳於前以禆聖學四謂宜監觀傷善妨賢之讒偷合茍容之佞市恩立威之奸懐諼罔上之欺聽其言察其事則忠邪判矣五謂愛民先愛其力寛民先節其用又謂朘已俸以佐國用當自宰執始又謂分閫而屬大事類非偏禆之所能為必得賢大将而後可又謂制置一官宜可省也合令㳂江州縣各備其境内而總之以漕帥上自荆鄂江池下至采石荆口講之有方委之有人防秋上䇿也又謂宗室中豈無傑然有人望可以濟艱難賛宻勿留宿衛者願求其人置諸左右又謂人事盡則天悔禍否則恐天未欲平治天下也不可獨歸之數上嘗語及春秋三傳異同公曰孔子作春秋游夏且不能措一辭上又曰至誠力行者其善惡不可掩公曰惟天下至誠為能化不誠未有能動者上又曰堯舜以道治天下不過無心公曰堯舜之治道其要在命九官去四凶公遂曰願陛下無忘在濟時無忘渡江時公風骨竒偉胷次恢廣學術才氣過人數等所述作初若寂然無營忽揮翰如飛文不加㸃雅善草聖士大夫游其門者如周葵樓炤潘良貴吕廣問梁揚祖皆為世名臣張守文靖公字全真一字子固晉陵人進士第歴外任久之為監察御史丁憂建炎初除監察御史二年除侍御三年除起居郎遷中書舎人遷中丞六月除禮侍入翰林為學士除端明大學士同僉四年除參政紹興初除資政學士提舉洞霄六年除資政大學士參政兼樞宻院八年復領洞霄宫公言本朝之兵自髙俅童貫壊之而勸沮之法廢驕惰之風成出戍則亡遇敵則潰小則荷戈攘奪以逞大則殺将嬰城以叛天下可用之兵無幾矣公上防淮渡江六事大率以逺斥堠探報為先别疏論金人犯淮甸之路有四其一中路自西京趍東京㳂汴河由天長以來則衆行之路凡一千七百八十里可以控扼守禦者南京宿泗天長是也其一東路自滄濵趍京東由淮陽軍絶淮入楚州而來則自北直南大路凡一千九百里可以控扼守禦者青沂淮陽楚是也其一西路自西京趨潁昌蔡州順昌府廬滁真州而來則西自北而至東南凡一千八百十五里可以控扼守禦者順昌廬滁真是也其一上流自西京穎昌唐州至襄陽凡一千一十里絶襄江而至荆南則一千二百九十五里自西京潁昌蔡光州而至黄州則一千三百六十里皆可㳂江順流而下可以控扼守禦者襄陽荆南江之北則漢陽蘄和黄滁真州江之南則岳鄂興國江池太平州是也四路之中又有要害中路則泗州據淮天長據險為可禦東路則青州據木陵岡楚州據淮隂為可禦西路則廬夀為可禦上流則襄陽荆南蘄黄為可禦不幸順流而下則㳂江諸州各據地利以臨之合從共禦庶乎其可也望詔諭大臣取四路守倅帥臣銓擇能否各賜緡錢責之募戰士儲芻粟繕甲兵明斥堠公賞罰進相援退相保夙夜盡力捍敵再疏請詔大臣惟以選将治兵為急凡細微不急之務付之都司汪黄滋不悦乃請遣公撫諭京城公即日就道吕頥浩建議欲徙中原之民於東南公與滕康皆持不可公曰東南今日之根本也康語公曰吾曹當以死爭之賞不當功則無功者進功不獲賞則有功者墮比年兵不用命望風奔北皆賞罰失當以致之朝廷惟憑所上功状之等差而班爵秩之輕重一有失當怨歸朝廷於是羣下解體鮮復自効臣欲於出軍之際委自主将别置軍籍自大将以至屬官偏禆隊伍各列姓名量留空紙以書功績總計其數從朝廷印押給付主将凡立功者某月某日獲若干級某月某日俘獲若干人之類即日著其状於籍䇿勲之際隨保奏状上之朝廷參考其實而後行之則濫冐之弊十去六七矣公言聽言之難從古所患伊尹言於太甲曰有言逆於汝心必求諸道有言遜於汝志必求諸非道夫逆心之言未必皆合乎道然未見人主所向而言志在責難則鮮有不逆者要當以道求之遜志之言未必皆違乎道然或伺人主所向而言志在容悦則鮮有不順者要當以非道求之從違之際禍福成敗如反覆手大抵人心喜順而惡逆遜志則易入逆心則難行人主能於常情所惡而求其是於常情所喜而求其非然後智出衆人之上而羣言不能惑君子小人之情状皆即吾心逆順之間而知之不亦簡且易乎又況逆心之言雖衆毎不能勝遜志之一言尤不可不察公嘗進修徳之説疏凡二上有曰願陛下處宫室之安則思二帝母后穹廬毳幕之居享膳羞之奉則思二帝母后羶肉酪漿之味服細煖之衣則思二帝母后窮邊絶塞之苦操予奪之權則思二帝母后語言動作受制於人享嬪御之適則思二帝母后誰為之使令對臣下之朝則思二帝母后誰為之尊禮公知福州上曰福建盗賊之後要在拊循凋瘵用守為宜初偽閩以八州之產分三等之制膏腴者給僧寺道觀中下者給土著流寓自劉䕫守福始貿易以取貲公與士大夫謀為實封之説存留上等四十餘刹以待髙僧餘悉為實封金多者得之嵗入不下七八緡以助軍衣食寛百姓雜科時實便之公言明詔四事莫急於措置臣請言措置之大略其一措置軍旅其二措置糧食何謂措置軍旅神武中軍當専衛行在而以餘軍分戍三路一軍駐於淮東一軍駐於淮西一軍駐於鄂岳或荆南擇要害之地以處之使北至闗輔西抵川陜血脈相通號令相聞有唇齒輔車之勢則自江而南可以奠枕而卧也然今之大将皆握重兵貴極富溢前無禄利之望退無誅罰之憂故朝廷之勢日削兵将之權日衆而又為大将者萬有一稱病而賜罷或卒然不諱則所統之衆将安屬耶臣謂宜拔擢麾下之将使為統制毎将不過五千人棊布四路朝廷號令徑達其軍分合使令悉由於朝廷之權以用之然後可以有為也何謂措置糧食諸軍既已分屯諸路則所患者錢穀也然所費多寡在彼猶在此爾則所患者轉輸也攷祖宗以來毎嵗上供六百餘萬斛悉出於東南而轉輸未嘗以為病也今宜以兩浙之粟専供行在而江東之粟以餉淮東江西之粟以餉淮西荆湖之粟以餉鄂岳荆南量所用之數責漕臣将輸而歸其餘於行在錢帛亦然恐未至於不足也錢糧既無乏絶之患然後戒飭諸将不得侵擾州縣以復業之民户口多寡為諸将殿最嵗遣官覈實而升黜之則民得以還其鄉里而田野日闢生齒日滋江北州縣有興復之漸矣如是措置既定候至防秋復遣大臣為之統督使諸路之兵首尾相應綏懐之略亦在是矣又言今日之先務有六而夷狄不與焉蓋夷狄未賔莫先自治一曰立國二曰察言三曰任賢四曰使能五曰抑僥倖六曰破朋黨公參政張浚一日盛暑坐東閣公突入執其手曰守向言秦舊徳有養今與同列徐考其人似與昔異晚節不竟有患失心是将為天下深憂蓋指樞使檜也浚亦以為然上将還臨安而公謂建康自六朝為帝王都江流險闊氣象雄偉且據㑹要以經理中原依險阻以捍禦强敵可為别都以圖恢復毎對必為上言之及将下詔東歸公與趙鼎議於都省不合又謀諸朝上顧公曰何如公曰昨日都省巳與鼎言矣陛下至建康席未及煖今又巡幸百司六軍有勤動之苦民力邦用有煩費之憂願少安於此以繫中原民心鼎持不可公引疾求去遂出知婺州宋名臣言行錄别集上巻一
