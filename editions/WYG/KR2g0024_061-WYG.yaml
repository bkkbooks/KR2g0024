body:
  text: 宋名臣言行録外集卷三李幼武纂集程頥伊川先生正公字正叔明道之弟舉進士嘉祐四年廷試報罷遂不復試吕申公判大學請為大學正固辭元豐八年授汝州團練推官西監教元祐初除秘省校書郎召對除通直郎充崇政殿説書八月兼判登聞鼔院二年八月以孔文仲言差管勾西監上奏乞歸五年正月丁父憂去官七年服除除直秘閣判西監再辭以董敦逸言改授管勾崇福宫未拜九年上初親政申秘閣西監之命再辭紹聖間以黨論放歸四年十一月編管涪州三年正月徽宗即位移峽州四月以赦復宣徳郎任便居住還洛十月復通直郎權西監建中靖國二年五月追所復官依舊致仕崇寧二年四月有言其著書毁朝政㫖追毁出身以來文字遂徙居龍門之南五年復宣義郎致仕大觀元年九月卒年七十五嘉定八年賜諡淳祐初封伊川伯幼有髙識非禮不動年十四五與明道同受學於周濂溪年十八上書闕下勸仁宗以王道為心生靈為念黜世俗之論期非常之功且乞召對面陳所學不報間逰太學時胡翼之方主教導以顔子所好何學論試諸生得先生所試大驚即延見處以學職吕希哲與先生鄰齋首以師禮事焉既而四方之士從㳺者日益衆太中公屢當得任子恩輙推與族人熙寧間近臣屢薦自以為學不足不願仕也吕申公知蔡州將行言曰伏見南省進士程頥年三十四有特立之操出羣之姿嘉祐四年已與殿試自後絶意進取往來太學諸生願得以為師臣方領國子監親往敦請卒不能屈臣嘗與之語洞明經術通古今治亂之要實有經世濟物之才非同拘士曲儒徒有偏長使在朝廷必為國器伏望特以不次旌用哲宗嗣位門下侍郎司馬光尚書左丞吕公著及西京留守韓絳上其行義於朝温公與申公同薦章曰竊見河南處士程某力學好古家貧守節言必忠信動遵禮義年踰五十不求仕進真儒者之髙蹈聖世之逸民伏望特加召命擢以不次足以矜式士類禆益風化諫官朱光庭又言頥道徳純備學問淵博材資勁正有中立不倚之風識慮明徹至知幾其神之妙言行相顧而無擇仁義在躬而不矜若用斯人俾當勸講必能輔養聖徳啓導天聰一正君心為天下福又言頤究先王之藴達當世之務乃天民之先覺聖代之真儒俾之日侍經筵足以發揚聖訓兼掌學教足以丕變斯文又祖宗時起陳搏种放高風素節聞於天下揆頤之賢搏放未必能過之頤之道則有搏放所不及知者觀其所學真得聖人之傳致思力行非一日之精有經天緯地之才有制禮作樂之具乞訪問其至正論所以平治天下之道又謂頤以言乎道則貫徹三才而無一毫之為間以言乎徳則并包衆美而無一善之或遺以言乎學則博通古今而無一物之不知以言乎才則開物成務而無一理之不摠是以聖人之道至此而傳况當天子進學之初若俾真儒得専經席豈不盛哉元祐初年召至京師除校書郎辭曰祖宗時布衣被召自有故事今臣未得入見未敢祗命王巖叟奏云伏見程某學極聖人之精微行全君子之純粹早與其兄顥俱以徳名顯於時陛下復起頤而用之頤趨召以來待詔闕下四方俊乂莫不翹首嚮風以觀朝廷所以待之者如何處之者當否而將議焉則陛下此舉係天下之心臣願陛下加所以待之之禮擇所以處之之方而使髙賢得為陛下盡其用則所得不獨頤一人而已四海潛光隠徳之士皆將相招而為朝廷出矣又奏云伏聞聖恩特除頤京官仍與校書郎足見陛下優禮高賢然臣願陛下一召見之試以一言問為治之要陛下遂可自觀其人臣以頤抱道養徳之日久而濳神積慮之功深静而閱天下之義理者多必有嘉言以新聖聴此臣所以進頤非為頤也欲成陛下之美耳陛下一見而後命之以官則頤當之而無媿陛下與之而不悔授受之間兩得之矣召對上奏論經筵三事其一以上富春秋輔養為急宜選賢徳以備講官因使陪侍宿直陳説道義所以涵養氣質薫陶徳性其二請上左右内侍宫人皆選老成重厚之人不使侈靡之物淺俗之言接於耳目仍置經筵祇應内臣十人使伺上在宫中動息以語講官其或小有違失得以隨事規諫其三請令宫講官坐講以養人主尊儒重道之心寅畏祇懼之徳又曰若言可行敢不就職如不可用願聴其辭皇太后先面諭將除説書既而命下除崇政殿説書再辭而後受命四月例以暑熱罷講先生奏言輔導少主不宜踈略如此乞令講官以六參日上殿問起居因得從容納誨以輔上徳同孫覺顧臨及國子監長貳看詳國子監制先生所定大槩以為學校禮義相先之地而月使之争殊非教養之道請改試為課有所未至則學官召而教之更不考定髙下創尊賢堂以延天下道徳之士鐫解額以去利誘省繁文以専委任厲行檢以厚風教及置待賔吏師齋立觀光法如是者數十條上疏太皇太后言今日至大至急為宗社生靈長久之計是輔養上徳而輔養之道非徒涉詩書覽古今而巳要使跬步不離正人乃可以涵養薰陶成就聖徳今間一講解釋數行為益既少又自四月罷講直至中秋不接儒臣殆非古人旦夕承弼之意請俟初秋即令講官輪日入侍陳說義理仍選臣􅒼家十一二嵗子弟三人侍上習業且以邇英迫隘暑熱恐於上體非宜而講日宰臣史官皆入使上不得舒泰悦懌請自今一月再講於崇政殿然後宰臣史官入侍餘日講於延和殿則後楹埀簾而太皇太后時一臨之不惟省察主上進業其於后徳未必無補且使講官欲有所言易以上達所係尤大又講讀官例兼他職請亦罷之使得積誠意以感上心皆不報差兼判鼔院先生引前說且言入談道徳出領訴訟非用人體再辭不受楊時曰仕道與禄仕不同常夷甫以布衣入朝祖宗欲優其禮令兼數局如鼔院染院之類夷甫一切受之及伊川為講官朝廷亦欲使兼他職則固辭盖前日所以不仕者為道也則今日之事須其官足以行道乃可受不然是茍禄也然後世道學不明君子辭受取舍人鮮知之故常公之受人不以為非而先生之辭人亦不以為是也上疏論延和講讀埀簾事且乞時召講官至簾前問上進學次第又奏邇英暑熱乞就崇政延和殿或他寛涼處講讀給事中顧臨以殿上講讀為不可有㫖修展邇英閣先生復上疏以為修展邇英則臣所請遂矣然祖宗以來並是殿上坐講自仁宗始就邇英而講官立侍盖從一時之便耳非若臨之意也今臨之意不過以尊君為說而不知尊君之道若以其言為是則誤主上知見臣職當輔導不得不辨在經筵毎當進講必宿齋豫戒潛思存誠冀以感動上意而其為説常於文義之外反復推明歸之人主一日當講顔子不改其樂章門人或疑此章非有人君事也將何以為說及講既畢文義乃復言曰陋巷之士仁義在躬人主崇髙奉養備極茍不知學安能不為富貴所移且顔子王佐之才也而簞食瓢飲季氏魯國之蠧也而富於周公魯君用捨如此非後世之監乎聞者歎服入侍之際容貌極莊時文潞公以太師平章重事或侍立終日不懈上雖諭以少休不去也人或以問先生曰君之嚴視潞公之恭孰為得失先生曰潞公四朝大臣事幼主不得不恭吾以布衣職輔導亦不敢不自重也嘗聞上在宫中起行漱水必避螻蟻因請之曰有是乎上曰然誠恐傷之爾先生曰願陛下推此心以及四海則天下幸甚一日講罷未退上忽起憑檻戲折柳枝先生進曰方春發生不可無故摧折上不悦所講書有容字中人以黄覆之曰上藩邸嫌名也先生講罷進言曰人主之勢不患不尊患臣下尊之過甚而驕心生爾此皆近輩養成之不可以不戒請自今舊名嫌名皆勿復避神宗之喪未除而百官以冬至表賀先生言節序變遷時思方切請改賀為慰及除喪有司又將以開樂置宴先生又奏請罷宴曰除喪而用吉禮則因事用樂可矣今特設宴是喜之也聞後苑以金製水桶問之曰崇慶宫物也先生曰若上所御則吾不敢不諫在職累月不言禄吏亦弗致既而諸公知之俾户部特給焉又不為妻求邑封或問之曰某起於草萊三辭不獲而後受命今日乃為妻求封乎經筵承受張茂則嘗招講官啜茶觀畫先生曰吾平生不啜茶亦不識畫竟不往潞公嘗與吕范諸公入侍經筵聞先生講説退相與嘆曰真侍講也一時文士歸其門者甚盛而先生亦以天下自任論議褒貶無所顧避由是同朝之士有以文名世者疾之如讎蘇軾奏狀云臣素疾程某之姦未嘗假以辭色又吕陶言明堂降赦臣寮稱賀訖而兩省官欲往奠司馬光時程頤言曰子於是日哭則不歌豈可賀赦才了却往弔喪坐客有難之曰子於是日哭則不歌即不言歌則不哭今賀赦了却往弔喪於禮無害軾遂以鄙語戲頤衆皆大笑結怨之端盖自此始又語録云國忌行香伊川令供素饌子瞻詰之曰正叔不好佛胡為食素先生曰禮居喪不飲酒不食肉忌日喪之餘也子瞻令具肉食曰為劉氏左􅃝於是范淳夫輩食素秦黄輩食肉又鮮于綽傳信録云舊例行香齋筵兩制以上及臺諫官破蔬饌然以粗糲遂輪為食會肉皆用食矣元祐初正叔以食肉為非是議為素食衆多不從一日門人范淳夫當徘食遂具蔬饌子瞻因以鄙語戲正叔正叔門人朱公掞輩䘖之遂立敵矣是後蔬饌亦不行又語録云時申公為相凡事有疑必質於伊川進退人材二蘇疑伊川有力故極詆之一日赴講會上瘡疹不坐巳累日先生退詣宰臣問上不御殿知否曰不知先生曰二聖臨朝上不御殿太皇不當獨坐且人主有疾而大臣不知可乎翌日宰臣以先生言奏請問疾由是大臣亦多不悦而諫議孔文仲因奏先生汙下憸巧素無鄉行經筵陳說僭横忘分遍謁貴臣厯造臺諫騰口間亂以償恩讎致市井目為五鬼之魁請放還田里以示典刑差管勾西京國子監文仲傳載吕申公之言曰文仲為蘇軾所誘脅論事皆用軾意又申公家傳亦載其與吕大防劉摯王存同駁文仲所論朱光庭事語甚激切且云文仲本以伉直稱然惷不曉事為浮薄輩所使以害善良晚乃自知為小人所紿憤鬱嘔血而死按舊録固多妄然此類不為無據新録皆删之失其實矣又范太史家傳云元祐九年奏曰伏見元祐之初陛下召頤對便殿自布衣除説書天下之士皆謂得人實為希闊之美事而纔及嵗餘即以人言罷之頤之經術行誼天下共知司馬光吕公著皆與頤相知二十餘年然後舉之此二人者非為欺罔以誤聖聰也頤在經筵切於陛下進學故其講説語常繁多草茅之人一旦入朝與人相接不為闗防未習朝廷事體而言者謂頤大佞大邪貪黷請求奔走交結又謂頤欲以故舊傾大臣以意氣役臺諫其言皆誣罔非實也盖當時臺諫官王巖叟朱光庭賈易皆素推伏頤之經行故不知者指以為黨陛下慎擇經筵之官如頤之賢皆足以輔導聖學至如臣輩叨備講職實非敢望也臣久欲為頤一言懷之累年猶豫不果使頤受誣罔之謗於公正之朝毎思之不無愧也今臣已乞去若復召之勸講必有補聖明臣雖在外終無所憾矣三省進呈先生服除欲與館職判檢院簾中以其不靖令只與西監頤初在經筵歸其門者甚盛而蘇軾在翰林亦多附之者遂有洛黨蜀黨之論二黨道不同互相非毁竟為蜀黨所擠蘇轍執政纔進稟便云但恐不肯靖簾中入其説故頤不復得召再辭西監之命極論儒者進退之道監察御史董敦逸奏以為有怨望輕躁語改授管勾崇福宫尋毉去官哲宗初親政申秘閣西監之命再辭不就紹聖間以黨論放歸田里編管涪州謝良佐曰是行也良佐知之乃族子公孫與邢恕之為爾先生曰族子至愚不足責故人情厚不敢疑孟子既知天焉用尤臧氏貶涪州渡江中流船幾覆舟中人皆號哭先生獨正襟安坐如常已而及岸同舟有父老問曰當船危時君獨無怖色何也曰心存誠敬耳老父曰心存誠敬固善然不若無心先生欲與之言老父徑去不顧自涪還洛氣貌容色髭髪皆勝平昔謫涪注周易與門弟子講學不以為憂赦得歸不以為喜復通直及判西監之命即謁告欲遷延為尋毉計既而供職尹焞深疑之先生曰上初即位首被大恩不如是則何以仰承徳意然吾之不能仕盖巳決矣受一月之俸焉然後唯吾所欲爾言者論先生本因姦黨論薦得官雖嘗明正罪罰而叙復過優今復著書非毁朝政於是有㫖追毁出身以來文字其所著書令監司覺察語録云范致虚言程某以邪說詖行惑亂衆聴而尹焞張繹為之羽翼事下河南府體究盡逐學徒復隸黨籍遷居龍門之南止四方學者曰尊所聞行所知可矣不必及吾門也崇寧三年謂張繹曰吾受氣甚薄三十而浸盛四十五十而後完今生七十二年校其筋骨無損也繹曰先生豈以受氣之薄而厚為保生邪先生喟然曰吾以忘生徇欲為深恥易傳成書已久學者莫得傳授或以為請曰自量精力未衰尚覬有少進耳其後寢疾始以授尹焞張繹尹焞曰先生踐履盡易其作傳只是因而寫成熟讀玩味即可見矣又云先生平生用意惟在易傳求先生之學者觀此足矣語録之類出於學者所記有工拙盖未能無失也又云門弟子請問易傳事一字之義必再三命之盖其潛心甚久未嘗容易下一字大觀初九月疾革門人進曰先生平日所學正今日要用先生力疾微視曰道著用便不是其人未出寢門先生殁一作門人郭忠孝尹子云非也忠孝自黨事起不與先生往來及卒亦不致奠既沒昔之門人髙弟多已先亡無有能形容其徳美者然先生嘗謂張繹曰我昔狀明道先生之行我之道盖與明道同異時欲知我者求之於此文可也初明道嘗謂先生曰異日能尊嚴師道者吾弟也若接引後學隨人材而成就之則予不得讓焉先生母夫人有知人之鑒二先生幼時勉之讀書因書牋帖上曰我惜勤讀書兒又並書二行前曰殿前及第程延夀明道幼時名次曰處士後皆驗夫人已知之於童穉中矣㳺楊來見伊川一日先生坐而瞑目二子立侍不敢去久之先生乃顧曰二子猶在此乎日暮矣姑就舍二子者退則門外雪深尺餘矣其嚴厲如此晚年接學者乃更平易盖其學已到至處但於聖人氣象差少從容耳明道則已從容惜其蚤死不及用也使及用於元祐間則不至有今日事矣韓維與二先生善屈致于潁昌暇日同㳺西湖命諸子侍行次有言貌不莊敬者伊川回視厲聲叱之曰汝輩從長者行敢笑語如此韓氏孝謹之風衰矣韓遂皆逐去之先生與韓公維約侯韓公年八十一往見之是嵗元日因子弟賀正乃曰某今年有一債未還春中當暫往潁昌見持國乃往造焉久留潁川韓早晚伴食體貌加敬一日韓密謂其子彬叔曰先生逺來無以為意我當有黄金藥楪一重三十兩似可為先生夀未敢遽言之我當以他事使汝侍食從容道吾意彬叔侍食如所戒試啓之先生曰頤與乃翁道義交故不逺而來奚以此為詰朝遂歸持國謂其子曰我不敢言正為此耳再三謝過而别吕汲公以百縑遺伊川伊川辭之時族兄子公孫在旁謂伊川曰勿為已甚姑受之伊川曰公之所以遺頤者以頥貧也公為宰相能進天下之賢隨材而任之則天下受其賜也何獨頤貧也天下貧者亦衆矣公帛固多恐公不能周也二程隨侍太中知漢州宿一僧寺明道入門而右從者皆隨之伊川入門而左獨行至法堂上相會伊川自謂此是某不及家兄處盖明道和易人皆親近伊川嚴重人不敢近也先生嘗説某於易傳今却已自成書但逐旋修改期以七十其書可出退之稱聰明不及於前時道徳日負於初心信然某於易傳後來所改無幾不知如何故且期之以十年之功看如何春秋之書待劉絢文字到却用功亦不多也今人觧詩全無意思却待出些文字中庸書却已成今農夫祁寒暑雨深耕易耨播種五穀吾得而食之今百工技藝作為器用吾得而用之甲冑之士被堅執鋭以守土宇吾得而安之却如此閑過了日月即是天地間一蠧也功澤又不及民别事又做不得惟有補緝聖人遺書庶幾有補耳陳長方見尹子於姑蘇問中庸解子云先生自以為不滿意焚之矣先生被謫時李邦直尹洛令都監來見伊川才出見之便請上轎先生欲略見叔母亦不許莫知朝命云何是夜宿於都監㕔明日差人管押成行至龍門邦直遣人贐銀百星先生不受既歸門人問何為不受曰渠是時已與某不相知豈可受嘗云吾四十以前讀誦五十以前研究其義六十以前反復紬繹六十以後著書著書不得已尹焞年二十始登先生之門嘗得朱公掞所論雜説呈先生問先生此書可觀否先生留半月一日請曰前日所呈雜説如何先生曰某在何必觀此若不得頤心只是記得他意焞自此不敢復讀朱子曰若伊川不在則何可不讀南方學者從先生既久有歸者或問曰學者久從學于門誰是最有得者先生曰豈敢便道有得處且只是指與他个岐徑令他尋將去不錯了已是忒大㬠若夫自得尤難其人謂之得者便是已有也若論隨力量而有見處則不無其人也先生常服蠒袍髙㡌簷劣半寸一云㡌桶八寸簷半寸四直繫縧曰此野人之服也深衣紳帶青縁篆文非禮勿視非禮勿聴非禮勿言非禮勿動紹興間胡安國言程某修身行法規矩凖繩獨出諸儒之表雖崇寧間曲加防禁學者私相傳習其後門人稍稍進用傳者浸廣士大夫争相淬勵而其間志利禄者託其説以自售分黨相排衆論洶洶深誚其徒而乃上及於伊川竊以為過矣夫聖人之道所以埀訓萬世無非中庸非有甚髙難行之說離世異俗之行此誠不可易之至論也然中庸之義不明久矣自頤兄弟始發明之然後其義可思而得也不然則或謂髙明所以處己中庸所以接物本末上下析為二途而其義不明矣士學宜師孔孟此亦至論也然孔孟之道不傳久矣自頤兄弟始發明之而後其道可學而至也不然則或以六經語孟之書資口耳取世資以干禄愈不得其門而入矣今欲使學者蹈中庸師孔孟而禁使不得從頤之學是入室而不由户也不亦誤乎尹焞曰先生之學本於至誠其見於言動事為之間處中有常疏通簡易不為矯異不為狷介寛猛合宜莊重有體或説匍匐以弔喪誦孝經以追薦皆無此事衣雖紬素冠襟必整食雖簡儉蔬飯必潔太中年老左右致養無違以家事自任悉力營辦細事必親贍給内外親族八十餘口又曰於書無所不讀於事無所不能謝良佐曰伊川才大以之處大事必不動聲色指顧而集矣或曰人謂伊川守正則盡通變不足子之言若是何也謝子曰陜右錢以鉄舊矣有議更以銅者巳而會所鑄子不喻母謂無利也遂止伊川聞之曰此乃國家之大利也利多費省私鑄者衆費多利少盜鑄者息民不敢盜鑄則權歸公上非國家之大利乎又有議增解鹽之直者伊川曰價平則鹽易洩人人得食無積而不售者嵗入必倍矣增價則反是巳而果然司馬公既相薦伊川而起之伊川曰將累人矣使韓富當國時吾猶可以有行也及温公大變熙豐復祖宗之舊伊川曰役法當討論未可輕改也公不然之既而數年紛紛不能定由是觀之亦可以見其梗概矣朱熹書易傳後曰易更三聖而制作不同若包犠氏之象文王之辭皆依卜筮以為教而其法則異至於孔子之贊則一以義理為教而不専於卜筮也是豈其故相反哉俗之淳漓既異故其所以為教為法者不得不異而道則未嘗不同也然自秦漢以來考象辭者泥於術數而不得其𢎞通簡易之法談義理者淪於空寂而不適乎中正仁義之歸求其因時立教以承三聖不同於法而同於道者則惟伊川之書而巳又曰易傳義理精字數足無一毫欠闕只是於本義不相合易本是卜筮之書程先生只説得一理伊川晚年文字如易傳直是盛得水住晚年所見甚實更無一句懸空說底話今觀易傳可見何嘗有一句不著實易傳言理甚備象數却欠在亦有未安處如旡妄六二不耕穫不菑畬只是説一箇無所作為之意易傳却言不耕而穫不菑而畬謂不首造其事殊非正意沈元用問和靖伊川易傳何處是切要尹云體用一源顯微無間此是最切要處後舉似李延平延平曰尹說固好然須是看得六十四卦三百八十四爻都有下落方始說得此話向見敬夫及伯恭皆令學者專讀程易傳往往皆無所得盖程傳但觀其理而不考卦畫經文則其意味無窮各有用處誠為切於日用功夫但以卦畫經文考之則不免有可疑者問程易説得理也太多曰伊川求之太深嘗説三百八十四爻不可只作三百八十四爻解其說也好而今似他解時依舊只作得三百八十四般用程易難看其用意精密道理平正更無抑揚若能看得有味則其人亦大段知義理矣易傳明白無難看但伊川以天下許多道理散入六十四卦中若作易看即無意味唯將來作事看即句句字字有用處程先生經解理皆在解語内伊川有詩解數篇説小雅以後極好程先生詩傳取義太多詩人平易恐不如此今只看論語一書何嘗有懸空説底話只為漢儒一向尋求訓詁更不著聖人意思所以二程不得不發明道理開示學者使􅈭昂向上求聖人用心處故放得稍髙又曰二程之學以大學論語中庸孟子為標指而達于六經使人讀書窮理以誠其意正其心修其身自家而國以及於天下其道坦而明其說簡而通其行端而實盖將有以振百代之沉迷而内之聖賢之域䟦遺書後曰此書二程門人記其所見聞問荅也讀是書者誠能主敬以立其本窮理以進其知使本立而知益明知精而本益固則日用之間且將有以得乎先生之心矣問遺書中載明道語便自然洒落明決曰自是他見得容易伊川易傳却只管修改晚年方出其書若使明道作自無許多事伊川説話如今看來中間寧無小小不同只是大綱統體説得極善如性即理也一語直是自孔子後惟是伊川説得盡這一句便是千萬世説性根基並朱子語胡安國曰程氏之文於易則因理以明象而知體用之一源於春秋則見諸行事而知聖人之大用於諸經語孟則發其微指而知求仁之方入徳之序程氏之行其行已接物則忠誠動於州里其事親從兄則孝悌顯於家庭其辭受取舍非其道義則一介不以取與諸人雖禄之千鍾不顧也胡宏曰二公倡久絶之學於今日其功比於孔子作春秋孟子闢楊墨張栻曰二先生所以教學者不外於居敬窮理二事取其書反覆讀之則可以見盖居敬有力則其所窮者愈精窮理浸明則其所居益有地二者實互相發也又曰二先生書完全精粹愈讀愈無窮不可不詳味也又曰伊川之言看得似平易而研窮其味無斁胡安國曰昔嘗見鄒志完論近世人物因問明道如何曰此人得志使萬物各得其所又問伊川如何曰却不得比明道又問何以不得比曰為有不通處後來再論二先生學術志完却曰伊川見處極髙昔鮮于侁曾問顔子在陋巷不改其樂不知所樂者何事伊川却問曰尋常道顔子所樂者何侁曰不過是説所樂者道伊川曰若有道可樂便不是顔子以此知伊川見處極髙朱子曰此道更前後聖賢其説始備自堯舜以下若不生孔子後人去何處討分曉孔子後若不生孟子亦未分曉後數千載乃始得二程出來發明此理秦漢以下直是説夢這个道理自孔孟既沒便無人理㑹得只有韓文公曽說來又只說到正心誠意而遺了格物致知及至程子始推廣其說工夫精密無復遺慮然程子既沒門人說得便差都説從别處去與致知格物都不相干是不曽精曉得程子之說耳只有五峯説得精其病猶如此亦縁當時諸公所聞於程子者語意不全或只聞一時之語或只聞得一邊所以其說多差後來却是集諸家語録湊起衆說此段工夫方始渾全國初人便已崇禮義尊經術欲復二帝三代已自勝如唐人但説未透在直至二程此理方說得透問明道可比顔子伊川可比孟子否曰明道可比孟子孟子才高恐伊川未到然伊川收束檢制處孟子却不能及明道徳性寛大規模廣濶伊川氣質剛方文理密察其道雖同而造徳各異故明道嘗為條例司官不以為凂而伊川所作行狀乃不載其事明道猶謂青苗可且放過而伊川乃於西監一狀計較如此可謂不同矣但明道所處乃大賢以上事學者未至而輕議之恐失所守伊川所處雖高然實中人可以跂及學者只當以此為法則庶乎其寡過矣今之想像大程者當識其明決中和處小程者當識其初年嚴毅晚年又濟以寛平處天姿大叚髙則學明道若不及明道則且學二程横渠横渠最親切二程規模廣大程先生姿禀高潔净不大叚用工夫横渠姿禀有夾雜偏駁處故大段用工夫明道之言發明極致通透洒落善開發人伊川之言即是明理質慤精深尤耐咀嚼然明道之言一見便好久看愈好所以賢愚皆獲其益伊川之言乍見未好久看方好故非久於玩索者不能識其味此其自任所以有成人材尊師道之不同明道渾然天成不犯人力伊川功夫造極可奪天巧明道説話超邁不如伊川說得的確書伊川帖曰近世學者閱理不精正坐讀書太草草耳况春秋大義數十炳若日星固已見於傳序而所謂不容遺忘者又非先生決不能道也夫三綱五常大倫大法有識以上即能言之而臨小利害輙巳失其所守正以學不足以全其本心之正是以無所根著而忘之耳既有以自信其不容遺忘又不覺因事而形於筆札之間非先生之徳盛仁熟左右逢原能及是耶贊曰規員矩方繩直凖平允矣君子展也大成布帛之文菽粟之味知徳者希孰識其貴並朱子語宋名臣言行録外集卷三
