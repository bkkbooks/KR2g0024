body:
  text: 宋名臣言行錄續集巻三宋李幼武纂集傅察忠肅公字公晦獻簡公之從孫孟州濟源人年十七以類試河北運司髙薦試禮部以避親别試復在髙選初任青州法厯永平淄川丞乆之除常丞召對除兵部員外郎逾年遷吏部宣和七年十月借宗正少卿接伴金使行至境上不屈遇害年三十七贈徽制乾道中累贈少師公未廷試蔡京輔政賣弄威權脅制中外且陽示含容誘以附已堅欲以女妻公遣其子與術士數輩踵至視公又託其姻強公相見公不從識者謂公年少有器識未易量也後公為清獻婿京銜之為接伴使時金人已渝盟公至燕山聞斡里雅布入冦或勸其母遽行公曰銜命以出聞難而止若君命何遂行遇斡里雅布領兵至金人曰見太子當拜公曰太子雖貴人臣也當以賔見何拜為斡里雅布怒曰汝國失信吾興師南向海上之盟不可恃也公曰兩國講好信使往來項背相望何謂失信太子干盟而動意何為乎金左右捉使拜白刃如林公曰死則死耳豈有俱人臣而輙拜者或抑捽使伏地公植立衣冠顛頓終不屈斡里雅布怒曰爾不拜我耶麾令去公知不免謂其下曰彼脅我以拜我義不辱我死必矣我父母老素鍾念我聞之必大戚若等得脱幸記我言以告吾親知我死國少解其無窮之悲也左右盡泣既次燕山遂遇害公生而秀穎異於他兒十嵗不戲弄誦書問學晨夕不懈公忠孝得于天資刻意好學自少至壯未嘗一日廢初逰場屋同舍或出入飲博客至公獨在初未為異後至每如此人方歎其修謹公與蔣噩同為接伴遇敵人噩等拜獨公不屈曰主上明若日月何欲敗盟南北敵國安知非送死哉我有死而巳膝不可屈也劉韐忠顯公字仲偃其先京兆人六世祖當五季之亂避地建之崇安遂為閩人登元祐九年第調洪州豐城尉再調秦州陜城令崇寧初王厚帥熙辟狄道令復辟經幹轉武勝軍節僉京漕吳擇仁辟主管丁吉監在京綾錦院轉朝散郎提舉陜西貨司召至除直祕閣領轉運司事升祕撰遷中大夫除制置解監副使尋領使事除集撰改陜西漕使宣和初丐祠除徽制主西京崇福宫除知越州明年詔拜述古直學四年召㫖充宣撫司參謀官五年遷光禄大夫顯謨學士知建州改福州除延康學士尋落職提舉洪慶宫尋復職知荆南府改建州除真定帥靖康初拜資政學士遷銀青拜河北帥未行復拜河北河東宣撫副使繼除都大京城四壁守禦使即報罷為時相所擠降五官落職宫祠二年遣使金金人欲用之不屈而終年六十一詔復官贈資政大學士初尉豐城嵗饑多盗旁邑率以捕殺希賞公曰此飢民救死耳率豪右出穀賑䘏之存活者甚衆盗亦戢方臘反陷杭睦二州杭越阻一水越大震官吏悉遁或請公行公曰吾為郡守將與城存亡不為動民聞公言稍還公下令曰富者出財壯者出力民讙奮無敢後遂葺壘練兵為戰守備明年二月賊陷衢婺八日至城下公麾衆出戰賊大潰横尸蔽野自是不敢近公境温台明以越為屏蔽亦賴以全越民相與剏生祠比屋繪其像飲食必祝曰活我者劉公也中使自京師来出御札督戰且諭將佐僚屬曰朝廷與金人約夾攻契丹乆矣我若罷兵彼將滅遼與我為鄰得無責言乎若使異時生釁誰任其責公曰與外國共事非計也童貫怒曰此出上意公以為非計何也公曰自古與外國共事鮮無後患事不成則信義恩威俱廢四鄰解體事成則敵人恃功必有邀索唐以回紇破安禄山納侮召亂百年不已況金人氣燄非回紇之比乎初金之入真定也父老號呼曰使劉資政在鎮豈有此禍金益知公名必欲得公宰相紿以割地遣公往以其國僕射韓正館公于城南夀聖院正言國相知公名今欲用公矣公曰偷生以事二姓有死不為也金謂尼瑪哈為國相云明年正月正見公言欲以公為正代許以家屬行公仰天大呼曰有是乎歸召指使陳灌等曰金乃欲用我我當以死報國耳灌等泣且拜公曰死生命也寧為不義屈乎即手書片紙曰金人不以予為有罪而以予為可用夫正女不事二夫忠臣不事兩君以順為正者妾婦之道此予所以必死也付灌持歸報諸子即沐浴更衣酌巵酒以衣絛自經時十六日也燕人雜然嘆曰劉相公忠臣也因與灌共瘞公夀聖院西崗上遍題院壁識其處灌逸歸報公子子羽具棺衾公故將王􅊅等以兵䕶出城大殮公薨八十日矣顔色如生觀者異焉公為人莊重寛厚寡言笑與人交謙恭若有所畏至臨大事則毅然不可奪累厯大藩事無巨細必親臨之至忘寢食雖盛暑寒不憚也不喜宴逰稍暇逸心不自安為政愛人出于誠心求民瘼如去已病齦齕豪強不顧其難必極力而後已小民犯罪或越法縱舍至大奸則立斷不疑公厯事二朝軍旅事未嘗不在其間意甚厭之抗章求閑略無虚嵗宣和間鎮長樂公以書生起白屋一旦持帥節過家上冡與親舊揮金把酒勞問平生留連旬日不忍去閩人榮之晚益厭宦逰買田嘉興將老焉舍旁有水竹自長樂歸日與里中賢士大夫逍遥放浪相娱樂恬然無仕進意而朝廷用之不置也公長慮逺識得于事先料敵強弱計事可否後悉如其言厯官皆補外人恨其未用及時當多故始付以大計而動輙齟齬不得施其謀雖以身狥國無負于幽顯而有志之士為國惜之李忠定綱輓公詩序曰士固有一死或重于太山或輕于鴻毛非死之難處死之難也公毅然不動其心視死如歸遺書其家陳義可觀足以激懦夫而羞失節之士豈不誠烈丈夫哉宇文虚中撰𠡠賜旌忠褒節碑曰平昔無事時公頻使于外未嘗陪鳴玉之列間一入朝言者隨而擊之在圍城中尚不為時相所容一旦死難毅然在他人之前乃知忠義之士固自有守又曰古語有之謀人之軍師敗則死之謀人之邦國危則亡之公之始議欲以計勝敵而以激怒輕戰為戒顓謀者與公相違卒以致禍謀者不能即死而公乃先死此尤為忠臣義士之所難也程振字伯起饒之樂平人入太學崇寧三年幸學以髙第補和州教留辟雍乆之遷博士擢常博丐外京西提學五年改京南倉入尚書膳部員外郎逾年監察御史遷司業兼太子舍人改國子祭酒遷左司員外郎兼官如故除中書舍人忤王黼諷言者論之責提舉冲佑觀時宣和三年也明年復集撰丁尋復徽制中舍皆力辭不拜淵聖受禪忽除吏侍連章求去不允除開封尹除刑侍靖康初兵陷京師求金冐死直前遇害時二年二月二十五日也年五十七建炎初進朝議大夫贈端明學士初見太子東宫言古者大祭祀登餕受爵必以上嗣既經禮所載且元豐彛典具存昨上有事明堂而殿下不與非所以尊宗廟重社稷太子矍然曰初無人及此由是驟加奬重方臘暴浙右公為王黼言宜乘此時言天下弊事庶幾稍革當天意順人心黼怏怏不悦曰上且謂某挾冦奈何公知黼忌其言不答趨出然太子薦公甚力朝廷莫知㑹兩省官缺上曰程某老成忠實必以為給事中黼銜前忿不能平曰公資淺且雅長詞令止除中書舍人淵聖受禪公以大臣不協議論多駁詔令輕改失其事幾如金人且拏兵半年而至今不解者以或和或戰之説未一故也裁抑濫賞如黒白易分而數月之間三變其説者以廟堂不能忘私而多與其黨為地故也今日一人言之以為非而止或出聖斷踰度而不暇疇咨或用大臣偏僻而遂形播告所以動未必善處未必宜乃輙為之反汗焉其勢不得不爾也及聞虜㓂河北力請合諸路兵掎角擊之以牽其勢且曰彼猖獗如此陛下猶欲守和議而不使之少有所懲創乎淵聖雖美其言而奪于大臣不能用靖康二年金邀天子幸其營公亟白宰相何㮚思所以折虜之語告于上而却之㮚私宣言翌日車駕出城羣臣失色已而金索金繒無藝府庫不足以民財繼之詔尚書梅執禮侍郎陳知質及公給事中安扶督民輸一日金坐城闉猥謂四人者吾國賦羊馬于民率比屋相甲乙若甲輸而乙否則執而誅之誰敢違者意民窮且變生將投隙而逞四人者同辭而對曰今天子䝉塵臣民皆願前死雖肝腦不計也于金繒何有哉顧誠亡以塞責金大怒問官長安在欲加以罪而置其餘公恐尚書坐之遽前曰皆官長也金不勝忿四人者皆死之上即位哀其忠降璽書褒嘆初公為中書舍人王黼以客沈積中帥河朔欲覘虜圖燕公語積中當思異時覆族之禍積中佩公戒至所部首以書謝公盛言其不可之狀公具以其語告諸朝洎公左遷童貫蔡攸卒興是役致變起肘腋而公罹其凶故聞公之喪士無賢愚皆為之出涕宣和中上皇崇道家之説公至東宫淵聖問焉公對甚悉其畧曰周公作鴟鴞之詩孔子以為知道其言不過迨天之未隂雨徹彼桑土綢繆牖戸而已老子著道經亦曰為之于未有治之于未亂葢老氏與孔子合者如此今不固根本于無事之時而徒事目前之功非二聖人之意他日淵聖為太上皇道之太上皇頗歎美健羡疏左右近習之臣而楊戩方興龍徳太一之役懼不能得因肆讒説家令楊馮將輔太子幸非常太上皇震怒執楊馮而誅之淵聖之言亦廢及靖康中公尹天府言利者頗欲離間兩宫公心獨鄙之每調和父子之間甚有恩意如詔鞫龍徳近侍梁忻之類特寛其丈由是纎芥之疑不行聞者歎服公天資樂易與人談笑極醖藉風流至論事則挺然不可回奪居鄉専趍人之急以急抵公門者未嘗辭于書無所不觀亦無所不學屬文敏贍下筆才能自休書記翩翩千里如對靣語見之者把翫無斁爭藏之為榮嗚呼士方平時劇談指掌以禍福死生自任而謂人不能此直易爾一旦臨利害僅如秋毫鮮不喪厥心而移其所守若夫規以身免而推禍于他人者比肩接迹也聞公之風者亦可少媿哉銘曰惟祝融之苗裔兮公鼻祖曰伯休越漢唐而南徙兮家洎川之上㳺天既予公以修能兮又重之以姱節冠切雲而事君兮景忠精之前哲氛祲忽其蔽日兮神龍蕩而失淵衆憚殃而逭禍兮公踽踽而直前左攙搶而右窫窬兮公胡獨離此患茍殺身而成仁兮齊死生于夜旦紛衆美曽不概見兮獨令名之庶幾偉蕩隂之節死兮吾將從晉賢之所歸龍溪汪藻撰墓誌李若水忠愍公字清卿洺州曲周人擢上舍第為元城尉平陽府錄濟南府教除太學博靖康初使金除著作佐郎使還擢禮書力辭改吏侍兼權開封尹二年死於金年二十五建炎初贈觀文殿學士蔡京復相老而耄事一出于子絛少宰李邦彦欲謝病去公曰大臣以道事君不可則止去就之義當決之于上前詎可奄奄以病退哉公見尼瑪哈于太原尼瑪哈遣王汭偕来十一月還朝間二日敵騎南牧公副馮澥使之至中牟㑹守河兵亂相驚以敵至左右駭顧謀取間道以去公謂澥曰戍卒宵潰公不可效之某死不避也遂由故道行日一奏京師言金兵且至宜選將練兵褒有功勸戰士修城郭飭守備以待其来和議必不可諧也至懐州遇金人館伴劉思蕭慶言以遣使京師請以河為界因隨其軍行至京西之境而聞耿南仲聶昌出使割地界矣尼瑪哈至京城外獨遣澥同慶入城請與皇帝相見議盟誓不從又請與道君相見亦不從但許宰相親王出後數日遣兩執政兩宗室分使金軍尼瑪哈冐矢石督攻甚急城陷金召公公出見二酋曰令何相公来計事不則縱兵入城矣遂入見欽宗時獨何㮚孫傅梅執禮秦檜并宦者數人在左右公具傳金人語乃遣㮚行明日又命濟王及陳過庭偕往㮚還言二帥請與道君相見欽宗曰朕當自往耳豈可使道君皇帝䝉塵哉明日上幸金營留三日而還二年金遣使以書来言曰農務方興將歸矣徽號事當面議請皇帝出郊遂以明日出公扈從既而金遣蕭太師者易御服公忿怒抱持上呼天聲苦數聲大呼罵且泣曰吾君華夏真主爾輩敢無禮耶衆擊之面目為傷氣結仆地良乆乃蘇金使人監視日三飯飲之公絶不食金怒囚之蕭太師者數来勸勉公嘆曰天無二日某寧有二主哉其僕𨽻亦来慰解曰侍郎父母春秋髙兄弟衆奈何公叱曰忠臣事君有死無二吾終不復顧家矣雖然吾親老矣若歸勿遽言恐傷吾親意令兄弟輩徐徐言吾死國也公母張氏聞變哭且言曰吾子死難必矣又旬日尼瑪哈召公議立異姓公曰道君皇帝為生靈計罪已内禪主上仁孝恭儉未有過失豈可輕議廢立尼瑪哈曰趙皇失信安得為無過公曰若以失信為過則女乃失信之尤者乃厯數其過曰女伐人之國不務全安生民徒掠金帛子女以為豐肆為封豕長蛇黷貨無厭女真一劇賊罵不已尼瑪哈令曰擁之去反顧罵益甚至郊壇側謂其下謝寧曰我為國死職耳併累若等也監軍曰吾為公釋此人使歸公能從我乎公復罵不已遂見殺一云粘罕再召公出公知虜難以義動因厯數其失信大聲抗論云皇帝非失信以祖宗積累之難三世方得河東陵寢在焉曽不敢輕與人惟義所在而巳且如二元帥自去年城陷之後再與主上議和永事大國㰱血未乾又復違背又于金銀所需之外種種需索無厭貪人土地取人婦女玉帛覆我宗社害我生靈是一巨賊耳尼瑪哈大怒令曳出于青城東華門外敲殺之臨死罵聲不絶于口胡相謂曰大遼之破死義者十數今南朝惟李侍郎一人公臨死為歌詩一首其卒章曰矯首問天兮天卒不言忠臣效死兮死亦何愆人聞而悲之公初名若氷上召見惡其若猶弱也氷猶兵也兵不可弱遂賜今名髙宗中興贈公官制詞云段秀實笏擊朱泚顔杲卿面罵禄山簡冊有光精爽如在惟爾英烈追配古人太學生祭公文曰皇穹將傾天柱必折大地欲仆泰岳必蹶云云公人中龍肯臣犬豕云云賊據床上天子在下公抱帝躬嚼齒大罵公于是時眥裂髪立乾坤晝昬鬼神夜泣云云欲贖清卿人萬其身萬人何多一世猶輕云云吾將提長劒而登泰華抉浮雲而問蒼天雖泣盡而繼之以血安得吾清卿之復然欽廟宰相皆有誤國之罪故無配享者乾道五年冬當祫祭九月常少林栗黄中言當時臣僚遭值艱難莫救淪胥罕可稱述而以身狥國名節暴薨者不無其人雖生前官品不應配享之科而事變非常難拘定制乞特詔侍從臺諌集議奏可中所陳葢指公也汪聖錫時為吏書獨以為無可配享乞罷集議從之宋名臣言行錄續集卷三
