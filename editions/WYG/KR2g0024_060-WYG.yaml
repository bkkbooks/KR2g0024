body:
  text: 宋名臣言行録外集卷二宋李幼武纂集程顥明道先生純公字伯淳五世而上居中山之博野髙祖羽太宗朝以輔翼功顯賜第京師今為河南人踰冠中嘉祐二年進士第調鄠縣簿再調上元簿就移澤州晉城令改著佐尋以吕公著薦授太子中允權御史裏行權發遣京西提刑改鎮寧僉判監西京竹木務改太常丞改奉議郎求近鄊監局得監汝州稅改承議郎召為宗正寺丞未行卒元豐八年六月十五日也年五十四嘉定二年賜諡淳祐初封河南伯明道元年始生神氣秀爽異於諸兒未能言叔母侯氏抱之不知其釵墜後數日方求之先生以手指隨其所指而往果得釵人皆驚異數嵗即有成人之度賦酌貪泉詩曰中心如自固外物豈能遷先達巳許其志操十二三羣居庠序中如老成人鄠縣有稅官以賄播聞然怙力文身自號能殺人衆皆憚之雖監司州將未敢發先生至其人心不自安輙為言曰外人謂某自盜官錢新主簿將發之某勢窮必殺人言未訖先生笑曰人之為言一至於此足下食君之祿詎肯為盜萬一有之將救死不暇安能殺人其人嘿不敢言後亦私償其所盜卒以善去嘉祐三年也鄠令以先生年少未之知民有借其兄宅以居者發地中藏錢兄之子訴曰父所藏也令以無証佐難決先生問其人曰藏幾何時矣曰四十年矣曰借宅居幾何時曰二十年矣取錢視之謂借宅者曰今官所鑄錢不五六年即遍天下此錢皆前數十年所鑄何也其人遂服令大竒之南山有石佛嵗傳其首放光逺近男女聚觀晝夜雜處莫敢禁止先生戒寺僧曰俟復現必先白吾不能往當取其首就觀之自是不復有光府境水害倉卒興役諸邑皆狼狽獨先生所部人不勞而事集常謂人曰吾之董役乃治軍法也在鄠賦詩云雲淡風輕近午天傍花隨柳過前川時人不識予心樂將謂偷閒學少年上蔡云看他胷中直是好與曾㸃底事一般學者須是胸懷擺脫得開始得當路者欲薦先生多問所欲先生曰薦士當以才之所堪不當問所欲嘉祐八年再主江寧上元簿為令畫法均田稅攝邑盛夏塘隄大決法當言之府府稟于漕然後計功調役非月餘不能興作先生曰如此苗槁矣民將何食救民獲罪所不辭也遂發民塞之嵗則大熟江寧當水運之衝舟卒病者留之為營以處曰小營子嵗不下數百人至者輙死先生察其由盖既留然後請於府給劵乃得食比有司文移具則困於飢已數日矣先生白漕司給米貯營中至者與之食自是生全者大半常云一命之士茍存心於愛物於人必有所濟伊川云謝師直尹洛時嘗談經與鄙意不合因曰伯淳亦然往在上元景温説春秋猶時見取至言易則皆曰非是頤謂曰二君皆通易者也監司談經而主簿乃曰非是監司不怒主簿敢言非通易能如是乎仁宗登遐官吏成服三日之朝府尹率羣官將釋服先生進曰三日除服遺詔所命莫敢違也請盡今日若朝而除之所服止二日爾尹怒不從先生曰公自除之某非至夜不敢釋一府相視無敢除者茅山有龍池其龍如蜥蝪而五色自昔嚴奉以為神物先生嘗捕而脯之使人不惑其始至見人持竿道傍以黏飛鳥取其竿折之使勿為自是鄉民子弟不敢蓄禽鳥不嚴而令行大率如此治平四年令晉城民以事至邑者必告之以孝弟忠信度鄊村逺近為保伍使患難相恤而姦偽無所容凡孤㷀殘疾者責之親黨使無失所行旅出其塗者疾病皆有所養諸鄉皆有校暇時親至召父老而與之語兒童所讀書為正其句讀教者不善則為易置俗始甚野不知為學先生擇子弟之秀者聚而教之去邑纔十餘年而服儒服者數百人矣邑幾萬室三年間無强盜及鬭死者秩滿代者且至吏夜叩門稱有殺人者先生曰吾邑安有此誠有之必某村某人也問之果然家人驚異問其故曰吾嘗疑此人惡少之弗革者也先時民憚差役役及則相訴為讎先生盡知民産厚薄第其先後按籍而命之無有辭者河東義勇農隙則教以武事然應文備數而已先生至晉城之民遂為精兵有富民張氏子其父死有老父曰我汝父也來就汝居張驚疑請辨於縣先生詰之老父探懷取策以進記曰某年某月日某人抱氏與張三翁家先生問張及其父年幾何謂老父曰是子之生其父年纔四十巳謂之三翁乎老父驚服作縣於座右書視民如傷四字云某毎日常有媿於此龜山云觀其用心應是不到錯決撻了人熙寧二年吕申公薦授太子中允權御史裏行神宗素知先生名召對從容訪問毎對退必曰頻求對來欲常相見爾一日論議甚久日官報午正先生遽求退廷中中人相謂曰御史不知上未食邪前後進説大要以正心窒慾求賢育才為先上嘗使推擇人才所薦數十人以父表弟張載暨弟頤為首嘗言人主當防未萌之欲及勿輕天下士時王安石益信用先生毎見上必言君道以至誠仁愛為本未嘗及功利上召問所以為御史對曰使臣拾遺補闕禆贊朝廷則可使臣掇拾羣下短長以沽直名則不能上歎賞以為得御史體所獻納必據經術事嘗辨於早而戒於漸一日上縱言及於辭命先生曰人主之學唯當務為急辭命非所先也少作章疏只是開陳詳説欲以誠意感悟上心一日極陳治道上曰此堯舜之事朕何敢當先生愀然曰陛下此言非天下之福也居職數月其章疏尤係教化之本根論王霸略曰得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者霸者之事也王道坦然本乎人情出乎禮義若履大路而行無復回曲霸者﨑嶇反側於曲徑之中而卒不與入堯舜之道故誠心而王則王矣假之而霸則霸矣論正學厲賢略曰君道在乎稽古正學明善惡之歸辨忠邪之分趍道之正又在乎君志先定定志者正心誠意擇善而固執之也惟以聖人之訓為必當從先王之治為可法而已然天下之患常生於忽微而志亦戒乎漸習故古之君出入間燕必有誦訓箴諫之官左右前後無非正人以成徳業願陛下禮命老臣賢儒日親便坐講論道義以輔聖徳又擇賢俊使陪法從朝夕進見開陳善道以廣聴聞則知益明矣論養賢略曰先王求治何嘗不盡天下之才今天下之大豈為乏賢而朝廷無養賢之地以容之徐察其器能髙下而進退之也欲乞朝廷設延英院以待賢凡公論推薦及巖穴之士必招致優禮視品給俸而不可遽進以官凡有政治委之詳定典禮使之討論經畫得以奏陳治亂得以講究也使政府及近侍之臣互相與接陛下時賜召對訪以治道可觀其能察以累嵗然後使賢者就位能者任職無施之不稱也朱子云王霸劄子說得好自古論王霸至此無餘藴矣嘗被㫖赴中書議事安石方怒言者厲色待之先生徐曰天下之事非一家私議願公平氣以聴之安石愧屈一日因論事不合謂先生曰公之學如壁上言難行也先生曰參政之學如捉風後來逐不附已者而獨不及於先生且曰此人雖未知道亦忠信人也荆公初議改法攻之者至有肆罵先生獨以至誠開納君相疏入輙削藁常曰揚已矜衆吾所不為三年時言新法者皆得罪而先生以言不行懇求補外獨差充京西提刑辭不受改授澶州判官乃止嘗曰熙寧初介甫行新法並用君子小人君子正直不合介甫以為俗學不通世務斥去小人茍容諂佞介甫以為有材能知變通用之君子如君實不拜同知樞密院以去范堯夫辭同修起居注得罪張天祺監察御史面折介甫被謫介甫性狠衆人皆以為不可則執之愈堅君子既去所用皆小人争為刻薄故害天下益深使衆君子未用與之敵俟其勢久自緩委曲平章尚有聴從之理俾小人無隙以乘其為害不至如此之甚也天下以為知言聞見録又云新政之改亦是吾黨争之太過成就今日之事塗炭天下亦須兩分其罪可也當時介甫欲去以數事上前卜去就若青苗之議不行則決其去伯淳於上前與孫莘老同得上意要了當此事大抵上意不欲抑介甫要得人擔當了而介甫之意亦尙無必伯淳嘗言管仲猶能言出令當如流水以順民心今參政苦要做不順人心事何耶介甫之意只恐始為人所沮其後行不得伯淳却道但做順人心事人誰不願從也介甫道此則感賢誠意縁張天祺其日於中書大悖由是介甫大怒遂以死力争於上前上為之一一聴用從此黨分矣莘老受約束而不肯行遂坐貶而伯淳遂待罪既而除以京西提刑伯淳復求對見上上言有甚文字伯淳云今咫尺天顔尚不能少回天意文字復何用欲去而上問者再四伯淳毎以陛下不宜輕用兵為言朝廷羣臣無能任陛下事者遺言五年太中公告老而歸先生求折資監當以便養歸洛嵗餘得監西京洛河竹木務家素清窶僦居洛城殆十餘年與弟從容親庭日以讀書講學為事士大夫從游者盈門自是身益退位益卑而名益髙於天下八年十月彗星求言先生論朝政甚切上欲召使修三經義執政不可命知扶溝縣扶溝地卑嵗有水旱先生經畫溝洫之法未興工而去官先生曰以扶溝之地盡為溝洫必數年乃成吾為經畫十里之間開其端後人知其利必有繼之者矣夫為令必使境内之民凶年饑嵗免於死亡飽食逸居有禮義之訓然後為盡故吾於扶溝興設學校聚邑人子弟教之亦幾成而廢夫百里之地至狹也而道之廢興係焉是數事皆不及成豈非命哉然知而不為徒責命之廢興則非矣此吾所以不敢不盡心也元豐二年諸賢修禊洛園先生席上賦詩末云未須愁日暮天際是輕陰龜山嘆其温柔忠厚聞之者自然感動右府同薦除判武學李定劾其新法之初首為異論罷之吕申公疏曰顥立身行已素有本末講學議論久益疏通其在言路論列皆辭意忠厚不失臣子之體鄰邑民犯盜繫縣獄而逸既又遇赦先生坐是以特㫖罷邑人詣府及司農丐留者千數得監汝州稅八年三月神宗升遐㑹先生以檄至府舉哀既罷留守韓康公之子宗師問朝廷之事如何曰司馬君實吕晦叔作相矣又問果作相當如何曰當與元豐大臣同若先分黨與他日可憂宗師曰何憂曰元豐大臣皆嗜利者使自變其已甚害民之法則善矣不然衣冠之祻未艾也二公果並相以宗丞召先生未行而卒或問先生於富鄭公公曰伯淳無福天下之人也無福先生云聖人用意深處全在繫辭詩書乃皆格言觀易須識時然後見逐爻之間嘗包函數意聖人嘗取其重者為之辭亦有易中言之已多取其未嘗言者亦不必重事又有且言其時不及其爻之材皆臨時參考須先看卦乃看得繫辭學者全要識時若不識時不足以言學尹焞語錄云吾學雖有所受天理二字却是自家體貼出來又云某書字時甚敬非是要字好只此是學晦庵銘之曰握管濡毫伸紙行墨一在其中㸃㸃畫畫放意則荒取妍則惑必有事焉神明厥徳秋日成詩曰閒來無事不從容睡覺東窗日已紅萬物静觀皆自得四時佳興與人同道通天地有形外思入風雲變態中富貴不淫貧賤樂男兒到此是豪雄上蔡云明道門擺脫得開為他所過者化胡文定云聖人志在天下國家與常人志在功名全别孟子傳聖人之道故曰予豈若是小丈夫哉諫於其君而不受則悻悻然見於其面去則窮日之力且看聖人氣象則别明道却是如此元豐中有詔起吕申公司馬温公温公不起明道作詩送申公又詩寄温公二詩皆載文集其意直是眷眷在天下國家雖然如此於去就又却分明不放過一步上蔡云先生善言詩他又不曽章解句釋但優㳺玩味吟哦上下便使人有得處又曰伯淳談詩並不下一字訓詁有時只轉一兩字㸃掇他念過便教人省悟陳忠肅甞作責沈文送其姪孫淵幾叟云葉公沈諸梁問孔子於子路子路不對葉公當世賢者魯有仲尼而不知宜乎子路之不對也元豐乙丑夏予為禮部貢院官適與范醇夫同舍公嘗論顔子之不遷不貳惟伯淳有之予問范曰伯淳誰也公黙然久之曰不知有程伯淳耶予謝曰生長東南實未知也時予年二十九矣自是以來嘗以寡陋自媿又自是毎得先生之文必冠帶而讀之侯仲良曰朱公掞見明道于汝州歸謂人曰某在春風中坐了一月謝顯道曰明道終日坐如泥塑人接人則渾是一團和氣張九成曰明道書牕前有草茂覆砌或勸之芟明道曰不可欲常見造物生意又置盆池畜小魚數尾時時觀之或問其故曰欲觀萬物自得意草之與魚人所共見惟明道見草則知生意見魚則知自得意此豈流俗之見可同日而語文潞公采衆議而為之稱以表其墓曰明道先生而弟頤序之曰周公没聖人之道不行孟軻死聖人之學不傳道不行百世無善治學不傳千載無真儒無善治士猶得以明夫善治之道以淑諸人以傳諸後無真儒則天下貿貿焉莫知所之人欲肆而天理滅矣先生生乎千四百年之後得不傳之學於遺經以興起斯文為已任辨異端闢邪説使聖人之道煥然復明於世盖自孟子之後一人而已然學者於道不知所向則不知斯文之為功不知所至則孰知斯名之稱情也哉山可移谷可遷明道之名則亘萬古而長存也朱子曰嘗愛明道墓表有云學者於道知所向然後見斯人之為功知所至然後知斯名之稱情盖此事在人隨其所至之淺深而自知之彼不知者豈可以口舌强争彼知之矣則又何待較短長而後喻哉先生自十五六時聞汝南周茂叔論道遂厭科舉之業慨然有求道之志未知其要汎濫於諸家出入於老釋者幾十年反求諸六經而後得之明於庶物察於人倫知盡性至命必本於孝弟窮神知化由通於禮樂辨異端似是之非開百代未明之惑秦漢以來未有臻斯理也謂孟子没而聖學不傳以興起斯文為已任其言曰道之不明異端害之也昔之害近而易知今之害深而難辨昔之惑人也乗其迷暗今之惑人也因其髙明自謂能窮神知化而不足以開物成務言為無不周徧而實則外於倫理窮深極微而不可以入堯舜之道天下之學非淺陋固滯則必入於此自道之不明也邪誕怪異之説競起塗生民之耳目溺天下於汙濁雖髙才明智膠於見聞醉生夢死不自覺也是皆正路之蓁蕪聖門之蔽塞闢之而後可以入道先生進將覺斯人退將明之書不幸早世皆未及也先生之言平易易知賢愚皆獲其益如羣飲於河各充其量其教人自致知至於知止誠意至於平天下洒掃應對至於窮理盡性循循有序伊川云明道之葬門人朋友為文以直其道學者甚衆人各用其所知葢不同也而以為孟子之後傳聖人之道者一人而已是則同劉立之曰自孟子沒聖學失傳先生傑然自立於千歲之後芟闢榛穢開示本原聖人之庭户曉然可入學士大夫始知所向范祖禹曰自孟子没中庸之學不傳後世之士不循其本而用心於末故不可與入堯舜之道先生以獨智自得去聖人千有餘歲發其關鍵直睹堂奥一天地之理盡萬物之變真學者之師也朱光庭曰先生學以誠為本仰觀乎天清明穹窿日月之運行隂陽之變化所以然者誠而已俯察乎地廣博持載山川之融結草木之蕃殖所以然者誠而已人居天地之中參合無間純亦不巳者其在兹乎先生得聖人之誠者也才周萬物而不自以為高學際三才而不自以為足行貫神明而不自以為異識照古今而不自以為得至於六經之奥義百家之異説研窮披抉判然胸中天下之事雖萬變交於前而燭之不失毫釐權之不失輕重貧賤富貴死生皆不足以動其心非所得之深所養之厚能至是乎葢其所知上及堯舜三代帝王之治其所以包涵博大悠逺纖悉上下與天地同流下至行師用兵戰陣之法皆造其極外之夷狄情狀山川道路之險易邊鄙防戍斥堠控帶之要靡不究知其吏事操决文法簿書又皆精密詳練而所有不試其萬一游酢曰天地之心其太一之體歟天地之化其太一之運歟確然高明萬物覆焉隤然厚博萬物載焉非以其一歟陽自此始隂此凝消息滿虚莫見其形非以其和歟夫子之徳其融心滌慮黙契於此歟不然何穆穆不已渾渾無涯而能言之士莫足以頌其美歟先生姿禀既異而充養有道純粹如精金温潤如良玉寛而有制和而不流忠誠貫於金石孝弟通於神明視其色其接物也如陽春之温聼其言其入人也如時雨之潤胸懐洞然徹視無間測其藴則浩乎若滄溟之無際極其徳美言葢不足以形容先生行已内主於敬而行之以恕見善若出諸巳不欲弗施於人居廣居而行大道言有則而行有常其接物辨而不問感而能通教人而人易從怒人而人不怨賢愚善惡咸得其心狡僞者獻其誠暴慢者致其恭聞風者誠服覿徳者心醉吕大臨曰先生負特立之才知大學之要博聞强記躬行力究察倫明物極其所止涣然心釋洞見道體其造於約也雖事變之感不一應之以是心而無窮雖天下之理至衆知反之吾身而自足其致於一也異端並立而不能移聖人復起而不與易其養之誠也和氣充洽見于聲容然望之崇深不敢慢也遇事優為從容不迫然誠心懇惻弗之措也其自任之重寧學聖人而未至不欲以一善成名寧以一物不被澤為已病不欲以一時之利為巳功其自信之篤也吾志可行不茍潔其去就吾義可安雖小官有所不屑劉立之曰先生徳性充完粹和之氣盎於面背樂易多恕終日怡恱未嘗見其忿厲之容某問以臨民曰使人各輸其情又問御吏曰正已以格物邢恕曰先生徳性絶人外和内剛眉目清峻語聲鏗然㳺酢曰先生氣爽清越洒然如在塵外宜不能勞苦又遇事則毎與賤者同起居飲食人不堪其難而先生處之裕如也康節作四賢吟云彦國之言鋪陳晦叔之言簡當君實之言優㳺伯淳之言條暢四賢洛陽之望是以在人之上有宋熙寧之間大為一時之壯朱熹贊曰揚休山立玉色金聲元氣之㑹渾然天成瑞日祥雲和風甘雨龍徳正中厥施斯普又曰明道荅横渠定性書直是條理不亂定性書此篇大綱只在廓然而大公物來而順應兩句定性書自胸中㵼出云云問曰此正所謂有造道之言曰然只是一篇之中都不見一箇下手處問曰廓然而大公物來而順應這莫是下功處曰這是說巳成處遺書録明道語多有只載古人全句不添一字底亦有重出者是當時舉此句教人去思量明道當初想明徳煞容易便無那查滓只一再見濂溪當時又不似而今有許多言語出來不是他天資髙見得易如何便明得新法之行諸公實共謀之雖明道不以為不是盖那時也是箇合變時節但後來人情洶洶明道始勸之以為不可做逆人情底事及王氏排衆議行之甚力而諸公始退散或問新法之行雖塗人皆知其害何故明道不以為非曰自是王氏行得來有害若使明道為之必不恁的狼狽又問若二程出來擔負莫復别否曰若如明道十事須還他全别方得只看他當時薦章謂其志節慷慨云云則明道豈是循常蹈故塊然自守底人並朱子語宋名臣言行録外集卷二
