body:
  text: 宋名臣言行録前集巻六宋朱子纂集吕夷簡許國文靖公字坦夫其先萊州人徒夀州進士及第相仁宗配享廟庭河北自五代末即筭田鎛公嘆曰王道本於農此何名哉因表除之朝廷推其法他路自是農器無征李宗諤撰行狀祥符末王沂公知制誥朝望日重一日至中書見王文正公公問君識一吕夷簡否沂公曰不識也文正曰此人異日與舍人對秉鈞軸沂公曰何以知之曰吾亦不識但以其奏請得之沂公曰奏請何事曰如不税農器等數事卒與沂公並相龍川志玉清宫災太后泣曰先帝尊道奉天並建宮宇今忽焦灼何以稱遺意哉公知后㫖且復營建因推洪範以明災異之所致請罷不復建行狀公以主上方富春秋宜導之典學擢孫奭等居講席以經義輔導後又増置崇政説書天章閣侍講之職以廣聞見李宸妃薨章獻欲以宫人禮治䘮于外公奏宜從厚章獻遽引帝起頃之獨坐簾下召公問曰一宫人死相公云云何與公曰臣待罪宰相事無内外無不當預章獻怒曰相公欲離間吾母子耶公從容對曰陛下不以劉氏為念臣不敢言尚念劉氏也喪禮宜從厚章獻悟遽曰宫人李宸妃也且奈何公乃請治喪皇儀殿用一品禮殯洪福寺公又謂入内都知羅崇勲曰宸妃當以后服殮用水銀實棺異時莫道夷簡不曽説来章獻皆從之後章獻上仙燕王謂仁宗言陛下乃李宸妃所生妃死以非命仁宗號慟頓毁不視朝者累日下哀痛之詔自責尊宸妃為皇太后謚章懿甫畢章獻殿􅑼幸洪福寺祭告易梓宫帝親哭視之后玉色如生冠服如皇太后者以有水銀故不壊也帝嘆息曰人言其可信哉待劉氏加厚聞見錄章獻既沒或疑章懿之喪仁皇遣李用和發其葬視之容貎如生使者馳入奏仁皇于章獻神前焚香泣吿曰自今大孃孃平生分明矣龍川志公在章獻朝近臣頗以言事去職或勸公宜退公曰先帝待我厚期以宗廟安寧死不愧于先帝故平勃不去所以安漢仁傑不去所以安唐使吾亦潔虛名而去治亂未可知也故孜孜燮輔知無不為雖禍之未形事之將然必先為之救禦太后嘗欲進荆王為皇太叔公力爭以為不可遂止又以荆王子養于宫中長而弗出公因對言及以為不可后曰欲令與皇帝同讀書耳公言皇帝春秋方盛自當親接儒臣日聞典訓今與童稚處無益乞早令就邸他日又極言后曰何至如此公曰前代母后多利于幼稚嫌疑之際不可不慎臣只今在中書聴㫖后寤即令出宫大内災宮室略盡比曉朝者盡至日晏宫門不發不得聞上起居兩府請入對不報乆之追班上御拱宸門樓有司贊謁百官盡拜樓下公獨立不動上使人問其意對曰宫廷有變羣臣願一望天顔上為舉簾俯檻見之乃拜並行狀契丹借兵伐髙麗明肅欲與之公堅執不可后曰適已㣲許其使矣不與恐生怨奈何公曰但以臣不肯拒之既而后語其使曰意非不欲應但吕相公堅執不可耳使人無語而去元昊反有詔削奪在身官爵募能生擒元昊若斬首者即為節度使仍賜錢萬貫公在大名府聞之驚曰謀之誤矣立削奏曰前代方鎮叛命如此誥誓則有之矣非所以禦戎狄也萬一反有不遜之言得無損國體乎朝廷方改之已聞有指斥之詞矣家塾記章獻崩上始親政公手疏為治之本以諷于上其目有正朝綱塞邪徑禁貨賂辨姦壬絶女謁逺近習罷力役節冗費條奏甚詳天下學校乆廢公請詔州皆立學國朝公族分居邸第無所統一公請置大宗正建睦親宫置教授官悉授諸衞官以别庶姓並行狀寳元中御史府乆闕中丞一日李淑對仁宗偶問以憲長乆虚之故李奏曰此乃夷簡欲用蘇紳已許紳矣上疑之異時因問公曰何故乆不除中丞公奏曰中丞者風憲之長自宰相而下皆得彈擊其選用當出聖意臣等豈敢詮量之仁宗頷之筆錄初元昊拒命契丹重兵壓境上以伺釁議者請城洛陽為遷都之計公獨謂敵畏壯侮怯易以威制洛邑山川狹隘以壯則不足以威則退縮遂請建都大名示將親征以伐敵謀或曰此為虚聲爾不若増修東都城池以沮契丹之志公曰此子囊城郢計也使敵果南嚮則雖城固無益卒申前議既而契丹求和親割關南之地及劉六符等再至桀驁乆留不能遣公奏請于殿外幕次與敵使相見置酒面議以折之上以為然敵使見公畏伏語館伴使曰觀宰相如此雖留無益遂亟就道前好如初行狀景祐中公執政范文正以天章閣待制知開封府屢攻公之短坐落職知饒州康定元年復舊職知永興軍㑹公自大名復入相言于仁宗曰仲淹賢者朝廷將用之豈可但除舊職耶即除龍圖閣直學士陜西經略安撫副使上以公為長者天下亦以公不念舊惡文正面謝曰曏以公事忤犯相公不意相公乃爾奬拔公曰夷簡豈敢以舊事為念耶及文正知延州移書諭元昊以利害元昊復書語極悖慢文正具奏其狀焚其書不以聞時宋庠為參政先是公執政諸公唯諾書紙尾而已不敢有所預宋公多與之論辨公不悦一日二人獨在中書公從容言曰人臣無外交希文乃擅與元昊書得其書又焚不奏他人敢爾耶宋公以為公誠深罪范也時朝廷命文正分析文正奏臣始聞虜有悔過之意故以書誘諭之㑹任福敗虜勢益振故復書悖慢臣以為使朝廷見之而不能討則辱在朝廷乃對官屬焚之使若朝廷初不知者則辱専在臣矣故不敢以聞也奏上兩府共進呈宋公遽曰仲淹可斬杜祁公時為樞宻副使曰仲淹之志出于忠果欲為朝廷招叛虜耳何可深罪爭之甚力宋公謂公必有言助已而公黙然終無一語上顧問公何如公曰杜衍之言是也止可薄責而已乃降一官知耀州于是論者諠然而宋公不知為公所賣也尋出知揚州記聞公惡韓富范三公欲廢之而不能軍興以韓范為西帥遣富使北名用仇而實間之又不克軍罷而請老盡用三公及宋莒公夏英公于二府皆其仇也又以其黨賈文元陳恭公間焉猶欲因以傾之譽范富皆王佐可致太平于是天子再賜手詔又開天章閣而命之坐出紙筆使疏時政所當因革諸公皆推范富請退而具草使二宦者更往督之且命領西北邉事既而各條上十數事而易監司按羣吏罷磨勘減任子衆不利而謗興又使范公日獻二事以困之及請城京師人始笑之初公每求去以候主意常未厭而去故能三入及老入事猶問西北相攻請出大臣行三邉于是范公使河東陜西富公使河北談叢仁宗以西戎方熾歎人才之乏凡有一介之善必收錄之杜衍經撫關中薦長安布衣雷簡夫才器可任遽命賜對於便殿簡夫辯給善敷奏條列西事甚詳上喜即降㫖中書令檢真宗召种放事公為上言曰臣觀士大夫有口才者未必有實效今遽爵之以美官異時用有不周即難於進莫若且除一官徐觀其能果可用遷推未晚上以為然遂除耀州幕官簡夫後累官至員外郎三司判官而才實無大過人者筆錄公在中書奏令宋綬編次中書總例謂人曰自吾有此例使一庸夫執之皆可以為相矣記録公感風眩天子憂甚手詔拜司空平章軍國重事三日一入中書公表固辭御府出萬金藥上剪髭賜公手詔曰古人有言髭可療疾雖無痊驗今朕剪髭合湯藥表予意也公薨于鄭訃聞上震悼對執政語及公輙涕下曰安得憂公忘身理萬事幹四鄙如吕夷簡者上嘗大書方正忠良四字以賜及書懐忠之碑以賜並行狀陳堯佐文惠公字希元閬州人中進士第相仁宗通判潮州有鱷魚食人不可近公命捕得鳴鼓于市以文告而戮之鱷患屏息知夀州遭嵗大饑公自出米為糜以食餓者吏民以公故皆爭出米活數萬人公曰吾豈以是為私惠耶葢以令率人不若身先而使其樂從也為河東轉運使以地寒而民貧奏除石炭税減官冶鐵課嵗數十萬以便民曰轉運征利之官也利有本末下有餘則上足吾豈為俗吏哉河決壊滑州公躬自暴露晝夜督促剏為木龍以巨木駢齒浮水上下殺其暴堤乃成又為長堤以䕶其外滑人因號其堤為陳公堤知開封府公以謂治煩之術任威以擊強盡察以防姦譬於激水而欲其澄也故公為政一以誠信每嵗正月夜放燈則悉籍惡少年禁錮之公召諭曰尹以惡人待汝汝忍為惡耶因盡縱之凡五夜無一人犯法者故事知制誥者先試其文辭天子以公文學天下所知不復命試自國朝以來不試知制誥者唯楊億及公二人而已公居官不妄進取為太常丞者十三年不遷為起居郎者七年不遷自議錢塘堤為丁謂所絀後丁益用事専威福故人子弟以公乆于外多勉以進取公曰唯乆然後見吾守如是十五年今天子即位謂敗公乃見召用公初作相以唐劉蕡所對䇿進曰天下治亂自朝廷始朝廷賞罰自近始凡蕡之所究言者皆當今之弊臣所欲言而陛下之所行也天子嘉納之並歐公撰神道碑吕申公累乞致仕仁宗問之曰卿果退當何人可代申公曰陛下欲用英俊經綸之才臣所不知必欲圖任老成鎮撫百度周知天下之良苦無如陳堯佐者上深然之遂大拜野錄公父秦國公省華三子長曰堯叟同中書門下平章事季曰堯咨為節度使皆舉進士第一及第三子已貴秦公尚無恙每賔客至其家公及伯季侍立左右坐客䠞蹜不安求去秦公笑曰此兒子輩爾故天下皆以秦公教子為法而以陳氏為榮碑堯咨精於弧矢自號小由基為知制誥出守荆南回其母馮氏問之曰汝典名藩有何異政堯咨曰州當孔道過客以堯咨善射無不歎服母曰汝父訓汝以忠孝輔國家今不務仁政善化而専卒伍一夫之技豈汝先人之意耶以杖擊之金魚墜地名臣傳晏殊元獻公字同叔撫州人以神童召試相仁宗公父本撫州手力節級公幼能文楊大年以聞時年十二真宗面試詩賦疑其宿搆明日再試文采愈美上大竒之即除祕書省正字令於龍圖閣讀書温公田錄公為童子時張文節薦之於朝召至闕下適值御試進士便令公就試公一見試題曰臣十日前已作此賦有賦草尚在乞别命題上極愛其不隠及為館職時天下無事許臣僚擇勝燕飲當時侍從文館士大夫各為宴集以至市樓酒肆往往皆供帳為遊息之地公時貧甚不能出獨家居與兄弟講習一日選東宫官忽自中批除晏殊執政莫諭所因次日進覆上諭曰近聞館閣臣寮無不嬉遊宴賞彌日繼夕惟殊杜門與兄弟讀書如此謹厚正可為東宫官公既受命得對上面諭除授之意公語言質野對曰臣非不樂宴遊者直以貧無可為之具臣若有錢亦須往但無錢不能出耳上益嘉其誠實知事君體眷注日深仁宗時卒至大用筆談公留守南京大興學校以教諸生自五代以來天下學廢興自公始碑章懿之崩李淑䕶葬公撰志文言生女一人早卒無子仁宗恨之及親内出志文以示宰相曰先后誕育朕躬殊為臣子安得不知乃言生一公主又不育此何意也吕文靖曰殊固有罪然宫省事祕臣備位宰相是時雖略知之而不得其詳殊之不審理容有之然方章獻臨御若明言先后實生聖躬事得安否上黙然良乆命出殊守金陵明日以為逺改守南都及殊作相八大王疾革上親往問疾王曰叔乆不見官家不知今誰作相上曰晏殊王曰名在圖䜟胡為用之上歸閲視圖䜟得成敗之語并記志文事欲重黜之宋祁為學士當草白麻爭之乃降二官知穎州詞曰廣營産以殖資多役兵而規利以他罪羅織之殊免深譴祁之力也龍川志自公復召用而元昊反師出陜西天下弊於兵公數建利害請罷監軍兼以陣圖授諸將使得應敵為攻守及制財用為出入之要皆有法天子悉為施行碑公未嘗為子弟求恩澤在陳州上問宰相曰晏殊居外未嘗有所請其亦有所欲耶宰相以告公公自表問起居而已故薨上尤哀之碑宋庠鄭國元獻公字公序安州人舉進士開封試禮部皆第一相仁宗元昊反劉平石元孫皆以輕失軍時諸帥官重者互領陜西四路號令頗不一又兵多分屯堡障公言宜使大帥收重兵内地他帥自當一道緩急有警則分兵四出以援之其議乆不決後卒如公計帝召二府天章閣觀書出詔自問天下利病事宰相倉卒莫敢對公時參政獨進曰臣等皆待罪二府固已總萬事而共謀之不當下同諸生對䇿願至中書條上既退草數千言奏之後皆施用公間言祖宗收方鎮之權嘗欲畿甸蓄禁兵三十萬今所蓄不精且多外補戍更非强本之勢並神道碑公嘗奏事而帶寛誤墜文書于地不顧而行仁宗呼内侍拾以與之議者謂仁宗有人君體宋公得大臣體家塾記公初名郊字伯庠與其弟祁自布衣時名動天下號為二宋其為知制誥仁宗驟加奬眷便欲大用有忌其先進者譛之謂其姓符國號名應郊天又曰郊者交也交者替代之名也宋交其言不祥仁宗遽命改之公怏怏不獲已乃改名庠字公序公後更踐二府二十餘年以司空致仕兼享福夀而終而譛者竟不見用以卒可為小人之戒也歸田錄公嘗曰殘人矜才逆詐恃明吾終身不為也退朝錄公以言者斥其非才罷樞相守洛有一舉人行橐中有不税之物為僕夫所告公曰舉人應舉孰無所貨之物未可深罪若奴告主此風不可長也寮屬曰犯人乃言官之子也意欲激其報之公不答但送税院倍其税仍治其奴罪而遣之塵史公雍雍然有徳之君子也既參大政朝廷無事廟堂之上日閲文史後既登庸天下承平日乆尤務清淨無所作為有為者病之嘗自謂時賢多以不才誚我因為自詠詩曰我本無心士終非濟世材虛舟人莫怒疑虎石當開蚊負愁山重葵傾喜日来欲將嘲強解真意轉悠哉同上韓億忠獻公字宗魏其先真定人徙開封舉進士事仁宗官至參政以太子太傅致仕公布衣時與李康靖同遊止一氈同寢一日分途遂割而分之至汝州太守趙學士請康靖為門客尤敬待公每公至即令設猪肉康靖嘗有簡戲云乆思肉味請兄早訪及趙公有女遂與公議親既過省趙公遣人送女来至京城外旅店中一夕病卒公具素服往哭之康靖為長社每日懸百錢于壁上用盡即已其貧儉如此莊敏遺事公與李參政若谷未第時皆貧同試京師每出謁更為僕李先第授許州長社簿赴官自控妻驢韓為負一箱將至長社三十里李謂韓曰恐縣吏来箱中只有錢六百以半遺韓相持大哭别去次年韓亦登第後皆至參政世為婚姻不絶聞見錄公奏置裏行四員以廣言路在樞府請薦武臣以備任使纂兵法以授諸將及廣南募土兵數事景祐中唃􅣳囉與元昊交兵使来獻捷執政以夷狄相攻中國之福議加唃嘶囉節度使公曰二族俱藩臣當諭使解仇釋憾以安逺人且元昊嘗賜姓今夷狄攻之而反加恩賞恐徒激其怒以生邉患無益也上是其議乃厚賜其使而遣之名臣傳公知洋州有大校李申以財豪于鄉里誣其兄之子為他姓賂里嫗之貌類者使認之為已子又醉其嫂而嫁之盡奪其奩橐之富嫂姪訴于州及提轉申賂獄吏嫂姪被笞掠反自誣服受杖而去積十餘年洎公至又出訴公察其寃因取前後案牘視之皆未嘗引乳醫為證一日盡召其黨立庭下出乳醫示之衆皆伏罪子母復歸如初辜錄范文正知開封獻百官圖指宰相差除不公隂薦公可用文正既貶仁宗以諭公公曰若仲淹舉臣以公則臣之拙直陛下所知舉臣以私則臣委質以来未嘗交託於人遂除參政公在中書見諸路職司摭拾官吏小過輙不懌曰天下太平主上之心雖蟲魚草木皆欲得所況仕者大則望為公卿次亦望為侍從職司二千石其下亦望京朝幕官奈何錮之於聖世乎名臣傳公教子嚴肅不可犯知亳州第二子舍人自西京謁告省覲康公與右相及姪柱史宗彦皆中甲科歸公喜置酒召僚屬之親厚者俾諸子坐於隅坐中忽云二郎吾聞西京有疑獄奏讞者其詳云何舍人思之未能得已訶之再問未能對遂推案索杖大詬曰汝食朝廷厚禄倅貳一府事無巨細皆當究心大辟奏案尚不能記則細務不舉可知矣吾在千里外無所干與猶能知之爾叨冒廪禄何顔報國必欲撻之衆賔力解方已諸子股慄累日不能釋家法之嚴如此所以多賢子孫也蘓氏談訓程琳文簡公字天琳中山人舉服勤詞學科相仁宗公嘗館契丹使使者言中國使至契丹坐殿上位次髙而契丹使来坐次下當陞語甚切上與大臣皆以為小故不足爭將許之公以謂許其小必許其大不可遂止公知開封㑹禁中大火延兩宫宦者治獄得縫人火斗已誣伏而下府命公具獄公立辨其非禁中不得入乃命工圖火所經而後宫人多而居隘其烓竈近版壁嵗乆燥而焚曰此豈一日火哉乃建言此殆天灾也不宜以罪人上為緩其獄卒無死者並歐公撰墓志章獻垂箔有方仲弓者上書乞依武氏故事立劉氏廟章獻覽其疏曰吾不作此負祖宗事裂而擲之於地仁宗在側曰此亦出於忠孝宜有以旌之乃以為開封府司錄及章獻崩黜為汀州司馬琳亦嘗有此請而人皆莫之知也上一日在邇英謂講官曰程琳心行不中在章獻朝嘗請立劉氏廟且獻七廟圖時王洙侍讀聞之然上性寛厚琳竟至宰相葢無宿怒也龍川志宋名臣言行錄前集巻六
