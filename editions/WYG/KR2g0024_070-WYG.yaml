body:
  text: 宋名臣言行錄外集巻十二宋李幼武纂集朱熹晦菴先生徽國文公字元晦間自稱曰仲晦世為徽人居紫陽山下父韋齋官遊建之政和遂居焉先生年十四韋齋歿託孤於少傅劉子羽因居崇安縣屏山下從遊於劉子翬紹興十八年登弟授泉州同安簿考滿當路尊敬不敢以屬吏待士思其教民懐其徳不忍其去至五考而後罷二十八年請嶽祠二十九年以陳康伯薦召力辭三十二年祠滿復請隆興初召辭促行入對力詆和議除武博待次歸乾道初促就職復請祠而歸三年劉公珙在樞府奏除宻院編修待次五年三促就職辭秋丁母祝氏憂六年胡銓薦召以母制辭七年召辭九年省劄屢催起發進呈請祠劄子㫖特改合入官主祠淳熙元年三辭改秩之命而後拜三年以龔茂良薦除祕書郎力辭主祠五年史浩議除中都官政府謂宜處以郡除南康軍六年辭至四始之任八年因臺諌言其在任奏事用劄子非舊制乞罷又以放人戸逃移自劾再請祠者五將滿除江西倉待次以荒政修舉除直祕閣改浙東倉九年以賑濟功進職二等直徽猷閣劾台守牾時相改除江西憲力辭有毁程氏之學隂詆先生者十年主祠十二年祠滿復請四月拜雲臺之命十四年主管鴻慶宫以楊萬里薦除江西憲十五年周相必大促奏事之任辭不許六月入奏畢除兵郎疾甚未供職兵侍林栗挾恨誣奏欺慢遂請祠除寳文閣主管崇福宫上悟其去復召又辭十一月促入對再辭并具封事以進讀終除主管太乙宫兼崇政殿説書㑹執政有指道學為邪氣者力辭新命除祕閣修撰仍外祠十六年進除祕撰從所請仍宫觀四月三辭職名五月從所請仍舊直寳文閣除江東運副力辭改漳州紹興二年喪長子請祠除祕撰主鴻慶宫又除河南運副辭三年乞補滿宫觀除廣西經畧辭四年復辭鴻慶宫時趙汝愚在樞府除湖南帥辭不許五年至鎮寧宗在潜邸聞名即位翌日首召除焕章待制侍講行且辭入奏上二劄辭待制乞以修撰充説書方拜命因忤韓侂胄御批與宫觀宰相臺諌給舍爭之除寳文閣待制與郡力辭遂行十二月詔依舊焕章閣待制提舉鴻慶宫乞致仕不許慶元元年以疾丐休致冬詔仍祕撰二年御史沈繼祖奏禠職罷祠四年從所請致仕六年卒享年七十一嘉泰二年除華文待制郡不申沒以生存出命嘉定元年謚曰文三年贈寳文直學寳慶三年贈太師追封信國公紹定三年改徽國公淳祐元年上幸學詔列從祀幼有異禀五嵗入小學始誦孝經即了其大義書八字於其上曰若不如此便不成人間從羣兒嬉遊獨以沙列八卦象詳觀側玩又嘗指日問於吏部曰日何所附曰附於天又問天何所附吏部竒之初冠字元晦屏山祝詞曰木晦於根春容􅁮敷人晦於身神明内腴昔者曽子稱其友曰有若無實若虛不斥厥名而傳於書雖百世之逺揣其氣象知顔如愚自諸子言志回欲無伐一宣於言終身弗越陋巷闇然其光烈烈從事於兹惟參也無慙貫道雖一省身則三夾輔孔門翺翔兩驂學的欲正吾知斯之為指南惟先吏部文儒之粹彪炳育珍又華其繼來兹講磨融融憙憙真聰廓開如源之方望洋𣺌瀰老我縮氣古人不云乎純亦不已予徳不日新則時予之恥勿謂此耳充之益充借曰合矣宜養於䝉言而思毖動而思躓凜乎惴惴惟顔曾是畏後以元為四徳之首不敢當遂更曰仲後書桃符曰佩韋遵考訓誨木謹師傳父疾革以家事囑劉子羽而訣于籍溪胡公憲白水劉勉之屏山劉子翬且俾先生父事之既而禀學於三君子屏山嘗告之曰吾於易得入徳之門所謂不逺復者乃吾三字符也勉之後以女女焉然不數年二劉公相繼而歿獨事籍溪頗乆紹興十七年年十八中建寧鄉舉考官蔡兹謂人曰吾取中一後生三䇿皆欲為朝廷措置大事他日必非常人二十三年時年二十四始學于李延平初韋齋雅敬延平故先生往師之嘗言自見李先生為學始就平實乃知向日從事釋老之説皆非延平與其友羅博文宗禮書曰元晦進學甚力樂善畏義吾黨鮮有晚得此人商量所疑甚慰又云此人極穎悟力行可畏講學極造其㣲處論辨某因此追求有所省渠所論難處皆是操戈入室須從原頭體認來所以好説話某昔於羅先生得入處後無朋友幾放倒了得渠如此極有益渠初從謙開善處下工夫來故皆就裏面體認今既論難見儒者路脈極能指其差誤之處自見羅先生來未見有如此者又云此子别無他事一味潛心於此初講學時頗為道理所縳今漸能融釋於日用處一意下工夫若於此漸熟則體用合矣此道理全在日用處熟若靜處有而動處無即非矣七月之同安蒞職勤敏纎悉必親廨有燕坐之室更名曰髙士軒而以令甲凡簿所當為者大書掲之楣間職兼學事身率諸生厲以誠敬開以義理皆竦慕而師尊之三十二年六月孝宗即位秋應詔上封事首論聖學次論金人於我有不共戴天之讐則不可和義理明矣知義理之不可為而猶為之以有利而無害也臣䇿之有百害無一利願斷以義理之公參以利害之實閉關絶約任賢使能立綱紀厲風俗不敢懐自安之念數年之外觀釁而圖之中原故地不為吾有乎夫論監司者守令之紀綱朝廷者監司之本今之監司病民皆臺諌宰執之親舊賔客顧陛下無自而知之隆興初元將趨召命過延平問所宜言延平謂今日三綱不正義利不分故中國之道衰而兵戈起人皆趍利不顧義故主勢孤先生用其首説以對首論大學之道次言今日非戰無以復讎非守無以制勝此皆天理之自然非人欲之私忿也三論古聖王制敵之道其本不在乎威強而在乎徳業其備不在乎邉境而在乎朝廷其具不在乎兵食而在乎紀綱今日諌爭尚壅佞倖方張爵賞易致威罰不行民力已殫國用未節時王之望使敵未還湯思退力主和近臣曽覿龍大淵招權故奏及之先生與魏艮齋帖云初讀第一奏論致知格物之道天顔温粹酬酢如響讀第二奏論復讐之義第三奏論則不復聞聖語矣乾道三年如湖南見南軒講論之語無所考見按南軒贈行之詩曰君侯起南服豪氣葢九州頃登文石陛忠言動宸旒坐令聲利塲縮頸仍包羞却來卧衡門無愧白日休盡收湖海意仰希洙泗遊不逺關山阻為我再月留遺經得紬繹心事兩綢繆超然㑹太極眼底無全牛惟兹斷金友出處寧殊謀南山對床語匪為林壑幽白雲政在望歸袂風颼颼朝來出别語已抱離索憂妙質貴強矯精㣲更窮搜毫釐有弗察體用豈周流驅車萬里道中途可停輈勉哉共無斁邈矣追前修先生答曰昔我抱氷炭從君識乾坤始知太極緼要妙難名論謂有寧有迹謂無復何存惟應酬酢處特達見本根萬化從此流千聖同兹源曠然逺莫禦惕若初不煩云何學力㣲未勝物欲昬涓涓始欲達已被黄流吞豈知一寸膠救此千丈渾勉哉共無斁此語期相敦以二詩觀之則其往復而深相契者太極之㫖也四年編程氏遺書成初二程門人各有所錄雜出並行間頗為後人竄易至是序次有倫去取精審學者始有定從而程子之道復明於世是嵗建大饑盗發浦珹崇安大震先生請于府貸粟散給民免饑死社倉之法始此六年居喪盡禮既𦵏日居墓側旦望則歸奠几筵葢自始死至祥禫參酌古今咸盡其變用成喪葬祭禮又推之於冠昬共為一編命曰家禮然未嘗為學者道之其後亦多損益未暇更定云七年五夫三里社倉始成嵗一歛散俾願貸者出息什二小歉則弛半息甚則盡蠲之八年編次語孟精義成資治通鑑綱目成綱放春秋而兼採羣史之長目放左氏而稽合諸儒之粹西銘解義成九年太極圖傳通書解成編次程氏外書成淳熙二年東萊自東陽來留止寒泉精舍旬日相與掇周程張書關大體而切日用者彚次成十四篇號近思錄先生嘗謂學者曰四子六經之階梯近思錄四子之階梯以言為學者當因此而入也夀餞東萊至鵝湖陸子夀子靜劉子澄來㑹相與講其所聞二陸執所見不合而罷四年語孟集註或問成初先生既編次語孟集義又約其精粹妙得本㫖者為集註傳疏其所以去取之義為或問然恐學者轉而趍薄故或問之書未嘗出以示人然辨析毫厘無㣲不顯真讀書之龜鑑也又謂易本為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦略舉其一端以見凡例而已然自諸儒分經合傳之後學者便文取義往往未及玩心全經而遽執傳之一端以為定説於是一卦一爻僅為一事而易之為用反有所局而無以通天下之故故作周易本義又謂詩自毛鄭以來皆以小序為主其與經文舛戾則妄穿鑿為説前後諸儒未能釐正先生獨以經文為主而計其序之是非復為一編附其經後以還其舊云六年知南康軍首下教三條一以役煩税重求所以寛恤之方二俾士人鄉老教戒子弟使修孝弟忠信之行三俾父老推擇子弟之志學者詣學又立濓溪祠以二程配别立五賢堂陶靖節劉西澗父子李公擇陳了齋復白鹿書院約聖賢教人為學之大端條列以示學者七年夏上封事言天下之務莫大於恤民恤民之本又在正君心以立綱紀今民間特苦重税正縁二税之入朝廷盡取以供軍而州縣無復嬴餘則不免二税之外巧作名色以取民今民貧賦重若不計理軍實去浮冗則民力決不可寛惟有選將核兵則可以節軍資開廣屯田則可以實軍儲練習民兵則可以益邉備至於天下紀綱不能以自立必君心正大而後有所係而立君心不能以自正必親賢逺佞而後可得而正今陛下親宻者不過一二近習而此小人者上則蠱惑陛下之心下則招集嗜利亡恥之士夫以入其門中外靡然向之其所壊非獨壊陛下之紀綱乃併與陛下所以立紀綱者而壊之八年冬奏事延和殿極陳災異之由次言陛下即位之初葢嘗選建豪英任以政事不幸其間不能盡得其人是以不復廣招賢哲而姑取軟熟易制之人以充其位于是左右私䙝使令之賤始得以奉燕閒備驅使而宰相之權日輕又慮其勢有所偏而因重以壅已也則時聴外廷之論將以隂察此輩之負犯而操切之陛下既未能循天理公聖心以正朝廷之大體則固已失其本矣又欲兼聴士大夫之公言以為駕馭之術則士大夫之進見有時而近習之從容無間士大夫之禮貌既莊而難親議論又苦而難入近習便僻側媚之態既足以蠱心志胥吏狡獪之術又足以眩聰明此其生熟甘苦既有所分恐陛下未及施其駕馭之術而先已墮其數中矣是以雖欲㣲抑此輩而此輩之勢益重雖欲兼採公論而士大夫之勢日輕重者既挾其重以竊陛下之權輕者又借力於所重以為竊位固寵之計中外相應更濟其私日往月來浸滛晦蝕國家獨受其弊因條救荒之䇿七事以獻十一年還自浙東見其士習馳騖於外每語學者且觀孟子道性善及求放心兩章務收歛凝定以致克已求仁之功而深斥其所學之誤以為舍六經語孟而尊史遷舍窮理盡性而窮世變舍治心修身而喜事功大為學者心術之害極力為吕祖儉輩言之又答陳亮書箴其義利雙行王伯並用之説先生嘗曰海内學術之弊不過兩説江西頓悟永康事功若不極力爭辨此道無由得明十三年易學啟䝉成先生初作易本義懼學者未明厥㫖乃作啟䝉四篇以為言易不本象數既支離散漫而無所根著其本象數者又不知法象之自然未免穿鑿傅㑹故其篇目以本圖書原卦畫明蓍䇿考變占為次凡挂揲及變爻皆盡破古今諸儒之失十四年先生既發揮大學以開悟學者又懼其失序無本而不足以有進乃輯小學書以訓䝉士使培其根以達其支云十五年入奏言陛下即位二十有七年而因循荏苒無尺寸之效可以仰酧聖志嘗反覆而思之無乃燕閒蠖濩之中虛明應物之地天理有未純人欲有未盡天理未純是以為善不能充其量人欲未盡是以除患不能去其根一念之頃公私邪正是非得失之機朋分角立交戰於其中故體貌大臣非不厚而便僻側媚得以深被腹心之寄寤寐豪英非不切而柔邪庸繆得以乆竊廊廟之權非不樂聞公議正論而有時不容非不堲讒説殄行而未免誤聴非不欲報復陵廟讎恥而不免畏怯茍安非不欲愛養生靈財力而未免嘆息愁恨凡若此類不一而足願陛下自今以往一念之頃則必謹而察之此為天理邪為人欲邪果天理也則敬以充之而不使其少有壅閼果人欲也則敬以克之而不使其少有凝滯推而至於言語動作之間用人處事之際無不以是裁之則聖心洞然中外融徹無一毫之私欲得以介乎其間而天下之事將為陛下之所欲為無不如志矣上迎謂曰乆不見卿卿亦老矣今當處卿以清要之任不復勞卿州縣奬諭甚渥是行也有要之於路以正心誠意為上所厭聞戒以勿言者先生曰吾平生所得惟此四字豈可回互而欺君乎十一月趣入對遂上封事略曰今天下大勢如人有重病内自心腹外達四支無一毛一髪不受病者臣敢以天下之大本與今日之急務為陛下言之葢大本者陛下之心急務則輔翼太子選任大臣振舉綱維變化風俗愛養民力修明軍政六者是也古者聖王兢兢業業持守此心雖在紛華波動之中幽獨得肆之地而所以精之一之克之復之如對神明如臨淵谷猶恐隠㣲之間或有差失而不自知是以建師保之官列諌爭之職凡飲食酒漿衣服次舍器用財賄與夫宦官宫妾之政無一不領於冢宰使左右前後一動一靜無不制以有司之法而無纎芥之隙瞬息之頃得以隠其毫髪之私陛下之所以精一克復而持守其心果有如此之功乎所以修身齊家而正其左右果有如此之效乎宫省事禁臣固不得而知然爵賞之濫貨賂之流閭巷竊言乆已不勝其籍籍則陛下所以修之家者恐其未有以及古之聖王也至於左右便嬖之私恩遇過當此輩但當使之守門傳命供掃除之役不當假借崇長使得逞邪媚作淫巧於内以蕩上心立門庭招權勢於外以累聖政臣切聞之道路自王抃既逐之後諸將差除多出此人之手陛下竭生靈之膏血以奉軍旅而軍士未嘗得温飽是皆將帥巧為名色奪取其糧肆行貨賂於近習以圖進用出入禁闥腹心之臣外交將帥共為欺蔽以至於此而陛下不悟反寵暱之以是為我之私人至使宰相不得議其制置之得失給諌不得論其除授之是非則陛下所以正其左右未能及古之聖王又明矣至於輔翼太子則自王十朋陳良翰之後宫僚之選號為得人而能稱其職者葢已鮮矣而又時使邪佞獧薄闒冗庸妄之輩或得參錯於其間所謂講讀亦姑以應文備數而未聞其有箴規之效至於從容朝夕陪侍遊宴者皆不過使臣宦者數輩而已夫立太子而不置師傅賔客則無以發其隆師親友尊徳樂義之心獨使春坊使臣得侍左右則無以防其戲嫚媟狎竒衰雜進之害宜討論前典置師傅賔客之官罷去春坊使臣而使詹事庻子各復其職至於選任大臣則以陛下之聰明豈不知天下之事必得剛明公正之人而後可任哉其所以常不得如此之人而反容鄙夫之竊位者直以一念之間未能徹其私邪之閉而燕私之好便嬖之流不能盡由於法度若用剛明公正之人以為輔相則恐其有以妨吾之事害吾之人而不得肆是以選掄之際常先排擯此輩寘之度外而後取凡疲懦軟熟平日不敢直言正色之人而揣摩之又於其中得其至庸極陋決可保其不至於有所妨者然後舉而加之於位是以除書未出而物色先定姓名未顯而天下已逆知其非天下之第一流矣至於振肅紀綱變化風俗則今日宫省之間禁宻之地而天下不公之道不正之人顧乃得以窟穴盤據於其間及其作姦犯法則陛下未能深割私意而付諸外庭之議論正以有司之法是以綱紀不能無所撓敗紀綱不正於上是以風俗頽弊於下葢其為患之日乆矣而浙中為尤甚大率習為軟美之態依阿之容以不分是非不辨曲直為得計下之事上固不敢少咈其意上之御下亦不敢稍咈其情惟其私意之所在則千塗萬轍經營計較必欲得而後已甚者以金珠為脯醢以契劵為詩文宰相可㗖則㗖宰相近習可通則通近習惟得之求無復亷恥一有剛毅正直守道循理之士出乎其間則羣議衆排指為道學而加以矯激之罪十數年來以此二字禁錮天下之賢人君子復如崇宣之間所謂元祐學術者排擯詆辱必使無所容其身而後巳嗚呼此豈治世之事而尚復忍言之哉至於愛養民力修明軍政則自虞允文之為相也盡取版曹嵗入窠名之必可指擬者號為嵗終羡餘之數而輸之内帑顧以其有名無實積累掛欠空載簿籍不可催理者撥還版曹以為内帑之積將以備他日用兵進取不時之須然自是以來二十餘年内帑嵗入不知幾何而認為私貯典以私人宰相不得以式貢均節其出入版曹不得以簿書勾考其存亡其日銷月耗以奉燕私之費者葢不知幾何矣而曷嘗聞其能用此錢以易敵人之首如太祖皇帝之言哉徒使版曹經費闕乏日甚督促日峻以至廢去祖宗以來破分良法而必以十分登足為限以為未足則又造為監司比較郡守殿最之法以誘脅之於是中外承風競為苛急此民力之所以重困也諸將之求進也必先掊尅士卒以殖私財然後以此自結於陛下之私人而靳以姓名達於陛下之貴將貴將得其姓名即以付諸軍中使自什伍以上節次保明稱其才武堪任將帥然後具奏為牘而言之陛下之前陛下但見其等級推先案牘具備則誠以為公薦而可以為得人矣而豈知其估價輸錢已若晚唐之債帥哉如此而望其修明軍政激勸士卒以強國勢豈不誤邪凡此六事皆不可緩而本在於陛下之一心一心正則六事無不正一有人心私欲介乎其間則雖欲憊精勞力以求正乎六事亦將徒為文具而天下之事愈至於不可為矣疏入夜漏下七刻上已就寢亟起秉燭讀之終篇明日除主管太乙宫兼崇政殿説書先生所望於君者愈深而其言愈切戊申封事之末有曰日月愈邁如川之流一往而不復不惟臣之蒼顔白髪已迫遲莫而切仰天顔已覺非昔時矣忠忱懇惻至今讀者為之流涕然所言皆痛詆大臣近習上眷愈厚而嫉者愈深是以不能一日安其身於朝廷之上始出太極通書西銘二書解義以授學者紹熙元年在漳州刋四經四子書成奉以告諸先聖易取古文分經傳為十二篇詩書皆取序合為一篇𡨕諸經後春秋則出左氏經文别為一書以踵三經後四子則謂程子之教人必先使之用力乎大學論語中庸孟子之書然後及乎六經葢其難易小大逺近之序固如此而不可亂也然讀者不先於孟子而遽及中庸則非所以為入道之漸五年寧宗舊聞先生名恨不得為講官即位翌日召為侍講八月發長沙十月入奏首論經權常變之道次言為學之道莫先於窮理窮理之要必在於讀書讀書之法莫貴於循序而致精致精之本則又在於居敬而持志既對辭待制侍講上手札卿經術淵源正資勸講次對之職勿復牢辭以副朕崇儒重道之意先生惶恐拜命每講務積誠意以感悟上心勸上以求放心為本以平日所論著者敷陳開析坦然明白講畢有可以開益上徳者罄竭無隠上亦虛心嘉納焉上之立也趙忠定求能通意於長信宫者未有其人或言韓侂胄於太皇為親屬遣入白不許侂胄出遇内侍關禮于門告之故禮請獨入泣涕固請太皇許之命復呼侂冑入使喻意廟堂其論遂定侂胄自謂有定䇿功依託肺腑居中用事先生自離長沙已聞之惕然以為憂因疏牘㣲寓其意及進對再三面言之又約吏侍彭龜年同請對白發其奸彭出䕶使客韓益得志時忠定方收聚知名之士海内引領以觀新政而事已多從中出先生屢言於上又數書遣生徒宻白忠定當以厚賞酬其勞勿使預政忠定謂其易制不復逺慮先生因講畢奏疏極言之韓大怒隂與其黨謀先去其首者則其餘去之易耳乃於禁中為優戲以熒惑上聴及先生晚講留身申言前疏乞施行纔退即降御批與宫觀丞相執奏不行内侍徑遣付下而臺諌給舍皆爭留不可先生遂去國歸過玉山為其令講四端之㫖是冬竹林精舍成後改滄洲率諸生行釋菜之禮于先聖先師以告成事周程邵張司馬延平七先生從祀祝文曰恭惟道統逺自羲軒集厥大成允屬元聖述古垂訓萬世作程三千其徒化若時雨惟顔曽氏傳得其宗逮思及輿益以光大自時厥後口耳失真千有餘年乃曰有繼周程授受萬理一原曰邵曰張爰及司馬學雖殊轍道則同歸俾我後人如夜復旦不以凡陋少䝉義方中靡常師晚逢有道載鑚載仰雖未有聞賴天之靈幸無失墜逮兹退老同好鼎來落此一丘羣居伊始探原推本敢昧厥初奠以告䖍尚其昭格陟降庭止惠我光明傳之方來永永無斁慶元元年侂胄誣趙相以不軌竄置永州中外震駭具創為偽學之名以斥善類先生草封事數萬言極陳奸邪蔽主之禍因以明丞相之寃諸生力諌遂筮之遇遯之同人先生黙然焚其稿更號遯翁朝廷治黨人方急趙謫死于道二年冬先生方與諸生講論有報禠職罷祠者先生略起視之復坐講論如初辭色更為和平翌旦諸生始知有指揮六年三月先生素有足疾比年加以痞隔之證醫者頗用駃藥乙未夜為諸生説太極圖庚申夜復説西銘且言為學之要惟事事審求其是決去其非積習乆之心與理一自然所發皆無私曲聖人應萬事天地生萬物直而已矣辛酉改大學誠意章午刻疾甚不能興癸亥諸生入問疾先生勉以相倡率下堅苦工夫牢固著足方有進步處甲子命移寢中堂諸生復入問疾因請曰先生疾革矣萬一不諱當用書儀乎先生摇首然則當用儀禮乎亦摇首然則以儀禮書儀參用之乃頷之意若索紙筆然握筆已不能運少頃置筆就枕誤觸巾目門人使正之揮婦女毋得近諸生揖而退良乆恬然而逝是日大風拔木洪流崩崖哲人之萎豈小變哉門人范念徳率同門之士祭於墓隅曰天之生賢葢亦不數儲精孕靈及河維嶽厥惟孔艱是以殊邈先生之生黄河其清先生之亡維嶽其頹不知何年復此胚胎徒友紛集窀窆告期山哀浦思雲慘風悲臨穴一慟萬古長辭先生自筮仕以至屬纊五十年間厯事四朝仕於外者僅九考立于朝者纔四十日而已初居崇安五夫榜讀書之室曰紫陽書堂識鄉關常在目也後築室建陽蘆峰之巔號曰雲谷其草堂曰晦菴自號雲谷老人亦曰晦菴因自號晦翁晚居考亭作精舍曰滄洲號滄洲病叟最後號遯翁公持心甚嚴不萌一毫非正之念其於書捨六籍則諸子曲説不得干其私其於道不敢深索也恐入乎幽不敢泛求也恐汨其統讀書初貫穿百家終也韜以聖人之格言自近而入㣲由博而歸約原心於𦕈忽析理於錙銖采衆説之精而遺其粗集諸儒之粹而去其駁曰醇矣哉云云山林之日長講學之功深也平居與其徒磨切講貫皆道徳性命之言忠敬孝愛之事由公之學者必行已莊與人信居則安貧而樂道仕則尊君而愛民重名節而審出處合於古而背於時好若此者真公之學也劉彌正議諡嘗云作詩須從陶栁門庭中來乃佳不如是無以發蕭散冲淡之極不免於局促塵埃無由到古人佳處也如選詩及韋蘓州詩亦不可不熟觀然更須讀語孟以探其本又云三百篇性情之本離騷詞賦之宗學詩而不本之於此是亦淺矣後山詩固佳然前輩以為盡力規模巳少變化然學者要務在反求諸已精熟語孟求所以見聖賢用意處問嘗讀孟子求放心章今覺心中有三病云云曰若論求此心放失有千般萬様病何止於三然亦别無道理醫治只在専一果能専一則靜靜則明明則自無遮蔽既無遮蔽須自有舒泰寛展處這也未嘗如此且收歛此心専一漸漸自㑹熟熟了自有此意㸔來百事只在熟且如百工伎藝也只要熟熟則精精則巧又問先生往時初學亦覺心有不専一否曰厶初為學初無見成規模這邉也去理㑹尋討那邉也去理㑹尋討向時諸前輩每每各是一般説話後來見李先生説得有下落説得較縝宻若看如今自是有見成下工夫處看來須是先理㑹个安著處譬如人治生也須先理㑹个屋子安著身已方始如何積累漸漸須做成家計若先來未有安著身已處雖經營畢竟不濟事為學者不先存此心雖説要去理㑹東東西西都自無安著處孟子所以云收放心亦不是説只收放心便了收放心且收歛得个根基方可以做工夫若但知收放心不做工夫則如近日江西所説則是守个死物事又曰某不敢自昧實以銖累寸積而得之又曰以前看得心只是虛蕩地而今看得來湛然空明時那萬理便在裏面向前看得似一張白紙今看得那紙上都是字又曰某舊時持論亦好髙近來漸漸移近下漸漸覺實今日學者不長進只是心不在焉嘗記少年時在同安夜聞鐘鼓聲聴其一聲未絶而此心巳自走作因此警省乃知為學須是専心致志又言人有一正念自是分曉又從旁别生一小念漸漸放闊去不可不察嘗論科舉云非是科舉累人自是人累科舉若髙見逺識之士讀聖賢書據吾所見而為文以應之得失利害置之度外雖日日應舉亦不累也某於科舉自小便見得輕初亦非有所見而輕之也曰初師屏山籍溪學於文定又好佛老以文定之學為論治道則可而道未至然於佛老亦未有見屏山少年能為舉業官莆田接㙮下一僧能入定數日後乃見了老歸家讀誦儒書以為與佛合故作聖傳論其後屏山先亡籍溪在厶自見於此道未有所得乃見延平云云某年十五六時亦嘗留心於此一日在劉病翁所㑹一僧與之語其僧只相應和了説也不説是不是却與劉説某也理㑹得个昭昭靈靈底禪劉後説與某某遂疑此心更有要妙處在遂去扣問也見他説得也煞好又去赴試時便用他意思去胡説是時文字不似而今細宻由人粗説試官為某説動了遂得舉後赴同安任時年二十四至矣始見李先生與他説李只説不是却疑李先生理㑹此未得再三質問先生為人簡重却不甚㑹説只教看聖賢言語某遂將那禪來權倚閣起意中道禪亦自在且將聖人書來讀讀來讀去一日復一日覺得聖賢言語漸漸有味却回頭看釋氏之説漸漸破綻罅漏百出某少時未有知亦曽學禪只李先生極言其不是後來考鏡却是這邉味長才這邉長得一寸那邉縮了一寸到今銷鑠無餘矣初見延平説得無限道理也曽去學禪李先生云公恁地懸空理㑹得許多道理而面前事却理㑹不下道亦無他𤣥妙只在日用間著實做工夫處便自見得某後來方曉得他説故今日不至於無理㑹耳舊嘗以論心論性處皆類聚看看熟乆則自見讀書須純一如看一般未了又要般涉都不濟事某向時讀書方其讀上句則不知有下句方其讀上章則不知有下章讀中庸則祗讀中庸讀論語則祗讀論語一日之間祗看一二章將諸家説看合與不合凡讀書到冷淡無味處尤當著力推考舊見先生説理㑹文字須令一件融釋了後方更理㑹一件融釋二字下得極好此亦伊川所謂今日格一件明日格一件格得多後自脱然有貫通處此亦是它真曽經厯來便説得如此分明今若一件未能融釋而又欲理㑹一件則第二件又不了推之萬事萬事不了何益凡看文字諸家説異同處最可觀某舊日看文字専看異同處如謝上蔡之説如彼楊龜山之説如此何者為得何者為失所以為得者是如何所以為失者是如何把一已私意去看聖賢之書如何看得出某所以讀書自覺得力者只是不先立論且尋句内意隨文解義少時讀四書甚辛苦諸公今讀時却又較易做工夫了某向來看大學猶病於未仔細如今愈看方見得精切因説前輩諸先生長者説話於大體處固無可議若看其他細碎處大有工夫未到某於大學用工甚多温公作通鑑言臣平生精力盡在此書某於大學亦然論孟中庸却不費力舊時看文字甚費心力如論孟諸家解有一箱每看一段必各就諸説上推尋意脈各見得著落然後斷其是非是底都抄出一兩字是亦抄出雖未如今集註簡靜然大綱已定今集註只就那上刪來但人不著心守見成就只草草看了今試將精義來參看兩段所以去取底只如何便自見得易非學者急務某平生也費了些精神理㑹易與詩然其得力則未若語孟之多讀詩惟是諷誦之功上蔡亦云詩須是謳吟諷誦以得之某舊時讀詩也只先去看許多注解少間却被惑亂後來讀至半了却只將詩來諷誦至四五十過已漸漸得詩之意却去看註解便覺減了五分以上工夫更從頭諷誦四五十過則胷中判然矣如今讀書多是不曽理㑹一處通透了少間却多牽引前面疑難來此最學者大病某二十年前得上蔡語錄觀之初用銀朱畫出合處及再觀則不同矣乃用粉筆三觀則又用墨筆數過之後則全與元看時不同矣讀書用工之難諸公覺得大故淺近不曽著心某舊時用心甚苦思量這道理如過危木橋子相去只在毫髪之間才失脚便趺落下去用心極苦五十嵗已後覺得心力短看見道理只爭絲髪之間只是心力巴不上所以大學中庸語孟諸文字皆是五十嵗以前做了五十嵗以後長進得某不多大抵讀書須是虛心方得他聖人説一字是一字自家只平著心去秤停他都不使得一毫杜撰只順他去某向時也杜撰説得終不濟事如今方見得分明方見得聖人一言一字不吾欺只今六十一嵗方理㑹得恁地若或去年死也則枉了自今夏來覺見得才是聖人説話也不少一个字也不多一个字恰恰地好都不用些穿鑿莊子云吾與之虚而委蛇既虛了又要隨他曲折恁地去又曰某覺今年方無疑某當初講學豈意到這裏幸而天假之年許多道理在這裏今年頗覺勝似去年去年勝似前年讀書貪多最是大病下稍都理㑹不得若到閑時無書讀時得一件書看更子細某向為同安簿滿到泉州侯批書在客邸借文字只借得一冊孟子將來子細讀方尋得本意見看他初間如此問又如此答待再問又恁地答其文雖若不同自有意脈都相貫通句句語意都有下落看道理若只恁地説過一遍便了則都不濟事須是常常把來思量始得延平嘗言道理須是日中理㑹夜裏却去靜處坐地思量方始有得某依此説去做工夫真个是不同先生學靡常師出入於經傳泛濫於釋老亦既有年及見延平洞明道要頓悟異學之非盡能掊擊其失由是専精致誠剖㣲窮深晝夜不懈至忘寢食而道統之傳始有所歸矣先生自少厲志聖賢之學自韋齋得中原文獻之傳聞河洛之學推明聖賢遺意日誦大學中庸以用力於致知誠意之地先生蚤嵗已知其説而心好之韋齋病且亟屬曰籍溪胡原仲白水劉致中屏山劉彦冲三人吾友也學有淵源吾所敬畏吾即死汝往事之而惟其言之聴則吾死不恨矣先生既孤則奉以告三君子而稟學焉時年十有四慨然有求道之志博求之經傳徧交當世有識之士雖釋老之學亦必究其歸趣訂其是非延平於韋齋為同門友先生歸自同安不逺數百里徒步往從之延平稱之曰樂善好義鮮與倫比又曰穎悟絶人力行可畏其所論難體認切至自是從遊累年精思實體而學之所造者益深矣其為學也窮理以致其知反躬以踐其實居敬者所以成始成終也謂致知不以敬則昬惑紛擾無以察義理之歸躬行不以敬則怠惰放肆無以致義理之實持敬之方莫先主一既為之箴以自儆又筆之書以為小學大學皆本於此終日儼然端坐一室討論典則未嘗少輟自吾一心一身以至萬事萬物莫不有理存此心於齊莊靜一之中窮此理於學問思辨之際皆有以見其所當然而不容已與其所以然而不可易然充其知而見於行者未嘗不反之於身也不睹不聞之前所以戒懼者愈嚴愈敬隠㣲幽獨之際所以省察者愈精愈宻思慮未萌而知覺不昧事物既接而品節不差無所容乎人欲之私而有以全乎天理之正不安於偏見不急於小成而道之正統在是矣其為道也有太極而隂陽分有隂陽而五行具稟隂陽之氣以生則太極之理各具於其中天所賦為命人所受為性感於物為情統性情為心根於性則為仁義禮智之徳發於情則為惻隠羞惡辭遜是非之端形於身則為手足耳目口鼻之用見於事則為君臣父子夫婦兄弟朋友之常求諸人則人之理不異於已參諸物則物之理不異於人貫徹古今充塞宇宙無一息之間斷無一毫之空闕莫不析之極其精而不亂然後合之盡其大而無餘先生之於道可謂建諸天地而不悖質諸聖賢而無疑矣故其得於已而為徳也以一心而窮造化之原盡性情之妙達聖賢之藴以一身而體天地之運備事物之理任綱常之責明足以察其㣲剛足以任其重𢎞足以致其廣毅足以極其常其存之也虛而靜其發之也果而確其用之也應事接物而不窮其守之也厯變履險而不易本末精粗不見其或遺表裏初終不見其或異至其養深積厚矜持者純熟嚴厲者和平心不待操而存義不待索而精猶以為義理無窮嵗月有限常慊然有不足之意葢有日新又新不能自已者而非後學之所可擬議也其可見之行則修諸身者其色莊其言厲其行舒而恭其坐端而直其閒居也未明而起深衣幅巾方履拜於家廟以及先聖退坐書室几案必正書籍器用必整其飲食也􅅅食行列有定位匕箸舉措有定所倦而休也瞑目端坐休而起也整步徐行中夜而寢既寢而寤則擁衾而坐或至達旦威儀容止之則自少至老祁寒盛暑造次顛沛未嘗有須臾之離也行於家者奉親極其孝撫下極其慈閨庭之間内外斬斬恩義之篤怡怡如也其祭祀也事無鉅細必誠必敬小不如儀則終日不樂已祭無違禮則油然而喜死喪之際哀戚備至飲食衰絰各稱其情賔客往來無不延遇稱家有無常盡其歡於親故雖疎逺必致其愛於鄉閭雖㣲賤必致其恭吉凶慶弔禮無所遺賙䘏問遺恩無所闕其自奉則衣取蔽體食取充腹居止取足以障風雨人不能堪而處之裕如也其措諸事業則州縣之施設立朝之言論經綸規畫正大宏偉亦可槩見雖逹而行道不能施之一時然退而明道足以傳之萬代謂聖賢道統之傳散在方冊聖經之㫖不明則道統之傳始晦於是竭其精力以研窮聖賢之經訓於大學中庸則補其闕遺别其次第綱領條目粲然復明於語孟則深原當時答問之意使讀而味之者如親見聖賢而面命之於易與詩則求其本義攻其末失深得古人遺意於數千載之上凡數經者見諸傳註其關於天命之㣲人心之奥入徳之門造道之閾者既已極深研幾探賾索隠發其㫖趣而無所遺矣至於一字未安一詞未備亦必沈潛反覆或達旦不寐或累日不倦必求至當而後已故章㫖字義至㣲至細莫不理明詞順易知易行於書則疑今文之艱澁反不若古文之平易於春秋則疑聖心之正大決不類傳註之穿鑿於禮則病王安石廢罷儀禮而傳記獨存於樂則憫後世律尺既亡而清濁無據是數經者亦嘗討論本末雖未能著為成書然其大㫖固巳獨得之矣若厯代史記則又考論西周以來至於五代取司馬公編年之書緝以春秋紀事之法綱舉而不繁目張而不紊國家之理亂君臣之得失如指諸掌周程張邵之書所以繼孔孟道統之傳厯時未乆㣲言大義鬱而不章為之裒集發明而後得以盛行于世太極先天圖精㣲廣博不可涯涘為之解剥條畫而後天地本原聖賢藴奥不至於泯沒程張門人祖述其學所得有淺深所見有䟽宻先生既為之區别以悉取其所長至或識見小偏流於異端者亦必研窮剖析而不沒其所短南軒張公東萊吕公同出其時先生以其志同道合樂與之友至或識見少異亦必講磨辨難以一其歸至若求道而過者病傳註誦習之煩以為不立文字可以識心見性不假修為可以造道入徳守虛靈之識而昧天理之真借儒者之言以文佛老之説學者利其簡便詆訾聖賢捐棄經典猖狂呌呶側僻固陋自以為悟立論愈下者則又崇奬漢唐比附三代以便其計功謀利之私二説並立髙者陷於空無下者溺於卑陋其害豈淺淺哉先生力排之俾不至亂吾道以惑天下於是學者靡然向之其於讀書也又必使之辨其音釋正其章句玩其辭求其義研精覃思以究其所難平心易氣以聴其所自得然為已務實辨别義利毋自欺謹其獨之戒未嘗不三致意焉葢亦欲學者窮理反身而持之以敬也從游之士迭誦所習以質其疑意有未諭則委曲告之而未嘗倦問有未切則反覆戒之而未嘗隠務學篤則喜見於言進道難則憂形于色講論經典商略古今率至夜半雖疾病支離至諸生問辨則脱然沉痾之去體一日不講學則惕然常以為憂摳衣而來逺自川蜀文詞之傳流及海外至於夷虜亦知慕其道竊問其起居窮鄉晚出家蓄其書私淑諸人者不可勝數先生既沒學者傳其書信其道者益衆亦足以見理義之感於人者深矣繼往聖將㣲之緒啟前賢未發之機辨諸儒之得失闢異論之訛謬明天理正人心事業之大又孰有加於此者天文地志律厯兵機亦皆洞究淵㣲文詞字畫騷人才士疲精竭神常病其難至先生未嘗用意而亦皆動中規繩可為世法是非姿稟之異學行之篤安能事事物物各當其理而造其極哉學修而道立徳成而行尊見之事業者又如此秦漢以來迂儒曲學既皆不足以望其藩墻而近代諸儒有志乎孔孟周程之學者亦豈能以造其閫域哉嗚呼是殆天所以相斯文焉篤生哲人以大斯道之傳也並黄勉齋述行狀道之正統待人而後傳自周以來任傳道之責得統之正者不過數人而能使斯道章章較著者一二人而止耳由孔子而後曽子子思繼其㣲至孟子而始著由孟子而後周程張子繼其絶至先生而始著葢千有餘年之間孔孟之徒所以推明是道者既已煨燼殘闕離析穿鑿蠧壊之後扶持植立厥功偉然未及百年踳駁尤甚先生出而自周以來聖賢相傳之道一旦豁然如大明中天昭晰呈露則摭其言行又可略歟仝上先生之道之至原其所以臻斯閾者無他焉亦曰主敬以立其本窮理以致其知反躬以踐其實而敬者又貫通乎三者之間所以成終而成始也故其主敬也一其内以制乎外齋其外以養乎内内則無貳無適寂然不動以為酬酢萬變之主外則儼然肅然終日若對神明而有以保固其中心之所存及其乆也靜虚動直中一外融而人不見其持守之力則篤敬之驗也其窮理也虛其心平其氣字求其訓句索其㫖未得乎前則不敢求乎後未通乎此則不敢忘乎彼使之意定理明而無躁易凌躐之患心専慮一而無貪多欲速之蔽始以熟讀使其言皆若出於吾之口繼以精思使其意皆若出於吾之心自表而究裏自流而遡源索其精㣲若别黒白辨其節目若數一二而又反復以涵泳之切已以體察之必若先儒所謂沛然若河海之浸膏澤之潤涣然氷釋怡然理順而後為有得焉若乃立論以駈率聖言鑿説以妄求新意或援引以相紏紛或假借以相混惑麄心浮氣意象匆匆常若有所迫逐而未嘗徘徊顧戀如不忍去以待其浹洽貫通之功深以為學者之大病不痛絶乎此則終無入徳之期葢自孔孟以降千五百年之間讀書者衆矣未有窮理若此其精者也先生天姿英邁視世之所屑者不啻如草芥翛然獨與道俱卓然獨與道立固已逈出庻物之表及夫理明義精養深積盛充而為徳行發而為事業人之視之但見其渾灝磅礡不可涯涘而莫知為之者入以事君則必思堯舜其君出以治民則必欲堯舜其民言論風㫖之所傳政教條令之所布固皆可為世法而其考諸先聖而不繆建諸天地而不悖閲百世以俟聖人而不惑者則以訂正羣書立為凖則使學者有所據依循守以入於堯舜之道此其勲烈之尤彰明盛大者語孟二書世所誦習為之説者亦多而析理未精釋言未備大學中庸自程子始表章之然大學次序不倫闕遺未補中庸雖為完篇而章句渾淪讀者亦莫知其條理之粲然也先生蒐輯先儒之説而斷以已意彚别區分文從字順妙得聖人之本㫖昭示斯道之標的又使學者先讀大學以立其規模次及語孟以盡其藴奥而後㑹其歸於中庸尺度權衡之既定由是以窮諸經訂羣史以及百氏之書則將無理之不可精無事之不可處矣又嘗集小學書使學者得以先正其操履集近思錄使學者得以先識其門庭羽翼四子以相左右葢此六書者學者之飲食裘葛凖繩規矩不可以須臾離也聖人復起不易斯言矣其於易也推卦畫之本體辨三聖之㫖歸専主筮占而實該萬變以還潔淨精㣲之舊其於詩也深玩詞氣而得詩人之本意盡削小序以破後儒之臆説妄言美刺悉就芟夷以復温柔篤厚之教其於禮也則以儀禮為經而取禮記及諸經史書所載有及於禮者皆以附於本經之下具列註疏諸儒之説補其闕遺而析其疑晦雖不克就而宏綱大要固已舉矣謂書之出於口授者多艱澁得於壁藏者反平易學者當沉潛反復於其易而不必穿鑿附㑹於其難謂春秋正義明道尊王賤覇尊君抑臣内夏外夷乃其大義而以爵氏名字日月土地為褒貶之例若法家之深刻乃傳者之鑿説謂周官徧布周宻周公運用天理熟爛之書學者既通四子又讀一經而遂學焉則所以治國平天下者思過半矣謂通鑑編年之體近古因就繩以尺牘之法以綱提其要以目紀其詳綱倣春秋而兼採羣史之長目倣左氏而稽合諸儒之粹褒貶大義凜乎烈日秋霜而繁簡相發又足為史家之矩範謂諸子百家其言多詭於聖人獨韓子論性専指五常最為得之因為之考訂其集之同異以傳於世而屈原忠憤千古莫白亦頗為發明其㫖樂律乆亡清濁無據亦嘗討論本末探測幽𦕈雖未及著為成書而其大㫖固已獨得之矣若夫析世學之謬辨異教之非𢷬其巢穴而砭其隠㣲使學者由於大中至正之則而不躓於荆棘檴穽之塗摧陷肅清之功固非近世諸儒所能髣髴其萬一也自夫子設教洙泗以博文約禮授學者顔曽子思孟子相與守之未嘗失墜其後正學失傳士各以意為學其騖於該洽者既以聞見積累自矜而流於汎濫駁雜之歸其溺於徑約也又謂不立文字可以識心見性而陷於曠蕩空虛之域學者則知所傳矣亦或悦於持敬之約而憚於觀理之煩先生身任道統而廣覽載籍先秦古書既加考索厯代史記國朝典章以及古今儒生學士之作靡不徧觀取其所同而削其不合稽其實用而剪其煩蕪參伍辨證以扶經訓而詰其舛差秋毫不得遁焉數千年間世道學術議論文詞之變皆若身親厯於其間而耳接目覩焉者大本大根固已上達直遂柯葉散殊亦皆隨其所至究其所窮條分𣲖别經緯萬端本末鉅細包羅囊括無所遺漏故所釋諸書悉有依據不為臆度料想之説外至文章字畫亦皆髙絶一世葢其包涵停蓄溥博淵泉故其出之者自若是其無窮也學者據經辨疑隨問隨析固皆極其精要暇而辨論古今其應如響愈扣愈深亹亹不絶及詳味而細察之則方融貫於一理而已矣嘗言曰學者望道未見固必即書以窮理茍有見處亦當攷諸書有所證驗而後實有所禆助而後安不然則徳孤而與枯槁寂滅者無以異矣潛心大業何有哉矧自周衰教失禮樂養徳之具一切盡廢所以維持此心者惟有書耳謂可轥轢經傳遽指為糟粕而不觀乎要在以心體之以身踐之而勿以空言視之而已矣以是存心以是克已仁豈逺乎哉至於晚嵗徳尊言立猶以義理無窮嵗月有限慊然有不足之意洙泗以還博文約禮兩極其至者先生一人而已先生教人廣大而科級甚嚴循循有序不容躐等凌節而進至於切巳務實辨别義利母自欺謹其獨之戒未嘗不丁寧懇到提耳而極言之每誦南軒張公無所為而然之語必三歎焉晚見諸生繳繞於文義之間深慮斯道之無傳始頗指示本體使深思而自得之其望於學者益切矣嗚呼道之在天下未嘗亡也而統之相傳茍非其人則不得而興自孟子沒千有餘年而後周程張子出焉厯時未乆浸失其真及先生出而後合濓溪之正傳紹魯鄒之墜緒前聖後賢之道該徧全備其亦可謂盛矣葢昔者易更三古而混於八索詩書煩亂禮樂散亡而莫克正也夫子從而贊之定之刪之正之又作春秋六經始備以為萬世道徳之宗主秦火之餘六經既已爛脱諸儒各以已見妄穿鑿為説未嘗有知道者也周程張子其道明矣然於經言未暇釐正一時從遊之士或昧其㫖遁而入於異端者有矣先生於是考訂訛繆探索深㣲總裁大典勒成一家之言仰包粹古之載籍下採近世之文獻集其大成以定萬世之法然後斯道大明如日中天有目者皆可覩也夫子之經得先生而正夫子之道得先生而明起斯文於將墜覺來裔於無窮雖與天壤俱弊可也並李方子撰行實宋名臣言行錄外集巻十二
