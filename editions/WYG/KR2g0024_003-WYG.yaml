body:
  text: 宋名臣言行錄前集巻三宋朱子纂集向敏中文簡公字常之開封人登進士第相真宗太宗飛白書張詠及公名付中書曰二人者名臣為朕記之公出知永興軍㑹邦人大儺有告禁卒欲倚儺為亂者宻使麾兵被甲衣袍伏廡下幕中明日盡召賔僚兵官置酒縱閲無一人預知者命儺入先令馳騁于中門外後召至階公振袂一揮伏卒齊出盡擒之果各懐短刃即席誅之𠞰訖屏戸亟命灰沙掃庭張樂宴飲賔從股慄除右僕射麻下日翰學李昌武當對真宗謂之曰朕自即位未嘗除右僕射今日以命敏中此殊命也敏中應甚喜對曰臣未知宣麻亦不知敏中何如上曰敏中今日門下賀客必多卿往觀之明日却對来勿言朕意也昌武候丞相歸乃往見門無一人昌武徑入見之徐賀曰今日聞降麻士大夫莫不歡慰公但唯唯又曰自上即位未嘗除端揆自非徳重眷殊何以至此公復唯唯又厯陳前世為僕射者勲勞徳業之盛禮命之重公亦唯唯卒無一言既退復使人至庖厨中問今日有無親戚賔客宴飲者亦寂無一人乃具以所見對上笑曰敏中大耐官職公在西京有僧暮過村民家求寄止主人不許僧求寢於門外車廂中許之夜有盗入其家自墻上扶一婦人并嚢衣而出僧適不寐見之自念不為主人所納宿今主人亡其婦及財明日必執我詣縣官矣因夜亡去走荒草中忽墮眢井則婦人已為盗所殺先在其中矣明日主人搜訪得之井中執以詣縣掠治僧自誣云與子婦姦誘與俱亡恐為人所得因殺之投井中暮夜不覺失足亦墜其中贓在井傍亡失不知何人所取獄成言府府皆不以為疑獨公以贓不獲疑之引僧詰問數四僧服罪但言某前生當負此人死公固問之乃以實對公宻使吏訪其賊吏食于村店店嫗聞其自府中来不知其吏也問之曰僧之獄何如吏紿之曰昨日已笞死矣嫗曰今獲賊何如吏曰已誤決此獄矣雖獲賊亦不問也嫗曰言之無傷矣婦人者乃此村少年某甲所殺也吏曰其人安在嫗指示其舍吏就舍中掩捕獲之案問具服并得其贓一府咸以為神時舊相出鎮者多不以吏事為意唯公勤于政事所至著稱上曰大臣出臨四方唯敏中勤心于民事耳于是有復用之意陳恕晉公字仲言洪州人中進士第位至參政公總領計司多年每便殿奏事太宗或未深察必形誚讓公歛板踧縮退至殿壁負墻而立若無所容俟帝意稍解復進慤執前奏終不改易如是或至三四上以其忠亮多從其議故當時言稱職者公為之首沂公筆錄恕長于心計為鹽鐵使釐去宿弊大益興利太宗深器之嘗御筆題殿柱曰真鹽鐵陳恕掇遺恕為三司使將立茶法召茶商數十人俾各條利害公閲之第為三等語副使宋太初曰吾觀上等之説取利太深此可行于商賈而不可行于朝廷下等固滅裂無取唯中等之説公私皆濟吾裁損之可以經乆于是始為三説法行之數年貨財流通公用足而民富實世言三司使之才以恕為稱首後李諮為使改其法而茶利浸失後雖屢變非公之舊法也東軒筆録公自升朝入三司為判官既而為鹽鐵使又為總置使洎罷參政復為三司使首尾十八年精于吏事朝廷藉其才晚年多病乞解利權真宗諭曰卿求一人可代者時莱公罷樞使歸班公即薦以自代上用萊公為三司使而以公為集賢學士判院事莱公入省檢尋公前後改革興立事件類為方冊自是計使無不循其舊貫李諮為三司使始改茶法而公之規模漸革向之方冊亦稍稍除削今則無復存矣東軒筆錄恕為三司使真宗命具中外錢穀大數以聞恕諾而不進乆之上屢趣之恕終不進上命執政詰之恕曰天子富于春秋若知府庫充實恐生侈心是以不敢進上聞而善之記聞恕領春官以王沂公為舉首嵗中拔劉子儀于常選自云吾得二俊名世才也是不愧于知人談叢公素不喜釋氏嘗請廢譯經院辭甚激切真宗曰三教之興其来已乆前代毁之者多矣但存而不論可也張忠定閲邸報忽再言可惜許門人李畋請問之曰參政陳恕亡也斯人難得唯公唯正為國家歛怨于身斯人難得退為詩哭之乖崖語錄世稱恕為三司使改茶法嵗計幾増十倍予為三司使時考其籍自景徳中北戎入冦之後河北糴便之法蕩盡後茶利十喪其九恕在任值北虜講解商人頓復嵗課遂増雖云十倍之多考之尚未盈舊額至今稱道葢不虞之譽也筆談張詠忠定公字復之濮州人中進士第位至工部尚書公令崇陽民以茶為業公曰茶利厚官將𣙜之不若早自異也命拔茶而植桑民以為苦其後𣙜茶他縣皆失業而崇陽之桑皆已成為絹而比者嵗百萬匹民富至今談叢公在崇陽嘗坐城門下見里人有負菜而歸者問何從得之曰買之市公怒曰汝居田里不自種而食何惰耶笞而遣之仝上公在銀臺時張永徳為并代帥小校犯法杖之而死有詔按罪公封還詔書曰永徳方被邉寄若責一小校遂摧辱之臣恐帥體輕而小人慢上矣不納既而果有營卒脅刺其大校者上始寤公言面加慰勞韓魏公撰神道碑淳化四年冬東西兩川旱民饑吏失救䘏冦大起五年正月賊首李順陷成都府詔王繼恩充招安使率兵討之復命公知成都府事五月繼恩破賊收成都上留公至秋始遣行時關中率民負粮以餉川師道路不絶公至府問城中所屯兵尚三萬人而無半月之食公訪知鹽價素髙而廩有餘積乃下其估聴民得以米易鹽民爭趨之未踰月得米數十萬斛軍中喜而呼曰此翁真善幹國事者時益雖收復諸郡餘冦尚充斥繼恩恃功驕恣不復出兵日以娱燕為事軍不戢往往剽奪民財公于是悉擒招安司吏至庭面數其過將盡斬之吏皆股栗求活公曰汝帥聚兵玩冦不肯出皆汝輩為之今能亟白乃帥分其兵尚可免死吏曰唯公所命兵不分願就戮公釋之繼恩即日分兵鄰州不數日減城中兵半既而諸軍請食馬芻粟公命以錢給之繼恩詬曰馬不食錢給錢何也公召謂曰今賊餘黨所在尚多民不敢出招安使頓兵城中不即討芻粟民所輸今城外皆冦也何由得之繼恩懼即出城討賊公計軍食有二嵗備乃奏罷陜西運粮上喜曰向益州日以運粮為請詠至方踰月已有二嵗備此人何事不能了朕無慮矣公以順黨始皆良民一旦為賊脅從當示以恩信許其自新即掲榜諭之已而首者相踵公皆釋其罪使歸田里一日繼恩械賊數十人請公行法公詢之悉皆前所自首者復縱之繼恩恚而問公公曰前日李順脅民為賊今日僕化賊為民不亦可乎公度繼恩日横以狀聞上命上官正為招安使順之餘黨公撫安于内正擒討于外再閲月而兩川平碑西川都巡檢使韓景祐為所部廣武卒劉旰所逐掠懐安軍破漢州公方㑹僚屬報至飲燕如故賊又掠卭蜀將趨益報者愈急公復不問其夕召上官正謂曰賊始發不三四日破數郡勢方鋭不可擊氣驕敢逼吾城乃送死耳請出兵北至方井當遇賊破之必矣正即受教行至方井果遇賊一戰斬旰首餘黨盡平衆亦服公料敵制勝人所不及碑討劉旰兵迴有以斬首級求賞者公曰當奔突交戰之際豈暇獲其首耶此必戰後剪来知復是誰殿直叚倫曰學士果神明也當時隨倫為先鋒入賊用命者皆中傷破體主帥令付營將理矣公命悉舁以來先錄其功帶首級者次之于是軍情以公賞罰至當相顧歡躍語錄公性剛毅因責決一吏彼枝辭不伏公曰這的莫要劒喫彼云決不得喫劍則得公牽出斬之以狥軍吏愕眙相顧自是俱服公之威信令出必行語錄初知益州斬一猾吏前後郡守所倚任者吏稱無罪公封判令至市曹讀示之既聞斷辭告市人曰爾輩得好知府矣葢李順嘗有死罪此吏縱之也仝上有僧行止不明有司執之以白公公判其牒曰勘殺人賊既而按問果一民也與僧行于道中殺僧取其祠部戒牒二衣因自披剃為僧寮屬問何以知之公曰吾見其額上猶有繫巾痕也記聞民間訛言有白頭老翁午後食人男女公召犀浦謂曰近訛言惑衆汝歸縣去訪市肆中歸明人尚為鄉里患者必大言其事但立證解來明日果得之公遂戮于市即日帖然夜市如故公曰妖訛之興沴氣乘之妖則有形訛則有聲止訛之術在乎識斷不在厭勝李順黨中有殺耕牛避罪逃亡者公許其首身拘母十日不出釋之復拘其妻一宿而來公斷云禁母十夜留妻一宵倚門之望何疎結髪之情何厚舊為惡黨今又逃亡許令首身猶尚顧望就市斬之于是首身者繼至並遣歸業民悉安居並語錄公守蜀兵火之餘人懐反側一日合軍大閲始出衆遂嵩呼者三公亦下馬東望而三呼復攬轡行衆不敢讙或以告魏公公曰當是時琦亦不敢措置塵史公鎮成都一日見一卒抱小兒在廊下戯小兒忽怒扯其父公見之集衆語曰此方悖逆乃自習俗幼已如此況其長成豈不為亂遂殺之巵史公嘗以蜀地素狹游手者衆事寧之後生齒日繁稍遇水旱則民必艱食時米㪷直錢三十六乃按諸邑田税如其價嵗折米六萬斛至春籍城中細民計口給劵俾輸元估糴之奏為永制逮今七十餘年雖時有災饉米甚貴而益民無餒色者公之賜也碑公凡有興作先帖諸縣于民籍中係工匠者具帳申来分為四畨役十日滿則罷去夏則夘入午歇一時冬抵莫放各給木札一幞以禦寒工徒皆悦有一瓦匠因雨乞假公判云天晴葢瓦雨下和泥事雖至㣲公俱知悉巵史公寢室中張燈炷香通夕宴坐郡樓上鼓畨漏水厯厯分明儻一刻差必詰之守籖者指名伏辜謂公為神明公曰鼓角為中軍號令號令在前尚不分明其餘外事將如何也語錄公有清鑒善臧否人物凡所薦辟皆方亷恬退之士嘗曰彼好奔競者將自得之何假吾舉碑轉運黄虞部好舉時才之士公勸曰大凡舉人須舉好退者好退則亷謹知恥若舉之忠節愈堅少有敗事莫舉奔競者奔競則能曲事諂媚求人知已若舉之必矜才好利累及舉官故不少矣其人既解奔競又何須舉他語錄益不貢士幾二十年學校頹廢公察郡人張及李畋張逵者皆有學行為鄉里所服遂延奬加禮篤勉就舉後三人登科厯美官于是兩川學者知勸文風益振碑公每斷事有情輕法重情重法輕者必為判語讀以示之蜀人鏤板謂之戒民集大抵以敦風俗篤孝義為本也湘山野録公在杭有富民病將死子方三嵗乃命其婿主其貲而與婿遺書曰他日欲分財即以十之三與子七與婿子時長立果以財為訟婿持其書詣府請如元約公閲之以酒酹地曰汝之婦翁智人也時以子幼故以此屬汝不然子死汝手矣乃命以其財三與婿而子與七皆泣謝而去服公明斷碑公之自蜀還也詔以諌議大夫牛冕代公公聞之曰冕非撫御才其能綏輯乎踰年果致王均之亂逐冕據益州後雖討平之而民尚未寧上以公前治蜀威惠在人復以公為樞宻直學士遷刑部侍郎知益州蜀民聞之鼓舞相慶如赤子乆失父母而復来鞠我公知民信已易嚴以寛凡令下人情無不慰愜蜀郡復大治上命謝濤撫蜀諭公曰得卿在蜀朕不復有西顧之憂因詔公鑄景徳大錢于嘉卭州一當小鉄錢十銅錢一千今便之碑公問李畋曰百姓果信我否對曰侍郎威惠及民民皆信服公曰前一任則未也此一任應稍稍耳秀才只此一箇信五年方得成語錄范延貴為殿直押兵過金陵公為守因問曰天使沿路來還曽見好官員否延貴曰昨過袁州萍鄉縣邑宰張希顔者雖不識之知其好官員也公曰何以言之延貴曰自入縣境驛傳橋道皆完葺田莱墾闢野無惰農及至縣則㕓肆無賭博市易不敢諠爭夜宿邸中聞更鼓分明以是知其必善政也公大笑曰希顔固善矣天使亦好官員也即日同薦于朝希顔後為發運使延貴亦為閤門祗候皆號能吏也東軒筆録公自金陵入苦腦疽未陛見御史閤門累奏上寛其告俾養疾公恨不得面陳所懐乃抗論近年虚國家帑藏竭生民膏血以奉無用之土木者皆賊臣丁謂王欽若啓上侈心之所為也不誅死無以謝天下章三上不報出知陳州燕談公在陳一日方食邸報至公且食且讀既而抵案慟哭者乆之哭止復彈指乆之彈止罵詈乆之乃丁謂逐萊公也公自知禍必及已乃延三大戸于便坐與之博䄂間出彩骰子勝其一坐乃買田宅為歸計以自汙晉公聞之亦不害也余謂此智者為之賢者不為也賢者有義而巳寧避禍哉禍豈可避耶談叢公少學劍樂為竒節有士人遊宦逺郡為僕夫持其不法事恐之且欲其女為妻即止嵗乆益恣横不可制詠寓傳舍知其事即陽假此僕為馭單騎出城至林麓中斬之而還䝉求公寢室中無侍婢服玩之物閴如也李畋嘗侍坐廡下因謂公寢禪室不如公哂曰吾不為輕肥為官以至此吾往年及第後以詩寄傅霖逸人云前来失脚下漁磯苦戀明時未得歸寄與巢由莫相笑此心不是愛輕肥豈今日之言也語錄王均李順之亂官于蜀者多不挈家以行公知益州單騎赴任官屬憚其嚴莫敢畜侍婢公不欲絶人情遂自買一婢以侍巾櫛自此官屬稍稍置姬侍矣公還闕呼婢父母出貲以嫁之仍處女也一日有術士上謁自言能鍜汞為白金公即市汞百兩俾鍜一火而成不耗銖兩公立命工煆為一大香爐鑿其腹曰充大慈寺殿上公用送寺中以酒榼遺術者而絶之筆錄公嘗訪陳搏一見公厚遇之顧謂子弟曰此人于名利澹然無情達必為公卿不達則為帝王師碑少時謁華山陳圖南遂欲隠居陳曰公方有官職未可議此其勢如失火家待君救火豈可不赴也公去蜀留一巻實封文字與僧正希白云候十年觀此後十年公薨于陳訃至蜀人罷市號慟希白為公設大㑹齋請知府凌䇿發所留文字乃公畫像自為贊云乖則違俗崖則絶物乖崖之名聊以表徳因號乖崖公公曰事君者亷不言貧勤不言苦忠不言已效公不言已能可以事君矣謂李畋曰大小之事皆須用智智猶水也不流則腐凡百不用智則臨大事之際寧有智來公曰臨事有三難能見一也見而能行二也當行必果決三也謂李畋曰子知公事有隂陽否對曰未也曰凡百公事未著字前則屬陽陽主生也通變由之著字後屬隂隂主刑也刑貴正名名不可改又曰子異日為政信及于民然後教之言及于義然後勸之動而有禮然後化之靜而無私然後民安而樂業矣行斯四者在先率其身李畋苦痁既瘳請謁公曰子于病中曽得移心法否對曰未也公曰人能于病中移其心如對君父畏之慎之靜乆自愈並語錄蘇軾書公帖後云以寛得愛愛止于一時以嚴得畏畏止于力之所及故寛而見畏嚴而見愛皆聖賢之難事所及者逺矣張公治蜀用法之嚴似孔明孔明與公遺愛皆至今葢尸而祝之社而稷之也馬知節正惠公字子元幽州人以父功補官位至樞宻公年十八監彭州兵馬以嚴飭見憚如老將監博州兵馬時劉延讓敗于君子驛而契丹歸矣公方料丁壯集芻粮繕城治械如冦至吏民初不悦其生事已而契丹果至度不可攻乃去知延州至郡羌以兵覷邉㑹上元開門張燈視以無為而羗卒不能為冦除樞宻副使當時契丹已盟大臣方言符瑞而公每不然之獨從容極言天下雖安不可忘戰去兵之意真宗多以公言為是並王荆公撰神道碑真宗末王欽若每奏事或懐數奏出其一二餘皆匿之既退以已意稱聖㫖行之嘗與知節俱奏事上前欽若將退知節目之曰懐中奏何不盡出之記聞公與同列奏對次忽厲聲曰王欽若等讀盡劄子莫謾官家公退見王文正詞色尚怒因語公曰諸子上前議論如此知節幾欲以笏擊死之但恐驚動君相耳公歎撫乆之文正遺事真宗東封泰山車駕發京師上及從官皆蔬食封禪禮畢上勞王旦等曰卿等乆食蔬不易旦等皆再拜知節獨進言蔬食者惟陛下一人耳旦等在道與臣同次舍無不私食肉旦等再拜曰誠如知節之言記聞曹瑋武穆公字寳臣武惠王之子以父任補官位至樞宻配享真宗廟庭知渭州圖涇原環慶兩路山川城郭戰守之要以獻真宗留其一樞宻院以其一付本路使諸將出兵皆按圖議事荆公撰行狀曹侍中將薨太宗親臨視之問以後事對曰臣無可言固問之對曰臣二子璨與瑋材器有取皆堪為將上問其優劣對曰璨不如瑋已而果然瑋知秦州嘗出循城以城上遮箭版太髙召主者令下之主者對曰舊如此乆矣瑋怒曰舊固不可改耶命斬之僚佐以主者老將諳兵事罪小宜可赦皆諌瑋瑋不聴卒誅之軍中懾伏瑋在秦州有士卒十餘人叛赴虜中軍吏来告瑋方與客圍棊不應吏亟言之瑋怒叱之曰吾固遣之去汝再三顯言耶虜聞之亟歸告其將盡殺之記聞公在邉蕃部有過惡者皆平定之每以餞將官為名出郊而兵馬次序以食品為節若曰下某食即某隊發比至水飯則捷報至矣東莱記事公為將幾四十年用兵未嘗敗衂尤有功于西方舊羌殺中國人得以羊馬贖死如羌法公謂如此非所以尊中國而愛吾人奏請不許其贖陜西嵗取邉人為弓箭手公以塞上廢地募人為之若干畆出一卒若干畆出一馬至其種歛為發州兵戍守至今邉賴以實所募皆為精兵瑋募弓箭手使馳射校強弱勝者予田二頃再更秋穫課市一馬馬必勝甲然後官籍之則加田五十畆至三百人以上團為一指揮擇要害處為築堡使自塹其地為方田環之立馬社一馬死衆為出錢市馬開邉濠率令深廣丈五尺山險不可塹者因其峭絶治之使足以限虜後皆為法自三都之戰威震四海唃厮囉聞公姓名即以手加顙在天雄契丹使過魏地輒隂勒其從人無得髙語疾驅至多憚公不敢仰視天雄卒有犯法衆謂獄具必殺之公乃處以常法或以為疑公笑曰臨邉對敵斬不用命者所以令衆吾非喜殺也平時治内郡安事此乎初守邉時山東知名士賈同造公客外舍公欲按邉即同舍邀與俱同問從兵安在曰已具既出就騎見甲士三千環列不聞人馬聲同歸語人曰瑋果名將也公為將不如其父寛然自為一家云公好讀書所如必載書數兩兼通春秋公榖左傳而尤熟于左氏並行狀寳元中王忠穆公為樞宻使河西首領趙元昊叛上問邉偹輔臣皆不能對明日樞宻四人皆罷忠穆謫虢州翰林學士蘇公儀與忠穆善出城見之忠穆謂公儀曰􅎸之此行前十年已有人言之公儀曰必術士也忠穆曰非也昔時為三司鹽鐵副使疏決獄囚至河北時曹南院自陜西謫官初起為定帥􅎸至定治事畢瑋謂􅎸曰決事已畢自此當還明日願少留一日欲有所言􅎸愛其雄才又聞欲有所言遂為之留明日具饌甚簡儉食罷屛左右曰公滿面權骨不為樞副即邉帥或謂公當作相則不然也然不十年必總樞柄此時西方當有警公宜預講邉備蒐閲人才不然無以應卒􅎸曰何以見教曹曰瑋在陜西日河西趙徳明嘗使人以馬博易于中國怒其息㣲欲殺之莫可諌止徳明有一子方十餘嵗極諌不已曰以戰馬資鄰國已是失計今更以貨殺邉人則誰肯為我用者瑋聞其言私念之曰此子欲用其人矣是必有異志聞其嘗往來牙市中瑋欲一識之屢使人誘致之不可得乃使善畫者圖其貌觀之真英物也此子必須為邉患計其時節正在公秉政之日公其勉之􅎸是時殊未以為然今知其所畫乃元昊也筆談宋名臣言行錄前集巻三
