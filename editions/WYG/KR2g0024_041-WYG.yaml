body:
  text: 宋名臣言行錄別集上卷九宋李幼武纂集呉玠涪國武安王字晉卿德順軍人少𨽻曲端軍以戰功初補副尉權隊將建炎三年轉涇原都監知懷德軍冬加忠州刺史四年春擢熈河路副總管改秦鳳副總管張浚用為都統制紹興初加鎮西軍節度使又加川陜宣撫處置副使加檢校少保奉寧保靜軍節度使五年改所統制為行營䕶軍明年加檢校少師靜難軍節度川陜宣撫使九年加開府宣撫如舊六月薨年四十七贈官至太師王少沈毅尚氣節長於騎射曉兵法讀書能通大義未冠𨽻涇原軍大立戰功羅索冦鳳翔曲端與王大兵屯北原堅壁不動金人謀趨涇州端拒守麻務鎮遣王以前軍討之王進據青溪嶺逆擊大破之又以本道兵復華州城破命將士無殺掠民皆按堵王與端起兵涇原招流民潰卒捍賊所過人供糧糓道不拾遺猛士如林甲軍蔽野每戰必先占高原必勝之地未嘗敗衂賊稍北退守河東不敢逾河飲馬張浚至秦州與王語大悦遂以之鳳翔時當兵火之餘王勞來安集民賴以生初戰青溪嶺王牙兵皆潰至是王治兵秦鳳諸潰卒復出就招王問訊再三搜索非是者五六人斥遣之餘悉斬於逺亭下去秦州十里軍中股慄自是毎戰皆効死無潰散者矣浚以便宜董師川陜檄諸路將臣與賊大戰召端與王問䇿端云教士十年後可大舉王云高山峻谷我師便於駐隊賊雖驍果甲馬厚重終不能馳突我據嵯峨之險占關輔之勢賊雖悍不能據我尺寸地宣幕僚佐一以為迂一以為怯置其言而不用棄其人而不視師次富平都統制會諸將議戰王又曰兵以利動今地勢不利將何以戰宜徙據高阜制賊馬衝突諸將皆謂不然云我師數倍又前臨葦澤非鐵騎所宜都不聽既而賊驟至巴蜀大震王獨整衆保散關之東曰和尚原積粟繕兵列柵其上或謂王宜進屯漢中以守蜀王曰賊不破我豈敢輕進吾堅壁重兵下瞰雍甸彼懼我襲其虚躡其後保蜀良策也叛將慕洧拔寨遁去關師古深入敵境忽遇金兵與戰大敗師古歸大潭内懷慚懼隻身降賊王念其下忠義不從叛亟撫定之王既併其衆所統益以精強摩哩郎君率銳兵犯和尚原期必取而後進王擊敗之摩哩及和尼郎君馬五太師耿太師復會烏嚕貝勒使二將由階成出大散關先至王與戰三日連勝而摩哩方攻箭筈關王遣麾下擊退不使與二將合分兵掩襲兩皆潰去北人自破契丹以來杻於常勝至是與王戰輒北不勝其憤元師四太子會諸兵及正甲女真數萬人造浮梁跨渭水自寶雞三十里疊石為城與王拒戰王指授諸將選勁弓強弩期以必死番休迭射賊稍却則以竒兵乘險據隘横攻夾擊如是三日度其必困且走王遣麾下伏神坌谿待其歸敵果遁走伏發賊潰俘其都將英格貝勅及酋領甲士尸填坑谷者二十餘里獲鎧仗數萬計乘夜併兵劫賊大寨四太子全軍陷沒勦殺殆盡幾獲四太子賊乆窺蜀必欲以竒取之薩里罕與四太子懲前日之敗不敢窺和尚原紹興二年春裒其兵三十萬又盡發諸路簽軍聲言東歸太原反自商於出漢陰擣上洋金州失守王亟率麾下騎兵倍道疾馳晝夜數百里急調兵利閬徑趨金洋先以黄柑數百枚犒賊師曰大軍逺來聊奉止渴今日决戰各忠所事薩里罕以杖擊地大驚曰呉侯爾來何速耶不敢遽進盤桓累日王得以其暇治饒風嶺寨柵方據險要而賊已麾中軍急上遂大戰饒風嶺上凡六晝夜賊皆敗衂薩里罕大怒斬其千戸貝勒十數人以死犯關又潛軍間道踰蟬溪嶺出官軍後斷王歸路王按兵乘夜徑趨西縣或曰蜀危矣王曰賊掃地而來去國逺鬬而死傷大半吾以全軍扼其吭蜀可無憂王遂為清野之謀分屯諸將示以擣虚之勢賊便旋中梁山浹日一夕潛遁薩里罕歸深服王善用兵勢不能破則密遣通書百端間誘言金國威德之盛知勇之竒甲兵之強公宜相時而動王復書畧曰夫華夷異域君臣異分此天下大義古今常理順之則治逆之則亂披觀傳記數千百年兵革之亂中原與夫叛臣賊子稱兵犯上率不旋踵夷滅無遺類者以其悖大義反常理神人憤疾天地不容也某世為宋臣食趙氏之祿孕子育孫於中原之地儻有二心天地鬼神實誅之乃辱貽説使相時而動足下度某豈茍得忘恥見利忘義者耶一言之失駟馬莫及竊為足下惜之薩里罕得書大不平烏珠舉兵五十萬欲入川豫之弟不忘朝廷密遣使告王早備之烏珠來攻興州仙人關王與烏珠相見烏珠曰公若來降當得美地百里而王之王曰已事本朝安有二心乃親約議定戰日遂大戰仙人關大破之王親兵不滿五萬每戰乘肩輿動鼓樂殊無懼色長於料敵激厲將士退者必誅信賞必罰戰無不勝薩里罕四太子蓄忿日乆糾合數十萬兵轉三河之粟魚貫蟻附决意取蜀自元帥以下皆盡室而來又以劉豫腹心為招撫召諸路簽軍列屯寶雞綿亘數百里進攻鐵山鑿崖開道於仙人關高嶺立大柵下瞰王營循嶺東下直攻王軍王自以萬人當其前弟璘由七方關不待會合率輕兵倍道入援四太子聞之與皇弟郎君分領萬户酋長擁兵急攻又往攻殺金平野砦對壘劄連珠硬砦數十座又來王營前立砲數十座擊我營王令營中併發神臂弓飛大砲斃賊無數統制官田晟總兵深入追賊賊又發生兵萬餘擊營左王分兵力戰却之賊不往又添生兵擁洞子雲梯直前搭城身公兵向前用砲打洞子碎用撞竿撞雲梯倒賊恐縛虚棚戰樓別遣大貝勒擁鋭卒萬餘一發乘城王令統制官楊政領長槍陌刀手深入刺打隔斷賊又遣二貝勒總正甲金人三萬夾攻柵兩肋弟璘左右遮䕶血戰殺賊賊皆引去薩里罕駐馬四顧良乆云吾得之矣翌日號令諸軍併力只攻王營兌方一樓子自寅至午危甚姚仲馬統領只在樓上酣鬬樓已傾側仲以絹為繩絏使復正金以火焚樓柱仲以酒缶擊滅火賊布神臂弓東嶺下王亦發神臂弓五百隻與之對射金去即遣王萬年劉鈐轄王武宣贊分紫白旗入金金奔潰抵夜王別遣五將分更劫寨晝夜數十合金困憊死傷以萬計即歛兵宵遁殺死千萬戸甲軍萬餘得榜牌衮槍金鼓旗幟數千件左統制張彦夜劫金横山砦斬首千級生擒將領二十人王遣統制王俊設伏河池扼金歸路生擒百餘人斬首千級得馬旗幟無數王悉兵尾襲直過和尚原去上聞之嘉歎賜以所御戰袍器甲且賜親筆曰朕恨阻逺不得拊卿之背也王素不為威儀除宣撫副使簡易如故常負手步出與軍士立語幕容請曰今大敵不逺安知無刺客萬一或有意外豈不上負朝廷委注之意下孤軍民之望哉王謝曰誠如君言然玠意不在此國家不知玠之不肖使為宣撫玠欲不出恐軍民之寃抑而無告者為門吏所隔無由自達玠所以屢出者為此也幕客乃服金乆不得志還據鳳翔授甲屯田為乆留計自是不敢輕動王以關師古自洮泯領李進王師古戴越打糧河州襲大潭縣掩骨谷鎮賊慕洧拔寨去師古由殺馬谷攻焦山務焚田家村園子谷深入賊境至石要嶺忽遇金賊大兵一戰敗績師古旋師大潭内懷慙懼悉還兵宣司隻身降賊王愛此軍忠義無一人一騎從師古叛者拊存勞來捐其家財厚資給之兩軍既合中外一心失一匹夫於師古得萬貔貅於行陣王兵由此精甚五年春王向天水出竒兵下秦州王與金人對壘交戰踰十年熟其軍壘曲折知其部領堅脆常以一當百惟患逺餉勞民屢汰冗員官節浮費歲屯田至十萬斛又調戍兵命梁洋守將治褒城廢堰廣溉民田復業數萬朝廷嘉之王初軍中所用激賞錢每歲下四川漕司應副一百八十萬緡王言今不發兵乞省其半詔奬之金廢豫召諸道兵聲言入蜀王獨謂不然測其將去已而果然王撫士卒同甘苦至軍政則斬刈不一貸故人人效死及第功賞則斷以公論無請託之私性樂善毎觀史傳有可師者必書之座右日誦七書其用兵本孫呉而能窮其變化雖功高貴顯而居常極儉約至推以予士則畧無少吝其殁也家無餘貲至無宅以居胡世將宣撫川陜王弟秦帥適在軍中一日從容問王所以戰則曰璘與先兄束髮從軍屢戰西戎不過一進郤之間勝負决矣至金人則勝不追敗不亂整軍在後更進迭郤堅忍持乆令酷而下必死每戰非累日不决葢自昔用兵所未嘗見勝之之道非屢與之角者莫能盡知然其要在用所長去所短而已葢金人之弓矢不若中國之勁利而中國之士卒不若金人之堅忍盡吾長伎洞中甲數百步外則彼固不能及我據其形便更出鋭卒與之為無窮以沮其堅忍之勢則我固有以制彼至於决機兩陣之間變化如神黙運乎心術之㣲則璘有不能言以是知王之深於兵也十五年詔立廟仙人關賜額曰忠烈呉璘信國武順王字唐卿武安之弟年十八以良家子從軍靖康初充永興路機宜移辟秦鳳路遷閣贊紹興初遷康州團練擢秦鳳都鈐馬步軍副總管二年權鳳翔兼安撫三年遷榮州防禦權副都總知秦州節制階文四年遷定國軍承宣使陞熈河經畧安撫知煕州六年為行營右䕶軍統制七年陞陜西諸路都統制九年改秦鳳路經畧安撫知秦州復除四廂都指揮使十年授鎮西節度十二年拜檢校少師十四年改利路帥階成岷鳳興文龍𨽻焉十七年移節秦國軍御前諸軍都統制帥依舊知興州加太尉二十六年加開府二十九年拜少保三十一年拜四川宣撫使進封成國公明年拜少傅孝宗即位除陜西河東宣撫招討使隆興初拜少師乾道初乞解宣撫不允冊拜太傅進封新安郡王仍領宣撫改判興元明年改鎮武興五月十七日薨于位年六十六請老之奏聞以太師致仕遺表上封王贈諡金人乘富平之勝盡陷陜右蜀甚危武安王與王招散亡保和尚原練兵積穀以扼敵衝紹興初我孤軍棲於原上朝問隔絶兵食匱乏將士家屬往往陷賊人無固志有謀劫王兄弟北去者幕府陳逺猷夜入告王與武安王遽召諸將勵以忠義㰱血而誓諸將感泣遂敗敵將摩哩於原下摩哩遣二將烏魯扎哈自階城出散關又趨和尚原摩哩身自犯箭筈關期將夾攻王奮擊之斬其將烏嚕乘勢進擊二將皆遁摩哩亦竟不得合時武安以弱卒抗勁敵軍政尚嚴卒伍逃散往往有全隊誅之者王則厚拊之如家人以輔成武安之志故士卒不敢犯武安之法而樂王之恩戰無不克烏珠憤其連敗合兵十餘萬期必取和尚原而後入蜀自寶雞而南列柵三十里武安嚴兵待之王拒戰數日率以勁弓強弩扼其衝以竒兵邀其旁間絶其糧道敵不得休伺夜敵將飯燃火營中復選精兵更射其火處金不得食疊石城以自保復瞰其城射之金度必敗遂以死决烏珠親擁戰王亦身督將士金分為三十餘陣以拒我更迭以次出戰王獨當其衝隨輒破之金雖困而猶整至神坌道狹伏發遂大亂王手殺數十百人俘萬戸英格貝勅及首領三百餘人烏珠身中流矢二獲鎧仗萬計買馬路乆未通王首開之貿以茶綵撫以恩信招致小部族首領四十二國馬通行至今賴之王與武安度金既大敗不得志必大舉以與我力爭乃預設壘仙人關旁曰殺金平烏珠薩里罕等果極其兵力十餘萬衆正告由仙人關進取蜀列柵三十里彌亘不斷王前在武階以書抵武安以殺金平之地去原上逺前陣散漫謂須第二陣作隘牢其限隔期必死戰則可取勝至是王馳驛會原上與賊對壘武安如王策益治第二隘多列砲積石如山王乃令諸將曰金人傾國而來吾輩報國正其時也因慷慨以刀畫地申令曰死則此死敢退者斬諸將股慄遂與金戰分為東西以搏我東則四太子等西則韓將軍等軍也極其狡捍東西相望遥相犄角以持乆必死困我王左右援翼唯急是應迨暮殺傷強半而氣猶鋭我軍苦戰乆遂歛第二隘以致敵時軍中有異議欲别擇形勝守者王奮曰方交而退是不戰而郤也且吾度此敵走不乆矣請於武安公夜布火鼓易旗幟迨曉軍陣精采一變樂聲震山谷於是人自厲有死志洎金再搏我第二隘則人被兩鎧執鐵鈎相連魚貫而上攻具變化若神王督士死戰且射其兩腋隨殪隨上幾百餘戰而金攻疊兵殆盡遂走入壁陽為備戰而宵遁前後斬首俘獲不可勝計金自是不復窺蜀矣紹興三年烏珠等必欲以竒取蜀乃擣金洋戰饒風犯漢中王時駐兵和尚原金懼掎其後也乃陽以兵趨蜀而反自褒谷入鳳州犯保安程且合鳳翔諸路軍欲道和尚原下王先以兵迎擊保安程金復身督諸軍拒鳳翔金於百家村以正兵合以竒兵擣其腹心皆敗而走金廢豫歸我河南地幕府擬表稱賀王讀之愀然曰在朝廷休兵息民誠天下慶某等叨竊不能宣國威靈亦可愧矣何賀之有但當待罪稱謝則可幕府謝不及紹興九年武安王薨朝廷遣僉樞樓炤出使陜西會諸將議移諸軍分屯陜右王不可曰金反覆難信懼有他變今我移陜右蜀口空虚金若自南山擣蜀要我陜右軍則我不戰自屈矣當且依山為屯以控要害遲金情見力疲漸可進據遂但以牙校三隊赴秦州且飭階州等山寨以備之十年烏珠殺達蘭其夏薩里罕果直趨鳳翔入石壁寨以要我陜右軍陜右皆陷而王獨全軍蜀口扼金川陜宣撫胡世將倉卒召諸將計事皆曰金掩我無備而我分屯之師未集宜退守青野原少避其鋒王後至驚曰誰為此者可斬也金所以輕犯我者聞先兄之薨且謂我無備今若少退堕其計中矣璘請以身任責胡壯之遂與公檄金責其棄信輕舉率師即日出鳳翔分遣諸將姚仲等敗扎哈於石壁李永琪向起等破鶻眼張太師於扶風金餘兵保扶風城又攻破之連戰皆㨗扎哈僅以身免駐大軍大蟲嶺陣次有法步騎相叅氣象雄壯薩里罕自上西平原覘曰善戰者立於不敗之地此安可角於是薩里罕捨蜀口而北向矣朝廷出師渡淮宣撫胡公亦被㫖乘機進設乃以攻取之事屬王王受命出秦隴往別宣撫胡問方畧安出王曰某當以三鎮破金人皆莫測所謂時金統軍罕扎希卜蘓合軍五萬屯劉家圏胡善戰習善謀皆金之老於兵者且據險自固前臨峻嶺後控臘家城必謂我軍不敢輕犯王揣知其情因直告曰明日請戰敵聞之笑是夜王率諸軍銜枚涉渭令曰近金營方得舉火未至里所萬炬齊發出其不意金震駭倉卒備戰我軍已成列有聞金帥以馬撾敲鐙曰吾事敗矣王猶策希卜蘓有謀必謂我趨戰欲速不肻徑出罕扎持其勇宜可挑取乃遣輕兵嘗之罕扎果勒兵與我軍鏖擊數十更休迭戰適及我三陣戰急大將有請曰敵居高臨下我戰地不利宜少就平曠以致其師可勝王叱曰如此則我走而金乘我矣金今潰毋自怯王輕裘駐馬陣前麾軍殊死戰三陣而金力果憊卒如王言時陜右隔王化王一戰而聲震關中三秦父老企望官軍不日東下往往擒金潰兵縛致之王亦經畧且將大舉進圍臘家城將破陜右州郡以次納書降而講和之詔下遂班師胡聞王之㨗喜曰真能踐言矣王知興州時和議方堅而王獨嚴備日為敵至之虞故西路兵為天下最初王閲兵河池一新戰陣之法每戰以長鎗居前坐不得起次最強弓次強弩跪膝以俟次神臂方約賊相搏至百步内則神臂先發七十步強弓併發次陣亦如之凡陣以拒馬為限鐵鈎相連俟其傷則更替之遇更替則以鼓為之節騎出兩翼以蔽於前陣成而騎兵退謂之疊陣諸將竊議曰軍其殱於此乎王曰古之束伍令也軍法有之諸軍不識爾得車戰餘意無過於此戰士心定則能持滿敵雖鋭不能當也房琯知車戰之利可用於平原廣野之間而不得其法取敗固宜敵騎長於奔衝不爾無有能抗之者王入覲上問前此所以勝敵之方王曰先令弱者出戰強者繼之丁丑宰執奏王功賞上因以王所對語之且曰璘善用兵此正孫臏三駟之説一敗而二勝者也上謂宰執曰呉璘説川陜可招衞兵今璘尚留此可諭鄭剛中令處之仍令呼璘與議王又言胡世將嘗招得數千人近緣歲饑皆餓死今必有流民願就招者時王乞用初任團練承宣使為其子換文資上許之王為利州西路帥鎮興州已乆上親御宸翰賜王以守邊安靜加拜太尉王自著兵法二篇上篇兵要下篇陣圖大畧謂虜有四長我有四短當反我之短制彼之長虜之四長曰騎兵曰堅忍曰甲重曰弓矢吾當集漢蕃所長而兼用之故制其騎則有分隊分陣之法制其堅忍則有更休迭戰之法制其甲曰勁弓強弩制其弓矢曰以逺剋近以強勝弱其説甚備其法循環用之可至於無窮至於陣法有圖無書焉王策金將叛整備益嚴金果敗盟金主渡淮巨帥喀齊喀號元帥以兵扼散關遊騎犯黄牛堡羽檄交至王方病在告適拜宣撫之命即肩輿就道止以牙校自隨駐青野原既而遊騎退王曰金自守之兵不足慮也益調内郡兵分道而進面授諸將方畧所至皆捷尅秦州擒偽守蕭濟及其屬來王即呼前置食宣上德意諭無憂死皆感泣列城未下者聞之爭欲歸附破隴州復洮州蘭州獲偽蘭州守安逺大將軍温都烏頁及州戍將明威將軍完顔宗臣等八人三十二年春復取散關及和尚原賜勅書褒諭王遣都統制姚仲與王之子挺率東西兩路之軍合攻德順金人左都監自煕河以兵由張義堡駐權沙會平凉之師來援挺率兵戰於瓦亭大破之金畏我兵號曰天兵別將復原州環州三月諸將攻德順乆未下王知士有惰志且金將盡發西兵内外合以拒我即单騎自秦州晝夜疾馳視師身擁數十騎馳達四城傳呼南北之人服王威名思識顔面以快先覩一聞相公之來士氣自倍登埤咨嗟不忍發一矢城中敵已不戰而氣索矣於是按行營壘列柵要害且治夾河戰地以預處我師於便而致敵於不便雖隨軍負販奴𨽻莫不區別有地及戰先以數百騎嘗敵敵一鳴鼔鋭士躍出馳突我軍遂空壁與我合我得先治戰地騎士無不一當十凡囘旋曲折相搏於高下之間者以百戰王初若無所指顧逮苦戰乆忽傳呼某將戰不力其人即殊死鬬時降師有覘者曰自吾從金百戰未嘗見如此可謂神矣翌日我再出兵金堅壁不戰既又天大風雨雪金幸休止而力實以窮是夕遂遁去復德順軍市不易肆王入城父老迎拜擁馬首幾不能行時朝廷遣兵書虞允文宣諭川陜齎詔勞王且議軍士夏五月遣兵攻破煕州獲偽都總管劉嗣初副統石烈繼破鞏州王之復三路也惟鞏最堅守王遣挺率諸將破之斬萬戸一獲兩千戸六月皇帝受内禪賜之親札復遣中使賜御府細鎧弓矢王策金必再爭德順乃亟馳赴城下德順之東曰東山北曰北嶺東山小而可守下瞰城中北嶺形勢延接實控扼之地王至則連營北嶺掘重壕築壘開戰道益為不可犯之計且指視諸將以金他日所營已而金果大至合完顔實喇等兵十餘萬正營至所指之地有酋先引輕騎數千出視東山去巢穴稍逺擊之狼狽趨營既乃大開壁出師苦戰自旦及晡金敗先退入壁自是遂堅守不動悍酋哈哈萬戸復請精兵自鳳翔來援初我一軍當北嶺下傳城下寨金騎可以馳突王至是下令夜移入城将士不知所謂頗有口語既旦金果合兵大出直至其處已無所得則數萬騎讙譟城下意甚自得王命偃旗卧鼔士無敢譁諸將請戰不應迨日昃敵氣已惰令諸軍忽鳴鼔將趨其營金大駭復亟走壁遣諸將追襲敗之當時非王徙城下之營則金幾得志時金既堅守不輕出挺請以輕兵挑戰而以竒兵擣其虚王采其言令列陣城下調金金閉營王則就以其陣移上東山築堡以守時雨雪天大寒凍不可入則燒土而掘之連夜堡成甫築畢而金兵大至極力爭之殺傷幾半而不可得諸將益歎王之多算不可及也金自是失三路形勝糧運迂險雖喀齊喀提河南陜右兵而連敗亡失益衆尺寸不能進我斬馘築為京觀者彌望而又東山横其衝北嶺窣其後二路糧食皆我有我出兵要金糧道金遂艱食失東山堡時猾酋有終夕悵恨者王策金雖衆無能為矣於是調王彦諸軍將益出兵至秦州因會宣諭使虞公虞公抗章以王之勲勞績効聞上賜親札曰覽虞公允文奏知卿智勇兼濟力抗金人卿厯世忠勞國家是賴王降拜曰臣何足以當此金既技窮度不可與我爭則潛軍水洛開道隴山以示我出竒實亦自便歸計王乃部置諸將分屯要害且益出蜀口之師分德順兵整陣内外相合以蹙金時金人亦相驚曰東南天兵至矣時有退師之詔而議者遥度形勢以謂兵乆在外雖得三路去川口逺聲援遼絶共以其語言之執政執政力言於上乞下詔旋軍捍蜀詔至王即馳檄諸軍諭以朝廷欲重根本之意俾擇利而退繼上表待罪曰蜀門雖固三路難保歸師死戰不無損傷聞者惜之未幾復詔出兵與張浚淮上之師相犄角賜王親札曰前日德順囘歸道逺不知卿籌畫朝廷過慮致失機會以此知退師本非上意也王初得是㫖幕府請復奏曰茍利社稷專之可也此舉所係甚衆兵不可遽退王愀然曰璘豈不知此且三路士馬所出糧食所聚吾舊兵已老非假三路兵未易與金角今新附之衆幾十餘萬仰給三路圭勺不取外府而四民樂輸此誠恢復之基也議者憂金擣蜀口之虚璘百戰從軍豈不知敵情且金持重必顧慮而後進方和尚原時我内外至危急金以璘兄弟扼其後終不敢輕向蜀况今海陵死金内訌未乆喀齊喀盡兵屯德順城下猶不能抗我豈暇他謀但主上即位之初璘握重兵在逺朝廷俾以詔書從事璘敢違詔耶幕府語塞金犯天水侵岷州王病未愈徑趨城州分麾下擊之金小却列營茅城谷王力疾親提兵至祁山金聞之退師三十里據黄家街深溝高壘以守王曰金深涉吾地而乃堅壁自固且黄家街背鞏州去巢穴近金必遁未幾果使來告曰吾國中已與大朝講和矣繼被詔命即抗章請朝上以親札報可即以族行未半道奏疏乞解宣撫優詔不允乞致仕復不許到闕上遣中使鄭邦美勞問賜賚加等即召對便殿上慰諭隆渥面得㫖許朝德壽宮太上見王慨念疇昔諭王曰朕與卿老君臣也自今可數入見王頓首謝兩宮存勞之使相踵御府異饌賜無虚日先是許立家廟祭五室及是就頒祭器有㫖許皇子復謁示異禮也觀者歎息以為前此未有三上章懇辭遣中使詔諭不允諸子侍王入見皆䝉異數恩禮赫奕寵絶一時未幾詔還鎮兩宮燕餞禮均家人王入辭德壽宮奏曰臣年近七十衰病日侵違離闕庭且萬里恐不復再瞻天日因泣下太上亦為垂涕親解所佩刀賜王曰異時思朕視此可矣王之行也兩宮别賜珍器玉帶甚寵王復至漢中時息兵已踰年王專留意民事問民所疾苦漢中之民甚利之上降詔嘉奬王移漢中開府未幾得疾遂請老先旬日有大星殞至是王薨軍民號哭失聲至於罷市訃聞上震悼輟視朝兩日王之未病也呼其幕客曰為我草遺表客曰郡王安寧如此何遽出此不祥語王曰死生之機黙存吾胸中人安得知君第為之止直書其事且曰願陛下母棄四州毋輕出兵又先數日封遺事付其家令母啓之薨之數日啓封則家廟等數事語不及他嗚呼可謂死不忘君孝養於其親矣四川制置使王剛中嘗談劉錡之美王曰信叔有雅量而無英槩今天下雷同譽之恐不能當勁敵璘竊憂之剛中未領其語已而錡果以憂憤卒剛中始歎服選諸將多以功或告以薦才者曰兵官非嘗試難知其才今以小善進之則僥倖者得志而邊人宿將之心怠矣以故其用王彦姚仲李師顔向起皆以功顯為時名將平居軍旅之外家事一不問舍俸入不營一錢王每出師指麾諸將風采凜然不敢仰視士寧死敵無敢犯令故用兵未嘗敗尤長於持勝方金人之歸河南議移屯陜右王獨乞留兵不出且益修階州等山寨其後息兵二十餘年未嘗一日弛兵備德順班師首築皂郊等堡多掘地網祁山之戰賴之蜀之為國岩僻而固有天下者所必爭也漢高祖起南鄭舉兵而東收三秦如破竹不數年間成帝業而以蜀漢之地為關輔心腹不以封建葢其歛迹埀翅有窺天下之變間中州之有事因河渭之上流裹糧卷甲起而乘之足以得志兹太上皇帝選將勵兵之夙心而皇上宅中圖大之本指也故王之在蜀上實詔之曰異時掃清中原勒功帝籍以垂光億世又詔之曰宜即提鋭卒直出漢中弔秦晉之遺民撫唐虞之都會又詔之曰關隴之事一以付卿三路士多材勇不患無人惟卿駕馭激使之耳嗚呼聖天子以終蜀之事屬於王其注意如此王能任之是以蜀安之後定秦定隴洮蘭煕鞏十有六州束戈提疆受命下吏虜失形勝埶恧技窮讋我威靈向風慕義於是退師通好之令行矣一日皇上擁乾休正坤儀指咸陽而會龍首作上都而觀萬國則王之餘勇遺烈凜凜生氣尚可想而知也然則保蜀之功其可既乎宋名臣言行錄别集卷九
