body:
  text: 宋名臣言行錄前集巻四宋朱子纂集畢士安文簡公字仁叟代州人舉進士相真宗端拱中詔王府官各上所為文帝問近臣曰文吾既知之其行孰優皆以公對帝喜曰是也以本官知制誥召為翰林學士大臣以張洎言帝曰洎視士安詞義踐厯固不減但履行逺在其下耳契丹謀入冦公首疏五事陳選將餉兵理財之䇿甚備帝多納用中書闕宰相乃進公參政入謝帝曰未也行且相卿然時方多事求與卿同進者其誰可曰冦凖兼資忠義善斷大事此宰相才也帝曰聞其剛使氣對曰凖資方正慷慨有大節忘身狥國秉道疾邪此其素所蓄積也朝臣罕出其右者苐不為流俗所喜今天下之民雖䝉休徳涵養安佚而西北跳梁為邉境患若凖者所宜用也帝曰然當藉卿宿徳鎮之不閲月拜公本官平章事冦公並命而以公監修國史位在上既而契丹益犯邉北州皆警二公始合議請帝幸澶淵公雖貴奉養無異平素未嘗殖産為子孫計故天下稱其清王文正為相嘗面奏曰士安仕至輔相而四海無田園居第沒未終喪家用已絀今其妻貸于臣家其不負陛下可見矣並劉莘老撰神道碑真宗詔選官校勘三國志晉唐書或言兩晉事多鄙惡不可流行者上以語宰相公曰惡以戒世善以勸後善惡之事春秋備載上然之命刋刻蓬山志冦凖萊國忠愍公字平仲華州人中進士第相真宗太宗幸魏時公年十六以父陷蕃上書行在辭色激昻舉止無畏上壯之命有司記姓名後二年進士及第寖以貴顯遺事公年十九舉進士時太宗取人多問其年年少者往往罷遣或教公増其年公曰吾初進取可欺君耶知歸州巴東縣每期㑹賦役不出符移唯具鄉里姓名掲縣門民莫敢後者嘗賦詩有野水無人渡孤舟盡日横之句時以為若得用必濟大川手植雙栢于縣庭至今民以比甘棠謂之萊公栢政要太宗時公為員外郎奏事忤上㫖上拂衣起欲入禁中公手引上衣令上復坐決其事然後退上由是嘉之嘗曰朕得冦凖猶唐文皇之得魏鄭公也記聞太宗時一嵗大旱天子以為憂嘗輦過館中汎以問衆皆曰水旱天數也堯湯所毋奈何凖獨曰朝廷刑罰偏頗凡天旱為是發耳上怒起入禁中頃之召凖問所以偏頗狀凖曰願召兩府至前臣即言之有詔召兩府入凖乃言曰某子甲坐贓若干少爾罪乃至死參政王沔其弟淮盗所主財至千萬以上顧得不死刑罰非偏而何上顧問沔沔頓首謝即皆罷去其暮遂大雨上大喜以凖可用遂驟進劉貢父撰萊公傳公性忠朴喜直言無顧避時人語曰冦凖上殿百僚股栗遺事公在青州太宗乆不豫驛召還問後事公曰知子莫若父臣愚不當與也固問之公再拜曰臣觀諸皇子惟夀王得人心上大悦遂定䇿以夀王為太子謁太廟還六宫登樓以觀百姓皆合手叩額歌呼相慶曰少年天子也遺事契丹犯澶淵急書一夕凡五至萊公不發封飲笑自如明日同列以聞真宗大駭取而發之皆告急也大懼以問公曰陛下欲了欲未了耶曰國危如此豈欲乆耶曰陛下欲了不過五日爾其説請幸澶淵上不語同列懼欲退公曰士安等止候駕起從駕而北上難之欲還内公曰陛下入則臣不得見而大事去矣請無還而行也遂行六軍百司追而及之談叢天子北巡至澶州敵騎已過魏府矣上疑不欲渡河駐南澶州凖勸上北渡以固衆心毋令敵得乘勝上猶豫未決時陳堯叟勸上避之蜀王欽若勸上避之金陵上以問凖凖曰誰為陛下畫此計者上曰顧所畫何如耳毋問其名凖曰臣姑欲知之先斬此曹以令天下且先帝建都埀五十年天下財用兵甲聚于京師宗廟社稷之所寄也不幸有事陛下當與臣等以死守之今一旦棄去非復陛下所有若盗賊因縁而起陛下當何歸乎上喟然凖又勸上北渡上猶未決因起更衣凖亦下殿去時髙瓊為殿前都指揮使宿衛殿下凖謂瓊曰事當奈何太尉胡不一言瓊曰相公謀之廟堂瓊何敢與知然相公所以謂上何準曰今渡河則河北不勞力而定不渡則敵日益熾人心不敢自固雖有智者不能善其後矣瓊呼曰陛下聴凖語凖言是也上還問之語良乆凖即趣瓊以其兵先渡又自牽馬奉上上乃從之既至澶州上御城北門凖居上前上盡以軍事委凖凖因承制専決號令明肅士卒喜悦敵數千騎乘勝薄城下有詔吏士迎擊之斬獲大半敵乃引退不敢復逼㑹暮上還宫留凖居城上上使人視凖何為曰凖方飲酒歌笑上未嘗不釋然也相持十餘日契丹計索始請和既有約矣又率其衆詐欲填壕㑹有飛矢射其統軍殺之契丹大擾其請和遂益堅凖不肯敵使來益恭上將許之凖欲邀使稱臣且獻幽州地時上厭兵事于是有譛凖不願與敵平幸有兵事以自取重上亦不悦凖不得已許之時敵舉國來冦入中國千餘里其歸不十日不能出漢地郡邑堅壁清野以待冦敵人馬飢乏百萬之衆可毋戰而死敵窘如此誠少抑緩之契丹不敢不稱臣幽州可必得也萊公傳上至澶州賊猶未退公曰六軍心膽在陛下身上今若登城必擒賊矣上因御澶之北門將士望見黄屋皆呼萬嵗聲震原野勇氣百倍遺事公在澶淵每夕與楊億飲博謳歌諧謔喧呼常達旦或就寢則鼾息如雷上使人覘之喜曰得渠如此吾復何憂記聞敵請和上以問公公曰如用臣䇿可數百年無事不然四五十年後臣恐戎心又生矣上曰朕不忍生靈受困不如且聴其和四五十年後安知無能捍塞者乎戎遂得和遺事敵既退來求和親命曹利用與之約時契丹已疲又懼鎮定大兵扼其歸路見利用至甚喜寢以珠縁貂褥敵主求割河北利用曰如此臣得族罪矣不敢以聞許嵗給金繒二十萬敵嫌其少利用復還奏之上曰百萬以下皆可許也凖召利用語之曰雖有勑㫖汝往所許毋得過三十萬過三十萬勿来見凖凖將斬汝利用股栗再至敵帳果以三十萬成約而還記聞和議成諸將請設伏邀擊可使敵匹馬不返公勸帝勿從縱敵歸國以保盟好聞見錄真宗之次澶淵也一日語公曰今敵騎未退而天雄軍截在賊後萬一陷沒則河朔皆敵境也何人可為朕守魏公曰當此之際無方畧可展古人有言智將不如福將臣觀參政王欽若福禄未艾宜可為守于是即時進殿出勑退召欽若諭以上意授勑俾行欽若茫然自失未及有言公遽曰主上親征非臣子辭難之日參政為國柄臣當體此意馹騎已集仍放朝辭便宜就塗身乃安也遽酌大白飲之命曰上馬盃欽若驚懼不敢辭飲訖拜别公答拜曰參政勉之回日即為同列也欽若馳入魏則戎敵滿野無以為計但屯塞四門終日危坐越數日敵退乃召為次相或云王公數進疑辭于上前故公因事出之以成勝敵之績耳東軒筆錄章聖嘗謂兩府欲擇一人為馬步軍指揮使公方議其事吏有以文籍進者公問其故曰例簿也公曰今朝廷欲用一牙官尚須檢例耶安用我輩哉壊國政者正由此耳遺事上既回鑾每歎公之功小人或譛之曰陛下知博乎錢輸將盡取其餘盡出之謂之孤注陛下冦凖之孤注也尚何念帝聞之驚甚公眷禮遂衰聞見錄公鎮大名府北使道由之謂公曰相公望重何以不在中書公曰皇上以朝廷無事北門鏁鑰非凖不可掇遺大中祥符元年正月天書降于宫中承天門天子以改元六月又降于泰山是嵗十月封泰山間二嵗祀后土汾隂天子奉天書謹甚載以玉輅天書所行天子不敢當其道居無何復有神降于延恩殿號稱天尊天子親自見之上于是益崇飭祀事自天書始降則築昭應宫其後復置㑹靈景靈之屬祀老子于亳州天下無慮皆神事矣凖是時出為外官又不信天書上益疏凖最後知京兆府都監朱能復獻天書上以問王旦旦曰始不信天書者凖也今天書降凖所當令凖上之則百姓將大服而疑者不敢不信也上從之使中貴人逼凖朱能素事宦者周懐政而凖壻王曙居中與懐政善勸凖與能合凖始不肯曙固要凖凖亦因此復為中書侍郎同平章事天禧三年也萊公傳天禧末真宗寢疾章獻太后漸預朝政上意不能平公探此意遂欲廢章獻立仁宗尊真廟為太上皇而誅丁謂曹利用等于是引李迪楊億曹瑋盛度李遵朂等協力處畫已定凡誥命盡使億為之且將舉事㑹公因醉漏言有人馳報謂謂夜乘犢車往利用家謀之明日利用入盡以公所謀白太皇遂矯詔罷公政事及真宗上仙遂指公為反而投海上其事有類上官儀者天下寃之億臨死取當時所為詔誥及始末事迹付遵朂收之章獻上仙遵朂乃抱億所留書進呈仁宗及叙陳本末仁宗盡見當日曲直感嘆再三遂下詔湔滌其寃贈中書令謚曰忠愍筆錄公好士樂善不倦丁謂种放之徒皆出其門嘗語所親曰丁生誠竒材惟不堪重任公為相謂參政嘗㑹食都堂羮染公鬚謂起拂之公正色曰身為執政而親為宰相拂鬚耶謂慙不勝公恃正直而不虞巧佞故卒為所陷遺事公為樞使利用為副公以其武人輕之議事有不合者輙曰君一夫耳豈解此國家大體利用由是銜之真宗將立劉氏公及王旦向敏中皆諌議為出于側㣲不可劉氏宗人横于蜀奪民鹽井上以后故欲捨之公固請行法時上已不豫不能記覽政事多宫中所決丁知曹冦不能平遂與利用合謀請罷公政事除太子太傅上初不知嵗餘忽問左右吾目中乆不見冦凖何也左右亦不敢言上崩太后稱制公再貶雷州記聞公始謫道州司馬素無公宇百姓聞之競荷瓦木不督而㑹公宇立成頗亦宏壯守土者聞于朝遂再有海康之行倦逰錄公貶雷州丁謂遣中使賫勑往授之以錦囊貯劒掲于馬前既至公方與郡官宴飲驛吏言狀公遣郡官出迎之中使避不見入傳舍中乆之不出問其所以来之故不答上下皆惶恐不知所為公神色自若使人謂之曰朝廷若賜凖死願見𠡠書中使不得已授之公拜受于庭升階復宴飲至暮罷記聞公貶死于雷詔還葬洛陽過公安民皆迎祭哭其喪斬竹挿地以掛紙錢焚之尋復生筍成林邦人神之號曰相公竹因立廟其旁麈史及名臣傳公赴貶雷州道出公安剪竹挿于神祠之前而祝曰凖心若負朝廷此竹必不生若不負朝廷此枯竹當再生其竹果生筆錄此説與前二書異意前説為是公少時不修小節頗愛飛鷹走狗太夫人性嚴嘗不勝怒舉秤鎚投之中足流血由是折節從學及貴母已亡每捫其痕輙哭記聞公初為樞宻直學士賞賜金帛甚厚乳母泣曰太夫人不幸時家貧求一縑作衾襚不可得豈知今日富貴哉公聞之慟哭盡散金帛終身不蓄財産公外奢内儉無聲色之娱寢處一青幃二十餘年時時有破壊益命補葺或以公孫𢎞事靳之笑答曰彼詐我誠雖弊何憂且不忍處之乆而以弊復棄也遺事處士魏野贈公詩曰有官居鼎鼐無宅起樓臺及上即位北使至賜宴兩府預坐北使厯視坐中問譯者曰誰是無宅起樓臺相公坐中無答丁謂令譯者謂曰朝廷初即位南方須大臣鎮撫冦公暫撫南夏非乆即還政要鄧州花蠟燭名著天下雖京師不能造相傳云是公燭法公嘗知鄧州而自少年富貴不㸃油燈尤好夜宴劇飲雖寢室亦燃燭達旦每罷官去後人至官舍見厠溷間燭淚成堆杜祁公為人清儉在官未嘗燃官燭油燈一炷熒然欲滅與客相對清談而已二公皆為名臣而奢儉不同如此然祁公夀考終吉萊公晚有南遷之禍雖其不幸亦可以為戒也歸田錄王元之之子嘉祐為館職平時若愚騃獨公知之喜與之語公知開封府一旦問嘉祐曰外人謂劣丈云何嘉祐曰外人皆云丈人旦夕入相公曰于吾子意何如嘉祐曰以愚觀之丈人不若未為相為善相則譽望損矣公曰何故曰自古賢相所以能建功業澤生民者其君臣相得如魚之有水故言聴計從而功名俱美今丈人負天下重望相則中外有太平之責焉丈人之于明主能若魚之有水乎此嘉祐所以恐譽望之損也公喜起執其手曰元之雖文章冠天下至于深識逺慮殆不能勝吾子記聞張忠定守蜀聞公大拜曰冦凖真宰相也又曰蒼生無福門人李畋怪而問之曰人千言而不盡者凖一言而盡然仕太早用太速不及學耳張冦布衣交也公兄事之忠定常面折不少恕雖貴不改也公在岐忠定自蜀還不留既别顧公曰曽讀霍光傳否曰未也更無他語公歸取其傳讀之至不學無術笑曰此張公謂我矣談叢張乖崖常稱使公治蜀未必如詠至澶淵一擲詠亦不敢為也記聞公南行至雷陽吏以圖獻閲視之首載郡東南門抵海岸凡十里凖恍然悟曰吾少時有到海秖十里過山應萬重之句迺今日意爾人生得䘮豈偶然耶旌忠碑公貶雷州時丁謂與馮拯在中書丁當秉筆初欲貶崖州而丁忽自疑語馮曰崖州再涉鯨波如何馮唯唯而已丁乃徐擬雷州丁之貶也馮遂擬崖州當時好事者相語曰若遇雷州冦司戸人生何處不相逢比丁之南也冦復移道州冦聞丁當来遣人以蒸羊逆于境上而收其僮僕杜門不放出聞者多以為得體歸田錄髙瓊衛國烈武王家世燕人徙亳州事太宗真宗官至太尉曽孫女配英宗為宣仁聖烈皇后上在澶淵南城瓊請幸河北曰陛下不幸北城百姓如喪考妣馮拯在旁呵之曰髙瓊何得無禮瓊怒曰君以文章為大臣今敵騎充斥如此猶責瓊無禮君何不賦一詩詠退敵騎耶上乃幸北城至浮橋猶駐輦未進瓊以所執撾築輦夫背曰何不亟行今已至此尚何疑焉上乃命進輦既至登北城門樓張黄龍旗將士皆呼萬嵗㑹敵將達蘭中弩死敵遂退他日上命凖召瓊詣中書戒之曰卿本武臣勿強學儒士作書語也記聞太祖與文臣言未嘗文談葢欲激厲將士此漢髙祖溺冠之意也至太宗好文方戰爭之時多作詩賦羣臣屬和故武事不競卒有潘美之敗及澶淵之役章聖既渡大河至浮橋一半瓊執御轡曰此處好喚宰相吟兩首詩也葢當時宰相王欽若陳堯叟輩好為詩賦以薄此輩故平日憾之而有此語元城語錄真宗嘗問卿子幾人曰臣子十有四人臣誠愚不肖然未嘗不教以知書于是賜諸經史于其家每戒諸子母曲事要勢以蘄進身若吾奮節行間至秉旄鉞豈因人力哉王禹玉撰神道碑楊億文公字大年建州人以神童召試事太宗真宗官至翰林學士公年十一太宗親試一賦二詩頃刻而成上喜送中書再試執政令賦喜朝京闕詩亦立就且有願秉清忠節終身立聖朝之句宰相表賀野錄公每欲作文與門人賔客博飲投壺奕棋語笑諠譁而不妨締思以小方紙細書揮翰如飛文不加㸃每盈一幅則命門人傳錄門人疲于應命頃刻之際成數千言真一代之文豪也歸田錄公凡為文所用故事常令諸生子弟檢討出處每叚用小片紙錄之既成則綴粘所錄而蓄之時人謂之衲被焉家塾記公為學士時草答契丹書云鄰壤交歡進草既入真宗自注其側云朽壤鼠壤糞壤大年遽改為鄰境明旦引唐故事學士作文書有所改為不稱職當罷因亟求解職真宗語宰相曰楊億不通商量真有氣性歸田錄公以文章擅天下然剛勁寡合有惡之者以事譛之大年在學士院忽夜召見于一小閤深在禁中既見賜茶從容顧問乆之出文稿數篋以示大年云卿識朕書蹟乎皆朕自起草未嘗命臣下代作也大年惶恐不知所對䪺首再拜而出乃知必為人所譛矣並歸田錄公因母病有陽翟之行王文正恐人害之白上遣使賜藥既而言事者彈劾不已卒以亞卿分司上嘗語輔臣曰聞楊億好謗時政王公曰億文人幼荷國恩若諧謔過當則恐有之至于謗訕臣保其不為也掇遺公為執政所忌母病謁告不俟朝㫖徑歸韓城與弟倚居踰年不調公有啟謝朝中親友曰介推母子願歸綿上之田伯夷弟兄甘受首陽之餓後除知汝州而希㫖言事者攻之不已公又有啟與親友曰己擠溝壑猶下石而未休方困蒺䔧尚關弓而相射青箱雜記丁謂初參政億例賀焉語同列曰骰子選爾何多尚哉未幾辭親疾逃陽翟别墅掇遺公以直道獨立時有挾邪説以進者面戲公曰君子知㣲知章知柔知剛公應聲答曰小人不恥不仁不畏不義家塾記范文正贊公畫像曰公以命世之才其位不充故天下知公之文而未知公之道也昔王文正公居宰府僅二十年未嘗見愛惡之迹天下謂之大雅萊公當國真宗有澶淵之幸而能左右天子如山不動却戎狄保宗社天下謂之大忠樞宻扶風馬公慷慨立朝有犯無隠天下謂之大直此三君子者一代之偉人也公與三君子深相交許情如金石則公之道其正可知矣王曙文康公字晦叔河南人中進士第又舉賢良方正科相仁宗公知益州賊盗贓無輕重一切戮之蜀中股慄不數月賊屏竄列郡皆外戸不閉先是張詠守蜀季春糶廩米其價比時估三之一以濟貧民凡十戸為一保一家犯罪一保皆坐不得糴民以此少敢犯法至是獻議者改詠之法窮民無所濟復為盗公奏復之名臣傳公治蜀頗以法御下有謗其太苛㑹劉煜召還為右正言真宗召問凌䇿王曙治蜀孰優曰凌䇿在蜀值嵗豐故得以平易治之王曙值嵗歉慮民為盗故以法治之使易地則皆然上善其言同上公與薛簡肅公俱嘗鎮蜀而皆有名章獻時同為執政一日奏事已因語蜀事公曰臣在蜀時有告戍卒反乃執而斬之于營門遂無事薛曰臣在蜀時亦有告戍卒反者叱出之亦無事野錄玉清昭應宮災守衛者皆坐繫獄公上疏曰昔魯桓僖宮災孔子以為桓僖親盡當毁者也遼東髙廟及髙園陵便殿災董仲舒以為髙廟不當居郡國便殿不當居陵旁故災魏崇華殿災髙堂隆以為天以臺榭宮室為戒宜罷勿治文帝不聴明年復災今所建宮不應經義災變之來若有警者願除其地罷諸禱祠以應天變仁宗與太后感悟遂薄守衛者罪已而詔以不復繕修諭天下謝希深歐陽永叔官洛陽時同游嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳歌妓至且勞之曰山行良勞少留龍門賞雪府事簡無遽歸也錢遇諸公之厚類此公代錢為留守御吏如束濕諸公俱不堪其憂日訝其多出游責曰公等自比萊公何如萊公尚坐奢縱取禍貶死況其下者乎希深而下不敢對永叔取手板起立曰莱公之禍不在杯酒在老不知退爾時公年已髙若為之動卒薦永叔入館聞見錄宋名臣言行錄前集巻四
