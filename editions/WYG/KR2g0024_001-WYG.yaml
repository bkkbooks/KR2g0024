body:
  text: 宋名臣言行錄前集巻一宋朱子纂集趙普韓國忠獻王字則平幽州人事太祖太宗位至中書令配享太祖廟庭普為滁州判官太祖與語竒之㑹獲盜百餘人將就死普意其有寃啟太祖更訊之所全活十七八范蜀公䝉求太祖既得天下誅李筠李重進召普問曰天下自唐季以來數十年間帝王凡易十姓兵革不息蒼生塗地其故何也吾欲息天下之兵為國家建長乆之計其道何如普曰陛下之言及此天地人神之福也唐季以來戰鬭不息國家不安者其故非它節鎮太重君弱臣強而已今所以治之無它竒巧惟稍奪其權制其錢榖收其精兵則天下自安矣語未畢上曰卿勿復言吾已諭矣頃之上因晚朝與故人石守信王審琦等飲酒酣上屏左右謂曰我非爾曹之力不得至此念汝之徳無有窮已然為天子亦大艱難殊不若為節度使之樂吾今終夕未嘗敢安枕而卧也守信等皆曰何故上曰是不難知居此位者誰不欲為之守信等皆惶恐頓首曰陛下何為出此言今天命已定誰敢有異心上曰不然汝曹雖無心其如汝麾下之人欲富貴者何一旦以黄袍加汝身汝雖欲不為不可得也皆頓首涕泣曰臣等愚不及此惟陛下哀憐指示可生之塗上曰人生如白駒過隙所為好富貴者不過欲多積金錢厚自娱樂使子孫無貧乏耳汝曹何不釋去兵權擇便好田宅市之為子孫立永乆之業多置歌兒舞女日飲酒相歡以終其天年君臣之間兩無猜嫌上下相安不亦善乎皆再拜謝曰陛下念臣及此所謂生死而肉骨也明日皆稱疾請解軍權上許之皆以散官就第所以慰撫賜賚之甚厚與結婚姻更置易制者使主親軍其後又置轉運使通判使主諸道錢榖收選天下精兵以備宿衛而諸功臣亦以善終子孫富貴迄今不絶鄉非韓王謀慮深長太祖聰明果斷天下何以治平至今戴白之老不覩干戈聖賢之見何其逺哉普為人隂刻當其用事時以睚眦中傷人甚多然其子孫至今享福禄國初大臣鮮能及者得非安天下之謀其功大乎太祖既納韓王之謀數遣使者分詣諸道選擇精兵凡其材力伎藝有過人者皆收補禁軍聚之京師以備宿衛厚其粮賜居常躬自按閲訓練皆一以當百諸鎮皆自知兵力精鋭非京師之敵莫敢有異心者由我太祖能強幹弱枝制治于未亂故也太祖寵待韓王如左右手御史中丞雷徳驤劾奏普強市人第宅聚歛財賄上怒叱之曰鼎鐺尚有耳汝不聞趙普吾之社稷臣乎命左右曳于庭數匝徐使復冠召升殿曰今後不宜爾且赦汝勿令外人知也並涑水記聞太祖即位之初數出㣲行以偵伺人情或過功臣家不可測普每退朝不敢脱衣冠一日大雪向夜普謂帝不復出矣乆之聞叩門聲普亟出帝立風雪中普惶懼迎拜帝曰巳約晉王矣已而太宗至共於普堂中設重䄄地坐熾炭燒肉普妻行酒帝以嫂呼之普從容問曰夜乆寒甚陛下何以出帝曰吾睡不能著一榻之外皆它人家也故來見卿普曰陛下小天下耶南征北伐今其時也願聞成算所向帝曰吾欲下太原普黙然乆之曰非臣所知也帝問其故普曰太原當西北二邉使一舉而下則二邉之患我獨當之何不姑留以俟削平諸國則彈丸黒子之地將無所逃帝笑曰吾意正如此特試卿耳遂定下江南之議帝曰王全斌平蜀多殺人吾今思之猶耿耿不可用也普于是薦曹彬為將以潘美副之邵氏聞見錄太祖欲使符彦卿典兵韓王屢諌以為彦卿名位已盛不可復委以兵柄上不聴宣已出韓王復懐之請見上曰卿苦疑彦卿何也朕待彦卿至厚彦卿能負朕耶王曰陛下何以能負周世宗上黙然遂中止記聞太祖一日以幽燕地圖示中令問所取幽燕之䇿中令曰圖必出曹翰帝曰然又曰翰可取否中令曰翰可取孰可守帝曰以翰守之中令曰翰死孰可代帝不語乆之曰卿可謂逺慮矣帝自此絶口不言伐燕至太宗因平河東乘勝欲搗燕薊時中令鎮鄧州上疏力諌其憂國愛民之深言出乎文章之外雖雜陸宣公論事中不辨也聞見錄普嘗欲除某人為某官不合太祖意不用明日復奏之又不用明日又奏之上怒取其奏壊裂投地普顔色自若徐拾奏歸補綴明日復進之上乃悟用之後果稱職太祖時嘗有羣臣立功當遷官上素嫌其人不與普堅以為請上怒曰朕固不為遷官將若何普曰刑以懲惡賞以酬功古今通道也且刑賞者天下之刑賞非陛下之刑賞也豈得以喜怒専之上怒甚起普亦隨之上入宮普立於宮門乆之不去上悟乃可其奏並記聞普為相於㕔事坐屏後置二大甕凡有人投利害文字皆置中滿即焚於通衢聞見錄太祖嘗與普議事不合曰安得宰相如桑維翰者與之謀乎普對曰使維翰在陛下亦不用葢維翰愛錢上曰茍用其長亦當䕶其短措大眼孔小賜與十萬貫塞破屋子矣楊文公談苑太祖豁達既得天下普屢以㣲時所不足者言之欲潛加害上曰不可若塵埃中總教識天子宰相則人皆去尋也自後普不復敢言普公談錄普秉政江南後主以銀五萬兩遺普普白太祖太祖曰此不可不受但以書答謝少賂其來使可也既而後主遣弟從善入貢常賜外宻賚白金如遺普之數江南君臣始震駭上之偉度談苑太祖忽幸普第時兩浙錢俶方遣使致書及海物十瓶於普置在左廡下㑹車駕至倉卒出迎不及屏也上顧見問何物普以實對上曰此海物必佳即命啟之皆滿貯𤓰子金也普惶恐頓首謝曰臣未發書實不知若知之當奏聞而却之上笑曰取之無慮彼謂國家事皆由汝書生耳因命普謝而受之記聞始為相太祖命薛居正呂餘慶參知政事以副之不知印不奏事不押班但奉行制書而已事無大小一決於王開寳中盧多遜因對屢攻其短雷有鄰復奏其庇吏受賕上怒下御史府案問抵吏罪詔參知政事更知印押班奏事以分其權王性深沈有岸谷多忌刻以吏道聞寡學術太祖嘗勸以讀書晚年手不釋巻為相以天下為已任沈毅果斷當世無與為比昭憲太后聰明有智度嘗與太祖參決大政及疾篤太祖侍藥餌不離左右太后曰汝知所以得天下乎上曰此皆祖考與太后之餘慶也太后笑曰不然正由柴氏使幼兒主天下耳因戒太祖曰汝萬嵗後當以次傳之二弟則并汝之子亦獲安矣太祖頓首泣曰敢不如母教太后因召普於榻前為約誓書普於紙尾自署名云臣普書藏之金匱命謹宻宮人掌之及太宗即位普為多遜所譛出守河陽日夕憂不測上一旦發金匱得書大悟遂遣使急召之普惶恐為遺書與家人别而後行既至復為相並記聞太平興國中朝士祖吉典郡奸贓事覺下獄時郊禮將近太宗怒其貪墨諭百執政特俾郊赦不宥普奏曰敗官抵罪宜正刑辟然國家卜郊肆類所以對越天地告休神明吉本何人安足以隳改陛下赦令哉上善其對而止沂公筆錄彌徳超自冗列為諸司使驟被委遇誣奏曹彬有不軌謀太宗疑之拜徳超樞宻副使不數月普拜相因為辯雪上乃大悟即逐徳超而待彬如故自是數日上頗不懌從容謂普曰朕以聴斷不明幾悟大事夙夜循省内愧于心普對曰陛下知徳超才幹而任用之察曹彬無罪而昭雪之有勞者進有罪者誅物無遁情事至立斷此所以彰陛下之明聖也雖堯舜何以過哉上于是釋然沂公筆談李繼遷擾邉太宗用普計封趙保忠守夏臺故地令滅之保忠反與繼遷合謀大為邉患玉壺清話曹彬濟陽武惠王字國華真定人事太祖太宗真宗位至樞宻使配享太祖廟庭太祖始事周世宗于澶州彬為世宗親吏掌茶酒太祖嘗從求酒彬曰此官酒不敢相與自沽酒以飲太祖既即位語羣臣曰世宗舊吏不欺其主者獨曹彬耳由是委以腹心使監征蜀之軍記聞大舉伐蜀以王為都監時諸將皆欲屠城殺降以逞威暴唯王申禁戢之令明勸賞之法繇是乘破竹之勢不血刃而峽中郡縣悉下兩川平王與諸將㑹成都大將王全斌等日夕縱酒不恤軍事部下列校皆求取無厭蜀人苦之王屢勸全斌宜速振旅凱旋全斌等逗留不發卒致全師雄等作亂郡縣相應盜賊蠭起王與崔彦進悉力剪平之洎全斌等歸闕太祖盡得全斌等所為事狀又面詰王仁贍仁贍厯詆諸將奢縱不法事冀以自解止言清慎亷恪惟曹彬一人耳太祖怒全斌等並下吏議即日授王宣徽南院使充義成節度使王獨懇請曰收蜀將校皆得罪臣以無功獨䝉厚賞恐無以勸天下太祖笑曰卿有茂功加以不伐設有㣲累仁贍肯惜言哉夫懲惡勸善所以勵臣子也王不敢辭李宗諤撰行狀彬討蜀初克成都有獲婦女者彬悉閉于一第竅以度食且戒左右曰是將御當宻衛之洎事罷咸訪其親以還之無者備禮以嫁之及師還輜重甚多或譛言悉竒貨也太祖宻令伺之圖書也無銖金寸錦之附焉掇遺仁贍自劒南獨先歸闕乞見厯數王全斌等貪縱之狀太祖笑謂曰納李廷珪女擅開豐徳庫取金寳此又誰耶仁贍惶怖叩伏待罪曰此行清介畏慎止有曹彬一人爾記聞太祖遣王全斌等平蜀全斌殺降兵三千人時曹彬不從但收其文案不署字及師還太祖傳宣送中書取勘左右曰方克復西蜀回雖殺降兵亦不可便案劾今後陛下如何用人太祖曰不然河東江南皆未歸服若不勘劾恐今後委任者轉亂殺人但且令勘劾洎勘案成宣令後殿見責問曰如何敢亂殺人又曰曹彬但退不干你事曹不退但叩頭伏罪曰臣同商議罪合誅戮太祖遂皆原之後忽一日宣曹并潘美曰命汝收江南又顧曹曰更不得似往時西川亂殺人曹徐奏曰臣若不奏恐陛下未知曩日西川殺降之事臣曽商量固執不下臣見收得當日文案元不著字太祖令取覽之謂曰如此則當時何故堅執服罪曰臣初與全斌等同被委任若全斌等獲罪臣獨清雪不為穏便所以一向服罪太祖曰卿既欲自當罪又安用留此文字曰臣初謂陛下必行誅戮故留此文書令老母進呈乞全老母之命太祖尤器遇之晉公談錄太祖遣曹彬潘美征江南彬辭才力不迨乞别選能臣潘美盛言江南可取帝大言諭彬曰所謂大將者能斬出位犯分之副將則不難矣美汗下不敢仰視將行夜召彬入禁中帝親酌酒彬醉宮人以水沃其面既醒帝撫其背以遣曰㑹取㑹取他本無罪只是自家著他不得葢欲以恩徳來之也是故以彬之厚重美之明鋭更相為助令行禁止未嘗妄戮一人而江南平聞見錄彬累遣告城中大軍決取十一月二十七日破城宜早為之圖後主將遣其愛子清源郡公仲寓入覲至仲冬下旬日日克期仲寓未出彬累遣督之言郎君到寨四面即罷攻後主終惑左右之言以為堅壘如此天象無變豈可計日而取葢敵人之言豈足為信但報言行李之物未備宮中之宴餞未畢將以二十七日出彬又令懇言至二十六日亦無及矣果以是日城陷整軍成列至其宮城門後主方開門奉表納降彬答拜為之盡禮先是宮中預積薪後主誓言若社稷失守當携血屬以赴火既見彬彬諭以歸朝俸賜有限費用至廣當厚自齎裝既歸有司之籍則無及矣遣後主入治裝禆將梁逈田欽祚皆力爭以為茍有不虞咎將誰執彬曰非爾所知觀煜神器懦夫女子之不若豈能自引決哉煜果無他彬遣五百人為搬致輜重登舟後主既失國殊無心問家計所賫特鮮矣談苑江南官吏親屬有為軍士所掠者王即時遣還之因大搜軍中無得匿人妻女振乏絶恤鰥寡吳人大悦及歸舟中無它物惟圖籍衣被而已行狀彬攻金陵垂克忽稱疾不視事諸將皆來問疾彬曰余之病非藥石所愈唯須諸公共發誠心自誓以克城之日不妄殺一人則自愈矣諸將許諾共焚香為誓明日稍愈及克金陵城中皆安堵如故曹翰克江州忿其乆不下屠戮無遺彬之子孫貴盛至今不絶翰卒未三十年子孫有乞匄于海上者矣記聞太祖遣彬等下江南許以平定之日授之相印洎凱旋恩禮愈厚而絶無前命彬等因曲宴從容陳叙及之上曰非忘之也頋念河東未下而卿等官位隆重豈可更親此事耶彬等宴退其家各賜錢百萬其重爵勸功若此沂公筆錄彬怏怏而退至家見錢滿室乃歎曰好官亦不過多得錢耳何必使相也記聞以功拜樞宻使王在宥宻常公服危坐如對君父接小吏亦以禮未嘗以名呼歸私第唯閉閤宴居不妄通賔客五鼓纔動巳待漏于禁門矣雖雪霜不易其操如此者八年行狀嘗知徐州有吏犯罪既立案逾年然後杖之人皆不曉其㫖彬曰吾聞此人新娶婦若杖之彼其舅姑必以婦為不利而惡之朝夕詬罵使不能自存吾故緩其事而法亦不赦也記聞嘗曰自吾為將殺人多矣然未嘗以私喜怒輙戮一人其所居堂室弊壊子弟請加修葺公曰時方大冬墻壁瓦石之間百蟲所蟄不可傷其生其仁心愛物如此既平江南回詣閤門入見牓子稱奉勑江南幹當公事回其謙恭不伐又如此歸田錄王始生周嵗日父母以百玩之具羅于席觀其所取王左手提干戈右手取俎豆須臾取一印餘無所視後果為樞宻使相卒贈濟陽王配享帝廟公雖兼領將相不以爵禄自大造門者皆降廡而揖不名呼下吏吏之禀白者雖劇暑不冠不見伐江南西蜀二國諸將皆捆載而歸惟公但圖史衾簟而巳玉壺清話為樞宻使向敏中為副使時契丹犯塞繼遷叛命每軍書狎至上必亟召樞臣計議彬則曰此狂㓂當速發兵誅討斬決而已止用強弩若干步兵若干足矣敏中徐曰某所儲廩未備或道途邉逺或出兵非其時當别施方略制之纎悉措置多從敏中所議上謂將帥難其人彬必懇激而言臣請自效更無它説敏中常私怪之及子瑋亦有將材累厯邉任威名甚重晚自樞貳出鎮西鄙臨事整衆酷類先君復果于戰鬭而不肯以安民柔逺為意豈將帥之體固當若是耶筆錄彬前後征討凡降四國主江南西川廣南湖南也未嘗殺一無辜諸子皆賢今瑋琮璨繼領旄鉞陶弼觀王畫像有詩曰蒐兵四解降王縳教子三登上將壇其後少子玘追封王爵實生慈聖光獻太后輔佐仁宗母儀累朝非元功隂徳享報深厚何以至此雖漢馬唐郭無以過此渑水燕談范質魯國公字文素大名人登後唐第相太祖官至太傅質自從仕未嘗釋巻人或勉之質曰昔嘗有異人與吾言它日必當大任茍如其言無學術何以處之䝉求周祖自鄴舉兵向闕京師亂公隠于民間一日坐封丘巷茶肆中有人貌怪陋前揖曰相公無慮時暑中所執扇偶書大暑去酷吏清風來故人二句其人曰世之酷吏寃獄何止如大暑也公他日當深究此弊幸無忘吾言公惘然乆之後至祅廟後門見一土木短鬼其貌肖茶肆見者公心異焉亂定公大用首建議律條繁廣輕重無據吏得以因縁為姦周祖特詔詳定是為刑統聞見錄質初作相與馮道同堂道意輕其新進潛視所為質初知印當判事語堂吏曰當判之事並施籖表得以視而書之慮臨文失誤貽天下笑道聞嘆曰自識大體吾不如也質果為名相談錄質奉行制敕未嘗破律每命刺史縣令必以戸口版籍為急䝉求周恭帝之世有右拾遺直史館鄭起上宰相范質書言太祖得衆心不宜使典禁兵質不聴及太祖入城諸將奉登明徳門太祖命軍士皆釋甲還營太祖亦歸公署釋黄袍俄而將士擁質及王溥魏仁溥等皆至太祖嗚咽流涕曰吾受世宗厚恩今為六軍所逼一旦至此慙負天地將若之何質等未及對軍校羅彦􅉞按劒厲聲曰我輩無主今日必得天子太祖叱之不退質頗誚讓太祖且不肯拜王􅄎先拜質不得已從之且稱萬嵗周帝内出制書禪位及太宗即位先命􅄎致仕葢薄其為人也又嘗稱質之賢曰惜也但欠世宗一死耳記聞質謂太祖曰太尉既以禮受禪則事太后當如母養少主當如子太祖揮涕許諾由是深敬重質仍以為相者累年終質之世太后少主皆無恙故太祖太宗每言賢相必以質為稱首龍川別志公自以執政之地生殺慘舒所係茍不能蚤夜兢慎悉心精慮敗事覆餗憂患畢至加之道有枉直時有險夷居其位者今古所難嘗謂同列曰人能鼻吸三斗醇醋即可為宰相矣筆錄舊制宰相早朝上殿命坐有軍國大事則議之從容賜茶而退自餘紙尾用御印可其奏謂之印畫降出奉行而已由唐五代不改其制國初范質王溥魏仁溥自以前朝舊相且憚太祖英睿具劄子面取進止朝退各疏其事所得上㫖臣等同署字以志之自是奏御寖多或至旰昃命坐啜茶之禮尋亦廢罷今遂為定式筆錄公以亷介自持未嘗受四方饋遺前後所得禄賜多給孤遺閨門之中食不異品身沒之後家無餘貲後太祖因講求輔相謂侍臣曰朕聞范質但有所居宅不營産真宰相也太宗亦素重質以為循規矩惜名器持亷節無出質之右者竇儀字可象薊州人登晉朝第國初再入翰林弟儼侃偁僖皆繼登科太祖欲改元謂宰相曰今改年號須古來未有者時宰相以乾徳為請且言前代所無三年正月平蜀蜀宮人有入掖庭者上因閲其奩具得鑑背字云乾徳四年鑄大驚曰安得四年所鑄乎出鑑以示宰相皆不能對乃召學士陶榖竇儀奏曰蜀少主曽有此號鑑必蜀中所鑄上大喜因嘆曰作宰相須是讀書人自是大重儒臣矣劉貢父詩話王著既貶官内署闕人太祖謂范質等曰王著昨以酒失既貶官深嚴之地當選慎重之士以處之質等對以前朝學士惟竇儀清介謹厚然頃自翰林遷端明今又官為尚書難於復召上曰禁中非此人不可卿當諭朕意令勉赴所職即日再入翰林為學士金坡遺事儀為翰林學士時趙普専政帝患之欲聞其過一日召儀語及普所為多不法且譽儀早負才望之意儀盛言普開國元勲公忠亮直社稷之重帝不悦儀歸言於諸弟張酒引滿語其故曰我必不能作宰相然亦不詣朱崖吾門可保矣既而召學士盧多遜多遜嘗有憾于普又喜其進用遂攻普之短果罷相出鎮河陽普之罷甚危賴以勲舊脱禍多遜遂參知政事作相太平興國七年普復入相多遜有崖州之行是其言之驗也談錄太祖下滁州世宗命儀籍其帑藏至數日太祖遣親吏取藏絹儀即白曰公初下城雖傾藏取之誰敢言者今既有籍即為官物非詔㫖不可得也後太祖屢對大臣稱儀有守欲以為相趙普忌其剛直乃引薛居正參知政事及儀卒太祖聞之驚嘆曰天何奪我竇儀之速耶儼顯徳中上疏言六綱一曰明禮二曰崇樂三曰熙政四曰正刑五曰勸農六曰經武並䝉求太祖常晚坐崇政殿召學士儼對儼至屏樹間見之不進中使促不應上訝其乆不出笑曰竪儒以我燕服爾遽命袍帶儼遂趨出筆錄儼尤善推步星厯與盧多遜楊徽之同在諌垣謂二公曰丁夘嵗五星當聚奎奎主文明又在魯分自此天下始太平二拾遺必見之老夫不預也至乾徳間五星果聚於奎玉壺清話竇偁為晉府記室賈琰為判官每諸王宗室宴集琰必怡聲下氣褒讚㨗給偁叱之曰賈氏子何巧言令色之甚獨不懼于心耶太宗甚怒白太祖斥出為涇州節判後即位思之召為樞宻直學士數月參政中謝語之曰汝知何以及此偁曰陛下以臣往年覇府遭逢所以至此耳上曰不然以卿嘗面折賈琰故任卿左右思聞直言耳談錄儀為性嚴重家法整肅每對客坐即二侍郎三起居四參政五補闕皆侍立焉晉公談錄李昉文正公字明逺深州人舉漢進士相太宗昉在周朝知開封府人望已歸太祖而昉獨不附王師入京昉又獨不朝貶道州司馬三嵗徙延州别駕在延州為生業以老三嵗當徙不願内徙後二年宰相奏其可大用召判兵部昉五辭既至上勞之昉曰臣前日知事周而已今以事周之心事陛下上大喜曰宰相不謬薦人談叢太宗語侍臣曰朕何如唐太宗左右互辭以讚獨昉無他言㣲誦白居易諷諌七徳舞詞曰怨女三千放出宮死囚四百來歸獄上聞之遽興曰朕不及朕不及卿言警朕矣掇遺太宗時與宋琪同建議復時政記月終送史館先進御而後付有司時政記進御自昉始也盧多遜與昉相善昉待之不疑多遜知政多毁昉人以告昉昉不信之後太宗語及多遜事昉頗為解釋太宗曰多遜毁卿一錢不直昉始信之太宗由是目昉為善人並䝉求公為相有求差遣見其人材可取將收用必正色拒之已而擢用或不足收用必和顔温語待之子弟或問其故公曰用賢人主之事我若受其請是市私恩也故峻絶之使恩歸于上若其不用者既失所望又無善辭此取怨之道也公常期王旦為相自小官薦進之公病召旦勉以自愛既退謂其子弟曰此人後日必為太平宰相然東封西祀亦不能救也並巵史呂䝉正許國文穆公字聖功河南人舉進士甲科相太宗真宗淳化三年太宗謂宰相曰治國之道在乎寛猛得中寛則政令不成猛則民無措手足有天下者可不慎之哉呂䝉正曰老子稱治大國若烹小鮮夫魚擾之則亂近日内外皆來上封求更制度者甚衆望陛下漸行清淨之化上曰朕不欲塞人言路至若愚夫之言賢者擇之亦古典也趙昌言曰今朝廷無事邉境寧謐正當力行好事之時上喜曰朕終日與卿論此事何愁天下不治茍天下親民之官皆如此留心則刑清訟息矣談苑上聞汴水輦運卒有私質市者謂侍臣曰幸門如鼠穴何可塞之但去其尤者可矣篙工楫師茍有少販鬻但無妨公不必究問冀官物之入無至損折可矣䝉正曰水至清則無魚人至察則無徒小人情偽在君子豈不知之若以大度兼容則萬事兼濟曹參不擾獄市者以其兼愛善惡窮乏則姦慝無所容故慎勿擾也聖言所發正合黄老之道事實國朝三入中書惟公與趙韓王爾未嘗以親戚徼寵子從簡當奏補舊制宰相奏子起家即授水部員外郎加朝階公奏曰臣昔忝甲科及第釋褐止授六品京官況天下材能老于巖穴不能霑寸禄者無限今從簡始離襁褓一物不知膺此寵命恐罹隂譴止乞以臣釋褐所授官補之固讓方允止授六品京官自爾為制湘山野錄䝉正不喜記人過初參知政事入朝堂有朝士於簾内指之曰是小子亦參政邪䝉正徉為不聞而過之其同列怒令詰其官位姓名䝉正遽止之曰若一知其姓名則終身不能復忘固不如無知也且不問之何損時皆服其量記聞有一朝士家藏古鑑自言能照二百里欲因公弟獻以求知其弟伺間從容言之公笑曰吾面不過楪子大安用照二百里其弟遂不復言聞者歎服以謂賢於李衛公逺矣歸田錄公嘗問諸子曰我為相外議如何諸子云大人為相四方無事蠻夷賔服甚善但人言無能為事權多為同列所爭公曰我誠無能但有一能善用人爾此誠宰相之事也公夾袋中有冊子每四方人替罷謁見必問其有何人才客去隨即疏之悉分門類或有一人而數人稱之者必賢也朝廷求賢取之囊中故公為相文武百官各稱職者以此巵史公既致政居洛真宗祀汾隂過洛文穆尚能迎謁至回鑾已病帝為幸其宅問曰卿諸子孰可用公對曰臣諸子皆豚犬不足用有姪夷簡任潁州推官宰相才也帝記其語遂至大用先是富韓公之父貧甚客公門下一日白公曰某兒子十許嵗欲令入書院事廷評大祝公許之其子韓公也公見之驚曰此兒他日名位與吾相似亟令諸子同學供給甚厚公兩入相以司徒致仕後韓公亦兩入相以司徒致仕文穆知人之術如此聞見錄張齊賢文定公字師亮曹州人舉賢良方正中第相太宗太祖幸西都齊賢以布衣獻䇿太祖召至便坐令面陳其事文定以手畫地條陳十䇿一下并汾二富民三封建四敦孝悌五舉賢六太學七籍田八選良吏九懲姦十恤刑内四説稱㫖文定堅執其六説皆善太祖怒令武士拽出及車駕還京語太宗曰我幸西都唯得一張齊賢耳我不欲爵之以官異時汝可收之為相至太宗即位放進士榜決欲置于髙等而有司偶失掄選在第三甲之末太宗不悦及注官有㫖一榜盡與京官通判文定釋褐將作監丞通判衡州不十年果為相筆錄太祖幸西都公獻十䇿于馬前召至行宫賜衛士廊飱文定就大盤中以手取食帝用柱斧擊其首問所言十事文定且食且對略無懼色賜束帛遣之歸謂太宗曰吾幸西都為汝得一張齊賢宰相也聞見錄為江南轉運使吉州㳂江有勾欄地錢其地為江水淪陷或官占為船場而所輸錢如故又李氏時民于江中編浮栰以居量丈尺輸税名水場錢公悉奏免之䝉求真宗時戚里有爭分財不均者更相訴訟又因入宮自理于上前更十餘斷不能服齊賢請自治上許之公詔訟者曰汝非以彼所分財多汝所分財少乎皆曰然即命各供狀結實乃召兩吏趨歸其家令甲家入乙舎乙家入甲舎貨財無得動分書則交易之訟者乃止上大悦曰朕固知非君莫能定者記聞宋名臣言行錄前集巻一
