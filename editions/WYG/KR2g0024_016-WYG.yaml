body:
  text: 宋名臣言行錄後集巻六宋朱子纂集曾公亮魯國宣靖公字明仲泉州人中進士第位至丞相以太傅兼侍中致仕配享英宗廟庭仁宗一日召執政侍從䇿訪政事時公侍楚國太夫人病謁告家居亟以手詔就問公條六事以獻其畧謂完堡柵蓄兵馬使主兵者乆於其任則夷狄不敢窺邉取之得其要任之盡其材則將帥不患無人損冗兵汰冗官則財用省徭役不専在農則耕者勸又陳古者取六郡良家子為宿衛及府兵番上十六衛之制以明今宿衛之失言狂者似直愛憎似忠以明聴言知人之難葢皆取當時之所先急而便于施行者以為説曽内翰撰行狀知鄭州郡多冦攘公至悉竄他境路不拾遺民外戸不閉至號公為曽開門常有使客亡槖中物移文求盗公諭以境内無盗必從者也索之果然在樞府更制圖籍以周知四方兵數多少登耗三路屯戌衆寡地里逺近及在相位謂政事以仁民為先故其志尤急於去民所疾苦而補助其窮乏罷弛茶禁歸之於民籍戸絶田收其租為廣惠倉以廪食窮獨其他施設多類此與韓忠獻力贊仁宗早建皇子以為天下萬世之本前此固有言者未之開納至是感悟儲貳乃定公在位乆熟於朝廷政事尤矜慎折獄四方奏讞必躬自省覽原情議法宻州銀發民田中盗往強取之大理當以強盗應死執政皆欲從之公獨以為此禁物也取之雖強與盗民間物有間固爭不決遂下有司議如公言比刼禁物法盗得不死葢公推析律意而主於平恕類皆如此並行狀公自嘉祐秉政至熙寧中尚在中書年雖髙而精力不衰故臺諌無非之者唯李復圭以為不可作詩曰老鳳池邉蹲不去饑烏臺上噤無聲公亦去筆錄王安石荆國文公字介甫撫州人登進士甲科事仁宗英宗神宗位至丞相左僕射司空追封舒王公好讀書能強記雖後進投贄及程試有美者一讀過輙成誦在口終身不忘其屬文動筆如飛初若不措意文成見者皆服其精妙議論髙竒能以辨博濟其説始為小官不急急於仕進皇祐中文潞公為相薦公及張􅉞曽公定韓維四人恬退乞朝廷不次進用以激澆競之風有㫖皆籍記其名至和中召試館職固辭乃除羣牧判官又辭不許乃就職懇求外補得常州由是名重天下士大夫恨不識其面朝廷嘗欲授以美官惟恐其不肯就自常州徙提㸃江西刑獄嘉祐中召除館職三司度支判官固辭不許未幾命修起居注辭以新入館館中先進多不當超處其右章十餘上有㫖令閣門吏賫勑就三司授之安石不受吏隨而拜之安石避之於厠吏置勅於案而去安石使人追而與之朝廷卒不能奪嵗餘朝廷復申前命安石辭七八章乃授除知制誥自此不復辭官矣温公𤨏語司馬温公嘗曰昔與王介甫同為羣牧司判官包孝肅為使時號清嚴一日羣牧司牡丹盛開包公置酒賞之公舉酒相勸光素不喜酒亦強飲之介甫終席不飲包公不能強也光以此知其不屈聞見錄嘉祐末公紏察在京刑獄有少年得鬬鶉同儕恃與之狎昵遂持去鶉主追及之踢其脅立死開封府捕按其人罪當償死及紏察錄問介甫駁之曰按律公取竊取皆為盗此不與而彼強攜以去乃盗也此追而歐之乃捕盗也雖死當勿論府司失入平人為死罪府官不伏事下審刑大理詳定以府斷為是有㫖王安石放罪舊制放罪者詣殿門謝介甫自言我無罪不謝御史臺及閣門累移牒促之終不肯謝瑣語知制誥一日賞花釣魚宴内侍各以金楪盛釣餌藥置几上安石食之盡明日仁宗謂宰輔曰王安石詐人也使誤食釣餌一粒則止矣食之盡不情也常不樂之後安石自著日錄厭薄祖宗仁宗尤甚每謂漢文帝不足取其心薄仁宗也故一時大臣富弼韓琦文彦博皆為其毁詆云聞見錄初韓魏公知揚州介甫以新進士僉書判官事魏公雖重其學而不以吏事許之介甫秩滿去㑹有上韓公書者多用古字韓公笑而謂僚屬曰惜王廷評不在此其人頗識難字介甫聞以為輕已由是怨之記聞公為翰林學士初入對神宗問方今治當何先公對曰擇術為先上問唐太宗如何公曰陛下當以堯舜為法太宗所知不逺所為不盡合先王不足道也堯舜之道至簡而不繁至要而不迂至易而不難但末世學者常以為髙而不可及上曰卿可謂責難于君矣朕自視眇然恐無以副卿意可悉意輔朕庶同濟此道一日侍上語及諸葛亮魏鄭公公對曰陛下誠能為堯舜則必有皐夔稷契陛下誠能為髙宗則必有傅説魏鄭公諸葛亮皆有道者所羞何足道哉但恐陛下擇術未明推誠未至則雖有皋夔稷契傅説之賢亦為小人所蔽因巻懐而去耳上曰自古治世豈能使朝廷無小人雖堯舜之時不能無四凶公曰惟能辨四凶而誅之此乃所以為堯舜也若使四凶得肆其䜛慝則皐夔稷契亦安肯茍食其禄以終身乎未幾遂參大政公既參大政上謂之曰人皆不能知卿以為卿但知經術不曉世務公對曰經術正所以經世務但後世所謂者大抵皆庸人故世俗皆以為經術不可施於世務耳上問然則卿所施設以何為先公曰變風俗立法度最方今所急也於是青苗市易坊塲保甲保馬導洛免役之政相繼並興設制置三司條例司與知樞宻院事陳升之同領之吕誨論公十事公力求去位上為出吕公而韓魏公亦上疏論青苗法乞罷諸路提舉官奏至公稱疾乞分司上不許公入謝因為上言陛下欲以先王正道變天下流俗故與天下流俗相為重輕流俗權重則天下之人歸流俗陛下權重則天下之人歸陛下權者與物相為重輕雖千鈞之物所加損不過銖兩而移今姦人欲敗先王之正道以沮陛下之所為於是陛下與流俗之權適爭輕重之時加銖兩之力則用力至㣲而天下之權已歸流俗矣此所以紛紛也上以為然公乃視事公在臺閣侍從時每為人言唐太宗令諌官隨宰相入閤最切於治道後世所當行也及入司事政而孫莘老李公擇在諌職二人者熟公此論遂列奏請舉行之公不可曰是又益兩參政也吕氏家塾記公知制誥吳夫人為買一妾公見之曰何物女子曰夫人令執事左右曰汝誰氏曰妾之夫為軍大將部米運失舟家貲盡沒猶不足又賣妾以償公愀然曰夫人用錢幾何得汝曰九十萬公呼其夫令為夫婦如初盡以錢賜之司馬温公從龎穎公辟為太原府通判尚未有子夫人為買一妾公殊不顧夫人疑有所忌也一日教其妾俟我出汝自飾至書院中冀公一顧也妾如其言公訝曰夫人出汝安得至此亟遣之穎公知之對僚屬咨其賢二公不好聲色不愛官職不殖貨利皆同平生相善至論新法不合始著書絶交矣公知明州鄞縣讀書為文二日一治縣事起陽堤堰決陂塘為水陸之利貸穀于民立息以償俾新陳相易興學校嚴保伍邑人便之故熙寧初為執政所行之法皆本於此然公知行于一邑則可不知行於天下不可也又所遣新法使者皆刻薄小人急於功利遂至決河為田壊人墳墓室廬膏腴之地不可勝紀青苗雖取二分之利民請納之費至十之七八又公吏冒民新舊相因其弊益繁保甲保馬尤有害天下騷然不得休息葢祖宗之法一變矣獨役法新舊差募二議俱有弊吳蜀之民以雇役為便公與温公皆早貴少厯州縣不能周知四方風俗故公主雇役温公主差役蘇内翰范忠宣温公門下士復以差役為未便章子厚公門下士亦以雇役為未盡三人雖賢否不同皆聰明曉吏治兼知南北風俗其所論甚公各不私於所主元祐初温公復差役改雇役子厚議曰保甲保馬一日不罷有一日害如役法則熙寧初以雇役代差役議之不詳行之太速故後有弊今復以差役代雇役當詳議熟講庶幾可行而限止五日太速後必有弊温公不以為然子厚罪去蔡京者知開封府用五日限盡改畿縣雇役之法為差役白温公公喜曰使人人如待制何患法不行子厚入相復議以雇役改差役置司講論乆不決蔡京兼提舉白子厚曰取熙寧元豐法施行之耳尚何講焉子厚信之雇役遂定京前後觀望反覆賢如温公暴如子厚皆足以欺之誠小人也公晚年於鍾山書院多冩福建子三字葢悔恨於吕惠卿者恨為惠卿所陷悔為惠卿所誤也每山行多恍惚獨言若狂者公既病和甫以邸吏狀示公適報司馬公作相公悵然曰司馬十二作相矣公薨温公在病中聞之簡吕申公曰介甫無他但執拗耳贈恤之典宜厚温公盛徳如此聞見錄公改科舉暮年乃覺其失曰本欲變學究為秀才不謂變秀才為學究葢舉子専誦王氏章句而不解義正如學究誦注疏爾談叢公在金陵聞朝廷變其法夷然不以為意及聞罷役法愕然失聲曰亦罷至此乎良久曰此法終不可罷安石與先帝議之兩年乃行無不曲盡後果如其言巵史公嘗云自議新法始終言可行者曽布也始終言不可行者司馬光也餘皆前叛後附或出或入先生與僕論變法之初僕曰神廟必欲變法何也先生曰葢有説矣天下之法未有無弊者祖宗以来以忠厚仁慈治天下至嘉祐末年天下之事似乎舒緩委靡不振當時士大夫亦自厭之文字論列然其實於天下根本牢固至神廟即位富於春秋天資絶人讀書一見便解大指是時見兩蕃不服及朝廷州縣多紓緩不及漢唐全盛時每與大臣論議有怫然不悦之色當時執政從官中有識者以謂方今天下正如大富家上下和睦田園開闢屋宇牢壯財用充足但屋宇少設飾器用少精巧僕妾樸魯遲鈍不敢作過但有鄰舍来相凌侮不免嵗時以物贈之其來已乆非自家做得如此遂不敢承當上意改革法度獨金陵揣知上意以一身當之為激切奮厲之言以動上意遂以仁廟為不治之朝神廟一旦得之以為千載㑹遇改法之初以天下公論謂之流俗内則太后外則顧命大臣尚不能回況臺諌乎祗増其勢耳雖天下之人羣起而攻之而金陵不可動者葢此八箇字吾友宜記之僕曰何等八字曰虛名實行強辨堅志當時天下之論以金陵不乍執政為屈此虛名也平生行止無一㸃涴論者雖欲誣之人主信乎此實行也論議人主之前貫穿經史今古不可窮詰故曰強辨前世大臣欲任意行一事或可以生死禍福恐之得回此老實不可以此動故曰堅志此法所以必行也元城語錄介甫請并京師行陜西所鑄折二錢既而宗室及諸軍不樂有怨言上聞之以問介甫欲罷之介甫怒曰朝廷每舉一事定為浮言所移如此何事可為退遂移疾卧不出上使人諭之曰朕無間於卿天日可鑒何遽如此乃起同上公秉政更新天下之務而宿徳舊人論議多不協遂選用新進待以不次故一時政事不日皆舉而兩禁臺閤内外要權莫非新進洎三司論市易而吕參政指為沮法公信以為然堅乞罷相既出吕嘉問張諤持公而泣公慰之曰已薦吕惠卿矣二子收涙及惠卿入參有射羿之意而一時之士見其得君謂可傾奪公矣遂更朋附之既而天子斷意再召公秉政惠卿自知不安乃條列公兄弟之失凡數事面奏意欲上意有二上封惠卿所言以示公故公表有忠不足以取治故事事欲其自明義不足以勝姦故人人與之立敵葢謂是也既而惠卿出知亳州鄧綰張諤之徒皆以罪去然自是門下之人皆無固志公無與共圖事者又請去而再鎮金陵故詩有紛紛易變浮雲白落落難鍾老栢青者葢謂是也筆錄初惠卿為公所知驟引至執政公去惠卿遂背之暨公再相於是起華亭詔獄而使徐禧等按之惠卿情不得練亨甫吕嘉問以鄧綰所條惠卿事交鬬其間復為惠卿所中語連公子雱雱時已病坐此憂憤而卒公憂傷益不堪遂再求罷去熙寧庚戌冬公拜相百官皆賀公以未謝皆不見之獨與余坐西廡之小閤忽顰蹙乆之取筆書牕曰霜筠雪竹鍾山寺投老歸歟寄此生放筆揖余入後再罷相歸金陵築第於白門外元豐癸丑春余謁公於第公遽邀余同遊鍾山憇法雲寺偶坐於僧房余因為公道平昔之事及誦書牎之詩公撫然曰有是乎㣲笑而已筆錄元豐七年春公有疾兩日不言少蘇語吳國夫人曰夫婦之情偶合耳不須他念強為善而已執葉濤手曰君聰明宜博讀佛書慎勿徒勞作世間言語安石生來多枉費力作閑文字深自悔責吳國勉之曰公未宜出此言曰生死無常吾恐時至不能發言故今叙此時至則行何用君勸公疾瘳乃自悔曰雖識盡天下理而定力尚淺或者未死應尚竭力修為陳子聞之而疑曰豈現行無常現身有疾者乎不可疑也公語錄元豐末創為戸馬之説神宗俯首歎曰朕于是愧於文彦博矣王珪請宣徳音復曰彦博頃年爭國馬不勝嘗曰陛下十年必思臣言珪因奏曰罷去祖宗馬監是安石堅請行之者本非陛下意也上歎曰安石誤朕豈獨此一事神宗聞安石之貧命中使甘師顔賜之金五十兩安石好為詭激矯厲之行即以金施之定林僧舍師顔因不敢受常例回具奏之上諭御藥院牒江寧府於安石家取師顔常例安石約惠卿無令上知一帖惠卿既與公分黨乃以其帖上之上問熙河嵗費之説於王韶安石喻韶不必盡數以對韶既畔安石亦以安石言上之晁以道論配享劄仁宗朝韓富二公為相凡言聞邉者皆不納熙寧初公執政始有開邉之議王韶者罷新安簿遊邉得其説遂上開河湟之䇿公以為竒謀乃有熙河之役獨岷州白石大潭秦州屬縣有賦税其餘無㪷粟尺布惟仰陜西州郡朝廷帑藏供給故自開熙河以來陜西民日困朝廷財用益耗初唃厮囉分處諸子於熙河洮岷之地唃厮囉死諸子皆衰弱故韶能取之並聞見錄熙寧六年吏有不附新法介甫欲深罪之上不可介甫因爭之曰不然法不行上曰聞民間亦頗苦新法介甫曰祁寒暑雨民猶有怨咨者豈足顧也上曰豈若并祁寒暑雨之咨亦無耶介甫不悦退而屬疾家居數日上遣使慰勞之乃出其黨為之謀曰今不取門下士上所素不喜者暴進用之則權輕將有人窺間隙者矣介甫從之即奏擢章惇趙子幾等上喜其出勉強從之由是權益重記聞介甫不知事君道理觀他意思只是要樂子之無知如上表言秋水既至因知海若之無窮大明方升豈宜爝火之不息皆是意思常要已在人主上自古主聖臣賢乃常理何至如此又觀其説魯用天子禮樂云周公有人臣所不能為之功故得用人臣所不得用之禮樂此乃大段不知事君大凡人臣身上豈有過分之事凡有所為皆是臣職所當為之事也介甫平居事親最孝觀其言如此其事親之際想亦洋洋自得以為孝有餘也臣子身上皆無過分事惟是孟子知之説曾子只言事親若曾子可矣不言有餘只言可矣程氏遺書公平生養得氣完為他不好做官職作宰相只喫魚􅅅飯得受用底不受用縁省便去就自在嘗上殿進一劄子擬除人神宗不允對曰阿除不得又進一劄子擬除人神宗亦不允又曰阿也除不得下殿出來便乞去更留不住平生不屈也竒特上蔡語錄因論公法云青苗免役亦是法然非藏於民之道如青苗取息雖不多然嵗散萬緡則奪民二千緡入官既入官則民間不復可得矣免役法取民間錢雇人役於官其得此錢用者皆州縣市井之人不及鄉民鄉民惟知輸而不得用故令鄉民多乏於財也青苗二分之息可謂輕矣而不見利於百姓何也今民間舉債其息少者亦須五七分多者或倍而亦不覺其害曰惟其利輕且官中易得人徒知目前之利而不顧後患是以樂請若民間舉債則利重又百端要勒得之極難故人得已且已又青苗雖名取二分之息其實亦與民間無異葢小民既有非不得已而請者又有非不得已用之且如請錢千或遇親舊於州縣間須有酒食之費不然亦須置小小不急之物只使二百錢已可比民間四分之息又請納時往來之用與官中門戸之賂遺至少亦不下百錢況又有胥吏追呼之煩非貨不行而公家期限又與私間不同而民之畏法者至舉債以輸官往往㳂此遂破蕩産業者固多矣此所以有害而無利也或云官中息輕民得之可以自為經營嵗豈無二分之息乎盖未之思也若用之商販則錢散而難集正公家期逼卒收不聚失所指凖其患豈細往年富家知此患也官中配之請不得已而藏之比及期出私錢為息輸之官乃無患夫使民如此是無事而侵擾之也何名補助之政乎龜山語錄公治天下専講求法度如彼修身之潔宜足以化民矣然卒不逮王文正吕晦叔司馬君實諸人者以其所為無誠意故也明道嘗曰有關雎麟趾之意然後可以行周官之法度葢深達乎此同上公在上前爭論或為上所疑則曰臣之素行亦不至無亷恥如何不足信且論事當問事之是非利害如何豈可以素有亷恥刼人使信已也夫亷恥在常人無足道若君子更自矜其亷恥亦淺矣葢亷恥自君子所當為者如人守官曰我固不受贓不受贓豈分外事乎同上子雱字元澤性險惡凡公所為不近人情者皆雱所教吕惠卿輩奴事之公置條例司初用程顥伯淳為屬伯淳賢士一日盛暑公與伯淳對語雱囚首跣足手攜婦人冠以出問公曰所言何事公曰以新法數為人沮與程君議雱箕踞以坐大言曰梟韓琦富弼之頭于市則新法行矣公曰兒誤矣伯淳曰方與參政論國事子弟不可預姑退雱不樂去伯淳自此與公不合雱死公罷相哀悼不忘有一日鳳鳥去千年梁木摧之詩葢以比孔子也公坐鍾山常恍惚見雱荷枷杻如重囚者公遂施所居半山園宅為寺以薦其福後公病瘡良苦嘗語其姪曰亟焚吾所謂日錄者姪紿公焚他書代之公乃死或云又有所見也聞見錄王安國字平甫常非其兄所為為西京國子監教授溺於聲色介甫在相位以書戒之曰宜放鄭聲安國復書曰亦願兄逺佞人官滿至京師召上殿上問其兄秉政物論如何對曰但恨聚歛太急知人不明耳上黙然不悦嘗諌其兄以天下􅍅􅍅不樂新法恐為家禍介甫不聴安國哭於影堂曰吾家滅門矣又嘗責曾布以誤惑丞相更變法令布曰足下人之子弟朝廷變法何預足下事安國怒曰丞相吾兄也丞相之父即吾父也丞相由汝之故殺身破家僇及先人發掘邱壟豈得不干預我事耶記聞安國召對上曰卿學問通古今以漢文何如主也對曰三代以後賢主未有如文帝者上曰但惜其才不能立法更制耳對曰文帝自代來夜入未央宫於擾攘時定變故於俄頃之際諸將故武夫皆脅息待命恐無才者不及是然能用賈誼之言待羣臣有節専務以徳化民海内興於禮義幾致刑措使一時風俗恥言人過則文帝加有才一等矣上曰王猛佐苻堅以蕞爾國而令必行今朕以天下之大而不能使人何也對曰王猛睚眦之忿必報専教苻堅以峻法殺人為事此必小臣刻薄有以誤陛下者願専以堯舜三代為法理順而埶利則下豈有不從者乎筆錄公為參政因閲晏元獻小詞而笑曰宰相而作艶詞可乎平父曰亦偶然爾吕惠卿為館職在坐曰為政必放鄭聲平父正色曰放鄭聲不若逺佞人也吕以為譏已自是與平父相失筆錄公與吕惠卿論新法平父吹笛于内公諭之曰請學士放鄭聲平甫即應曰願相公逺佞人惠卿深䘖之聞見錄鄭俠介夫者福州人公居憂金陵時嘗從學後舉進士調光州司法秩滿至京㑹公秉政問以所聞俠因為具言青苗免役用兵之害公不答又數以書論之亦不報乆之得監在京安上門時初行免役及收市利錢京師細民負水拾髪擔粥提茶之類皆有免行錢不輸者母得販鬻市道門司税院並行倉法専攔月賦每正税百錢則收市利十錢以給之逮法之行則正税不及十錢者有司亦取之其末反重於本俠又言於公得損其尤甚者數事㑹大旱自十一月不雨至於三月河東河北陜西流民大入京師與城外飢民市麻籸麥麩為糜或掘草根木實以食或身被鎖械而負瓦掲木賣妻鬻子以償官俠畫圖為書勾馬􅉍以聞曰如行臣之言十日不雨即乞斬臣以正欺罔之罪又自劾擅發馬􅉍鋪待罪時熙寧七年三月二十六日也神宗覽疏歎息遂詔韓維孫永體量免行錢曾布體量市易法又詔司農寺發常平倉放商税務及諸門税錢三十錢以下市利錢二十文以下青苗免役權罷追索方田保甲並罷凡此類十八事民間懽呼相慶四月一日遂下詔責躬求言越三日大雨七日早朝賀雨上出圖狀示宰執且責之丞相以下皆謝罪公遂力求去已而公卒去位薦惠卿以代已命下之日京師大風雨土翳席逾寸俠又上書言安石本為惠卿所誤至此今復扳援以遂前非不復為宗社計又上疏諌用兵語甚切屬熙河奏捷殺戮甚衆上為惻然手詔諭王韶等今後只務招降未征餘黨毋以多殺為功於是惠卿等益惡之俠又上書言大臣奏以三路流民皆為南北下各有田名燕子田若北旱則南南荒又北此皆誣罔上聴臣乞勘㑹三路之民自去冬流移至今不已何人是南方有田者他語譏大臣甚衆并詆臺諌皆如芻靈木偶又言禁中被甲登殿等事奏入執政大怒言於上以為謗訕朝政追毁出身以來文字送汀州編管既行上問惠卿鄭俠小臣禁中宻事及大臣奏對之言何自聞之惠卿對曰此皆馮京手錄使王安國持示導之使言耳惠卿與京同列議多矛盾又以諂事荆公為安國所疾屢諷其兄不悟故并中之已而上以惠卿語責京京惶恐曰臣與俠素不相識上方疑之御史知雜張琥遂以俠事劾京京奏俠行未逺乞追還對辨遂詔赴臺推勘遣舒亶追俠及諸太康搜其衣槖得王堯臣所贐銀三十兩御史臺知班楊忠信所贈韓范諸公所言新法不便奏藁兩帙遂逮赴詔獄俠對實不識京但每遣人吳無至詣檢院投匭判院丁諷輙為無至道京稱歎之語及罷局時遇安國於途安國馬上舉鞭相揖曰賢可謂獨立不懼因隨至所居求觀前後奏草俠答以未嘗存留安國言亦見所與家兄書家兄雖安國之言不聴而況公乎俠曰不意丞相一旦為小人所誤以至於此安國曰是何為小人所誤家兄自以為人臣子不當避四海九州之怨使怨歸於已方是臣子盡忠國家俠曰未聞堯舜在上䕫契在下而有四海九州之怨安國以為然忠信者常應詔言新法不便因謂俠曰御史職在諌爭皆緘黙不言公一監門耳乃上書不巳是言責在監門而臺中無人也探懐中書授俠曰以此為正人助京未嘗使安國傳道省中語凡所論乃鄰居内殿崇班楊永芳所告也安國赴對不承俠責之曰凡對制使不當有隠口所言者安得諱之天地鬼神皆在左右學士欲誰欺邪安國乃伏獄成俠送英州編管忠信無至真決編管湖外京罷政諷落職安國放歸田里俠徒步赴貶所俠性清儉布衣糲食終其身有應舉不以實年者戒之曰方謀入仕已有欺君之心不可暇日聞子姪誦詩考槃之義曰弗諼者弗忘君之惡弗過者弗過君之朝弗告者弗告君以善顧人之於君有惓惓之不忍也故永矢以絶之公嘆曰是何言歟古之人在畎畆不忘君況於賢者一不見用而忿戾若是哉葢弗諼者弗忘君也弗過者弗以君為過也弗告者弗以告他人也其存心如此故雖流落頓挫之餘一話一言未嘗不在君父覩政役繁興民物嗸嗸但顰顣而已鄭俠言行錄錢景諶者忠懿王孫舊與公善論新法不合遂相絶其家集有答兖守趙度支書自序甚詳云荆公任政用事而一代成法無一二存者百姓愁苦而郡縣吏惴惴憂懼虞以罪去且不但變其法制而已乃以穿鑿不經入於虚無牽合臆説作為字解者謂之時學而春秋一王之法獨廢而不用又以荒唐誕怪非昔是今無所統記者謂之時文傾險趍利殘民無恥者謂之時官驅天下之人務時學以時文邀時官僕既與仕籍而所學者聖賢事業専以春秋為之主皆大中至正三綱五常之道其所為文學六經而為必本於道徳性命而一歸於仁義其施於君者則又忠厚愛人兼善天下之道自顧不合於時而學之又不能方惶惶然無所容其迹而故人張諌議正國辟僕為髙陽帥幙今邵堯夫亦有書招我為洛中遊兼有詩云年光空去也人事轉蕭然止俟貧老之兄生事粗足幼而孤者有分有歸亦西歸洛中守先人墳墓徜徉于有洛之表吾願畢矣聞見錄宋名臣言行錄後集巻六
