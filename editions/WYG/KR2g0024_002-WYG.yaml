body:
  text: 宋名臣言行錄前集卷二宋朱子纂集呂端正惠公字易直幽州人以䕃補官相太宗公使髙麗遇風濤檣折舟人大恐公恬然讀書若在齋閣玉壺清話太宗欲相正惠公左右或曰端為人糊塗鶻突帝曰端小事糊塗大事不糊塗決意相之呂氏家塾記保安軍奏獲李繼遷母太宗甚喜時㓂凖為樞宻副使端為宰相上獨召凖與之謀凖退自宰相幕次前過不入端使人邀至幕中曰鄉者上召君何為凖以獲繼遷母告端曰君何以處之凖曰凖欲斬于保安軍北門之外端曰必若此非計之得者也願君少緩其事端將覆奏之即召閤門吏使奏宰相呂端請對上召見之端具道凖言且言昔項羽得太公欲烹之漢髙祖曰願遺我一杯羮夫舉大事者固不顧其親況繼遷乃一悖逆之人哉且陛下今日殺繼遷之母繼遷可擒乎不然徒樹怨讎而益堅其叛心耳宜置于延州使善養視之以招徠繼遷雖不能即降終可以繫其心而母死生之命在我矣上拊髀稱善曰㣲卿幾誤我事即用端䇿太宗大漸李太后與宣政使王繼恩忌太子英明隂與參政李昌齡殿前指揮使李繼勲知制誥胡旦謀立潞王元佐太宗崩太后使繼恩召端端知有變鎖繼恩于閤内使人守之而入太后謂曰宮車巳晏駕立嗣以長順也今將何如端曰先帝立太子正為今日豈可違先帝之命更有異議乃迎太子立之真宗既即位垂簾引見羣臣端于殿下平立不拜請巻簾升殿審視然後降階率羣臣拜呼萬嵗並記聞趙普在中書端為參政趙普謂人曰吾觀呂公奏事得嘉賞未嘗喜遇抑挫未嘗懼真台輔之器也談錄公為相持重識大體以清靜簡易為務每奏對同列多異議公罕所建明一日内出手札戒曰自今中書事必經吕端詳酌乃得聞奏公讓不敢當錢若水宣靖公字淡成河南人舉進士釋褐位至同知樞宻院事為舉子時見陳希夷於華山希夷曰明日當再來若水如期往見有一老僧與希夷擁地爐坐僧熟視若水乆之不語以火箸畫灰作做不得三字徐曰急流中勇退人也若水辭去希夷不復留後若水登科為樞宻副使年方四十致仕希夷初謂若水有仙風道骨意未決命僧觀之僧云做不得故不復留然急流中勇退去神仙中不逺矣僧麻衣道者也聞見錄為同州推官有富民家小女奴逃亡不知所之奴父母訟于州命錄事鞫之錄事嘗貸錢于富民不獲乃劾富民父子數人共殺女奴棄屍水中遂失其屍富民不勝搒楚自誣服具上州官審覆無反異若水獨疑之留其獄數日不決錄事詣若水詬之曰若受富民錢欲出其死罪邪若水笑謝曰今數人當死豈可不少留熟觀其獄辭邪留之旬日知州屢趣之不能得上下皆怪之若水一旦詣州屏人言曰若水所以留其獄者宻使人訪求女奴今得之矣知州驚曰安在若水因宻使人送女奴于知州所知州乃垂簾引女奴父母問曰汝今見汝女識之乎曰安有不識也因從簾中推出示之父母泣曰是也乃引富民父子悉破械縱之其人號泣曰㣲使君某滅族矣知州曰推官之賜也其人傾家貲飯僧為若水祈福知州欲奏論其功若水固辭曰若水但求獄事正人不寃耳論功非其本心也朝廷若以此為若水功當置錄事于何地邪知州歎服曰如此尤不可及矣太宗聞之驟加褒擢二年中為樞宻副使記聞若水為學士嘗草賜趙保忠詔云不斬繼遷存狡兔之三穴潛疑光嗣持首鼠之兩端太宗覽之甚悦謂若水曰此四句正道著我意又與趙保吉詔有既除手足之親已失輔車之勢其辭甚美太宗批其後云依此詔本極好子延年寳藏之金坡遺事李繼隆與轉運使盧之翰有隙欲陷之罪乃檄轉運司期八月出塞令辦芻粟轉運司調發方集繼隆復為檄言八月不利出師當更取十月運司遂散芻粟既而復為檄云賊且入塞當以時進軍芻粟即日取辦是時民輸輓者適散倉卒不可復集繼隆遂奏轉運司乏軍興太宗大怒立召中使一人令乘驛馳取轉運使盧之翰竇玭及某人首丞相呂端樞宻使柴禹錫皆不敢言惟若水爭之請先推驗有狀然後行法上大怒拂衣起入禁中二府皆罷獨若水留廷中不去乆之上出詰之曰爾以同州推官再期為樞宻副使朕所以擢用以爾為賢爾乃不才如是邪對曰陛下不知臣無狀使得待罪二府臣當竭愚慮不避死亡補益陛下以報厚恩李繼隆外戚貴重莫比陛下據其一幅奏書誅三轉運使雖有罪天下何由知之鞫驗事狀明白加誅亦何晚焉獻可替否死以守之臣之常分臣未獲死固不敢退上意解乃召呂端等奏請如若水議先令責狀許之三人皆黜為行軍副使既而虜欲入塞事皆虛誕繼隆坐罷招討知秦州記聞詔訪備邉之䇿若水條上五事一擇郡守二募鄉兵三積芻粟四重將帥五明賞罰公嘗率衆過河號令軍伍分布行列悉有規節深為戍將所服上知之謂左右朕嘗見儒人談兵不過講之于尊俎硯席之間于文字則引孫吳述形勢皆閒暇清論可也責之于用罕有成效今若水亦儒人曉武深可嘉也時言者請城綏州積兵禦党項詔公自魏乘疾傳往按至則乞罷其役時論韙之玉壺清話至道初呂䝉正罷相以僕射奉朝請上謂左右曰人臣當思竭節以保富貴呂䝉正前日布衣朕擢為相今退在班列寂寞想其目穿望復位矣劉昌言曰䝉正雖驟登顯貴然其風望不為忝冐僕射師長百寮資望崇重非寂寞之地且亦不聞其鬱悒也況今巖穴髙士不求榮達者甚多惟若臣輩茍且官禄不足以自重耳上黙然又嘗言士大夫遭時得位富貴顯榮豈得不竭誠報國乎若水言髙尚之人固不以名位為光寵忠正之士亦不以窮達易志操其或以爵禄恩遇之故而效忠于上此中人以下者之所為也上然之及劉昌言罷上問趙鎔等曰頻見昌言否鎔等曰屢見之上曰涕泣否曰與臣等談多至流涕上曰大率如此當在位時不能悉心補職一旦斥去即汛瀾涕泗若水曰昌言實未嘗涕泣鎔等迎合上意耳若水因自念上待輔臣如此葢未嘗有秉節髙邁不貪名勢能全進退之道以感動人主遂貽上之輕鄙將以滿嵗移疾遂草章求解職㑹晏駕不果上及今上之初年再表遜位乃得請談苑李沆文靖公字太初洺州人擢進士甲第位至丞相配享真宗廟庭沆嘗侍曲宴太宗目送之曰沆風範端凝真貴人也䝉求真宗既與契丹和親王文正公問于公曰和親何如公曰善則善矣然邉患既息恐人主漸生侈心耳文正亦未以為然及上晚年多事廵逰大修宮觀文正乃潛嘆曰李公可謂有先知之明矣記聞真宗初即位沆為相王旦參政沆日取四方水旱盗賊奏之旦以為細事不足煩上聴沆曰人主少年長使知四方艱難不然血氣方剛不留意聲色犬焉則土木甲兵禱祠之事作矣吾老不及見此參政他日之憂也及旦親見王欽若丁謂等所為欲諌則業已同之欲去則上遇之厚不忍去乃歎曰李文靖真聖人也龍川志沆在相位接賔客常寡言馬亮與沆同年生又與其弟維善語維曰外議以大兄為無口匏維乘間達亮語沆曰吾非不知也然今之朝士得升殿言事上封論奏了無壅蔽多下有司皆見之矣若邦國大事北有強虜西有戎遷日旰條議所以備禦之䇿非不詳究薦紳中如李宗諤趙安仁皆時之英秀與之談猶不能啟發吾意自餘通籍之子坐起拜揖尚周章失措即席必自論功最以希寵奬此有何䇿而與之接語哉茍曲意妄言即世所謂籠罩籠罩之事僕病未能也為我謝馬君沆嘗言居重位實無補萬分唯中外所陳利害一切報罷之此少以報國耳朝廷防制纎悉備具或狥所陳請施行一事即所傷多矣陸象先曰庸人擾之正此謂也憸人茍一時之進豈念民邪談苑真宗初即位沆為相帝雅敬沆嘗問治道所宜先沆曰不用浮薄新進喜事之人此最為先帝問其人曰如梅詢曾致堯等是也帝深然之故終帝世數人皆不進用龍川别志或薦梅詢可用真宗曰李沆嘗言其非君子時沆沒二十餘年矣歐陽文忠嘗問蘓子容云宰相沒二十年能使人主追信其言以何道子容言獨以無心耳軾謂陳執中俗吏耳特以至公猶能取信主上況如李公才識而濟之無心邪東坡志林真宗問公曰人皆有宻啟而卿獨無何也對曰臣待罪宰相公事則公言之何用宻啟夫人臣有宻啟者非讒即佞臣常惡之豈可效尤龜山語録公為相真宗嘗夜遣使持手詔問欲以某氏為貴妃如何公對使者引燭焚其詔書附奏曰但道臣沆以為不可其議遂寢吕氏家塾記㓂萊公始與丁晉公善嘗以丁之才薦于公屢矣而終未用一日㓂謂公曰比屢言丁謂之才而相公終不用豈其才不足用邪公曰如斯人者才則才矣頋其為人可使之在人上乎莱公曰如謂者相公終能抑之使在人下乎公笑曰他日後悔當思吾言也晚年與㓂權寵相軋交互傾奪至有海康之禍始服文靖之識東軒筆錄常讀論語或問之公曰沆為相如論語中節用愛人使民以時兩句尚未能行聖人之言終身誦之可也聞見錄沆自奉甚薄所居陋巷㕔事無重門頹垣敗壁不以屑慮堂前藥欄壊妻戒守舍者勿葺以試沆沆朝夕見之經月終不言妻以語沆沆笑謂其弟維曰豈可以此動吾一念哉家人勸治居第未嘗答維因語次及之沆曰身食厚禄時有横賜計囊裝亦可以治第但念内典以此世界為缺陷安得圓滿如意自求稱足今市新宅須一年繕全人生朝暮不可保又豈能乆居巢林一枝聊自足爾安事豐屋哉談苑駙馬都尉石保吉求為使相仁宗以問公公曰賞典之行須有所自保吉因縁戚里無攻戰之勞台席之拜恐騰物論他日再三詢之執議如初遂寢其事及公薨數日乃卒拜焉金坡遺事張詠嘗謂人曰吾榜中得人最多慎重有雅望無如李文靖深沈有徳鎮服天下無如王公面折庭爭素有風采無如㓂公當方面寄則詠不敢辭王文正公遺事元城論本朝名相最得大臣體者惟李沆或曰何以明之李丞相每謂人曰沆在政府無以補報國家但諸處有人上利害一切不行耳此大似失言然有深意且祖宗時經變多矣故所立法度極是穏便正如老醫㸔病極多故用藥不至孟浪殺人且其法度不無小害但其利多耳後人不知遂欲輕改此其害所以紛紛也李丞相每朝謁奏事畢必以四方水旱盗賊不孝惡逆之事奏聞上為之變色慘然不悦既退同列以為非問丞相曰吾儕當路幸天下無事丞相每奏以不美之事以拂上意然又皆有司常行不必面奏之事後告已之公不答數數如此因謂同列曰人主一日豈可不知憂懼若不知憂懼則無所不至矣惟此兩事最為得體在漢時惟魏相能行此兩事以為古今異制方今務在奉行故事而已奏故事詔書凡二十三事敕掾史案事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡不上相輙奏言之此最得宰相太體後之為相者則或不然好逞私智喜變祖宗之法度欺蔽人主惡言天下災異喜變法度則綱紀亂惡言災異則人主驕此大患也元城語錄公為相治居第於封丘門内聴事前僅容旋馬或言其太隘公笑曰居第當傳子孫此為宰相㕔事誠隘為太祝奉禮㕔事已寛矣温公訓儉王旦魏國文正公字子明魏州人中進士第位至太尉配享真宗廟庭王晉公祜事太祖為知制誥太祖遣使魏州以便宜付之告曰使還與卿王溥官職時􅄎為相也魏州節度使符彦卿有飛語聞于上祜至魏得彦卿家僮二人挾勢恣横以便宜決配而已及還朝太祖問曰汝敢保符彦卿無異意乎祜曰臣以百口保彦卿又曰五代之君多因猜忌殺無辜故享國不長願陛下以為戒帝怒其語直貶䕶國行軍司馬華州安置祜赴貶親賔送于都門外謂祜曰意公作王􅄎官職矣祜笑曰祜不做兒子二郎必做二郎者旦也祜知其必貴手植三槐于庭曰吾子孫必有為三公者已而果然天下謂之三槐王氏云聞見錄公通判鄭州建言請天下置常平倉以抑兼并為學士嘗奏事退上目送之曰為朕致太平者必斯人也真宗為皇太子太子諭徳見公稱太子學書有法公曰諭徳之職止于是邪歐公撰神道碑張士遜言皇太子學書甚好公曰皇太子不待應舉選不必學書由是文懿日以善道規贊皇太子遺事趙徳明言民饑求糧百萬斛大臣皆曰徳明新納誓而敢違請以詔書責之真宗以問公公請敕有司具粟百萬于京師詔徳明来取上大喜徳明得詔慙且拜曰朝廷有人碑契丹奏請嵗給外别假錢幣上以示公公曰東封甚近車駕將出以此探朝廷之意耳上曰何以答之公曰止當以㣲物而輕之也乃于嵗給三十萬物内各借三萬仍諭次年額内除之契丹得之大慙次年復下有司契丹所借金帛六萬事屬㣲末仰依常數與之今後永不為例遺事大中祥符中天下大蝗真宗使人于野得死蝗以示大臣明日他宰相有袖死蝗以進者曰蝗實死矣請示於朝率百官賀公獨以為不可後數日方奏事飛蝗蔽天上顧公曰使百官方賀而蝗如此豈不為天下笑邪碑宦者劉承規以忠謹得幸病且死求為節度使真宗以語公曰承規待此以瞑目公執以為不可曰他日將有求為樞宻使者奈何至今内臣官不過留後碑薛簡肅公天禧初為江淮發運司辭公公但云東南民力竭矣薛退謂人曰真宰相之言也湘山野錄張士遜出為江西轉運使辭公且求教公從容曰朝廷𣙜利至矣張起謝後迭更是職思公言未嘗求錐刀之利識者曰此運使最識大體遺事景徳中李迪賈邉皆舉進士有名當時及就省試主文咸欲取之既而皆不與取其巻視之迪以賦落韻邉以當仁不讓於師論以師為衆與注疏異説乃為奏具道所以乞特收試時公為相議曰迪雖犯不考然出於不意其過可恕如邉特立異説將令後生務為穿鑿漸不可長遂收迪而黜邉國朝事實宮禁火災公馳入對上驚惶語公曰兩朝所積朕不妄費一朝殆盡誠可惜也公對曰陛下富有天下財帛不足憂所慮者政令賞罰有不當臣備位宰相天災如此臣當罷免繼上表待罪上乃降詔罪已許中外上封事言朝政得失後有大臣言非天災乃某王宫失火禁請置獄出其狀當斬決者數百人公持以歸翌日乞獨對曰初火災陛下降詔罪已臣上表待罪今反歸咎于人何以示信且火雖有迹寧知非天譴邪果欲行法願罪臣始以明無狀上欣然聴納減死者幾百輩遺事中書有事關送宻院事礙詔格㓂公在樞府特以聞上以責公公拜謝引咎堂吏皆遭責罰不踰月宻院有事送中書亦違舊詔堂吏得之欣然呈公公曰却送與宻院吏出白㓂公冦大慙翌日見公曰同年甚得許大度量公不答名臣遺事公在中書㓂公在宻院中書偶倒用了印㓂公須勾吏人行遣他日樞院亦倒用了印中書吏人呈覆亦欲行遣公問吏人汝等且道宻院當初行遣倒用印者是否曰不是公曰既是不是不可學他不是龜山語錄王欽若陳堯叟馬知節同在樞府一日上前因事忿爭上召公公至則見欽若諠譁不已馬公流涕曰願與欽若同下御史府公乃叱欽若曰王欽若對上豈得如此下去上大怒乃命下獄公從容曰欽若等恃陛下顧厚上煩陛下譴訶當行朝典然觀陛下天顔不怡願且還内来日取㫖上許之翌日上召公問欽若等事當如何公曰當黜然未知坐以何罪上曰朕前忿爭無禮公曰陛下奄有天下而使大臣坐忿爭無禮之罪恐外國聞之無以威逺願至中書召欽若等宣示陛下含容之意且戒約之俟少間罷之未晚上曰非卿言朕固難忍月餘皆罷遺事王曽張知白陳彭年參預政事因白公曰每奏事其間有不經上覽者公但批㫖奉行恐人言之以為不可公遜謝而已一日奏對公退諸公留身上驚曰有何事不與王旦同来諸公以前説對上曰旦在朕左右多年朕察之無毫髪私自東封後朕諭以小事一面奉行卿等當謹奉之諸公退而愧謝公曰向䝉諭及不可自言曽得上㫖然今後更賴諸公規益名臣遺事冦凖為樞使當罷使人私公求為使相公大驚曰將相之任豈可求耶且吾不受私凖深恨之已而制出除凖武勝軍節度使同中書門下平章事凖入見泣涕曰非陛下知臣何以至此真宗具道公所以薦凖者凖始愧嘆以為不可及碑諌議大夫張師徳謁向文簡曰師徳兩詣王相公門皆不得見恐為人輕毁望公從容明之一日方議知制誥公曰可惜張師徳向公曰何謂公曰累于上前説張師徳名家子有士行不意兩及吾門狀元及第榮進素定但當靜以待之耳若復奔競使無階而進者當如何也向公方以師徳之意啟之公曰旦處安得有人敢輕毁人但師徳後進待我淺也向公固稱師徳適有闕望公弗遺公曰苐緩之使師徳知聊以戒貪進激薄俗也名臣遺事張尚書知成都召還朝議以任中正代之言者以為不可時公為相上責問之對曰非中正不能守詠之規他人往妄有變更矣上是之言者亦服王之能用人也湘山野錄以病求罷入見滋福殿真宗曰朕方以大事託卿而卿病如此因命皇太子拜公公言皇太子盛徳必任陛下事因薦可為大臣者十餘人其後不至宰相者李及凌䇿而已然亦皆為名臣碑公乆疾不愈上命肩輿入禁中使其子雍與直省吏扶之見于延和殿命曰卿萬一有不諱使朕以天下事付之誰乎公謝曰知臣莫若君時張詠馬亮皆為尚書上曰張詠如何不對又曰馬亮何如不對上曰試以卿意言之公強起舉笏曰以臣之愚莫若冦凖上憮然有間曰凖性剛褊卿更思其次公曰他人臣不知也公薨嵗餘上卒用凖為相王太尉薦莱公為相萊公數短太尉于上前而太尉専稱其長上一日謂太尉曰卿雖稱其美彼専談卿惡太尉曰理固當然臣在相位乆政事闕失必多凖對陛下無所隠益見其忠直此臣所以重凖也上由是益賢太尉初萊公在藩鎮嘗因生日造山棚大宴又服用僣侈為人所奏上怒甚謂太尉曰冦凖每事欲效朕可乎太尉徐對曰凖誠賢能無如騃何上意遽解曰然此正是騃耳遂不問並記聞萊公在長安因生日為㑹有所過當轉運使以聞上怒以狀示公公覽狀笑曰凖許大年幾尚騃耶因奏請錄付凖使自知過凖惶恐待罪名臣遺事陳彭年任翰林學士日求對歸詣政府公延見之陳起呈其狀曰科塲條貫公投之于地曰内翰做官幾日待隔截天下進士陳惶懼而退時向文簡同在中書一日陳再来公不見曰令到集賢㕔相見既而向出陳所留文字公瞑目取紙封之向曰何不一覽公曰不過興建符瑞圖進耳遺事公常與楊文公評品人物楊曰丁謂乆逺果何如對曰才則才矣語道則未它日在上位使有徳者助之庶得終吉若獨當權必為身累後謂果被流竄真宗欲命王欽若作相公曰欽若遭逢陛下恩禮已隆且乞在樞宻院兩府亦均臣見祖宗朝未嘗有南方人當國雖古稱立賢無方然須賢士乃可臣為宰相不敢沮抑人此亦公議也上遂止後公罷欽若乃相出語人曰為王公遲却我十年作相並遺事公每有賜予見家人置于庭下瞑目而嘆曰生民膏血安用許多名臣遺事公以儉約率子弟使在富貴不為驕侈兄子睦欲舉進士公曰吾常以太盛為懼其可與寒士爭進至其薨也子素猶未官遺表不求恩澤碑公母弟傲不可訓一日遇冬至祠家廟列百壺于堂前弟皆擊破之家人惶駭公忽自外入見酒流滿地不可行俱無一言但攝衣步入其後弟忽感悟復為善終亦不言韓魏公别錄公每見家人服飾似過即瞑目曰吾門素風亦至于此亟令減損故家人或有一衣稍華必于車中易之不敢令公見焉遺事有貨玉帶者公弟以呈公公曰如何弟曰甚佳公命繫之曰還見佳否弟曰繫之安得自見公曰自負重而使觀者稱好無乃勞乎我腰間不稱此物亟還之平生所服止于賜帶名臣遺事太尉不置田宅曰子孫各當念自立何必田宅置之徒使爭財為不義耳温公日錄太尉局量寛厚未嘗見其怒飲食有不精潔者但不食而已家人欲試其量以少埃墨投羮中公唯啖飯而已家人問其何以不食羮曰我偶不喜肉一日又墨其飯公視之曰吾今日不喜飯可具粥其子弟愬于公曰庖肉為饔人所私食肉不飽乞治之公曰汝輩人料肉幾何曰一斤今但得半斤食其半為饔人所廋食肉不飽公曰盡一斤可得飽乎曰固當飽曰此後人料一斤半可也其不發人過皆類此嘗宅門壊主者徹屋新之暫于廊廡下啟一門出入公至側門門低據鞍俯伏而過都不問門畢復行正門亦不問有控馬卒嵗滿辭公問汝控馬幾時曰五年矣公曰吾不省有汝既去復呼迴曰汝乃某人乎于是厚贈之乃是逐日控馬但見背未嘗視其面因去見其背方省筆談李文靖居相位公来預朝政一日便殿論邉事退公歎曰何日邉候徹警使吾輩得為太平宰相文靖不答至中書獨召公語云唯聖人能外内無患自非聖人外寧必有内憂譬人有疾常在目前則知憂而治之沆死子必為相遽與敵和親一朝疆場無事不有盤逰之樂必興土木之工矣及祥符間契丹既修好兵革不用近習任事之人始建議封泰山祀汾隂築玉清昭應宫崇奉天書耗用浸廣公常悒悒不自得然不忍獨善其身以去曰誰為國家抗羣小者乃薦先祖文靖公吕夷簡暨王沂公曽等二十餘人布列于位小人卒不能勝而成仁宗持盈之業公之勲也吕氏家塾記契丹既受盟而歸冦公每有自多之色雖上亦以自得也王欽若深患之一日從容言于上曰此春秋城下之盟也諸侯猶且恥之而陛下以為功臣竊不取真宗愀然不樂曰為之奈何欽若度上厭兵即謬曰陛下以兵取幽燕乃可刷恥上曰河朔生靈始免兵禍吾安能為此可思其次欽若曰唯有封禪泰山可以鎮服四海誇示外國然自古封禪當得天瑞然後可為也既而又曰天瑞安可必得前代葢有以人力為之者惟人主深信而崇奉之以明示天下則與天瑞無異也上乆之乃可然旦方為相上心憚之曰王旦得無不可乎欽若曰臣得以聖意諭旦宜無不可乘間為旦言之旦黽勉而從然上意猶未决莫與籌之者他日晚幸祕閤唯杜鎬方直宿上驟問之曰古所謂河圖洛書果何事耶鎬老儒不測上㫖漫應之曰此聖人以神道設教耳適與上意㑹上由此意決遂召旦飲酒于内中懽甚賜以樽酒曰此酒極佳歸與妻孥共之既歸發之乃珠子也由是天書封禪等事旦不復異議旦為相才有過人者然至此不能力爭議者少之龍川志真宗臨御嵗乆中外無虞與羣臣燕語或勸以聲妓自樂公性儉約初無姬侍其家以二直省官治錢上使内東門司呼二人者責限為相公買妾仍賜銀三千兩二人歸以吿公公不樂然難逆上㫖遂聴之葢公自是始衰數嵗而捐館舍初沈倫家破其子孫鬻銀器皆錢塘錢氏昔以遺中朝將相者花籃火筩之類非家人所有直省官與沈氏議止以銀易之具白于公公嚬蹙曰吾家安用此其後姬妾既具乃呼二人問昔沈氏作器尚再可求否二人謝曰向私以銀易之今見在也公喜用之如素有聲色之移人如此龍川志宋名臣言行錄前集巻二
