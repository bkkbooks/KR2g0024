body:
  text: 宋名臣言行錄外集巻六宋李幼武纂集吕希哲字原明正獻公之長子以恩補官元祐中除兵部員外郎充崇政殿説書紹聖初出知太平州坐黨謫居和州徽宗初復官知單州召為光禄少卿直祕閣知曹州尋奪職知相州邢州奉祠政和中卒年七十八正獻居家簡重寡黙不以事物經心而申國夫人性嚴有法度雖甚愛公然教公事事循蹈規矩甫十嵗祁寒暑雨侍立終日不命之坐不敢坐也日必冠帶以見長者平居雖天甚熱在父母長者之側不得去巾襪縳袴衣服唯謹行步出入無得入茶肆酒肆市井里巷之語鄭衛之音未嘗一經於耳不正之書非禮之色未嘗一接於目正獻倅潁州歐陽文忠適知州焦先生千之伯強客文忠所嚴毅方正正獻招之使教諸子諸生少有過差先生端坐召與相對終日竟夕不與之語諸生恐懼畏服先生方略降辭色時公方十餘嵗内則正獻與申國夫人教訓如此之嚴外則焦先生化導如此之篤故公徳器成就大異衆人公嘗言人生内無賢父兄外無賢師友而能有成者少矣始從胡安定於太學後遍從孫復石介李覯又從王安石學安石以為凡士未官而事科舉者為貧也有官矣而復事科舉是僥倖富貴利達學者不由也公聞之遽棄科舉一意古學始與伊川俱事胡瑗公少程一二嵗察其學問淵源非他人比首以師禮事之而明道横渠孫覺李常皆與公逰由是知見日益廣大然公亦未嘗専主一説不私一門務略去枝葉一意涵養直截徑捷以造聖人専慕曽子之學盡力乎其内者其讀經書平直簡要不為辭説以知言為先自得為本躬行為實不尚虚言不為異行正獻嘗語張耒曰此子不欺闇室守官京師不謁臺諌遇遷轉即一見執政過此不見也正獻廣用當世賢士人之有一善無不用也嘗以數幅紙書當世名士姓名既而失之後復見此紙則所書人悉用之矣嘗親書遺公曰當世善士無不用者獨爾以吾故不得用亦命也為説書凡二年日夕勸導人主以修身為本修身以正心為本心正意誠天下自化不假他術身不能修雖左右之人且不能諭況天下乎除諌官累辭未獲蘇子瞻在邇英戲謂公曰法筵龍象當觀第一義公笑而不答退謂范淳父曰若辭不獲命必以楊畏為首時畏方在言路以險詐自任頗為子瞻所厚公故及之晚居宿州真揚間十餘年衣食不給有至絶粮數日者處之晏然靜坐一室家事一切不問不以毫髪事託州縣在和州嘗作詩云除却借書沽酒外更無一事擾公私閑居日讀易一爻遍考古今諸儒之説黙坐沉思隨事解釋夜則與子孫評論古今商確得失乆之方罷嘗云自少官守處未嘗干人舉薦以為後生之戒仲父舜從守官會稽人或譏其不求知者仲父對詞甚好云勤於職事其他不敢不慎乃所以求知也行巳務自省察校量以自進益晚年嘗言十餘年前在楚州橋壊墮水中時覺心動數年前大病已稍稍勝前今次疾病全不動矣其自力如此晚年習靜雖驚恐顛沛未嘗少動自厯陽赴單守過山陽渡橋橋壊轎人俱墜浮于水而公安坐轎上神色不動從者有溺死者徐仲車先生時年幾七十矣作我敬詩贈公曰我敬吕公以其徳齒敬之愛之何時已已美哉吕公文在其中見乎外者古人之風惟賢有徳神相其祉何以祝公勿藥有喜為郡令公帑多蓄鰒魚諸乾物及笋乾蕈乾以待賔客以減鷄鴨等生命也為人處事皆有長乆之計求方便之道只如病中風人口不能言手不能書而養疾者乃問所欲病者既不能答適足増苦故公嘗教人每事作一牌子如飲食衣裳寒熱之類及常所服藥如理中元之類常所作事如梳頭洗手之類及作人親等書病者取牌子以示人則可減大半之苦凡公為人處事每如是也仙源嘗言與公為夫婦相處六十年未嘗一日有面赤自少至老雖袵席之上未嘗戲笑嘗言世人喜言無好人三字者可謂自賊者也包孝肅尹京時民有自言以白金百兩寄我者死矣予其子其子不肯受願召其子予之尹召其子辭曰亡父未嘗以百金委人也兩人相讓乆之公言觀此事而言無好人者亦可以少媿矣人皆可以為堯舜葢觀於此而知之言後生初學自須理會氣象氣象好時百事是當氣象者辭令容止輕重疾徐足以見之矣不惟君子小人於此焉分亦貴賤壽夭之所由定也又説攻其惡無攻人之惡葢自攻其惡日夜且自㸃檢絲毫不盡即不慊於心矣豈有工夫㸃檢他人耶又言凡與交㳺書問其父祖知名於世者須避其名諱凡作書須先思及書之於几然後作書文潞公與故舊欵接一坐未嘗犯其祖父諱或問公為小人所詈辱當何以處之曰上焉者知人與已本一何者為詈何者為辱自然無忿怒心也下焉者且自思曰我是何等人彼為何等人若是答他却與此人等也如此自處忿心亦自消也朱子曰吕公家傳深有警悟人處前輩涵養深厚乃如此但其論學殊有病如云不主一門不私一説則博而雜矣如云直截勁捷以造聖人則約而陋矣舉此二端可見其本末之皆病此所以流於異學而不自知其非耶而作此傳者又自有不可曉者如云雖萬物之理本末一致而必欲有為此類甚多不知是何等語又義例不明所載同時諸人或名或字或褒或貶皆不可考至如蘇公則前字後名尤無所據豈其學無綱領故文字亦象之而然耶最後論佛學尤可駭歎程門千言萬語只要見儒者與釋氏不同處而吕公學於程氏意欲直造聖人盡其平生之力乃反見得佛與聖人合豈不背戾之甚哉夫以其資質之粹美涵養之深厚如此疑若不叛於道而窮理不精錯繆如此流傳於世使有志於道而未知所擇者坐為所悮葢非特莠之亂苗紫之亂朱而已也朱光庭字公掞河南偃師人登嘉祐二年進士第調萬年簿文潞公舉應制科會仁宗升遐罷試丁艱服除為修武令改坦曲令以樞臣薦召對吕汲公守長安辟僉判司馬温公薦召為左正言遷左司諌拜右諌議遷給事中除集賢修撰知亳州復召為給事後知潞州遷集賢院學士紹聖元年卒年五十八初受學於安定告以為學之本主於忠信公終身力行之後又從二程於洛其所聞以格物致知為進道之門正心誠意為入徳之方公服行之造次不忘常謂百世以俟聖人而不惑者惟孔孟為然故力排異端以扶正道簿萬年數假邑事邑人謂之明鏡時程伯淳簿鄠縣張山甫簿武功皆以才名稱關中謂之三傑神宗召對言陛下即位以來更張法度臣下行之或非聖意故有便不便誠能去其不便則天下均被福矣温公薦為左正言首以辨大臣忠邪為言又請天子燕閑與儒臣講習罷提舉常平官不散青苗廣儲蓄備水旱太學置明師以養人材論奏無虚日太皇太后嘉公正直諭以朝政闕失當安心言之勿畏避公自以遇知竭力知無不言時進退大臣損益政事公宻勿啟沃多見施行拜右諌議請召講官便殿訪以治道遷給事中有詔幸後苑賞花釣魚宴羣臣會春寒公請罷宴以祗天戒劉摯罷相守鄆州公封還麻制以摯有功大臣不當無名而去言者若指臣為朋黨願被斥而不辭後鄭雍攻之公遂出知亳州公在洛有書室兩旁各一牖牖各三十六隔一書天道之要一書仁義之道中以一榜書毋不敬思無邪中處之此意亦好伊川哭之曰子兄弟倡學之初衆方驚異君時甚少獨信不疑篤學力行至於沒齒志不渝於金石行可質於神明在邦在家臨民臨事造次動靜一由至誠上論古人豈易其比蹇蹇王臣之節凜凜循吏之風謂當施於時必得其夀天胡難忱遽止于此七八年間同志共學之人相繼而逝今君復彼使予踽踽於世憂道學之寡助則予之哭君豈交朋而已胡文定云熙寧元祐靖國間事變屢更其時固有名葢天下致位廟堂得行所學者然夷考其事猶有憾焉如張天祺朱公掞等可謂奮不顧身盡忠許國而議論亦多過矣乃知理未易窮義未易精言未易知心未易盡聖賢事業未易到也劉絢字質夫先世常山人祖仕宦家河南以祖䕃得官初仕夀安縣簿移潞之長子令元祐初韓維薦充學官王巖叟等薦為春秋博士二年卒于官年四十二君生質明粹長而温恭自髫齓時即事二程受學焉君所受有本末所知造淵㣲知所止矣孜孜焉不知其他也天性孝弟樂善而不為異端所惑故其履也安内日加重而無交戰之病故其行也果明道嘗謂人曰他人之學敏則有矣未易保也斯人之志吾無疑焉為人氣和而體莊持論不茍合跬步不忘學既病與予李籲言曰每瞀悶時正坐端意氣即下平居持養氣可忽乎同舍吕與叔過問疾君曰死生常理無足言者獨念累吾親耳王巖叟朱光庭言君少通春秋宜為博士詔為太學博及就試有疾猶勉力學校論議不倦學者多親之卒也公卿大夫師友學士莫不傷之君春秋之學祖於程氏専以孔孟之言斷經意將沒之時尚以例類質於士大夫平時有遺稿未就將終啟手足自盥靧猶道詩書語可謂力學者伊川哭之曰聖學不傳乆矣吾生百世之後將明斯道興斯學於既絶力小任重而懼其難者亦有冀矣以謂茍能使知之者廣則用力者衆何難之不易也遊吾門者衆矣而信之篤得之多行之果守之固若子者幾希方賴子致力以相輔而不幸遽亡使吾悲傳學之難則所以惜子者豈止遊從之情哉程子云質夫沛然侯仲良云明道平和簡易惟劉絢庶幾似之上蔡云朱君留意春秋之學甚善向見程先生言須要廣見諸家之説其門人惟劉質夫得先生㫖意最多李籲字端伯緱氏人元祐中為祕書省校書郎伊川云端伯相聚雖不乆未見他操履然才識穎悟自是不能巳也又云明道語錄只有李籲本無錯他人多只依説時不敢改動或脱忘一兩字便大别李籲却得其意不拘言語往往錄得都是公卒伊川哭之曰自予兄弟倡鳴道學世方驚疑能使學者視效而信從子與劉質夫為有力焉予謂二子才器相類志尚如一可以大受期之逺列半年之間相繼而亡使予憂事道者鮮悲傳學之難嗚呼天於斯文何其艱哉吕與叔亦哭之曰子之胷中閎肆開發求之孔門如賜也達朱子曰劉質夫李端伯吕與叔諸公所造尤深所得尤粹吕大鈞字和叔先世汲郡人今為京兆人中嘉祐二年進士乙科授秦州司理監延州折博務改知耀州三原縣以諌議授果州乞代入蜀移知綿州巴西縣未上以諌議告老不行韓絳宣撫河東陜西辟機宜轉候官宰曽公亮薦知涇陽皆不赴後丁父憂服除閒居大臣薦為宫教以仲兄大防知紹興乞監鳳翔府造船務改宣義郎元豐五年卒年五十二君為人質厚剛正以聖門事業為已任所知信而力可及則身遂行之不復疑畏故識者方之季路而君心所趨葢亦未見其止也葢大學之廢絶乆矣自扶風張先生唱之而後進蔽於俗尚其才俊者急於進取昬塞者艱於領解由是寂寥無有知者君於先生為同年友及聞先生學於是心悦誠服賔賔然執子弟禮叩請無倦乆而益親自是學者靡然知所向矣張先生之學大抵以誠明為本以禮樂為行衆人則姑誦其言而未知其所以進於是焉君即若蹈大路朝夕從事不啻饑渇之營飲食也潛心玩理望聖賢之致尅期可到而日用躬行必取先生之法度以為宗範自身及家自家及鄉人旁及親戚朋友皆紀其行而述其事丁諌議憂自始喪至於葬祭一倣古儀所得為者而居喪之節鉅細規矩于禮又推之祭祀冠昏飲酒相見慶弔之事皆不混習俗粲然有文以相接人咸安而愛之君少時贍學洽聞無所不該一日聞先生説遷其素志而前日之學博而以約明涣然冰釋矣故比他人功敏而得之尤多愛講明井田兵制以謂治道必由是悉撰成圖籍若可推行君既感疾一日命内外洒掃齋居冥然若思乆之客至問安交語未終而沒徳性所養可以想見矣范育表其墓曰惟君明善至學性之所得者盡之心心之所知者踐之身可謂至誠敏徳者矣又曰君性純厚易直強明正亮所行不二于心所知不二于行其學以孔子下學上達之心立其志以孟子集義之功養其徳以顔子克已復禮之用厲其行其要歸之誠明不息不為衆人沮之而疑小辯奪之而屈勢利刼之而回知力窮之而止其自任以聖賢之重如此丁諌議憂服闋復閑居數年自以道未明學未優於是有不仕意講道勸義以教育人材變化風俗推其在已者以驗諸人將自期徳成而致用也伊川云和叔及相見則不復有疑既相别則不能無疑然亦未知果能終不疑不知他既巳不疑而終復有疑明道云何不問他疑甚不如劇論又云和叔至誠相信心直篤信吕大臨吕大忠附字與叔大鈞之弟學於横渠横渠卒乃東見二程而卒業焉元祐中除太博正字范内翰薦可為講官未用而卒君以門䕃入仕不應舉或問其故曰不敢揜祖宗之徳伊川云與叔守横渠說甚固每横渠無説處皆相從有説了更不肯回又云與叔六月中來緱氏間居中某常窺之必見其儼然危坐可謂敦篤矣學者須恭敬但不可令拘迫拘迫則難乆也和叔任道其風力甚勁然深潛縝宻有所不逮於與叔元豐庚申嵗予行雍華間關西學者相從者六七人予以千錢掛馬鞍比就舍則亡矣僕夫曰非晨裝而亡之則涉水而墜之矣予不覺嘆曰千錢可惜坐中二人應聲曰千錢亡去甚可惜也次一人曰千錢㣲物何足為意後一人曰水中囊中可以一視人亡人得又何歎乎予曰使人得之則非亡也而歎夫有用之物若沉水中則不復為用矣至雍以語公曰人之器識固不同自上聖至於下愚不知有幾等同行者數人耳其不同也如此公曰夫數子之言何如子曰最後者善公曰誠善矣然觀先生之言則見其有體而無用也並伊川語范祖禹嘗薦其修身好學行如古人可為講官不及用而終汲公祭文曰子之學博及羣書妙達義理如不出諸口子之行以聖賢為法其臨政事愛民利物若無能者子之文章幾及古人薄而不為四者皆有以過人而其命乃不偶於世登科者二十年而始改一官居文學之職者七年而逝子之婦翁張天祺嘗謂人曰吾得顔回為壻矣其為人所重如此公兄大忠字晉伯為秦帥有馬涓巨濟狀元及第為秦州僉判初呼狀元晉伯謂之曰狀元云者及第未除官也既為判官不可曰狀元也馬愧謝又謂馬曰科舉之學既無用修身為己之學其勉之時上蔡作秦教為程氏之學晉伯每屈車騎同馬過之則上蔡為講論語晉伯正襟肅容聴之曰聖人之言行在焉吾不敢不肅又數以公事案牘委馬詳覆且曰修身為已之學不可後為政治民其可不知馬自以為得師後立朝為臺官有聲每歎曰吕公教我之恩也程子云晉伯老而好學理會直是到底某謂老喜學者尤可愛人少壯則自當勉強上蔡云晉伯好學初理會个仁字不透予因曰世人説仁字只管著愛上怎生見得仁只如力行近乎仁力行關愛甚事何故却近乎仁推此類具言之晉伯因悟曰公説仁字正與尊宿門説禪一般晉伯兄弟中皆有見處一人作詩詠曽㸃事曰函丈從容問且酬展才無不到諸侯可怜曽㸃惟鳴瑟獨對春風詠不休一人有詩曰學如元凱方成癖文到相如反類俳獨立孔門無一事只輸顔子得心齋程子曰此詩甚好古之學者惟務養情性其他則不學今為文者専務章句悦人耳目既務悦人非俳優而何朱子曰與叔之文煞實説得好處如千兵萬馬飽滿伉壯程子稱其深潛縝宻可見資質好又能涵養惜乎不夀某若只似與叔之年亦不見得到此田地了與叔本是个剛底氣質涵養得到如此故聖人以剛為君子柔為小人若剛矣須除去剛之病全其為剛之徳相次可以為學若不剛終是不能成與叔論顔子等處極好又云未發之前心體昭昭具在伊川不破此説克已銘不合以已與物對説不曽説著本意並朱子語蘇昞字季明武功人横渠門人卒業於二程元祐末吕大忠薦之自布衣召為博士後坐上書邪黨竄鄱陽吕大忠薦其徳性純茂強學篤志行年四十不求仕進從張載之學為門人之秀秦之賢士大夫亦多稱之如䝉擢用俾充學官之選必能盡其素學以副朝廷樂育之意公以上章得罪貶饒州過洛和靖館之伊川既行伊川謂季明殊不以遷貶為意和靖曰然也焞嘗問季明當為上書為國家計耶為身計耶若為國家計自忻然赴饒州若為進取計則饒州之貶猶為輕典季明以焞言為然伊川曰名言名言後世司言責者於人主前非所當言代王言者則顛倒錯亂只為他學無源流如在伊川之門衆矣不知其要者依舊無所得季明從横渠最乆以其文釐為十七篇自謂最知大㫖及後來坐上書邪黨却是未知横渠朝廷事自有宰相執政其次有諌官御史季明越職上書得罪甚重亦必有非所宜言者矣胡氏傳家錄宋名臣言行錄外集巻六
