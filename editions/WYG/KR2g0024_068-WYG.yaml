body:
  text: 宋名臣言行錄外集巻十宋李幼武纂集胡安國武夷先生文定公字康侯建之崇安人紹聖四年中進士第授常州判官改江陵推未赴如荆門道出江陵帥守監職司一見合奏乞除荆南教報可赴闕除太學錄丐外除提舉湖南學事崇寜五年例罷學事倅成徳軍以舉遺逸獲譴除名大觀四年復官改正元㫁宣和元年提舉江東學事尋掛冠末年侍臣合薦經學可用㫖落致仕除尚書員外郎三辭不允尋除中舎賜三品服宰臣擠之除殿撰知通州中興初召為給事中三辭建炎三年再召固辭主祠紹興初除中舎兼侍講辭不允二年就職吕頥浩言公屢詔偃蹇落我主祠五年除徽猷待制知永州辭詔依差提舉太平觀尋除寳文直學士八年歿於書堂正寢少長入太學晝夜刻勵同舎有穎昌靳裁之嘗聞程氏之學與公論經史大義公以是學益强識日明登第時策問大要欲復熈豐之政公推言大學格物致知正心誠意以平天下之道辭㡬萬言考官得之定為第一將唱名宰執以策中無詆元祐語欲降其等哲宗親擢為第三靖康初至京師方以疾在告一日午枕上急召公入見奏曰明君以務學為急聖學以正心為要心者事物之宗正心者揆事宰物之權也若分章析句牽制文義無益於心術者非帝王之學也願擇名儒明於治國平天下之本者虚懐訪問以深發獨智又奏為天下國家者必有一定不可易之計謀議既定君臣固守雖浮言異説沮毁摇動而初計不移故有志必成治功可立淵聖一日問中丞許翰識安國否對曰臣雖未識其面然久聞其名自蔡京得政以來天下士大夫無不受其籠絡超然逺迹不為所汙者惟胡某一人耳淵聖嗟異焉何㮚建議天下之勢治平則宜重内遭變則宜重外乞分置四道帥臣以都總管為名各付一面為衛王室禦狂冦之計公奏曰内外之勢適平則安偏重則危今州郡太輕理宜通變然一旦據以數百州之地二十三路之廣分為四道則權復太重假令萬一抗衡䟦扈號召不至又何以待之乎欲乞據見今所置帥司選擇重臣付以都總管之權専治軍旅每嵗一按察其部内或有警急京師戒嚴即各帥所屬守將應援如此則既有擁衛京師之勢又無尾大不掉之虞一舉兩得矣樞宻張浚薦公可大用再以給事中召公辭因致書宰相吕頥浩曰夫嘉祐政事之大要本於愛民始於審謀成於果㫁今朝廷欲理兵政以强國而官吏不知恤民以養兵是欲稼之長而涸其水欲木之茂而去其根則與嘉祐愛民之意異矣至於衆謀紛紜而國是未定命令交錯而民聽未孚法制數更而下不知其所守其於嘉祐審謀能斷亦異矣定計論曰撥亂興衰必有前定不移之計而後功可就陛下履極六年以建都則未有必守不移之居以討賊則未有必操不變之術以立政則未有必行不反之令以任官則未有必信不疑之臣舎今不圖後悔何及設險論曰設險以得人為本保險以智計為先人勝險為上險勝人為下人與險均纔得中策方今所患在於徒險而人謀未善爾今欲固上流必保漢沔欲固下流必守淮泗欲固中流必以重兵鎮安陸此守江常勢雖有小變而大槩不可易者也正心論曰心者身之本也正心之道先致其知而誠意故人主不可不學也蓋戡定禍亂雖急於戎務必本於方寸不學以致知則方寸亂矣何以成帝王之業乎養氣論曰用兵之勝負係軍旅之强弱軍旅之强弱係將帥之勇怯將帥之勇怯係人主所養之氣曲直如何耳蓋人主將將也以直養氣自反而縮則孟子所謂約而狐偃所謂壯也壯則强以曲喪氣自反而不縮則孟子所謂餒而狐偃所謂老也老則弱凡曲直者兵家制勝之先㡬也陛下勇於為善益新厥徳使無有曲之可議則守為剛氣可塞乎兩間震為怒氣可以安天下矣宏度論曰人主以天下為度者也所好當遵王道不可以私勞行賞所惡當遵王路不可以私怨用刑其喜怒則當發必中節和氣絪緼而育萬物也陛下聖度虚明天心廣大固當不以私喜親近諛佞亦當不以私怒䟱逺正直賞而必當是謂天命罰而必當是謂天討施諸一人而千萬人悦以畏矣寛隠論曰君遇臣下恩禮雖一而崇髙嚴恪常行於介冑爪牙之夫以折其驕悍難使之氣柔遜謙屈必施於林壑退藏之士以厲其亷靖無求之節乃能駕馭人才表正風俗威有所當加勢有所可屈加於所當加以立威則强屈於所可屈以忘勢則昌望降詔申明凡被詔有不能赴者悉從其欲不强致之獨以威刑外施暴横之戎内拂貪殘之賊與悍驕不可使之將䜛説殄行之臣則治道成矣上謂曰聞卿奥於春秋方欲講論遂以左氏傳付公㸃句正音公奏曰春秋乃仲尼親筆實經世之大典見諸行事非空言比也陛下必欲削平僣叛克復寳圖使亂臣賊子懼而不作莫若儲心仲尼之經則南面之術盡在是矣除兼侍講専以春秋進講㑹除朱勝非都督江淮荆浙諸軍事公奏㳂江都督用人得失係國安危恐勝非不足倚仗詔勝非赴召時吕頥浩都督還朝欲傾右相秦檜指公為黨魁力引勝非為助而據公奏擬進責命曰安國屡召不至今始造朝又數有請其自為謀則善矣百官象之如國計何遂落職宫觀公登舟稍稍泝流三日而後行次衢梁訪醫留再旬至豐城寓居又半嵗乃渡南江而休於衡嶽買地結廬名曰書堂為終焉計頺然當世之念矣初荆公以字學訓經義自謂千聖一致之妙而於春秋不可偏旁㸃畫通也則詆以為斷爛朝報直廢棄之不列於學官下逮崇寜防禁益甚故家遺俗或存三傳舊本見者撫歎或遂指以為春秋而仲尼經世之心㡬於熄矣公自壯年即有服膺之志嘗曰六籍惟此書出於先聖之手乃使人主不得聞講説學者不得相傳習亂倫滅理用夷變夏殆由此乎於是潛心刻意裒古今諸儒所著述無慮百家片言之善采拾靡遺害義切深必加辨正或去或取無一毫好惡之偏盖準則之以語孟權衡之以五經證據之以厯代之史窮研玩味游咏沈酣者三十年及得伊川所作傳其間精義十餘條若合符節益以自信探索愈勤至是年六十一而書始就慨然歎曰此傳心之要典也蓋於克已修徳之方尊君父討亂賊攘夷狄存天理正人心之術未嘗不屢書而致詳焉公負傑出絶異之資見善必為為必要其成知惡必去去必絶其根自幼少時巳有出塵之趣登科後同年宴集飲酒過量是後終身不復醉嘗好奕棋先令人責乏曰得一第徳業竟止是奕耶後不復奕為學官京師同僚多勸之買妾事既集慨然歎曰吾親待養千里之外曾是以為急遽寢其議亦終身不復買妾也在長沙日行部過衡岳愛其雄秀欲一登覽巳戒行矣俄而思曰非職事所在也即止罷官荆南僚舊餞行於渚宫呼樂戯以待而交代楊龜山具朝膳留公鮭菜蕭然引觴徐酌置語孟案間清坐講論不覺日晷之暮也壬子赴闕過上饒有從臣家居者治饌延公飾姬妾請令出奉巵酒為夀公蹙然曰二帝䝉塵國步阢隍豈吾徒為燕樂之日敢辭其人赧而止辭受取舎一介之㣲必度於義恬静簡黙寡於言動雖在宴閑獨處未嘗釋手每晨昬子弟定省必問何所業有合意則曰士當志於聖人勿臨深以為髙見怠慢不虔必嚬蹙曰流光可惜無為小人之歸子弟或近出燕集雖夜已深猶未寢必俟其歸騐其醉否且問其所集何客所論何事有益無益以是為常士子有自逺來學者公隨其資性而接之大抵以立志為先忠信為本以致知為窮理之漸以敬為持養之要每誦曽子之言曰君子之愛人以徳小人之愛人以姑息故不以辭色假借子弟與學者亦未嘗降志孫言茍為唯諾以祈人之悦也壯年嘗觀釋氏書後遂屏絶嘗答贑川曽㡬書云窮理盡性乃聖門事業物物而察知之始也一以貫之知之至也來書以五典四端每事充擴亦未免物物致察非一以貫之之要是欲不舉足而登泰山也四端固有非外鑠五典天叙不可違充四端惇五典則性成而倫盡矣釋氏雖有了心之説然其未了者為其不先窮理反以為障而於用處不復究竟也故其説流遁莫可致詰接物應事顛倒差繆不堪㸃檢聖門之學則以致知為始窮理為要知至理得不迷本心如日方中萬象皆見則不疑所行而内外合也故自脩身至於天下國家無所處而不當矣來書又謂充良知良能而至於盡與宗門要妙兩不相妨何必捨彼而取此夫良知良能愛親敬長之本心也儒者則廣而充之達於天下釋氏則以為前塵為妄想批根㧞本而殄滅之正相反也而以為不相妨何哉公於出處由道㨿義行心之所安其欲出也非由勸勉其欲去也不可挽留朱震被召問出處之宜公曰某謂世間惟講學論政則當切切詢究至於行巳大致去就語黙之㡬如人飲食其饑飽寒温必自斟酌不可決之於人亦非人所能决也某出處自崇寜以來皆内㫁於心雖定夫顯道諸丈人行皆不以此謀之也游楊謝皆二程髙弟公不及二程之門而三君子皆以斯文之任期公謝公嘗語朱震曰康侯正如大冬嚴雪百草萎死而松栢挺然獨秀也使其困厄如此乃天將降大任焉耳公尚論古人則以諸葛武侯為首於本朝卿相則以韓忠獻公為冠慕用鄉仰言必稱之公性本剛急及其老也氣宇冲澹容貌雍穆於和樂中有毅然不可犯之象於嚴正中有薫然可親近之意年浸髙矣加以疾病而謹飭於禮無異平時家世至貧轉徙流寓遂至空乏然貧之一字於親故間非惟口所不道故亦手所不書嘗戒子弟曰對人言貧者其意將何求汝曹志之公風度凝逺蕭然塵表視天下無一物足以嬰其心者取舎一介必度於義饑不可得而食寒不可得而衣自登第逮休致凡四十年在實厯之日不登六載雖數以罪去而愛君之心逺而愈篤每被召即置家事不問或通夕不寐思所以告君者然宦情如寄所好不在焉上蔡曰聞公進道甚篤徳業日美所到豈可涯涘真足畏也更以其大者移於小物作日用工夫尤佳南軒曰公雖不及河南之門然與游楊謝遊而講於其説其自得之奥在於春秋被遇明時執經入侍正大之論竦動當世所以扶三綱明大義抑邪説正人心亦可謂有功於斯文矣建寜祠記晦庵曰公傳道伊洛志在春秋著書立言格君埀後所以明天理正人心扶三綱叙九法者深切著明體用該貫而其正色危言據經論事剛大正直之氣亦無所媿於古人以後並朱子語䟦公與吕尚書帖曰朋友之交責善所以盡吾誠取善所以益吾徳非以相為賜也然各盡其道而無所茍焉則麗澤之益自有不能巳者讀此帖使人凛然起敬若嚴師畏友之在其前後左右也嗚呼是數君子者其可謂盡朋友之道而無所茍矣其卓然有以自立於當年而遺風餘列可傳於世者豈徒然哉文定春秋傳却只以執轅濤塗一事為器小此大拘泥因言管仲相威公以伐楚只去問他包茅與昭王南廵不反二事尋些年代久逺巳冷底罪過只此小不供貢事想他見無大利害决不深較此亦是器小之故胡春秋傳有牽强處然議論有開合精神熹親見文定家説文定春秋説夫子以夏時冠月以周正紀事謂如公即位依舊是十一月只是孔子改正作春正月某便不敢信恁地時二百四十二年夫子只證得个行夏之時四个字㨿今周禮有正月有正嵗則周實是元改作春正月夫子所謂行夏之時只是為他不順欲改從建寅胡説公即位終是不通且踰年即位㓙服如何入廟渠説是冡宰攝行他事可攝即位亦可攝且如十一月乙丑伊尹以冕服奉嗣王惟十有三祀却是除服了康王之誥東坡道是召公失禮處想古時是這般大事必有個權宜如借吉例胡春秋説得太深又曰大義正他所説盡是正理但不知聖人當初是恁地不是恁地今皆見不得所以熹於春秋不敢措一辭正謂不敢臆度了胡謂春秋絶筆於獲麟為志壹則動氣意思説得也甚好解經而通世務者無如文定然教他做經筵官又却不肯一向辭去要做春秋解不知是甚意思蓋他有退而著書立言以埀後世底意思胡春秋非不好却不合這件事聖人意是如何下字那件事聖人意又如何下字要之聖人只是直筆據見在而書豈有許多忉怛胡春秋末論義理且看其文字亦便見此老胸中間架規模不草草也問胡春秋止説歸忠孝處便為經疑不知果得孔子意否曰否嘗説詩書是隔一重兩重説易春秋是隔三重四重説春秋義例易爻象雖是聖人立下今説者用之各信已見然於人倫大綱皆通但未知曽得聖人意當初本説否且不如讓渠如此説且存取大意得三綱五常不至廢墜足矣今欲直得聖人本意不差未須理㑹他經先須於論孟中専意看他切不可忙虚心觀之不須先自立見識徐徐以俟之莫立課程胡傳家錄議論極有力可以立貪起懦但以上工夫不到問文定却是卓然有立所謂非文王猶興者曰固是資質好然在太學多聞先生師友之訓所以能然文定之學後來得之上蔡者為多文定説較踈然較好五峯説宻然有病問文定與秦檜厚善之故曰秦嘗為宻教翟公巽知宻州薦試宏詞游定夫過宻與之同飯于翟竒之後康侯問人才於定夫首以秦為對云其人類文若又云無事不㑹後京城破金欲立張邦昌執政而下無敢有異議惟秦抗論以為不可康侯益義其所為力言於張徳逺諸侯之前後秦自金而歸與聞國政康侯屬望尤切嘗有書疏往還講論國政康侯有詞掖天筵之召則秦之薦也然其雅意堅不欲就是時巳窺見其隐㣲一二有難處故以老病辭後來秦做出大踈脱則康侯巳謝世矣宋名臣言行錄外集巻十
