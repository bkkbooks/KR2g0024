body:
  text: 宋名臣言行録别集下卷四宋李幼武纂集趙鼎字元鎮解州人崇寧五年登科建炎二年為樞密計議遷侍御史又遷御史中丞四年權僉書密院罷提舉洞霄紹興二年除江東安撫大使知建康三年改江西安撫知洪州四年除參政數月遷知院川陜安撫處置使俄改都督川陜荆襄諸軍事未行留為尚書右僕射同中書門下平章事兼知院五年守左僕射六年罷為觀文殿學士浙東帥知紹興七年復左僕射八年加特進罷為浙東帥知紹興又罷為醴泉為洞霄知泉州十年責授祕書監分司西京興化軍居住又責清逺軍節副使潮州安置十四年移吉陽軍十七年卒年六十三淳熙十五年配享髙廟時金兵在建康築城為度夏計公請遣使督王􅊛進軍宣州周望分兵出廣德合邀金歸路及詔劉光世駐軍蘄黃牽制湖南賊兵與杜充為聲援并為邀擊之計或㑹充於楚泗使金知江左軍衆歸路稍艱必漸退軍如尚占臨安建康則乘暑擊之除御史范宗尹言非故事上曰朕除言官即置一簿考其所言多寡鼎所言四十事已行三十六矣言陛下初即位即罷常平官吏蠲免常平錢穀而去嵗復置振刷諸司侵支催理民間舊缺人心駭愕物論紛紜願罷之復置平糶之法公言吳越介在一隅非進取中原之勢荆襄左顧川陜右視京洛在三國所必爭真帝王之宅也宜以公安為行闕而屯重軍於襄陽前為屏翰運江浙之粟資川陜之兵經營大業計無出此頥浩在位顓恣鼎率其屬論之頥浩聞之移鼎翰林鼎引司馬光故事以不習駢儷之文不肯就職鼎僉書樞密院事時宰相未兼樞密同知周望在平江鼎以獨員兼總前此兵政悉𨽻御營使司事權既分又再經大變文移紛亂鼎檢故事舉行以正西府之體金攻揚州楚州勢亦危鎮撫司趙立遣人告急樞密院鼎欲遣張俊往救之俊曰虜方濟師達蘭善兵其鋒不可當立孤壘危在旦夕若以兵委之併亡無益鼎曰楚當虜衝所以蔽兩淮若委而不救則失諸鎮之心俊曰救之誠是但南渡以來根本未固而宿衛寡人心易搖此行失利何以善後鼎曰江東新造全藉兩浙若失楚則大事去矣是舉也不惟救垂亡之城且使諸將殫力不為養冦自封之計若俊憚行臣願與之偕往乃詔嶽飛掩擊宰執奏邊事范宗尹曰金未必再渡鼎曰勿恃其不來恃吾有以待之也又曰三省常為金不來而為陛下拔人材修政事樞密院常為金見侵而為陛下申軍律治兵甲即兩得之上曰卿等如此朕復何憂鼎為江東安撫大使始至建康視事時孟庾韓世忠皆駐軍府中多招安强冦鼎為二府素有剛正之風庾世忠皆加禮兩軍肅然知懼民既安堵商旅通行焉初詔李橫等直趨京城或徑往長安與宣撫使夾擊江西帥趙鼎奏襄陽居江淮上流實川陜襟喉之地以橫鎮撫誠為得䇿今聞橫與牛臯共起兵往東京又聞僞齊亦㑹金人及遣李成領衆西去恐緣此紛擾不定橫烏合之衆將不能禦則決失襄陽川陜路絶江湖宸動其害可勝言哉金僞兵犯襄陽京西招撫使李橫以食盡棄城遁欲奔荆南以俟朝命其屬趙棄疾閻大鈞等勸使歸朝待罪橫曰我以烏合之衆所至自謀衣食人皆指為賊萬一諸郡不見納奈何二人曰我亦官軍也何至是既而鄂帥劉洪道果拒之橫大怒欲殺二人皆呼曰江西帥趙樞密可歸也橫猶未入而公已遣米舟至其衆遂安公復以銀犒橫之衆且檄黃州守鮑貽遜迎勞於境橫大喜有僞宿遷令張澤率其邑二千餘人自拔來歸泗州守臣徐宗城納之僉書徐俯以為恐妨和議欲斬澤送首劉豫公固爭之乃命澤以官且給間田處其種於淮西公參政上令公薦進人才公即以朱震范同呂祉陳槖呂本中林季仲上之乃詔三省公共隨器任使鼎除知樞密院川陜宣撫使鼎留身辭以非才上曰四川之地半天下盡以付卿卿便宜黜陟専之可也時吳玠已除宣撫副使鼎奏曰臣之此行與吳玠為同事或當節制之上悟遂除都督川陜諸軍事鼎又奏曰荆襄四川後門勢須兼領上以為然遂兼都督川陜荆襄諸軍命下之日識者相謂曰只此一著已自過人鼎將行奏云陛下軫念西陲宵旰以圖勞來安輯之方故遣大臣往將使指是宜上下戮力以寬君父之憂汲汲惶惶協濟厥事若但為僥幸嘗試之圖其實何補今臣備員督府近在闕庭施置之間已多齟齬所謂兵者不滿數千半皆老弱不勝甲胄疲癃跛倚吁笑可憐所賫金帛至為微少猶控顔􅅹懇幾同乞丐薦舉士人皆憚逺適面得睿㫖令除京局薦章甫上彈奏已行令臣意氣憂沮舉措畏忌退視賔僚有􅌤面目士大夫間或笑其單弱或憂其無成皆謂事大體重有名無實若臣一身亦何足道顧國事安危不知安在今孤踪逺去君門萬里若或更加沮抑臣亦何能自辨公自入參與將論防秋大計獨張浚曰避當何之惟向前一步庶可脫當列天下兵守平江却徐為之公曰公言避非策是也以天下兵守一州之地非也公但堅向前之議足矣蓋公隂有所處故每日留身必陳用兵大計上意已悟又使俊密為之助至是決意親征留公不遣入蜀以公久有此議故也公以俊為助者乃冦萊公約髙瓊之意蓋統兵官不與同謀必參差則公之䇿逺矣公奏禀朝辭上曰卿豈可逺去當相卿付以今日大計時獨給事中孫近直學士院時傳鎖院莫知為誰明日拜公右相朝士相慶上謂輔臣曰朕為二聖在逺生靈久罹塗炭屈已請和而金復肆侵陵朕當親總六軍往臨大江決於一戰鼎曰纍年退避敵情益驕今親征出於聖斷將士皆奮決可成功臣等願效區區亦以圖報上因曰伐蔡之功亦憲宗能斷也乃詔張俊所部往援韓世忠又令劉光世移屯建康定日起發光世密遣屬官告鼎云相公本入蜀有警乃留何故與他負許大事世忠亦謂人曰趙丞相真敢為者鼎聞之恐上意動搖復乘間言今日之勢若金兵渡江恐其别有措置不如向時尚有復振之理戰固危道有敗亦有成不猶愈於退而必亡者乎且虜僞俱來以吾事力對之誠為不侔然漢敗王尋晉敗苻堅特在人心而已自詔親征士皆鼓勇陛下養兵十年正在今日由是浮言不能入矣金於滁上造舟有渡江之意鼎密陳今日之舉雖天人咸助然自古用兵不能保其必勝計當先定事至即應之庶不倉卒萬一金人渡江陛下當親總衛士趨常潤督諸將乘其未集併力血戰未必不勝或遏不住則由他道復歸臨安堅守吳江彼亦安能深入臣與張浚分糾諸將或腰截或尾襲各據地利時出擾之必不使之自肆如前日也惟不可聞渡江便退即諸將各自為謀天下事不再集矣殿帥劉錫神武中軍統制楊沂中見鼎曰探報如此駕莫須動鼎曰僞虜已渡方遣二君率兵趨常潤併力一戰以決存亡更無他術錫等同聲曰相公可謂大膽鼎曰事已至此不得不然二君隨駕之親兵也緩急正賴為用豈可先出此言錫等慚懼而退朝論謂鼎勸上親征固難而此時不動尤為難也上曰數年以來廟堂玩習虛文而不明實效侍御給諫搜剔細務而不知大體故未能濟艱難非朕夙夜留心治軍旅備器械今日賊騎侵軼何以禦之鼎曰臣等敢不竭駑鈍以副陛下責實之意時松江既有備商賈往來自如通泰出納鹽貨如故上見士氣大振捷音日聞欲渡江與賊決戰鼎曰退即不可渡江非䇿也虜兵逺來利於速戰豈可與之爭鋒兵家以氣為主三鼓即衰矣姑守江使不得渡徐觀其勢以決萬全且豫猶不親臨豈可煩至尊與逆雛決勝負哉公薦張浚可當大事顧今執政無如浚者陛下若終不棄必於此時用之乃詔浚知樞密院事浚見鼎曰此行舉措甚當既又聞鼎諫上渡江決戰之行亦深歎服上曰臺諫論事雖許風聞要須審實如排擊人才豈無好惡若果務大體不指擲纎瑕細務强置人於過豈惟隂德不淺亦可以銷刻薄之風成忠厚之俗曰聖訓廣大如此言事官宜奉以周旋也上謂宰執曰恢復之圖所宜愛日仍先求人才有人則天下之事無不舉然用人才要在進君子退小人鼎曰臣待罪宰相為陛下别君子小人用之乃其職也敢不奉詔上曰大臣不公何以服衆鼎曰茍為不公則賞雖厚人不以為恩罰雖嚴人不以為威上曰今日朕親總六師正當公示賞罰二月回鑾始議定浚以右揆出使湖外平楊么鼎升左揆方鎖院之夕鼎密啓曰宰相無不統不必専以邊事乃為得體暨兩制出浚獨以軍功及専任邊事為言上既以邊事付浚而政事及進退人才専付於鼎矣喻樗語録曰時趙張二公相得人固知且並相樗獨以謂且作樞使同心同德亦何不可他日趙退則張繼之說一般話行一般事用一般人如此則氣道長若同相議論有不合或當去位則一番更政必有參商是賢者自相戻也已而其事亦稍如此公嘗曰用人所以立國吾豈敢久居相位至於立國規模則當為逺計也於是以政事之先後及人材所當召用者密條而置座右一一奏禀以次行之公謙沖待士犯顔敢諫凡內降恩澤多奏格不行號為賢相然深喜程頥之學朝士翕然嚮之時有言今托稱伊川門人者却皆進用如選人桐廬喻樗真其人也乃不見知是月公始薦樗改官除正字誥詞曰頃窮西洛之淵源遂見古人之大體中書舍人王居正行也樗以此頗為衆所嫉胡安國亦師頥者也聞之以為西洛淵源古人大體雖其高弟游酢楊時謝良佐諸人尚難言之而况樗耶乃敢托於詞命以妄褒借識者憂之居正未幾遷兵侍於是有伊川三魂之目以公為尊魂居正為强魂言其多忿也故工部侍郎楊時為還魂言其身死而道猶行也既而正字張嵲遂以元祐中五鬼配之鼎嘗入見上自外移竹栽入內奏事畢亟往視之方興工於隙地鼎問孰主其事曰入內髙品黃彥節也鼎即呼彥節責之曰頃嵗艮嶽花石之擾皆出汝曹今將復蹈前轍耶勒軍令狀日下罷役翌日鼎入對上改容謝之詔參政沈與求孟庾並兼樞密院鼎曰仁宗時陜西用兵宰臣兼樞密臣既以宰相兼治院事而參知政事之臣并令兼權則事歸一體無前人所謂密院調兵而三省不知三省財竭而密院用兵不止者矣上曰往時三省密院不同班進呈是以事多不相關白然朝廷論議豈有帷幄三大臣不與聞者時張浚視師江上以行府為名鼎居中總政表裏相應然浚所行之事並有關三省樞密者庾與求皆不能平曰三省樞密乃奉行行府文書耶明年相繼以疾求出御書尚書賜鼎曰尚書所載君臣相戒勑之意所以賜卿政欲共由此道以成治功耳又書車攻詩宣示宰執鼎等入謝上曰車攻宣王中興之詩今當與卿等夙夜勉勵以修政攘夷鼎等曰陛下游神翰墨之間不忘恢復臣等敢不自勉初禁衛諸軍遇赦轉員其法甚備自中原俶優軍營紛亂排轉不行諸將所總嵗嵗奏功而天子親兵久無升遷之望鼎請據三衙見管人數倣佛舊例立為轉員之法上曰范溫帶來京東民兵較所給春秋特支衣絹一匹昨日令中書引見頗有藍縷者朕出內帑絹二千匹賜之公等曰陛下內帑物非承平時比每推以賜將士此盛德也上曰朕宮中未嘗妄費雖內帑所有不多専用以激犒將士而已時貴州防禦使從王從瑗在宮中上嘗以語宰執曰此子天姿特異儼如成人朕親自教之讀書性甚强記至是鼎得㫖造書院於行宮門內以為資善堂欲令就學上曰朕年二十九未有子然國朝自有仁宗故事今未封王止令建節封國公似合宜以朕所見此事易行而前代帝王多以為難鼎曰自古帝王以為難而陛下行之甚易此所以莫可跂及也上曰藝祖創業至勤朕取子字行下子鞠於宮中庶仰慰祖宗在天之靈孟庾曰陛下念藝祖創業而聖慮及此帝王所難之事也遂加保慶軍節度封建國公一日上語鼎曰欲令瑗出閣選官教之且就禁中致學館便建資善堂庶幾正當所差官亦有名仍一依皇子建節除國公鼎乃與同列議選范沖朱震為翊善朝論以二人為極天下之選上亦嘗謂鼎曰前日臺諌因對語及資善之建皆曰朱震范沖天生此二人為今日資善之用可謂得人矣地震詔罪已求言上曰故事當避殿減膳今只一殿而常膳甚薄更減亦何害鼎曰此文具耳應天當修人事今費用大而科斂煩此最傷和氣者也營田官王茀候對上望見之謂宰執曰當詳諭茀令竭力久任若一二年間營田就緒庶可少寬民力朕昨在㑹稽嘗書趙充國傳以賜諸將若早得數年今已獲其利鼎曰為國根本之計莫本於此上曰然茀既對乞江淮守令皆久任上又謂宰執曰朕昔為元帥時嘗見州縣官說在官者以三年猶且一年立威信一年守規矩三年則務收人情為去計矣况今以二年為任乎雖有緝治之心蓋亦無暇日矣茀所論甚當宜舉行之鼎上神宗實録五十卷舊文以墨新修以朱刪出以黃自後進書率如此例上謂宰執曰民窮為盜多緣守令不良以擾之若安其田里肯為盜乎卿等當留意擇守令庶幾百姓樂業鼎曰臣等敢不躬聖訓上又曰淮北之民强負而至朕為民父母豈可使其失所可賦田豫之更加優恤以廣招來之路公曰彼乍歸無所居尤當賑助之上曰邦用匱乏茍有一毫可以節省亦當行之朕宫人僅給使令然昨日亦復揀三十人出之鼎曰節省之道始自宮庭此陛下盛德事也有親從官趙勝自金國逺歸言二聖萬福上悲咽不自勝鼎曰願少寬聖慮强於身治天必悔禍二聖終有還期也自南渡以來百司日有申明皆臨時裁決初無定制三省樞密尤為叢冗至是鼎約以中制立為定法付之有司遵守而行吏不得為姦矣上與宰執論治體因曰治天下之道在必賞必罰而已淫刑以逞固不可茍有罪豈可以不刑鼎曰近時贓吏雖不棄市亦杖脊刺配且殺人者死古今常法比年皆從貸例聖人以謂罪疑惟輕既無所疑何為而貸貸有罪則犯者愈衆而善人咸被其禍矣初張浚奏江上諸軍精强非前日之比宰執進呈鼎曰承平時陜西並邊兵亦未必如此皆陛下纍年緝治之力內侍盧公裔致仕在蜀中自請赴行在上謂宰執曰斯人極不良今若歸內侍省必欲侵外事若與外任必陵同列只宜祠觀朕宮中小黃門數十輩聊備灑掃趨走近上者亦有數未嘗假以權也每觀漢唐及近時之變不得不防微杜漸公曰聖慮及此天下之幸上謂宰執曰馮益頗與外事侵不可長令與宫觀日下出門於是鼎等再三賀上威斷上曰朕待此曹未嘗不盡恩意然才聞過失亦不少貸也先是劉豫揭榜山東妄言益遣人收買飛鴿因有不遜之語知泗州劉綱得而上之張浚請斬益以釋謗上未許鼎曰益事誠曖昧然疑似間有關國體若朝廷略不加罰外議必謂陛下實嘗遣之有纍聖德不若暫解其職姑與外祠以釋衆惑上欣然出之浚意未決鼎曰自古欲去小人者急之則黨合而禍大緩之則彼自相擠今益罪雖誅不足以快天下然羣閹恐人君手滑必力爭以薄其罪不若謫而逺之既不傷上之意彼但見奪職責輕必不致力營救又幸其去位必以次規進安肯容其復入耶若力排之此輩側目吾人其黨愈固而不可破矣浚乃服時久不雨上以為念謂宰執曰昨晚甚有雲氣朕焚香密禱過二更雲氣散方退鼎曰陛下憂勤如此天必重祐先是國子監丞張戒上書幾八千言自謂恐忤聖意上謂宰執曰朕熟覽之其憂國愛君之心誠可嘉又曰咸言朕有仁宗守成之德而不知太祖創業之志此言良是朕見仁宗在位四十二年德洽民心至今天下誦之朕心仰慕如堯舜文武故當立政用人之事朕嘗置在左右朝夕以為法至於太祖以神武創業朕不及也鼎曰陛下以仁宗為法此乃中興之基至於太祖創業艱難願陛下常留聖慮則施之行事自然若符節矣自南渡以來國計所賴者惟鹽每因闕用即改新鈔以幸入納之廣苐茍目前不知利權悉為商賈所持去年冬鼎立對帶之法商賈聽命而鹽法遂為定制除去積年之弊是秋加以出剩立為分數許人納不對帶二法並行出入有常源源不絶始不為巨猾所制矣戶部言知閣門事潘永思添破食錢不應法上謂宰執曰若於法不可亦無如之何鼎曰知閣門官惟永思與韓恕二人恕已橫行故俸差厚永思官小月得四十餘緡所以用不足上曰永思輩端坐得此亦足矣今戚里官皆不過小使臣方國家艱難之時且留爵祿以賞戰士於是鼎等再三稱道聖德上諭鼎曰資治通鑑首論名分至於其間去取皆有益於治道觀此書則知司馬光雅有宰相器識若唐鑑止可為諫書耳先是楊沂中奏捷鼎即求去上不許鼎因曰臣初與張浚如兄弟近因呂祉輩離間遂爾暌異今同相位勢不兩立陛下意在恢復當以兵事為重今浚成功淮上其氣甚鋭當使展盡底藴以副陛下之志如臣但奉行詔令經理庶務而已浚當留臣當去其勢然也浚朝夕還朝俾臣奉身而退則同列之好俱無所傷他日或因物議有所去留則俱失之矣公在越惟以束吏恤民為務每言不束吏雖善政不能行蓋除害然後可以興利易之豫利建侯行師謂建侯行師乃所以致豫解公用射隼於髙墉之上謂射隼而去小人乃所以致解鼎之學得於易者如此至是姦猾屏迹又場務利入之源不令侵耗財賦遂足張浚求去上問可代者浚不對上曰秦檜如何浚曰近與共事始知其暗上曰然則用趙鼎令浚擬批召鼎檜謂必薦已退至都堂就浚語良久上遣人趨進所擬文字檜錯愕而出浚始引檜共政既同朝乃覺其包藏觀望故因上問及之鼎至屢辭且疏言進退人才乃其職分今之清議所與如劉大中胡寅呂本中常同林季仲之徒陛下能用之乎妬賢黨惡如趙霈胡世將周祕陳公輔陛下能去之乎陛下於此或難則臣何敢措其手也昔姚崇以十事獻之明皇終致開元之盛臣何敢望崇而中心所懷不敢自隱惟陛下擇之馮康國乞補外鼎奏自浚罷黜蜀中士大夫皆不自安今留行在所幾十餘人往往一時遴選臣恐臺諫以浚里黨或有論列上曰朝廷用人止當論才不才頃臺諫好以朋黨罪士大夫如罷一宰相凡所薦引不問才否一時罷黜此乃朝廷使之為朋黨非所以愛惜人才而厚風俗也鼎等頓首謝公再相已踰月未見所施朝士或以此責之公曰今日事如久病虛弱之人再有所傷元氣必耗惟當靜以鎮之若大作措置煥然一新此起死之術也張德逺非不欲有為而其效如此亦足以為戒矣鼎上重修哲宗實録以書成加特進呂本中草制有曰謂合晉楚之成不若尊王而賤霸謂散牛李之黨未如明是而去非惟爾一心與余同德檜以為破和議深恨之朱震卒上曰楊時既物故胡安國與震又亡同學之人今無存者朕甚惜之鼎曰尹焞可繼震震亦嘗薦焞代資善之職但焞微聵恐教兒童費力俟國公稍長則用之鼎因論及南兵可教張守曰只是格尺不及耳上曰人猶馬也馬之能行不在大故兵無南北顧所以用之如何爾春秋時申公巫臣通吳於上國遂霸諸侯項羽以江東子弟八千橫行天下以至周瑜之敗曹操謝𤣥之破苻堅皆南兵也上數令張浚盡以舟師分布控扼然後引兵渡江鼎曰淮西寂然無警似不必爾外間便謂朝廷棄淮西矣當一向勿顧不發一兵彼未必敢動上以為然初劉豫軍既遁張浚復還建康淮西一帶無軍馬朝論紛紛臺諫交章以為淮西無備可憂鼎獨顯言於衆曰今行朝握精兵十餘萬使冦直臨江岸吾無所懼惟是安靜不動使罔測渠未必敢窺伺何至自擾擾如此儻有他虞吾當身任其責俊軍久在泗上勞役苦甚還未閲月居處種種未定仍遽使之復出不保其無潰亂也鼎欲使俊出不意徑趨壽春取其城措置已定㑹金廢豫乃已淮上卒不遣兵竟亦無事鼎言人多謂中原有可圖之勢宜便進兵恐異日咎今失此機㑹乞召諸將上曰不須恤此今須與金議和梓宫與太后淵聖皆未還若不與和無可還之理吳國長公主入見留宮中三日仍為駙馬都尉潘正夫求恩數上語之曰官爵豈可私豫人須與大臣商量況今日多事未暇及此時當極暑上每正衣冠伴之飲食蓋主乃哲宗之女上之姊也上以語宰執鼎曰陛下行家人之禮雖盛暑不廢至於官爵則不以私豫此帝王之公也詔修徽宗實録以公兼提舉公奏曰先帝以仁厚之德涵養天下幾三十年其間法令有未盡者皆出於羣臣貪功冒賞之私而有司壅於上聞非先帝本意也劉大中宣和初知如臯縣時有㫖即隱者徐神翁所居建為觀而觀基包士民墳墓甚衆大中顧有司不能決乃具圖申省且束裝待罪泊取㫖先帝愕然曰豈可發民墳墓即詔移之别地則知當時有不便於民者使悉知未有不改之者此羣臣之罪蔡京為之首也上深然之以至泣下公又曰崇觀之失不歸之蔡京使何人任責今士大夫力主京者皆厚私恩而薄祖宗之仁也願陛下深察之上謂宰執曰朕思安民之道無過擇監司郡守可令侍從官公舉仍不限員數中書置籍朕亦書之屏風置諸左右已差下不任職無他過者與自陳宮觀公議亦必以為是也鼎曰陛下不忘百姓如此上又曰贓吏一身取錢爾謬吏為州為縣一州一縣之吏取錢其害民甚於贓吏也鼎曰聖論曲盡其理秦檜曰向令侍從舉知縣而有互舉其子者其子又皆不肖貪贓上曰侍從朕之所取信也而欺如此朕當時若知當竄之嶺表卿等可諭諸侍從須妙選可為者使實惠及民他日朕當賞其知人鼎等曰謹奉聖訓公奏淮東宣撫韓世忠保明統制官許世安功賞事上曰世安勇雖不如呼延通而曉事過之平居議論多有補於世忠時通亦𨽻世忠軍上駕馭諸將至於偏禆亦知其才之所長蓋照臨如此上謂宰執曰有備無患縱使和議已成亦不可弛兵備公曰假使虜人與我河南地亦須嚴江南金烏凌阿思謀來上謂宰執曰館待之禮宜稍厚若早遂休兵免令赤子肝腦塗地此朕之本意也鼎曰用兵所費比之管待殊不侔矣上曰若無軍旅之事使朕専意保民十數年豈不見效鼎曰陛下此言神明感格必有早定之期矣思謀等見上執禮甚恭且欲以客禮到都堂見宰執鼎接之如見從官之禮侍御史蕭振本鼎所薦後因秦檜引入臺時欲講和劉大中與鼎合議以為不可檜怒令振劾去大中欲以搖鼎大中既出振謂人曰如趙丞相不必論蓋欲其自為去就也時檜力勸上議和鼎持不可繇是卒罷鼎入辭從容奏曰臣昨罷相半年蒙恩召還已見宸衷所嚮與向來稍異臣今再辭之後人必有以孝悌之說脅制陛下矣臣謂凡人中無所主而聽易惑故進言者得乘其隙而惑之陛下聖質英邁洞見天下是非善惡謂宜議論一定不復二三然臣甫去國已稍更改如修史本出聖意非羣臣敢建言而未幾復修此為可惜臣竊觀陛下未嘗容心特既命為相不復重違其意故議論取舍之間有不得已而從者如此則宰相政事非陛下政事也御筆防禦使璩建節除國公執政聚議副樞王庶大言曰並后匹嫡古以為戒鼎謂檜曰鼎前負曖昧之謗今不敢奏須公開陳檜無語翌日鼎奏曰今建國在上兄弟之間恩數宜少異又曰建國名雖未正天下之人皆知陛下有子矣以前後恩數並同皇子又昨幸平江及謁太廟兩令建國扈蹕國人見者咨嗟歎息此社稷大計蒼生之福也至於外間稱呼之語陛下豈不聞之臣身為上相義當竭忠以報陛下在今日禮數不得不異蓋以繫人心不使之二三而惑也後數日劉大中奏事亦以為言命遂寢檜亦嘗留身不知所說何事及鼎上章解機務上曰前日所議建滎國公乃知檜所奏不然也王庶謂鼎曰公欲去早為庶言鼎曰去就在樞密鼎豈敢與鼎行秦檜乞同執政往餞乃就津亭設筵鼎至即一揖登舟而去自是檜益憾之公自泉州罷歸紹興上書言時政檜忌公復用乃令中丞王次翁論公近聞邊報喜見眉間幸時有警規圖復用直抵近輔略不避嫌門下黨與往來臨安鼓惑衆聽又論公在靖康末結王時雍薦之張邦昌遂受僞命為京畿憲退而語人有親奉王音之語又嚮以元樞都督荆襄未幾拜相而乾沒官錢十七萬緡章三上責散官興化軍居住諌議何鑄論公罪重罰輕移漳州次翁又彈擊不已責置潮州中丞詹大方論公移吉陽軍時公子汾力乞侍行公不忍使之以無罪而俱死瘴地手批付之曰紹聖初呂微仲謫嶺南惟一子景山愛之不令同行而景山堅欲從去不可却既至䖍將過嶺呂顧其子泣曰吾老矣罪如此萬死何恤汝何罪欲俱死瘴鄉耶我不若先死使汝護喪而歸吾猶有後也遂縱飲而死吾不令汝侍行亦呂之意微仲大防字也公在吉陽三年門人故吏皆不敢通問廣帥張宗元時遣使渡海以醪米遺之檜令本軍月具存亡申省公知之遣人呼其子至謂之曰檜必欲殺我我不死一家當誅惟我死爾曹無患乃不食而卒四方人聞之有泣下者汾護喪歸葬於衢州守臣章傑知中外士大夫平時與公有簡牘往來至是又擕酒㑹葬意可為竒貨乃遣兵官下縣同縣尉翁蒙之以搜私釀為名馳往掩取復疑蒙之漏言濳戒左右伺察之蒙之書片紙走僕自後垣出密以告汾趣令盡焚篋中書及弓刀之屬比官兵至一無所得公之家賴以紓禍公嘗謂其客方疇曰自鼎再相除政府外所引從官如常同胡寅張致逺張九成潘良貴呂本中魏矼皆有士望異日決可保其無他疇曰願公徐觀之公曰此等人才如何變得其後諸賢流落之久皆壁立萬仞雖死不變疇始信公之能知人也戊午嵗張九成為禮侍呂本中為中書同見檜檜曰大抵立朝須優游委曲乃能有濟九成答曰未有枉已而能正人者也檜為變色及公罷相居㑹稽門人方疇為言檜語因曰秦檜亦今之賢者安得有此怪論公曰此南方之所謂賢者北方之所謂賢者必不爾也疇曰公既知之安得薦之於上乎公曰張德逺罷相之後鼎再相上曰卿還朝見在政府去留惟卿意鼎曰檜不可令去一日檜留身下殿有喜色謂鼎曰檜適求去上云公自知檜令檜與公商量鼎握檜手曰吾輩當以國事為心也檜由是安迹蓋行止非人所能為也至是疇默數檜再専國政十有八年士大夫死於其手者甚多則公言非人所能為信哉或問朱文公中興賢相皆推趙忠簡如何曰看他做來做去亦只是王茂𢎞規模當時廟論大槩主和議使當國久未必不出於和但就和上須有些計較如嵗幣稱和疆土之類不至一一聽命如秦檜老草和了宋名臣言行録别集下卷四
