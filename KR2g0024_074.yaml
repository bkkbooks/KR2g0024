body:
  text: 宋名臣言行錄外集巻十六宋李幼武纂集陳亮字同父婺州永康人壯嵗首賢能之書尋預璧水之選孝宗朝六達帝庭上書論恢復大計又伏闕論宰相非才無以係天下望埀拱殿成進賦以頌徳又進郊祀慶成賦皆不報光宗即位伏闕上鑒成箴又不報紹興四年舉進士上親擢之第一授建康軍節度判官次年卒享年五十有五公天資異常俯視一世常以經綸天下自任壯嵗應鄉舉推為褎然之選繼而補太學博士弟子員其生平議論以讎仇未雪為國大恥六詣天闕上書皆主於恢復故及第後謝恩詩有復讎自是平生志勿謂儒臣鬢髪蒼之句其稟性忠誼至老彌篤云淳熈戊戌正月丁已守闕上書其略曰中國天地之正氣也天命之所鍾也人心之所㑹也衣冠禮樂之所萃也百代帝王之所以相承也豈天地之外偏邪之氣之所可奸哉不幸而能奸之至于挈中國衣冠禮樂而寓之偏方雖天命人心猶有所係然豈所以乆安而無事也天地之正氣鬱遏數十年而乆不得騁必將有所發洩而天命人心固非偏方之所可係也南渡之初君臣誓不與敵俱生卒能以奔敗之餘而勝百戰之敵及秦檜倡邪議以沮之忠臣義士斥死南方天下之氣墯矣自非海陵送死淮南亦不復知兵戈之為何事也今金人之植根既乆不可以一舉而遂滅國家之大勢未張不可以一朝而大舉人情皆便於通和者所以成上下茍安而為妄庸者兩售之地也書奏不報再上書略曰陛下厲志復讎不肯即安於一隅是有大功於社稷也然坐錢塘浮靡之隅以圖中原則非其地用東南習安之衆以行進取則非其人財止於府庫則不足以通天下之有無兵止於尺籍則不足以兼天下之智勇是以遷延之計遂行而陛下有為之志乖矣此臣所以不勝忠憤而願得望見顔色陳國家立國之本末而開大有為之畧論天下形勢之消長而決大有為之機務合於藝祖皇帝經畫天下之本㫖然八月待命未有聞焉臣恐天下豪傑將測陛下之意嚮而雲合響應之勢不得而成矣又曰臣妄意國家維持之具至今日而窮然變通之道有三有可以為遷延數十年之䇿有可以為五六十年之計有可以為復開數百年之基事勢昭然而效見殊絶非陛下聰明度越百代決不能一一聴之臣不泄之大臣而大臣拱手稱㫖以問臣亦姑取其大體可言三事以答之一曰二聖北狩之禍葢國家之大恥天下之公憤也五十年之餘雖天下之氣銷鑠頺墮不復知讎恥之當念正在主上與二三大臣振作其氣以泄其憤使人人如報私讎此春秋書衛人殺州吁之意也其二曰國家之規模使天下奉規矩凖繩以從事羣臣救過之不給又何暇展布四體以求濟度外之功哉其三曰藝祖用天下之士人以易武臣之任事者故本朝以儒立國而儒道之振獨優於前代今天下之士熟爛委靡誠可厭惡正在主上與二三大臣反其道而用之作其氣而養之使臨事不至於乏材隨材皆有足用則立國之規模不至戾藝祖之本㫖而東西馳騁以定禍亂不必専在武臣也臣所與大臣論者大略如此二三大臣已相顧駭然疎逺草茅寧復有路以望清光乎戊申嵗再上書略曰本朝以儒道治天下以格律守天下而天下之人知經義之為常程科舉之為正路法不得以自用其凡人不得以自用其智二百年之太平由此出矣至於艱難變故之際書生知議論之當正而不知事功之為何物知節義之當守而不知形勢之為何用宛轉文法之中無人能自拔者陛下雖欲得非常之人以共斯世而天下其誰肯信乎陛下用其喜怒哀樂之權以鼓動天下使如臣者得借方寸之地終前書之所言而附寸名于竹帛之間不使鄧禹笑人寂寂而陛下得以發其雄心英畧與四海才臣智士共之天生英雄殆不偶然而帝王自有真非區區小臣所能附㑹也紹熙初上皇帝鑒成箴一首其辭曰五閏失馭偽主僣竊綱常絲棼宇縣𤓰裂干戈日尋湯沸火熱元元憔悴無所存活藝祖勃興天為民設受命之日兵刃不血痛兹版圖尚爾割截丙夜不安往就普説獨立門外衝冐風雪謀定戈指莫我敢遏首征揚州重進誅亟旋征澤潞李筠就殺復掩湖南保權力屈爰取荆南繼冲悚懾一鼓孟昶蜀城斯拔徂征嶺南劉鋹面縳馳使江南李煜踧踖傳檄吳越錢俶納國十餘年間憂虜危慄頭若蓬葆雨沐風櫛東征西伐天下始一解兵修貢降王在列施袴麻鞋縁布衣褐訓練六軍法度陛級太宗繼之乾乾夕惕親征河東督勵士卒人百其勇城無全堞下詔寛赦繼元乃伏收復漳泉洪進屏息真宗嗣之二祖是法契丹來冦人心業業決意親征俯從凖䇿親御鞍馬躬秉黄鉞白旄一麾王師奮發我氣既盈敵氣斯竭稽首請和干戈載戢譬以禍福實賴臣弼於皇仁祖善繼善述未幾元昊在西復悖謀臣勇將連年討伐邉民既困國用亦乏厥後智髙忽爾猖獗南嶺東西擾擾數月以時討平狄青之力靖康之難言之汗浹二帝北巡狼窠熊窟沙漠萬里風霜冽冽胡塵撲面驚弦慘骨國祚若旒孰任其責賴有髙宗克紹前烈勿遽渡江心膽欲折皇天降監風濤安帖所至成市暫都于淛顔亮凶燄震撼六合投箠采石意謂無越幸而倒戈自取夷滅夀皇履位求賢如渇崇事髙宗孝心尤切二十八載始終無缺髙宗上仙哀號哽咽四方來觀其容慘怛王業艱難坦然明白今王嗣位祖宗是則無湎于酒無沈于色色能荒人之心酒能敗人之徳以宰相為腹心以臺諌為耳目以將帥為爪牙以尚書為喉舌登崇俊良斥退奸邪勿謂天髙常若對越勿謂民弱實關治忽勿俾禍起於蕭墻勿使患生於倉卒勿私賞以格公議勿私刑以虧國律勿侮老成之人勿貴無益之物勿妄費生靈之財勿妄興土木之役勿謂嚬笑之㣲而莫我知勿謂號令之嚴而莫我逆盡孝乃明主之治論相乃人主之職聖言不可侮人心不可拂傾耳乎公卿之言游心乎帝王之術勿謂和議已成而不慮乎逺圖勿謂大位已得而不恤乎小失當效夏王寸隂是惜當效文王日昃不食勿效夏王瑶臺瓊室勿效商王斮涉剖直如履薄氷深虞沒溺如馭六馬切虞奔軼勿謂㣲過當絶芽孽勿謂小患當窒孔穴左右前後當用賢哲王惟戒兹民罔不悦草茅作箴敢告司闕與晦翁書曰伊洛諸公謂三代以道治天下漢唐以智力把持天下其説固已不能使人心服而近世諸儒遂謂三代専以天理漢唐只是人欲信斯言也千五百年之間天地不過架漏過時人心亦是牽補度日萬物何以阜蕃而道何以常存乎諸儒之論為曹孟徳以下諸人設可也以斷漢唐豈不寃哉又曰髙祖太宗本君子之射也惟御者不純乎正故其射一出一入而卒歸於禁暴戢亂愛人利物而不可掩者其本領宏大開廣故也故某嘗有言三章之約非蕭曹之所能教而定天下之亂又豈劉文靖之所能發哉此儒者之所謂見赤子入井之心也其本領宏大開廣故其發處便可以震動一世不止如見赤子時㣲𦕈不易推廣耳天下大物也不是本領宏大如何擔當得去惟其事變萬狀而真心易以汨沒到得失枝落節處其皎然者終不可誣耳髙祖太宗葢天地賴以常運而不息人紀賴以接續而不墜而謂道之存亡非人之所預則過矣漢唐之君果無一毫氣力則所謂卓然者果何物耶使二程若在猶當正色而辨明之某之不肖其不足論甚矣然亦要做箇人非専為漢唐分疏也正欲明天地常運而人為常不息要不可以架漏牽補度時日耳願秘書平心以聴惟理之從盡洗天下之横竪髙下清濁黒白一歸之正道無使天地有棄物四時有剰運人心或可欺而千五百年之君子皆可葢也又曰某大槩以為三代做得盡者也漢唐做不到盡者也若謂其假仁詐義以行之切恐待漢唐之君太淺狹而世之君子有不厭于心者矣匡章通國皆稱其不孝而孟氏獨禮貌之眼目既髙於駁雜之中有以得其心故當波流奔迸利欲百端宛轉於其中而能察其真心之所在此君子之道所以為可貴耳若萬慮不作全體潔白而曰真心在焉者此始學之事耳一生辛勤於堯舜相傳之心法不能㸃鐵成金而不免以銀為鐵使千五百年之間成一大空缺人道泯息而不害乎天地之常運而我獨卓然而有見無乃甚髙而孤乎宜某之不心服也晦翁答曰以兄之髙明俊傑世間榮悴得失本無足為動心者而細讀來書似未免有不平之氣區區竊獨妄意此殆平日才太髙氣太鋭論太險迹太露之過是以困於所長忽於所短雖復更厯變故顛沛至此而猶未知所以反求之端也曰若髙帝則私意分數未甚熾然已不可謂之無太宗之心則吾恐其無一念之不出於人欲也直以其能假仁借義以行其私而當時與之爭者才能智術既出其下又不知有仁義之可借是以彼善於此而得以成其功耳若以其能建立國家傳世乆逺便謂其得天理之正此正是以成敗論是非但取其獲禽之多而不羞其詭遇之不出於正也千五百年之間正坐如此所以只是架漏牽補過了時日其間雖或不無小康而堯舜二王周孔所傳之道未嘗一日得行於天地之間也若論道之常存却又初非人所能預只是此箇自是亘古亘今常在不滅之物雖千五百年被人作壊終殄滅他不得耳漢唐所謂賢君何嘗有一分氣力扶助得他耶兄人物竒偉英特恐不但今日所未見向來得失短長正自不須更挂齒牙向人分説但鄙意更欲賢者百尺竿頭進取一步將來不作三代以下人物省得氣力為漢唐分疏即更脱洒磊落耳夫人只是這箇人道只是這箇道豈有三代漢唐之别但以儒者之學不傳而堯舜禹湯文武轉相授受之心不明於天下故漢唐之君雖或不能無暗合之時而其全體却只在利欲上此其所以堯舜三代自堯舜三代漢祖唐宗自漢祖唐宗終不能合而為一也今若必欲撤去限隔無古無今則莫能深考堯舜相傳之心法湯武反之之功夫以為凖則而求諸身却就漢祖唐宗心術㣲處痛加繩削取其偶合而察其所自來黜其悖戾而究其所從起庶幾天地之常經古今之通義有以得之於我云云且如約法三章固善矣而卒不能除三族之令一時功臣無不夷滅除亂之志固善矣而不免竊取宫人私侍其父其他亂倫逆理之事往往皆身犯之舉其終始而言其合於義理者常小而少不合於義理者常大而多後之觀者於此根本工夫自有欠闕故不知其非而以為無害於理抑或以為雖害於理而不害其獲禽之多也若夫㸃鐵成金之譬施之有教無類遷善改過之事則可至於古人已往之迹則其為金為鐵固有定形而非後人口舌議論所能改易矣今乃欲追㸃功利之鐵以成道義之金不惟費却閒心力無補於既往正恐礙却正知見有害於方來也聖人者金中之金也學聖人而不至者金中猶有鐵也漢祖唐宗用心行事之合理者鐵中之金也曹操劉裕之徒則鐵而已矣金中之金乃天命之固然非由外鑠淘擇不淨猶有可憾今乃無故必欲棄舍自家光明寳藏而奔走道路向鐵爐邉查㼅中撥取零金不亦悮乎大風吹倒亭子却似天公㑹事發彼洛陽亭館又何足深羡也嘗論孟子説大人則藐之孟子固未嘗不畏大人但藐其巍巍然者耳辨得此心即便掀却卧房亦且露地睡似此方是真正大英雄人然此一種英雄却從戰戰兢兢臨深履薄處做將出來若是血氣粗豪却一㸃使不著也老兄志大宇宙勇邁終古伯恭之論無復改評今日始於後生叢中出一口氣葢未足為深賀然出身事主由此權輿便不碌碌則異時事業亦可卜矣兄髙明剛決非吝於改過者願以愚言思之絀去義利雙行王伯並用之説而從事于懲忿窒慾遷善改過之事粹然以醇儒之道自律則豈獨免於人道之禍而其所以培壅本根澄原正本為異時發揮事業之地者益光大而髙明矣並晦翁書晦翁以道學為一世師表而公與之反覆議論略不少假借至謂研窮理義之精㣲辨析古今之同異原心於杪忽較禮於分寸以積累為工以涵養為正晬面盎背則某於諸儒誠有媿焉至於堂堂之陣正正之旗風雨雲雷交發而並至龍蛇虎豹變現而出沒推倒一世之智勇開拓萬古之心胷世俗所謂粗塊大臠飽有餘而文不足者自謂差有一日之長紹熙天子廷䇿多士擢公第一誥詞云某官三嵗大比人徒知為布衣進身之途藝祖皇帝有言曰設科取士本欲得賢以共治天下大哉王言朕所當法也廷䇿者再乃始得汝爾蚤以藝文首賢能之書旋以論奏動慈宸之聴親閲大對嘉其淵源擢置舉首殆天留以遺朕也尚循故事往佐帥幕益茂逺業以須登用公少以文名於天下至老方第常抱不平之恨故及第後謝宰執有啟云數十年窮居畎畆未諧豹變之懐五千言上徹冕旒誤中龍頭之選又云如某者材不逮於中人學未臻于上達十年璧水一几明窻六達帝廷上恢復中原之䇿兩譏宰相無輔佐上聖之能荷夀皇之兼容恢漢光之大度留張齊賢以貽主上俾宋廣平而冠羣儒靜言叨冐之多知自吹噓之力又云某敢不益勵初心重温舊業以片言而悟明主尚愧古人設三表以繫單于請從今日公才氣超邁下筆立就數千言略無凝滯議論風生亹亹不倦其視當世茍禄竊位之士蔑如也嘗自贊其畫像云其服甚野其貌亦古倚天而號提劍而舞惟稟性之至愚故與人而多忤歎朱紫之未服謾丹青而描取逺觀之一似陳亮近眡之一似同甫未論似與不似且説當今之世孰是文中之虎稼軒辛幼安祭之曰嗚呼同父之才落筆千言俊麗雄偉珠明玉堅人方窘步我則沛然莊周李白庸敢先鞭同父之志平葢萬夫横渠少日慷慨是須擬將十萬登封狼胥彼臧馬輩殆其庸奴天於同父既豐厥稟智略横生議論風凜使之早遇豈愧衡伊行年五十猶一布衣問以才豪趺宕四出要其所厭千人一律不然少貶動顧規檢夫人能之同父非短至今海内能誦三書世無楊意孰主相如中更險困如履氷崖人皆欲殺我獨憐才脱廷尉繫先多士鳴耿耿未阻厥聲浸宏葢至是而世末知同父者益信其為天下之偉人矣嗚呼人才之難自古而然匪難其人抑難其天使乖崖公而不遇安得征吳入蜀之休績大原決勝即異時落魄之齊賢方同父之約處孰不望夫上之人謂握瑜而不宣今同父發䇿大廷天子親寘之第一是不憂其不用以同父之才與志天下之事孰不可為所不能自為者天靳之年閩浙相望信問未絶子胡一病遽與我訣嗚呼同父而止是耶而今而後欲與同父憇鵝湖之清隂酌瓢泉而共飲長歌相答極論世事可復得耶千里寓辭知悲之無益而涕不能巳嗚呼同父尚或臨監之否晦翁曰同父才髙氣粗故文字不明瑩要之自是心地不清和也又曰同父在利欲膠漆盆中宋名臣言行錄外集巻十六
