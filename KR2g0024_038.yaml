body:
  text: 宋名臣言行録别集上巻六宋李幼武纂集張闡忠簡公字大猷温州永嘉人由舎選貢京師中宣和六年進士第調嚴州兵曹紹興初䖍州教李囘辟為帥幕四年席益辟帥幹吏部沮其改秩監岳以歸連教鄂州台州賜對除正字十二年遷校書郎兼益王府教明年兼國史院檢討又明年駕幸省例遷官免去踰年主管崇道滿添倅泉州代還改衢州未上罷二十五年兩浙市舶居二年為臺屬升郎闈入五府三十一年遷將作監明年進宗少孝宗即位權工侍兼侍講賜服金紫以隨龍恩遷七官隆興初權工書侍讀屢丐閑上不許除顯謨直學提舉興國到家踰月病以龍圖學士左通奉大夫致仕七月二十六日薨年七十四贈端明學士上方鋭意恢復而在廷議論不一公毎陳正心誠意修政攘夷之説上亦虚懐聽納毎事咨訪秦檜用事久毎除臺諫必以其耳目知公久次喜論事一日㣲諷公謂當入臺公曰丞相茍見知老死秘書足矣檜黙然公先嘗為席益辟客檜初罷相益蓋有力故深憾之臺臣汪勃遂劾罷公金騎臨江公因轉對請増㳂江戍兵大修諸郡之備濟師京西淮東牽制金軍金主死新主復求和朝廷議再遣使詔畧曰敵人索舊禮從之則不忍屈不從則邊患未已納中原歸正之人東南力不能給否則絶向化之心宰執侍從臺諫其詳議以聞公言選将練兵名分可正江淮授田遺民可招亹亹數百言冬復上十事一强國勢二革茍且三重臺諫四明賞罰五信號令六抑奔競七嚴軍政八戢貪吏九節財用十禁科斂公指陳實事斥言權倖無所隠上大嘉賞公奏臣去冬乞守兩淮陛下謂立春行之夏秋當畢備今其時矣面陳三䇿移都督府於維揚増修淮上城壘優恤山水寨民兵及死事之家以勸來者上曰今江淮事盡付張浚朕倚之為長城㑹督府受蕭琦降上召問公公疾不能入奏請受其降俄報王師收復靈璧縣公慮大將李顯忠邵宏淵深入無援奏乞益兵殿後已而師果失利衆論歸罪於戰公奏出師受降是也諸将違節度且無援而敗當矯前失安可遽沮鋭氣上命益出御前器甲付諸軍親札勞張公軍聲復振時數易臺諫公力言之㑹太白晝見詔近臣條闕政公謂比年災異數見去春温台颶風壊廬舎以萬計二浙飛蝗蔽野今嵗夏秋雨淫水溢米值翔湧太陽薄蝕星緯復爾當思應以實不以文乃者言路輕易出令不謹君子未進小人未退給札條弊政而無所更革臧否監司守令而無所升黜文具如此致變固宜至如近則荆襄江淮守禦缺然逺則蜀道連嵗出師凋瘵已甚陛下方馳騁毬馬日引狼子野心之人周全禁籞垂象安得不再三示警耶金復求成上與公議公曰彼欲和畏我耶愛我耶直欵我耳力陳六害不可許上曰朕意亦然姑隨宜應之耳宰執奏金國赫舍哩志寧以書論通好朝廷遣使臣盧仲賢報之所論三大事正國書嵗弊如數皆定惟唐鄧海泗未決将遣王之望龍大淵通問而衆言紛紛乞命侍從臺諫集議於是自尚書而下其説人人不同公獨謂不與四州乃可通和議論先定乃可遣使今彼為客我為主彼以殘酷虐吾民我以仁義撫天下觀敵勢巳衰何必先示以弱朝論韙之公以奉祠禄陛辭上問所欲言公奏許和則忘祖宗之讐棄四郡失中原之心遣歸正人傷忠義之氣惟陛下毋忘老臣平昔之言其指時事尤諄切上曰卿姑暫還鄉秋涼復召卿矣公既退賦詩云八請犯天顔今朝出漢闗渾如倦飛鳥日暮傍巢還公莊重出於天性誠信濟以學力在王邸讀資治通鑑至修身治國必反復誦説夀皇毎嘉納朱文公戊午讜議序曰靖康之禍二帝北狩臣子痛憤雖萬世必報其讐太上皇帝受命中興誓雪父兄之辱至紹興之初賢才並用紀綱復張諸将屢㨗恢復之勢蓋已什八九成矣金人於是始露和親之議以沮吾計而宰相秦檜歸自北廷力主其事當時人心尚正人倫尚明天下人無賢愚貴賤交口合辭以為不可獨士大夫之頑鈍嗜利無恥者數輩起而和之清議不容詬詈唾斥欲食其肉而寢處其皮則其於檜可知矣而檜乃獨以梓宫長樂藉口攘却衆謀熒惑主聽然後所為和議者翕然已定而不可破自是以來二十餘年國家忘讐敵之虜而懐宴安之樂檜亦因是藉外權以専寵利竊主柄以遂姦謀而向者冐犯清議希意迎合之人無不夤縁驟至通顯或乃踵檜用事而君臣父子之大倫天經地義所謂民彛者不復聞於縉紳之間矣士大夫狃於積衰之俗徒見當時國家無事而檜與其徒皆享成功無後患顧以忘讐忍辱為事理之當然主和議者慕為檜遊談者慕其徒一雄倡之百雌和之癸未之議發言盈庭其曰金世讐不可和者獨張公與胡公銓而已自餘蓋亦有謂不可和者而其所以為説不出乎利害之間又其餘則雖平時號賢士大夫慨然有六千里為讐人役之歎者一旦進而立乎廣堂之上顧乃惘然如醉如幻而忘其疇昔之言厥或告之則曰此處士之大言耳烏乎檜之罪上通於天萬死而不足以贖者正以其始則倡邪謀以誤國中則挾金勢以要君使人心不正人倫不明而末流之弊遺君後親至於如此之極也夫惟三綱不立是以衆志無所統係而上之人亦無所憑藉以為安斯乃有識之士所為長慮却顧而凜然以寒心者而説者猶曰姑以衆論之從違而卜事理之可否則今日士大夫是和者之多蓋不下前日非和者之衆也獨安得以前日之不可而害今日之可哉嗚呼是未知前日人倫之明而今日之不明前日人心之正而今日之不正也且若以人之衆寡為勝負則夫所謂士大夫是和之多者又孰若六軍萬姓之為多耶今六軍萬姓之言則是二公之言而已蓋君臣父子之大倫天之經地之義而所謂民彞者其於世也有明晦其在人也無存亡是以雖當頹壊廢弛之餘邪議四起無復忌憚而亦不能斬伐消鑠使之無也柰何不聽於此顧反決得失於前日所謂頑鈍嗜利無恥者之餘謀此已墜之三綱所以未能復振已隳之萬事所以未能復理而上之人終亦未能有所憑藉以成安强之勢也王縉字子雲嚴州分水人中崇寧五年進士第調歙州法移池州石埭令知婺州蒲江縣辟差杭州鹽倉臨安縣市易務知温州永嘉監池州永豐監丁内外艱權吏部郎官忤時相出知英州滿入對除知䖍州號為金部員外郎尋以選知温州加直秘閣陛辭日上留拜監察御史擢侍御遷右司諫求外復以直閣知温州落職奉祠復知常州差知管崇道退歸二十年告老紹興二十九年卒享年八十七公陳正綱紀嚴法守明賞罰立軍政厚風俗廣儲蓄冀為經久之謀且援古事以申諷諭東南大旱江湖為甚公慮賑恤之者如伸枉濫寛係累禁科敷緩逋負免穀税通糶船瘞殍者其論甚備又以常平之法名存實廢借兊之不撥還支移之不收内此所以坐視凶荒而莫之救也推其本則願詔大臣以燮理之事飭清躬修省之意論極剴切又言聽忠言於艱難之時易受直言於平定之後難況冦讐未殄願毋以目前暫無事而忽芻蕘之言臨安地震公言地震駐蹕之所豈非天心仁愛著隂盛之戒耶女子小人兵戈賊盗皆隂類也逺之備之以應天此先哲王所以中興也又言陛下即位十年軍政未立國用未節宜詔大臣參祖宗舊制與年嵗出内之數而均節之以寛民力言往嵗金翠之禁始自内庭而近者庫藏供瑇瑁坑冶采青緑未必以為器玩設飾然恐天下妄意好尚縁類而至上改容納之始諸軍屯淮上逆賊驕雛方陸梁王師有不赴期㑹者公請用周世宗我太祖之英斷以勵其餘言今二三大臣或出而總戎或入而秉軸願俾同心同徳絶猜間之萌兵書吕祉䕶諸將於淮上公請於督府屬官中選知兵者助之謀議且留軍中撫循訓練通將士之情未幾酈瓊叛祉死之張忠獻時為相臺諫議以擇帥不善而責之公曰司言責者獨不任其咎乎且以是進退大臣非知大體者也既而章交上公獨論劉光世屯淮西士卒數萬惟王徳一軍忠勇敢戰餘皆驕惰自肆不可用一旦以徳踵光世之後酈瓊等憚其威嚴訴於朝既為之改命而召瓊等赴行在乃懐疑貳相率北去則潜為此謀有日矣張浚引咎求罷方防秋之際二大将又入奏而朝無宰相毋乃未可乎章再上不報先以日食詔求直言同僚有語公曰上任我輩言路而外求直言建此議者必懐奸公曰日食求直言故事也豈以臺諫而廢及是又諷公曩趙丞相之去我二人不擊故不遷今臺諫媒孽右相勢已動摇吾與君遂言之則同升矣公正色拒之至是反劾公觀望欲為後圖公聞之笑曰吾老矣不願目前之利乃為後圖不亦左乎公在言路知無不言毎謂人才實難多事之際宜為朝廷愛惜以故不専彈擊而惟論安危利害大計與所以啓悟君心者上嘗稱公中正不阿得諫臣體它日言事者有不稱上曰王縉論事可思即除知常州有故從官歸自金國蓋嘗仕偽庭据吾京邑而為之守者過郡公惡之不為禮力求見公面詰愧之而宰相秦檜興之親厚歸而泣訴檜怒以公主管崇道觀杜莘老字起莘其先杜陵人唐工部甫十三世孫居眉之青神徙恭之江津中紹興十年進士第以道逺免廷對授梁山學官遭内外艱二十五年授珍州教改禮兵部架閣遷勅令所刪定官二十八年主太常簿兼籍由司尋除博士遷秘丞權吏部員外郎三十一年擢監察御史居三月遷侍御請外除直顯謨閣知遂寧給事中金安節封還詞頭改農少頃之力請竟拜前授隆興二年六月卒紹興二十五年彗見詔臣下極言闕失公奏以為彗盭氣所生歴考史牒多為兵兆國家為民息兵而將驕卒惰軍政不肅今因天戒以修人事思患預防無急於此遷秘丞入謝又論江淮守備上曰卿言必及此憂國深矣又遷侍御上曰以卿忠直不畏强禦故有此授自是用卿矣金使至傳欽宗凶問請淮漢地且索大臣書辭慢甚上知其寒盟赫然決䇿親征公奏疏廣上心其要謂善御天下者無事則深憂有事則不懼無事深憂所以豫備有事不懼所以濟功今虜欺天背盟正陛下待以不懼之時願益以剛大為心勿以小利鈍為異議所摇諛言所惰則人心有所恃而士氣振矣言藝祖簡諸道兵補禁衛訓閱精整故方鎮讋服莫敢有異以今親征有期而熊虎兩司班直親兵纔五千餘人羸老居半乞亟留聖慮金報益急公言鄂帥田師中老而貪士卒怨偏禆不服臨敵恐誤國事虜造舟海濵積全齊之甲其謀不淺宜命海道諸将募死士為劫寨計上詔師中奪其兵遣李寶促東海其後漢沔諸将得自奮所向皆㨗上出内庫錢十七萬賜出戍士大夫公言諸軍負囘易子錢甚夥例償以月廩不先除此弊錢出禁帑入將帥私室矣上悟悉除軍債士拜賜鼓舞人百其勇嘗歎曰臺諫當論天下第一事若有所畏姑言其次是欺其心不敬其君者也及任言責極言無隠取衆所指目者悉擊去之御械劉炎筦禁中市易大為奸利公疏聞即斥監嘉州税淮南運副王秬結宦寺居官簠簋不飭公劾罷之樞宻周麟之使虜巳而辭行再奏謫瑞州幸毉王繼先怙寵干法富浮公室屋擬禁庭未有敢摇之者公疏數十罪安置繼先福州子孫皆勒停撒寺院生祠數十所掠良家子為婢者百數並還其家臨安内外田宅貲寶籍以千萬計天下稱善金臨江中外惴恐無固志内侍張去為取御馬院西兵二百人髠其頂髮都人異之口語沸騰公彈治上疑其未審不樂公執奏不巳竟罷去為御馬院致其仕以所髠西兵𨽻殿前司乃曰吾責塞矣遂請外陳俊卿自副端貳兵部力求去公因奏事從容曰人材實難況多事之際如俊卿輩令在論思之地必有補益上然之公竟請遂寧之命朝士祖道都門以詩文稱述者百餘人都人至今以為美談雖宿衛武夫府寺賤𨽻誦説前朝骨鯁敢言必曰杜御史也孝宗受禪公著三議以進曰定國是曰修内政曰養根本理切而事核殆無一語虚設方海陵蓄力造謀偃然以大一統自任聲勢虚喝聞聽風靡議者狃久安習秦氏故態相顧不出一語公來首發其端毎奏對不論他事髙宗聞其忠言注措始整暇及金大入公益契合朝引裾暮伏擊奸聲震輦轂上聽如流雖戰士誅血危急存亡之秋而主聖臣直人心悦天意囘顯相隂助渠魁授首土疆既失而復社稷幾危而安其誰之功也黄龜年字徳紹福州永福人崇寧中第進士紹興二年除侍御未踰月論罷秦檜累遷給事中以集英修撰宫觀而卒初太傅吳元美創嶽宫三清殿寓公咸在吳以題梁遜公公即解手帕濡墨大書云風馬雲龍儼百順鈎陳之衛金枝玉葉拱萬齡宸極之尊詞語鏗潤書法髙古吳初見公畧不經思復疑濡筆染墨非法既而雙美始大喜心服歸語子姪因曰此公不特詞翰可敬其才出人數等未第時貧甚自處湛如應鄉舉引保有考官某人初為縣尉見公大竒之私自語曰安得此郎出我門下既而公與薦尉喜願妻以女後公登第歸尉巳捐館妻孥輿櫬相遇於道公哭之慟慨然賃屋使人導意請遂初約尉妻辭曰往事尚忍言哉無禄縣尉清貧死無私積吾携百指扶䕶西歸衣裝斥賣殆盡懼不能達那可議先輩㛰先輩第黄甲當結好鼎族吾且行矣善為我辭公埀泣曰吾許以諾死而負之何以自立夫人不念死者言乃作世俗外國語有遂吾志秋毫自齎不敢聞命遂定㛰邂逅間分携慟哭而别論秦檜第一章曰臣聞事君之道曰忠而人臣之罪莫大於欺君輔政之道曰公故宰相之罪莫大於狥私宰相徇私則刑賞私用爵禄私授合黨締交相與比同熒惑主聽肆為欺君之事伏見秦檜歸自北廷不一年而超至宰輔檜當如何報而乃營一已之私不顧國家之急刑賞以私用爵禄以私授王仲山檜婦翁也嘗守撫州金兵到城親往迎犒除名編置檜初䝉任即奏令自便夫刑罰者天下之公也檜乃狥私而壊之王昴檜妻黨也自起居舎人除中書舎人昴不敢當而辭免即除待制豈所當得夫名器者天下之公也檜乃狥姻婭之愛而假人刑賞陛下御天下之至權而檜敢盗用其意安在復論第二章曰檜䝉陛下厚恩國家艱難之際人臣捐軀狥國之秋當忘其家與身而乃含狼愎之心肆奸囘之志言偽行詭隂移威福慮陛下知其奸則嘯羣小而聚之朝廷挈衆枉而布之要路公為朋比以為巳竊弄國柄之助賴陛下辨之於早而立破其黨不然其為國深憂未可既言也尚可寵之以儒學最上之職名而俾之優游於琳館復聽其自如懲惡之罰欲安用乎陽貨竊寶玉大弓仲尼猶書盗以誅之況竊弄國柄可謂盗臣矣又第三章臣聞任伯雨有云小人為姦之状甚多可一言而該之曰無忌憚蓋小人不恥不仁不畏不義立人之道曰仁與義而小人之所不恤故無復有所忌憚恩莫隆於父子而不仁則敢違其親義莫重於君臣而不義則敢後其君君親且不之顧則無所忌憚何所不為揚雄太𤣥曰不容於天地之間其惟不仁不義乎陛下徳量涵容萬物萬物囿於天地然大臣有不義而後其君者陛下亦安能容之而不正其罪乎檜厚貌深情矯言偽行進迫君臣之勢陽為面從退恃朋比之姦隂謀沮格欺君如此正以懐不義之心故上不畏陛下之察見中不畏百僚之旁窺下不畏天下之竊議無忌憚敢如此第四章爵人於朝與衆共之其好與天下公也刑人于市與衆棄之其惡與天下公也好惡與天下公則功罪之状當暴白於天下云云檜之潜慝隠罪非陛下發揚於告廷之制則中外孰得而知之其奸状之大槩讀制詞固可以想見然其事曲折之詳則人皆傾耳而恨未聞也願陛下涣發明詔以檜潜慝隠惡暴白於天下使天下之人皆知所以破為臣懐奸之膽庶朋比之風不復作不亦善乎辛次膺簡穆公字起季其先隋司𨽻葬東萊之萊陽今為掖人甫冠第進士主深州饒陽簿調中山儀曹掾改醴州醴泉丞監湖州税嚴州建徳丞浙東撫幹皆不赴除主管西外宗室財用未赴吕頥浩薦知浦城明年監諸司審計司召除駕倉吏部員外郎湖北運判中途召還除左正言丐去除湖南憲丐祠後守金華三日召至以足疾丐去加秘撰還郡五月復召除權禮侍繼權給事中數月為真中丞言罷授敷制提舉興國尋除泉州改福州兼建帥五上章始奉祠孝宗即位首召繼許終制吉召對除中丞同知宻院除參政踰月求去授資學提舉洞霄明年休致退居八年乾道庚寅閏月薨享年七十有八官至左通議大夫言救世之弊在先責實方今許國者莫聞謀身者尚衆以補外為左遷以近民為俗吏營私殖已廉恥漸缺推原所以豈責實之道有所未至歟願嚴賞罰之馭盡綜核之法抑文而尚質上稱善時諸大將各擁重兵朝廷莫敢誰何公為正言奏竭東南之賦以養兵而軍政日弛為國之蠧淮西一易帥則全軍叛去控御無術且禁衛單弱根本不固願増王室之兵閱将士之材否親加揀拔恩威之柄咸歸於上使人人知朝廷之尊上問公曰朕欲通兩國之好使二聖早歸母后之養早伸百姓早得奠枕何道而可公對曰古人居安思危陛下居危思安臣所未諭偽齊既廢烏珠據東都時方議和公疏曰劉豫父子巳廢咸曰可賀臣切憂之蓋前此逆臣割據人心不附今金人親在京闕自北以南悉鄰强敵包藏叵測不可不亟為備臣但見諸處闗牒排辦金銀私覿之物欲遣使命臣恐狼子野心素無信義乞召大臣講求至計嚴備江淮亟圖自治戒諸将以持重責逺郡以招徠明間探以伺其乘釁保積聚以防其因糧不戰屈人無以易此又奏竊聞韓世忠將自楚州移軍鎮江臣知朝廷之慮有三一則山陽四面阻水澤遂成孤軍斗絶之勢二則虜以輕騎臨維揚精兵出盱眙侵軼真揚州世忠腹背受敵三則車駕駐建康必欲營壘相望成犄角之勢故以輕兵居淮重兵守江絶奔衝之患然臣區區復有可慮者五夫金所未敢輕進者正以世忠之兵爾今望風退舍敵得以窺伺此其不可一也昨遣諸将戍淮甸築城運糧勞費不貲今若遽歸前功俱廢深池堅壘冦必保焉此其不可二也兩淮州縣恃大軍以無恐今遽聞引軍而南則人不奠居必復散徙自是棄兩淮之地以予敵此其不可三也國家鹽利嵗入千萬皆在通泰非淮楚大軍屏蔽必不能保此其不可四也今既以江左為根本而不備兩淮是撒藩籬以誘冦此其不可五也況今山陽襄漢兩軍如吾兩翼遽自折其一可乎又言王倫等囘言劉豫已廢尼瑪哈輩悉就戮金勢浸衰竊謂金人内則誅强臣於股掌之上外則覆偽齊於談笑之間謂之衰信乎是必張虚聲以紓我覬弛備而窺江淮假此名以惑衆安中原未附之心且宣和海上之約靖康城下之盟口血未乾兵隨其後今當識其詐謀嚴戍守險來則戰去則設備可也上宣諭曰卿為朝廷慮甚深時秦檜任樞宻叙復王仲嶷官公劾仲嶷知袁州投拜罪在不赦仲嶷檜之妻叔也又劾知撫州王㬇請佃官田不輸賦且其父仲山先知本州屈膝金人㬇繼其後何面以見吏民㬇檜之妻兄也章不降出再奏曰臣奏仲嶷㬇得㫖追寢除命是皆檜力營救陛下曲從其欲紀綱不恤何以示四方金復䧟三京公力丐罷得祠再終更不復請㑹星變恩沛復得祠禄時秦檜擅權士大夫希進畏禍奏記獻諛檜以公負天下重名屢寄聲欲公移書當稍收用公笑而不答上始親政復召公言今風俗未厚財用未豐賞罰未明好惡未一官未嚮方吏未畏法賦斂之煩苛未息編民之凋瘵未蘇上之徳意或未孚於下下之疾苦或未聞於上願陛下兢業嘗以天下之事惟艱無懐宴安因奏國本未立上改容曰誰可公曰知子莫若父上稱善至再三又奏比年大臣惟恐人之議已思欲箝天下之舌士大夫以言為諱願廣開言路先事而言不以為迂逆耳之言不以為忤陳見悃愊者納之勿疑迎合意㫖者罰之無赦孝宗即位之三日首降召命繼許終制既禫以羸瘵納禄上親書曰朕頃在藩邸知卿名徳之重臨御以來亟欲見卿以憂制未終所不可今既祥禫宜遄其歸而復上疏請老豈朕不徳不足與有為耶云云宜勿復請公悚恐就道既對奏曰光堯親以大寶傳授睿明器使賢能必考覆事為勿以一人譽用之勿以一人毁去之出令要無反汗納善要如轉規兵籍當加増招民力宜加惠養若夫恢張國勢伺察敵情節冗費以豐糧餉善器械以利戰攻凡此數條咸資獨斷奏兩淮者藩籬也長江者門户也行在所者堂奥也故濡須合肥之必守則魏不能以侵吳盱眙江都之不危則胡不能以窺晉願經理兩淮使敵不能乘虚而入所謂自治之䇿言西北所恃者甲馬平原易野馳逐往來則吾舟師十不當一東南所恃者舟師驚波怒濤舳艫上下如履平地則彼鐵騎百不當一乞将諸軍所揀禁旅濟師使識䝉衝之利除中丞朝徳夀宫光堯見公羸瘁驚曰初不知卿病如是可惜勞卿於强徤時勉輔寧宗行當大用公首論士風不競宿習未除安恬者未必盡用浮躁者類多有之誦浮言忘實効痛加澄汰使鄙者寛誇者肅薄者厚貪者廉洒然一變凋俗庶知陛下初政總核名實之方兩淮久清野沃壤鞠為茂草公奏方種藝時乞招集遺民歸業官借牛種或令見屯大軍從便營田實足食足兵之至䇿臣僚奏選人改官不用薦章専以年勞被㫖令待從臺諌議公奏今乞選人九考十考與減舉主員數明書實績必曰某人廉吏也以某事而知其廉某人能吏也以某事而知其能則碌碌庸流逺矣劾殿帥成閔奪節鉞劾浙東帥湯思退以宫觀去又劾前樞使葉義問安置饒州公糾彈務大體必究其實不為苛察聞者知懼章疏一出天下韙之上方勵精政事公毎以名實為言多所禆益眷遇隆厚呼其官不名太上曰朕知卿如在家僧名利聲色人所好者卿皆不好符離之㨗日聞公手疏千餘言乞持重未幾軍果潰及見上色不懌奏曰師潰而歸張浚彈壓必無它此上天大儆戒於陛下上嘆公先見久之除參政公以力疾祈解不允及入謝尫悴益増奏曰王十朋除侍御史雖自親擢天下皆知臣嘗薦其方正湯思退促召将至天下亦知臣嘗疏其姦邪臣不引避人其謂何且犬馬猶知戀主臣力乞身豈犬馬之不若實苦筋力疲弊繼以涕泣上惻然深惜其去公不邇聲色與夫人敬待如賔光堯毎稱其清修雖燕適容必莊坐必正語必誠慕晁友元司馬文正之為人以禮自防善别嫌疑雖僕妾不冠不見鄱陽守程邁遺果寘白金奩公受果反金邁遭白簡公廉益著雖﨑嶇離亂貧不自聊一豆羮不妄受主上面諭卿廉聲著聞士大夫皆言在閩中不受俸禄公奏臣為貧而仕豈有辭俸之理但不當受者不敢受太上曰使人人似卿天下何患不太平耶宋名臣言行録别集上巻六
