body:
  text: 宋名臣言行録别集上卷二宋李幼武纂集陳康伯魯國文正公字長卿信州弋陽人宣和三年中丙科調平江長洲簿改京畿運屬為太學正建炎初除敕令所刪定官書成賞改秩倅衢州紹興六年為常博尋江東提舉八年為密院計議厯屯田户部司勳郎官十三年為戎監吏侍假尚書報聘金人十五年接伴金使尋知泉州秩滿主興國祠連三任起知漢州中道召還仍吏侍兼禮部刑部二十七年兼權尚書除待讀拜參政二十九年拜尚書右僕射同中書門下平章事三十一年升左僕射九月加特進封信國公十二月授少保觀文殿大學士進封福國判信州改醴泉觀使明年八月起判紹興府尋召陪祠復拜左僕射進魯國公乾道初以少師致仕薨年六十九贈太師諡文恭配享廟廷嘉泰初改今諡太上皇帝臨御㝢內三十六年始者金人貪天之禍太上不忍南北之民蹈鋒刃遂屈己議和嵗月巳久而金人篡竊自立者恃其强暴裒兵號百萬氈帳相望鉦鼓之聲不絶雖師出無名天地鬼神怒而不赦然凶焰焱迅逺近大震時則有公以謀佐天子鎮定大事折箠而笞使自殺其軀而去豈不偉哉先是紹興二十八年孫道夫使還言金將敗盟以關陜買馬為言其謀不可測而廷臣猶幸其無事公首發其端太上命同知樞密院王倫往驗之金帥頗相詰難又葉義問報聘回知金巳聚兵公獨奏曰金謂我和好滋久備必弛其南牧無疑因條上兩淮守禦之計太上嘉納之明年金遣髙景山來賀天申節果出嫚言求淮漢地及指取將相近臣公奏金違天道離巢穴數千里爭一旦之利必將自焚況曲在彼則我軍奮怒惟陛下決計用之士氣自倍及其鋒可以必勝太上以為然檄書下六軍踊躍爭北首死敵命侍衛馬軍司成閔出戍御史中丞江徹節制荆襄知密院葉義問督視江淮軍馬皆公指授方略分據要害之地金臨江朝論汹汹雖同列間有遣家屬先去公屹然不動氣貌自如遽書警奏緣手裁決一時言兵事者皆得展盡底藴擇其長而用之人恃以安初海陵入冦內侍張去為隂沮用兵之計且陳退避之䇿或又妄傳有幸閩蜀之議人情皇惑公奏曰聞有勸陛下幸越及閩者誠用其言大事去矣一日中使持御批來甚遽公讀之乃有㫖如更一日金兵未退且令放散百官公取焚之入奏曰審如聖訓百官既散主勢孤矣上問焚之何也公曰既不可付外施行又不可輒留私家故焚之上深然之公知上意雅欲視師乃奏曰敵國敗盟天人共憤今日之事有進無退若聖意堅決則將士之氣自倍願分三衙禁旅助襄漢兵力待其先發然後應之公初與參政楊椿密議敵將敗盟其兆已見當先事為備其䇿有四令兩淮諸將分畫地界使自為守一也措置民社密為寓兵之計二也淮東劉寶將驕卒少不可専用三也㳂江諸郡增壁積糧以為歸宿之地四也紹興十五年公接伴金使上以端午遣中使賜扇帕于洪澤金使言本國是日例賀當北面再拜且欲接伴使副同之乃敢受公以舊制卻之或謂公此細故朝廷必不惜公曰今曲從之後為例不復可改且辱命自我始況所求或無厭寧能盡從之乎金使卒受賜因自辨數曰接伴慢我朝廷聞之懼生事遂出之知泉州公與湯思退同相上皇宣諭曰卿靜重明敏一語不妄發真宰相也今與思退共政如有可否不憚商量公曰大臣論國事進退人才自當盡心若媕婀取容植黨以自固此鄙夫患失者臣非唯不敢亦不能故事宰臣初除例賜銀絹公辭上皇曰此舊格何足辭公奏國用匱乏自人主及百司皆當省節庶幾有濟臣若盡受何以風百僚力請減半從之今上居潜邸上皇一日謂宰臣曰普安郡王當異其禮除少保真王賜玉帶公與同列稱賀上皇獨留公曰向嘗與卿議及此朕不為難公奏曰陛下聖學髙明洞照今古易其所難臣敢為天下賀上與公等論淮上屯田事上曰士大夫言此者甚多然須先有定論用諸軍乎用諸民乎若論既定當先為治城壘廬舍使老少有所歸蓄積有所藏然後可為公曰今淮西歸正人願就耕者衆巳降牛種本錢趙子潚所納抽解木植亦分送兩淮治屯田人廬舍矣上曰甚善金使髙忠建來告嗣位入見欲用舊禮授國書公以義折之乃請宰相受書公又持不可廷臣相顧愕眙公呼館伴徐嚞至榻前責以議不素定嚞徑前取書進呈金沮甚上嘉歎之公論備邊當擇良將上曰褊禆中有驍勇者卿等可以所聞見隨其髙下具名以聞上謂公等曰上天悔禍兵革相尋今先遣使請和則其國中可卜倘舊疆復還得奉祖宗陵寢尤見天意眷顧公奏曰頃年金人有云只見漢和蕃不見蕃和漢今日金先求和仰見聖德動天之應上皇倦勤初有與子之意公朝夕協贊以決大議挺然有古社稷臣之風上即位公為首相奉冊如禮以公舊臣每對但呼丞相而不名公悚懼乞正名分上曰尊禮元老此非過也隆興初公言八月中金國副元帥赫舍哩志寧以第三書來欲通和好朝廷遣盧仲賢持書報之其所論最大者三事我所欲者削去舊禮彼已肯從彼所欲者嵗幣如數我不深較其未決者彼欲得唐鄧海泗州而我以祖宗陵寢欽宗梓宫為言未之與也恭奉聖訓遣王之望龍大淵為通問使副命下之日議論洶湧乞召張浚歸國特埀咨訪仍命侍從臺諫集議上諭公等曰金能以太上為兄朕所喜者公奏靖康以來首足顛倒之勢埀四十年一旦肯為敵國皆聖德所致初公自建康扈從回即以病祈去太上屢詔不允隆興初公乞去益堅上留之愈力章十數上十二月進封福國公判信州用魏郡王韓琦領鄉郡故事寵之公入謝上慰勞之曰丞相之歸所謂歇馬他日宣召切勿辭詔宰執餞别百官郊餞恩禮殊絶未有前比公力辭鄉郡改醴泉觀使時金兵再犯淮甸以左僕射湯思退督師繼䇿免警報益急人情大駭望公復用上親札遣中使即家召公復拜尚書左僕射進封魯國公制出中外鼓舞然議者疑公久厭於富貴得去如釋重負又養疴卧家必不肯强起雖子弟親戚亦謂公宜以病為辭不為過也公曰不然今王室艱難我大臣體國輿疾上路幸一見上或憐而歸之耳中道聞邊遽甚乃兼程以進閏月至闕下上御便殿詔其子安節壻文好謙扶掖入見仍減拜賜坐勞問優渥公謝病不任宰相職上不許詔間日一㑹朝許肩輿至殿門非大事不書押賜衣帶寢處之具都人見公夾道歡呼皆以手加額然後向之期公未起者自以為淺丈夫也上謂宰臣曰陳康伯有器量朕扈從太上在金陵其從容不迫可比晉謝安臨終奏事無一語差繆出至殿廬而疾作輿至第薨公姿貌魁秀氣宇宏逺望之知為巨人自為諸生時持身甚嚴不知有世間浮靡其學一出於孔孟在人主前論事専以寬大開迪上心凡所論薦惟賢與能不務主已或勸取士以為門下用公曰是立黨也其可乎張浚有人望方再用也公推挽之備至公辭位又薦可復以為相及見張浚絶口不言前後廟堂七八年同列自相好惡獨公守正周旋其間無所適莫後皆曰陳丞相長者不敢有毫髮觖望退朝危坐一室簾几蕭然不聞謦咳音蓋天資冲淡類皆如此皇太子服履袍內侍扶掖至御榻側立不坐百官拜舞山呼起居畢公升殿奏願陛下即御座以正南面仰副太上皇傳授之意天顔愀然曰君父之命出於獨斷此大位懼不敢當尚容辭避公再奏曰陛下應天順人龍飛寶位第以駑下之才恐不足以仰輔新政依乘風雲千載之遇實與四海蒼生不勝大慶范宗尹字覺民襄陽府人宣和三年登進士甲科靖康初為開封儀曹尋授校書郎監察御史為侍御尋除右諫議冬除集撰提舉崇福宫建炎初召為中丞三年參政四年右僕射紹興初罷為觀文殿學士提舉洞霄宫後除知溫州乞祠五年卒公奏方今天下事可革者甚衆而欺罔之風革之尤不可緩夫鹿之與馬相去逺矣然趙髙謂鹿為馬而二世惑焉是以天下而欺一人也以天下而欺一人其禍可勝言哉崇寧以來上自宰輔大臣下至州縣賤吏莫不以欺罔相髙是以財用匱竭生靈愁痛災異數見盜賊羣起而陛下不知也陛下明目達聰之時臣下尚有肆為欺誕者願明詔諫官有已敗未敗悉仰彈奏以聞使天下曉然知欺罔不可復為則深仁厚澤得以究矣詔榜朝堂時諸路盜起大者至數萬人朝廷力不能制公謂此皆烏合之衆急之則併死力以抗官軍未易禦也莫若析地以處之盜有所歸則衆當懷土可以漸制乃奏曰昔太祖與普合謀收藩鎮之權天下無事可謂良法比年國難如此四方帥守皆束手環視莫知所出蓋事力單寡不可以有為此法之敝也今日救弊之道當稍復藩鎮之制亦不盡行之天下且裂河南江北數十州為之少與之地而専付以權擇人久任以屏王室羣臣多以為不可上決意行之遂以公為相時年三十三自漢唐及本朝宰相未有如是年少者張守參政事公語之曰今日國勢正如人之疾病沉疴方篤稍施駃藥必有顛仆之患要使設施有序勿遽勿亟當相與戮力啓沃上前廣言路拔賢才節財用惜名器抑僥幸左右彌縫庶乎其可也公言自崇寧罷權侍郎之後庶官進用有不可任以給舍者則正除侍郎超躐太甚請復舊制以待資淺新進之人故復權侍郎時建炎四年也公等聚議欲將京畿東西湖北淮南並分為鎮以鎮撫使為名除茶鹽之利國計所係合歸朝廷依舊置官提舉他監司並罷財賦除納上供外並聽帥臣移用管內州縣官許辟置知通奏朝廷審授遇軍興聽從便宜其帥臣不因召擢更不除代如能捍冦立功當議特許世襲詔從之初擬世襲上曰若世襲恐太重當俟其保守無虞然後許之以公兼樞密院事罷御營使以其事歸密院機速房自慶歷後宰相不兼樞密者八十餘年其復兼始此公奏今所除用多儒生欲兼用才吏以備緩急使令上曰才吏亦不可無但勿令太多上謂大臣曰從班人極少卿等當共議務取其實不厭多也公曰用人之法須擇可為執政方除從官可除從官方除省郎則選髙而真才出矣上曰然公言張浚自浙西來稱嶽飛可用上曰飛杜充愛將充於事君失節而能用飛亦知人之明也大史奏日有黑子公曰此在陛下修德以弭之臣等輔政無狀當罷上曰日為太陽人君之象豈關卿等惟君臣同心行安民和物實事庶幾天不為災也宰執奏邊事公曰金未必再渡忽諜報金引舟自漕渠而南行在震攘趙鼎謂公曰不速動恐復有維揚之變公曰今日之事在維揚則不可在㑹稽則可鼎曰相公定道著李回曰丞相之言差强人意秦檜之入金也從二帝之上京至是赴行在自云殺金之監已者來歸朝士多疑之者而公及李回與檜善力薦其忠及引對檜言如欲天下無事須是南自南北自北遂建議講和上舟次台州宰執奏駐蹕之所王綯曰蜀自秦至本朝王繼恩下蜀者八矣取輒得之入蜀未可謂之便也公曰臣謂若便入蜀恐兩失之據江表而徐圖關陜之事則兩得之決擇取舍不可不審上曰然上謂宰執曰昨令西外宗正選藝祖之後四五人先是公嘗造膝有請於是公曰此陛下萬世根本之慮上曰藝祖以聖武定天下而子孫不得享之遭時艱危零落可憫又曰朕亦令選於伯字行中庶昭穆順序富直柔曰宫人有人可託否上曰朕已得人若不先擇宫嬪則可慮之事更多公曰陛下審慮至此實宗廟無疆之福公初建討論濫賞之議士大夫僥幸者爭排之諸大將楊惟忠劉光世辛企宗兄弟皆嘗從童貫行軍論者疑其亦當貶削吏侍髙衛初以圍田改官及是主右選力持此以為不便上疏詆之同知李回亦言宣和間任中書舍人以校正御前文籍遷官乞削秩罷政上曰宣和政事恐不必一一皆非人主留意文籍自是美事豈可與其他濫賞同科秦檜曰此法一行濁流者稍加削奪便比無過之人誠為僥幸清流者少挂吏議即為辱甚大不敢立朝恐君子受弊上顧諭公公曰此事如回者無幾其他亦不足惜遂降㫖侍從及館職兼領者非又詔武臣亟免討論令尚書省榜諭命既下上終以為難後二日上批朕不欲歸過君父斂怨士夫可日下寢罷公堅以為可行即力求去公始建議檜力贊之至是見上意堅反以此擠之朱倬忠靖公字漢章七世祖避地於閩遂為閩人以鄉舉至京補內舍生宣和三年復鄉舉法以選登五年進士第調常州宜興簿張忠獻薦召除廣東倉幹改檢察建廣財用所屬官後以忤秦檜除越州教除諸王宫教改浙帥參謀滿秩歸避秦禍奉祠十餘年倅南劍知惠州除國子監丞浙西倉除右正言二十七年秋也二十九年春二月進侍御史冬十二月進中丞自典舉還遷參政明年拜尚書右僕射月餘詔提舉三朝國史詳定敕令明堂加恩進封開國公三十二年金人入冦扈從親征得疾歸引年致仕不允請至三四詔以觀文殿學士提舉興國宫隆興元年六月薨訃聞贈特進金將冦常州居民求避地公為具舟給食全活甚衆亡何民告潦于郡郡委公閲實公為蠲田租至九分若全免守怒將捃治之既知公秉志堅確乃俾攝屬明槖為宣諭使入廣人憚其風聲獨於公慰薦甚力謂之曰宜興冦至脫民於死者非公耶民至今思之遂表於上時方以劉豫為憂因賜對䇿其必敗髙皇大喜知惠州陛辭因言嘗䇿劉豫必敗髙皇曰記得記得卿久淹何所公曰厄於檜上愀然慰諭曰惠陽去朝廷逺賴卿撫百姓如朕親撫之目送公去旬日忽問大臣曰前日之對誰為薦之曰守臣陛辭常典也上亟令召對政府有未知公者曰已去矣除國子監丞公聞命還視事凡八閲月以職事輪對建請勤恤民隱尋除提舉浙西常平忽特命自今在內除提舉官令朝辭上殿蓋為公設也公首登對上曰近年內重外輕今卿以朕親擢之人出為部使者使知內外之任均又曰人不知卿惟朕獨知卿遂除諫官自為諫官眷滋厚而心益畏常言人主任我以耳目託我以腹心非報怨任氣之地必須上合天心不為子孫植荆棘也每上疏必夙興露告赫然如上帝之我臨朝論方畏言邊備公悉力開陳言詳氣定雖逢盛怒不懾在言路久薦人論事以至發倉廩蠲米價減私鹽核軍籍嚴抑配禁州縣科借凡以興利除敝無慮數十條率焚藁不傳公經學醇深經筵侍上多所稱善金主冦江公陳戰備應三䇿且謂兵應者勝上曰卿所言三䇿甚當朕書於坐右朝夕思之金勢浸迫公又䇿金三事上焉者為耕築計中焉守備下則妄意絶江然臣謂多從下䇿可無患焉既皆如公所料史忠定張忠簡虞忠肅劉忠肅之進用公皆有力焉陳福公王魯公及王之望苪公曄諸人亦公所薦也公知舉有劉朔論賈誼通達國體在於豫建太子公擢為第一公平時造膝未嘗不反覆及此至是以典舉復命又論奏久之上再三稱善由是被遇逮建王正名從幸時惟陳文恭公與公實左右上事無大小必以咨問矧揖遜大事蓋熟問之孝皇倦勤中外流傳疑信參半諫大夫故與公有怨乃以風聞上疏孝皇知公無他比再上降資政殿學士先以觀文學士主祠詞臣承望至謂元良天下之本乃覬疇庸不知君臣之間未嘗有異也授受之意屢形詔諭誰不知之矧公自典舉嘗白發其端繼以臣鄰扈從出入與聞政幾脫有欲言當不待臨事而發也公之所啓不過曰靖康之事正以傳位太遽盍姑徐之揆諸人情此亦愛君之至者髙皇決不以為忤而孝皇仁孝篤誠未嘗志於趣得則亦必不以為疑也陛辭之日髙皇諭云所論於卿何與朕欲過德夀宫卿且歸俟年嵗當召卿明年公以致仕聞孝皇謂大臣曰朱某有性氣如何便欲致仕大臣以訃聞上曰可憐可憐恤典一如前宰相遂詔復元職然後人知兩宫果不以為忤也魏鶴山曰了翁每惟帝者之盛猶曰惟口出好興戎蓋授受之間古人所甚畏以范文富諸臣定䇿之功人知勿敢言微王同老自陳寧沒身不見録王岐公與子之議未嘗有異論也猶曰指社稷為他家而譴之微其子仲修一言亦將無以自白雖然是尚有可畏者曰出好自口興戎自口故言之而不自為德也不見知而不敢辨也今髙皇之蔽志踰三十年而孝皇以繼志為悅不以位為樂凡皆中外所共知是豈較此遲速之間者今如言者之說則淺之議聖德也公之知不知庸何恤而揖遜古今之盛觀此不可以不辨宋名臣言行録别集上卷二
