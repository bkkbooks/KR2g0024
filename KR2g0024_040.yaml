body:
  text: 宋名臣言行錄別集上巻八宋李幼武纂集王居正字剛中上世故蜀人其高祖徙家維揚宣和三年登進士第二名賜上舍出身丁母憂吉調饒州安仁丞荆南教官大名鎮江兩浙帥牒辟府學教皆不就時詔二千石各舉所知部使者上公名應詔謝却之改徽州學官未上召命兩下以疾辭范宗尹為同年力薦復召甚急改太傅紹興初除禮部員外郎進常少除起居郎尋除右文修撰知婺州徙饒州歲中以常少召除起居舍人尋除中書舍人兼史館修撰遷兵侍乞郡除徽猷閣直學士知饒州改待制知台州至郡未幾主太平觀祠起知温州紹興二十一年十月薨以子貴贈太中大夫公幼嗜學晝夜不息嶄然見頭角出游太學諸生聞聲爭交懽初煕寧中王荆公以新經頒天下其後章蔡更用事槩以王氏説律天下士盡名老師宿儒之餘論緒言為曲學學輒擯斥當是時内外校官非三經義字説不登几案他書雖世通行者或不能舉其論帙公勉以親命屈意場屋心能獨非之未嘗肻作新進士語流落不偶餘十年黨友鐫説公盍少自貶公歎曰此天竆我非人竆也一第自有時心之是非可改耶范宗尹言公直諒孝友當今無輩召至行在所與范公相勞苦且曰如是始與公言之何時危如此公位宰相不極所學拔元元塗炭中尚誰待某避冦﨑嶇陽羡山谷間分死溝壑勉出見公一道此意耳范公矍然失席曰某知罪矣公言今有司以數路之所出欲盡為向者一百七十三年之事不忍暫廢非所謂知時變夫不知隨時以省事而乃隨事以省費故今日例有減半之説究其實未始不重而徒示人以弱如國初歲舉進士不過數十今至四五百人其費亦大矣然御試之日臣備員考官有司給燭半挺曰此省費也嗚呼其亦拙矣除用有自中書者公言近習請託進擬不自朝廷所係不輕因錄皇祐詔書以進上皆嘉納其餘捄弊裨闕所還制勅甚衆北邊解嚴詔百官皆以疆事對公力言防江之備不可徹上采其策一意憂國出入禁門以人主知已排權劾貴所言無所避同列皆嚴憚公出其下車駕之親征也公實扈從次平江羽檄狎至柄臣或進退保計上顧曰如王某必不肻為此其為上所敬如此公上疏云伏䝉聖慈許臣以舊所著論王安石父子平昔之言不合於道者進呈得四十二篇釐為七卷一曰蔑視君親虧損恩義二曰非聖人滅天道詆誣孔孟宗尚佛老三曰深懲言者恐上有聞四曰託儒為姦以行私意變亂經㫖厚誣天下五曰隨意互説反覆背違六曰排斥先儒經術自任務為新竒不恤義理七曰三經字説自相牴牾集而成之謂之辨學詔送祕書省嘗進言曰陛下深惡安石之學不識聖心灼見其弊安在上曰安石之學雜以伯道取商鞅富國強兵今日之禍人徒知蔡京王黼之罪而不知天下之亂生於安石公對曰誠如聖訓然安石所學得罪於萬世者不止此因陳安石訓釋經義無父無君者一二事上作色曰是豈不害名教孟子所謂邪説者正謂是矣公退即序上語繫於辨學書首上之始檜叅政甚善公間而論天下事意鋭甚既為相所言皆不酬公疾其詭言於上曰檜嘗語臣中國之人惟當着衣噉飯共圖中興時臣心服其言謂有志於中興要當如此又自謂使檜為相數月必聳動天下今施設乃止於是願陛下以臣所聞問檜所行檜慙怒前好盡矣及檜專國公自知不為所容在温半年亟以疾請祠歸陽羡避謗深居時事一不掛口客至清坐竟日談經訂史而已書祠官之考十有二游心事外人不能窺其際檜晚節權勢益張尤畏善類大誅譴以立威嶺海間纍係無虚日雖公闔門託疾猶奪徽猷閣待制公等視榮辱晏如也公氣節高亮儀觀豐碩聲音滿室其學根極六藝深醇閎肆以崇是闢非為已任自其少年已不為王氏説所傾動慨然欲黜其不臧以覺世迷於是參稽雋艾鈎索聖藴商確所學詖淫邪遁之辭迎陣披靡雖老於王氏學者莫能自解龜山楊先生與公會毘陵出所著三經義辨示公曰吾甫舉其端以告學者而已欲髪櫛而毫緝之未遑也非子莫成吾志者公愈益感厲首末十載迄以成書為毛詩辨學二十巻尚書辨學十三巻周禮辨學外集一巻行於世胡寅字明仲文定公長子登進士第厯外任乆之建炎三年召除駕部郎官尋除起居郎紹興五年為中書舍人十一月除徽猷閣待制守邵州秩滿丐祠祿得請而歸二十年坐與李光通書詔落職尋責授果州團練副使新州安置二十五年復徽猷閣直學士致仕建炎三年公上疏言願陛下一反前失下詔曰金人逆天亂倫扶立僭偽朕義不戴天志思雪恥父兄旅泊陵廟荒殘罪乃在予無所逃責以此號召四海收其豪英誓以戰伐天下忠義之士必雲合而景從天下武勇之夫必響應而飇起臣切歎憤輒畫七策其一曰罷和議而修戰畧葢和之所以可講者兩地用兵勢力相敵利害相當故也非強弱盛衰不相侔所能成也而其議則出於耿南仲何也淵聖皇帝在東宮南仲東宮官歸依李邦彦邦彦方被寵眷又陰為之計既而淵聖嗣極而邦彦為次相金兵驟至遂獻和議南仲因附邦彦而沮种師道擊賊之謀機會一去中原塗炭伏望陛下罷絶和議刻意講武以使命之幣為養兵之費庶幾沙漠之駕或有還期所謂乞和必無可成之理二曰置行臺以區別緩急之務今百司庶府必不可缺者惟吏部户部為急誠使江淮兩浙湖北並依八路法謹擇監司而付之則吏部銓事亦復減省戸部所以治財今四方供貢州郡以軍興便宜截用行在支費惟以㩁貨鹽利為無窮之源耳故臣謂宜置宮或建康或南昌或江陵審擇一處以安太后六宮百司以耆哲諳練大臣總臺諫守成法從事郎吏而下不輕移易量留兵將以為營衞命戸部計費以給之陛下提兵按行專責宰相以餽餉選委發運以佐行於下得人經制何患無財三曰務實効去虚文夫治兵必精命將必賢政事必修誓戡大憝不為退計者乃孝弟之實也遣使乞和廣捐金幣不恥卑辱者為孝弟之虚文也屈已以來天下之士博訪策畧信用以期成功者乃求賢之實也未見賢若不克見既見則不能由之或因茍賤之人例輕天下之士者為求賢之虚文也聽受忠鯁非止面從茍利於國即日行之者乃納諌之實也和顔泛受合意則喜之不合則置之或内惡其切直而用他事遷徙之者為納諫之虚文也將才之智必能謀勇必能戰仁必能守忠必不欺得是人而任之然後待以恩御以威結以誠信有功必賞有罪必罰者乃任將之實也庸奴下材本無智勇見敵輒潰無異於賊與之親厚等威不立賜予過度官職逾涯將以收其心適足致其慢聽其妄誕望其用命者為任將之虛文也簡汰其疲老病弱升擇其壯徤驍勇分屯在所置營房以安其家室聚粟帛以足其衣食選衆所畏信者以董其部位申明階級之制以變其驕恣悍悖之習然後被以精甲付以利器進戰獲酋虜則厚賞死則恤其家孥退潰則誅其身降敵則戮其族令在必行者乃治軍之實也無所別擇姑息安養惟恐一夫不悦幸其無事教習如戯紀律蕩然者治軍之虚文也部刺史二千石必選明惠忠智之人乆於其官痛刈奸贓以除民害必使寛恤之政實被於民結其離心乃愛民之實也詔出於上吏沮於下誑以出力自保則調發其丁夫誘以犒設贍軍則厚裒其錢穀弓材弩料竹葥皮革凡干涉軍須之具日日征求因緣奸弊復蠲其税祖載之赦令實不能免茍以欺之者為愛民之虚文也若夫保宗廟陵寢土地人民以此六實者行之則為天子之實也陵廣荒圯土宇日蹙衣冠黔首為肉為血以此六虚行之陛下戴黄屋建幄殿質明輦出房雉尾金爐夾侍兩陛仗馬衞兵儼分儀式贊者引百官以次入奉起居既退宰相大臣卑卑而前搢笏出奏司晨唱晨正則駕入而仗出矣此則為天子之虚文也四曰大起天下之兵今宿衞單弱臣嘗乞揀諸路禁軍充御營正兵陛下自將之又命福建團結搶仗部以土豪命兩浙募水手并起諸州撩湖捍海等兵盡付水軍江東西湖南北募弓手以在官閒田給養命廣西及辰沅鼎靖於見敎峒丁中簡其精鋭分番起之屯戍襄漢以京西淮南無主之田為屯田招集兩河山東諸路流人畧依古法均節之壯者訓武藝耕戰文武臣中有明習營屯者因任使之五曰定根本自古圖王業者必定根本之地然欲謀進取非堅坐不動者所能臣謂惟荆襄為勝誠能屯唐鄧襄漢之田以養新兵出廣西武陵峒丁并施黔僚軍築堅壘列守漢上阻以水軍經以正兵緯以弓手民兵牽制江黄呼吸廬壽則進取之基立然後陜西聲氣血脉通達而騎卒可至川廣之富皆猶外府易以供把願陛下先命呂頤浩杜充分部諸將過江自以精兵二三萬為輿衞渡江而北緩轡而上遣使尋問父老撫綏挺刃之餘民至於荆襄固守必爭而勿失以為根本悠乆為之不能濟者臣不信也六曰選宗室之賢才者封建任使之今宜於同姓中不問親疎選擇賢才布之中外廣加任使其望實傑然出衆者陛下宜留之宿衞夾輔王室其有克敵戡難之功者宜漸為茅土之制星羅而棊列以慰祖宗在天之靈七曰存紀綱以立國體夫剏業埀統之君必守紀綱以遺子孫繼世承序之君必守紀綱以法祖宗一君子進衆小人未必退一小人進則衆君子必退矣仁宗皇帝所養之君子既乆且逺日以消亡安石所教之小人乃新而近其蕃息未艾也所以破家誤國不知已時夫以賢治不肖此治平以前陛下之家法以不肖治賢此熙寧以後陛下之家戒矧當今日非得希世異材上下交用否何由傾乎此綱紀國家之一事也又曰右文左武者有國不易之道今儒學衰息未有巨賢屹乎朝以收運籌之功所恃者獨三四庸將耳夫此數人曾不足以當种師道之厮役况望古昔名將乎願陛下委大臣以腹心待近臣以體貌常使南衙朝士氣勢重於此曹天下抱才自愛之人必願立于左右緩急之際必有能為陛下竭忠盡節者矣此綱紀國家之二事也文定公被召命子姪各述所見公呈十事一曰定都建康以係民望二曰選用賢德以修民紀三曰改紀國政以便民心四曰修明軍制以為民防五曰擊捕盗賊以阜民生六曰增重上流以存民基七曰薦舉縣令以安民俗八曰乆任守宰以固民志九曰開廣言路以通民情十曰網羅遺逸以收民才言六事一曰清中書之務二曰議學校之制三曰重縣令之任四曰京官必厯親民五曰監司郡守並以三年為任六曰除監司廻避戸貫之法公既論不當遣使上賜詔褒諭而張浚自江上還奏使事兵家機權不用其説乃遣范寧之與何蘚偕行公復疏言其無益者八有害者二大畧謂庚戌而後不遣使金亦不來及癸丑日遣使則鈎引金人入國曾不旋踵又曰今以二帝為言然自建炎以來使命屢遣無一人能知兩宮起居之狀今以金為父兄之仇絶不復通則名正事順他日或有異聞在我理直易為處置若通使不絶則金握重柄歸曲於我名實俱䘮非陛下之利也使或有知二帝所在一見慈顔宣達陛下孝思之念雖歲遣一使竭天下之力以將之亦何不可其如艱梗悠邈必無可達之理乎今日只當明復讐之義用賢修政息民訓兵以俟北向至於何蘚之行非特無效决須取辱公既與浚異論乃以父病不及迎侍乞湖南小郡出守邵州秦檜知公致仕之貧因其往建州省覲世母遺以白金公報書曰願公修政任賢勿替初志尊王攘狄以開後功檜以為譏已始怒之公嘗游嶽麓寺大書壁間云是何南海之鰐魚來作長沙之鵬鳥於是帥臣劉正方欲捃摭張浚諸人之罪劉旦知潭州潮陽人也亦大怒復訟公於檜侍御史曹筠即奏公兄弟阿附趙鼎私相朋比公尋以李光通書特落職名章厦奏公天姿凶勃敢爲不義寅非安國之子不肻為親母持服此其不孝之大罪也寅初傅會李綱後又從趙鼎建明不通鄰國之問其視兩宮播遷如越人視秦人之肥瘠後來梓宮既還皇太后獲就孝養寅乃陰結異意之人作為記文以為今日仕進之人將赤族而不悟此其不忠之大罪也遂有新州之命紹興二十六年公卒于衡州公既退居乃著讀史管見三十巻論周秦至五代得失其論甚正葢以蔡京秦檜之事數寄意焉朱文公曰公議論英發人物偉然向嘗侍之坐見其數盃後歌孔明出師表誦張丕叔自靖人自獻於先王義陳了翁奏狀等可謂豪傑之士也讀史管見乃嶺表所作當時並無一冊文字隨行只是記憶所以其間有牴牾處有好誦佛書者致堂因集史傳中虜人姓名揭之一處其人果收去念誦此真戱也潘良貴字義榮一字子賤天台人擢進士第厯仕州縣宣和初為博士尋除館職奉使淮南靖康召對建炎初除右司諫時相忌之罷紹興入為都司忤時相罷復除中書舍人兼攝起居郎罷終於家宣和初公為博士不肻託昏富貴之家而獨嘗論斥大臣䝉蔽之姦及為館職又不肻遊蔡京父子間使淮南又不肻與中宮同燕席靖康召對因論時宰何㮚唐恪不可用恐誤國事以是謫去曾不旋踵而其言果驗建炎初論亂臣逆黨當用重典以正邦法壯國威且及當時用事者姦邪之狀大為汪黄所忌書奏三日左遷以去其言雖不大傳然劉觀所草責詞直以揣摩詆訾為罪則其事固可知已紹興為左司一日直前奏曰先王之所以致治者以其合於大公至正之道比年之所以致亂者以其反此而已陛下今日誠宜仰思祖宗創業之難二聖䝉塵之乆俯念生靈塗炭之苦土地侵削之多夙寤晨興不敢少置每行一事必先念此然後發之務以合於所謂大公至正之道而勿以一豪私意曲狥人情則天下庶有休息之期矣向子諲陛對日昃未退公越班厲聲曰向子諲以無益之言乆勞聖聽叱之退者再焉上驚而怒欲抵公於法中執法常同援公而排子諲上怒欲併逐同翌日禮侍張九成侍講金華因論其事曰臣聞良貴廷叱向子諲甚懼因就問之良貴曰時暑甚子諲乆對朝膳未進而流汗津津良貴恐勞聖躬情迫於中不覺聲之厲也上曰良貴用心又却如此繼云二人莫平日不相能否九成曰臣舊不聞子諲名曩任館職時良貴為少監嘗指元帥府日錄問良貴以向子諲何如人曰好士人今臣所居與子諲相近一日子諲過臣云且得子賤在朝子賤良貴字也以此知二人初無不相得者上意稍解二人卒俱罷晦翁序公文集曰天地之化包括無外運行無窮然其所以為實不越乎一陰一陽兩端而已其動靜屈伸往來闔闢升降浮沉之性雖未嘗一日不相反然亦不可一日而相無也聖人作易以通神明之德類萬物之情其所以為説者亦若是焉耳矣然及其推之人事而擬諸形容常以陽為君子而引翼扶持惟恐其不盛陰為小人而排擯黜抑惟恐其不衰何哉葢陽之德剛陰之德柔剛者常公而柔者常私剛者常明而柔者常暗剛者未嘗不正而柔者未嘗不邪剛者未嘗不大而柔者未嘗不小公明正大之人用於世則天下䝉其福私暗邪僻之人得其志則天下受其禍此理之必然也且非獨於易之説為然葢凡自古聖賢之言雜出於傳記者亦未有不好剛而惡柔者若夫子所謂剛毅近仁而又嘗深以未見剛者為歎及乎或人之對則又直以有欲病棖也之不得為剛葢專以是為君子之德也嗚呼若潘公者其眞孔子所謂未見者哉云云公平生亷介自將自少至老出入三朝而前後在官不過八百六十餘日所居僅庇風雨郭外無尺寸之田經界法行獨以丘墓之寄輸帛數尺而已其清苦貧約葢有人所不堪者而處之超然未嘗少屈於檜其子熺暴起鼎貴勢傾内外亦未嘗與通問也嘗誦君子三戒之言而深以在得之規痛自儆飭至於造次之間一言一行凡所以接朋友教子弟亦未嘗不以孝弟忠信節儉正直防㣲謹獨之意為本其讀書磨鏡之喻切中庸者之病當世葢多傳之而所論汲長孺葢寛饒之為人尤足以見其志之所存也嗚呼若公之清明直諒確然亡欲其真可謂剛毅而近仁矣夫以三代之時聖人之世而夫子已歎剛者之不可見況於百世之下幸有如公者焉而不得少伸其志以沒其條奏草藁有補於時可為後法者又以公自焚削而不復存其平日之言頗可見者獨有賦詠筆札之餘數十百篇而已後之君子葢將由此以論公之世其可使之没没無傳而遂已乎宋名臣言行錄別集上巻八
