body:
  text: 宋名臣言行録外集卷七宋李幼武纂集謝良佐上蔡先生字顯道上蔡人釋褐登第授秦州教建中召對除書局官後復去為管庫以飛語坐係詔獄禠官習舉業已知名往扶溝見明道明道語人曰此秀才展拓得開將來可望見明道受學甚篤明道一日謂之曰爾輩在此相從只是學某言語故其學心口不相應盍若行之請問焉曰且坐伊川每見人靜坐便歎其善學明道又謂謝子雖小魯直是誠篤理㑹事有不透其顙有泚憤悱如此朱公掞以諌官召過洛見伊川顯道在坐公掞不語伊川指顯道謂之曰此人為切問近思之學胡文定云先生初以記問為學自負該博對明道舉史書不遺一字明道曰賢却記得許多可謂玩物喪志謝聞此語汗流浹背面發赤明道却云只此便是惻隱之心及看明道讀史又却逐行看過不差一字謝甚不服後來省悟却將此事做話頭接引博學之士謝子與伊川别一年往見之伊川曰相别又一年做得甚工夫謝曰也只去個矜字曰何故曰子細㸃檢得來病痛全在這裏若按伏得這個罪過方有向進處伊川㸃頭胡文定公問矜字罪過何故恁地大謝曰今人做事只要誇耀别人耳目渾不關自家受用事有底人食前方丈便向人前喫只蔬食菜羮却去房裡喫為甚恁地知命雖淺近也要信得及將來做田地就上面下工夫余初及第時嵗前夢入內廷不見神宗而太子涕泣及釋褐時上晏駕哲宗嗣位如此等事直不把來草草看却萬事真實有命人力計較不得吾平生未嘗干人在書局亦不謁執政或勸之余對曰他安能陶鑄我自有命在若信不及風吹草動便生恐懼憂喜枉做却間工夫枉用却間心力信得命便養得氣不挫折語録游子問謝子曰公於外物一切放得下否謝子謂胡子曰可謂切問也胡曰何以答之曰實向他道在上面做工夫來胡曰如何做工夫曰凡事須有根屋柱無根拆便倒樹木有根雖剪枝條相次又發如人要富貴要他做甚必須有用處尋討要用處病根將來斬斷便沒事或問謝子於勢利如何曰打透此關十餘年矣當初大故做工夫㨂難捨底棄却後來漸漸輕至今日器物之類置之只為合要用却無健羡底心問太虛無盡心有止安得合一曰心有止只為用他若不用則何止吾丈莫已不用否曰未到此地除是聖人便不用當初曽發此口被伊川一句壞了二十年曽往見伊川伊川曰近日事如何某對曰天下何思何慮伊川曰是則是有此理賢發得太早在問當初發此語時如何曰見得這個事經時無他念接物亦應副得去問如此却何故被一句轉却曰當了須有不透處當初若不得他一句救拔便入禪家去矣伊川直是㑹煆錬得人說了又却道恰好著工夫也昔日作課簿以記日用言動視聽是禮與非禮者又云舊多恐懼常於危階上習並語録儒異於禪正在下學處顔子工夫真百世軌範舍此應無入路無住宅三二十年不覺便虛過了春秋大約如法家斷例也折以中道耳恐因是及中庸因中有權與取兩者之中之說進學加功處若欲少立得住做自家物須要自用法術乃可得之邇來學者何足道能言真如鸚鵡也富貴利達今人少見出脫得者非是小事如禪家透聲色關切須勉之透得名利關便是小歇處然須藉窮理工夫至此方可望有入聖域之理不然休說萬無見道之理某緣早親有道復為克已之學遂於世味若存若亡昨經憂患仕意浸薄矣學之所貴有諸已為難聞詹君輩勇猛精進殊可喜能更覷得破一切物纍尤佳若覷不破則未論行險僥幸而氣已弱志已喪矣有志於道者不可不戒真當朝夕㸃檢令了了也並手東胡文定馮忠恕問陳叔易言伊川嘗許良佐有王佐才以是質於和靖和靖曰先生無此語先生晚年顯道授澠池令來洛見先生留十餘日先生謂焞如見顯道試問比來所得如何焞即往問焉謝曰良佐每常聞先生語多疑惑今次見先生聞先生語判然無疑所得如此具以告先生先生曰某見得他也是如此雖甚喜之但不聞此語耳記善録謝先生監西竹木場朱子發震自太學與弟子權偕往謁之坐定子發進曰某願見先生久矣今日之來無以發問不識先生何以見教先生曰好待與賢說一部論語子發私念日刻如此何由親領其講說已而具飯酒五行只說他話及茶罷乃掀髯曰聽說論語首舉子見齊衰者與冕衣裳者與瞽者見之雖少必作過之必趨又舉師冕見及階子曰階也及席子曰席也皆坐子曰某在斯某在斯子張問曰與師言之道與曰固相師之道也夫聖人之道無微顯無內外由灑掃應對進退而上達夫道本末一以貫之一部論語只恁地看語録後跋謝子見河南夫子而歸尹子送焉問曰何以教我謝曰吾徒朝夕從先生見行則學聞言則識譬如有人服烏頭者方其服也顔色悅澤筋力強盛一旦烏頭力去將如之何尹子反以告夫子夫子曰可謂益友矣論顔子具體而微者合下來有恁地氣象但未彰著耳孟子強勇以身任道壁立萬仭誰敢正覷看非孟子恁地手腳也撑拄此事不去雖然猶有大底氣象未能消磨得盡不然藐大人等語言不說出來孔子云事君盡禮人以為諂當時諸國君相怎生當得他聖人恁地禮數是他只管行禮又不與你計較長短與上大夫言便誾誾與下大夫言便侃侃冕者瞽者見之便作過之便趨蓋其德全盛自然到此不是勉強做出來與孟子全别朱子云先生為人英果明決強力不倦克已復禮日有程課所著論語說及門人所記遺語皆行於世如以生意論仁以實理論誠以常惺惺論敬以求是論窮理其命意皆精當而直指窮理居敬為入德之門則又最得明道教人之綱領嘗宰德安府之應城胡文定以典學使者行部過之不敢問以職事顧因介紹請以弟子禮見入門見吏卒植立庭中如土木偶人肅然起敬遂稟學焉其同時及門之士亦皆稱其言論閎肆善啓發人今讀其書尚可想見也某自少時妄意為學即賴先生之言以發其趣而平生所聞先生行事又皆髙邁卓絶使人興起凜然常懼其一旦泯滅而無傳也上蔡論語却有啓發人處雖其說或失之過然識得理後却細密商量令平正也上蔡說孝弟非仁也孔門只說為仁上蔡却說知仁只要見得此心便以為仁上蔡之說一轉而為張子韶子韶一轉而為陸子靜上蔡所不敢衝突者子韶盡衝突子韶所不敢衝突者子靜盡衝突上蔡說仁說覺分明是禪論語上蔡解極多看得見時他只有一兩個緊要底字上蔡所見透徹無隔礙處上蔡說詩須先識得六義體面而諷誦以得之此却是㑹讀詩上蔡語録上卷極親切暇日試涵泳之當自有味不必廣求愈令隨語生解不得脫灑耳跋語録云先生學於程門篤志力行於諸公間所見最為超越問上蔡議論莫太過曰上蔡好於事上理㑹理却有過處上蔡髙邁卓絶言論宏肆善開發人其語雖不能無過然却是確實做工夫來問人之病痛不一各隨所偏處去上蔡才髙所以病痛在矜字曰此說是也然謝氏謂去得矜字後來矜依舊未去說道理好揚揚地伊川之門上蔡自禪門來其說亦有差又曰如今人說道愛從髙妙處說便入禪去自上蔡以來已然上蔡大率張皇不妥帖上蔡觀復齊記中說道理皆是禪學意思觀他說復與伊川異似以靜處如云見此消息不下工夫之類乃是謂儒佛不同而所以不同但是下截耳龜山亦如此張南軒云上蔡論語序前面說得甚好但後面說與天地同流處太多適所以啓學者想像不帖實之心游酢廣平先生字定夫建州建陽人元豐六年登進士第調越州蕭山尉侍臣薦為太學録除博士擬知河清縣范忠宣守潁昌辟為府教授范再相除太博除齊州僉丁憂服除再調泉州僉上皇即位召還為監察御史出知和州嵗餘主祠知漢陽軍再乞祠後知舒州再知濠州罷歸家寓厯陽宣和五年卒年七十一公與兄醇俱以文行知名於時所交皆天下豪英公雖少而一時老師宿儒咸推先之伊川以事至京師一見謂其資可適道時明道知扶溝縣兄弟方以唱明道學為已任設庠序聚邑人子弟教之召公來職學事公欣然往從之得其微言於是盡棄其學學焉龜山云伊川稱游君德宇粹然問學日進政事亦絶人逺甚於師門見稱如此其所造可知矣筮仕之初縣有疑獄十餘年不決公攝邑事一問得其情而釋之精練如素官者人服其明自幼不羣讀書一過輒成誦比壯益自力心専目到不為世儒之習誠於中形於外儀容辭令燦然有文望之知為成德君子也其事親無違交朋友有信蒞官遇僚吏有恩意人樂於自盡而無敢慢其令者惠政在民戴之如父母故去則見思愈久而不忘若其道學足以覺斯人餘潤足以澤天下遭時清明不究所用士論共惜之先正忠肅公之與先生遊也笑談論議書疏辭章昔所親見而聞之者至今尚能誦之其雍雍俯仰之間又能併得其深微之意使聞者恍然若將復見其人焉朱子撰祠堂記公之清德重望皎如日星雖奴𨽻之賤皆知之其流風餘韻足以師世範俗公事業不得大施獨有中庸論孟說垂於世考其師友所稱味其話言所傳則夫造道之深流風之逺有可得而推者矣伊川曰游酢非昔日之游酢也固是穎然資質溫厚又曰游酢讀西銘已能不逆於心言語外立得個意思便道中庸矣游酢楊時先知學禪已知向裏沒安泊處故來此却恐不變也同上吕居仁曰定夫後更學禪大觀間某以書問之云儒道以為順此父子君臣夫婦朋友兄弟則可以至於聖人佛道去此則可以至於聖人吾丈既從二程學後又從諸禪遊則二者之論必無滯閡敢問所以不同何也游答云佛書所說世儒亦未深考往年嘗見伊川云吾之所攻者迹也然迹安所從出哉要之此事須親至此地方能辨其同異不然難以口舌爭也定夫言前輩往往不曽看佛書故詆之如此之甚而其所以破佛者自不以為然也問定夫記程先生語中一物不該非中也一事不為非中也一息不存非中也何哉為其偏而已矣朱子曰便是此說中字不著中字之義不如此他說偏字却是一偏一偏便不周遍却不妨如定夫記此語不親切不似程先生每常說話緣他夾雜王氏學當時王氏學盛行熏炙得甚廣宋名臣言行録外集卷七
