body:
  text: 宋名臣言行錄後集巻二宋朱子纂集富弼韓國文忠公字彦國河南人舉茂材異等位至丞相拜司徒配享神宗廟庭公初逰場屋穆伯長謂之曰進士不足以盡子之才當以大科名世公果禮部試下公西歸范文正遣人追公曰有㫖以大科取士可亟還公還京師見文正辭以未嘗為此學文正曰已同諸公薦君矣久為君闢一室皆大科文字可往就館時晏元獻為相求婚於文正文正曰公女若嫁官人則仲淹不敢知必求國士無如富弼者即議婚公遂以賢良方正登第聞見錄郭后廢范仲淹争之貶知睦州公上言朝廷一舉而獲二過縱不能復后宜還仲淹以來忠言蘇内翰撰神道碑寳元初元昊反公時通判鄆州陳八事且言元昊遣使求割地邀金幣使者部從儀物如契丹而詞甚倨此必元昊腹心謀臣自請行者宜出其不意斬之都門又言夏守彬庸人平時猶不當用而况艱難之際可為樞密乎議者以為有宰相器知諌院康定元年日食正旦公言請罷燕撤樂雖虜使在館亦宜就賜飲食而已執政以為不可公曰萬一虜主行之為朝廷羞後使虜還者云虜中罷燕如公言仁宗悔之元昊冦鄜延延州民二十人詣闕告急上召問具得諸將敗亾狀執政惡之命逺郡禁民擅赴闕者公言此非陛下意宰相惡上知四方有敗爾民有急不得訴之朝則西走元昊北走契丹矣夏守彬為陜西都總管又以宦者王守忠為都鈐轄公言用守彬已為天下笑而守忠鈐轄乃與唐中官監軍無異遂詔罷守忠自用兵以來吏民上書者甚衆初不省用公言知制誥本中書屬官可選一人置局中書考其所言可用用之宰相偷安欲以天下是非盡付他人又引國初故事請使宰相兼領樞密院仁宗曰軍國之務當盡歸中書樞密非古官然未欲遽廢即詔中書同議樞密院事宰相辭曰恐樞密院謂臣奪權公曰此宰相避事耳非畏奪權也㑹西夏首領來降補借奉職覊置荆湖公言二人之降其家已族矣當厚賞以勸來者上命以所言送中書公見宰相論之宰相初不知也公嘆曰此豈小事而宰相不知邪更極論之上從公言以宰相兼樞密使並蘇内翰撰神道碑劉從愿妻遂國夫人者王䝉正女也寳元中出入内廷或云得幸於上外人無不知者以此獲罪奪封罷朝謁久之得復入張安道為諌官再以䟽論列皆中留公時知制誥制下復遂國之封公繳還詞頭封命遂寢唐制惟給事中得封還詔書中書舍人繳還詞頭盖自公始安道見吕申公公猶以非舊典不樂二公之不相喜皆此類龍川志契丹自晉朝以來踐有幽薊北鄙之警略無寧嵗凡六十有九年至景德元年舉國來冦上用冦凖親征之䇿自是復通好不盗邉者三十九年及元昊叛兵久不决契丹之臣又貪而喜功者以我為怯且厭兵遂教其主設詞以動我欲得晉髙祖所與關南十縣慶厯三年聚重兵屯境上遣其臣蕭英劉六符來聘仁宗命宰相擇報聘者時敵情叵測羣臣皆莫敢行宰相以公名聞乃以公接伴英等入境上遣中使勞之英托足疾不拜公曰吾嘗使北病卧車中聞命輙起拜今中使至而公不起見何邪英矍然起拜公開懷與語不以夷狄待之英等遂去左右密以其主所欲者告公且曰可從從之不可從更以一事塞之公具以聞上命中丞賈昌朝館伴不許割地而許增嵗幣且命公報聘見北主北主曰南朝違約塞鴈門增塘水治城池籍民兵此何意也羣臣請舉兵而南寡人以謂不若遣使求地求而不獲舉兵未晚公曰北朝㤀章聖皇帝之德乎澶淵之役若從諸將言北兵無得脫者且北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝諸臣争勸用兵者此皆其身謀非國計也北主驚曰何謂也公曰晉髙祖欺天叛君而求助於北末帝昏亂神人棄之是時中國狹小上下離叛故契丹全師獨克雖敵獲金帛充牣諸臣之家而壯士徤馬物故大半此誰任其禍者今中國提封萬里所在精兵以百萬計法令修明上下一心北朝欲用兵能保其必勝乎曰不能公曰就使其勝所亡士馬羣臣當之歟亦人主當之歟若通好不絶嵗幣盡歸人主臣下所得止奉使者嵗一二人爾羣臣何利焉北主大悟首肯久之公又曰塞鴈門者以備元昊也增塘水始於何承矩事在通好前地卑水聚不得不增城壘皆修舊民兵亦舊籍特補其缺爾非違約也晉髙祖以盧龍一道賂契丹周世宗復伐取關南皆異代事宋興已九十年若各欲求異代故地豈北朝之利哉本朝皇帝之命使臣則有詞矣曰朕為祖宗守國必不敢以其地與人北朝所欲不過利其租稅爾朕不欲以地故多殺兩朝赤子故屈已增幣以代賦入若北朝必欲得地是志在敗盟假此為詞耳朕亦安得獨避用兵乎澶淵之盟天地鬼神實臨之今北朝首發兵禍過不在朕天地鬼神豈可欺也哉敵大感悟遂欲求婚公曰婚姻易生隙人命脩短不可知不若嵗幣之堅久也本朝長公主之出降賫送不過十萬緡豈若嵗幣無窮之獲哉北主曰卿且歸矣再來當擇一受之卿其遂以誓書來公歸復命再聘受書及口傳之辭於政府既行次樂夀謂其副曰吾為使者而不見國書萬一書詞與口傳者異則吾事敗矣發書視之果不同乃馳還都以晡入見宿學士院一夕易書而行既至乃不復求婚專欲增幣曰南朝遺我書當曰獻否則曰納公争不可北主曰南朝既懼我何惜此二字若我擁兵而南得無悔乎公曰本朝皇帝兼愛南北之民不忍使蹈鋒鏑故屈已增幣何名為懼哉若不得已而至於用兵則南北敵國當以屈直為勝負非使臣之所憂也北主曰卿勿固執古已有之公曰自古惟唐髙祖借兵於突厥故臣事之當時或稱獻納則不可知其後頡利為唐太宗所擒豈復有此事哉公聲色俱厲敵知不可奪曰吾當自遣人議之於是留所許增幣誓書復使耶律仁先及六符以其國誓書來且求為獻納公奏曰臣既以死拒之敵氣折矣可勿復許彼無能為也上從之增幣二十萬與契丹平契丹君臣至今誦其語守其約不忍敗者以其心知通好用兵利害之所在也神道碑公再使以國書與口傳之詞不同馳還奏曰政府故為此欲置臣於死臣死不足惜奈國事何吕夷簡争之曰恐是誤當令改定公益辨論不平仁宗問樞使晏殊何如殊曰夷簡决不肯為此誠恐誤爾公怒曰晏殊姦邪黨夷簡以欺陛下公晏之壻也其忠直如此聞見錄公力争獻納二字及還而晏公已稱納矣温公日錄公糾察在京刑獄時有用偽牒為僧者事覺乃堂吏為之開封按餘人而不及吏公白執政請以吏付獄執政指其坐曰公即居此無為近名公正色曰必得吏乃止執政滋不恱故薦公使契丹欲因事罪之歐陽修上書引顔魯公使李希烈事留公不報事還除吏部郎中樞密直學士辭不受始受命聞一女卒再受命聞一男生皆不顧而行得家書不發而焚之曰徒亂人意爾尋遷翰林學士公見上力辭曰增幣非臣本志也特以朝廷方討元昊未暇與敵角故不敢以死争爾神道碑熈寧中公罷相鎮亳常深居養疾罕出視事幕府事湏禀命者常以狀白公公批數字於紙尾莫不盡其理或事有難决幕府憂疑不能措手者相與求見公公以一二言裁處徐語他事幕府曉然率常失其所疑者退而歎服以為不可及公早使強敵以片言折狂謀尊中國及揔大政視天下事若不足為者矧退處一郡乎澠水燕談王拱辰言於仁宗曰富弼亦何功之有但能添金帛之數厚夷狄而弊中國爾仁宗曰不然朕所愛者土宇生民爾財物非所惜也拱辰曰財物豈不出於生民邪仁宗曰國家經費取之非一日之積嵗出以賜夷狄亦未至困民若兵興調發嵗出不貲非若今之緩取也拱辰曰敵情無厭好窺中國之隙且陛下只有一女萬一欲求和親則如之何仁宗憫然動色曰茍利社稷朕亦何愛一女邪拱辰言塞遽曰臣不知陛下屈已愛民如此堯舜之主也洒泣再拜而去筆錄慶厯三年三月命公為樞密副使辭愈力至七月申前命公言敵既通好議者便謂無事邉備遽弛敵萬一敗盟臣死且有罪非獨臣不敢受亦願陛下思外國輕侮中原之恥坐薪嘗膽不忘修政因以告納上前而罷逾月復以命公時元昊使辭上俟公綴樞密院班乃坐且使宰相章得象諭公曰此朝廷特命非以使北故也公不得已乃受時晏殊為相范仲淹叅政杜衍樞密韓琦與公副之歐余王蔡為諫官皆天下之望石介作詩以美之公既以社稷自任而仁宗責成於公與仲淹數以手詔督公等條具其事又開天章閣召公等坐且給筆札書其所欲為者遣中使更往督之且命仲淹主西事公主北事公遂與仲淹各上當世之務十餘條又自上河北安邉十三䇿大畧以進賢退不肖止僥倖去宿弊為本欲稍易諸路監司之不才者使澄汰所部吏於是小人始不恱矣元昊遣使以書來稱男而不稱臣公言契丹臣元昊而我不臣則契丹為無敵於天下不可許乃却其使卒臣之七月契丹來告舉兵討元昊十二月詔冊元昊為夏國主使將行而止之以俟虜使公曰若虜使未至而行則事自我出既至則恩歸契丹矣從之初石介作詩譽公等而詆竦竦怨之會介以書遺公責以伊周之事竦遂教女奴習介書改伊周為伊霍又偽作介為弼撰廢立詔草飛語上聞雖不信而公懼不自安因保州賊平求岀宣撫河北歸及國門不得見除知鄆州自鄆移青㑹河朔大水民流京東擇所部豐稔者三州勸民岀粟得十五萬斛益以官廪隨所在貯之得公私廬舍十餘萬間散處其人以便薪水官吏自前資待闕寄居者皆給其禄使即民所聚選老弱捐瘠者廪之山林河泊之利有可取為生者聽流民取之其主不得禁官吏皆書其勞約為奏請使他日得以次受賞於朝率五日輙遣人以酒肉糗飯勞之岀於至誠人人為盡力流民死者大塜𦵏之謂之叢冡自為文祭之明年麥大熟流民各以逺近受粮而歸凡活五十萬募而為兵又萬餘人神道碑邵伯温曰公使虜功甚偉而毎不自以為功至知青州活飢民四十餘萬則毎自言之曰過於作中書二十四考矣至和二年召拜集賢相與文彦博並命宣制之日士夫相慶於朝仁宗密覘得知之謂侍臣歐陽修曰古之求相者或得之夢卜今朕用二相人情如此豈不賢於夢卜也哉修頓首稱賀神道碑公為相議欲稍由學校進士命侍從儒臣講立法制太學諸生經明行修者由右學升左學由左學升上舍嵗終擇上舍中經行尤髙者比及第人命之以官既簽同列奏獨翰林歐陽永叔舍人劉原父異論曰如是則通經者未升於左學而詞賦者已在髙科矣事卒不行家塾記至和間公當國立一舉三十年推恩之法盖公與河南進士叚希元魏升平同塲屋相善公作相不欲私之故為天下之制至今行之聞見錄公為相守格法行故事而附以公議無心於其間故百官任職天下無事以所在民力困弊稅役不均遣使分道相視裁减謂之寛恤民力又弛茶禁以通商賈省刑獄天下便之碑公與魏公同在中書公母老矣一日語及故事宰相有起復視事者魏公曰此非朝廷盛事已而公居母憂朝廷屢詔起之上章三辭貼黄言臣在中書嘗與韓言之决不當起魏公嘆曰吾但以實言之不料以為怨自此二人稍稍有隙龍川志英宗以疾不能視朝大臣請光獻埀簾后辭之不獲乃從英宗纔康復后已下手書復辟魏公奏臺諌有章䟽請太后早復政后聞之遽起魏公亟令儀鑾司撤簾后猶未轉御屏尚見其衣也時公為樞密相怪魏公不關報撤簾事有魏公欲致弼於㓕族之地之語歐公為叅政首議追尊濮王公曰歐公讀書知禮法所以為此舉者忘仁宗累主上欺韓公爾公因辭執政例遷官䟽言甚危三日不報見英宗面奏曰仁宗之立陛下皇太后之功也今皇太后謂臣與胡宿吴奎等曰無夫婦人無所告至不忍聞臣實痛之豈仁宗所望於陛下哉以笏指御床曰非陛下有孝德孰可居此英宗俯躬曰不敢公求去益堅遂出判河陽自此與魏公歐公絶後公致政居洛毎嵗生日魏公不論逺近必遣使致書幣甚恭公但答以老病無書魏公之禮終不廢至薨乃巳天下兩賢之歐公魏公之薨也公皆不祭吊國史著公以不預䇿立英宗與魏公絶至此祭弔不通非也英宗一日因公進除目而震怒響滿一殿擲除目榻下公慨然搢笏拾除目進之曰天子亦有怒焉出九師以伐四夷否則陳斧鉞以誅大臣今日陛下之怒不為常事除目也必以臣等有大過惡可怒者何不誅臣以謝天下英宗為之霽色温言公進說猶久之不已晁以道富公奏議序英宗臨御一日韓公進擬數宦者䇿立有勞當遷官公曰先帝以神器付陛下此軰何功可書韓有愧色後韓帥長安為范堯夫言其事曰琦便怕富公也邵氏後錄公懇辭機務章二十上以使相判河陽復五上章辭使相且言真宗以前不輕以此授人仁宗即位之初執政欲自為地故開此例終仁宗之位宰相罷者皆除使相至不稱職者亦然今陛下初即位願立法自臣始不從神宗即位召赴闕公既至未見有於上前言災異皆天數非人事得失所致者公聞之嘆曰人君所畏惟天若不畏天何事不可為去亂亾無幾矣此必奸臣欲進邪說先導上以無所畏使輔拂諌争之臣無所復施其力此治亂之機也吾不可以不速救即上書數千言雜引洪範春秋及古今傳記人情物理以明其决不然者久旱公乞罷同天節上夀從之即日而雨公又上疏願益畏天戒逺奸邪進忠良上親答曰義忠言親理正文直敢不置之枕席銘諸肺腑更願公不替今日之志則天災不難弭太平不難致也公既謝且云願陛下待羣臣不以同異為喜怒不以喜怒為用舍並碑熈寧初公再相神宗首問邉事公曰陛下臨御未久臣愚以為首當推恩愛布德澤二十年未可道着用兵事若干戈一興上貽宸慮下竭民力願勿首先留意邉事萬一戎狄渝盟神人共憤為應敵之計可也上問所先當如何公曰阜安宇内為先盖是時荆公已有寵勸帝用兵以威四夷於是用王韶取熈河以窺靈夏結髙麗以圗大遼又用章惇取湖北夔峽之蠻又用劉彛沈起窺交趾二人造戰艦於富良江上交趾偵知先浮海載兵䧟㢘州又破邕州害守臣蘇緘屠其城掠生口而去又用郭逵趙卨宣撫廣南使直搗交趾逵老將與卨議論不同為交趾扼富良江兵不得進瘴死者十餘萬人元豐四年五路大進兵取靈武夏人决黄河水櫃以灌吾軍壘兵將凍溺不戰而自斃者數十萬人又用吕惠卿所薦徐禧築永樂城夏人以大兵破之報夜至帝早朝當宁慟哭宰執不敢仰視帝嘆息曰永樂之舉無一人言其不可者蒲宗孟進曰臣嘗言之帝正色曰卿何嘗有言在内惟吕公著在外惟趙卨曽言用兵不是好事既又謂宰相曰自今更不用兵與卿等宜共享太平然帝從此欎欎不樂以致大漸嗚呼痛哉聞見錄安石叅政議改法理財與公意不合公稱病求去章數十上上問誰可代卿公薦彦博上黙然良久曰安石何如公亦黙然八月以使相判亳州公在亳時方行青苖錢公謂此法行則財聚於上人散於下且富民不願請願請者皆貧後不可復得故持之不行提舉常平趙濟劾公以大臣格新法除左僕射判汝州公言新法臣所不曉不可以復治郡願歸洛養疾許之碑公自亳移汝過南京張安道留守公來見坐久之公徐曰人固難知也安道曰謂王安石乎亦豈難知者往年方平知貢舉或薦安石有文學宜辟以考校姑從之安石既來一院之事皆欲紛更之方平惡其人檄以出自此未嘗與語也富公俯首有愧色盖公素喜荆公至得位亂天下方知其奸聞見錄公雖居家而朝廷有大利害知無不言交趾叛詔郭逵討之公言海嶠深逺不可以責其必進願詔逵擇利進退以全王師契丹来争河南地界上手詔問公公言熈河諸郡皆不足守而河東地界决不可許故叅政王堯臣子同老上言至和三年仁宗弗豫其父與文彦博劉沆及公同决大䇿乞立儲嗣㑹翊日疾瘳故緩其事人無復知者以其父堯臣所撰詔草上之上以問彦博彦博言與同老合上嘉公等勲績如此而終不言詔以公為司徒公為相及判河陽最後請老家居凡三上章皆言天子無職事惟辨君子小人而進退之此天子之職也君子與小人並處其勢必不勝君子不勝則奉身而退小人不勝則交結搆扇千岐萬轍必勝而後已小人復勝必肆毒於善良無所不為求天下不亂不可得也並神道碑元豐六年公病上書言八事大抵論君子小人為治亂之本神宗語宰輔曰富弼有章疏來章惇曰弼所言何事帝曰言朕左右多小人惇曰可令分析孰為小人帝曰弼三朝老臣豈可令分析左丞王安禮曰弼之言是也罷朝惇責安禮曰左丞對上之言失矣安禮曰吾軰今日曰誠如上諭明日曰聖學非臣所及安得不謂之小人惇無以對是年五月大星殞於公所居還政堂下空中如甲馬聲公登天光臺焚香再拜知其將終也聞見錄富公致事家居專為佛老之學故吏吕大臨與叔奏記於公曰大臨聞之古者三公無職事惟有德者居之内則論道於朝外則主教於鄉古之大人當是任者必將以斯道覺斯民成已以成物豈以爵位進退體力盛衰為之變哉今大道未明人趨異學不入於莊則入於釋疑聖人大道為未盡輕禮義為不足學致人倫不明萬物憔悴此老成大人惻隱存心之時以道自任振起壞俗在公之力宜無難矣若夫移情變氣務求長年此山谷避世之士獨善其身者之所好豈世之所以望於公者哉吕集故事宰相以使相致仕者給全俸公以司徒使相致仕居洛自三公俸一百二十千外皆不受公清心學道獨居還政堂毎早作放中門鑰入瞻禮家廟對夫人如賓客子孫不冠帶不見麈史云富鄭公治家嚴整子舍女僕咸不得互相往來閨門肅如也平時謝客文潞公為留守時節往來公素喜潞公昔同朝更拜其母毎勸其早退公既薨公子紹廷字德先能守家法與公兩壻及諸甥皆同居公之第家之事一如公無恙時毫髪不敢變鄉里稱之建中靖國初擢為河北西路提舉常平德先辭曰熈寧變法之初先臣以不行青苗法得罪臣不敢為此官上益嘉之除祠部貟外郎崇寧中卒聞見錄富公之客李偲問公曰公治平初進戸部尚書屢辭今進司徒一辭而拜何也公曰治平初乃弼自辭官今日潞公皆遷弼豈敢堅辭妨他人也盖潞公與荆公論政事不合出判北京七年不召自此眷禮復厚矣聞見錄平生所薦甚衆尤知名者十餘人如王質與其弟素余靖張瓌石介孫復吴奎韓維陳襄王鼎張昷之杜杞陳希亮之流皆有聞於世世以為知人神道碑劉器之云富鄭公年八十書坐屏云守口如瓶防意如城晁氏客語五代八姓十有二君四十四年如絲之棼以人為嬉以殺為儇兵交兩河腥聞於天上帝厭之命我祖宗畀爾鑪錘往銷其鋒孰謂民逺我聞其呻寧爾小忍無殘我民六聖受命維一其心敕其後人帝命是承勿劓刵人矧敢好兵百三十年諱兵與刑惟彼犬戎謂帝我驕帝聞其言折其萌芽篤生莱公尺箠笞之既復既馴則擾綏之堂堂韓公與莱相望再聘於燕邉方以寧景德元年始盟契丹公生是嵗天命則然公之在母秦國寤驚旌旗鶴鴈降格於庭云有天赦已而公生天欲赦民公啓其衷逺至燕然南至於河億萬維生公手撫摩水潦荐飢散流而東五十萬人仰哺於公公之在内自泉流瀕其在四方自葉流根百官維人百度維正相我三宗重華恊明帝謂公來隕星其堂有墳其丘公豈是藏維嶽降神今歸不留臣軾作頌以配崧髙蘇内翰碑銘歐陽修文忠公字永叔吉州人舉進士事仁宗英宗神宗位至叅政公生四嵗而孤母韓國太夫人親教公讀書家貧至以荻畫地學書公敏悟過人所覧輙能成誦比成人將舉進士為一時偶儷之文已絶出倫軰翰林學士胥公時在漢陽見而奇之曰子必有名於世館之門下公從之京師兩試國子監一試禮部皆第一遂中甲科補西京留守推官始從尹師魯逰為古文議論當世事迭相師友與梅聖俞逰為歌詩相唱和遂以文章名冠天下留守王文康知其賢還朝薦之蘇黄門撰神道碑公少時從里閭借書讀或抄之抄之未畢而已成誦矣吴丞相撰行狀范文正忠亮讜直言無囘避左右不便因言公離間大臣貶知饒州余靖上䟽論救以朋黨坐貶尹洙上言靖與仲淹交淺臣於仲淹義兼師友當從坐貶監郢州稅公貽書責司諌髙若訥不能辨其非辜若訥大怒繳奏其書降授夷陵令公復與師魯書云五六年來此軰沉黙畏慎布在世間忽見吾軰作此事下至竈間老婢亦相驚怪時蔡襄作四賢一不肖詩以歌之記聞公初坐論救范公逺貶三峽後元昊反范起為環慶帥辟公掌牋奏公難曰吾初論范公事豈以為已利哉同其退不同其進可也遂辭不往行狀初范公之貶公與尹師魯余安道皆以直范公見逐目之黨人自是朋黨之論起公乃為朋黨論以進言君子以同道為朋小人以同利為朋人君但當退小人之偽朋進君子之真朋其言懇惻詳盡公性疾惡論事無所囬避小人視之如仇讎而公愈奮厲不顧上獨深知其忠改右正言知制誥賜三品服故事知制誥必試上知公之文有㫖不試與近世楊文公陳文惠公比連公三人而已嘗因奏事論及人物上目公曰如歐陽修何處得來盖欲大用而不果也碑澧州進柿木成文有太平字公言今四海騷然未見太平之象請不宣示於外淮南漕臣獻羡餘十萬貫公請拒之以防刻剝行狀保州兵亂以公為河北轉運使陛辭上面諭無為久留之計有所欲言言之公曰諌官得風聞言事外官越職而言罪也上曰苐以聞勿以中外為意河北諸軍怙亂驕恣小不如意輙脅持州郡公奏乞優假將帥以鎮壓士心軍中乃定初保州亂兵皆招以不死既而悉誅之脅從二千人亦分𨽻諸州富公為宣撫使恐後生變與公相遇於内黄夜半屏人謀欲使諸州同日誅之公曰禍莫大於殺已降况脅從乎既非朝命州郡有一不從為變不細富公悟乃止公奏置御河催綱司以督粮餉邉州頼之又置磁相州都作院以繕一路戎器河北方小治而二府諸公相繼以黨議罷去公慨然上書論之用事者益怒㑹公之外甥女張嫁公族人晟以失行繫獄言事者乘此欲并中公遂起詔獄窮治張貲産上使中官監劾之卒辨其誣猶降官知滁州神道碑富公之議誅亂兵也公時使河北復被命權知鎮州既力沮其議且曰脩至鎮州必不從命富公不得已遂止是時小人讒言已入而富公大閱河北之兵多所升黜譛者因曰富弼擅命專權自作威福已收却河北軍情於是京師禁軍亟亦大閱多所升擢而富公歸至國門不得入遂罷知鄆州向若遂擅殺二千人命禍何可測也然則公一言不特活二千人命亦免富公於大禍也遺事執政賈昌朝陳執中惡公欲因張氏事深治之令蘇安世鞠獄不成蘇云不如鍜錬就仍乞不錄問内官王昭明為監勘官正色曰上令某監勘正欲盡公道爾鍜錬何等語也公遂清脫魏公别錄公至和初判流内銓小人恐公且大用偽為公奏乞澄汰宦官宦官聞之果怒隂以事中公遂出公知同州而言者多謂公無罪上亦悟留刋修唐書俄入翰林為學士自滁州之貶至是十二年矣上臨御既久遍閱天下士羣臣未有大稱上意上思富韓之賢復召寘二府時慶厯舊人惟二公與公三人皆在朝廷士大夫知上有致治之意翕然相慶神道碑公在翰林仁宗一日乘間見御閤春帖子讀而愛之問左右曰歐陽修之辭也乃悉取宫中諸帖閱之見其篇篇有意歎曰舉筆不㤀規諌真侍從之臣也公在翰林日建言䜟緯之書淺俗誣怪悖經妨道凡諸書及傳疏所引請一切削去之以無誤後學仁宗命國子學官取諸經正義所引讖緯之說逐旋冩錄奏上時執政者不甚主之竟不行吕氏家塾記權知貢舉是時進士為文以詭異相髙號太學體文體大壞公患之所取率以詞義近古為貴比以險怪知名者黜去殆盡牓出怨議紛然久之乃服然文章自是變而復古知開封所代包孝肅以威嚴御下名震都邑公簡易循理不求赫赫之名有以包公之政厲公者公曰凡人材性不一用其所長事無不舉強其所短勢必不逮吾亦任吾所長耳聞者稱善並神道碑公嘗語人曰治民如治病彼富醫之至人家也僕馬鮮明進退有禮為人診脉按醫書述病證口辨如傾聽之可愛然病兒服藥云無效則不如貧醫貧醫無僕馬舉止生疎為人診脉不能應對病兒服藥云疾已愈矣則便是良醫凡治人者不問吏才能否設施何如但民稱便即是良吏故公為數郡不見治迹不求聲譽以寛簡不擾為意故所至民便既去民思如楊青南京皆大郡公至三五日間事已十减五六一兩月後官府如僧舍或問公為政寛簡而事不弛廢者何也曰以縱為寛以畧為簡則弛廢而民受其弊吾所謂寛者不為苛急耳所謂簡者不為繁碎耳識者以為知言遺事公為政以鎮静為本明不及察寛不至縱吏民安之墓誌仁宗既連失褒豫鄂三王遂更無皇子言者常以國本不可不急交章論述毎輙留中余嘗因大水言之然初無采納之意如此五六年嘉祐六年秋諌官司馬光知江州吕誨有疏論述仁宗遽曰朕有意多時矣但未得其人既而左右顧曰宗室中孰為可韓公對曰此事豈臣下敢議當出自聖擇上曰宫中嘗養二子小者甚純然近不慧大者可也遂啓曰其名謂何上即道今上舊名曰名某今二十嵗矣余等遂力賛之議乃定明日奏事因又啓之上曰决無疑也余等奏言事當有漸容臣等商量所除官既退遂議且判宗正時今上猶在濮王喪乃議起復上大喜曰如此甚好二公與余又奏曰此事若行不可中止乞陛下斷在不疑仍乞自内中批出上曰此事豈可令婦人知中書行可也命既出今上再三辭避至七年二月一日服除堅卧稱疾前後十餘讓余奏曰宗室自來不領職事今外人忽見不次擢用皆知將立為皇子不若正其名命立為皇子縁誥𠡠降付閤門某得以堅卧不受若立為皇子只煩陛下命學士作一詔書告報天下事即定矣不由某受不受也韓公力賛之遂降詔立為皇子仍更名某自議皇子事凡所奏請皆余與西㕔趙侍郎自書其改名劄子余所書也所擇日旁七字其最下一字乃今名也是上親㸃今封在中書今上一自在濮邸即有賢名及遷入内良賤不及三十口行李蕭然無異寒士有書數厨而巳中外聞者相賀公奏事錄自嘉祐以後朝廷務惜名器而進人之路稍狹公屢建言館閤育材之地材既難得而又難知則當博采而多蓄之則傑然出為名臣矣餘亦不失為佳士也遂詔二府各舉五人行狀孫侍郎長卿罷環慶路安撫拜集賢院學士為河東轉運使臺諫交章論列長卿守邉無狀宜加降黜中書以長卿嵗滿得代無過可黜而臺諌論奏不已六月十一日進呈上厲聲曰已行之事何可改臣脩奏曰臣等不為已行難改若朝廷果是除授不當能用臺諌之言改正足以上彰陛下從諌之聖臣等能不遂非而改過亦是好事但以長卿除授不為非當若從臺諌之言使彼御寃受屈於理未安然之奏事錄濮議初不出於公及臺諌有言公獨入辨於朝故議者指公為立議之人公不自辨唯曰今人以濮議為非使我獨當罪則韓曾二公宜有愧於我後世以濮議為是而獨稱我善則我宜愧於二公又撰濮議四巻悉記當時議論本末甚詳又於五代史記書晉元帝父敬儒周世宗父柴守禮事及李彦詢傳發明人倫父子之道尤為詳悉遺事公平生不甚留意禮經嘗與祖父說濮議事自云脩平生何嘗讀儀禮偶一日至子弟書院中几間有之因取讀見為人後者為其父齊衰杖期云云其言與脩意合由是破諸異議自謂得之多矣蘇氏談訓英宗之喪歐公於衰絰之下服紫地皂花緊絲袍以入臨劉庠奏乞貶責上遣使語歐陽公使易之歐陽公拜伏面謝温公日錄公長子發娶冲卿之女郎中薛良孺歐陽公之妻族也曩嵗坐舉官不當被劾遷延踰南郊赦赦原良孺由是怨之揚言於衆云公有帷簿之醜朝士以濮議故多疾公由是流布遂廣蔣之竒遂以此事劾之仍言某月日彭思永為臣言上以為無是事之竒伏地叩頭固請以其奏付密院於是公與冲卿皆上章自辨後數日復取其奏以入因謂執政曰言事者以閨門曖昧之事中傷大臣此風不可長乃命之竒思永分析皆無以對俱坐謫官仍敕榜朝堂先是之竒盛稱濮議之是以媚脩由是薦為御史既而反攻脩脩尋亦外遷故其謝上表曰未乾薦禰之墨已關射羿之弓日錄蔣之竒彈公英宗不聽之竒因拜伏地不起上顧左右問何故久不起之竒仰曰此所謂伏蒲矣上明日以語大臣京師傳以為笑龍川志公與魏公同在政府公長一嵗魏公諸事頗從之至議推尊濮王同朝但攻公故公遺令託魏公作墓誌欲令魏公承當此事耳馬永卿云嘗獨對奏曰近聞臺諌累奏臣專主濮議上荷陛下保全言者稍息上曰叅政性直不避衆怨毎見奏事時或二相有所異同便相折難其語更無囬避亦聞臺諌議事往往面折其短若是奏事時語可知人不喜也今後少戒此臣對曰臣以愚拙敢不如聖訓奏事錄知青州諸縣散青苖錢公乞令民止納本錢以示不為利罷提舉管勾官聽民以願請不報碑除判太原府公辭求知蔡州且曰時多喜新奇而臣思守拙衆方興功利而臣欲尋常執政知其終不附已俄詔以本官知蔡州行狀公在蔡屢乞致仕門下生蔡丞禧因間言曰公德望為朝廷倚重且未及引年豈容遽去公曰脩平生名節為後生描畫盡惟蚤退以全晚節豈可更俟驅逐乎倦逰錄公平生少有所好獨好收畜古文圖書集三代以來金石刻為一千巻以校正史傳百家訛謬之說為多在滁時自號醉翁晚年自號六一居士曰吾集古錄一千巻藏書一萬巻琴一張棊一局常置酒一壺吾老其間是為六一行狀自云學道三十年所得者平心無怨惡爾公初以范希文事得罪於吕相逺貶三峽流落累年吕公罷相公始被進擢後為范公作神道碑言西事時吕公擢用希文盛稱吕之賢能釋私憾而共力於國家希文子純仁大以為不然刻石則輙削去此一節云我父至死未嘗解仇公歎曰我亦得罪於吕相者唯其言公取信於後世也吾嘗聞范公平生自言無怨惡於一人兼其與吕公解仇書見在范集中豈有父自言無怨惡於人而其子不使解仇於地下父子之性相逺如此信乎堯朱善惡異也知潁州時吕公之子公著為通判為人有賢行時人未知公還朝力薦之由是漸見擢用遺事公於經術務究大本所發明簡易明白論詩曰察其羙刺知其善惡以為勸戒所謂聖人之志者本也因其失傳妄自為之說者經師之末也今學者得其本而通其末斯善矣得其本不通其末闕其所疑可也不求異於諸儒嘗曰先儒於經不能無失而所得者固多矣盡其說而理有不通然後得以論正予非好為異論也其於詩易多所發明為詩本義所改百餘篇其餘則曰毛鄭之說是矣復何云乎被召撰唐書又自撰五代史其為紀一用春秋法於唐禮樂志明前世禮樂之本出於一而後世禮樂為空名五行志不書事應盡破漢儒災異附㑹之說其論著類此五代史辭約而事備及正前史之失為尤多行狀修唐書最後置局專修紀志而已列傳則尚書宋祁修也朝廷以一書出於兩手體不能一遂詔公刋詳列傳令刪修為一體公雖受命退而歎曰宋公於我為前軰且人所見多不同豈可悉如已意於是一無所易及書成奏御吏白舊制修書只列書局中官髙者一人姓名云某等奉敕撰而公官髙當書公曰宋公於列傳用功深而為日久豈可揜其名而奪其功乎於是紀志書公姓名列傳書宋姓名此例皆前未有自公為始也宋公聞而喜曰自古文人不相讓而好相陵掩此事前所未聞也公修五代史記褒貶善惡其法甚精發論必以嗚呼曰此亂世之書也吾用春秋之法師其意不襲其文其論曰昔孔子作春秋因亂世而立治法余述本紀以治法而正亂君此其志也書减舊史之半而事迹比舊史添數倍議者以謂功不下司馬遷又謂筆力馳騁相上下而無駁雜說至於紀例精密則遷不及也亦嘗謂我作伶官傳豈下滑稽者也並遺事公於古文得之自然非學所至超然獨騖衆莫能及譬夫天地之妙造化萬物動者植者無細與大不見㾗迹自極其工墓誌公之於文天材有餘豐約中度雍容俯仰不大聲色而義理自勝短章大論施無不可有欲效之不詭則俗不淫則陋終不可及是以獨步當世公父鄭公嘗有遺訓戒慎用刑公母韓國夫人以語公公終身行之以謂漢法惟殺人者死今法多雜犯死罪故死罪非殺人者多所平反盖鄭公意也碑張舜民逰京求謁先達是時公與司馬公王荆公為學者所趨諸公之論於行義文史為多惟公與談吏事既久之不免有請大凡學者之見先生莫不以道德文章為欲聞者今先生多教人以吏事所未喻也公曰不然吾子皆時才異日臨事當自知之大抵文學止於潤身政事可以及物吾昔貶夷陵欲求史漢一觀公私無有也無以遣日因取陳年公案反覆觀之見其枉直乖錯不可勝數以無為有以枉為直違法徇情㓕親害義無所不有且以夷陵荒逺褊小尚如此天下固可知也當時仰天誓心曰自爾遇事不敢忽也迨今三十餘年出入中外忝塵三事以此自將今日以人望我必為翰墨致身以我自觀諒是當時一言之報也張芸叟集公嘗誦王沂公之言曰恩欲歸巳怨使誰當且曰貧賤常思富貴富貴必履危機此古人所以歎也惟不思而得既得而不患失之者其庶幾乎行狀公與其姪書云歐陽氏自江南歸明累世蒙官祿吾今又被榮顯致汝等並列官品當思報效偶此多事如有差使盡心向前不得避事至於臨難死節亦是汝榮事昨書中欲買朱砂來吾不闕此物汝於官下宜守㢘何得買官下物吾在官所除飲食外不曾買一物汝可觀此為戒也内翰蘇公題其後曰凡人勉強於外何所不至惟考之於其私乃見真偽此公與其弟姪家書也東坡集蘇内翰軾序公之文曰自漢以來道術不出於孔氏而亂天下者多矣晉以老莊敗梁以佛亡莫或正之五百餘年而後得韓愈學者以配孟氏盖庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以逹於孔氏其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯人終有愧於古士亦因陋守舊論卑而氣弱自歐陽氏一出天下争自濯磨以通經學古為髙以救時行道為賢以犯顔納諌為忠長育成就至嘉祐末號稱多士歐陽子之功為多歐陽文忠公答李詡論性書性非學者之所急而聖人之所罕言或因而及焉非為性而言也文忠雖有是說然大約慎所習與所感及率之者以孟荀楊之說皆為不悖此其大畧也臨岐計都官用章謂予曰性學者之所當先聖人之欲言吾知永叔貽後世之誚者其在此書矣麈史孟子一部書只是要正人心教人存心養性收其放心至論仁義禮智則以惻隱羞惡辭讓是非之心為之端論邪說之害則曰生於其心害於其政論事君則欲格君心之非正君而國定千變萬化只說從心上來人能正心則事無足為者矣大學之修身齊家治國平天下其本只是正心誠意而已心得其正然後知性之善孟子遇人便道性善永叔却言聖人之教人性非所先永叔論别是非利害文字上儘去得但於性分之内全無見處更說不行人性上不可添一物堯舜所以為萬世法亦只是率性而已所謂率性循天理是也外邉用計用數假饒立得功業只是人欲之私與聖賢作處天地懸隔龜山語錄宋名臣言行錄後集巻二
