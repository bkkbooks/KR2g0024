body:
  text: 宋名臣言行録别集上卷十三宋李幼武纂集李彥仙字少嚴本名孝忠其先寧州人後徙于鞏建炎初為陜州石濠尉二年三月以復陜功遷閣門贊舍就畀陜兼帥事遷寧州觀察使河解同耀制置使四年虜陷陜戰沒張俊承制贈彰武軍節度使建廟商州幼有大志喜談兵習騎射所歷山川形勢必識之尚氣謹然諾非豪俠不交金人南侵郡縣募勤王軍公散家資得三千人入援京師金圍太原李綱宣撫公上書切詆有司逮捕急乃易名棄官亡命頃之復從种師中軍師中敗死公走陜陜將李彌大問北事條對詳復及金人屠陜州經制使王􅊛度不能支引部曲去官吏逃逸公尉石濠獨如平時歸者襁屬即徙老稚入土花寨三觜石柱大通諸山拔武鋭者分主之自營三寨諭衆曰金實易與今得地利若輩堅守足矣翌日金復據陜分軍來攻有健酋升煎阜嫚罵公單騎衝擊挾以歸始料衆正部伍金數萬圍三觜公邀戰伏精兵後崦掩擊萬計奪馬三百金解去京洛間多爭附者勢益雄張未閲月破金五十餘壁初金再入陜官其土人俾招復業者人給符别之公陰縱麾下往約日內應引兵直州南城中火起金方備南壁而水軍自新店夜順流薄城東北蒙泉坡龍塘溝以入表裡夾攻僵尸相籍遂復陜河東人先倡義拒金公約胡夜義者為助假以沿河提舉意不滿叛趨南原公誘殺之奪五千衆邵隆邵雲本其黨欲為復仇公因客鐫説遂來歸乘勝渡河柵中條諸山蒲解至太原皆響應乃分遣隆雲等取安邑虞鄉芮城正平解皆下之蒲幾拔會援至不克悉裒所俘酋長護送行在上咨歎賜𫀆帶槍劍時關以東獨陜在益增陴疏塹搜軍繕鎧廣屯田訓農耕作家業素留鞏耴盡至官曰吾父母妻子同城存亡矣聞者感悅各有固心烏嚕薩巴圍城公鏖鬬七日敵傷甚跳奔羅索貝勒自綘移屯蒲解諜知之設伏於諸谷鼓譟俘馘十八羅索僅以身免制使王庶檄使輕軍椅角次虞鄉虞以萬甲逆石鍾谷口終日戰斬級二千時河東土豪密附期王師來應公益治軍欲請干朝乞詔陜西諸路各助步騎三萬會張浚經略川陜弗許婁宿衆十萬圍陜公夜使人隧地焚其攻具營部囂亂縱兵乘之敵稍退建炎四年正月益生兵博壘晝夜進攻鵝車天橋火車衝車業進公隨機拒敵又為金汁炮火藥所及糜爛無遺而圍不解曰慿堞須外援浚為遣軍敵先阻雍不得進則令涇原曲端出鄜坊繞敵後端素嫉公聲績逾已幸其敗詭計不行丁已城陷公扶親軍巷戰矢集身如蝟左臂中刃不殊戰逾力遂死之並其家遇害金先許以河南元帥及圍合復言如前約當退師公叱之曰吾寧鬼於宋安用汝富貴為金惜其才必欲降之城將破先令軍中生致者豫萬金公平時弊衣同士卒及是雜羣伍中死金不能察公為人面少和色有犯令雖親屬不貸諸將敗事或有他過其外屯者輒封箠遣帳下往皆祼就笞不敢出一詞時同華長安盡為敵藪陜斗絶一隅初無朝家素定約束中立孤軍日與敵角但誦忠義感動其下每拜君賜暨耴敵金資悉均之毛銖不入己以是精兵三萬大小三百餘戰皆樂為用邵雲者龍門人城破被執婁宿欲命以千户長肆詈不屈乃釘之木架上置解州東門外惡少撫其背涅文曰可鞘吾佩刀雲怒偃架仆之後五日磔解之至抉眼摘肝詈不絶喉斷乃已初行刑將剴刃雲叱之失刀而斃其忠勇如此趙立字原闕徐州張益村人政和中𨽻州之武衛軍後補本軍都虞候建炎三年以復徐州功授忠翊郎就𣙜州四年權楚州會分置諸鎮嘉其殊勳超轉徐州觀察使承楚州漣水軍鎮撫使兼知楚州金人圍楚州相守百餘日戰沒事聞輟朝一日特贈秦國軍節度使開府儀同三司立廟楚州政和中出戍江南值方臘亂從軍往來習知山川人情向背纍歷戰功聲名隱然王復守徐州公在帳下時金人已盡得河北兵勢彌熾所至官吏望風退避及圍徐州復率軍民力戰命公專往來守禦外援不至孤城益危公六中飛矢三中兵刃猶拔矢裹瘡灑血一戰復忠之自持巵酒揮淚以賞公尼瑪哈憤其城難拔大益攻具城破復堅坐聽事不肯逃遣人謂賊曰死守者我也監郡而次無預焉願殺我而捨僚吏與百姓猶喻復投降復不從罵賊求死盡室遂被害公巷戰奪門以出為敵所得夜殺守者入城潛求復尸慟哭掩藏公知敵乘勝貪得城中弛備鼓率殘兵邀擊於外斷其歸路盡焚營壘奪舟船金帛數千計擾擊紛散四出軍聲復振盡團鄉民為兵歃血相誓戮力平賊退者必斬公之叔扆後期而至公謂曰叔以我故亂法何以臨衆促命斬之威震諸軍一鼓破賊遁去追殺甚多遂推公為長公拊循其民召使復業又奏置王復廟城中遇出師及歲時必率衆泣禱曰公為朝廷守節以死必能陰祐遺民也齊人聞之歸心焉杜充守建康命公會兵楚州公提忠義山寨鄉兵數萬赴之時賊號托囉郎君圍楚州益急往來艱棘公斬剎道路行至淮陰遇賊且行且戰出沒賊中凡七破賊遂抵城下楚人被圍久聞公來歡迎鼓舞公時中箭鏃入舌下堅不可取命醫以鐵箝破齒鑿骨鈕去移時乃出流血盈襟左右毛髮皆聳而公色不變敵益兵不已用攻具數百攻州南門半月間登城者數十公率兵捍戰後分四門出城掩殺敵大敗解圍驅殘兵去渡淮六十里駐孫村浦公又敗之至五月烏珠自浙歸又屯于楚之九里徑欲斷公糧道公又大破之劉豫在東平遣公故人葛進等賫書誘公令供賦稅公大怒不撤封斬之已而又遣沂州舉人劉偲持旗榜招公具言金大兵將至必屠一城生聚公令拽出就戮偲大呼曰我非公故人乎願一言而死公曰吾知忠義為國豈恤故人耶速令纒以油布焚死市中且表其旗榜于朝由是公忠義之聲傾天下逺近嚮風下之金兵皆會孫村浦公念敵以衆抗孤軍非鏖戰不能成功提師襲之金大破公私謂僚屬曰金自山東濟師不已城中糧且盡則無以善後將先耴京東已失諸郡窒賊路及求糧旁邑則吾事濟矣水賊張榮乘亂鴟張公親往擒之併其糧食將經營京東行至寶應縣承州報虜復聚揚州公遂歸賊再傳城下公慨言曰賊終不捨去惟有竭節死守此州而已出北門濠外誓衆曰不進而退者必遭溺死我且併族爾家矣於是又大捷公每劫寨必殺獲不資或命偽於城頭張樂宴飲賊疑公在座公乃縋城潛入賊寨殺戮矣金併兵列大寨城下公擁六騎出呼曰我鎮撫也首領驍賊其來接戰南寨有二騎襲其背公手奮二槍賊俱墜地奪兩馬而還俄北寨中遣五十騎追公公瞋目大呼人馬俱辟易明日列三陳邀戰公以三隊應之金人鐵騎數百橫列其陳而圍之又中飛矢公奮身突出重圍持挺左右大呼賊落馬者無數敵大進攻具薄東門翌日填壕將進公率衆拒之忽報敵近城矣公笑曰將士不用相隨吾將觀其詭計且令此賊匹馬隻輪不返上城東門未半賊飛炮碎其首左右馳救之猶曰吾終不能與國滅賊矣令舉致二聖廟聲言疾病祈禱使賊不悟言絶而終公家屬先死於徐單騎入楚得女子習書者使讀軍中書記城陷遂沒公木強不知書天性忠義善騎射容貌甚壯不喜聲色財貨與士卒同甘苦每戰擐甲胃先登衆畏服樂為用視虜如仇每言及必嚙齒而怒常戒士卒惟以殺金人為言自金犯中國多以虛聲脅降大城如探囊取之惟冀州踰二年濮州城破巷戰殺傷略相當皆為金所畏而公威名戰多咸出其上是役也金鋭意深入會張浚出師關陜宗弼往援之及公以其軍蔽遮江淮故金亦困斃而止議者謂公之功雖張巡許逺不能過矣公自起小校至為將忠義之氣挺然鐵石其心雖手攬虎兕足蹈河海而不少變每剡奏必言賊行滅矣無憂願寬宵旰之慮方其被圍上命劉光世陳思恭會兵水陸並進督將帥渡江以援賊聞救至乘之益急使公無死將盡殄羣醜今其所立亦足以震耀一世雖未能酬其滅賊之心而氣亦伸矣公天挺英勇風節凜烈豈彭城從昔名將所出其山川氣俗性習所鍾然耶公死至城破天為沉陰晝䀲而褒贈隱恤照爛竹帛其心明著天與聖主知之矣智力雖躓於一時而名譽聳動萬世者也巡逺皆出卿相之族臨難行其所知易矣公起自行伍奮不謀身比之巡逺為尤難也魏勝忠壯公字彥威淮陽軍宿遷縣人為縣弓手紹興二十一年北取漣水又復海州就權州自兼都統制李寶遣子公佐至海州始以名聞尋授修武郎閣門祗候差知海州兼山東忠義軍都統制次年閏月轉武功大夫閣門贊舍兼鎮江府駐劄御前前軍統制餘仍舊隆興初三月與賈和仲議不合督府罷其職改差京東路馬步軍副總管都督府統制專訓練御前諸軍馬建康府駐劄督府尋辨其寃復舊職十月授忠州刺史二年八月知楚州餘官仍舊十一月金犯清河入淮力戰而死事聞詔贈寧國軍節度使立廟鎮江府江口賜號褒忠年四十五少有勇力多智略善騎射好義而疏於財一時流輩推伏里中豪亦稱之亮篡立有南侵意公慷慨奮發得義士三百餘人一旦北渡淮耴漣水軍宣上德意不殺一人州民翕然既定謀耴海州海州守高文多渤海國人也聞公至遣兵來捕公公追逐之逮夜直抵城下文多閉城拒守公令張旗城外山林間多舉火為疑兵遣人於諸城門説諭城中人城上人開門公即勇鋭登城門守禦餘皆自城門入莫有拒者獨文多與其子安仁率牙兵拒公公整軍入城市不易肆入與安仁父子戰於譙門內殺安仁擒文多民皆安業加故即日告諭諸縣揭示招募忠義士以圖恢復逺近聞之響應旬日得勝兵數千人金遣當堪珍果率山東軍馬萬餘人來攻取海州至州北二十里新橋公親率兵出城迎之公觀城外地形道路險隘處設伏而以衣甲全備者列陳以待之士皆效死用力鏖戰伏發金大敗走殺當堪珍果斬首虜千餘人生降三百人獲旗馬鼓甲無數軍聲益振山東民皆欲歸附公遣人持檄招諭益結集壯少保山寨時出擊虜以待王師之至共復中原蒼山有民生口數十萬強壯萬餘人為山寨金兵攻圍久寨首勝告急紹興三十一年八月十八日公往救之二十一日至山下陳金潛伏軍倍多公軍遇伏皆伏山寨金兵襲之公單騎在後與金戰用大刀奮揮擊之金望見公知其為將也以五百餘騎圍公數重公陷其間馳突四擊金陳開復合戰移時身被七十創冒白刃出重圍中金追之射公所乘馬仆公步而出無敢當者公至山寨金又攻之急絶其水公禱之神雨大作人得食水公攻日急又周山為營固守三日公料金且復攻海州乃伺便出山寨趨城中金果攻海州蒼山圍解二十八日犯新橋九月一日抵城下公出城迎敵皆捷初三日金分軍攻城四靣公以賞募士上城守禦矢石如雨者七日金死傷多遁去海陵踰淮慮公在海州睨其後乃分軍數萬攻之時李寶帥舟師往密州膠西破金舟至海州岸公邀之同擊金於新橋大捷公還州於北關子門為守計金逼關門公上門張樂飲酒犒軍固守勿出戰金攻城踰時方少遣士出門憑隘地擊之金知不可攻乃轉而渡河襲關後公知之即以兵入城金欲過砂堰圍城為營公先已於砂堰設備拒之又以單騎逐金於東門外大聲叱之金五百餘騎皆望風退公復追之十數里金大駭散公手殺十數人兵悉入城守禦金繞城為營翌早乘昏霧四面過壕攻益急公厲士捍拒矢石交飛金死傷多乃棄攻具拔寨走距海州為長垣包海州在中使不能出及亮敗解去方城守時城中器甲不備至紐鞋底為甲望金營炊煙起即出城驅之金不得食公善用大刀能左右射出以山東魏勝名姓揭之金望見每退走公起義時無州郡糧餉之給無府庫倉廪之儲經畫市易課酒𣙜鹽勸糶豪右未嘗乏事環海州度視虜軍攻耴地築城垣開濠塹塞關隘在軍未嘗一日怠常如冦至故能以崛起之衆守瀕海之地無戈甲之富而有禦敵之功公亦自謂當金人南侵時其腹心之地空虛若得數萬人復結北方忠義士共耴中原不難矣三十二年閏二月金犯海州公合李寶軍與戰大破之四月烏津太師合二十餘萬人復攻海州先遣一軍自西南來斷公餉道十一日至石闥堰公力拒之翌日金十萬來奪隘路公率兵死戰殺其先鋒數千人餘皆走公令勿追止守橋堰要路遣報招討李寶寶以防海道上船不復發兵金盛兵來戰公勵士奮力拒之金不能奪公還及城下民以寶既上船懼金大至皆欲入城統制郭蔚閉門不得入人民牛馬蔽野號呼震動城中軍民亦懼公入城諭以賊勢退怯固守可保無虞乃開門縱之入翌日入盡三路金兵皆至環城為營數重公與蔚分布諸兵上城守臥旗仆鼓肅然若無人賊疑數日不敢攻十七日植雲梯立炮座攻具悉備四面合圍矢石如雨負土填濠公令俟其近城然後鳴鼓張旗發矢石及城外無不中繼以火牛金汁凡三晝夜殺傷多敵竟不能近城二十日罷攻修營壘絶河道為固守計時出騎環城公亦伺其不備掩擊或獨出擾之使不得息五月初二金益增攻具攻城尤急公隨宜為捍禦之具亦備十四日罷攻公募士夜竊出告急李寶寶以上聞還報命張子蓋來十五日金有退意頃之子蓋先帥騎軍至公出城外與議戰又出軍城北抄卷大戰斬首不可計敵兵皆退公以意創如意戰車數百輛炮車弩車亦數十輛以備戰守車上為獸面木牌小槍十數條垂氈幕軟牌皆繪猛獸每車用二人推行可蔽五十人行則為陳可載輜重器甲不勞士卒止則為營挂搭即為城壘守關隘人馬不能近遇敵可以禦箭鏃臨敵列陳如意車在陳外以旗蔽映弩車當陳門其上置床子十石力弩箭大如鑿一箭能射數人一發三箭可數百步炮車在陳施火石炮亦二百步初兩陳相近間發弓弩箭炮次近陳門突出刀斧槍手交陳間出騎軍兩向掩擊得捷拔陳追襲小却則入陳間稍憩士卒不疲進退俱利伺便出擊臨時恐有拒遏亦預為解脫計常於夜習之勿令人見之也以其制上于朝從之令諸軍依其式而多造焉隆興二年詔海州撤戍以公知楚州令以所部軍馬赴新治仍專一措置清河口同淮東招撫使劉寶等措置盱眙楚州一帶時和議未堅金乘我之懈以舟載器甲糗糧自清河出欲犯邊公覘知之以州事屬通判而身率忠義軍專在清河拒遏十一月金詐言欲運糧往泗州由清河口入淮公知其謀欲拒之寶戒以方議和不許北向放一矢公以其命不敢動初四日虜果軼境至公於淮陰縣拒之自卯至申勝負未決虜增生兵來公力戰且告急於寶寶在楚州相距四十里金鼓之聲相聞寶堅謂方講和豈有攻戰終不發一兵戰終日始盡救不至公猶依土阜為陳謂士卒曰我當死於此得脫者歸報天子令步卒前行騎在後且戰且退至淮陰之東十八里店戰陳間中箭墜馬而死公在海州屢挫虜鋒虜方以重賞募獲公者以一兩金易公肉一兩故是役也公井心焉宋名臣言行録别集上卷十三
