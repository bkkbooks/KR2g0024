body:
  text: 宋名臣言行録傳記類三總録之屬提要臣等謹案宋名臣言行録前集十卷後集十四卷續集八卷别集二十六卷外集十七卷前集後集並朱子撰續集别集外集李幼武所補編幼武字士英廬陵人據其續集序文蓋理宗時所作其始末則未詳觀其外集所録皆道學宗派則亦講學家矣趙希辨讀書附志載此書七十二卷今合五集計之實七十五卷殆傳刻者誤以五為二歟朱子自序謂讀近代文集及紀傳之書多有禆於世教於是掇取其要聚為此書乃編中所録如趙普之陰險王安石之堅僻吕惠卿之姦詐與韓范諸人並列莫詳其㫖明楊以任序謂是書各臚其實亦春秋勸懲之㫖非必専以取法又解名臣之義以為名以藏僞有敗而不敗者其置詞頗巧然劉安世氣節凛然爭光日月盡言集元城語録今日尚傳當日不容不見乃不登一字則終非後人所能喻考吕祖謙東萊集有與汪尚書書曰近建寧刻一書名五朝名臣言行録案祖謙所見係前集故但稱五朝云是朱元晦所編其間當考訂處頗多近亦往問元晦未報不知曽過目否晦庵集中亦有與祖謙書曰名臣言行録一書亦當時草草為之其間自知尚多謬誤編次亦無法初不成文字因看得為訂正示及為幸云云則是書瑕瑜互見朱子原自不諱講學家一字一句尊若春秋恐轉非朱子之意矣又葉盛水東日記曰今印行宋名臣言行録前集後集續集别集外集有景定辛酉浚儀趙崇硂引云其外孫李幼武所輯且云朱子所編止八朝之前士英所編則南渡中興之後四朝諸名臣也今觀後集一卷有李綱二卷有吕頤浩三卷有張浚皆另在卷前不在目録中又缺殘脫板甚多頗疑其非朱子手筆為後人所增損必多蓋朱子纂輯本意非為廣聞見期有補於世教而深以虛浮怪誕之說為非今其間吕夷簡非正人而記翦髭賜藥之詳余襄公正人而有杖臀懷金之恥蘇子瞻蘇木私鹽等事亦無甚關繫若此者蓋不一也李居安所謂翦裁纂要是之謂歟嘗見章副使繪有此書巾箱小本又聞叔簡尚寶家有宋末廬陵鍾堯俞所編言行類編舉要十六卷前後集尚俟借觀以祛所惑云云則盛於此書亦頗有所疑顧就其所録觀之宋一代之嘉言懿行略具於斯旁資檢閲固亦無所不可矣幼武所補大扺一步一趨無甚出入其所去取不足以為重輕以原本附驥而行今亦姑並存之備考核焉乾隆四十四年正月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀宋名臣言行録前集原序豫讀近代文集及記事之書觀其所載國朝名臣言行之迹多有補於世教者然以其散出而無統也既莫究其始終表裏之㑹而又汨於虛浮怪誕之說豫常病之於是掇取其要聚為此書以便記覽尚恨書籍不備多所遺闕嗣有所得當續書之新安朱熹序
