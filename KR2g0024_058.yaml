body:
  text: 宋名臣言行錄别集下巻十三宋李幼武纂集胡銓忠簡公字邦衡吉州廬陵人建炎二年登進士第授撫州判官未上以退虜功轉承直權吉州僉丁父憂紹興五年張魏公辟湖北倉幹改湖南憲幹召赴都堂審察呂祉以賢良方正直言極諫科薦賜對便殿改通直郎樞密編修官上書乞斬檜除名編管昭州責監廣州鹽倉改威武軍僉十三年羅汝檝論之除名責新州守臣張棣告其訕上再責吉陽軍二十六年檜卒量移衡州三十一年自便壽皇即位首復官知饒州召至即日賜對除吏侍遷秘書少監又遷起居郎隆興元年兼侍講及國史院編修官兼權中書舎人兼同修國史除宗正少卿請外不允兼國子祭酒除兵侍二年除措置淮浙海道使提舉江州太平興國宮加集撰知漳州改泉州入見尋除在京宮觀兼侍講權工侍尋即真辭力乞老除寳文閣待制與外祠既出都門㫖復留改佑神觀兼侍讀辭不允㑹詔舉人以所舉非是論坐貶秩二等三求去從之除敷文閣直學士外祠以郊恩封開國子除龍圖學士提舉江州太平興國宮慶壽恩進開國伯除提舉隆興府玉隆萬壽宮進郡侯乞老不許除端明殿學士淳熈六年召辭力乞老不許引疾提舉太平興國宮力疾辭乃加資政殿學士致仕薨謚忠簡公為起居郎直前奏事云臣罪廢二十六年陛下登極首蒙召除曾未浹旬又擢左史上曰卿被罪許時可謂無辜朕自知卿與王十朋銓曰臣與十朋不同陛下濳邸之舊且其材可用上曰濳邸亦有不當用者如十朋非朕之私其人實可用也近日除臺諫官外議如何銓曰外人皷舞謂陛下得人上曰卿與十朋皆朕親擢也公又奏側聞道路之言近日臺諌論事陛下謂為賣直上曰此語非也朕近謂臺諫論事要當辨曲直朕在藩邸時見有臺諫論事不復辨曲直尋即報行每以為不然故近日與張闡説此語非賣直也然非卿不聞此言銓奏臣事君猶子事父知無不言若於君有隠則於父亦有隠也非忠孝也上曰卿言甚善公當對直前奏事上曰朕在藩邸時養得性定今或飲酒過度未嘗不悔銓奏外人皆知陛下無酒色之過然猶謹畏如此臣見聖德日增雖堯舜不及公知泉州日朝辭進對讀劄子至臣嘗恭聞聖訓有及於唯禮不可以已之之説如不欲平治天下則已欲平治天下捨禮何以哉上曰朕記得曾與卿説禮之用甚大於是詔胡銓可與在京宮觀兼侍講虞允文奏胡銓蚤嵗一節甚髙久謫海外誰為能及今縱有小小過失謂宜闊畧錄其氣節不宜令遽去朝廷上曰朕昨覽臺章躊躇兩日意甚念之但以四人同時論列不欲令銓獨留今卿所言正朕意也梁克家奏銓流落海上二十餘年人所甚難上曰銓固非他人比宜且除在京宮觀留侍經筵公上髙宗和議封事謹按王倫本一狎邪小人市井無賴頃縁宰相無識遂舉以使敵専務詐誕欺罔天聽驟得美官天下之人切齒唾罵今者無故誘致敵使以詔諭江南為名是欲臣妾我也是欲劉豫我也劉豫臣事敵國南面稱王自以為子孫帝王萬世不抜之業一旦豺狼改慮捽而縛之父子為虜商鑒不逺而倫欲陛下效之夫天下者祖宗之天下也陛下所居之位祖宗之位也奈何以祖宗之天下為金人之天下以祖宗之位為金人藩臣之位陛下一屈膝則祖宗廟社之靈盡汚草莽祖宗數百年之赤子盡為左祍朝廷宰執盡為陪臣天下士大夫皆當裂冠毁冕變為異服異時逞其無厭之求安知不加我以無禮如劉豫也哉夫三尺童子至無知也指讐仇而使之拜則拂然怒今敵國則讐仇也堂堂天朝相率而拜讐仇曽童孺之所羞而陛下忍為之邪倫之議乃曰我一屈膝則梓宮可還太后可復淵聖可歸中原可得嗚呼自變故以來主和議者誰不以此説㗖陛下哉而卒無一驗是虜之情偽已可知矣陛下尚不覺悟竭民膏血而不恤㤀國大讐而不報含垢忍耻舉天下而臣之甘心焉就令虜決可和盡如倫議天下後世謂陛下何如主也况敵國變詐百出而倫又以姦邪濟之則梓宮決不可還太后決不可復淵聖決不可歸中原決不可得而此膝一屈不可復伸國勢陵夷不可復振可爲痛哭流涕長太息者矣向者陛下間闗海道危如累卵當時尚不肯北面臣人况今國勢稍張諸將盡鋭士卒思奮只如頃者敵國陸梁偽豫入冦固嘗敗之於襄陽敗之於淮上敗之於渦口敗之於淮隂較之前日蹈海之危已萬萬不侔倘不得已而至於用兵則我豈遽出敵人下哉今無故而反臣之欲屈萬乘之尊下穹廬之拜三軍之士不戰而氣已索此魯仲連所以義不帝秦非惜夫帝秦之虚名惜夫天下大勢有所不可也今内而百官外而軍民萬口一談皆欲食倫之肉謗議洶洶陛下不聞正恐一旦變作禍且不測臣竊謂不斬王倫國之存亡未可知也雖然倫不足道也秦檜以腹心大臣而亦為之陛下有堯舜之資檜不能致陛下如唐虞而欲導陛下為石晉近者禮部侍郎曽開等引古誼以折之檜乃厲聲責曰侍郎知故事我獨不知則檜之遂非狠愎已自可見而乃建白令臺諫侍臣僉議可否是葢畏天下議已而令臺諌侍臣共分謗爾有識之士皆以為朝廷無人吁可惜哉孔子曰微管仲吾其被髪左衽矣夫管仲伯者之佐耳尚能變左衽之區而為衣裳之㑹秦檜大國之相也反驅衣冠之俗而歸左衽之鄉則檜也不唯陛下之罪人實管仲之罪人矣孫近傅㑹檜議遂得參政天下望治有如飢渇而近伴食中書謾不敢可否事檜曰虜可和近曰可和檜曰天子當拜近亦曰當拜臣嘗至政事堂三發問而近不答但曰已令臺諌侍從議之矣嗚呼參贊大政徒取充位如此有如敵騎長驅尚能折衝禦侮邪臣切謂秦檜孫近並可斬也臣備員樞屬義不與檜等共戴天區區之心願斷三人頭竿之藳街然後羈留敵使責以無禮徐興問罪之師則三軍之士不戰而氣自倍不然臣有赴東海而死寧能處小朝廷求活耶公之上書也都人喧騰數日不定上語檜曰朕本無黄屋心今横議若此據朕本心惟應養母耳於是檜等乃擬昭州編管時公妾孕臨月遂寓湖上僧舎欲少遲行而臨安已遣人械送貶所范如圭方疇同見晏敦復為公求援敦復即往見守臣張澄曰銓論宰相天下共知祖宗朝言事官被謫開封府必不如是澄愧謝曰即追還矣公之行也監登聞皷院陳剛中以啓送之曰屈膝請和知廟堂禦侮之無策張膽論事喜樞庭謀逺之有人身為南海之行名若泰山之重又曰知無不言願借上方之劒不遇故去聊乘下澤之車檜大恨之亦貶安逺令死焉公為福州判官諌議羅汝楫論其文過飾非用惑羣聽除名編置新州公往新州其鄉人王廷珪者棄官養志㡬二十年至是以詩送公有云痴兒不了官中事男子要為天下竒又云百辟動容觀奏牘㡬人囬首愧朝班邑大夫歐陽識使人訐之除名編𨽻辰州公徙吉陽軍先是檜於一德格天閣下書趙鼎李光胡銓三人姓名公時猶在新州廣帥王鈇問知新州張棣曰胡銓何故未過海銓賦詞云欲駕巾車歸去有豺狼當轍棣即奏公不自省循語言不遜公然怨望朝廷於是送海南編管命下棣選使臣游崇部送封小項筒過海公徒步赴貶所人皆憐之至雷州守臣王趯廉得崇以私茗自隨械送獄且厚餉公是時諸道望風捃摭流人以為竒貨惟趯能與流人調䕶海上無薪粲百物趯輒津置之其後卒以此得罪隆興元年公為起居郎孝宗曰近日除臺官外議如何公曰外人皷舞謂陛下得人上曰卿與十朋皆朕親擢也公奏臣承乏左右史竊見史職廢壊者非一其尢甚者有四一曰史不當進二曰立非其地三曰前殿不立四曰奏不直前何謂史不當進太宗欲觀史褚遂良以為不可文宗欲觀史魏謩以為不可國朝進起居注自梁周翰李宗諤始歐陽修為起居注首論其失云自古不自閲史今撰述既成必錄本進呈則事有諱避史官雖欲書而不敢乞自今更不進本仁宗從之厥後佞臣執筆乃復進史㳂習至今何謂立非其地唐制皇帝御殿則左右史夾香案而立善惡必書許敬宗李義府用事懼為史官所記遂廢左右侍立之職凡謀議不與聞文宗復正觀故事每入問命左右史執筆立於螭頭之下由是宰相奏事得以備錄國朝故事天子坐朝則記注官立於御座之後歐陽修謂起居當視人君言色舉動而書若立於後則無以進見乃徙立於御座之前至修罷修注者乃復立於後後乃立於殿之東南隅言動未嘗或聞不過録諸司供報公文而已何謂前殿不立自古左右史未嘗不侍於天子之側亦未嘗有前後殿之分唐制但左右分立於殿下螭頭之側和墨濡翰皆就螭頭之㘭處不聞後殿立螭而前殿不立也國朝舊制前後殿皆侍立夫人主之言不獨後殿有之而前殿無也宰制奏事百官進對之言不獨後殿有之而前殿無也今獨後殿侍立而前殿不與義果安在夫後殿侍立雖非其地然亦愛禮存羊之意前殿不立是餼羊亦去矣何謂奏不直前文宗謂魏謩曰事有不當母嫌論奏謩曰臣頃為諌官故得有所陳今則記言動不敢侵官帝曰兩省屬皆可議朝廷事故國朝左右史皆許直前奏事雖以奏史事為名而朝廷事亦得議焉皇祐中唐介論文彥博帝怒時蔡襄修起居注直前論救又曷嘗預牒閣門與必俟班次耶公奏曰陛下憂災避殿減饍蝗虫滅息天理去人不逺上曰朕逐日禱天蝗虫遂滅安可不至誠公奏曰陛下行之不息豈特滅蝗虜亦不足慮公因旱蝗星變求言請勿徼福佛老躬行周宣政事罰監司守令之貪殘者因論納諌曰今廷臣以箝默為賢容悦為忠道途相傳近日臺諫論事朝廷謂為賣直此德宗猜忌之語願陛下以德宗為戒詔議講和公議曰昨來京都失守本於大臣耿南仲主和二聖刼遷本於宰相何㮚主和維揚失守本於宰相汪伯彥黄潛善主和完顏亮之變本於秦檜主和自汴京板蕩以來金人薦食上國何嘗不以和哉今欲與不共戴天之讐講信修睦三綱五常掃地盡矣就令可信不叛盟孝子順孫寧忍為之况萬萬無此理乎議者乃曰姑與之和而隂為之備此向來權臣誤國之言陛下聞之熟矣公為兵部侍郎時以水災詔求言公言與金講和可痛哭者十養兵之外又增嵗幣民力益困一也唐鄧海泗之人一旦與之是置之死地二也海泗今日之藩籬失則兩淮不可保大江不可守三也絶中原之望四也竭民膏血以予敵民愁盜起五也秦檜力排不主和議之士九十餘人或死瀕海或死謫籍今日和議成則不附時議者或䧟前日之過六也紹興戊午和議既成路允迪等往交割歸地敵叛盟刼執允迪等遂詔親征敵復請和反覆如此檜不悟卒有逆亮之變七也敵必復如前日盡索歸正人與之則反側生變不與則敵不肯但已八也秦檜當國二十年至今府庫無旬月之儲自此復和殆有甚焉九也李沆嘗謂王旦云切勿與敵講和夫祖宗盛時猶以和議為不可况今國勢委靡而復唱和議使上下解體溺於鴆毒十也願陛下堅守和不可成之論力行其志則敵國何足慮哉天變水災亦當銷縮矣公因轉對為中國與敵和可弔者十臣恐再拜不已必至稱臣稱臣不已必至請降請降不已必至納土納土不已必至輿櫬輿櫬不已必至如晉帝青衣行酒而後為快倘乾剛獨斷追回使者絶請和之議以皷戰士下哀痛之詔以收民心天下庶乎其可為矣如此則請數千億之嵗幣専意武備足兵足食無書名之恥無去大之辱無再拜之屈去十弔而就十賀利害較然矣詩云毋用婦人之言今日舉朝之士皆婦人也湯思退與王之望堅主和議罷張浚兵柄公爭之力於是大臣皆不悦遂命公以本職措置浙西淮東海道命下即趨行時金冦深入號八十萬淮東郡邑皆望風退避髙郵守陳敏拒之射陽湖而大將李寳駐師江隂不肯援敏公檄寳出師寳先取密詔為自安計公劾奏曰臣受詔令范榮備淮李寳備江今寳逗遛視敏弗救若射陽失守大事去矣寳懼與敏犄角退敵兵時大雪河凍公親持鐵鎚斸氷士皆奮初公與尹穡同出使穡使浙東置家臨安公使江淮葢受敵之地携孥北行言者併指為罪與穡俱罷公知泉州趣令入對遂留侍經筵尋除工部侍郎公遂請飭太子賓僚朝夕勸講上曰三代長且久者由輔道太子得人所致末世國祚不永皆由輔導不得其人楊誠齋萬里題公書稾曰澹菴先生借上方劒以斬帝秦之書當其一封朝奏之時敵國聞之募本千金三日得之君臣動色發國有人焉之歎自是不敢南顧者二十有四年某昔誦其文今見其稾纔尺紙耳盈尺之紙乃能却百萬之師一何壯哉募本尚千金况真稿乎又序公文集曰公中興人物未能或之雙也紹興戊午和戎公上書乞斬宰相在廷大驚金聞之募本千金三日得之君臣奪氣知中國有人奉皇太后以歸自是邊馬不南者二十餘年昔魯仲連不肯帝秦秦軍聞之為却五十里後人疑之以為説士之夸辭以今揆古古為夸以今觀今今亦夸乎信所見疑所聞古今一也吾宋之安强不以百萬師而以先生之一書後之人聞之者烏知不若今之人聞仲連之事者乎亦以為夸未可知也若今之人親見先生之事則誰以為夸者今事之夸與否可信與否不較也使後之人無所疑於古之人者先生歟今不信古古奚病焉後不信今必當有時而無不信矣逢其事思其人嗚呼先生之功其逺矣哉先生之文肖其為人其議論閎以挺其記序古以馴其代言典而嚴其書事約而悉其為詩葢自觝斥時宰誕寘嶺海愁狖酸骨飢蛟血牙風呻雨喟濤譎波詭有非世間人之所堪耐者宜芥於心而反昌其詩視李杜夜郎䕫子之音益加恢竒云至於騷辭涵茫嶄窣鉥劌刻屈抉天之幽洩神之庾槁癯而不瘁恫愀而不懟自宋玉而下不論也靈均以來一人而已或言公在新州十七八年不死晦菴曰天生天殺道之理也人如何解死得人宋名臣言行録别集下巻十三
