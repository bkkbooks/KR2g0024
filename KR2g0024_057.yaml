body:
  text: 宋名臣言行録别集下卷十二宋李幼武纂集劉子羽字彥修忠顯公長子以門䕃入仕宣和末忠顯辟為浙東機宜為大府簿遷衛尉丞忠顯帥真定復辟之尋除直祕閣丁吉除祕撰知池州改集撰知秦州未行除御管使司參贊張忠獻入蜀辟為參議紹興四年除徽州制拜利路經略使兼知興元除寶文閣直學士尋責散官安置白州忠獻入相召除集撰知鄂州權都督府參議軍事以朝廷欲用之顧親年浸高力請歸養以徽猷待制知泉州忠獻罷言者論之復責散官安置漳州㑹江上擇守起為㳂江帥知鎮江秦檜忌之復以祠祿歸十一年十二月卒於家年五十纍贈太師公慷慨自許每有捐身狥國之願衆人惶撓失措公色逾厲氣逾徑遇事立斷凛不可犯尤長於兵料敵決機殆無遺算得將士心皆願為盡死為政發姦謫伏如神所治不畏强禦而天性孝友接人樂易開口見肺肝輕財重義振人乏絶傾資倒廪無吝色許國之誠至沒而不懈也自敵入梁洋蜀大震劒南諸州皆為徙治之計留屯中梁山踰月始自斜谷去興元公與吳玠謀以兵邀之於武休關不及薩里罕遣十五輩賫書與旗來招公及玠公斬其十四人令一人還曰為我言於爾酋來戰即來我有死耳何可招也玠亦遺薩里罕書以大義責之金糧匱死傷者十五六遂遁去公以兵掩擊及墮溪谷死者不可勝計其餘衆不能自拔降者凡十數柵金之喪失莫甚於此張忠獻富平之敗金乘勝而前宣撫司退保蜀口官屬震恐有建議當保夔州者公曰議者可斬也四川全盛金欲入冦久矣直以川口有鐵山棧道之險未敢遽窺耳吾乃東走僻處䕫峽遂與關中血脉不相通進退失計悔將何及為今日計且當留駐興州外係關中之望內安全蜀之心急遣官屬出關呼召諸將收集散亡分布險隘堅壁固壘觀釁而動庶幾猶或可備奈何為此言乎張公然之而諸參佐無敢行者公即自請奉命北出復以單騎至秦州分遣腹心召諸亡將諸將聞命大喜悉以其衆來㑹公命驍將吳玠柵和尚原守大散關而分兵悉守諸險寨金知我有備引去公謂敵用騎兵利在衝突我當先柵要地以徑弓弩待之蔑不濟者且以約二將彥頗易公之說是嵗十二月敵犯金州正月至上津彥出不意逆戰不能却遂退石泉公遣將馳告玠玠驚曰事迫矣當亟徼於險諸將不能辦我當自行不然是負劉待制即越境馳一日夜凡三百里中道少止公移書曰金旦夕至饒風嶺下不亟守此是無蜀也公不前某當往玠即復馳至饒風敵急攻數日死傷如積更募死士由間道犯祖溪關以入出玠後玠還漢中公與玠謀守定軍山玠憚之遂西公退守三泉從兵不及三百與士卒同粗糲至取草木芽蘗食之遺玠書與決玠得書泣其愛將楊政大呼軍門曰節使不可負劉待制不然政輩亦舍節使去玠乃由間道與公㑹於三泉敵游騎甚迫玠夜視公方酣寢旁無警呵者玠曰此何時而簡易乃爾公慨然曰吾死命也夫何言玠泣下復往守仙人關公獨留為壁壘於潭毒山上十六日而成又數日而虜至中夜斥候將遣人報曰虜至矣諸將皆失色入白事公曰始與公等云何今冦至欲避耶下令蓐食遲明上馬先止戰地地据山角坐胡牀諸將奔至皆泣曰此某等駐軍處而公先之耶豈可使虜矢傷公即爭代公處頃之復有來報曰虜退矣乃還薩里罕烏珠輩時方埀涎於蜀日夜聚謀所選士卒千取百百取十其戰被重鎧登山攻險每一人前輒二人擁其後前者死後者復被其甲以進又死則又代之如初其為必取計蓋如此惟公與張公協心戮力毅然以身當兵衝將士視公感激爭奮卒全蜀境公還興元分遣官屬安集勞來自是兵勢日振方更恢逺略然張公益困於讒公亦繼被罪矣始吳玠為裨將未知名公獨竒之言於張公張公與語大悅使盡護諸將公徙白州玠上疏納節贖公罪士大夫以是多玠之義而服公之知人公在鎮江㑹金復渝盟公建議清野盡徙淮東之人於京口撫以威信兵民雜居無敢相侵擾者既而敵騎久不至樞使張浚視師江上以問公公曰金人異時入冦飄忽如風雨今更遲回是必有他意居頃之金果復以和為請而使者乃植大旗舟上書曰江南撫諭公見之怒夜以他旗易之翌日接伴使者見其有異大懼請之不得至以語脅公公曰吾為守臣朝論無所與然欲揭此於吾州之境則吾有死而已請不已竟出境乃還之張浚還朝上聞公治狀及所料敵情亟詔復舊職公以和好本非久逺計宜及閒暇時修城壘厲器械備舟楫以俟時變公守泉州進論時宜劄子八事論江北戰守二策曰臣竊論今日國家大計莫先戰守二策因險為守則守易固因守為戰則戰必克自古倚長江之險者屯兵據要雖在江南而挫敵取勝多在江北今日淮甸雖置守帥而無堅壁無聚糧或營一閧之市或聚烏合之徒敵人一至則氷散瓦解千里蕩然長江之險舟楫之利固與敵共之虛聲所搖人情騷動此由江北藩衛之不立也臣欲乞將淮甸郡縣不必盡守故城各隨所在擇險據要營置寨柵守以偏將敵來仰攻固非其利若欲長驅深入則我綴其後一二大將浮江上下為之聲援則大勳可圖也論襄陽形勢曰臣聞善奕棋者不爭邊角之利善立國者必强腹心之勢今日國家暫保江左形勢之地若緩而甚急者荆襄是已荆襄西通秦蜀東連吳㑹北據漢沔昔人以為用武之地故三國戰爭皆出於此得之者强失之者弱自喪亂以來莽為盜區國家多事經理未遑亦幸敵人棄而不顧殆天以資我也今千里丘墟固難卒守臣謂宜將荆襄合為一路增重帥權暫治公安益兵聚糧為戰守計分遣别將渡江據險置柵募民耕種積以嵗月更為後圖一者貫通秦蜀無斷絶之虞二者控扼上流如首尾相應三者窺闞中原有席卷之勢是一舉而獲三利也今不早圖萬一敵人先之則主客不侔利害易轍復欲爭之固已難矣論禁衛曰臣竊惟藝祖削平僭亂聚天下精兵以强京師取大原兵以為龍衛取幽州兵以為神武左右員僚本藩鎮㕔頭也左射拱聖本諸州騎兵也忠節之軍升自川陜虎翼之軍選自江淮凡此之類不可悉舉皆總於三衙訓練精間故能坐置四方如臂運指自南渡以來禁旅凋耗徑兵驍騎分𨽻諸將㳂江戍守蓋救紛解急枝梧目前未暇長顧逺慮也昔周瑜拒魏而吳王提重兵以為後援鍾㑹伐蜀而文帝率師十萬屯長安二王豈不知指撓目顧端拱仰成哉蓋尾大不掉末大必折其所防者深也今三衙兵雖稍收集而寡弱未振欲望陛下逺鑒吳魏居重馭輕之術近法藝祖以中制外之權選徒搜卒益增禁衛仍擇腹心忠亮之臣分為統帥則威聲所憺非獨折衝禦侮亦所以强本固基為社稷長久之計論守江曰臣竊見六朝之守國也皆輕戍江北重戍江南因險而守因守而戰內强根本外固邊陲敵來則出驍將合鋭兵先事而逆擊未便則清野鄙據要害伺間而後動故北兵遷延乏絶畏首畏尾往往狼狽亡遁大約皆此謀也昔陶侃不城邾其說謂設險禦冦政以長江隔江而城非三萬人不守引敵致冦實此之由若虜有可乘之㑹又非所資侃非失形勢也緩小利以全大利也蔡謨諌止諸鎮北移其說謂時有否泰道有屈伸須養威待時虜若送死敵之有餘棄江逺進亦我所短謨非畏怯也知用其所長也何承天論守邊之計謂斥候之交非耕牧之地曹孫相持江淮之間所居各數百里宜堅壁繕兵以待敵來承天非泥古也事有可法也侃之練事謨之見逺承天之燭機審利害於當時埀龜鑑於後世願陛下詔帷幄之臣稽六朝重戍之謀考三子慎守之策固本保邊隂消戎詐庶幾不動聲色疆場妥安我既出於上策者矣論舟船曰長江之險雖本天設實由人用拒敵之方不特防隄岸塞險隘而已維檣艦據津流則其險十倍飛棹楫冒風濤則其險百倍東南立國戰守之利無出於此伏見巡省已來暫駐吳㑹雖有守江之名而無用險之實船艦率皆草創水軍不甚練習且海船入江則顛沛不行步兵乘水則惴栗失措官司奉行措置姑欲事畢而巳陳利害者以為常談習游泳者以為末技未思臨機對敵何以取勝故向來邀羯虜於長江攻羣盜於平湖戰多不捷職此之由竊考六朝舟楫之制名字雖不同要之大艦利於控扼若五牙蒙衝之類是也小舟利於走集若金翅油船之類是也大艦有飛樓有拍竿有長櫓屯兵走馬可容西北徑兵以當衝要小舟欲輕扶追逐須擇吳越水工輕剽善沒者負船鑿艦出入湍流見之若神敵人所以魂驚膽墮也昔李氏水軍敏鋭周人莫當孫權浮江萬艘魏人畏遁用我之長乘彼之短此制敵之上策也論南兵曰伏覩朝廷向來數調諸路禁兵㳂邊戍守多即逃亡議者乃謂南人脆弱終不堪用只緣撥屬諸將南北人情不通非禮役使橫加箠辱衆情憤憤遂皆潰散因知逃亡非其本心况南人素號剽悍春秋吳楚之伯六朝晉宋之捷不聞資兵於他境取材於異代今猶古也豈獨不可用哉特用之不得其術耳目今諸將之兵雖足戰守無仰於此然國家養兵額衆費大不應艱難之際使之坐食比年以來訓練亦精士氣思奮臣愚欲望將諸路禁兵自逺及近更畨出戍别立統帥不𨽻他營分屯險隘不當虜衝連營締壘張大形勢使之耳聞目覩漸熟征戰秋出春歸不戀鄉土嵗月積久習以為常緩急調發人情不震可以集事論吳蜀曰國家自南渡以來保有吳蜀而羯胡侵擾殆無寧嵗往年數窺梁洋故江左稍安比年頻犯江淮故蜀無重敵犬羊之衆棄其所長梯岩險冒濤江蹈必死必亡之地而我未能收其功者蓋彼無畏首畏尾之虞而得全用其力也昔三國鼎峙吳蜀為異邦然當時所以謀困曹魏者常萬里剋期表裏相應况今二方一統力不應分竊見金房荆襄境壤相接乃西南之交吳蜀之㑹也若虜迫近江淮陜蜀之兵當稍循金房而南若窺全蜀則上流之兵當稍循荆襄而北批抗搗虛互為聲援以分虜勢庶幾狂狡之謀不敢輕動動而乘之萬全之舉也論募兵曰竊見金人叛盟數窺淮甸諸將驅攘奮擊雖獲渠魁殱軍衆捷音繼道然鏖兵酣戰殺傷殆相當臣聞自昔戰爭之時裒兵益衆固非一塗或取之內郡如蕭何發關中卒以補兵闕漢威復振是也或取之盜賊如諸葛恪取丹陽徑民深加慰撫籍為甲士是也或取之逃亡無賴如馬隆募洛陽勇士無問從來立標簡試自成一軍也宋名臣言行録别集下卷十二
