body:
  text: 宋名臣言行錄後集巻五宋朱子纂集唐介質肅公字子方荆南人舉進士事仁宗英宗神宗官至參政張堯佐者以進士擢第累官至員外郎知開州㑹其姪女有寵於仁宗遂驟遷一日中除宣徽節度景靈羣牧使介上疏引楊國忠為戒又與諌官包拯吳奎等七人論列殿上卒奪堯佐宣徽景靈兩使特加介六品服以旌敢言未幾堯佐復除宣徽使知河陽公又獨爭之不能奪仁宗諭曰除擬初出中書公遂極言宰相文彦博知益州日以燈籠錦媚貴妃而致相位今又以宣徽使結堯佐請逐彦博而相富弼又言吳奎觀望挾姦語甚切直仁宗怒却其奏不視且言將貶竄介徐讀畢曰臣忠義憤激雖鼎鑊不避上急召二府以疏示之曰介言他事乃可至謂彦博因貴妃得政此何言也介面質彦博曰彦博宜自省即有之不可隠彦博拜謝不已樞副梁適叱介下殿介諍愈切仁宗大怒玉音甚厲衆恐禍出不測是時蔡襄修起居注立殿陛即進曰介誠狂直然納諌容言人主之美徳必望全貸遂召當制舍人就殿廬草制貶秦州别駕翊日改英州别駕復取其奏以入又明日罷彦博出吴奎而遣中使䕶送介至貶所且戒以必全之無令道死名臣傳仁宗一日幸張貴妃閣見定州紅甆器帝怪問曰安得此物妃以王拱辰所獻為對帝怒曰嘗戒汝勿通臣僚饋遺不聴何也因以所持柱斧碎之妃愧謝乆之乃已妃又嘗侍宴於端門服所謂燈籠錦者上亦怪問妃曰彦博以陛下眷妾故有此獻上終不樂或云潞公夫人遺妃公不知也聞見錄又晁以道云介貶嶺南將行遣中使賜介金又畫其像於便殿潭州巨賈私藏蚌胎為關吏所搜太守而下輕其估悉自售焉公時以言事謫潭倅分珠獄發奏方入仁宗謂近侍曰唐介必不肯買案具奏覆覽之果然湘山野錄改知復州未至召充言事御史帝曰知卿被謫以来未嘗以私書至京師可謂不易所守公頓首謝退就職言事無避如前墓誌出知揚州徙江東轉運使御史吳中復請還公言路時潞公再當國亦言介頃為御史所言亦中臣病而責大重願如中復言召之劉忠肅撰神道碑至和後仁宗臨朝淵黙公言君臣如天地以交泰為治願時延訪羣下發徳音可否政事以幸天下又言賞罰不可以貴賤輕重如孫沔吕溱侈縱宜深責必行則衆信矣論宫禁干丐恩澤其命不由中書此古所謂斜封非盛朝所宜有請裁放後宫冗數罷祈禳之不經者又言士節弗立願委大臣進敦厚忠朴之士稍抑聚歛文法吏以消刻薄浮競之風墓誌治平元年召為侍御史中丞英宗面諭曰卿在先朝有直聲今出自朕選非由左右言也公言先帝在位四十餘年天下安樂惟仁治而已願恢聖度廣恩徳則為善繼四海䝉福矣公雖居外意未嘗不在朝廷於是濮議起言者多得罪公憂形于色宻疏請還臺諌之謫者拜參政公自以進由直道感慨知遇益致所以事君之義純誠盡公多所獻替用人明言其才否不立恩不避怨與同列論政事反覆再三未嘗阿屈于祖宗法有所更近臣有所進退尤極其慎雖在帝前必究切辨析要是非之歸未嘗反顧帝于是益敬信之而天下翕然想望其風采神道碑王荆公與公同為參政議論未嘗少合荆公好馮道以其能屈身安人如諸佛菩薩之行一日於上前語及此事介曰道為相易四姓事十主此得為純臣乎荆公曰伊尹五就湯五就桀者志在安人而已豈可亦謂之非純臣也公曰有伊尹之志則可荆公為之變色筆錄公語諸子曰吾備位政府知無不言桃李固未嘗為汝等栽培而荆棘則甚多矣然汝等窮達莫不有命惟自勉而已野錄熙寧初富公弼曾公公亮為相公與趙公抃王荆公安石為參政是時荆公方得君鋭意新美天下之政自宰執同列無一人議論稍合而臺諌章疏攻擊者無虛日吕誨范純仁錢顗程顥之論尤極詆訾天下之人皆目為生事是時鄭公以病足魯公以年老引去公屢爭于上前不能勝未幾疽背死趙少師力不勝但終日歎息遇一事更改即聲苦者數十故當時謂中書有生老病死苦言介甫生明仲老彦國病子方死閲道苦也筆錄介為人簡伉以敢言見憚每言事官缺衆皆以介直處之神宗以其有直名故卒大用然居政府遭時有為少所建明聲名減於諌官御史時孫參政抃為御史中丞薦公與吳中復為御史人或問曰聞君未嘗與二人相識而遽薦之何也孫答曰昔人恥呈身御史今豈求識面臺官也後二人皆以風力稱于天下孫晚年執政嘗嘆曰吾何功以輔政唯薦二臺官為無媿耳筆錄趙抃清獻公字閲道衢州人舉進士事仁宗英宗神宗官至參政公為武安軍推官有偽造印者吏皆以為當死公獨曰造在赦前而用在赦後赦前不用赦後不造法皆不死遂以疑讞之卒免死一府皆服蘇内翰撰神道碑以母越國夫人喪廬于墓三年不宿于家縣榜其所居里為孝悌處士孫處為作孝子傳為殿中侍御史彈劾不避權幸京師號公鐵面御史其言常欲朝廷别白君子小人謂小人雖小過當力排而絶之後乃無患君子不幸而有詿誤當保持愛惜以成其徳故言事雖切而不厭先是吕溱出守徐蔡襄守泉吳奎守夀韓絳守河陽已而歐陽修乞蔡賈黯乞荆南公即上言近日正人賢士紛紛引去憂國之士為之寒心侍從之賢如修者無幾今皆欲請郡者以正色立朝不能諂事權要傷之者衆耳修等由此不去一時名臣賴以復安知睦州睦嵗為杭市羊公移文却之民籍有茶税而無茶地公奏蠲之民至今稱焉陳升之除樞副公與唐介等同言升之交結宦官進不以道章二十餘上不省即居家待罪詔強起之乃乞補外賈昌朝以使相判大名府公欲按視府庫昌朝遣其屬來告曰前此監司未有按視吾事者公雖欲舉職恐事有不應例奈何公曰舍大名則郡不服矣即往視之昌朝初不悦也前此有詔募義勇過期不足者徒二年州郡不時辦官吏當坐者八百餘人公被㫖督其事奏言河朔嵗豐熟故募不如數請寛其罪以俟農隙從之坐者得免而募亦隨足昌朝乃愧服曰名不虛得矣為參政㑹王安石用事議論不協既而司馬光辭樞副臺諌侍從多以言事求去公言朝廷事有輕重體有小大財利於事為輕而民心得失為重青苖使者於體為小而禁近耳目之臣用舍為大今不罷財利而輕失民心不罷青苗使者而輕棄禁近耳目去重而取輕失大而得小非宗廟社稷之福臣恐天下自此不安矣言入即求去並神道碑荆公初參政下視廟堂如無人一日爭新法怒目諸公曰公輩坐不讀書耳公同參政事獨折之曰君言失矣如臯夔稷契之時何書可讀荆公黙然邵氏後錄成都以戍卒為憂朝廷選擇遣大臣為蜀所愛信者皆莫如公遂以大學士知成都然意公必辭及見上曰近嵗無自政府復往者卿能為朕行乎公曰陛下有言即法也顧豈有例哉上大喜神道碑公初任成都攜一龜一鶴以行其再往也屏去龜鶴止一蒼頭執事張公裕學士送以詩云馬諳舊路行來滑龜放長河不共來吕氏家塾記徙青州因其俗朴厚臨以清淨時山東旱蝗自淄齊来及境遇風退飛墮水而盡吳越大饑民死者過半公盡所以救荒之術發廪勸分而以家貲先之生者得食病者得藥死者得藏下令修城使民食其力故越人雖飢而不怨神道碑趙南豐集有越州救災議熙寧中以大資知越州兩浙旱蝗米價踊貴死者十五六諸州皆榜衢路禁増米價閲道獨榜衢路令有米者任増價糶之于是諸州米商輻集詣越米價更賤民無饑者記聞韓忠獻之守安陽人將鬭訟輙自止曰吾非畏汝愧見侍中耳郡幾無事趙清獻再守杭天下劇郡清獻從容為之其政本於孝悌然不嚴而肅民不敢犯議者謂二公治民雖西京所稱循吏不能過也家塾記公平生日所為事夜必衣冠露香拜手以告于天不可告者則不敢為也聞見錄吕誨字獻可正惠公之孫登進士第事仁宗英宗神宗官至御史中丞公幼孤自力為學家於洛陽性沉厚不妄交遊洛陽士人往往不之識温公撰墓誌治平元年孫覺過余言曰聞臺官以數言事不用相謂言小事不足決去就當共爭濮王事不聴則決去葢是時知雜御史吕誨吕大防范純仁等與諌官司馬光數論孫固庸回王廣淵姦邪不當用其言愈切而用之愈堅事如此類者甚衆凡臺諌官言入輙以進呈訖寢之時人謂之訖了范純仁言臺吏亦為之沮赧每白御史曰某事又訖了也葢執政方恃權欲一切以阻言者而言者以不能塞職為愧且憤故相約如此覺語余時正月初五六間也後數日果聞臺官論濮王事甚急至上元後誨等疏已七八上不聴遂皆納𠡠告求罷去家居不復供職而執政方宻啟令禁中自定議尊濮王為皇是月二十間天章閣賞小桃因以勸太后太后有酒所卧閣中内臣髙居簡蘇利涉從上至太后榻前拜以書一封進太后求一押字太后酒未解不知書所言何事遂從之既而書出乃太后命中書尊濮王為皇等事明日遂奉行太后始知京師諠然下至閭巷亦以為不可太后力爭不已二十二日乃下詔罷濮王稱皇等事范純仁等欲起供職公曰稱親猶為吾徒言不用也遂以前後所上九疏乞付中書求去而誨等遂皆絀矣葢自至和以後仁宗在位乆熟知人情偽與羣臣才性之善惡故雖委事大臣而聴用臺諌官廣開言路使耳目無壅蔽大臣有不法者輙去之故任事者雖専亦不能自肆治平初英宗即位多不豫任事益専始欲快意因用王疇為樞副知制誥錢公輔封還詞頭遂黜公輔為滁州團練使知制誥祖無擇亦封還詞頭又罰無擇銅三十斤而制遂行是時臺諌官言事一切不聴或盡逐臺諌不留一人京師為之語曰絶市無臺官其弊至此然人主猶采物論朝廷正人未盡去公議有所屬言事者斥逐相望而後來者其言愈厲至濮議執政議稱王為考是也遂欲稱王為伯陋矣葢兩言者各率其私意而不知考據於載籍皆不學之過故各有得失然爭論至於紛紜連年洶洶者葢由言路不通故如此皆執政自用好勝激之使然也南豐雜識公以追尊濮園事擊歐公如曰首開邪議妄引經證以枉道悦人主以近利負先帝者凡十四章具載奏議中司馬文正作序乃首載歐公諌臣論以為誠言文正之意以獻可能盡歐公所書諌臣之事使歐公無得以怨歟抑以歐公但能言之獻可實能行之也不然獻可排歐公為邪反以歐公之論序獻可之奏又以為誠言可乎歐公晚著濮議一書専與獻可辨獨歸過獻可為甚矣邵氏後錄權御史中丞時有侍臣棄官家居者王安石朝野稱其材天子引參大政衆皆喜於得人獻可獨以為不然居無何棄衆任已厭常為竒多變祖宗法専汲汲歛民財所愛信引拔時或非其人天下大失望獻可屢爭不能得乃抗章悉條其過失且曰誤天下蒼生必此人如乆居廟堂必無安靜之理上遣使諭解執之愈堅乃罷中丞出知鄧州墓誌介甫初參政神考勵精求治一日紫宸早朝二府奏事頗乆日刻既晏例隔登對官於後殿須上更衣復坐以次贊引時公任御史中丞將對于崇政殿而司馬公為翰林學士侍講邇英閣亦將趍資善堂以俟宣召相遇於路並行而北温公宻問曰今日請對欲言何事獻可舉手曰袖中彈文乃新參也温公慊然曰以介甫之文學行義命下之日衆皆喜于得人奈何論之獻可正色曰君實亦為此言邪安石雖有時名上意所向然好執偏見不通物情輕信難回喜人佞已聴其言則美施于用則疎若在侍從猶或可容置諸宰輔則天下必受其弊矣温公曰與公素為心交茍有所懐不敢不盡今日之論未見不善之迹似傷匆遽或别有章疏願先進呈姑留是事更加籌慮可乎獻可曰上新嗣位富于春秋朝夕所與謀議者二三執政而已茍非其人將敗國事此乃腹心之疾治之惟恐不及顧可緩邪語未竟閣門吏抗聲追班乃趨而去温公退自經筵黙坐玉堂終日思之不得其説既而搢紳間寖有傳其章疏者往往竊議其太過未幾變更祖宗法専務聚歛百姓騷然然後前日之議者始愧仰歎服以為不可及而公終縁兹事出知鄧州温公退居洛陽每論當世人物必曰吕獻可之先見范景仁之勇決皆予所不及心誠服之劉諌議集神宗天資節儉因得老宫人言祖宗時妃嬪公主月俸甚㣲嘆其不可及安石獨曰陛下果能理財雖以天下自奉可也帝始有意主青苗助役之法矣安石之術類如此故吕誨彈章有曰外示朴野中懐狡詐聞見錄獻可病自草章乞致仕曰臣無宿疾偶值醫者用術乖方殊不知脈候有虛實隂陽有逆順診察有標本治療有先後妄投湯劑率任情意差之指下禍延四肢非秪憚􅏓盭之苦又將虞心腹之變葢以一身之疾喻朝政之病也温公康節日就卧内問疾獻可所言皆天下國家之事憂憤不能忘未嘗一語及其私也一日手書托温公以墓誌温公亟省之已瞑目矣温公呼之曰更有以見屬乎獻可復張目曰天下事尚可為君實勉之温公誌其墓未成河南監牧使劉航仲通自請書石既見其文遲迴莫敢書其子安世曰成吾父之美可乎代書之仲通又隂囑獻可諸子勿摹本恐非三家之福時小人蔡天申厚賂鐫工得本以獻安石安石得之掛壁間謂其門下士曰君實之文西漢之文也獻可忍死謂温公以天下事尚可為當自愛後温公相天下再致元祐之盛獻可不及見矣天下誦其言而悲之至温公薨獻可之子由庚作輓詩云地下若逢中執法為言今日再昇平記其先人之言也彭思永字季長吉州人中進士第事仁宗英宗神宗官至權御史中丞公為侍御史極論内降授官資之弊以謂斜封非公朝之事仁宗深然之皇祐祀明堂前一日有傳赦語百官皆得遷秩者公方從駕宿景靈宫亟上言不宜濫恩以益僥倖既肆赦果然時張堯佐以妃族進王守忠以親侍帷幄被寵參政缺員堯佐朝暮待命守忠亦求為節度使公抗疏極言至曰陛下行此覃恩無意孤寒獨為堯佐守忠故取悦衆人耳且言妃族秉政内臣用事皆非國家之福疏入仁宗震怒諌官吴奎等為上言其忠上怒解為荆湖北轉運使至部奏罷守令之殘暴疲懦者各一人而八州知勸時大農以利誘諸路使以羡餘為獻公曰裒民取賞吾不忍為遂無所獻權御史中丞時追崇濮國大號復有稱親之議諌官相繼論列者六七人皆以罪去公力陳其不可且請召還言事者上未之察更為疏極論其事英宗深加聴納事幾施行而大臣持之甚力故不果並明道先生撰行狀又伊川先生集代彭中丞奏云濮王生陛下而仁宗以陛下為嗣承祖宗大統則仁廟陛下之皇考陛下仁廟之嫡子濮王陛下所生之父於屬為伯陛下濮王出繼之子於屬為姪此天地大義生人大倫如乾坤定位不可得而變易也固非人意所能推移茍亂大倫人理滅矣陛下仁廟之子則曰父曰考曰親乃仁廟也若更稱濮王為親是有二親臣以為當以濮王之子襲爵奉祀尊稱濮王為濮國太王凡百禮數必皆稱情借如既置嗣襲必伸祭告當曰姪嗣皇帝名敢昭告于皇伯父濮國太王自然在濮王極尊崇之道於仁皇無嫌貳之失矣御史蔣之竒奏發大臣隂事欲援公為助乃曰公嘗言之公亦謂帷簿之私非外人所知誠難究詰然亦有以取之故謗言一興而人以為信且其首為濮園議違典禮以犯衆怒不宜更在政府執政以之竒所論𡨕昧不可質迫公言其所從來三問而公奏益急且曰風聞者以廣聰明也今必問其所從來因而罪之則後無聞矣寧甘重謫不敢廢國家開言路之法因極陳大臣朋黨専恣非國家計翌日降授給事中知黄州行狀公年八九嵗時從尚書出官岳州晨起將就學舍得金釵於門外黙坐其處以伺訪者有一吏徘徊乆之問故果墜釵者也公詰其狀驗之信即出付之吏謝以數百金公笑不受曰我若欲之取釵不過於數百金邪吏歎駭而去始就舉時貧無餘貲惟持金釧數隻棲于旅舍同舉者過之衆請出釧為翫客有墜其一于袖間者公視之不言衆莫知也皆驚求之公曰數止此耳非有失也將去袖釧者揖而舉手釧墜于地衆服公之量嘗曰牢籠之事吾所不為每謂人曰吾不為他學但幼即學平心以待物耳又嘗教其子弟曰吾數嵗時冬處被中則知思天下之寒者矣范鎮蜀郡忠文公字景仁成都人中進士第事仁宗英宗神宗官至内翰公少舉進士善文賦塲屋師之補國子監生及貢院奏名皆第一故事殿廷唱第過三人則為奏名之首者必抗聲自陳以祈恩雖考校在下天子必擢置上列以吳春卿歐陽永叔之耿介猶不免從衆景仁獨不然左右與並立者屢趣之使自陳景仁不應至七十九人始唱名及之景仁出拜退就列訖無一言衆皆服其安恬自是始以自陳為恥舊風遂絶司馬公作傳召試學士院詩用采霓字學士以沈約郊居賦雌霓連婘讀霓為入聲謂景仁為失韻由是除館閣校勘殊不知約賦但取聲律便美非霓不可讀為平聲也當時有學者皆為憤鬱而公處之晏然不辨上疏論民力困弊請約祖宗以來官吏兵數酌取其中以為定制以今賦入之數十之七為經費而儲其三以備水旱非常又言古者冡宰制國用唐以宰相兼鹽鐵轉運或判户部度支今中書主民樞宻主兵三司主財各不相知故財已匱而樞宻益兵無窮民已困而三司取財不已請使中書樞宻通知兵民財利大計與三司同制國用蘇内翰撰墓誌葬温成皇后太常議禮前謂之園後謂之陵宰相劉沆前為監䕶使後為園陵使公言嘗聞法吏舞法矣未聞禮官舞禮也請詰問前後議異同狀又請罷焚瘞錦綉珠玉以紓國用從之文富入相百官郊迎時兩制不得詣宰相居第百官不得間見公言隆之以虛禮不若開之以至誠乞罷郊迎而除謁禁以通天下之情仁宗即位三十五年未有繼嗣嘉祐初得疾中外危恐公獨奮曰天下事尚有大於此者乎即上疏曰太祖舍其子而立太宗此天下之大公也周王既薨真宗取宗室子養之禁中此天下之大慮也願陛下擇宗室賢者異其禮物而試之政事以係天下心章累上不報因闔門請罪㑹有星變其占為急兵公言國本未立若變起倉卒禍不可以前料兵孰急于此者乎今陛下得臣疏不以留中而付中書是欲使大臣奉行也臣兩至中書大臣設辭以拒臣是陛下欲為宗廟社稷計而大臣不欲也臣竊原其意特恐行之而陛下中變爾夫中變之禍死而無愧急兵之憂死且有罪願以此示大臣使自擇而審處焉聞者為之股慄除兼侍御史知雜事公以言不從固辭不受凡見上面陳者三公泣上亦泣曰朕知卿忠卿言是也當更俟二三年章凡十九上待罪百餘日鬚髪為白朝廷不能奪乃罷知諌院改集賢殿修撰判流内銓修起居注除知制誥公雖罷言職而無嵗不言儲貳事以上春秋髙每因事及之冀以感動上心及為知制誥正謝上殿面論之曰陛下許臣今復三年矣願早定大計明年又因祫享獻賦以諷其後韓琦卒定䇿立英宗英宗即位中書請追尊濮王下兩制議以為宜稱皇伯公時判太常寺率禮官上言漢宣帝于昭帝為孫光武於平帝為祖則其父容可以稱皇考然議者猶非之謂其以小宗而合大宗之統也今陛下既考仁宗又考濮王則其失非特宣光之比矣凡稱帝若皇考立寢廟論昭穆皆非是於是具列儀禮及漢儒論議魏明帝詔為五篇奏之安石始變更法令改常平為青苗法公上疏曰常平之法始於漢之盛時視穀貴賤發歛以便農末最為近古不可改而青苗行於唐之衰亂不足法且陛下疾富民之多取而少取之此正百步與五十步之間耳今有一人坐市賈一人下其直以相傾奪則人皆知惡之其可以朝廷而行市道之所惡乎疏三上不報邇英閣進讀與吕惠卿爭論上前因論舊法預買紬絹亦青苗之比公曰預買亦敝法也若陛下躬節儉府庫有餘當并預買去之奈何更以為比乎後上言臣言不行無顔復立於朝請致仕疏五上最後指言安石以喜怒為賞罰且曰陛下有納諌之資大臣進拒諌之計陛下有愛民之性大臣用殘民之術安石大怒自草制極口詆公落翰林學士以本官致仕聞者皆為公懼公上表謝其畧曰雖曰乞身而去敢忘憂國之心又曰望陛下集羣議為耳目以除壅蔽之姦任老成為腹心以養和平之福天下聞而壯之安石雖詆之深人更以為榮公得謝蘇軾往賀之曰公雖退而名益重矣公愀然曰君子言聴計從消患于未萌使天下隂受其賜無智名勇功吾獨不得為此命也夫使天下受其害而吾享其名吾何心哉軾慙而退韓維上言公在仁宗朝首開建儲之議其後大臣繼有論奏先帝追錄其言存沒皆推恩而鎮未嘗以語人人亦莫敢為言者雖顔子不伐善介之推不言禄不能過也悉以公十九疏上之拜端明殿學士元祐初首以詔起公曰西伯善養二老來歸漢室卑詞四臣入侍為我強起無或憚勤天下望公與温公同升矣公辭曰六十三而求去葢以引年七十九而復來豈云中禮卒不起先是蔡京見公曰上將起公矣公正色曰鎮以論新法不合得罪一旦先帝棄天下其可因以為利乎故公卒不為元祐二聖一起初仁宗命李照改定大樂下王朴樂三律皇祐中又使胡瑗等攷正公與司馬光皆上疏論律尺之法又與光往復論難凡數萬言自以為獨得於心元豐三年神宗詔公與劉凡定樂公曰定樂當先正律上曰然公作律尺龠合升斗豆區鬴斛欲圖上之又訪求真黍以定黄鍾而劉凡即用李照樂加用四清聲而奏樂成詔罷局既致仕請大府銅造樂逾年乃成比李照樂下一律有竒二聖御延和殿召執政同觀賜詔嘉奬以樂下太常公作東齋記事曰君實子莫逆之交也惟議樂為不合往在館閣時決於同舍同舍不能決遂奕棊以決之君實不勝乃定其後二十年君實在西京為留䑓予往候之不持他書惟持所撰樂論八篇示之爭論者數夕莫能決又投壺以決之予不勝君實懽曰大樂還魂矣凡半月卒不得要領而歸豈所見然耶將戲謔耶抑遂其所執不欲改之邪俱不得而知也是必戲謔矣公學本於六經仁義口不道佛老申韓之説其文清麗簡逺學者以為師法凡五入翰林四知貢舉凡朝廷有大述作有大議論未嘗不與契丹髙麗皆知誦公文賦少時嘗賦長嘯却胡騎及奉使契丹羣相目曰此長嘯公也墓誌東坡云景仁平生不好佛晚年清慎減節嗜慾一物不芥蔕於心却是學佛作家然至死不取佛法李廌談記公論性曰豈有生為此死又却為彼儘似見得後却云自有鬼神又却迷也程氏遺書客有問迂叟以今世之勇者叟曰有范景仁其勇人莫之敵客曰景仁長五尺循循如不勝衣奚其勇叟曰何哉而所謂勇者而以瞋目裂眥髪上指冠力拽九牛氣陵三軍者為勇乎是匹夫之勇爾勇於外者也若景仁勇於内者也自唐宣宗以來不欲聞人言立嗣萬一有言之者輙切齒疾之與悖叛無異而景仁獨倡言之十餘章不已視身與宗族如鴻毛後人見景仁無恙而繼為之者則有矣然景仁冒不測之淵無勇能之乎人之情孰不畏天子與執政親愛之隆者孰若父子執政欲尊天子之父而景仁引古義以爭之無勇能之乎禄與位皆人所貪或老且病前無可冀猶戀戀不忍舍況景仁身已通顯有聲望視公相無跬步之逺以言不行年六十三即拂衣歸終身不復起無勇者能之乎温公作傳熙寧元豐間士大夫論天下賢者必曰君實景仁其道徳風流足以師表當世其議論可否足以榮辱天下二公葢相得懽甚皆自以為莫及曰吾與子生同志死當同傳而天下之人亦無敢優劣之者二公既約更相為傳而後死者則誌其墓故君實為景仁傳其略則曰吕獻可之先見景仁之勇決皆予所不及也葢二公用舍大節皆不謀而同如仁宗時論立皇嗣英宗時論濮王稱號神宗時論新法其言若出一人相先後如左右手故君實嘗謂人曰吾與景仁兄弟也但姓不同耳然至於論鐘律則反復相非終身不能相一君子是以知二公非茍同者墓誌宋名臣言行錄後集巻五
