body:
  text: 宋名臣言行録别集下巻五宋李幼武纂集宗澤忠簡公字汝霖婺州人元祐六年登進士第累遷朝奉郎靖康元年知磁州加祕譔虜䧟京詔為兵馬副元帥康王即位加徽猷待制知襄陽府又知青州李綱薦為東京留守加延康殿學士加資正殿學士建炎二年七月除門下侍郎兼御營副使東京留守命未下而訃聞詔贈觀文殿學士進六官年七十斡里雅布犯慶源府趨大名由李固渡濟河康王搆奉淵聖詔使其軍議和王雲副之王既出城雲曰京城樓櫓天下所無然真定城髙此㡬倍金人使雲等坐觀一時辰破之此雖樓櫓如畫亦不足恃也王不答公初為宗正少卿嘗論列宰相非其人宣撫副使提兵不進并劾雲張皇賊勢仍乞邢洺磁相趙五州各養精兵二萬冦至一郡則四部相應上善之雲至京上以章示之雲憾公王至磁公以守臣迎謁雲因責公曰公前日見劾何也公曰如公固不足劾大抵張皇敵勢者天下所共疾何獨我哉公説王曰兵皆在山村急則召至殊不費糧磁人遮王馬諌母北去從臣皆勸王囬相州㑹京師使人齎蠟詔命王為兵馬大元帥公副之速領兵入衞王捧詔嗚咽軍民感動王發相州渡河至大名公部二千兵至請進師直趨開德解京城之圍汪伯彥等執講和之説請王移軍東平王遂東去公請自領兵至東平許之公進屯開德揚聲大元帥在軍中壬申王已約諸路兵合而東平去京師差逺與幕屬議進屯濟州癸未公帥兵至韋城與金大戰敗之王奏除公徽猷閣待制時使臣曹勛自河北竄歸進道君皇帝御札曰便可即真来救父母王慟哭拜受於是濟之父老請王即位於濟公言且開府於南京乃祖宗受命之地取四方中運漕尤易公先在磁州屢乞㑹兵奪李固渡以斷賊路衆議不可公乃自遣其將秦光弼張徳領兵趨渡至安城縣敵騎千餘人過北城二將出西門夾擊之敵潰斬首數百級併獲其齎糧㑹帥府移文約赴大名遂還師先諸軍至康王大悦公乞進兵援京師伯彥等以公為狂譎不情公亦詆伯彥等為失䇿公曰金人狡計百端豈可深信當速進兵直詣都城苐言兵民欲見君父既兩國通和可亟退師如敵有詭謀即援兵已到無能為也伯彥等執和議不可破公遂自請兵王許之澤自朝廷狥金意遣曹輔往河北迎康王何㮚請上於輔衣屑礬書詔以傳密㫖輔言不見王而還金人又促再遣張澂以蠟封詔行澂至開德語諸將未可進兵公怒命將士射之澂與同行金人俱遁公約諸帥㑹兵五旬無一人至者公奮願擊敵引諸將議之陳淬曰敵方熾未可輕舉公怒將斬之諸將羅拜乞貸淬効死乃命淬當先以贖過遂進兵未十里與金遇出金不意敗之於長垣澤既敗金遂得韋城縣金欲夜襲澤澤知之日暮移軍南華賊果至得空壁大驚自是不復出澤在軍中與士卒同甘苦故人樂為用澤為書與諸道勤王帥勸督兵入援趙楙范訥皆以為狂言不答澤自南華遣兵過大溝河襲金又敗之時四方勤王之師只留近甸惟澤力戰澤得金所掠人謀引兵渡河據金歸路而對壘諸寨一夕解去澤號慟即自臨濮引兵趨滑州抵大名而勤王之兵無一人至者又知張邦昌僭位擬先行誅討乃將所部復還屯衞南復貽書遺康王言今日國之存亡在大王行之得其道耳所謂道者有五一曰近剛正而逺柔邪二曰納諫諍而拒謟諛三曰尚恭儉而抑驕奢四曰體憂勤而忘逸樂五曰進公實而退私偽澤謂所親曰怨結王之左右矣不恤也公聞濳善等復倡和議上䟽言河之東北陜之蒲解此祖宗基命之地奈何輕聽姦邪附賊張皇之言遂自分裂是欲蹈東晉既遷之覆轍列王者一統之緒為偏霸耳臣雖駑怯當躬冐矢石為諸將先上壯之公至南都見李綱與之語國事公慷慨流涕時開封尹闕綱為薦公上許之公至京時盜賊縱横公下令曰為盜者贓無輕重並從軍法由是盜賊屏息人情粗安有金使牛太監等八人以使偽楚為名直至京師公時即白留守械係之且以聞於朝有詔迎太廟神主赴行在仍命公移所拘金使於别館公上奏曰臣不意陛下復聽奸臣之語浸漸望和為退走計營繕金陵奉元祐太后仍遣官奉迎神主棄河東河北淮南陜右七路生靈如糞壤草芥畧不顧惜又令遷金使别館優加待遇不知二三大臣於賊人情欵何其厚而於國家訏謨何其薄也臣必不敢奉詔詔答曰卿彈壓强梗保䕶京城深所倚仗但拘留金使未達朕心公猶不奉詔又請上囘鑾詔賜公襲衣金帶汪黄等皆忌公欲罷之中丞許景衡言得宗澤方能保東京有東京行在始安枕上悟封所上章示公公賴以安公累表請上還京公募義士守京城且造決勝戰車千餘乘用五十有五人運車者十有一執器械輔車者四十有四周旋曲折可以應用又據形勝立三十四壁於城外駐兵數萬公往来按試之周而復始㳂大河鱗次為壘結連兩河山水寨及陜西義士開五丈河以通西北商旅京畿瀕河七十二里命十六縣分守之縣皆開濠深廣丈餘於其南植鹿角又團結班直諸軍及民兵之可用者乃上表畧曰今金人尚熾羣盜繼興比聞逺近之驚傳已有東南之巡幸此誠王室安危之所係天下治亂之所闗恐增四海之疑心謂置兩河於度外因成解體未諭聖懐不報公遂抗䟽極言京師祖宗二百年基業陛下奈何欲棄之以遺海陬一狂虜每䟽奏上以付中書省汪黄皆笑以為狂張慤獨曰如澤之忠義若得數人天下定矣二人語塞金分三道入冦一犯滑州公聞之曰滑衝要必爭之地失之則京城危矣欲自往救之張撝請行公大喜即以鋭卒五千授之撝至滑與金迎敵衆且十倍諸將請少避其鋒撝曰退而偷生何面目見宗元帥公遣王宣以五千騎往援未至撝再戰死之後二日宣至滑與金大戰金夜濟河復邀擊之殺傷甚衆公即命宣知滑州金以宣善戰不敢犯其境乃遣兵自鄭州抵白沙距京纔數十里都人甚恐公方與客對奕僚屬請議守禦之䇿公不應諸將退布部伍徹吊橋披甲乘城都人益懼公聞之命解甲歸寨曰何事張皇時公先遣劉衍劉逵各將車二百乘戰士二萬人在鄭滑間又選精鋭數千助之下令張燈如平時民始安堵公又遣部將李景良閻中立郭俊民領兵萬餘趨滑鄭與金大戰為金所乘中立死之俊民降金景良以無功遁去公捕得謂曰勝負兵家之常不勝而歸罪猶可恕私自逃遁是無主將也即斬之既而俊民與金將史姓者及燕人何祖仲直抵八角鎮都巡丁進與之遇生獲之金令俊民持書招公公謂俊民曰汝失利就死尚為忠義鬼今乃為金游説何面目見人耶捽而斬之謂史姓曰上屯重兵近甸我留守也有死而已何不以死戰我而反以兒女語脇我耶又斬之謂祖仲本吾家人脇從而來豈出得已解縛而縱之諸將皆服有王䇿者本遼舊將善用兵金以千餘騎付之往来河上公遣王師正擒之釋縳解衣坐之堂上為言契丹本我宋兄弟之國汝何不悟義協討䇿感泣誓死以報公時引䇿與語䇿具言金之虚實公又益喜大舉之計遂決公遣判官范延世奉表請上還京且曰京師乃太祖太宗一統之本根願以祖宗二百年基業為意早賜囘鑾則天下皆知一人来歸盜賊屏息讎敵寢謀臣若誤國一子三孫甘被顯戮此乃公第十三表也上答詔諭以旦夕北歸之意公復上表謝公招撫河南羣盜聚城下又募四方義士合百餘萬糧支半嵗又聞兩河州縣金兵不過數百餘皆脇使易服日夜望王師之来即召諸將約日渡河諸將皆掩泣聽命乃累䟽請上還京且請修龍德寳籙宮以備奉迎二帝上遣中使賫詔茶藥撫諭公初去磁以州事付兵馬鈴轄李侃將校郭進作亂統制官趙世隆與進殺侃至是與其弟世興將三千人来歸將士頗疑之世隆入拜公面詰之世隆辭服公笑曰河北䧟沒而吾宋法令上下之分亦䧟沒耶命引出斬之時衆兵露刃於庭世興佩刀侍側左右皆懼公徐語世興曰汝兄犯法當誅汝能奮志立功足以雪恥世興感泣㑹滑州報金屯城下公謂世興曰試為我取滑州世興忻然受命至滑州掩敵不備急攻之斬首數百得州以歸公復厚賜之時契丹九州人日歸中國者公選契丹漢兒引坐側推誠與語諭以期奮忠義即給資糧遣之且賜以公憑候官軍渡河以為信驗人持數百本去又為榜文散示䧟沒州縣及為公據付中國被虜在北之人因驛䟽以聞公遂結連諸路義兵燕趙豪傑嘗謂人曰事可舉矣故請上還京尤力公聞王彥聚兵太行山即以彥制置兩河彥所部勇士數萬面刺八字誓殺金賊不負趙王號八字軍彥方繕甲兵約日趨太原公亦與諸將議六月起師且結諸路山水寨民兵約日進發上䟽言之䟽入濳善忌公成功從中沮之公歎曰吾志不得伸矣因憂鬱成疾公憂憤疽作於背疾甚諸將楊進等排闥入問公矍然起曰吾固無恙正以憂憤成疾耳而能為我殲滅仇讎以成主上恢復之志雖死無恨衆皆流涕曰願盡死諸將出公復曰吾度不起此疾古語云出師未捷身先死長使英雄涙滿襟遂薨是日風雨𡨕晦異常公沒無一語及家事但連呼過河者三遺表猶贊上還京先言已涓日渡河而得疾其末曰囑臣之子記臣之言力請鑾輿亟還京闕大震雷霆之怒出民水火之中夙荷君恩敢忘尸諫死之日都人為號慟朝野無賢愚皆相弔出涕三學之士千餘人為文以哭之公死數日將士去者十五都人憂之相與請於朝言澤子頴嘗居戎幕得士卒心請以繼其父任㑹杜充已除留守乃以頴充留守判官充反公所為由是兩河豪傑皆不為用所招羣盜復去為盜議者咎之朱文公曰建炎初公留守東京招徕羣盜數百萬使一舉而取河北數郡當時即可整頓乃為汪黄二相所制怏怏而死京師之人莫不號慟於是羣盜四出為山東淮南劇賊宋名臣言行録别集下巻五
